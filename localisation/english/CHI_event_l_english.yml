l_english: 
 china_wr.1.t:0 "Reintroduction of the Conscription Law Amendment"
 china_wr.1.d:0 "Near the end of Cao Kun's administration, the National Assembly attempted to pass an amendment to the conscription law in order to suppress the warlord militia system and centralize military authority. However, Cao Kun vetoed the proposal, preventing even proper discussion. As a result, the bill was discarded entirely. Soon after, the nation fell into rapid political turmoil, and Zhang Xueliang's unauthorized Northern Expedition, combined with the worsening Northeastern crisis, made fundamental reform of the conscription system unavoidable.\n\nThe Provisional Government of Yan Huiqing is now pushing once again to revise the conscription law to stabilize military command and dismantle the remaining warlord power structures. The new amendment includes not only the previously debated issues—such as transparent conscription procedures, the legal status of militias, and centralization of force organization—but also new provisions designed to prevent further unauthorized troop mobilizations as seen recently.\n\nIf the amendment passes, the Republic will finally be able to restore a military system firmly under central control. However, warlord-aligned legislators and numerous regional representatives strongly oppose the reform, fearing that their local power bases will be weakened. The provisional government cannot avoid confronting this challenge; it must resolve the matter decisively."
 china_wr.1.a:0 "One step at a time."
 china_wr.2.t:0 "Partial Acceptance of the Cao Kun Reform"
 china_wr.2.d:0 "The so-called 'Cao Kun Reform,' imposed unilaterally by Cao Kun, introduced direct presidential elections, extensive redistricting, and a greatly expanded legislature, leaving the political order of the Republic deeply destabilized. After the collapse of his regime, the reform remained unresolved and continued to fuel factional conflict.\n\nThe Provisional Government of Yan Huiqing now chooses to selectively accept only the essential components of the reform, rather than abolishing it entirely. This approach aims to reclaim administrative authority from the warlords and to restore coherence in the Republic's electoral and administrative institutions.\n\nAlthough this measure brings short-term political cost, it is a necessary step toward restoring stability to the Republic."
 china_wr.2.a:0 "The state must move forward with stability."
 china_wr.3.t:0 "Full Acceptance of the Cao Kun Reform"
 china_wr.3.d:0 "The Provisional Government of Yan Huiqing has determined that the partial acceptance of the Cao Kun Reform is insufficient to restore the full constitutional order of the Republic. After reviewing the entire structure of the reform, the government has decided to reintroduce its core components as a comprehensive system.\n\nThis measure stabilizes the central government's authority by reorganizing the direct presidential election system, redistricting laws, and the expanded legislature under unified standards. It will also weaken the entrenched regional power of the warlord factions. Nevertheless, the decision is expected to trigger political friction and temporary social instability.\n\nEven so, this 'full acceptance' is a necessary hardship for the Republic to regain institutional coherence and move forward."
 china_wr.3.a:0 "A necessary decision."
 china_wr.4.t:0 "Opening Negotiations with Japan"
 china_wr.4.d:0 "The unauthorized advance of the Northeastern Army and their looting near the Japanese concession in the Kwantung region has provoked strong Japanese protests. The Yan Huiqing Provisional Government fears that further escalation may invite military pressure from Japan.\n\nTo defuse the situation, an official envoy has been dispatched to Japan. The envoy conveyed the government's regret, clarifying that the Northeastern Army acted independently. To conclude the incident swiftly, the government has proposed a temporary transfer of Southern railway construction rights.\n\nThis concession may be humiliating, but it may be necessary to avert immediate disaster."
 china_wr.4.a:0 "Deliver the proposal to Japan."
 china_wr.5.t:0 "China's Explanation and Concession Proposal"
 china_wr.5.d:0 "A Chinese delegation has delivered an official statement clarifying that the recent looting and unauthorized advance of the Northeastern Army near the Kwantung concession were entirely independent actions, carried out without the approval or knowledge of the central government. The delegation expressed deep regret for the disturbance and formally apologized for the incident.\n\nTo resolve the situation swiftly and ease tensions between both nations, China has proposed a temporary transfer of Southern railway construction rights to Japan. This concession appears intended to both compensate for the incident and stabilize diplomatic relations.\n\nThe Japanese government must now decide whether to accept this explanation and proposal."
 china_wr.5.a:0 "Accept China's explanation and review the offer."
 china_wr.5.b:0 "Their explanation is insufficient. Stronger measures are required."
 china_wr.6.t:0 "Japan Accepts the Agreement"
 china_wr.6.d:0 "The Japanese government has accepted our explanation and apology, and has agreed to the temporary transfer of Southern railway construction rights. With Japan easing its diplomatic pressure, the immediate crisis appears to have subsided.\n\nThe Yan Huiqing Provisional Government argues that this was an unavoidable measure to prevent a larger conflict. However, domestic criticism is slowly emerging, accusing the government of making a humiliating compromise. Even so, the conclusion of these negotiations has undoubtedly bought the government some much-needed time."
 china_wr.6.a:0 "For now, the crisis has passed."
 china_wr.7.t:0 "Japan Rejects the Proposal"
 china_wr.7.d:0 "The Japanese government has rejected our explanation, refusal to accept our apology, and dismissed the proposed temporary transfer of Southern railway construction rights. Japan contends that the Northeastern Army's unauthorized actions demonstrate the Chinese government's inability to maintain control.\n\nRecognizing the severity of the situation, the Yan Huiqing Provisional Government has begun preparing emergency countermeasures. While both the public and the National Assembly condemn Japan's stance, there is growing fear that Japan may escalate pressure or even take military action.\n\nThe political climate is once again descending into uncertainty."
 china_wr.7.a:0 "The situation is deteriorating..."
 china_wr.8.t:0 "Presidential Election"
 china_wr.9.t:0 "Official Report on the Sichuan Situation"
 china_wr.9.d:0 "Mr. Acting President,\n\nI respectfully submit the following summary of the reports received from Sichuan regarding recent agricultural conditions and local sentiment. Certain counties have observed a modest decline in this year's harvest, though local authorities emphasize that the matter remains localized and poses no significant risk to the province's overall production capacity. While a temporary rise in grain prices has led to minor public concern, corrective measures have reportedly been implemented, and conditions are said to be stabilizing.\n\nThere was a minor incident along the Yangtze River during the transport of goods, attributed to a simple misunderstanding. Local security units intervened promptly, and the likelihood of further escalation is assessed to be low. Administrative and security functions throughout the province are reported to be operating normally, with no signs of broader instability.\n\nIn conclusion, the situation in Sichuan is deemed manageable at the provincial level, and there is no current indication that immediate intervention from the central government is required."
 china_wr.9.a:0 "Continue monitoring."
 china_wr.10.t:0 "The Sichuan Famine"
 china_wr.10.d:0 "Reports from Sichuan indicate that what began as localized crop failures and food shortages has now escalated into a full-scale famine. Some county-level documents already speak of widespread starvation and mass flight from the countryside, while rumors suggest that local officials may be underreporting the severity of the crisis for fear of censure from above.\n\nUntil now, the central government has attempted to manage the situation as a mere 'threat of famine', but it is no longer possible to treat it as a limited regional disaster. The Sichuan crisis has become more than a natural calamity; it is a grave test of the Republic's administrative, logistical, and security capabilities. We must now formally acknowledge this as a national emergency and prepare for a prolonged campaign of relief and reconstruction."
 china_wr.10.a:0 "This is where the real work begins."
 china_wr.11.t:0 "Famine Sweeps Through Sichuan"
 china_wr.11.d:0 "News has spread that an unprecedented famine is ravaging western China. In the rural and mountainous districts of Sichuan, harvests have collapsed, and weak transport and distribution networks have failed to deliver food to either towns or villages. Foreign correspondents report columns of refugees fleeing hunger, empty marketplaces, and villages haunted by rumors of starvation.\n\nThe Chinese central government has declared the crisis a 'national disaster' and announced emergency measures, yet there is growing doubt as to whether it has the finances and administrative capacity to follow through. The international community now watches closely to see whether China's political system can withstand this humanitarian and political shock."
 china_wr.11.a:0 "Hunger recognizes no borders."
 china_wr.12.t:0 "Relief Reaches Sichuan"
 china_wr.12.d:0 "After long delays and countless obstacles, the first large-scale relief shipments have finally begun to reach Sichuan. Central convoys and military transport units have managed to bypass collapsed bridges and ruined roads, using river routes, improvised docks, and mountain passes to push supplies into several key hubs across the province.\n\nTemporary distribution points and clinics have been established in county seats, with food and medicine allocated first to the hardest-hit communities. Supplies remain far from sufficient to cover the entire region, but reports indicate that the number of people collapsing from hunger has begun to fall. The operation has not yet turned the tide of the famine, but it has shown that the disaster can, at least in part, be pushed back."
 china_wr.12.a:0 "At last, we can catch our breath—if only slightly."
 china_wr.13.t:0 "The Cancelled Early Election"
 china_wr.13.d:0 "Amid the Sichuan famine and nationwide unrest, the early presidential election that the government once promised has, in practice, been postponed indefinitely. Many regions have not even completed their voter registries; refugees, public disorder, and administrative paralysis have made it impossible to guarantee a fair and orderly vote.\n\nThe government presents this as an unavoidable administrative necessity, but neither the public nor the parties are inclined to accept that explanation at face value. Opposition leaders and newspapers accuse the authorities of using the crisis as a pretext to extend their grip on power, while ordinary citizens complain that they have lost not only their livelihoods but also their political voice. The cancellation of the early election adds a new layer of distrust atop the tragedy unfolding in Sichuan."
 china_wr.13.a:0 "In times of crisis, political trust is the first to crumble."
 china_wr.14.t:0 "Appeal to the Great Powers"
 china_wr.14.d:0 "As the Sichuan famine drags on, the central government has been forced to admit that it cannot manage the crisis alone. It has therefore dispatched formal appeals for aid to the major powers of the world, including detailed reports on the scale of the disaster, estimated casualties, and the urgent need for food, medicine, and technical assistance.\n\nSome argued that national pride and the principle of non-interference should prevent foreign involvement in China's internal affairs. In the end, however, the prospect of saving millions of lives outweighed such concerns. The international community must now decide how to respond, balancing humanitarian ideals against strategic interests."
 china_wr.14.a:0 "We have no choice but to extend our hand for help."
 china_wr.15.t:0 "China's Appeal Reaches [FROM.GetName]"
 china_wr.15.d:0 "The government of China has formally approached [ROOT.GetName], along with several other nations, requesting assistance in confronting the famine in Sichuan and other western regions. Their appeal asks for shipments of food and medicine, expert personnel, and even technical advice on how to move supplies safely into the interior.\n\nOur response will mean more than a few cargo ships or trainloads of grain. The decision taken by the [ROOT.GetAdjective] government will shape our future relationship with China, influence global opinion, and serve as a test of the civilizational and humanitarian values we claim to uphold."
 china_wr.15.a:0 "Approve the aid, in the name of humanity."
 china_wr.15.b:0 "This is not our concern; we shall not intervene."
 china_wr.16.t:0 "[FROM.GetName] Approves Relief"
 china_wr.16.d:0 "[FROM.GetName] has agreed to our request for assistance in dealing with the Sichuan famine. They have officially pledged to send food, medical supplies, and personnel, and have offered to allocate part of their ports and transport capacity specifically for shipments bound for China.\n\nThis aid alone will not resolve the crisis, but rumors of 'foreign grain' have already begun to spread in warehouses and distribution centers. To ensure that this support is used as effectively as possible, the central government has decided to establish a special committee to oversee allocation and transport."
 china_wr.16.a:0 "We must remember this act of goodwill."
 china_wr.17.t:0 "[FROM.GetName] Refuses Relief"
 china_wr.17.d:0 "[FROM.GetName] has politely but firmly refused our appeal for aid in the Sichuan famine. Citing domestic conditions, budgetary constraints, or diplomatic considerations, they have declared that they cannot participate directly in the relief effort.\n\nThe language of their diplomatic note is cautious and courteous, yet it offers us nothing tangible. Some officials mutter that our expectations were unrealistic from the start; others are angered by what they see as international indifference to China's suffering."
 china_wr.17.a:0 "We will have to endure with what we have."
 china_wr.18.t:0 "Outcome of the Relief Effort"
 china_wr.18.desc.a:0 "We sent appeals for aid to many nations, laying bare the full extent of the famine in Sichuan. Yet the replies we received were cold and distant. Not a single country has committed to providing meaningful assistance; most limit themselves to expressions of 'regret' and careful diplomatic distancing.\n\nIn the end, no outside power will come to save Sichuan. With limited resources and a fragile logistical framework, the Republic must face this disaster largely unaided. The lesson is harsh but unmistakable: we cannot entrust the fate of the nation to the goodwill of others."
 china_wr.18.desc.b:0 "Only a handful of countries responded positively to our desperate appeals, but those that did have offered food, medicine, and personnel. Their contributions will help ease the worst suffering in the hardest-hit areas and may prevent the famine from descending into total catastrophe.\n\nEven so, vast stretches of Sichuan's fields and mountain villages remain beyond the reach of any relief program. This international assistance is not a cure but a brace to keep a collapsing structure standing a little longer. We must use it wisely, while searching for longer-term solutions of our own."
 china_wr.18.desc.c:0 "Our appeals have borne fruit: nearly every nation we approached has agreed to assist. Shipments of grain and medicine are arriving in steadily increasing volumes, and foreign experts and volunteers are joining relief operations across Sichuan.\n\nNo amount of aid can bring back the lives already lost, but this unprecedented wave of support has prevented the famine from becoming a permanent, entrenched disaster. At the same time, it offers China a chance to rebuild its credibility as a responsible member of the international community."
 china_wr.18.a:0 "In the end, we can rely only on ourselves."
 china_wr.18.b:0 "At least we may have a chance to avoid the very worst."
 china_wr.18.c:0 "We must wring every last benefit from the aid we have received."
 china_wr.18.d:0 "One day, we shall repay these debts of honor."
 china_wr.19.t:0 "Promise of an Early Election"
 china_wr.19.d:0 "As distrust in the central government mounts amid subsequent disturbances, Acting President Yan Huiqing has publicly pledged to hold an early presidential election as a means of restoring political stability. He has declared that, once the immediate emergency has eased, new presidential and parliamentary elections will be held regardless of the current terms of office.\n\nThis promise does not resolve the crisis overnight, but it has at least softened fears that the incumbent authorities intend to cling to power indefinitely. The people and the parties will now watch closely to see whether this pledge is merely a stalling tactic, or the first genuine step toward the restoration of constitutional order."
 china_wr.19.a:0 "Only by keeping our word can we hope to regain trust."
 china_wr.20.t:0 "The End of the Sichuan Famine"
 china_wr.20.d:0 "The great famine that has weighed upon the Republic has finally entered a phase of stabilization. The large-scale relief operations utilizing the Yangtze river network, the nationwide logistics mobilization order, and the limited but crucial international assistance have collectively taken effect. Even in the regions that suffered the worst starvation, organized reports of mass death are no longer being received.\n\nOf course, scars remain across Sichuan's fields and mountain villages. Families torn apart, indebted households crushed by loans, and refugees who have yet to return home all stand as living reminders of this disaster's long shadow. Even so, the central government now judges that the worst stage—'mass starvation'—has been averted, and preparations must begin to transition from emergency relief to long-term recovery and reconstruction.\n\nThe Sichuan famine has revealed both the capabilities and limitations of the Republic. What remains is not simply to remember this tragedy as a natural disaster, but to treat it as a starting point for reforming our institutions, administration, and economic structures."
 china_wr.20.a:0 "Now begins the time for recovery—and accountability."
 china_wr.21.t:0 "The Acting President's Choice"
 china_wr.21.d:0 "As the Sichuan famine enters a stable phase and preparations for the early presidential election accelerate, the political focus of the Republic has returned to the question of who shall become the next President. Acting President Yan Huiqing, who has guided the nation through recent turmoil, has decided to hold informal discussions with the major candidates who may shape the Republic's future.\n\nThe Progressive Party raises the banner of 'People's Welfare and Equal Livelihood,' arguing that the most urgent task is restoring the lives of the starving and impoverished masses. The Young China Party promotes 'Constitutional Democracy,' insisting that the Sichuan tragedy was the result of outdated political practices and disregard for constitutional norms. The Kuomintang advances 'Northern Expedition and Reunification,' warning that without resolving the Manchurian–Mongolian question and the unequal treaty ports, any reform would remain incomplete.\n\nYan Huiqing intends to speak individually with prominent figures from each party, directly examining their diagnoses of the Republic's crisis and their proposed solutions. His reflections and choices will serve as a critical milestone in determining the landscape of the coming election."
 china_wr.21.a:0 "Discuss livelihood and welfare with the Progressives."
 china_wr.21.b:0 "Discuss constitutional order with the Young China Party."
 china_wr.21.c:0 "Discuss reunification with the Kuomintang."
 china_wr.22.t:0 "Dialogue with the Progressive Party"
 china_wr.22.d:0 "Acting President Yan Huiqing invited the Progressive Party's presidential candidate, Cai E, to a private meeting to discuss the direction the Republic should take after the Sichuan famine. From the very beginning, Cai E declared that 'politics is livelihood itself' and shared vivid accounts of farmers and workers he had met in the famine-stricken regions.\n\nHe argued that the disaster was not the result of mere crop failure but a structural crisis caused by unequal land systems, weak labor protections, indifferent local administration, and the absence of a social welfare framework. He then presented the 'Balanced Livelihood' policy package, outlining tax reforms, financial restructuring, and a roadmap for regional economic balancing.\n\nYan Huiqing questioned whether these reforms would exceed the nation's fiscal and administrative capacity. Yet by the end of the discussion, he could not deny one fact: unless the wounds of Sichuan were healed, any constitutional or diplomatic reform would remain hollow."
 china_wr.22.a:0 "A politics that ignores the hungry cannot exist."
 china_wr.23.t:0 "Dialogue with the Young China Party"
 china_wr.23.d:0 "The presidential candidate of the Young China Party, Hu Shih, arrived carrying a draft constitution and several works on political theory. He began by declaring the Sichuan famine a 'failure of governance and a tragedy born from the collapse of constitutional order.'\n\nAccording to him, despite early warning signs, effective action was impossible because political power had concentrated into the hands of a few, distorting administrative information and crippling the mechanisms of oversight. He emphasized restoring the separation of powers, guaranteeing the independence of parliament and judiciary, and protecting the freedom of the press and civil society.\n\nYan Huiqing questioned whether such ideals could truly be implemented amid the chaos of real politics and how Hu Shih planned to confront resistance from radical elements and authoritarian bureaucrats. Hu Shih stressed that gradual reform and social compromise—not emotional agitation—were the only viable path. By the end of the discussion, Yan Huiqing was reminded how difficult it is to safeguard both liberty and order."
 china_wr.23.a:0 "Without constitutional order, any reform is a house built on sand."
 china_wr.24.t:0 "Dialogue with the Kuomintang"
 china_wr.24.d:0 "Kuomintang presidential candidate Wang Jingwei attended the meeting with solemn determination. He asserted that the root cause behind Sichuan's chaos, economic instability, and political division lay in one simple fact: the northern territories remained under the influence of foreign powers and the Manchuria-Mongolia regime.\n\nWang Jingwei detailed how grain, minerals, and railway concessions were flowing out of Manchuria and Mongolia, and how treaty ports and extraterritorial zones drained China's wealth. He argued that the 'Northern Expedition for Unification' was not a reckless adventure but the only way to restore national legitimacy and end the cycle of exploitation.\n\nYan Huiqing expressed concern that such a military campaign might spark further bloodshed and whether the exhausted population could bear new mobilizations. Wang Jingwei countered that 'peace without unification is an illusion,' insisting that only by reclaiming the north could reform and welfare become possible. The tense dialogue ended without reconciliation."
 china_wr.24.a:0 "We must carefully weigh the cost of unification."
 china_wr.25.t:0 "Progressive Speeches Echo Through the Factory Districts"
 china_wr.25.d:0 "To secure the support of the working class in the upcoming presidential election, the Progressive Party has dispatched concentrated campaign teams to major industrial cities and port districts. Party leaders and candidates time their speeches to coincide with shift changes, addressing workers at factory gates in the early morning and visiting union halls and factory canteens after hours to explain their pledges in detail.\n\nThey emphasize that the Sichuan famine is not merely a tragedy of the countryside, but a 'national crisis' that has also brought wage stagnation, layoffs, and soaring prices to urban workers. The Progressives present concrete legislative goals, including shorter working hours, stronger safety regulations, the introduction of unemployment insurance and workplace injury compensation, and the phased adoption of a minimum wage system, appealing that "this election may be the first real chance to change workers' lives."\n\nExhausted workers remain skeptical about politics, but in some workplaces the name of the Progressive Party is being discussed seriously for the first time. The speeches rising between the factory chimneys are still faint, yet they signal a new political possibility."
 china_wr.25.a:0 "Politics has finally come to the factory gate."
 china_wr.26.t:0 "Intellectuals and Moderates Seek a Centrist Alliance"
 china_wr.26.d:0 "As the election draws closer, the Republic's political landscape is becoming increasingly polarized. On one side, some shout for radical social revolution and class struggle; on the other, voices call for a hard-line Northern Expedition and unification by force. Newspapers and streets alike are filled with competing slogans. In this climate, moderates within the Progressive Party and the Young China Party, together with non-aligned intellectuals, have quietly begun to put their heads together.\n\nThey remind one another that the lesson of the Sichuan famine lies not in extreme ideological agitation but in responsible administration and gradual reform. Despite their different ideological backgrounds, they seek common ground in the defense of constitutional government and the stabilization of people's livelihoods. In some regions, the Progressives and the Youth Party have even appeared side by side, refraining from personal attacks and holding joint policy forums—an unusual sight by any standard.\n\nThis movement for a centrist alliance remains a subtle undercurrent rather than an obvious tide, but it is slowly winning support among citizens disillusioned with politics and among academics and professionals. The future of the Republic may well depend on which direction this quiet coalition ultimately chooses to throw its weight."
 china_wr.26.a:0 "Beyond the noise of extremes, a new majority is taking shape."
 china_wr.27.t:0 "A Sweep Against Lawlessness in Jiangnan"
 china_wr.27.d:0 "As election fever gradually rises, the Jiangnan region has seen violent groups and local strongmen exploit the confusion to expand their influence. According to reports, some of these organizations have formed ties with particular parties, using intimidation to disrupt rival campaigns or coerce merchants and residents into backing a single side.\n\nIn response, the central government has announced a major security crackdown throughout Jiangnan, launching joint operations involving police, gendarmerie, and army security units. Illegal gatherings, unlicensed gambling dens, and hidden weapons caches are being raided in succession, and news of the arrest of key figures within several gangs continues to arrive. While some parties suspect political motives and voice their displeasure, many residents of Jiangnan quietly hope that, at least during the election period, violence in the streets will subside.\n\nDebate will surely continue over whether this operation truly serves 'equality before the law' or is in part a means of restraining certain political forces. One fact, however, is undeniable: any election conducted under the shadow of guns and threats cannot defend the name of the Republic."
 china_wr.27.a:0 "An election held to the sound of gunfire can no longer be tolerated."
 china_wr.28.t:0 "Politicians Strike a Bargain with the Green Gang"
 china_wr.28.d:0 "Even as the Jiangnan crackdown publicly proclaims the 'elimination of lawless elements' and the 'establishment of electoral order', a very different development is being reported from behind the scenes. Some Kuomintang figures are said to be making unofficial contact with the Green Gang, the powerful criminal organization that dominates much of Shanghai.\n\nThe Green Gang commands broad mobilization power and an extensive information network reaching from dockworkers and stevedores to the urban poor. Cooperation with them could become a potent tool for controlling the atmosphere of elections in specific districts and quietly obstructing the activities of rival parties. In fact, rumors already circulate that campaign rallies for Kuomintang candidates seem curiously 'quiet and orderly' around certain ports and markets.\n\nYet such arrangements amount to a dangerous choice that undermines the foundations of the Republic's rule of law and party politics. Though they may bring short-term advantages at the ballot box, the price will be steep if the day comes when the Green Gang demands influence over central power. Even so, some politicians have chosen to roll these dice, chasing immediate victory."
 china_wr.28.a:0 "A deal with the devil always demands payment in the end."
 china_wr.29.t:0 "The Kuomintang Declares an Election Boycott in Sichuan"
 china_wr.29.d:0 "As the situation in Sichuan continues to deteriorate, the provincial branch of the Kuomintang has escalated its criticism of the authorities and, during a rally held earlier today, abruptly announced a full 'election boycott.' They argued that holding an election while public security and administration have yet to recover is nothing more than "a ploy to blind the starving people and manipulate the vote," and openly appealed to Sichuan voters to refrain from participating.\n\nThe Sichuan branch went on to declare that "the boycott is the only and unavoidable measure to prevent the political exploitation of famine-stricken regions," and accused the authorities of "deliberately neglecting the famine for political gain."\n\nHowever, other parties in Sichuan and most newspapers are condemning this announcement as "a political maneuver born of fear of defeat," and even some Kuomintang members themselves have voiced concern over their branch's statements. Among the people of Sichuan, the prevailing sentiment is one of bitter cynicism: "Those who have done nothing but disturb our province for months now claim to speak for us and tell us to abandon our rights."\n\nUpon hearing the declaration, the national leadership of the Kuomintang hurriedly issued a statement insisting that the Sichuan branch acted "entirely on its own," urging supporters across the country to "exercise your precious vote for the Kuomintang," a message that has only deepened confusion among the party's supporters."
 china_wr.29.a:0 "So are we supposed to vote, or not?"
 china_wr.30.t:0 "The Radio 'Voice of Freedom' Enters the Campaign"
 china_wr.30.d:0 "The radio program 'Voice of Freedom', operated by the Young China Party, has long been known as an educational broadcast dealing with constitutionalism, the rule of law, and social issues. As the election approaches, however, the station has gradually stepped into the forefront of explicit political campaigning.\n\nRather than openly attacking specific parties, the broadcast addresses sensitive topics such as the Sichuan famine, the promise of early elections, and constitutional debate, while repeatedly stressing the importance of 'procedural legitimacy' and 'checks against abuse of power'. Expert discussion panels, talk shows aimed at youth, and live segments reporting from the provinces all serve to propagate the Youth Party's platform of moderate reform and constitutional defense in a natural and persuasive manner.\n\nAmong urban intellectuals and students, as well as citizens in smaller cities who rely on radio for information, it is said that one cannot speak of politics without listening to 'Voice of Freedom'. Though the station officially denies being a propaganda arm of any particular party, there is little doubt that its influence will weigh heavily on the outcome of the election."
 china_wr.30.a:0 "The front lines have shifted from the streets into the airwaves."
 china_wr.31.t:0 "Mass Rally for the People: Voices Filling the Square"
 china_wr.31.d:0 "Seeking to rebuild public trust shattered by the Sichuan famine, the Progressive Party has decided to hold a nationwide 'Mass Rally for the People.' The party leadership judged that debates confined to meeting rooms or arguments printed on newspaper columns could no longer contain the cries of livelihood and suffering.\n\nFrom dawn, workers, students, and ordinary citizens flooded the square, carrying red flags and handmade placards. The speakers who took the stage avoided complex statistics or theoretical jargon; instead, they shared testimonies heard directly from famine-stricken villages and stories of hardship witnessed in factories, ports, and marketplaces. The crowd responded at times with solemn silence, and at others with thunderous applause. The Progressive Party's message—that politics must no longer descend from above, but rise from the lived experiences of the people—set the entire rally ablaze.\n\nAt the height of the gathering, the party leadership unveiled the core framework of the 'Equal Livelihood for All' program. The phased introduction of a minimum wage, strengthened safety nets for food, housing, and healthcare, revisions to labor protection laws, and policies for balanced regional economic development presented a tangible vision for the future, resonating powerfully with the attendees. Many lingered around the venue long after the speeches ended, discussing their hopes and fears, and quietly acknowledging that politics might once again reconnect with the realities of everyday life.\n\nWhether this rally will become a historic turning point that reshapes the political landscape of the Republic remains to be seen. Yet one truth has become unmistakably clear: when the people begin to raise their own voices, the direction of politics inevitably begins to move toward their lives."
 china_wr.31.a:0 "The people, in the end, are the heart of politics."
 china_wr.32.t:0 "Debate on Freedom"
 china_wr.32.d:0 "At today's session of the 'Debate on Freedom,' Hu Shih delivered a series of provocative remarks that shook the audience and challenged the accepted norms of Chinese society.\n\nOpening the discussion, he declared, "Tradition deserves a measure of respect, yes — but when a slave chains himself and proudly calls it virtue, what else can one do but laugh?" He went on to argue that "China's entire social structure throttles personal freedom, scholarly inquiry, and every possibility for progress." Several panelists stormed out in protest, but Hu Shih continued unfazed.\n\nHe then turned his attention to censorship and the violence employed by warlords and political factions. "What harms a nation is not freedom," he said, "but the maggots in the latrine who parade around under the banner of freedom." The hall fell into a stunned silence.\n\nThe most controversial portion concerned youth and women. Hu Shih asserted that "A half-hungry, half-educated youth is worth a hundred well-fed old men who refuse to learn," calling for full educational and economic access for women and the poor. When reporters later asked whether his proposals were too radical, he replied, "If anyone thinks this is radical, it merely proves how outdated they've become."\n\nHis remarks provoked thunderous applause from reformists and students, while enraging conservative attendees — a clear sign that a political storm is brewing."
 china_wr.32.a:0 "Someone should really tell that man to watch his mouth..."
 china_wr.33.t:0 "Hearing on Equal Livelihood"
 china_wr.33.d:0 "The Progressive Party is holding a large-scale public hearing to advance its 'Equal Livelihood' platform. The goal is to listen directly to the voices of the people and determine what is needed to rebuild the social and economic foundations shattered by the Sichuan famine.\n\nFarmers, dockworkers, factory laborers, small merchants, teachers, and doctors are testifying about their struggles regarding wages, food security, housing, medical access, and debt. Using these accounts, the party leadership is presenting the 'Equal Livelihood Package,' which includes a phased minimum wage, stabilization of food distribution, improved labor protections, and balanced regional development.\n\nThis hearing is not a simple campaign event but a demonstration that the party is directly connecting public testimony to policymaking. Support is rising across the southwest, and the Progressive Party is showing growing confidence that its platform may become the cornerstone of national reconstruction."
 china_wr.33.a:0 "Politics begins with listening to the people."
 china_wr.34.t:0 "Forum on Civil Rights and Constitution"
 china_wr.34.d:0 "The Young China Party is organizing a nationwide constitutional reform forum to elaborate on its platform of 'Civil Rights and Constitution.' The party argues that the failures revealed by the Sichuan crisis stem from concentrated power and a lack of oversight, and that restoring constitutional order is the first step toward rebuilding the republic.\n\nThe forum discusses strengthening parliamentary authority, securing judicial independence, expanding press freedoms, energizing civil society, and redefining central–regional power balances. Scholars warn that a state whose institutions do not protect citizens is doomed to collapse in every crisis, while younger intellectuals are showing strong interest and actively participating in debate.\n\nThrough this forum, the Young China Party is emphasizing that its agenda is not mere rhetoric but a practical plan to restore constitutional governance."
 china_wr.34.a:0 "Reform stands firm only when the constitution stands firm."
 china_wr.35.t:0 "Strategy Conference on Northern Reunification"
 china_wr.35.d:0 "The Nationalist Party has designated the Manchuria–Mongolia regime as the primary cause of the republic's stagnation, and is holding a nationwide strategy conference to advance its platform of 'Northern Reunification.'\n\nThe conference highlights that the railways, minerals, and ports controlled by the Manchuria–Mongolia state—and the wealth leaking from foreign concessions and extraterritorial zones—are preventing the republic's recovery. The leadership is presenting a long-term strategy involving territorial restoration, securing railway networks, reorganizing logistics, and reinforcing border defense.\n\nThis event demonstrates that the Nationalist Party views the Northern Expedition not as a mere display of force but as an essential process to restore national legitimacy. The party's base is rallying tightly, and the cause of reunification is becoming central to the nation's political discourse."
 china_wr.35.a:0 "Politics and prosperity without reunification are illusions."
 china_wr.36.t:0 "The Sichuan Famine Subsides and Elections Resume"
 china_wr.36.d:0 "Reports from Sichuan indicate that the devastating famine has finally entered a period of stabilization. Relief shipments along the Yangtze, renewed provincial support, and restored local administration have sharply reduced the number of starvation cases. Security in the region is also recovering, allowing daily life to slowly return to order.\n\nWith the crisis no longer at its peak, preparations for the postponed presidential election may now resume. Though the scars left on the people of Sichuan remain deep, many within the Republic insist that the political schedule can no longer be delayed.\n\nThe central government has thus declared a return to normal electoral procedures, signaling that the Republic must once again move forward."
 china_wr.36.a:0 "The Republic must move forward once more."
 china_wr.37.t:0 "The Result of the Presidential Election"
 china_wr.37.d:0 "After months of instability and the turmoil brought by the Sichuan famine, the presidential election of the Republic has finally come to an end. Cai E of the Progressive Party, Hu Shih of the Young China Party, and Wang Jingwei of the Kuomintang — these three candidates have fiercely competed to define the Republic's future in their own ways.\n\nThe voters carefully weighed three different visions—livelihood, liberty, and national reunification—while the candidates traveled across the country, appealing for support until the very last moment. With the long process of voting and counting now complete, the Republic stands ready to welcome a new leader who will open a new chapter for the nation.\n\nThe final result of the election is about to be announced."
 china_wr.37.a:0 "Cai E has won."
 china_wr.37.b:0 "Hu Shih has won."
 china_wr.38.t:0 "Kuomintang Protest Statement"
 china_wr.38.d:0 "With the Sichuan situation having troubled the Kuomintang throughout the election period, the party leadership issued an immediate statement following the confirmation of its defeat. They blamed their loss on the confusion caused by the Sichuan vote-boycott incident and what they described as the central government's inadequate response, claiming these factors distorted the election outcome.\n\nThe leadership argued that preventing Sichuan residents from fully exercising their voting rights was a clear act of obstruction and insisted that the election could not be considered legitimate unless the situation was rectified. Some hardliners have even begun calling for a re-vote and are mobilizing street protests.\n\nHowever, other parties and most newspapers criticize the Kuomintang for merely disguising its collapsing support base as 'electoral fraud.' The Republic now watches as the Kuomintang struggles to redirect the shock of its defeat toward external factors."
 china_wr.38.a:0 "So once again, they're blaming everyone but themselves."
 china_wr.39.t:0 "Kuomintang Media Offensive"
 china_wr.39.d:0 "Following its electoral defeat, the Kuomintang has now turned its accusations toward the press. The leadership claims that newspapers and radio stations systematically sidelined its candidate throughout the campaign while amplifying the messages of other parties.\n\nAt an emergency press conference, the party spokesperson denounced the media for 'abandoning fairness and distorting public opinion,' insisting that the Kuomintang failed to receive a fair evaluation because of biased reporting. Some lawmakers have gone so far as to argue that 'media bias was the real election fraud' and demanded the creation of a media oversight committee.\n\nMost media outlets have sharply rejected the accusation, countering that the Kuomintang itself avoided interviews and revealed nothing but internal chaos during the election. Whether this media offensive is an attempt to mask a strategic defeat or a legitimate concern about the information environment remains a subject of political debate."
 china_wr.39.a:0 "Now they're blaming the media too, it seems."
 china_wr.40.t:0 "Kuomintang Claims of Electoral Tampering"
 china_wr.40.d:0 "Some members of the Kuomintang leadership have begun raising objections to the regional distribution of votes in the election. The party performed particularly poorly in industrial cities, port districts, and university centers—an outcome that has become the focus of controversy.\n\nHardline legislators argue that certain urban election administrators abandoned neutrality and created conditions favorable to rival parties. They have cited changes in counting personnel, the transport routes of ballot boxes, and the use of temporary polling stations as supposed evidence of tampering.\n\nThe electoral commission has flatly denied all allegations, stating that voting proceeded under identical standards nationwide. Other parties criticize the Kuomintang for refusing to accept a clear strategic defeat and attempting to mask urban voter desertion under an 'electoral fraud' narrative.\n\nThough the Kuomintang has yet to present any concrete proof, its claims have once again reignited political tensions surrounding the election results."
 china_wr.40.a:0 "At some point, they must learn to accept defeat."
 china_wr.41.t:0 "Armed Demonstrations by Sichuan Volunteer Corps"
 china_wr.41.d:0 "Immediately after the presidential election results were announced, volunteer corps backed by the Sichuan branch of the Kuomintang began staging armed demonstrations across the province. Chanting slogans such as "Expose the fraudulent election!", they blocked major roads, and some even approached government military posts with leftover equipment, escalating tensions.\n\nGovernment forces have so far refrained from large-scale action, but several reports confirm minor exchanges of gunfire when volunteers refused inspections. The KMT central leadership insists that "no official orders were given," yet the situation on the ground is clearly slipping out of control."
 china_wr.41.a:0 "An ominous sign..."
 china_wr.42.t:0 "Organized Clashes by Sichuan Volunteer Corps"
 china_wr.42.d:0 "Clashes between the KMT volunteer forces and government troops in Sichuan have escalated into organized engagements. Some volunteers launched surprise attacks on garrison posts, resulting in casualties on both sides.\n\nAlthough the government labels the situation as 'isolated violence,' reports indicate increasingly coordinated disruptions—attacks on roads, warehouses, and postal depots. Particularly alarming are accounts of volunteers establishing fortified positions throughout the surrounding mountains, signaling the crisis is growing beyond mere unrest."
 china_wr.42.a:0 "The situation is deteriorating."
 china_wr.43.t:0 "Signs of Rebellion Among Sichuan Volunteer Corps"
 china_wr.43.d:0 "The Sichuan volunteer corps now stands on the brink of open rebellion against the central government. They have attacked supply convoys, seized administrative buildings, and escalated their operations far beyond simple political demonstrations.\n\nSome commanders are openly declaring that 'Sichuan will no longer obey the central authorities,' effectively pushing for regional autonomy. Discontented factions from nearby areas appear ready to join them. The KMT central leadership continues to downplay the crisis, but local reports warn that a major confrontation is imminent."
 china_wr.43.a:0 "If we do not act now, it will be too late."
 china_wr.44.t:0 "Yangtze Relief Transport Sunk"
 china_wr.44.d:0 "A major relief transport vessel traveling upstream along the Yangtze River toward Sichuan was sunk at dawn after coming under concentrated artillery fire from Kuomintang positions. The ship carried food, medicine, and essential shelter materials. The government immediately condemned the attack as a deliberate act of violence.\n\nSurvivors report that despite the vessel signaling clearly as a relief ship, the KMT artillery crews continued firing. Several shells even landed near lifeboats as people tried to escape the sinking vessel, turning the scene into chaos. Although the Kuomintang claims the incident was an 'accidental misfire,' public opinion—especially in Sichuan—sees it as political retribution and intentional aggression.\n\nThe incident has amplified fears that radical KMT factions, enraged after their electoral defeat, may be shifting toward open armed resistance. Since the Yangtze transport route is the lifeline of Sichuan's recovery, the sinking of this relief vessel has sent shockwaves through the entire Republic."
 china_wr.44.a:0 "An attack on relief supplies is unforgivable."
 china_wr.45.t:0 "Dissolution Order for the Sichuan KMT Volunteer Forces"
 china_wr.45.d:0 "In recent months, Sichuan has been plunged into instability as famine, administrative paralysis, and tensions surrounding the presidential election collided at once. The region has long hosted Kuomintang-aligned volunteer forces who, though nominally organized for local defense, effectively functioned as an independent military apparatus separate from the provincial government troops.\n\nAs famine worsened, the central and provincial governments began sending relief shipments to Sichuan by river transport. But with political tensions rising during the election, clashes between the provincial government forces and the KMT volunteer units became increasingly frequent. Each side accused the other of interfering in the election, and sporadic skirmishes turned parts of the province into de facto conflict zones.\n\nThe situation escalated dramatically when a government relief boat entering Sichuan waters was shelled by the KMT volunteer forces. They claimed the vessel represented 'external manipulation of the election' and opened fire. The attack shocked the entire region; famine-stricken civilians who awaited the relief reacted with outrage and panic.\n\nFor the central government, this was the final breaking point. The attack on an official relief ship was viewed not merely as a localized clash, but as a direct defiance of state authority and a violent disruption of national humanitarian efforts. As a result, the central government has issued an immediate order mandating the dissolution of all KMT-aligned volunteer forces operating in Sichuan.\n\nThe provincial government troops appear ready to comply, but resistance is brewing among the volunteer commanders, many of whom denounce the order as political persecution. Civilians are deeply divided: some condemn the volunteer forces for attacking relief shipments, while others credit them for defending the region in difficult times. The dissolution order is now positioned to become a defining turning point in Sichuan's deepening crisis, with political repercussions likely to spread far beyond the province."
 china_wr.45.a:0 "Restoring order comes first."
 china_wr.46.t:0 "Fierce Opposition from the Kuomintang"
 china_wr.46.d:0 "The government's announcement ordering the dissolution of local militias immediately sparked a crisis within the Kuomintang. The central leadership convened an emergency meeting and issued a harsh statement condemning the directive, arguing that the militias are not merely regional armed groups but the long-standing military backbone of the party—and a crucial defense force against northern threats.\n\nIn its statement, the KMT declared that "disbanding the local militias is an act of dismantling the Republic's own security, a political maneuver by certain factions to weaken the Kuomintang's military foundation." Several hardliners have already organized protests outside the party headquarters, accusing the government of attempting to forcibly disarm the party.\n\nMilitia commanders across the provinces are also refusing to comply. Some units are openly discussing issuing formal declarations of defiance, raising fears that the Republic may be approaching yet another dangerous political rupture."
 china_wr.46.a:0 "The situation is growing more dangerous."
 china_wr.47.t:0 "Large Scale Fighting in Sichuan"
 china_wr.47.d:0 "Full scale military clashes have erupted across Sichuan between government forces and Kuomintang affiliated provincial militias. What began as small skirmishes near several bridges quickly escalated within a day, spreading to major roads, administrative centers, and river transport hubs. Sichuan has now descended into a state of de facto anarchy.\n\nThe Sichuan government forces deployed to maintain order in the aftermath of the famine recovery, while the KMT militias insist that the central government's dissolution order is illegitimate and that they are the rightful protectors of local citizens. Both sides are invoking competing justifications, and the fighting has intensified to the point where heavy weaponry is now being used, dramatically increasing casualties.\n\nReports indicate the destruction of government offices, supply depots, and key bridges. Civilians throughout Sichuan are fleeing their homes or watching the collapse of local society with growing fear. The central government now sees the situation as a direct threat to the stability of the entire Republic, requiring an urgent and decisive response."
 china_wr.47.a:0 "The situation is spiraling beyond control."
 china_wr.48.t:0 "Sichuan Civil War"
 china_wr.48.d:0 "The sporadic clashes in Sichuan Province have now escalated into a full-scale military conflict. Reports indicate that the Sichuan Provincial Government Forces and the KMT-aligned NRA Sichuan Corps are engaged in major battles across the region.\n\nBefore the wounds of the great Sichuan famine could heal, disputes over the election and the dissolution of local militias destabilized the province. When the central government ordered these militias disbanded and intervened in Sichuan, the KMT denounced it as an 'armed crackdown to hide electoral fraud' and launched a full-scale uprising in response."
 china_wr.48.a:0 "The world watches China's turmoil with concern."
 china_wr.49.t:0 "Bandit Activity in Sichuan"
 china_wr.49.d:0 "In the aftermath of the Sichuan Famine, bandit groups have resurfaced throughout the province. Along the Yangtze River routes and rural roads, armed bands are raiding villages and seizing food and supplies, and several districts report that even basic local security can no longer be maintained.\n\nThe Sichuan provincial authorities fear the rising instability, yet their administrative and policing capacity has been severely weakened by the famine. Local residents now barricade their homes for safety, and even county officials privately admit they cannot contain the disorder."
 china_wr.49.a:0 "Banditry is rising once more..."
 china_wr.50.t:0 "Collapse of Public Order in Sichuan"
 china_wr.50.d:0 "As the shock of the Sichuan Famine continues to accumulate, the public security apparatus across the province is breaking down. Police and gendarmerie forces are unable to contain the surge in looting, violence, and desertion, while reports from rural districts indicate that local administrations have effectively ceased functioning.\n\nIn many areas, residents have begun arming themselves, and early signs of revived private militias are appearing. Concerns are mounting that Sichuan is only one step away from falling into a state of anarchy."
 china_wr.50.a:0 "The situation is slipping out of control."
 china_wr.51.t:0 "The Kuomintang Proclaims the National Revolutionary Government"
 china_wr.51.d:0 "Approximately twenty hours after the National Revolutionary Army, having pledged loyalty to the central government, entered Nanjing without resistance under the pretext of maintaining public order, the National Revolutionary Army Headquarters in Nanjing withdrew its previously declared oath of loyalty to the existing government. At the same time, it issued a statement condemning the current government's electoral fraud and corruption, and proclaimed the establishment of a 'National Revolutionary Government'. While the citizens of Nanjing are displaying a variety of reactions, public sentiment appears overall to be inclined in favor of the National Government.\n\nMost other provincial governments in southern China, where disorder continues to persist, are showing reactions generally favorable to the 'National Government'. Among them, the city of Wuhan has already declared its accession to the 'National Revolutionary Government', and pro-Kuomintang militias occupying parts of Anqing have likewise announced their alignment with the National Government.\n\nHowever, the banks of the Yangtze River in Anqing remain under the control of government forces, meaning that the districts of Anqing held by the pro-Kuomintang militias are effectively completely encircled. Government troops are preparing an offensive to fully retake Anqing, and scattered clashes in other regions are steadily increasing in intensity. This development indicates that the armed conflicts continuing across China have, in effect, entered the stage of a full-scale civil war."
 china_wr.51.a:0 "Those traitorous bastards!"
 china_wr.51.b:0 "Long live Sun Yat-sen! Long live the National Revolution!"
 china_wr.52.t:0 "Outbreak of the Chinese Civil War"
 china_wr.52.d:0 "The armed conflict that began in Sichuan has finally spread nationwide, plunging China into another large-scale civil war. Following the Kuomintang hardliners' declaration of armed revolt, clashes have erupted across multiple provinces, and reports indicate that some regions have already lost administrative control and communication lines.\n\nThe central government has condemned the uprising as an outright rebellion and launched suppression operations, but Kuomintang forces are rapidly expanding and securing major cities and transportation corridors. The international community watches with growing concern as instability continues to spread throughout China."
 china_wr.52.a:0 "China's future is in turmoil."
 china_wr.53.t:0 "Joining of the Southwest National Protection Army"
 china_wr.53.d:0 "The Southwest National Protection Army has officially declared its intention to join the Constitutional Protection Government, citing the growing danger of the Kuomintang hardliners and their attempts to dominate the central government in the midst of the expanding Sichuan conflict. They emphasize that the Constitutional Protection Government is the only legitimate authority capable of restoring constitutional order.\n\nTheir decision is more than a mere reinforcement of manpower; it marks a major turning point that strengthens the government's legitimacy across the entire Southwest and may shift the balance of the conflict. Preparations for command integration and coordinated operations are already underway."
 china_wr.53.a:0 "Legitimacy gathers around us once more."
 china_wr.54.t:0 "Defection of the Southwest National Protection Army"
 china_wr.54.d:0 "The Southwest National Protection Army has formally announced its cooperation with the Constitutional Protection Government, triggering shock and outrage within the Kuomintang. Hardliners denounce this move as a betrayal, accusing the force of exploiting the Sichuan situation as an excuse to abandon neutrality and sabotage the authority of the central leadership.\n\nSome generals demand an immediate military response, but the party leadership remains cautious to avoid further fragmentation of the front. Nevertheless, the loss of influence in the Southwest appears inevitable, and the Kuomintang will be forced to revise its broader strategic plans."
 china_wr.54.a:0 "Another betrayal..."
 china_wr.55.t:0 "Tibetan Declaration of Independence"
 china_wr.55.d:0 "As the Sichuan Civil War has rapidly eroded the central government's authority, the Tibetan administration has concluded that its long-standing nominal subordination to the Republic has effectively collapsed. Officials and religious leaders in Lhasa argue that the ongoing chaos and warfare threaten Tibet's stability and that the region can no longer be entangled in the political upheavals of the Chinese heartland.\n\nToday, the Tibetan authorities have formally proclaimed full independence, announcing the establishment of their own government and the strengthening of border defenses. With Sichuan and Qinghai weakened by internal conflict, Tibet appears to be seizing a rare moment of military and political vacuum. Warlords and foreign powers surrounding the plateau are watching the development with growing interest.\n\nThe central government has denounced the declaration as an illegal act of secession, but its current state of disarray leaves it with little capacity to respond. Tibet's declaration adds yet another fracture to a nation already shaken by civil war."
 china_wr.55.a:0 "China's turmoil spreads without end."
 china_wr.56.t:0 "Power Reorganization in Xinjiang"
 china_wr.56.d:0 "Reports indicate that Sheng Shicai is effectively directing both the military and administrative apparatus of Xinjiang. He has reshuffled major provincial posts and installed loyal subordinates in key institutions.\n\nAlthough Sheng continues to express nominal loyalty to the National Protection Government, he now exercises practical control over Xinjiang's administration, security, and military affairs. His independent measures have either co-opted or sidelined local warlords and minority leaders, gradually distancing the province from direct central oversight.\n\nThe National Protection Government remains concerned about this rapid shift in regional authority, but at present its ability to restrain Sheng appears limited."
 china_wr.56.a:0 "Xinjiang is beginning to move on its own."
 china_wr.57.t:0 "Formation of the Northwestern Allied Army"
 china_wr.57.d:0 "Reports indicate that the Ma family, long influential through key military posts across the northwest, has effectively established a unified military structure known as the 'Northwestern Allied Army.' Under the pretext of regional defense and public order, they have secured extensive military autonomy.\n\nAlthough the Ma warlords still profess formal loyalty to the National Protection Government, they now exercise independent command and administrative authority throughout the region. Orders issued by the central government are increasingly treated as little more than procedural formalities, while the Ma faction's military foundation continues to solidify day by day.\n\nSome observers warn that the Northwestern Allied Army may eventually crystallize into a de facto autonomous power, prompting the National Protection Government to monitor developments in the northwest with growing concern."
 china_wr.57.a:0 "The northwest is drifting away from the center."
 china_wr.58.t:0 "Shanxi's Separate Course"
 china_wr.58.d:0 "Reports from the province of Shanxi indicate that Yan Xishan, who has long ruled the region, is establishing an increasingly autonomous administrative and military structure amid the chaos of the Sichuan conflict and the growing instability across the country. Although he publicly maintains loyalty to the National Protection Government, his true priority appears to be the stability of Shanxi itself, leading him to adopt policies independent of central authority.\n\nThe Shanxi administration has recently begun restricting the movement of central government forces, while major matters such as taxation, troop deployment, and provincial administration are now handled internally without consultation. Additional reports suggest that Yan Xishan has reorganized the Shanxi Army to prevent outside interference, leaving the province nominally part of the Republic but effectively operating as a semi-independent entity.\n\nSome within the political sphere warn that Yan's path may ultimately lead Shanxi toward full separation. The central government now watches the situation with growing concern."
 china_wr.58.a:0 "Shanxi is drifting away from the center."
 china_wr.59.t:0 "Establishment of the Northwestern Special Defense Command"
 china_wr.59.d:0 "Reports from Shaanxi and its surrounding regions indicate that Feng Yuxiang has formally established an autonomous military-administrative structure under his own leadership. Amid the turmoil of the national crisis, Feng declared that he would not place unconditional trust in either the National Protection Government or the Kuomintang, proclaiming the creation of the so-called 'Northwestern Special Defense Command.'\n\nUnder the banner of regional defense and stability, Feng has consolidated control over security, taxation, troop organization, and administrative affairs across the area. While the Northwestern Special Defense Command claims nominal affiliation with the National Protection Government, in practice Feng responds independently to orders from both the central authorities and the Kuomintang, rapidly emerging as a de facto separate power bloc.\n\nSome observers argue that Feng is using the current unrest to expand his autonomy further, potentially reshaping the balance of power in the northwest. The National Protection Government watches his movements with increasing concern, aware that this new force could complicate the already fragile political landscape."
 china_wr.59.a:0 "Yet another faction rises."
 china_wr.60.t:0 "Xinjiang Incident"
 china_wr.60.d:0 "As the nationwide civil conflict deepens, shocking news has emerged from Xinjiang. The provincial governor, Yang Zengxin, has been assassinated by an unidentified armed group, and in the aftermath, Jin Shuren has risen to become the new de facto ruler of Xinjiang.\n\nImmediately after the killing, Jin Shuren moved swiftly to seize control of key military positions, securing the loyalty of the provincial army and taking command of major cities and garrisons. While he claims that his actions were necessary to 'restore order,' the speed and precision of the takeover have led most observers to conclude that this was a calculated seizure of power.\n\nMilitary districts across Xinjiang are now pledging allegiance to Jin Shuren one after another, while both the Central Government and the National Protection Government remain uncertain about how to respond. In the chaos of the wider Chinese Civil War, Xinjiang appears to be birthing yet another autonomous power."
 china_wr.60.a:0 "Xinjiang sinks deeper into turmoil."
 china_wr.61.t:0 "The New Tyranny in Sinkiang"
 china_wr.61.d:0 "Yang Zengxin's administration may have belonged to an earlier era, yet it maintained a degree of stability. However, after his death, Jin Shuren has driven Sinkiang into rapid turmoil from the very beginning of his rule. He has dismantled long-standing fiscal discipline, inflating the money supply to 145 million taels in a short span of time while introducing numerous new taxes, including a slaughter tax, which are placing severe burdens on the population.\n\nJin Shuren has monopolized key industries—gold, jade, and sheepskin—for personal enrichment, transferring the accumulated wealth to Peking. The British traveler Peter Fleming described him as "an official whose greed far exceeds his administrative ability." As a result, dissatisfaction with his economic tyranny is spreading swiftly across the province."
 china_wr.61.a:0 "The shadow of tyranny grows ever deeper."
 china_wr.62.t:0 "Minor Ethnic Repression"
 china_wr.62.d:0 "Jin Shuren's misrule is now undermining the multiethnic balance of Sinkiang in addition to its economy. The delicate equilibrium maintained for decades under Yang Zengxin is collapsing under his administration. Jin has prohibited Muslim pilgrimage to Mecca, purged non-Han elites, and replaced them with Han officials. Furthermore, he has forced Mongol and Kirghiz pastoral communities under the control of Han administrators and curtailed the authority of traditional religious leaders, intensifying regional tensions.\n\nHe has also abolished the small khanates long tolerated under Yang. After the death of Maqsud Shah, Jin dissolved the Hami Khanate and introduced new administrative divisions. Although many Uyghurs initially welcomed this change, conditions rapidly worsened as Jin doubled agricultural taxes, confiscated fallow Uyghur farmland, and redistributed it to Han settlers, who received tools, seeds, and tax exemptions. As Han migration increases, Uyghurs are being driven into ever more barren lands."
 china_wr.62.a:0 "Sinkiang is descending into deepening fracture."
 china_wr.63.t:0 "Widespread Chaos in Sinkiang"
 china_wr.63.d:0 "Jin Shuren's tyranny and administrative failures have finally pushed Sinkiang into severe disorder. The economy is on the verge of collapse, and the population is suffering under excessive taxation and monopolistic policies. His Han-centric bureaucratic rule has ignited widespread anger among Uyghurs, Kazakhs, Kirghiz, and other local peoples, leading to continual protests and clashes.\n\nMeanwhile, the breakdown of proper governance and Jin's isolation from the central authorities have weakened all security structures, allowing bandits and armed groups to expand their activities unchecked. Several regions are effectively outside governmental control, and Sinkiang is descending into the same large-scale anarchy that engulfed Sichuan.\n\nThe central government views the situation with deep concern, but with civil conflict spreading across China, it currently has little capacity to intervene promptly in Sinkiang."
 china_wr.63.a:0 "Sinkiang is collapsing as well."
 china_wr.64.t:0 "Occupation of Dunganistan"
 china_wr.64.d:0 "As chaos spreads throughout Sinkiang, Ma Zhongying has moved swiftly to occupy the Dungan-majority region known as Dunganistan, declaring that he is acting 'to restore order'. He denounces Jin Shuren's rule as incompetent and tyrannical and insists that only his forces are capable of stabilizing the province.\n\nMa's troops have seized major towns and transport hubs with little resistance from local commanders, and some Dungan leaders express cautious hope that he might restore order—while simultaneously fearing the scope of his ambition. With Sinkiang's administrative structure collapsing, his declaration of 'restoration' effectively marks the beginning of a new form of military rule.\n\nThe central government worries that his intervention will not resolve the unrest but instead ignite yet another source of conflict within the province."
 china_wr.64.a:0 "He's no different from the rest."
 china_wr.66.t:0 "Shanxi Cooperation Request"
 china_wr.66.d:0 "As the Sichuan civil conflict spirals further out of control, Yan Xishan of Shanxi has made an unofficial approach to the Kuomintang in hopes of securing his position before the situation worsens. Believing that Shanxi cannot stand alone indefinitely while the KMT gains nationwide momentum, he appears ready to seek an understanding.\n\nThrough his envoys, Yan Xishan conveyed that "the stability and order of Shanxi have been maintained under my administration, and I am willing to cooperate to ensure the province does not fall into chaos." In return for this cooperation, however, he requests that the KMT formally guarantee his established authority and position within Shanxi.\n\nThe Kuomintang leadership is now evaluating the political advantages and risks of accepting his offer, considering how Yan Xishan's cooperation might influence the national landscape in the aftermath of the Sichuan crisis."
 china_wr.66.a:0 "We will consider Yan Xishan's proposal."
 china_wr.67.t:0 "Approval from the Kuomintang"
 china_wr.67.d:0 "The Kuomintang leadership has sent an official reply approving Yan Xishan's offer of cooperation. They acknowledge Shanxi's efforts in maintaining stability and express their belief that Shanxi's assistance will play a constructive role in the nationwide struggle.\n\nHowever, the KMT avoids guaranteeing Yan Xishan's personal authority. Instead, they outline a plan to gradually integrate Shanxi's military and administrative structures under KMT command. Their message is clear: cooperation is accepted, but the future scope of Shanxi's autonomy will be decided solely by the KMT.\n\nWith this notice, Yan Xishan has secured immediate survival and stability, yet the future of Shanxi's autonomy — and his own position — remains uncertain."
 china_wr.67.a:0 "Perhaps this is the best possible outcome."
 china_wr.68.t:0 "Rejection from the Kuomintang"
 china_wr.68.d:0 "The Kuomintang leadership has sent an official statement rejecting Yan Xishan's offer of cooperation. Judging from their tone, the KMT seems confident that the national situation is turning decisively in their favor and that they need no assistance from Shanxi to secure dominance.\n\nThe KMT labels Shanxi's autonomous structure as an 'obstacle to restoring central order' and demands that Shanxi dismantle its existing power base and submit unconditionally if it wishes to join them. In effect, the KMT has issued terms of surrender rather than negotiation.\n\nThe reply has shocked Yan Xishan and his senior officials, and Shanxi now stands at a crossroads — whether to strengthen its independent defenses or seek alliances elsewhere."
 china_wr.68.a:0 "Shanxi must defend itself."
 china_wr.69.t:0 "Succession of Ma Bufang"
 china_wr.69.d:0 "The assassination of Ma Lin, the commander of the Northwestern Army, by unidentified armed assailants has plunged the entire region into immediate turmoil. In the aftermath of the incident, command structures within government offices and military camps began to collapse, and several reports indicate that clashes and looting between armed groups have already erupted in multiple districts.\n\nHowever, this chaos did not last long. Upon hearing of the assassination, Ma Bufang swiftly rallied his closest confidants and loyal officers, seizing control of the Northwestern region's key strategic points and the provincial administration. As local notables and religious leaders declared their allegiance to him one after another, real power in the Northwest transferred into his hands with virtually no resistance.\n\nMa Bufang's succession marks the end of a long-standing internal struggle within the Ma family, while also signaling yet another dramatic shift in the political landscape of the Northwest. Whether his rule will bring stability or herald a new era of hardline domination remains uncertain."
 china_wr.69.a:0 "The Northwest now stands under Ma Bufang."
 china_wr.70.t:0 "Ma Zhongying's Coup"
 china_wr.70.d:0 "After seizing Dunganistan and rapidly expanding his influence, Ma Zhongying has rejected Ma Bufang's authority and launched an armed bid to reshape power across the Northwest. Claiming to be the 'true guardian of the region,' he denounces Ma Bufang's succession as lacking any legitimate foundation.\n\nCoup forces, supported by troops brought from Dunganistan, are attacking key positions in Qinghai, and some districts reportedly have already fallen under Ma Zhongying's administrative control. Yet Ma Bufang, backed by his longstanding regional networks and a loyal officer corps, is fiercely resisting, pushing the Northwest ever closer to an all-out internal conflict.\n\nThe future of the Northwest will now depend on which faction ultimately gains the upper hand."
 china_wr.70.a:0 "Ma Zhongying has failed and been killed."
 china_wr.70.b:0 "Ma Zhongying will rule the Northwest."
 china_wr.71.t:0 "Collapse of the Northwestern Union Army"
 china_wr.71.d:0 "After Ma Zhongying seized power through his coup and forcibly claimed the post of Governor of Qinghai, he attempted to solidify his rule by harshly suppressing all opposition. Officers who opposed him were executed or expelled, and he dispatched troops to minority regions he had long resented, carrying out brutal reprisals that plunged the entire northwest into an atmosphere of fear.\n\nSuch tyranny could not last. Excessive repression, heavy taxation, and constant military mobilization sparked uprisings and mass desertions across the region. Even Ma Zhongying's closest allies began to abandon him, while the officer corps fractured and skirmishes broke out within the Northwestern Union Army itself.\n\nIn the end, the Northwestern Union Army has lost all cohesion and is rapidly collapsing, with Qinghai and the surrounding regions falling into chaos as armed groups rise in its place. Ma Zhongying's tyranny has achieved nothing but the destruction of his own power base."
 china_wr.71.a:0 "The northwest is plunging back into turmoil."
 china_wr.72.t:0 "KMT Fragmentation"
 china_wr.72.d:0 "The cooperation between Chiang Kai-shek and Wang Jingwei remains stable at the level of the central leadership, with both factions working closely to keep the party from collapsing amid China's political turmoil. However, despite this stability at the top, other factions within the Kuomintang are becoming increasingly radical. In particular, the far-right elements strongly reject the leadership's decisions and openly refuse to acknowledge their authority.\n\nThese hardliners accuse the Chiang–Wang bloc of monopolizing every major policy choice, while several provincial branches are beginning to show signs of resisting central control altogether. Meetings frequently descend into shouting and accusations, and some legislators have even received threats, further worsening the atmosphere inside the party.\n\nFor now, the Chiang–Wang alliance remains intact, but the accumulated resentment from other factions has placed the Kuomintang as a whole in a state of deep and growing fracture."
 china_wr.72.a:0 "Who can still control this party?"
 china_wr.73.t:0 "Discontent over the Presidential Nominee"
 china_wr.73.d:0 "As the presidential election approaches, Chiang Kai-shek and Wang Jingwei cooperate relatively smoothly in discussing candidate selection. However, competing factions accuse the alliance of dominating the decision-making process and increasingly disrupt party meetings. Some radicals fiercely oppose Wang Jingwei's potential candidacy, labeling his supporters as traitors.\n\nModerates worry that the escalating disputes will severely weaken the party's electoral prospects, urging urgent mediation to restore order. Despite the stability of the Chiang–Wang cooperation, the Kuomintang as a whole is consumed by growing unrest over the nomination issue."
 china_wr.73.a:0 "The closer the election comes, the deeper the fractures grow."
 china_wr.74.t:0 "Another Internal Clash"
 china_wr.74.d:0 "While the Chiang–Wang alliance functions without significant conflict at the central level, reports from the provinces reveal frequent clashes among KMT-affiliated armed groups. Radical officers condemn the alliance as a dangerous compromise and openly challenge pro-alliance commanders.\n\nRecent incidents include armed standoffs between rival groups, with local police being deployed to suppress escalating violence. Although the leadership attempts to downplay these events as misunderstandings, field reports indicate that internal distrust has reached a critical point.\n\nThe alliance stands firm, yet the Kuomintang as an organization continues to suffer from deepening internal strife."
 china_wr.74.a:0 "These fractures foretell an even greater crisis ahead."
 china_wr.73.t:0 "Discontent Within the KMT Over the Presidential Candidate"
 china_wr.73.d:0 "When Wang Jingwei was officially confirmed as the Kuomintang's presidential candidate, the party leadership expected the decision to help stabilize internal disorder. Instead, the result has been the opposite. Complaints that the nomination process was dominated by a single faction have erupted throughout the party, and radical groups are refusing to accept Wang Jingwei, disrupting meetings with aggressive protests.\n\nFar-right members denounce Wang Jingwei as a 'corrupt liability' or even a 'red sympathizer,' demanding that the candidate be replaced. Some provincial branches have declared they will not follow the central leadership's decision at all. Meetings frequently descend into shouting matches, with documents thrown and members openly clashing.\n\nRather than fostering unity, Wang Jingwei's nomination has intensified existing power struggles and discontent within the Kuomintang, pushing the entire party into deeper turmoil."
 china_wr.73.a:0 "As the election draws near, the rifts only deepen."
 china_wr.74.t:0 "Another Clash Within the KMT"
 china_wr.74.d:0 "The Kuomintang's internal conflicts have expanded beyond political disputes between factions and have now escalated into direct armed clashes among its own organizations. Some radical officers have begun treating commanders with differing views as outright enemies, deepening hostility within the ranks.\n\nRecent reports indicate that armed units aligned with competing internal factions have exchanged gunfire in several regions, prompting local police and administrative forces to intervene. Provincial party branches, believing the central leadership is losing control, increasingly follow their own independent policies. As this continues, factional disputes are becoming more violent and more difficult to contain.\n\nAlthough the party leadership attempts to downplay these incidents as 'isolated flare-ups,' internal documents warn that the Kuomintang is now facing severe fragmentation, and that further escalation could threaten the party's very existence."
 china_wr.74.a:0 "The fractures within the KMT point toward an even greater crisis."
 china_wr.75.t:0 "Declaration of Loyalty from the Northwest"
 china_wr.75.d:0 "As the Constitutional Protection Government collapsed rapidly amid the civil war, the various forces of the northwestern regions—long affiliated with it only in name—began seeking a new center of authority. Despite the complex mix of competing power blocs, the northwest moved quickly out of concern that the vacuum at the center would bring greater chaos.\n\nToday, a delegation representing the commanders of the northwest formally approached the Kuomintang government, declaring that they would 'stand with the KMT for the sake of China's stability.' They emphasized that, with the fall of the Constitutional Protection Government, the northwest can no longer remain an isolated warlord domain, and that only the KMT can restore order to a China in turmoil.\n\nHowever, it remains unclear whether this declaration signifies genuine submission. The regional commanders still possess strong local power bases, and the depth and sincerity of their loyalty will depend heavily on how their relationship with the central government develops. Even so, the KMT views this public pledge as a significant political and military achievement, strengthening its position across the country."
 china_wr.75.a:0 "The northwest has chosen the Kuomintang."
 china_wr.76.t:0 "Partial Martial Law in Jiangnan"
 china_wr.76.d:0 "As the repercussions of the Sichuan Civil War spread into the lower Yangtze and the wider Jiangnan region, the Constitutional Protection Government has declared partial martial law across Jiangnan.\n\nThe government states that the measure is unavoidable to prevent further deterioration of public order and the expansion of agitators, deploying army and gendarmerie units to major ports, rail hubs, and industrial centers.\n\nWith curfews enforced, large gatherings restricted, and tighter censorship imposed on inflammatory publications, merchants, workers, and students are expressing growing dissatisfaction. Nevertheless, the central authorities insist that \"if Jiangnan falters, the entire Republic may collapse,\" reaffirming their intent to maintain martial law until stability is restored."
 china_wr.76.a:0 "A prudent measure."
 china_wr.76.b:0 "Has [CHI.GetLeader] lost their mind?"
 china_wr.77.t:0 "The Kuomintang Claims Election Fraud"
 china_wr.77.d:0 "The recent presidential election was conducted amid the Sichuan famine and widespread administrative disorder, and the Election Commission exposed an unprecedented level of mismanagement—ranging from polling-station failures and severe counting delays to extreme discrepancies in oversight between regions. In many areas, supervisors were not properly deployed, and several polling stations failed to report results for days, sparking nationwide ridicule and suspicion. From the moment the polls closed, the Commission's incompetence became a national controversy, to the point that the government began discussing reforms in haste.\n\nBut the issue did not end with incompetence alone. Among Kuomintang supporters, the belief quickly spread that the Commission's errors were not mere mistakes but deliberate manipulation. When counting delays grew worse in Sichuan and the Jiangnan region, KMT supporters began openly claiming that the election had been rigged in favor of the ruling party. What began as fringe accusations soon became the dominant view among the party's base as the controversy escalated.\n\nSensing this shift, not only hardliners but even moderates within the Kuomintang leadership began to argue that the Commission's comprehensive failures had severely undermined the credibility of the election. Today, the Central Committee issued an official statement declaring that the presidential election had "lost its fairness due to severe procedural defects and the structural incompetence of the Election Commission." The statement further suggested that intentional interference could not be ruled out, effectively announcing the party's refusal to accept the results.\n\nThe declaration has shaken the political landscape. KMT supporters celebrated the announcement and began preparing large-scale rallies, while the government denounced it as "political agitation," responding with visible irritation. Several provincial governments are monitoring the situation closely and considering security measures, and signs of political maneuvering are emerging within certain parts of the military.\n\nThe Kuomintang's decision is not a simple expression of dissatisfaction. Public anger pushed the leadership into adopting fraud allegations as official party policy, and the controversy surrounding the Election Commission has spiraled far beyond what the government can contain. The crisis has now entered a new and volatile phase, one that cannot be resolved with mere calls for unity."
 china_wr.77.a:0 "This feels ominous..."
 china_wr.78.t:0 "Reintroduction of the Conscription Reform Bill"
 china_wr.78.d:0 "The conscription reform bill, once halted due to the massive famine in Sichuan, has finally re-entered the political stage. Relief operations and the urgent humanitarian crisis consumed all available political focus, forcing the reform to be shelved. Yet the warlord problem remains the fundamental source of instability within the Republic, and without reorganizing the national military structure, no long-term plan can be pursued.\n\nThe reintroduced bill aims to strengthen nationwide conscription and, more critically, to abolish the private armies maintained by the provincial warlords. It is not merely a military reform—it is a central pillar of resolving China's political turmoil. If successful, the central government will finally regain direct control over the military, undermining the warlords' autonomous power.\n\nBut the warlords stand in the way. Pushing the reform aggressively will almost certainly provoke resistance, and several warlords already perceive the bill as a direct threat to their survival. On the other hand, attempting compromise may secure temporary cooperation but risks watering down key measures such as the banning of private armies.\n\nThe government must now decide: accept the risks of confrontation and push the reform with full force, or seek a negotiated approach that preserves stability at the cost of concessions. The direction of the political crisis will hinge on this choice."
 china_wr.78.a:0 "Compromise with the warlords."
 china_wr.78.b:0 "Push the reform through."
 china_wr.79.t:0 "Summary Execution by the Loyalty Forces"
 china_wr.79.d:0 "A grave incident occurred today when the Loyalty Forces apprehended a pro-Kuomintang journalist near the headquarters of a local newspaper and summarily executed him without any form of legal process. The journalist had long been known for publishing anti-government articles and for allegedly encouraging demonstrations organized by remaining Kuomintang sympathizers. He had been monitored closely by the hardline elements of the government.\n\nAccording to the official statement, the Loyalty Forces attempted to arrest him on charges of 'inciting anti-government agitation,' and when he allegedly resisted, an immediate 'on-the-spot judgement' was enforced. However, eyewitnesses present at the scene claim that the journalist was unarmed and offered no meaningful resistance, and that the Loyalty Forces did not follow proper arrest procedures.\n\nThe execution shocked nearby residents, who fled the scene as gunshots rang out. While the government maintains that the action was necessary to preserve public order and prevent a resurgence of civil conflict, the killing of a journalist without trial has already sparked controversy both domestically and abroad.\n\nAt its core, the incident highlights the increasingly aggressive posture of the Loyalty Forces as fear of Kuomintang resurgence continues to shape government policy. Many worry that if the pattern of excessive force remains unchecked, similar tragedies will become more frequent. This is no longer just a matter of security—it raises fundamental questions about state authority and legitimacy."
 china_wr.79.a:0 "It was a lapse in control, nothing more."
 china_wr.80.t:0 "Live Fire on Demonstrators in Xuzhou"
 china_wr.80.d:0 "A major tragedy unfolded today in Xuzhou, where a large Kuomintang-supporting demonstration escalated into violence after the Loyalty Forces opened fire on the crowd. The demonstrators had gathered in front of the local administrative office, demanding the release of Kuomintang prisoners and an end to the government's hardline measures. As the crowd grew, some participants marched toward the city center, chanting slogans and waving banners.\n\nLocal police, fearing that the demonstrators might attempt to occupy government buildings, requested immediate reinforcement from the Loyalty Forces. Once deployed, the forces were instructed to 'secure order.' However, when several protesters threw stones and shook the barricades, the commanding officer ordered the use of live ammunition without issuing proper warnings.\n\nThe troops fired directly into the crowd, resulting in over a hundred casualties—both dead and severely injured. The sudden eruption of gunfire triggered widespread panic, with civilians fleeing in terror through the streets. In the aftermath, the square was left scattered with bloodstained pavement, abandoned shoes, and shattered banners.\n\nThe central government has claimed that the casualties were 'an unavoidable consequence of suppressing violent unrest,' but citizens of Xuzhou, along with several regional officials, have expressed outrage over the extreme use of force. The incident stands as a stark symbol of how far the government's anti-Kuomintang campaign has escalated, and it may significantly reshape the nation's political climate."
 china_wr.80.a:0 "What is happening?"
 china_wr.81.t:0 "Gunfire on Refugee Columns in Wuhan"
 china_wr.81.d:0 "Following the declaration of partial martial law in Wuhan, administrative collapse and widespread confusion have gripped the city. Streams of displaced persons—war refugees, remnants fleeing former conflict zones, and citizens escaping famine—have crowded the major roads daily. While movement is strictly restricted under martial law, many civilians no longer have intact homes to return to, making compliance nearly impossible.\n\nToday, a horrific incident occurred on a northern Wuhan roadway when government security forces opened live fire on a large refugee column. The guards had ordered the refugees to disperse, claiming they were violating movement restrictions. When some refugees, burdened with the bodies of deceased family members or the bare necessities they refused to abandon, were unable to comply immediately, the commander interpreted it as 'collective defiance and subversive behavior.'\n\nAccording to eyewitnesses, the guards fired without issuing a final warning. Gunfire echoed across the highway as refugees panicked and scattered in all directions. Multiple accounts describe children trampled in the chaos, elderly civilians collapsing under gunfire while clutching their belongings, and families torn apart in the stampede. Scores of casualties were recorded within minutes.\n\nThe government released an official statement asserting that elements within the column attempted to breach martial law control lines, and that decisive action was necessary to prevent unrest. However, Wuhan residents and local officials have criticized the justification as a thin excuse for state violence born of fear and incompetence. Analysts warn that the growing tension within the Loyalty Forces and security units—combined with the government's fear of Kuomintang remnants—has created a climate where indiscriminate force is becoming normalized.\n\nMany believe the tragedy was not a mere mistake but the natural result of an escalating security doctrine that prioritizes coercion over governance. The Wuhan refugee shooting is expected to send shockwaves through the political landscape, raising deeper questions about the government's legitimacy and its capacity to rule."
 china_wr.81.a:0 "Order comes first."
 china_wr.82.t:0 "KMT Hardliners Declare Armed Uprising"
 china_wr.82.d:0 "As allegations of electoral fraud in the presidential election spread explosively, the atmosphere within the Kuomintang shifted at an uncontrollable pace. With the Election Commission's mismanagement, regional counting delays, and inadequate oversight repeatedly exposed, KMT supporters quickly embraced the belief that the election had been "rigged from the very beginning" and that the government had stolen their victory.\n\nThe party's hardliners seized on this sentiment, declaring that the government had manipulated the election to seize power and calling not merely for political protest but for open armed resistance. The Central Committee initially rejected these claims, but the situation flipped entirely once the party's supporters issued a massive public statement proclaiming that "electoral fraud is equivalent to a declaration of war."\n\nAt dawn today, hardline KMT officers and several senior leaders unilaterally mobilized military units and launched armed action against the government. Declaring a "national revolution against the theft of power," they called for the support of local forces and militia organizations. Alarmingly, this decision was made without the clear approval of the party's moderates and centrists.\n\nThe situation continues to deteriorate. With firefights already erupting and civil war effectively underway, moderates and centrists within the Kuomintang find that they have few choices left. Hardliners are pressuring them openly, while the party's supporters claim that "anyone who hesitates is a traitor." As a result, many moderates and centrists are being forced—willingly or not—into joining the conflict.\n\nThe government has denounced the uprising as an "outright military rebellion" and moved immediately into suppression mode. Yet what began as a dispute over election legitimacy has, in a single night, escalated into military clashes and political collapse, pushing the nation beyond the point where peaceful resolution seems possible.\n\nThe Kuomintang's entry into civil war is no longer a mere political protest—it is a full-scale challenge to the system, justified under the banner of electoral fraud. China now stands on the brink of unprecedented turmoil."
 china_wr.82.a:0 "The worst has begun..."
 china_wr.83.t:0 "Formation of the National Unity Government"
 china_wr.83.d:0 "After the Kuomintang hardliners launched an armed uprising over the disputed presidential election, the country plunged into a state of open civil war. Administrative structures in major cities faltered, local warlords and militias expanded their own authority, and the existing government was no longer able to exert effective control.\n\nIn the midst of this collapse, the Progressive Party and the Young China Party concluded that the state would not survive unless a new authority was formed immediately. They convened representatives from the regions, social sectors, and various political groups for an emergency council, which ultimately agreed to establish an extraordinary cross-faction cabinet: the National Unity Government.\n\nThis new government has begun taking over the essential functions of the state—public security, administrative restoration, food distribution, transport networks, and the coordination of local forces—gradually replacing the paralyzed ministries of the old administration. Many civil servants and local authorities, fearing further disorder, have pledged cooperation, leading observers to note that political authority is steadily shifting toward the Unity Government.\n\nMeanwhile, Kuomintang hardliners denounce the move as an illegitimate seizure of power, and parts of the military remain hesitant, uncertain of which side will prevail. Yet for many citizens, the emergence of a functioning authority—however fragile—is the first sign of stability in weeks of chaos.\n\nWith the old regime and the new emergency cabinet now coexisting in an unprecedented dual structure, China's future hinges on whether the National Unity Government can contain the spreading conflict and restore order."
 china_wr.83.a:0 "A new beginning for the nation."
 china_wr.84.t:0 "Disappearance of Anti-KMT Figures"
 china_wr.84.d:0 "Amid the unstable political climate following the presidential election, a series of alarming incidents has begun to surface. Groups of individuals linked to the Hongmen and Qingbang have reportedly assaulted crowds supporting certain political factions, and multiple journalists known for their anti-Kuomintang reporting have been abducted or have gone missing.\n\nAccording to investigative authorities, these incidents appear to be orchestrated primarily by members of the Hongmen and Qingbang. Both organizations are widely known to have close, though unofficial, ties to the Kuomintang, and the Qingbang in particular had previously threatened and assaulted rival campaign crowds during the election period. The Kuomintang has made no official statement regarding these events, but the connection is difficult to dismiss."
 china_wr.84.a:0 "Well? We have no idea about any of this."
 china_wr.85.t:0 "Mass Arrests in Peking"
 china_wr.85.d:0 "Although the Kuomintang leadership had considered relocating to Nanjing due to Peking's increasingly unstable political climate, the move was never executed in time. As a result, key party figures who remained in the capital have now found themselves in a dire situation.\n\nAs public order deteriorated and the government intensified emergency security measures, numerous KMT legislators and officials were suddenly detained—some under the pretext of 'preventive investigation', others simply taken from their homes or offices without warning. A few managed to flee beforehand, but many had no chance to react.\n\nThe government claims these detentions are precautionary steps to prevent potential violent unrest, but within the Kuomintang, the situation is widely seen as a deliberate political crackdown. Peking has grown increasingly tense, and with so many major figures detained and unreachable, the party's internal command structure has fallen into disarray.\n\nFailing to relocate to Nanjing in time has come at a harsh price. Some leaders have already escaped south, but the fate of those still held in Peking remains uncertain."
 china_wr.85.a:0 "We were far too late..."
 china_wr.86.t:0 "Reinterpreting the Three Principles of the Agape"
 china_wr.86.d:0 "A senior member of the Youth China Party arrived at a cabinet meeting carrying a thick proposal based on the party's long-standing doctrine of the Three Principles of the Agape—Love the People, Love All Things, and Love the World. He presented an extensive roadmap covering political reform, economic restructuring, diplomacy, and social policy, insisting that this framework should serve as the new ideological foundation of the government.\n\nAs the presentation ended, however, the atmosphere in the room grew visibly heavy. Hu Si quietly reviewed the document, then pointed out that the existing doctrine resembled the Kuomintang's ideology far too closely. Concepts such as "loving all things" or "loving the world" were, he argued, far too abstract for a country engulfed in civil war and desperate reconstruction.\n\n"What we need now is not a universal lecture on morality," Hu Si said, "but principles that can actually protect our citizens and keep the country alive."\n\nHe then took a blank sheet of paper and wrote three new phrases:\n\n"Love the People, Love Freedom, Love Our Land."\n\nPlacing the sheet on the table, he continued, "To love the people, to defend freedom, and to care for the land on which we stand—these three are enough. Anything beyond that is useless decoration. If even this cannot be settled, then I will take full charge myself."\n\nThe room fell into silence. The Youth China Party elder quietly folded his original proposal, unable to respond. What began as a session to reaffirm their doctrine instead became the moment Hu Si personally redefined the ideological direction of the new government."
 china_wr.86.a:0 "A new standard has been set."
 china_wr.87.t:0 "Jiangnan By-Elections"
 china_wr.87.d:0 "Although the government emerged victorious from the civil war and national unity was restored, the Jiangnan region remained riddled with vacant parliamentary seats. Many legislators had fled during the fighting, some disappeared entirely, and others were deemed unable to resume their duties after the collapse of local administration. Even after the conflict ended, Jiangnan's parliamentary representation remained largely nonfunctional, and the government concluded that immediate by-elections were necessary to restore political order in the region. The elections were organized quickly despite the still-uneven security situation, and several districts reported difficulties in operating polling stations or completing the vote count. Nevertheless, the government deployed administrative staff and security forces to stabilize the process and pushed the elections forward. In the end, most vacant seats were successfully filled, allowing Jiangnan to re-enter the national legislative structure. While reconstruction continues and instability lingers in some areas, the by-elections marked a critical step toward closing Jiangnan's political vacuum and consolidating national stability."
 china_wr.87.a:0 "At last, Jiangnan's seats are filled again."
 china_wr.88.t:0 "Return to the Constitutional Protection Government"
 china_wr.88.d:0 "With the civil war concluded and the Constitutional Protection Government emerging as the clear victor, the regional administrations that had supported it throughout the conflict are now returning fully to its authority. During the war, these local governments operated with considerable autonomy, maintaining their own administrative and defensive structures while aligning politically with the Constitutional Protection movement. Now that the national situation has stabilized, there is no longer any need for them to retain their temporary, semi-independent powers. \n\nAdministrators from Jiangnan, Hubei, Shanxi, and other regions have formally notified the central government of their intent to reintegrate, and the Constitutional Protection leadership is moving quickly to incorporate them back into the official administrative framework. For many local officials and civilians, the victory of the government they supported brings a sense of relief and renewed stability. \n\nThis reintegration is more than a bureaucratic adjustment—it symbolizes nationwide recognition of the Constitutional Protection Government's legitimacy. Although pockets of instability remain across the country, the return of these regional governments provides a crucial foundation for national reconstruction."
 china_wr.88.a:0 "Everything has returned to its place."
 china_wr.89.t:0 "Inflation Erupts"
 china_wr.89.d:0 "When the wartime boom following the Great War finally came to an end, the state could no longer ignore the rapidly contracting economy. The government attempted to revive growth through large-scale industrial stimulus programs centered on shipbuilding. However, these efforts failed to produce the expected results. Before the industrial base could recover, vast amounts of newly issued money had already entered circulation.\n\nAs a consequence, inflation had begun even before the civil war. At the time, it was considered manageable, and some believed it could be stabilized through liquidity withdrawal and fiscal adjustments. But once the civil war erupted, the situation changed entirely. Administrative structures faltered, supply chains collapsed, and public confidence in the currency deteriorated sharply across the provinces.\n\nUltimately, the already weakened monetary system could not withstand the shock of war. Prices skyrocketed within mere weeks, and ordinary citizens found even basic necessities increasingly unaffordable. Merchants were forced to adjust prices several times a day, and in some regions, barter trade reappeared as the currency's function deteriorated.\n\nThe government insists this is merely a 'temporary monetary disturbance,' but the reality felt by the population is far graver. With signs that the civil war may drag on, the potential damage inflation could inflict on the national economy is becoming immeasurable."
 china_wr.89.a:0 "We are losing control..."
 china_wr.90.t:0 "Full Integration of the Volunteer Forces"
 china_wr.90.d:0 "Volunteer forces scattered across China had long been a source of instability and administrative disorder. Though nominally organized for local defense, many operated outside central control, engaging in forced requisitions, private reprisals, and independent use of armed force.\n\nWith the end of the civil war and the restoration of nationwide authority, the government concluded that the volunteer force issue could no longer be ignored. A comprehensive disarmament and reorganization campaign was launched, successfully bringing all volunteer formations under a unified command structure.\n\nSome units were dissolved outright, while others were reassigned into regular military forces, security units, or auxiliary administrative roles. Most importantly, no armed groups remain that operate independently of state authority.\n\nThe full integration of the volunteer forces represents more than a military reform; it symbolizes the reestablishment of a single national order. Armed power now belongs exclusively to the state."
 china_wr.90.a:0 "Arms now answer to the state."
 china_wr.91.t:0 "Partial Integration of the Volunteer Forces"
 china_wr.91.d:0 "Volunteer forces operating across China had long existed outside effective state control, imposing a complex burden on security and administration. Following the end of the civil war, the government initiated efforts to dismantle and integrate these forces into the national order.\n\nReality, however, proved complicated. While some volunteer units cooperated with the integration policy, others resisted disarmament or delayed compliance due to local interests. Limitations in regional administrative capacity and physical control further slowed the process.\n\nAs a result, many volunteer formations have been incorporated into the regular command structure, but complete integration has yet to be achieved in all areas. The government does not regard the remaining units as an immediate threat, but acknowledges them as a long-term source of instability.\n\nThe volunteer force issue has clearly advanced, but it is not yet resolved. Final consolidation of national order will require additional time and political resolve."
 china_wr.91.a:0 "The task remains unfinished."
 china_wr.92.t:0 "Public Execution of Corrupt Officials"
 china_wr.92.d:0 "During the government's anti-corruption investigations, several senior officials were arrested after severe cases of embezzlement and abuse of power were confirmed. The trials proceeded swiftly, and the verdicts were uncompromising. The government made clear that this was not merely punishment, but a warning to the entire civil service.\n\nOn the day of the sentence, the execution was carried out under heavy security and in public view. As the hanging was carried out, silence fell over the site, and news of the event spread rapidly across the country. Some citizens welcomed the government's resolve, while others expressed unease over the severity and speed of the punishment.\n\nThe government emphasized that no one stands above the law and that corruption by public officials constitutes a betrayal of the state. This action will be remembered as a defining moment in the direction of administrative reform."
 china_wr.92.a:0 "The warning has been delivered."
 china_wr.93.t:0 "The Spread of Survival Corruption"
 china_wr.93.d:0 "The government has enforced strict punishment against corrupt officials under the principle of exemplary discipline. However, with no accompanying measures such as wage increases for civil servants, unintended consequences have begun to surface.\n\nAmong lower-level officials facing low pay and unstable living conditions, overt embezzlement and large-scale corruption have declined, but small-scale bribery and informal practices aimed at basic survival have increased rapidly. Some officials now resort to more discreet methods to evade detection, undermining transparency across the administration.\n\nMost recent cases involve not grand corruption, but minor offenses justified as necessary for subsistence. Nevertheless, the accumulation of such acts has widened the gap between legal standards and administrative reality.\n\nWithin the government, recognition is growing that punishment alone cannot resolve the issue. Reform efforts that ignore the material conditions of civil servants are increasingly seen as fundamentally limited."
 china_wr.93.a:0 "Punishment alone is not enough."
 china_wr.94.t:0 "Implementation of Currency Reform"
 china_wr.94.d:0 "The government has concluded that prolonged monetary instability and inflation can no longer be ignored. The existing fabi system has failed to preserve economic order due to repeated over-issuance and a collapse of public trust, fueling instability across the nation.\n\nAs a result, the government has decided to implement a comprehensive currency reform. This reform aims to overhaul currency issuance and circulation, strengthen the authority of the central bank, and restore consistency to monetary policy. While short-term disruption and resistance are inevitable, policymakers recognize that failing to act would invite far greater collapse.\n\nThis currency reform is not merely a technical adjustment, but a political declaration that the state intends to reclaim control over the economy. With this decision, the government takes its first decisive step toward breaking the cycle of instability and constructing a new monetary order."
 china_wr.94.a:0 "There is no more room for delay."
 china_wr.95.t:0 "The Limits of Gold–Silver Bimetallism"
 china_wr.95.d:0 "The government has concluded that the current monetary turmoil is not merely the result of mismanagement, but a structural flaw rooted in the gold–silver bimetallic system itself. While it once appeared stable, the dual standard has in practice acted as a rigid constraint on effective monetary policy.\n\nGold and silver fluctuate at different rates on the international market, and whenever their relative value shifts, the currency is thrown into instability. This has produced exchange confusion, speculative arbitrage, and outflows of precious metals, distorting the market each time authorities attempted to adjust the money supply.\n\nThe most serious flaw became evident during times of crisis. Bound to metallic reserves, the monetary system proved incapable of supplying liquidity when economic contraction or fiscal pressure emerged. Instead of cushioning shocks, it amplified them, driving the economy into sharper decline.\n\nThe government now recognizes that gold–silver bimetallism is not a symbol of stability, but an outdated framework unable to respond to modern realities. As long as it remains in place, the restoration of monetary order will remain impossible."
 china_wr.95.a:0 "It is time to move beyond it."
 china_wr.96.t:0 "Financial Experts from London"
 china_wr.96.d:0 "To advance monetary reform and financial stabilization in a systematic manner, the government has decided to invite financial experts from London, long regarded as a global center of finance. These specialists possess extensive practical experience in currency stabilization, central banking, and financial institutional reform.\n\nRather than serving as mere advisors, the experts from London will directly participate in central bank and treasury operations, reviewing and adjusting the reform process as it unfolds. This step is intended to move away from improvised monetary management toward a more professional system aligned with international standards.\n\nWhile some express concern over reliance on foreign expertise, the government believes that this is a moment when effectiveness must take precedence over appearances."
 china_wr.96.a:0 "We will learn what must be learned."
 china_wr.97.t:0 "Gold Purchases through Washington"
 china_wr.97.d:0 "In preparation for the transition to a gold standard, the government has concluded that securing sufficient gold reserves is essential. To this end, diplomatic and financial channels with Washington are being utilized to arrange large-scale gold purchases.\n\nThis transaction is not merely a fiscal exchange, but a critical step in ensuring the credibility of future monetary reforms. Adequate gold reserves will strengthen domestic and international confidence in the new currency system and help calm market uncertainty.\n\nDespite the immediate financial burden, the government considers this acquisition indispensable for achieving long-term monetary stability."
 china_wr.97.a:0 "Gold is the foundation of confidence."
 china_wr.98.t:0 "Dismissal of the Finance Minister"
 china_wr.98.d:0 "As monetary instability drags on, criticism within the government has intensified regarding existing fiscal and monetary policies. In particular, the finance minister's handling of currency issuance and public finance has been widely blamed for failing to contain inflation.\n\nIn response, the government has decided to dismiss the finance minister in order to restore confidence in monetary reform. This decision signals a clear assignment of responsibility and a commitment to establishing a new currency order centered on the central bank."
 china_wr.98.a:0 "Accountability must be enforced."
 china_wr.99.t:0 "Changing the Currency Design"
 china_wr.99.d:0 "The government has concluded that the existing currency has lost public confidence after prolonged over-issuance and disorder. Mere institutional reform is deemed insufficient to shift market perception, prompting the introduction of a new currency design.\n\nThe new design serves as a symbol of monetary reform, clearly demonstrating the state's break with past mismanagement. Through this change, the government aims to rebuild psychological trust in the currency."
 china_wr.99.a:0 "A new beginning."
 china_wr.100.t:0 "Strengthening the Central Bank"
 china_wr.100.d:0 "It has become increasingly clear that for the gold standard and managed currency system to function effectively, the central bank must operate free from political interference. The government has therefore decided to significantly strengthen the authority of the central bank.\n\nUnder this reform, the central bank will gain greater independence over currency issuance and monetary management, prioritizing long-term stability over short-term political considerations. This measure is regarded as a cornerstone of institutional support for monetary reform."
 china_wr.100.a:0 "Leave currency policy to the experts."
 china_wr.101.t:0 "The Launch of Land Reform"
 china_wr.101.d:0 "The government has concluded that China's distorted rural land structure can no longer be left unaddressed. Throughout the process of industrialization, farmland has increasingly concentrated in the hands of large landowners, while tens of millions of tenant farmers have been forced to survive under debt and exploitation. This was never a crisis that erupted overnight, but for the peasantry, it has been a daily catastrophe.\n\nLand reform represents a decisive attempt to resolve these structural contradictions and relieve the suffocating pressure on rural society. Its goals are to restore a class of independent farmers, ease rural discontent, and lay the groundwork for industrialization and urbanization in the long term.\n\nHowever, the longer this reform drags on, the more resistance and instability it will generate. The government has therefore imposed a strict one-year deadline for completion. Failure to achieve results within this period will push rural contradictions beyond the point of recovery."
 china_wr.101.a:0 "There is no more time to delay."
 china_wr.102.t:0 "Land Reform at an Impasse"
 china_wr.102.d:0 "Although land reform is officially underway, it is increasingly encountering clear limitations on the ground. Organized non-cooperation by the landlord class, half-hearted enforcement by local administrations, and confusion arising during implementation have combined to slow progress far beyond initial expectations.\n\nIn some regions, land surveys themselves have been delayed, while in others nominal redistribution has taken place without any real transfer of cultivation rights. Among the peasantry, initial expectations are gradually giving way to distrust, and doubts about the government's governing capacity are spreading.\n\nIf the reform cannot be pushed forward decisively, land reform risks becoming not a solution to structural contradictions but a new source of resentment. The government now stands at a crossroads, forced to choose between stronger measures or gradual adjustment."
 china_wr.102.a:0 "Stronger measures are required."
 china_wr.103.t:0 "Public Criticism of Collectivism"
 china_wr.103.d:0 "As the government formally adopts a stance opposing collectivism, immediate reactions have emerged among intellectuals and the urban middle class. Many scholars and journalists welcome the shift, arguing that collectivist thinking has long suppressed individual initiative and weakened social vitality.\n\nAt the same time, some officials and organized groups express concern that national cohesion may be undermined. In regions reliant on traditional communal structures, voices warn that the spread of individualism could bring social instability.\n\nNevertheless, the government maintains that without strengthening individual freedom and responsibility, a modern civil society cannot be achieved."
 china_wr.103.a:0 "Individual freedom is the foundation of the state."
 china_wr.104.t:0 "The Abolition of the Press Law"
 china_wr.104.d:0 "With the formal repeal of the press law, sweeping changes are unfolding across newspapers, journals, and the publishing world. Censorship bodies have been dismantled, and journalists may now criticize the government and society without prior approval.\n\nThis liberalized media environment has opened space for a wide range of ideas and opinions, but it has also allowed misinformation and radical claims to spread rapidly. Some officials warn that an unregulated press could amplify political instability.\n\nDespite these risks, the government insists that freedom of expression is a non-negotiable principle and that only through open criticism can healthy politics emerge."
 china_wr.104.a:0 "A free press is dangerous—but necessary."
 china_wr.105.t:0 "The Second Women's Movement"
 china_wr.105.d:0 "As women's education reaches a critical mass, its impact begins to extend far beyond the classroom and into society at large. Educated women are no longer content to remain within the confines of home or school, and have started to openly question their social position and role.\n\nAcross the country, women's organizations and intellectual circles are forming, voicing demands that encompass education, labor rights, and legal equality. This movement is no longer mere enlightenment—it is evolving into a declaration that women are political and social actors in their own right. This wave of activism has come to be known as the 'Second Women's Movement.'\n\nConservative forces denounce it as a source of social unrest, yet within the government and reformist circles, a growing consensus holds that this movement represents an unavoidable stage in the transition toward a modern civil society."
 china_wr.105.a:0 "This new social current cannot be stopped."
 china_wr.106.t:0 "The Spread of Anti-Authoritarian Discourse"
 china_wr.106.d:0 "Voices criticizing authoritarian governance are rapidly spreading among the press and intellectual circles. Emphasis on individual liberty and rights is increasingly resonating with the public, fostering open discussions about the limits and responsibilities of state power.\n\nWhile this trend presents an opportunity to strengthen political legitimacy, it also unsettles conservative factions and entrenched bureaucratic interests. Whether the government suppresses or institutionalizes this discourse will shape the future political culture."
 china_wr.106.a:0 "Criticism must be managed, not silenced."
 china_wr.107.t:0 "The Cultivation of Individualism"
 china_wr.107.d:0 "Within a society long shaped by collective order, a new cultural current emphasizing individual choice and dignity is spreading. Education and the press promote personal rights, responsibility, and autonomy, gradually reshaping civic consciousness.\n\nWhile this individualistic trend may invigorate society, it also raises concerns about weakening communal bonds. The government must ensure this transition leads to a mature civil society rather than social fragmentation."
 china_wr.107.a:0 "Individual liberty is the foundation of a modern state."
 china_wr.108.t:0 "The Question of Women's Suffrage"
 china_wr.108.d:0 "The spread of the Second Women's Movement and expanded female education has begun to influence the political sphere. Women's organizations and intellectuals are now openly demanding political rights as citizens, not merely social participation.\n\nThe government faces a decisive choice: grant suffrage to all women as a declaration of civic equality, or restrict voting rights to women meeting certain educational and property requirements. This decision will fundamentally shape the character of China's political order."
 china_wr.108.a:0 "Grant suffrage to all women."
 china_wr.108.b:0 "Restrict suffrage to educated and propertied women."
 china_wr.109.t:0 "An Enlightened Chinese People"
 china_wr.109.d:0 "Through successive reforms and ideological debates, a distinctly new civic consciousness has begun to take shape within Chinese society. The expansion of education, press freedom, and public discourse has compelled citizens to think independently about the state, their rights, and their obligations, and an increasing number have risen to that challenge.\n\nThe nation can no longer be sustained by authority or tradition alone. Citizens now recognize that laws, institutions, and political choices directly affect their lives, and they increasingly demand participation and judgment rather than unquestioning obedience.\n\nThis transformation is not the result of a single reform, but the accumulation of prolonged turmoil and debate. The emergence of an enlightened citizenry may complicate governance, but it also constitutes an indispensable foundation for China's transition into a modern state."
 china_wr.109.a:0 "China is no longer what it once was."
 china_wr.110.t:0 "Announcement of Institutional De-Authoritarianization Reforms"
 china_wr.110.d:0 "Today, the government released an official statement outlining its intention to pursue a gradual reform of China's long-standing authoritarian social structures. The announcement made clear that this is not merely a declaration of principles, but the starting point of a concrete reform agenda that will be accompanied by institutional and administrative changes.\n\nAccording to the statement, while hierarchical order and customary authority have historically provided a degree of stability, they have also constrained individual freedom and suppressed broader social vitality. The government therefore declared its intent to revise laws, administrative practices, and social institutions that rely excessively on authority, steering society toward a more liberal and flexible framework.\n\nPublic reaction has been divided. Intellectual circles and reform-oriented media have welcomed the announcement as a signal of societal transformation, while segments of the bureaucracy and conservative groups have expressed concern over the erosion of established order. The government stated that specific reform measures will be unveiled in stages, and expressed confidence that this policy direction will guide Chinese society toward a more open and adaptable future."
 china_wr.110.a:0 "The direction of reform is now clear."
 china_wr.111.t:0 "Declaration of Judicial Reform"
 china_wr.111.d:0 "The government has formally acknowledged that the judicial system has been severely damaged by civil war and prolonged instability, and has announced its intention to pursue comprehensive judicial reform. Delayed trials, allegations of political interference, and regional inconsistencies in rulings have significantly eroded public trust.\n\nThis declaration does not represent an immediate overhaul of specific laws, but rather a national statement of intent to restore judicial independence and procedural legitimacy. The government has stated that judicial appointments, trial procedures, and the relationship between the courts and executive authority will be thoroughly reviewed.\n\nWhile legal professionals and the press have largely welcomed the announcement, some observers remain cautious about how far concrete reforms will actually go. The challenge now lies in translating declaration into action."
 china_wr.111.a:0 "Trust in justice must be restored."
 china_wr.112.t:0 "Plan to Reduce the Bloated Administrative Apparatus"
 china_wr.112.d:0 "The government has officially announced a plan to address the excessively expanded administrative apparatus that developed during years of war and emergency governance. Overlapping departments, unclear chains of responsibility, and excessive staffing have placed a heavy burden on both finances and administrative efficiency.\n\nRather than an immediate large-scale restructuring, the announcement outlines a gradual review of administrative functions with the aim of eliminating redundant organizations. Efficiency and accountability have been presented as the core principles of this reorganization.\n\nThe civil service has responded with a mixture of anxiety and resistance, while segments of the public view the announcement as a long-overdue acknowledgment of administrative inefficiency."
 china_wr.112.a:0 "Towards the right path."
 china_wr.113.t:0 "Announcement of Legislative Restraint Principles"
 china_wr.113.d:0 "The government has acknowledged that the excessive use of administrative decrees and emergency legislation during periods of instability has created widespread uncertainty across political and economic life. In response, new principles governing legislative restraint have been announced.\n\nThis declaration signals an intention to move away from impulsive lawmaking. Greater emphasis will be placed on prior review, long-term institutional stability, and predictability in governance.\n\nWhile business leaders and intellectual circles have welcomed the move, some have expressed concern that governmental responsiveness may be weakened in times of crisis."
 china_wr.113.a:0 "Laws must be made with caution."
 china_wr.114.t:0 "Down with the Confucian Order"
 china_wr.114.d:0 "The Hu Shih administration has officially announced the implementation of the policy known as 'Down with the Confucian Order.' This declaration goes beyond criticism of Confucius as an individual and represents a state-led effort to dismantle the Confucian ideological system that has shaped Chinese society for centuries.\n\nAccording to the government, Confucian norms have long suppressed individual freedom while reinforcing rigid hierarchies based on age, status, and tradition. The administration argues that attempting institutional reform without addressing these cultural foundations would be insufficient to achieve genuine modernization.\n\nAs a result, the government has declared its intention to critically reassess Confucian symbols and authority across education, administration, and public discourse. Practices that treated Confucian ethics as unquestionable standards are to be systematically dismantled. This initiative is framed not as an academic debate or cultural movement, but as a comprehensive state policy aimed at reshaping the nation's value system.\n\nPublic reactions remain sharply divided. Critics warn that using state power to challenge long-standing traditions risks social instability, while supporters argue that breaking with entrenched authority is an unavoidable step toward a more liberal and modern society.\n\n'Down with the Confucian Order' does not promise immediate transformation. Rather, it signals a clear declaration of intent by the state to reconstruct China's cultural foundations. While the long-term consequences remain uncertain, it is now evident that an official break with the old moral order has been set in motion."
 china_wr.114.a:0 "Defy convention."
 china_wr.115.t:0 "The Myth of Spiritual Civilization"
 china_wr.115.d:0 "The Hu Shih administration has issued an official commentary sharply criticizing the long-standing argument that East Asia failed to industrialize because it possessed a superior 'spiritual civilization.' The government describes this notion as a form of self-consolation that disguises backwardness and defeat.\n\nIn the commentary, Hu Shih explicitly rejects the claim that East Asia ever possessed a unique spiritual civilization that compensated for material or technological shortcomings. He argues that science, rational inquiry, critical thinking, and modern civilization themselves constitute true spiritual achievement. To dismiss or resist industrialization in the name of spiritual superiority is, in his view, little more than an escape from reality.\n\nAccording to the government's analysis, the doctrine of spiritual civilization has historically served to excuse technological stagnation, avoid institutional reform, and deflect responsibility for structural failure. The claim that 'we lag behind materially but excel spiritually' allowed society to ignore its own shortcomings, at the cost of prolonged stagnation across science, industry, and governance.\n\nThis statement is not presented as an academic debate, but as a formal declaration that the state is breaking with past habits of self-deception. The Hu Shih administration emphasizes that embracing modern civilization does not represent spiritual decay, but rather the expansion of human reason and freedom.\n\nThe era of comforting myths, the government asserts, can no longer serve as the foundation for national reconstruction. China's future must be built not on illusion, but on science, institutions, and uncompromising self-reflection."
 china_wr.115.a:0 "It is time to abandon comforting myths."
 china_wr.116.t:0 "The Movement for Reorganizing the National Heritage"
 china_wr.116.d:0 "The government and academic circles have recently initiated a broader effort to systematically reinterpret and reassess traditional Chinese culture. Known as the 'Movement for Reorganizing the National Heritage,' this initiative does not seek to reject tradition outright, but rather to distinguish which elements remain compatible with a modern society.\n\nThe movement advocates preserving aspects of classical thought, customs, and institutions that can still contribute to a modern nation, while discarding practices and ideas that have obstructed scientific progress, individual freedom, and social equality. It represents a middle path that rejects both blind reverence for tradition and indiscriminate cultural destruction.\n\nThe government emphasizes that this effort is not a rupture with the past, but a rational reconfiguration of tradition itself. Cultural heritage is not viewed as something to be inherited uncritically, but as a resource to be examined, revised, and adapted to contemporary realities.\n\nDistinct from radical cultural upheavals, the National Heritage Reorganization Movement seeks to maintain cultural continuity while addressing elements that conflict with modern values. Through this approach, the government aims to stabilize the intellectual landscape while advancing broader social reform."
 china_wr.116.a:0 "Preserve what endures, discard what hinders."
 china_wr.117.t:0 "Problems versus Ideology"
 china_wr.117.d:0 "In a recent public address, Hu Shih directly confronted the growing divide between those who prioritize ideology and those who demand immediate solutions to China's pressing problems. He challenged the claim that China's crisis stems from the absence of the correct ideology, arguing that such thinking only delays meaningful reform.\n\nHu noted that some factions believe all problems will disappear once the 'right ideology' is established. He dismissed this as a dangerous illusion detached from reality. Unemployment, illiteracy, administrative decay, and industrial collapse, he stated, cannot be solved through ideological proclamations, but only through concrete analysis and effective policy execution.\n\nAccording to Hu, China did not fail because it lacked ideological fervor, but because tangible problems were repeatedly ignored. While ideological disputes dominated political discourse, opportunities to address real issues were lost.\n\nThe Hu Shih administration has made its position clear: the purpose of the state is not to secure ideological victory, but to resolve real-world problems. Ideology may serve as a tool, but it must never take precedence over reality.\n\nThis speech is widely interpreted as a declaration that China's reform path will be guided by problem-solving rather than ideological struggle."
 china_wr.117.a:0 "Problems must come first."
 china_wr.118.t:0 "Declaration of Total Westernization"
 china_wr.118.d:0 "The Hu Shih administration has issued an official declaration announcing a policy of 'Total Westernization' as the fundamental direction for restructuring Chinese society. The government has concluded that partial reforms or compromises with tradition are insufficient to overcome China's accumulated structural failures.\n\nIn the statement, the administration identifies outdated institutions and irrational practices as the root causes of the nation's crisis. By adopting Western modern standards in law, governance, administration, education, and social organization, the government seeks to place China firmly on the path of a 'normal modern state.'\n\nTotal Westernization is presented not as gradual cultural adaptation, but as a decisive break where necessary. Long-standing customs and value systems may be discarded if they obstruct modernization. The government frames this choice not as cultural betrayal, but as an unavoidable decision for national survival and reconstruction.\n\nWhile the declaration does not signify immediate transformation, it establishes a clear framework under which all future reforms, legislation, and administrative actions will be pursued. Reactions across society are mixed, but the administration has made clear that ambiguity will no longer be tolerated."
 china_wr.118.a:0 "The direction is now clear."
 china_wr.119.t:0 "The Debate Over the Founding Father"
 china_wr.119.d:0 "A renewed debate has surfaced within the legislature and the press over how Sun Yat-sen's political legacy should be interpreted. Some figures emphasize his decisiveness and strong leadership, arguing that effective governance requires concentration of power in the hands of capable elites.\n\nHu Shih has responded not with direct confrontation, but with a more layered assessment. He has spoken highly of Sun's achievements and historical stature, while clearly stating that such methods were possible precisely because Sun was an exceptional figure. Hu has expressed concern over attempts to invoke Sun's name to legitimize contemporary power concentration.\n\nAt the same time, Hu has not dismissed Sun's legacy outright. He has acknowledged that Sun's sense of responsibility and willingness to shoulder the burdens of the nation remain qualities worth reflecting upon.\n\nFollowing these remarks, political opinion has split into two distinct interpretations. One seeks to elevate Sun as a singular, unmatched figure and redefine present politics through his example. The other focuses on the limitations of his actions and warns against repeating the same approach. How the Founding Father is understood may ultimately shape the future direction of Chinese politics."
 china_wr.119.a:0 "Only Sun could have ruled as Sun did."
 china_wr.119.b:0 "It is the method itself that must be questioned."
 china_wr.120.t:0 "Seven Parts Merit, Three Parts Fault"
 china_wr.120.d:0 "As debates over Sun Yat-sen's legacy continue, Hu Shih has clarified his standard of judgment. He openly recognizes Sun's revolutionary achievements and his role in founding the republic, while insisting that the concentration of power and political dominance during Sun's rule must also be preserved as part of the historical record.\n\nHu argues that truly great figures should not be sanctified, but examined critically. Merit must be recorded as merit, and fault as fault, if society is to move beyond both hero worship and blanket condemnation.\n\nThis position is widely seen as an effort to curb attempts to elevate Sun into an unquestionable authority, while returning historical evaluation to a more mature and balanced discussion."
 china_wr.120.a:0 "Merit and fault must be judged separately."
 china_wr.121.t:0 "The Reassessment of Sun Yat-sen"
 china_wr.121.d:0 "As certain political factions invoke Sun Yat-sen's name to legitimize elite-driven rule and centralized power, Hu Shih has taken a clearer stance. He stresses that Sun's methods were products of exceptional historical circumstances, and that attempting to replicate them today undermines republican principles.\n\nHu has rejected the use of Sun's authority as a shield against criticism, explaining that reassessment is not an attack on the founding father, but a rejection of turning his name into a political exemption.\n\nFollowing this stance, journalists and scholars have increasingly reexamined Sun's decisions and governing style, strengthening calls to move away from personality-centered politics toward institutions and accountability."
 china_wr.121.a:0 "Sun's name cannot justify everything."
 china_wr.122.t:0 "The Spirit of the Age in China"
 china_wr.122.d:0 "The manner in which Sun Yat-sen governed during his time in power remains a subject of intense debate. After assuming office as a single candidate, he refused to appoint a vice president, filled the State Council and key institutions exclusively with his loyalists, and imposed strict controls over the press. These measures undoubtedly strained constitutional order, yet it is also true that they provided decisiveness and a degree of stability amid international pressure and domestic turmoil.\n\nThe Hu Shih administration does not approach this issue through moral judgment or personal veneration. Instead, it deliberately elevates Sun Yat-sen's actions to their extreme interpretation. His rule is framed as something possible only because he was Sun Yat-sen himself, sustained by his unique authority and revolutionary symbolism. In doing so, the government emphasizes that such a model was an exceptional circumstance rather than a transferable precedent.\n\nAny attempt to imitate Sun Yat-sen inevitably returns as a question. Who today possesses the legitimacy and responsibility that he once bore. Through this question, Hu Shih seeks to draw a clear boundary against proponents of political tutelage and authoritarian governance. The name of Sun Yat-sen is presented not as a license, but as a warning."
 china_wr.122.a:0 "Sun Yat-sen was Sun Yat-sen, and we are not"
 china_wr.123.t:0 "The Direction of Distant Diplomacy"
 china_wr.123.d:0 "As Japanese pressure continues, the Republic of China has reached a point where it must define the concrete direction of its distant diplomacy strategy. Strengthening ties with geographically distant great powers is widely regarded as a crucial means of building a diplomatic buffer against Japan.\n\nWithin the government, two options are under active consideration. One proposes deepening relations with France, a power whose interests are relatively removed from direct conflict with Japan. The other advocates closer cooperation with Germany, a state that stands in a potential strategic rivalry with Japanese ambitions. The choice between these paths will shape the Republic's diplomatic orientation and its position within the international order."
 china_wr.123.a:0 "Strengthen relations with France"
 china_wr.123.b:0 "Seek cooperation with Germany"
 china_wr.124.t:0 "Proposal to Renew the Sino-German Trade Treaty"
 china_wr.124.d:0 "After reviewing the existing trade arrangements with Germany, the Republic of China has decided to formally propose the renewal and expansion of the Sino-German trade treaty. This initiative goes beyond mere economic cooperation and is intended to reinforce China's diplomatic foundation in response to expanding Japanese influence.\n\nPeking believes that Germany may benefit from adopting a more flexible stance in East Asia, and Berlin's response will have significant implications for China's broader European diplomatic strategy."
 china_wr.124.a:0 "Deliver the proposal to Berlin."
 china_wr.125.t:0 "Germany's Response to the Sino-German Trade Proposal"
 china_wr.125.d:0 "The proposal from the Republic of China to renew the trade treaty has entered careful deliberation within the German government. While the agreement promises tangible economic benefits, it also carries potential diplomatic consequences, particularly with regard to East Asian affairs and relations with Japan.\n\nGermany must now decide whether expanding cooperation with China is worth the accompanying diplomatic considerations."
 china_wr.125.a:0 "Approves the proposal."
 china_wr.125.b:0 "Rejects the proposal."
 china_wr.126.t:0 "Renewal of the Trade Treaty Secured"
 china_wr.126.d:0 "The German government has agreed to renew the trade treaty with the Republic of China. This outcome is regarded as a notable diplomatic success, demonstrating that China continues to maintain meaningful economic ties with Europe.\n\nThe agreement underscores that Chinese diplomacy is not confined to a single regional power and opens the door to broader diplomatic and economic options in the future."
 china_wr.126.a:0 "A diplomatic success is achieved."
 china_wr.127.t:0 "Trade Treaty Renewal Fails"
 china_wr.127.d:0 "The German government has decided to reject China's proposal to renew the trade treaty. This decision has halted Peking's attempt to strengthen its economic linkage with Europe.\n\nWhile not framed as an outright diplomatic defeat, the rejection makes clear that Germany has chosen to maintain distance in East Asian affairs."
 china_wr.127.a:0 "Seek alternative diplomatic options."
 china_wr.128.t:0 "Approaching France for Closer Cooperation"
 china_wr.128.d:0 "The Republic of China has begun exploring the possibility of strengthening diplomatic cooperation with France, a former member of the Entente. France is viewed as a comparatively stable diplomatic partner whose interests in East Asia do not directly conflict with those of China.\n\nThis initiative does not seek an immediate military alliance, but rather gradual cooperation centered on diplomacy and economic relations."
 china_wr.128.a:0 "Dispatch a diplomatic mission to Paris."
 china_wr.129.t:0 "France Considers China's Diplomatic Overture"
 china_wr.129.d:0 "China's proposal to strengthen cooperation has drawn the attention of French diplomatic authorities. Closer ties with China could allow France to maintain influence in East Asia, but such a move would also require careful adjustment of relations with other great powers.\n\nThe French government is now weighing the potential benefits against the diplomatic responsibilities such cooperation would entail."
 china_wr.129.a:0 "Agrees to deepen cooperation."
 china_wr.129.b:0 "Rejects the proposal."
 china_wr.130.t:0 "Advancement of Sino-French Cooperation"
 china_wr.130.d:0 "France has approved the expansion of diplomatic and economic cooperation with the Republic of China. This development signifies that China has secured a stable relationship with a major European power, further enhancing its standing within the international community.\n\nThe outcome demonstrates that a gradual and pragmatic diplomatic approach can yield tangible results for the Republic."
 china_wr.130.a:0 "China's diplomatic position is strengthened."
 china_wr.131.t:0 "France Adopts a Reserved Stance"
 china_wr.131.d:0 "France has chosen not to immediately commit to deeper cooperation with China, opting instead to maintain a cautious and reserved posture. This decision is interpreted less as a rejection and more as a reflection of broader international considerations.\n\nThe Republic of China acknowledges this outcome and recognizes the need to recalibrate its approach toward France over the longer term."
 china_wr.131.a:0 "Reassess our diplomatic course."
 china_wr.132.t:0 "Statement on European Colonialism"
 china_wr.132.d:0 "After reviewing the current international situation, the government of the Republic of China has decided to issue an official statement criticizing the colonial order long maintained by European powers. Rather than directly condemning any specific country, the statement focuses on the unequal structures that have distorted the international order for an extended period of time.\n\nThe government makes clear that China will no longer remain in a position of silent acceptance of the existing order, and emphasizes the necessity of a new framework for international relations based on sovereignty and equality. This statement is not intended to provoke armed conflict or diplomatic rupture, but is presented as a political declaration clarifying China's position within the international community."
 china_wr.132.a:0 "Make China's position known to the international community."
 china_wr.133.t:0 "Statement Critiquing European Colonialism by China"
 china_wr.133.d:0 "The government of the Republic of China has released a public statement criticizing the colonial international order shaped by European powers. While avoiding direct accusations against any particular state, the statement clearly asserts that colonial domination and unequal treaties have distorted international relations.\n\nThe Chinese government stressed that this announcement is not intended as a call for confrontation, but as a political expression demanding a new international order founded on sovereignty and equality. The international community has taken note that China is beginning to speak with a more active diplomatic voice."
 china_wr.133.a:0 "What was that supposed to mean?"
 china_wr.133.b:0 "Those words are correct."
### ─────────────────────────────────────────────────────────
### Soviet Victory Route
### ─────────────────────────────────────────────────────────
 china_wr.134.t:0 "Demanding the Withdrawal of Soviet Occupation Forces"
 china_wr.134.d:0 "The intervention led by Blücher and the Soviet forces has already concluded in success, fixing the status of Sinkiang, Mongolia, and Tannu Tuva in a manner favorable to Soviet Russia. On the basis of this military reality, the Chinese government has decided to raise formal demands to adjust the postwar order through diplomacy.\n\nThese demands are structured as a set of graduated options, ranging from minimal territorial restitution to a comprehensive withdrawal from Central Asia."
 china_wr.134.a:0 "Demand the return of Sinkiang."
 china_wr.134.b:0 "Demand the return of Sinkiang and withdrawal from Mongolia."
 china_wr.134.c:0 "Demand the return of Sinkiang and withdrawal from Mongolia and Tannu Tuva."
### (Victory) Demand Option 1 ─ Return of Sinkiang
 china_wr.135.t:0 "China Demands the Return of Sinkiang"
 china_wr.135.d:0 "The Chinese government has formally demanded that Soviet Russia return Sinkiang. This demand prioritizes the recovery of China's core territory while deliberately avoiding immediate escalation over Mongolia and Tannu Tuva.\n\nMoscow must decide whether limited concessions can stabilize Sino-Soviet relations or whether the results of occupation should be preserved intact."
 china_wr.135.a:0 "Accept the demand."
 china_wr.135.b:0 "Reject the demand."
 china_wr.136.t:0 "Agreement on the Return of Sinkiang"
 china_wr.136.d:0 "Soviet Russia has accepted China's demand and agreed to return Sinkiang. The Chinese government regards this as a major achievement in restoring sovereignty and a foundation for further diplomatic adjustment of the postwar border order.\n\nHowever, this agreement does not fully resolve Central Asian issues, as Mongolia and Tannu Tuva remain points of diplomatic contention."
 china_wr.136.a:0 "Long live the Republic!"
 china_wr.137.t:0 "Rejection of the Sinkiang Demand"
 china_wr.137.d:0 "Soviet Russia has rejected China's demand for the return of Sinkiang. The Chinese government views this as a direct denial of territorial sovereignty and clear evidence that Moscow intends to entrench its military gains through diplomacy.\n\nAs a result, Sino-Soviet relations are likely to shift from negotiation toward pressure and vigilance."
 china_wr.137.a:0 "We will have to use another method."
### (Victory) Demand Option 2 ─ Return of Sinkiang + Withdrawal from Mongolia
 china_wr.138.t:0 "China Demands the Return of Sinkiang and Withdrawal from Mongolia"
 china_wr.138.d:0 "China has demanded the return of Sinkiang along with a Soviet withdrawal from Mongolia. This represents a stronger attempt to limit the outcome of Soviet military intervention across Central Asia.\n\nMoscow is calculating what strategic losses would follow from compliance, and how far relations with China might deteriorate in the event of refusal."
 china_wr.138.a:0 "Accept the demand."
 china_wr.138.b:0 "Reject the demand."
 china_wr.139.t:0 "Agreement on the Return of Sinkiang and Withdrawal from Mongolia"
 china_wr.139.d:0 "Soviet Russia has accepted China's demands and agreed to return Sinkiang while withdrawing from Mongolia. The Chinese government interprets this outcome as a partial normalization of the Central Asian order and confirmation that Soviet military gains cannot be expanded without limit.\n\nThe status of Tannu Tuva remains outside the scope of this agreement, leaving room for further negotiation."
 china_wr.139.a:0 "Long live the Republic!"
 china_wr.140.t:0 "Rejection of the Sinkiang and Mongolia Demands"
 china_wr.140.d:0 "Soviet Russia has rejected China's demands. The Chinese government believes this refusal reveals an intent to lock Sinkiang and Mongolia into the Soviet sphere of influence.\n\nThis decision marks a turning point, as China increasingly views the Soviet Union not as a negotiating partner but as a potential threat to the border order."
 china_wr.140.a:0 "We will have to use another method."
### (Victory) Demand Option 3 ─ Return of Sinkiang + Withdrawal from Mongolia and Tannu Tuva
 china_wr.141.t:0 "China Demands a Full Withdrawal"
 china_wr.141.d:0 "China has demanded not only the return of Sinkiang, but also a complete Soviet withdrawal from Mongolia and Tannu Tuva. This is the most uncompromising demand, aiming to reverse the full outcome of Soviet intervention.\n\nMoscow must consider that compliance would amount to abandoning its gains, while refusal may require accepting long-term confrontation with China."
 china_wr.141.a:0 "Accept the demand."
 china_wr.141.b:0 "Reject the demand."
 china_wr.142.t:0 "Agreement on a Full Withdrawal"
 china_wr.142.d:0 "Soviet Russia has accepted China's demands and agreed to return Sinkiang while withdrawing from both Mongolia and Tannu Tuva. The Chinese government declares this a restoration of postwar sovereignty and a meaningful restriction of Soviet influence in Central Asia.\n\nWhile this agreement may contribute to short-term border stability, it does not fully eliminate the risk of internal backlash in Soviet Russia or the possibility of future reassertion."
 china_wr.142.a:0 "Long live the Republic!"
 china_wr.143.t:0 "Rejection of the Full Withdrawal Demand"
 china_wr.143.d:0 "Soviet Russia has rejected China's demand for a full withdrawal. The Chinese government interprets this decision as a clear expression of intent to preserve Soviet dominance across Central Asia.\n\nChina has incorporated the assumption that the Soviet Union may pose a long-term threat to the border order into its policy, and the likelihood of future diplomatic confrontation has increased significantly."
 china_wr.143.a:0 "We will have to use another method."
### ─────────────────────────────────────────────────────────
### Soviet Defeat Route
### ─────────────────────────────────────────────────────────
 china_wr.144.t:0 "Demands Concerning the Northern Frontier"
 china_wr.144.d:0 "The Soviet intervention led by Blücher has already ended in failure. Sinkiang has returned to Chinese control, and Mongolia has maintained full independence from Soviet authority. Only Tannu Tuva remains under Soviet influence.\n\nThe Chinese government has decided to formalize this postwar situation and deny any future pretext for renewed intervention by raising official demands to Soviet Russia."
 china_wr.144.a:0 "Demand formal recognition of the current situation."
 china_wr.144.b:0 "Demand recognition and withdrawal from Tannu Tuva."
 china_wr.145.t:0 "China Demands Recognition of the Frontier"
 china_wr.145.d:0 "The Chinese government has demanded that Soviet Russia formally recognize the current postwar situation, including Sinkiang as Chinese territory and Mongolia as a fully independent state. This demand aims to lock the border order diplomatically and deny any future pretext for intervention.\n\nMoscow must consider that acceptance would reduce its room to expand influence, while refusal could generate unnecessary tension."
 china_wr.145.a:0 "Accept the demand."
 china_wr.145.b:0 "Reject the demand."
 china_wr.146.t:0 "Soviet Acceptance of Frontier Recognition"
 china_wr.146.d:0 "Soviet Russia has accepted China's demand and formally recognized the postwar situation. The Chinese government regards this as an achievement in frontier stabilization and believes it has reduced uncertainty across Central Asia.\n\nThe issue of Tannu Tuva remains unresolved, but at minimum the pretext for renewed intervention over Sinkiang and Mongolia has been weakened."
 china_wr.146.a:0 "Long live the Republic!"
 china_wr.147.t:0 "Soviet Rejection of Frontier Recognition"
 china_wr.147.d:0 "Soviet Russia has rejected China's demand for recognition of the postwar situation. The Chinese government interprets this refusal as an attempt to preserve the option of future intervention, leaving the Central Asian frontier order diplomatically unsettled.\n\nThis rejection deepens mistrust in Sino-Soviet relations and increases the risk of prolonged tension along the border."
 china_wr.147.a:0 "It is already in our hands anyway."
 china_wr.148.t:0 "The Reclaiming of Sinkiang"
 china_wr.148.d:0 "Chinese forces achieved a decisive victory across Sinkiang, and organized resistance in the region is no longer capable of sustaining meaningful combat operations. Major strongholds and lines of communication have returned to central government control, and military operations have effectively concluded.\n\nThe government evaluates this victory as a clear reaffirmation of sovereignty over the northwestern frontier and has set administrative reorganization and security restoration as its next priorities."
 china_wr.148.a:0 "Sinkiang is once again under central control."
 china_wr.149.t:0 "Failure of the Sinkiang Campaign"
 china_wr.149.d:0 "The military campaign in Sinkiang ended without achieving its objectives. Chinese forces were unable to sustain further advances due to terrain, logistical strain, and the possibility of external involvement, leading to the suspension of operations.\n\nThe government fears this failure may prolong instability along the northwestern frontier and is now forced to consider alternatives beyond military means."
 china_wr.149.a:0 "This was not an easy battlefield."
 china_wr.150.t:0 "Victory in Mongolia"
 china_wr.150.d:0 "After a series of engagements in Mongolia, Chinese forces secured a decisive victory. Local armed groups are no longer capable of organized resistance, and key areas have fallen under Chinese influence.\n\nThe government views this outcome as an important step toward restructuring the northern frontier order."
 china_wr.150.a:0 "Control of the northern frontier has been secured."
 china_wr.151.t:0 "Setback in Mongolia"
 china_wr.151.d:0 "Military operations in Mongolia failed to produce the expected results. Facing prolonged stalemate and diplomatic strain, Chinese forces halted their offensive and the front lines reverted to their previous state.\n\nThe government concludes that this outcome places additional pressure on its northern policy."
 china_wr.151.a:0 "For now, we withdraw."
 china_wr.152.t:0 "Pacification of Tannu Tuva"
 china_wr.152.d:0 "The military operation in Tannu Tuva concluded with a Chinese victory. Local armed groups and external influence were decisively weakened, and key positions were secured without further resistance.\n\nThe government assesses this as the removal of the final major source of instability along the northern frontier."
 china_wr.152.a:0 "The northern threat has been eliminated."
 china_wr.153.t:0 "Failure of the Tannu Tuva Campaign"
 china_wr.153.d:0 "The military operation in Tannu Tuva ended without achieving its objectives. Difficult terrain, extended supply lines, and pressure from external powers prevented Chinese forces from sustaining the campaign.\n\nThe government believes this failure leaves a lingering source of instability along the northern frontier."
 china_wr.153.a:0 "Withdrawal is unavoidable for now."
 china_wr.154.t:0 "Defense of the Sinkiang Front"
 china_wr.154.d:0 "Chinese offensives in Sinkiang collapsed, and the military influence maintained by Soviet forces was preserved. The Chinese side was unable to continue its advance, and the structural balance of the front remained intact.\n\nThe Soviet leadership views this outcome as confirmation that its strategic position in Central Asia remains valid."
 china_wr.154.a:0 "The status quo has been preserved."
 china_wr.155.t:0 "Retreat from the Sinkiang Front"
 china_wr.155.d:0 "As Chinese forces gained the upper hand in Sinkiang, Soviet influence in the region effectively collapsed. The results of earlier intervention could not be maintained, and control passed to the Chinese side.\n\nThe Soviet leadership regards this as a major setback in its northern strategy, making a reassessment unavoidable."
 china_wr.155.a:0 "Strategic adjustment is required."
 china_wr.156.t:0 "Holding the Mongolian Line"
 china_wr.156.d:0 "Chinese operations in Mongolia failed to achieve meaningful results, and the political and military influence maintained by the Soviet Union remained intact. The regional order continued within its existing framework.\n\nThe leadership interprets this outcome as evidence of the limits of Chinese northern expansion."
 china_wr.156.a:0 "The northern line holds."
 china_wr.157.t:0 "Loss of Influence in Mongolia"
 china_wr.157.d:0 "With Chinese forces achieving a decisive advantage in Mongolia, Soviet influence in the region receded. The political balance can no longer be maintained in Moscow's favor.\n\nThe Soviet leadership views this result as placing strain on its broader Central Asian strategy."
 china_wr.157.a:0 "The situation has deteriorated."
 china_wr.158.t:0 "Tannu Tuva Stronghold Maintained"
 china_wr.158.d:0 "Chinese offensives in Tannu Tuva ended in failure, allowing the Soviet Union to preserve its control and influence. The region continues to function as a key strategic stronghold in Central Asia.\n\nThe leadership evaluates this outcome as a demonstration of the limits of Chinese military capability."
 china_wr.158.a:0 "The stronghold remains secure."
 china_wr.159.t:0 "Loss of the Tannu Tuva Stronghold"
 china_wr.159.d:0 "Chinese forces achieved victory in Tannu Tuva, causing the Soviet Union to lose a major strategic foothold in Central Asia. This outcome represents not only a territorial loss but a symbolic blow to Soviet influence.\n\nThe leadership regards this development with grave concern and is considering a comprehensive reassessment of policy toward China."
 china_wr.159.a:0 "This is a serious loss."
 china_wr.160.t:0 "China Demands Withdrawal from Tannu Tuva"
 china_wr.160.d:0 "In addition to demanding recognition of the postwar situation, China has demanded that Soviet Russia withdraw from Tannu Tuva as well. This is a hard-line demand intended to remove the last Soviet foothold in Central Asia and fundamentally weaken the prospect of renewed intervention.\n\nMoscow must weigh the symbolic and strategic losses of compliance against the diplomatic deterioration that refusal could bring."
 china_wr.160.a:0 "Accept the demand."
 china_wr.160.b:0 "Reject the demand."
 china_wr.161.t:0 "Soviet Withdrawal from Tannu Tuva"
 china_wr.161.d:0 "Soviet Russia has accepted China's demands, formally recognizing the postwar situation and agreeing to withdraw from Tannu Tuva. The Chinese government evaluates this as a normalization of the Central Asian order and believes the likelihood of renewed Soviet intervention has been significantly reduced.\n\nThis agreement provides stability and diplomatic clarity, but it cannot fully eliminate the possibility that Soviet influence may be restored by other means."
 china_wr.161.a:0 "Long live the Republic!"
 china_wr.162.t:0 "Soviet Rejection of Withdrawal from Tannu Tuva"
 china_wr.162.d:0 "Soviet Russia has rejected China's demand. The Chinese government interprets this refusal as a deliberate intent to maintain a strategic foothold in Central Asia, leaving Tannu Tuva as a lasting seed of dispute.\n\nChina will henceforth approach relations with the Soviet Union on the basis of stronger mistrust and vigilance."
 china_wr.162.a:0 "We will have to use another method.
 china_wr.163.t:0 "The Reintegration of Tannu Tuva"
 china_wr.163.d:0 "Following the withdrawal of Soviet Russia from Tannu Tuva, the resulting power vacuum did not last long. Existing administrative and military structures collapsed rapidly, and amid diplomatic uncertainty, Tannu Tuva moved toward integration under Chinese protection and administration.\n\nThe Chinese government views this development as a return consistent with historical reality and regards it as an unavoidable step toward stabilizing the northern frontier and restoring order."
 china_wr.163.a:0 "Tannu Tuva has returned to China."
 china_wr.164.t:0 "The Unilateral Annexation of Outer Mongolia"
 china_wr.164.d:0 "Amid instability across Manchuria and the Mongolian regions, Mongolia carried out a unilateral annexation of Outer Mongolia. This action was taken without prior consultation with China or international approval, and the existing order was rapidly dismantled through military entry and administrative takeover.\n\nThe Chinese government defines this as a one-sided act that undermines the northern frontier order and judges that the Outer Mongolia issue has once again emerged as a political and diplomatic point of contention."
 china_wr.164.a:0 "There is no choice but to accept reality."
 china_wr.165.t:0 "Occupation of Tannu Tuva"
 china_wr.165.d:0 "Following the withdrawal of Soviet Russia from Tannu Tuva, Mongolia exploited the resulting power vacuum and carried out a military occupation of the region. Organized resistance was limited, and key administrative centers were incorporated under Mongolian control within a short period.\n\nThe Mongolian government characterizes this action as an unavoidable measure to secure its borders and ensure stability, assessing the incorporation of Tannu Tuva as a pragmatic decision."
 china_wr.165.a:0 "Tannu Tuva is now under our control."
 china_wr.166.t:0 "China Demands the Return of Concessions"
 china_wr.166.d:0 "The government of the Republic of China has defined the concessions within its territory as remnants of an unequal international order and has formally demanded their return. This demand was delivered through diplomatic channels and is based on the premise of resolution through negotiation rather than immediate military confrontation.\n\nThey are now watching to see whether we will approve this demand or reject it in order to preserve our existing interests."
 china_wr.166.a:0 "Return the concessions."
 china_wr.166.b:0 "This is nonsense."
 china_wr.167.t:0 "Approval of the Concession Return"
 china_wr.167.d:0 "The decision by [FROM.GetName] to approve the return of concessions has been reported to the Chinese government. The government evaluates this as a major diplomatic achievement in the process of restoring sovereignty and as proof that the unequal order can be dismantled through diplomacy.\n\nChina intends to publicize this outcome and use it as a precedent for resolving remaining concession issues."
 china_wr.167.a:0 "Sovereignty has advanced."
 china_wr.168.t:0 "Rejection of the Concession Return"
 china_wr.168.d:0 "The decision by [FROM.GetName] to reject the return of concessions has been reported to the Chinese government. The government interprets this as a denial of China's sovereignty restoration efforts and as an attempt to preserve an unequal order.\n\nChina has begun reassessing its diplomatic approach and is considering more forceful responses."
 china_wr.168.a:0 "Idiots."
 china_wr.169.t:0 "Chinese Offer to Sell Weapons"
 china_wr.169.d:0 "The government of the Republic of China has approached our government with an offer to sell rifles and artillery, citing the current international situation. While presented as a commercial transaction, this proposal carries direct military and diplomatic implications.\n\nOur government must decide whether to accept the offer and purchase the weapons, or to reject it in order to avoid potential diplomatic repercussions."
 china_wr.169.a:0 "Accept the offer to purchase weapons."
 china_wr.169.b:0 "Reject the offer to purchase weapons."
 china_wr.170.t:0 "Weapons Sale Concluded"
 china_wr.170.d:0 "Reports have been received confirming that our government's offer to sell rifles and artillery has been accepted by [FROM.GetName]. The Chinese government evaluates this outcome as a success in expanding its diplomatic influence, and the export will proceed in a limited and controlled manner.\n\nThis agreement is regarded as evidence that China can employ military resources as an effective diplomatic instrument."
 china_wr.170.a:0 "Proceed with the transaction."
 china_wr.171.t:0 "Weapons Sale Offer Rejected"
 china_wr.171.d:0 "Reports have been received confirming that our government's offer to sell rifles and artillery has been rejected by [FROM.GetName]. The Chinese government interprets this decision as an attempt to maintain diplomatic distance and as confirmation of the limits of arms trade in the bilateral relationship.\n\nThe government has decided to prioritize diplomatic autonomy over short-term commercial gains."
 china_wr.171.a:0 "Seek alternative diplomatic measures."
 china_wr.172.t:0 "Chinese Proposal for Military Cooperation"
 china_wr.172.d:0 "The government of the Republic of China has approached our government with a proposal for military cooperation, citing the security situation in the Pacific and Japan's military expansion. China states that this proposal does not imply an immediate alliance, but rather practical cooperation including training exchanges, technical assistance, and limited equipment support.\n\nOur government must decide whether to approve this proposal and begin limited cooperation with China, or to reject it in order to maintain strategic distance."
 china_wr.172.a:0 "Approve the proposal."
 china_wr.172.b:0 "Reject the proposal."
 china_wr.173.t:0 "Military Cooperation with the United States Established"
 china_wr.173.d:0 "Reports have been received confirming that the United States has accepted our request for military cooperation. The Chinese government evaluates this outcome as an important opportunity to ease diplomatic isolation and accelerate military modernization.\n\nUnder this agreement, training exchanges and information sharing will be initiated, granting China access to limited but tangible military support."
 china_wr.173.a:0 "Begin cooperation."
 china_wr.174.t:0 "United States Rejects Military Cooperation"
 china_wr.174.d:0 "Reports have been received confirming that the United States has rejected our request for military cooperation. While the official explanation cited a cautious diplomatic stance and existing international commitments, the Chinese government interprets this as a deliberate choice to maintain strategic distance.\n\nThe government has decided to reassess expectations toward the United States and to explore alternative avenues for military cooperation."
 china_wr.174.a:0 "Review other options."
 china_wr.175.t:0 "Chinese Proposal to Encircle Japan"
 china_wr.175.d:0 "The government of the Republic of China has delivered a proposal to the United States, the Netherlands, and Britain, arguing that Japan's military and diplomatic expansion poses a serious threat to stability in the Pacific. The proposal calls for coordinated diplomatic and economic pressure rather than immediate military action, aiming to constrain Japan's strategic options through maritime cooperation.\n\nChina asserts that such coordination could restore regional balance. The government of [ROOT.GetName] must now decide whether to approve or reject this proposal."
 china_wr.175.a:0 "Approve the proposal."
 china_wr.175.b:0 "Reject the proposal."
 china_wr.176.t:0 "[FROM.GetName] Accepts China's Proposal"
 china_wr.176.d:0 "The government of [FROM.GetName] has decided to accept China's proposal to apply coordinated pressure on Japan. While this decision does not imply immediate military action, it clearly signals an intention to participate in diplomatic coordination and gradual pressure aimed at constraining Japan's strategic options.\n\nThe Chinese government views this as a significant diplomatic success and is preparing to systematize its approach toward Japan in coordination with its partners."
 china_wr.176.a:0 "Strengthen diplomatic coordination."
 china_wr.177.t:0 "[FROM.GetName] Rejects China's Proposal"
 china_wr.177.d:0 "The government of [FROM.GetName] has chosen not to accept China's proposal to encircle and pressure Japan. Citing its current diplomatic interests and concerns over regional escalation, [FROM.GetName] has opted to refrain from participating in a coordinated pressure campaign.\n\nThe Chinese government interprets this decision as the result of cautious national calculations and now faces the necessity of maintaining a more independent diplomatic course toward Japan."
 china_wr.177.a:0 "Reassess the independent approach."
 china_wr.178.t:0 "[FROM.GetName] Imposes Trade Barriers Against Japan"
 china_wr.178.d:0 "The government of [FROM.GetName] has officially implemented trade barrier measures targeting Japan. These measures include increased tariffs and stricter customs procedures, and are expected to impose tangible pressure on Japanese foreign trade and industrial activity.\n\nWithin the government, it is clearly recognized that these measures are being employed as a form of diplomatic pressure, prompting the need to assess both short-term economic impacts and longer-term response options."
 china_wr.178.a:0 "Monitor the situation."
 china_wr.179.t:0 "Patience on the Razor's Edge"
 china_wr.179.d:0 "The fury within the Republic of China's military is no recent development. For decades, the civilian government has shackled the armed forces under the guise of preventing warlordism—slashing budgets until the coffers were bare and even sabotaging the development of new weaponry. The ultimate price of this incompetent suppression was the catastrophic civil war that tore the nation asunder.\n\nThe military is now asking: Is this the reward for defending the nation? The soldiers have witnessed firsthand how the very government that so desperately suppressed their power proved utterly powerless when faced with the national disaster of civil war. The current within the military has shifted beyond mere discontent; it has evolved into a profound cynicism, questioning the very legitimacy and capability of the civilian administration.\n\nThe only thing barely holding this catastrophe at bay is General Wu Peifu's remaining faith and patience toward the Republic. Yet, as the government continues its display of incompetence—with the people's livelihoods ruined and inflation spiraling out of control—a resolve to overthrow the administration begins to fester in the General's mind like a poisonous spore. The moment his patience runs dry will mark the end of the Republic and the dawn of a 'National Salvation' coup."
 china_wr.179.a:0 "The General's gaze is no longer fixed on the battlefield, but on the government."
 china_wr.180.t:0 "The Constitutional Government Pacifies China"
 china_wr.180.d:0 "After years of prolonged civil war, the conflict across the Republic of China has come to an end with the victory of the Constitutional Protection Government. Upholding the banner of constitutional order, the government secured key military positions and defeated rival forces, successfully reestablishing centralized authority from Peking.\n\nThis victory is widely regarded as a political turning point that enables the restoration of constitutional governance and the reorganization of the republican state. Chinese society now looks toward a new phase of stability while closely observing the direction of future reforms."
 china_wr.180.a:0 "China stands unified once more."
 china_wr.181.t:0 "The Kuomintang Pacifies China"
 china_wr.181.d:0 "The civil war that had engulfed the Republic of China has concluded with a military victory by the Kuomintang. Through nationwide operations and organizational strength, the party crushed its rivals and succeeded in establishing a centralized system of governance.\n\nChina now faces the emergence of a new political order, and both domestic and international observers are closely watching how the Kuomintang will carry out its promised national consolidation and restructuring."
 china_wr.181.a:0 "China enters a new political order."
 china_wr.1000.t:0 "Capture of [FROM.FROM.GetCapitalVictoryPointName]"
 china_wr.1000.d:0 "The capture of [FROM.FROM.GetCapitalVictoryPointName] represents a major achievement for our forces. As the political and military center of the enemy state, this victory carries immense symbolic significance and marks a decisive shift in the course of the war.\n\nThe enemy's command structure and administrative system have suffered severe disruption, and the international community now recognizes this development as a major turning point."
 china_wr.1000.a:0 "A decisive victory."
 china_wr.1001.t:0 "Loss of [FROM.FROM.GetCapitalVictoryPointName]"
 china_wr.1001.d:0 "The loss of [FROM.FROM.GetCapitalVictoryPointName] has delivered a severe shock to the nation. Given the symbolic and political importance of the capital, this event represents more than a military setback and deeply affects the overall capacity to continue the war.\n\nDisorder within the chain of command and unrest among the population are spreading, forcing the government to confront the situation with difficult decisions."
 china_wr.1001.a:0 "This is a grave situation."
 china_wr.182.t:0 "Military Expansion Demands"
 china_wr.182.d:0 "As the civil war drags on, the military leadership believes that current force levels and supply systems can no longer guarantee sustained operations. Within the officer corps, a growing sense of urgency has emerged that without simultaneous expansion of troop strength, equipment production, and ammunition stockpiles, strategic initiative may be lost.\n\nThe military therefore demands that the state allocate significantly more resources to armament expansion, aiming not merely to replace losses but to fundamentally strengthen the nation's war-fighting capacity."
 china_wr.182.a:0 "Grant their demands."
 china_wr.182.b:0 "Their demands go too far."
 china_wr.183.t:0 "Demand for Expanded Military Industry Conversion"
 china_wr.183.d:0 "The military reports that the current pace of military production is insufficient to keep up with battlefield attrition. Officers argue that unless civilian industry is more decisively converted to military production, the state will be placed at a severe disadvantage in a prolonged conflict.\n\nWhile such measures could bring tangible military benefits, they also carry the risk of placing heavy strain on the civilian economy and public livelihood."
 china_wr.183.a:0 "Grant their demands."
 china_wr.183.b:0 "Their demands go too far."
 china_wr.184.t:0 "Demand for Expanded Recruitment of Elite Personnel"
 china_wr.184.d:0 "The military views the declining quality of its command cadre as a serious concern. There is growing resentment that many capable officers and talented individuals have been drawn toward the Kuomintang, leaving the current system unable to secure sufficient human capital for the war effort.\n\nAs a result, the military demands the abolition of university exemptions and the introduction of selective conscription and commissioning of outstanding individuals."
 china_wr.184.a:0 "Grant their demands."
 china_wr.184.b:0 "Their demands go too far."
 china_wr.185.t:0 "Demand for Expanded New Weapons Funding"
 china_wr.185.d:0 "Military leaders believe that existing equipment and doctrines are increasingly mismatched with the realities of the civil war. As the conflict stagnates, technological gaps in firepower, communications, artillery coordination, and mechanized support are seen as potentially decisive weaknesses.\n\nThe military therefore demands a substantial expansion of funding for the development, testing, and procurement of new weapon systems."
 china_wr.185.a:0 "Grant their demands."
 china_wr.185.b:0 "Their demands go too far."
 china_wr.186.t:0 "Demand for Expanded Military Autonomy"
 china_wr.186.d:0 "The military argues that greater autonomy within the command structure is necessary to ensure operational speed and flexibility. Officers frequently cite the German mission-type command system as a model, emphasizing a structure in which higher command sets objectives while lower commanders exercise tactical discretion.\n\nWhile such a system may improve battlefield responsiveness, it also raises concerns regarding the balance between military authority and political oversight."
 china_wr.186.a:0 "Grant their demands."
 china_wr.186.b:0 "Their demands go too far."
 china_wr.187.t:0 "Demand for Expanded Supreme Command Authority"
 china_wr.187.d:0 "The military insists that under the exceptional conditions of civil war, broader authority must be granted to the supreme command. Delays in operational decisions, logistics, and personnel management are increasingly viewed as threats that could lead to frontline collapse.\n\nAccordingly, the military demands that, for the duration of the war, supreme command be granted expanded authority over mobilization and overall military administration."
 china_wr.187.a:0 "Grant their demands."
 china_wr.187.b:0 "Their demands go too far."
 china_wr.188.t:0 "Demand for Expanded Military Judicial Authority"
 china_wr.188.d:0 "The military emphasizes that discipline and rear-area stability are essential to successful wartime operations, and therefore demands expanded military judicial authority. There is widespread frustration that handling cases of insubordination, wartime crimes, and military corruption through civilian courts causes excessive delays.\n\nThe military argues that extending the scope of military courts to specific categories of cases is necessary to maintain internal order swiftly and effectively."
 china_wr.188.a:0 "Grant their demands."
 china_wr.188.b:0 "Their demands go too far."
 china_wr.189.t:0 "Renewing Party Media"
 china_wr.189.d:0 "The Progressive Party has long preserved the conservative republican views that were widely held among the intellectual elders of its era. At the same time, within the party there has existed a younger generation inheriting the intellectual lineage from Liang Qichao to Cai E, seeking to advance the Republic through institutions and the rule of law. These members maintain distance from radical leftist currents, and unlike the Progressive Kuomintang Left that has preempted more radical agendas, they define democratic socialism as the furthest limit of their leftward orientation.\n\nCai E clearly recognizes this dual character of the party. He holds that politics should not rest upon personal glorification or emotional agitation, but upon the clear articulation of republican principles and an idealistic Chinese nationalism. This nationalism is not founded upon exclusionary violence, but upon an order that incorporates ethnic minorities as equal members of a single political community of the Republic. Renewing party media is thus understood as a measure to make this orientation explicit, and to present clearly to the public what the Progressive Party truly stands for."
 china_wr.189.a:0 "Affirm the principles of the Republic."
 china_wr.190.t:0 "Reordering Parliamentary Procedure"
 china_wr.190.d:0 "Since the founding of the Republic, parliament has been expected to establish itself as the core legislative institution, yet in practice it has long remained mired in political confrontation and procedural disorder. The discretionary authority of the presiding officers of both chambers, originally intended as an exceptional measure for emergencies, has increasingly been used for political convenience. As a result, deliberation and review have been reduced to formalities, and trust within the legislature has steadily eroded.\n\nFurthermore, physical confrontations and disruptions within parliament have become recurrent. Under the pretext of blocking or forcing legislative action, some legislators have resorted to violence, undermining the legislative process itself. Rushed lawmaking has taken root as a substitute for deliberation and consensus, placing the legitimacy and stability of legislation under serious question.\n\nAt the same time, the issue of legislators holding secondary occupations has weakened the independence of the legislature. As ties between lawmakers and the executive branch, economic interests, or local power structures have accumulated, public perception has grown that legislation serves particular interests rather than the common good. This has further diminished confidence in parliament as a representative institution.\n\nIn response to these accumulated problems, the administration and a majority within parliament are undertaking a systematic reorganization of parliamentary procedure. The conditions under which presiding officers may force items onto the agenda are being clearly restricted to prevent exceptional measures from becoming routine. Violence within the legislature is being explicitly prohibited, restoring the assembly as a space for debate rather than physical confrontation. Procedural shortcuts are being institutionally blocked to ensure that all legislation follows established rules.\n\nIn addition, the introduction of an unlimited debate system is ensuring that minority opinions can be fully expressed within the institutional framework, reaffirming the principle that deliberation must precede decision-making. Simultaneously, banning secondary occupations for legislators is reinforcing the independence of the legislature from external influence.\n\nThese measures are understood as an effort to reestablish parliament not as an arena of conflict, but as a forum of deliberation in which the direction of the Republic is determined through institutions and procedure."
 china_wr.190.a:0 "Establish parliamentary order through institutional reform."
 china_wr.191.t:0 "Reform of the Senate Election System"
 china_wr.191.d:0 "Since the founding of the Republic, the Senate has been designed as an institution responsible for prudence and balance in the legislative process, yet its method of selection has long revealed structural limitations. As senators have been chosen through indirect elections, the body has increasingly reproduced the interests of provincial governments, local notables, and established political forces rather than directly reflecting the popular will.\n\nUnder this structure, the Senate has come to operate less as an upper chamber and more as a mechanism for coordinating entrenched interests. Some senators rely on specific provincial governments or political forces in the course of their selection, leading to criticism that the popular mandate formed in the lower house is being institutionally constrained. The perception that the Senate delays reform rather than providing deliberation has become a burden on republican politics.\n\nThe administration and reformist elements judge that the root of these problems lies in the method of selection itself. Indirect election obscures the attribution of responsibility and encourages the Senate to represent limited political circles rather than the citizenry as a whole. Accordingly, while preserving the authority of the Senate, there is a growing demand to reconstruct its legitimacy.\n\nThe government is therefore reforming the Senate election system along the lines of the American Senate model. Each region is recognized as an independent political unit in the selection of senators, with the process institutionalized through clearly defined legal procedures and terms of office. Through this reform, the Senate is being transformed into a body that represents regional interests without being subordinated to provincial administrations or executive power."
 china_wr.191.a:0 "A step closer toward genuine democracy."
 china_wr.192.t:0 "Establishing the Independence of the Judiciary"
 china_wr.192.d:0 "Since the founding of the Republic, the judiciary has been expected to function as the core institution of the rule of law, yet in practice it has remained insufficiently free from the influence of the executive and local power structures. In several provinces, local authorities and entrenched elites have intervened in judicial proceedings, leading to accumulated criticism that legal judgments are shaped by political considerations or administrative convenience rather than by law and evidence.\n\nSuch conditions undermine the fundamental republican principle of equality before the law. When courts cannot exercise independent judgment, the law ceases to protect citizens and instead becomes a tool of those who wield power. As a result, public confidence in legal redress has eroded, weakening the overall legitimacy of the republican system.\n\nThe administration judges that judicial independence can no longer be postponed. Institutional safeguards are being established to block executive interference in judicial appointments and court proceedings, ensuring that the judiciary operates solely on the basis of statutes and legal procedure. Through these measures, the influence previously exercised by provincial governments and political forces over the courts is being systematically reduced.\n\nThis reform is not intended to elevate the judiciary as a rival authority to the executive, but is understood as a necessary step to preserve the stability of the Republic's legal order. Judicial independence forms the institutional foundation for demonstrating that the law is applied equally to all citizens of the Republic."
 china_wr.192.a:0 "Through reform upon reform."
 china_wr.193.t:0 "Responding to the Control of Provincial Assemblies"
 china_wr.193.d:0 "As provincial assemblies and local autonomy are being reorganized, another problem has come to the surface. Certain local notables are attempting to retain effective control over provincial assemblies by relying on established networks, financial resources, and social influence. While outwardly accepting institutional reform, they are using electoral district structures and local power bases to preserve their positions.\n\nIf this situation persists, reform of the provincial assemblies risks becoming purely formal, with local politics once again subordinated to the interests of a small group of elites. The central government judges that more decisive action is required if provincial assemblies are to function as genuine representative institutions.\n\nWithin the administration, opinions are divided over how to respond. One view advocates cooperation with legal political parties, including the Public Interest Party, to reorganize electoral districts and dilute the influence of local notables through institutional means. Proponents argue that strengthening party politics will naturally reshape local power relations.\n\nAnother view holds that institutional measures alone are insufficient. From this perspective, local notables have already entrenched themselves within administration and public order, and only the deployment of military forces to decisively eliminate their power can reestablish authority over the provincial assemblies.\n\nThe central government now faces a critical decision that will shape the future course of local politics."
 china_wr.193.a:0 "Reorganize electoral districts in cooperation with political parties"
 china_wr.193.b:0 "Deploy the military to eliminate local notables"
 china_wr.194.t:0 "The Final Measure for Reform"
 china_wr.194.d:0 "The central government has pursued a sequence of reforms, including the reorganization of provincial assemblies, the adjustment of local autonomy, and the restructuring of electoral districts and political order. Yet it has concluded that no reform can be fully completed so long as the administrative apparatus responsible for implementation remains bound to outdated personnel structures.\n\nProvincial bureaucracies have become rigid through long-standing practices and networks of affiliation, revealing clear limits in their ability to absorb and execute the central reform agenda. This personnel stagnation has obstructed administrative circulation and prevented reform outcomes from taking root at the local level.\n\nThe administration now judges that further incremental adjustments or partial measures are no longer sufficient to fundamentally transform the administrative order. To complete the reform process, direct reorganization of the administrative core is deemed unavoidable.\n\nAccordingly, the central government is replacing key provincial posts with officials dispatched from the center. This action is not a compromise, but is understood as the final stage required to complete republican reform. These officials administer according to law and institutional procedure, reconstituting provincial governments as organs capable of fully implementing central reform policy.\n\nThrough this measure, the central government makes clear that the circulation of local administration is being fully restored and that reform has entered an irreversible stage."
 china_wr.194.a:0 "Complete the reform"
 china_wr.195.t:0 "The Meaning of Replacing Old Customs through Aesthetic Education"
 china_wr.195.d:0 "Cai Yuanpei is articulating a clear position on what is required for society within the Republic to move beyond pre-modern customs. The concept of replacing old customs through aesthetic education is not presented as a rejection of tradition by force, but as an educational transformation that reshapes social emotions and sensibilities.\n\nCai Yuanpei explains that old customs are not merely matters of institutions or rules, but are deeply rooted in emotional patterns and aesthetic perceptions formed over long periods of time. Coercive reform, in his view, produces resistance and backlash, whereas genuine change must begin with a transformation of sensibility and values.\n\nReplacing old customs through aesthetic education seeks to substitute decadent and rigid emotional structures with new forms of social feeling. Through music, art, and literature, aesthetic education is being employed to cultivate individual character and restore a sense of community, allowing outdated customs to gradually lose their influence.\n\nThis approach does not aim to eliminate old customs overnight, but instead works to weaken their hold in a gradual and sustainable manner. Cai Yuanpei's explanation clarifies that enlightenment must proceed through transition rather than rupture, establishing aesthetic education as a cultural foundation for reform within the Republic."
 china_wr.195.a:0 "Transform society through aesthetic education."
 china_wr.196.t:0 "Defining the Chinese Nation"
 china_wr.196.d:0 "Although the Republic of China has been established as an institutional state, the Chinese nation that must sustain it remains incomplete. The state exists in form, yet the sense of a unified political community has not fully taken shape, and national consciousness continues to appear fragmented.\n\nThe administration and the Progressive Party judge that the endurance and advancement of the state cannot rest on institutions alone. For the Republic to achieve lasting stability, a civic concept of the nation grounded in law and constitutional order must be clearly defined. In this regard, the New Generation Enlightenment Program is assuming a role that goes beyond social reform, serving as a framework for redefining the Chinese nation itself.\n\nThis vision consciously inherits the spirit of Liang Qichao, who first articulated the idea of the Chinese nation in systematic terms. Liang Qichao understood nationhood not as a matter of blood or locality, but as a community formed through shared history, responsibility, and a collective commitment to the future. Within this framework, the Chinese nation is conceived not as an exclusive group, but as a civic community advancing together.\n\nThrough the New Generation Enlightenment Program, this understanding is being disseminated throughout society. Education, culture, and political participation are binding people of diverse regions and backgrounds into a shared identity, fostering the awareness that four hundred million Chinese people are moving forward along a common path.\n\nThe Republic of China is thus transitioning from a state that merely exists to a nation that defines itself. The New Generation Enlightenment Program is becoming the point of departure for defining the Chinese nation."
 china_wr.196.a:0 "Define the Chinese nation through the New Generation Enlightenment Program."
 china_wr.197.t:0 "Debating Full Universal Suffrage"
 china_wr.197.d:0 "The administration and the legislature are actively discussing the introduction of full universal suffrage in order to advance the political order of the Republic by another step. While a limited electoral system has provided institutional stability, demands to broaden the scope of political participation have steadily accumulated.\n\nAlthough a broad consensus has formed around the principle of universal suffrage, diverse opinions are being raised regarding specific criteria such as the voting age. An age set too low raises concerns about political maturity, while a higher threshold conflicts with the objective of expanding participation.\n\nAccordingly, the government is confirming the direction toward full universal suffrage first, while deciding to address the question of the voting age through separate deliberation at a later stage."
 china_wr.197.a:0 "Toward genuine democracy."
 china_wr.198.t:0 "Determining the Voting Age"
 china_wr.198.d:0 "As the introduction of full universal suffrage becomes imminent, a decision on where to set the voting age is now required. The voting age is recognized as a key standard that shapes the balance between political participation and social stability.\n\nThe government and the legislature are examining the implications and consequences of different age thresholds and are now faced with the task of selecting the option most appropriate to the circumstances of the Republic."
 china_wr.198.a:0 "Set the voting age at 19"
 china_wr.198.b:0 "Set the voting age at 20"
 china_wr.198.c:0 "Set the voting age at 21"
 china_wr.199.t:0 "Proclamation of Full Universal Suffrage"
 china_wr.199.d:0 "After weeks of deliberation, the voting age has been set at [GetAgeVote], and the government has finally proceeded to officially proclaim the implementation of full universal suffrage. This measure is understood as a comprehensive opening of political participation that had previously been restricted by specific conditions or qualifications.\n\nThe government states that universal suffrage is not merely a change in procedure, but a declaration recognizing all citizens of the Republic as active members of the political community. Through this proclamation, political rights and responsibilities are being extended across society, and the political order of the Republic is entering a new stage."
 china_wr.199.a:0 "At last!"
 china_wr.200.t:0 "The New Women Movement"
 china_wr.200.d:0 "As education and enlightenment policies expand, perceptions of women's social roles are also changing. The New Women Movement seeks to move women beyond confinement to household and custom, positioning them as active participants in the society of the Republic. The government is now reviewing concrete measures to institutionally support the advancement of women's rights."
 china_wr.200.a:0 "Women, too, are human beings."
 china_wr.201.t:0 "Expansion of Women's Education"
 china_wr.201.d:0 "The government is expanding access to education in order to institutionally support women's participation in society. Educational opportunities that were previously limited are being gradually opened, and women's education is increasingly recognized as a foundation for improving overall literacy and social capacity.\n\nThrough education, women are gaining access to new professions and roles, contributing to the expansion of human resources within the Republic."
 china_wr.201.a:0 "Education is the starting point of participation"
 china_wr.202.t:0 "Reform of Women's Legal Status"
 china_wr.202.d:0 "The government is clarifying the legal status of women across civil law and administrative institutions. Previous practices left women's rights ambiguous, creating gaps in institutional protection.\n\nThe reform of legal status is understood as formally embedding women's rights and responsibilities within the legal framework, marking a concrete step toward equality before the law."
 china_wr.202.a:0 "The law must apply equally to all"
 china_wr.203.t:0 "Institutionalizing Women's Employment"
 china_wr.203.d:0 "The government is institutionally encouraging women's participation in the workforce. Expanded employment opportunities and the reduction of discriminatory practices are enabling greater economic independence among women, contributing to stability at both household and societal levels.\n\nWomen's labor participation is regarded not as a temporary measure, but as a long-term component of economic development within the Republic."
 china_wr.203.a:0 "Labor knows no gender"
 china_wr.204.t:0 "Women's Political Participation"
 china_wr.204.d:0 "The expansion of political participation is recognized as a central stage in advancing women's rights. Women are gradually entering public decision-making processes, broadening the scope of political representation.\n\nThe government assesses that women's political participation strengthens social consensus rather than undermining institutional stability."
 china_wr.204.a:0 "Politics concerns everyone"
 china_wr.205.t:0 "Nationwide Armed Uprising"
 china_wr.205.d:0 "As the Sichuan civil conflict drags on, political tensions in the capital have finally reached a breaking point and erupted. Hardline elements within the Kuomintang now denounce the Sichuan crisis as 'clear proof of the government's incompetence,' insisting that neither negotiations nor electoral procedures can restore order to the Republic.\n\nAt dawn today, leading Kuomintang generals and several provincial organizations simultaneously declared armed defiance against the central government. In their proclamation, they asserted that 'fraud and manipulation disguised as constitutionalism and public will have poisoned the heart of the nation,' and that they were launching 'an unavoidable action to set the country right.'\n\nReports of armed clashes are spreading across multiple regions, and several cities are believed to have already fallen under the effective control of Kuomintang-aligned forces. The central government has condemned the movement as an unmistakable rebellion and has begun preparations for an immediate military crackdown.\n\nWhat began as the embers of conflict in Sichuan has now exploded into a nationwide civil war. The Republic once again stands on the brink of division."
 china_wr.205.a:0 "China will be stained with blood."
 china_wr.205.b:0 "For the Kuomintang!"
 china_wr.206.t:0 "Guangdong Province Declares Its Accession to the National Revolutionary Government"
 china_wr.206.d:0 "Li Zongren, who led the 7th Army of the National Revolutionary Army across the Pearl River from Guangxi Province and entered Guangzhou last month, officially announced this morning that Guangdong Province has joined the National Government. He further declared that he himself and the forces under his command will fight to the very end to complete the National Revolution.\n\nImmediately following Li Zongren's declaration of accession to the National Government, the 7th Army of the National Revolutionary Army, which had previously restricted political activities in Guangzhou under the pretext of maintaining public order, formally banned all political activities within Guangdong Province except those of the Kuomintang. Simultaneously with the announcement of this prohibition, the 7th Army dissolved the provincial assembly at once and raided the Public Interest Party headquarters in Guangzhou, arresting all party members and staff who had remained in the city.\n\nMost other minor political organizations besides the Public Interest Party were likewise dismantled, and legislators and officials of the Guangdong provincial government who refused to swear loyalty to Li Zongren personally were also arrested. As a result, the entirety of Guangdong Province has come under the control of Li Zongren's 7th Army."
 china_wr.206.a:0 "Is this what the Kuomintang clique calls a 'revolution'?"
 china_wr.206.b:0 "The birthplace of the revolution is with us!"
 china_wr.207.t:0 "Jiangxi and Zhejiang Join the National Revolutionary Government"
 china_wr.207.d:0 "This evening, the leadership of Jiangxi Province and Zhejiang Province, where support for the Kuomintang has traditionally been strong, signed a declaration to join the National Revolutionary Government with near-unanimous consent. Shortly thereafter, the Jiangxi provincial forces, taking advantage of confusion within the chain of command, surrounded government army garrisons stationed in Jiangxi that had remained immobilized due to disarray and demanded their surrender. Most units complied with the provincial forces' demands and laid down their arms, though some formations refused to surrender and engaged the provincial forces in combat.\n\nSuddenly facing an overwhelming numerical disadvantage, the government forces abandoned the prospect of a full-scale confrontation and withdrew into the complex mountainous terrain of Jiangxi. The firepower of the Jiangxi provincial forces is insufficient to annihilate the government troops who have taken refuge behind the rugged terrain of the Tiantai Mountains. As a result, guerrilla warfare in the Tiantai mountain range is expected to become a prolonged and arduous struggle that cannot be resolved in the short term."
 china_wr.207.a:0 "Fight to the end for the Republic!"
 china_wr.207.b:0 "In the end, they are nothing more than a handful!"
 china_wr.208.t:0 "Hunan Province Joins the National Revolutionary Government"
 china_wr.208.d:0 "Following Wuhan's accession to the National Government, Hunan Province—deeply influenced by developments there—was widely regarded as all but certain to follow suit. However, Zhao Hengti, the Hunan provincial chairman and a committed federalist, repeatedly exercised his veto to block Hunan's accession to the National Government.\n\nZhao Hengti, who had sheltered members of the Public Interest Party fleeing from Guangzhou and had increasingly sharpened his confrontation with the National Government, was overthrown in the early hours of today by a coup carried out by Kuomintang-affiliated young officers within the Hunan provincial forces. He narrowly escaped Hunan with a small contingent of guards.\n\nAlthough protests and condemnations by Hunan residents who supported Zhao Hengti—who had come to power through what they consider legitimate procedures—are continuing day after day, the Hunan National Revolutionary Military Government is responding with an unyielding hardline approach."
 china_wr.208.a:0 "Zhao Hengti will return to Hunan!"
 china_wr.208.b:0 "Welcome, young comrades, to the ranks of the National Revolution!"
 china_wr.209.t:0 "Fujian Province Declares Support for Peking"
 china_wr.209.d:0 "The flames of revolution ignited in Nanking swept across the southern provinces, and in time reached Fujian Province, isolated by the Wuyi Mountains along the southeastern coast. The National Government had assumed that Fujian, like other provinces before it, would naturally join the ranks of the revolution. Contrary to these expectations, however, the Fujian provincial government officially rejected the National Government's request for accession.\n\nThe National Government remained optimistic, believing that as long as public sentiment favored the revolution, Fujian would eventually join—whether through the capitulation of its leadership under pressure or through an 'uprising' by young officers. Yet the major coastal cities of Fuzhou and Amoy were not strongholds of Kuomintang support. More importantly, when Sa Zhenbing, leader of the Min Navy clique and former governor who effectively dominated Fujian, publicly criticized the Kuomintang, public opinion within the province turned decisively away from the party.\n\nTwo days after Sa Zhenbing issued his statement of criticism, the incumbent provincial chairman Yang Shuzhuang declared his full support for the central government in Peking. Mobilization orders were immediately issued to all provincial forces, and military tensions surrounding Fujian continue to escalate with no sign of abating."
 china_wr.209.a:0 "Truly, to emerge unstained from the mire."
 china_wr.209.b:0 "Very well—then it is war."
 china_wr.210.t:0 "The National Revolutionary Army Invades Fujian!"
 china_wr.210.d:0 "After Fujian Province refused to join the National Revolutionary Government and instead declared its support for the central government in Peking, frequent border skirmishes rapidly escalated into full-scale war. The fighting has taken the form of repeated cycles in which National Revolutionary Army units and militias surge forward in disorder, only to be resisted by the Fujian provincial forces, which eventually withdraw under overwhelming numerical and material disadvantage.\n\nAs the National Government's supply lines stretched along Fujian's rugged mountain ranges and advances stalled due to concerns over naval gunfire, the offensive lost its momentum. Although the front has entered a temporary lull, tensions remain high. The National Revolutionary Army has already occupied roughly half of Fujian Province and continues to maintain forces that decisively outmatch those of the provincial army.\n\nBefore the scars of the previous battles have even faded, the dark clouds of war once again loom over the skies of Fujian."
 china_wr.210.a:0 "We must do whatever it takes for Fujian."
 china_wr.210.b:0 "In the end, it is nothing more than an attempt to cover the sky with one's palm."
 china_wr.211.t:0 "Formation of the National Protection Army"
 china_wr.211.d:0 "After Yunnan Governor Tang Jiyao publicly criticized the National Revolutionary Government at a lecture supporting the Yunnan Military Academy last month and reaffirmed Yunnan's loyalty to the central government, Yunnan has worked to draw in Guizhou and Guangxi—both similarly lukewarm toward the National Revolution—into a defensive mutual assistance alliance.\n\nUntil recently, the provincial governments of Guizhou and Guangxi had been highly reluctant to join, arguing that forming such an alliance could unnecessarily provoke the National Government. However, the coup by young officers in Hunan and the National Revolutionary Army's invasion of Fujian made it clear that the National Government had no intention of tolerating ambiguous neutrality. Faced with this reality, Guizhou and Guangxi ultimately joined what came to be known as the National Protection Army.\n\nAlthough the National Protection Army proclaims itself the 'United Southwestern Provinces,' power in Guangxi and Guizhou remains extremely decentralized, leaving Yunnan's provincial forces as the only truly effective component. As a result, its offensive capability is assessed as limited. Nevertheless, with more than 100,000 troops under arms, it is evident that the force will pose a significant threat to the National Revolutionary Army's execution of the Northern Expedition."
 china_wr.211.a:0 "Tang Jiyao is a loyal defender of the Republic!"
 china_wr.211.b:0 "Bandits living off the blood of the people remain bandits, no matter how many gather."
 china_wr.212.t:0 "Launch of the Wuhan Offensive"
 china_wr.212.d:0 "Having completed its reorganization around Wuhan, the Government Army initiates an offensive aimed at securing dominance along the middle reaches of the Yangtze River. Wuhan stands at the intersection of key railways and waterways, and control over the region bears directly upon the broader balance of the front. Concentrated artillery and engineering units are deployed to expand bridgeheads and apply pressure on adjacent strongpoints in successive stages. Initial advances are achieved in certain sectors; however, extended supply lines along the riverbank place increasing strain on troop movements and coordination. The front becomes fluid, and the outcome appears unlikely to be determined in the short term."
 china_wr.212.a:0 "Maintain the offensive."
 china_wr.212.b:0 "Defence!"
 china_wr.213.t:0 "Failure of the Wuhan Offensive"
 china_wr.213.d:0 "The Government Army's offensive launched from Wuhan encounters unexpectedly strong resistance from Kuomintang forces. Urban districts and surrounding strongpoints have been fortified in advance, and the National Revolutionary Army employs mobile detachments to exert constant pressure on the flanks and rear. Advancing along the Yangtze corridor, Government units are subjected to concentrated fire and coordinated counterattacks, leading to increasing disorganization within the ranks. The plan to break through Wuhan in a swift campaign falters, and the high command orders a halt to offensive operations in order to prevent further losses. Control over the middle Yangtze remains contested."
 china_wr.213.a:0 "Reform the lines."
 china_wr.213.b:0 "They shall not pass!"
 china_wr.214.t:0 "Central Government Forces Retake Anqing"
 china_wr.214.d:0 "Approximately one month after pro-Kuomintang militias seized parts of Anqing City, the militias ultimately collapsed under the offensive of the central government forces. Lacking sufficient stockpiles of ammunition and food, the militias were unable to sustain organized resistance against the central government troops, which succeeded in retaking Anqing with minimal casualties. With the clearing of a school building where the last pockets of resistance had taken shelter, the government forces completed the recapture of Anqing, and only a very small number of militia members managed to flee across the river into Kuomintang-held territory.\n\nIn announcing the victory at Anqing, a representative of the government military leadership expressed an optimistic outlook, stating that 'Nanjing will be retaken within the next three months,' and further announced that 'the government military leadership is immediately formulating offensive operations aimed at recapturing Wuhan.' During these announcements, the extensive civilian casualties incurred during the recapture of Anqing were not officially disclosed."
 china_wr.214.a:0 "Looks like we might be home before the Spring Festival."
 china_wr.214.b:0 "This is nothing more than a temporary setback for a greater advance."
 china_wr.215.t:0 "The Need for Comprehensive Constitutional Reform"
 china_wr.215.d:0 "Since the founding of the Republic of China, our Constitution has served as a sturdy pillar supporting Asia's first republic. However, as times have changed, the limitations of the Constitution enacted in the early days of the nation have become increasingly clear. The current Constitution excessively guarantees the powers of the executive branch for the sake of early national stability, leading to criticisms that it is too rigid and authoritarian to capture the dynamism of a highly developed modern mass democracy. Voices within the political sphere, including the National Assembly and civil society, have grown louder by the day, demanding the establishment of a completely new constitutional system befitting a mature democratic state, going beyond mere amendments to a few clauses. The time has come to respond to the demands of the era."
 china_wr.215.a:0 "A patchwork cannot hold the future of the Republic. Enact a new Constitution from scratch!"
 china_wr.215.b:0 "We cannot recklessly shake the foundation of the state. Maintain the existing Constitution but excise the toxic and ambiguous clauses."
 china_wr.216.t:0 "Debate over the Composition of the Constitutional Drafting Committee"
 china_wr.216.d:0 "As the declaration of comprehensive constitutional reform was made and the time approached to form the Constitutional Drafting Committee to write the new document, the political circles in Peking transformed into an arena of fierce debate over what blueprint to draw on the blank slate. The right-wing and conservative intellectuals in the National Assembly emphasized that the Constitution is the most fundamental framework supporting the state. They argued that a sophisticated and flawless legal logic, untainted by the populism of the masses, is essential, and raised their voices to demand that the drafting be entirely entrusted to renowned constitutional scholars and elite political scientists. On the other hand, the progressive factions and civil society thought differently. They insisted that the Constitution is not a mere legal text but a grand social contract of the people who compose the Republic. Therefore, they contended that the committee should not be filled only with a small number of experts, but should be broadly composed of representatives from all walks of life and various political factions, with legal scholars merely refining their voices."
 china_wr.216.a:0 "The Constitution is the reason of the state and a sophisticated legal logic. Entrust the draft to the top experts."
 china_wr.216.b:0 "The Constitution is completed by the consensus of the people. Include representatives from all walks of life in the committee."
 china_wr.217.t:0 "Defining the Status and Authority of the Grand President"
 china_wr.217.d:0 "The most central issue facing the Constitutional Drafting Committee was undoubtedly how to define the status of the Head of State. From the early days of the founding until now, the Grand President has exercised immense power as the focal point of the nation. The right-wing and conservative camps argued that a powerful executive Grand President, holding the powers of administration, military command, and emergency authority in both hands, is essential to govern the vast continent and respond swiftly to the rapidly changing international situation. For them, the chief executive of state affairs signifies firm leadership. However, the resistance from liberals and intellectuals, led by Hu Shih, was also formidable. They criticized the current powers of the Grand President as reaching a monarchical level and insisted that the Grand President should remain a coordinator of state affairs and a symbolic Head of State to prevent the abuse of executive power, with actual power being distributed to the National Assembly and the Cabinet."
 china_wr.217.a:0 "Strong and clear leadership is needed to navigate the waves of troubled times."
 china_wr.217.b:0 "Excessive concentration of power only breeds corruption. Drastically reduce the powers of the Grand President."
 china_wr.218.t:0 "Establishment of the Status of Provincial Governments"
 china_wr.218.d:0 "How much authority to grant to the provincial governments that oversee the vast regions under the Republic of China system is a critical issue that determines the administrative efficiency of the Republic. Bureaucrats who emphasized centralized administration and the mainstream factions within the ruling party argued that a Provincial Governor should strictly remain an administrative officer who delivers and executes the orders of the central government to each region. They believed that the consistency of national policy and administrative unity should take precedence over any right to autonomy. However, the federalists, including the Zhigongdang, and representatives of each region demanded a compromise. They argued that uniform governance ignoring the unique historical and economic contexts of each province is impossible, and that the inherent powers of the provincial governments should be recognized by the Constitution, with limited legislative power, such as the right to enact ordinances, being guaranteed for efficient provincial management."
 china_wr.218.a:0 "The Republic of China is one and indivisible. Establish the unity of provincial administration."
 china_wr.218.b:0 "Localities know their own affairs best. Guarantee limited autonomy and legislative rights for each province."
 china_wr.219.t:0 "Accountability of the Cabinet and National Administration"
 china_wr.219.d:0 "As the outline of the Constitution took shape, discussions on to whom the Cabinet, the core of the executive branch, should be responsible were brought to the table. Those advocating for the strong powers of the Grand President argued that the Cabinet must function strictly as the arms and legs of the Grand President. To maintain the continuity and stability of national administration, they insisted that the Cabinet should be responsible only to the Grand President and that the National Assembly's right to a motion of no confidence should be strictly restricted constitutionally to prevent the legislature from recklessly shaking the Cabinet. Conversely, parliamentarians presented a completely different blueprint. They insisted that all cabinet officials, except for the Grand President and Vice President who are elected through direct elections, should rely entirely on the confidence of the National Assembly, the representative body of the people. This clause, stating that the Cabinet must resign immediately if it receives a vote of no confidence from the National Assembly, would be the most powerful and democratic control mechanism over the executive branch."
 china_wr.219.a:0 "The continuity and firmness of administration is the national strength. The Cabinet only assists the Grand President."
 china_wr.219.b:0 "The Cabinet must be responsible before the people's representative body. Stipulate the National Assembly's right of no confidence."
 china_wr.220.t:0 "Discussion on Reform of the Electoral System for the National Assembly"
 china_wr.220.d:0 "As the framework of the new Constitution was established, the question of how to allocate seats in the National Assembly, which speaks for the will of the people, emerged as the hottest topic in Peking politics. Conservative and mainstream parties prioritized the stability of the political situation. They argued that the electoral system should be reorganized around a single-member district system, where only one winner is produced in each constituency. Their logic was that the proliferation of minor parties must be prevented and power must be clearly given to the majority party so that the executive can conduct consistent and stable national administration. On the contrary, minor parties and progressive camps protested strongly. They criticized the current system, where numerous votes not cast for the first-place candidate become wasted votes, as something that cannot be seen as true democracy. They insisted that only by significantly expanding the proportional representation system, which allocates seats in proportion to the party's vote share, can the diverse voices of a pluralized society enter the legislature and reflect the true will of the people."
 china_wr.220.a:0 "Political stability is the security of the nation. Guarantee the responsible politics of the majority party."
 china_wr.220.b:0 "No vote should be discarded. Expand proportional representation to ensure the entry of minorities into the legislature."
 china_wr.221.t:0 "Debate over the Legislative and Veto Powers of the Senate"
 china_wr.221.d:0 "Following the issue of the National Assembly, the task of redefining the role of the Senate, the upper house, also sparked fierce debate in Peking. Progressives and reformers emphasized that the Constitution must keep pace with the speed of modern mass society. They argued that while the Senate should deliberate on the legislation of the National Assembly, its veto power should be strictly limited. They contended that only by creating a weak Senate that functions as a consultative and deliberative body, like the British House of Lords, can the legislation of the lower house, which contains the demands of the masses, be processed quickly and efficiently. However, the views of the elite and conservatives were entirely different. They firmly believed that the Senate must thoroughly check the National Assembly to prevent populist legislation swept away by the frenzy of the masses. They maintained a hardline stance that the Senate must maintain legislative power equal to the National Assembly and a strong right to veto laws, like the United States Senate, to ensure the necessary prudence in the legislative process that will decide the fate of the nation."
 china_wr.221.a:0 "The center of legislation is the people's representative, the National Assembly. Reduce the veto power of the Senate."
 china_wr.221.b:0 "Legislation without prudence is a national disaster. Guarantee the strong veto power of the Senate."
 china_wr.222.t:0 "Defining the Election Method for the Senate"
 china_wr.222.d:0 "As the setting of the Senate's authority entered its final stage, the Constitutional Drafting Committee faced the final challenge: Who will elect the Senate, and how? Scholars and politicians who valued the existing order believed that the Senate should possess its own unique expertise and experience, distinct from the National Assembly. Therefore, they argued that the indirect election system, where representatives of each functional group or provincial assemblies elect them, should be improved and maintained. They believed that rational judgment, untainted by populism, would be possible only if elites from all walks of life and local notables were stationed in the Senate. Conversely, radicals and liberals who placed absolute faith in democracy dismissed this proposal as a means for the establishment to maintain power. They declared that any position dealing with the laws of the nation must come from the hands of the people without exception. The position that the Senate should also be elected through direct elections by the people to grant clear democratic legitimacy is heating up the squares and media of Peking."
 china_wr.222.a:0 "Experience and expertise are the essence of the upper house. Maintain the elite indirect election system."
 china_wr.222.b:0 "All power comes from the ballots of the people. The people must also directly elect the Senate."
 china_wr.223.t:0 "Defining the Character of Fundamental Rights and the Legal System"
 china_wr.223.d:0 "As the discussions in the Peking Constitutional Drafting Committee moved from the framework of the state to issues directly related to the lives of the people, a fierce legal debate ensued over how to define the character of fundamental rights. The ruling party and conservative legal scholars supported a civil law order referencing Germany. While they agreed that the state's Constitution should guarantee the fundamental rights of the people, they firmly believed that the maintenance of national order and public welfare should always take precedence. In other words, their logic was that the freedom of the people is allowed only within the scope determined by law, and the state must be able to legally restrict it in crisis situations. However, the backlash from liberals led by Hu Shih and the progressive camp was fierce. They slammed the legal reservation clauses, which allow the state to restrict freedom whenever it wishes, as the seeds of statism. They insisted that the freedoms and rights of the people should be specified as inalienable and sacred rights granted by heaven, following the common law tradition, to minimize state interference and maximize individual freedom."
 china_wr.223.a:0 "Freedom is guaranteed within the framework of the law. National order and public welfare come first."
 china_wr.223.b:0 "The rights of the people are a sacred sanctuary granted by heaven. Minimize the interference of the state."
 china_wr.224.t:0 "Locus of Military Command and the Principle of Civilian Control"
 china_wr.224.d:0 "For a republic that has passed through the era of empire and blood and iron, the question of who will control the gun barrels is directly linked to the survival of the system. Politicians in Peking are trying to place a clear constitutional shackle on the military so that armed force never threatens democracy again. The conservative right, aiming for a strong state, demanded a system directly under the Grand President. They argued that, like the military in the Bismarckian system, the Grand President, as the Head of State, should also be the Generalissimo and hold both military command and administration to maximize the efficiency of national defense. On the other hand, parliamentarians countered that the military should be demoted to a mere department under the executive branch, and that thorough civilian supremacy should be specified in the Constitution. Their position is that the Minister of Military Affairs should thoroughly control the military to block any arbitrary action. Amid this sharp confrontation, a pragmatic compromise was also proposed: while recognizing the expertise of professional soldiers loyal to the republic, such as General Wu Peifu, to lead the military, a position of Vice Minister of Military Affairs for Political Affairs from a civilian background should be newly established in the Constitution. This is a sophisticated checking mechanism where a civilian vice minister with powerful authority holds the personnel and budget of the military to thoroughly monitor the military leadership."
 china_wr.224.a:0 "The Grand President is the Generalissimo. Integrate command and administration to maximize defense efficiency."
 china_wr.224.b:0 "The military is but a department of the executive. Specify thorough civilian supremacy under the Cabinet."
 china_wr.224.c:0 "Respect the expertise of loyalist officers, but install a civilian Vice Minister to monitor the military."
 china_wr.225.t:0 "Promulgation of the New Constitution of the Republic of China"
 china_wr.225.d:0 "'The era of chaos has receded, and the age of constitutional governance has finally arrived. To call the new national constitution promulgated today by President [CHI.GetLeader] a mere legal code would be an understatement. While the past twenty years of the Republic's history have undeniably laid a lasting foundation built upon the blood and sweat of four hundred million citizens, it is also true that previous constitutions failed to fully address the gravity of our times, resulting in significant institutional shortcomings.\n\nToday, the President declared during the promulgation that the new constitution 'actively confronts the challenges of our current era that the old constitution failed to anticipate, while firmly clarifying previously ambiguous provisions.' It is reported that despite initial concerns from certain factions within the National Assembly, political parties reached an agreement out of broader national interest to support this historic promulgation.\n\nThe core of this new national constitution lies in clearly defining the President's authority, focusing on the symbolic role of the commander-in-chief and the duty to protect constitutional order. In particular, establishing precise standards for the cabinet system and the election laws of the House of Representatives—both of which were ambiguous under the previous system—is highly encouraging. The series of reforms regarding the Senate's legislative veto, election methods, and military command authority are also noteworthy. Yet, the most brilliant achievement is the guarantee of basic civil rights. The freedoms of residence, movement, speech, press, and association are now firmly enshrined, stipulating that they cannot be restricted except by explicit law, with the independence of the judiciary strictly protecting them. The people of the Republic have now transcended the status of mere subjects, reborn as citizens of a true republic.\n\nThe President emphasized through the official gazette that 'as the history of Western republics demonstrates, a constitution is not a favor granted by a monarch to his subjects, but a tool for the people to restrain the government to protect their own rights.' We look forward to washing away the shameful history once plotted by the southern Nationalists, anticipating that the roots of a true rule of law will firmly take hold...'\n\nLi Yunjing rubbed his eyes and set down the morning newspaper on his desk. Perhaps it was due to the academic passion he maintained from his days as a primary school principal in the south before the civil war; despite his wife's nagging, he simply could not stop studying the nation's political direction late into the night. The memory of fleeing with his family in utter confusion when the Nationalists entered Kwangtung felt like a distant past. The relief he felt when the Constitutional Protection Army marched south, reclaiming his farmland and home, was an emotion beyond words.\n\nLooking toward the bedroom of his son, Li Ka-shing, who was fast asleep, Li Yunjing fell into deep thought. He felt grateful that he was no longer a wanderer drifting through an ungoverned land, but living in a country where he could protect his son, family, and neighbors—a country where, even if not yet perfect, there remained an opportunity to correct past failures from within."
 china_wr.225.a:0 "All those who live in this world..."
 china_wr.2001.t:0 "Expansion of Regional Infrastructure"
 china_wr.2001.d:0 "As a result of ongoing administrative reforms and the redistribution of authority, regions are now able to pursue construction projects based on their own assessments of local needs. Rather than imposing uniform directives, the central government has adopted an approach that approves development according to regional conditions and priorities.\n\nAccordingly, some areas are expanding facilities to support industry and administration, others are reinforcing transportation and logistics networks, while elsewhere construction responds to military or social demands. These projects are not bound to a single purpose, but instead reflect the diverse realities faced by each region.\n\nThe government expects that such decentralized construction efforts will, over time, improve administrative efficiency and help mitigate regional disparities."
 china_wr.2001.a:0 "What is needed, where it is needed."
 china_wr.226.t:0 "Partial Easing of the Opium Problem"
 china_wr.226.d:0 "As health insurance administration is strengthened and access to medical services expands, the opium addiction problem is showing limited but tangible signs of easing. With the burden of treatment costs reduced, more individuals in certain areas are choosing to enter treatment, and severe cases of neglect and extreme incidents have declined compared to earlier periods.\n\nHowever, improved medical access alone does not immediately resolve broader instability in daily life. In rural communities and among the urban lower strata, opium remains a means of escape, and illegal distribution networks and entrenched practices persist in multiple regions."
 china_wr.226.a:0 "The measures must be sustained."
 china_wr.227.t:0 "A Clear Decline in Opium Addiction"
 china_wr.227.d:0 "With nationwide medical coverage and the expansion of public treatment systems, opium addiction is showing a clear downward trend across the country. Treatment and rehabilitation are increasingly conducted within formal institutions, and groups that once abandoned care due to economic constraints are entering the medical system.\n\nIn major hubs, signs of weakening distribution networks are being observed, and crime and social instability linked to addiction are easing as well. Nevertheless, residual problems remain, particularly in remote and border regions, making continued oversight and reinforcement necessary."
 china_wr.227.a:0 "The gains must be consolidated."
 china_wr.228.t:0 "Broad Resolution of the Opium Problem"
 china_wr.228.d:0 "As medical coverage, livelihood stabilization, and educational expansion reinforce one another over time, opium addiction is no longer being observed at a level that places sustained pressure on society as a whole. In most regions, treatment and rehabilitation have taken stable root, and addiction has entered a stage of exceptional-case management.\n\nIllegal distribution networks have significantly weakened, and practices that once relied on opium are rapidly receding. Remaining cases are increasingly contained within medical and administrative oversight, substantially disrupting the cycle through which illness and poverty fed into addiction."
 china_wr.228.a:0 "Structures to prevent relapse must be maintained."
 china_wr.229.t:0 "A Security Vacuum in the South"
 china_wr.229.d:0 "Although the Constitutional Protection Government has prevailed in open confrontation with the Kuomintang, order across the southern regions has yet to stabilize. Even after the collapse of the front, Kuomintang remnants and armed groups have dispersed into mountainous areas, the countryside, and around ports, reorganizing their forces. In some areas, raids on railways and roads, as well as sudden attacks on tax offices and police posts, continue without interruption.\n\nAdministrative vacuums have further deepened the breakdown of security. In districts where provincial command structures have faltered or officials have fled, taxation and policing are effectively paralyzed. Local strongmen, private militias, and criminal organizations have moved to fill the gap, threatening civilians. Residents may cooperate with the administration during the day, but fear retaliation from armed groups at night, leaving intelligence networks difficult to restore.\n\nIf this situation is left unaddressed, the southern regions risk becoming not merely unstable territories, but a permanent drain on the state's governing capacity. Restoring security in the south cannot be achieved through military sweeps alone; administrative reconstruction, reorganization of security forces, and policies to protect and win over the population must be pursued in parallel."
 china_wr.229.a:0 "A Republic in Peril."
 china_wr.230.t:0 "Institutionalizing the Five Races Under One Union"
 china_wr.230.d:0 "For many years, Five Races Under One Union has served as an aspirational vision within the Republic's political discourse, yet its substance has often failed to materialize in everyday governance. Minority regions have remained vulnerable to administrative weakness and security instability, while central authority has struggled to apply consistent standards.\n\nThe government now views this gap as a source of growing skepticism toward the principle itself. To secure lasting legitimacy, the concept must be anchored in institutions rather than declarations, integrating minority regions into a coherent administrative, judicial, and security framework.\n\nAccordingly, reforms are underway to clearly define minority rights and autonomy within the law, while clarifying the scope and responsibility of central authority. This process does not signify separation or neglect, but an effort to ensure that diversity functions within a unified republican order."
 china_wr.230.a:0 "Translate principle into institutions."
 china_wr.231.t:0 "Adjustment of the Electoral Threshold"
 china_wr.231.d:0 "As an extension of ongoing electoral reforms, the final discussion has focused on how far the electoral threshold for ethnic minority parties should be lowered. The existing 8 percent standard has proven effective in preventing excessive party fragmentation, but it has also functioned as a structural barrier to parties with limited demographic and regional bases.\n\nAccordingly, the government and the legislature have agreed to lower the electoral threshold for minority-based parties to 5 percent. This measure represents a compromise that avoids excessive parliamentary fragmentation while allowing the principles of Five Races Under One Union to be reflected institutionally.\n\nWith this adjustment, the dominant-party framework remains intact, while minority voices gain a stable and legitimate path into parliamentary representation."
 china_wr.231.a:0 "A necessary adjustment."
 china_wr.232.t:0 "Introduction of Proportional Representation"
 china_wr.232.d:0 "Proportional representation has now been formally introduced to elections for the House of Representatives. Under the previous system, stable majorities were often secured at the cost of leaving substantial portions of the popular vote unreflected in the legislature.\n\nWith the adoption of proportional representation, electoral support is now translated more directly into seats, allowing political minorities as well as regional and social groups to gain visible representation within the institutional framework. This change marks a restructuring of the House into a body that reflects the plurality of society rather than a single dominant line.\n\nWhile parliamentary management may become more complex, legislation now proceeds through negotiation and compromise rather than unilateral force. The political order is being reshaped around deliberation and consensus."
 china_wr.232.a:0 "Votes Become Representation."
 china_wr.233.t:0 "Assassination of Tang Jiyao"
 china_wr.233.d:0 "Shortly after the formal establishment of the National Protection Army, Yunnan Governor Tang Jiyao traveled to Guizhou to celebrate the province's decision to join. During a public ceremony attended by large crowds, an armed assailant hidden among the onlookers opened fire with a southern pistol, plunging the scene into chaos. Tang Jiyao was critically wounded and, despite immediate evacuation, was pronounced dead at the scene.\n\nAlthough the assailant was killed on the spot, evidence and rumors of Kuomintang involvement spread rapidly. Within the National Protection Army, the assassination was soon understood not as an isolated act, but as a political attack aimed at destabilizing the southwestern order. Tang Jiyao's death immediately raised the issue of leadership vacuum and internal power realignment.\n\nLu Han, a leading general of the Yunnan provincial forces and Tang Jiyao's closest military subordinate, took the initiative to establish an investigative commission under the banner of uncovering the truth behind the assassination. The investigation quickly expanded into a sweeping purge, targeting Kuomintang collaborators, disobedient warlord elements, and political rivals operating under the guise of neutrality. What began as an inquiry evolved into a comprehensive restructuring of military authority.\n\nFacing mounting instability, military representatives from the southwestern provinces delegated full authority to Lu Han in order to preserve unified command. Lu Han was formally appointed Supreme Commander of the Southwest, rising from a provincial general to the central figure overseeing both military control and political consolidation across the region."
 china_wr.233.a:0 "Order is forged in blood."
 china_wr.234.t:0 "[GetYear] House of Representatives Election"
 china_wr.234.d:0 "The House of Representatives election of [GetYear] is being held nationwide. This election determines the composition of the lower chamber of the National Assembly and is widely regarded as a critical moment for assessing the future course of political forces within the Republic.\n\nFollowing constitutional debates and a series of institutional reforms, the political order has been partially consolidated. Nevertheless, regional interests and ideological divisions among parties remain clearly defined. Voters now weigh competing visions of stable governance, continued reform, and alternative political paths.\n\nThe outcome of this election will influence not only the distribution of seats, but also the legislative agenda, the momentum of executive reforms, and the broader direction of the Republic's political development."
 china_wr.234.a:0 "Begin the count.
 china_wr.235.t:0 "Senate Election of [GetYear]"
 china_wr.235.d:0 "The Senate election of [GetYear] is being held nationwide. The Senate serves as an institution responsible for deliberation and balance within the legislative process, reviewing bills passed by the lower chamber and reinforcing institutional stability.\n\nThis election is the first Senate election held following recent political and institutional reforms, and its outcome is expected to reflect assessments of the Senate's role and authority. Political forces emphasize careful legislation and continuity of governance as they seek voter support.\n\nThe results will have a significant impact on future legislative checks, coordination between chambers, and the overall balance of power within the National Assembly."
 china_wr.235.a:0 "Begin the count."
 china_wr.238.t:0 "Military Coup"
 china_wr.238.d:0 "Long-standing dissatisfaction within the military of the Republic of China has finally erupted. Centered around Wu Peifu, senior constitutionalist officers have criticized the government for weakening military authority and subordinating national security to political calculations.\n\nBefore dawn, key communication facilities and barracks in the capital were seized by armed forces, and troops were deployed around government compounds. Under the banner of defending constitutional order, the military announced the suspension of executive authority and declared that it would assume direct control of national administration.\n\nPolitical institutions and provincial administrations have been thrown into turmoil, with signs of clashes and resistance emerging in several regions. The Republic once again descends into uncertainty and tension."
 china_wr.238.a:0 "Chaos deepens upon chaos."
 china_wr.239.t:0 "Zhili Garrison Command Proclamation No. 1"
 china_wr.239.d:0 "Following the coup in Peking, the military authorities proclaimed martial law across Zhili Province in order to secure complete control over the government and issued a stern proclamation. The text of the proclamation is as follows.\n\n'Zhili Garrison Command Proclamation No. 1\n\nIn declaring martial law throughout Zhili Province, this Command hereby makes the following announcement.\n\nIn view of the turbulent situation on the continent and the threat of espionage infiltration, and in order to secure public order within Zhili and guarantee the safety of the people, this Command, in accordance with the law, proclaims the implementation of martial law across the entire province effective from 00:00 on [GetDate]. All sectors are required to observe the following provisions.\n\nArticle 1 (Administration and Judiciary)\nAll administrative and judicial affairs within the province shall, during the period of martial law, be subject to the direction and supervision of this Command. Ordinary administrative and judicial functions may continue in accordance with existing regulations, provided they do not conflict with measures enacted by this Command.\n\nArticle 2 (Assemblies, Associations, and Collective Activities)\n1. No outdoor gathering or demonstration of three or more persons may be held without prior authorization from this Command. All strikes, coordinated work stoppages, student boycotts, and market closures are strictly prohibited.\n2. Religious activities and customary rites may be permitted insofar as they do not disturb public order, though prior notification may be required.\n\nArticle 3 (Press and Publications)\nThe publication and distribution of newspapers, magazines, books, and all other printed materials, as well as all postal items, telegrams, and radio broadcasts, shall be subject to prior censorship by this Command. The spreading of rumors or acts that mislead the populace and undermine military morale shall be severely punished.\n\nArticle 4 (Movement and Blackout Control)\n1. A curfew shall be enforced daily from midnight to 5 a.m. the following morning, except for officials on duty or persons holding prior travel permits.\n2. Movement in the vicinity of ports, airfields, railway stations, and important military installations shall be restricted. Blackout measures may be imposed in accordance with the directives of this Command.\n\nArticle 5 (Control of Weapons and Supplies)\n1. The possession of firearms, ammunition, explosives, and other hazardous materials without authorization is prohibited.\n2. Hoarding of food, fuel, and essential commodities, as well as price manipulation, is strictly forbidden. Violators shall be punished under military law.\n\nArticle 6 (Application of Military Law)\nPersons who commit crimes that endanger national security or disrupt social order, including murder, robbery, arson, and espionage, shall be treated as offenders caught in the act and tried before military tribunals of this Command, with severe punishment in accordance with the law, including summary measures where applicable.\n\nArticle 7 (Protection of Foreign Nationals)\nThe lives and property of foreign nationals residing within the province shall be protected under the law. However, any individual who violates the regulations of martial law shall be punished without exception.\n\nAll of the above provisions shall take effect immediately upon promulgation. All military personnel and civilians are required to strictly observe this proclamation and cooperate in maintaining public order.\n\nCommander-in-Chief of the Army of the Republic of China and Commander-in-Chief of the Zhili Garrison Command, Wu Peifu, Zhili Garrison Command\nPromulgated on [GetDate]'\n"
 china_wr.239.a:0 "Suppress all subversives!"
 china_wr.240.t:0 "Implementation of the Peking Curfew"
 china_wr.240.d:0 "Following the declaration of martial law in Zhili Province, instability in the capital has not been entirely resolved. The spread of rumors at night and several minor clashes in certain districts prompt the military authorities to consider additional measures to restore order. The Zhili Garrison Command decides to enforce a nighttime curfew throughout the city of Peking. From midnight until dawn, all civilian movement is prohibited, and armed troops are deployed at major intersections and government offices. Individuals found traveling without authorization are subject to immediate detention. The capital is placed under comprehensive wartime control."
 china_wr.240.a:0 "Enforce it strictly"
 china_wr.241.t:0 "Dissolution of the National Assembly"
 china_wr.241.d:0 "Under the system of martial law in Zhili Province, the military leadership conducts a final deliberation on the continued existence of the National Assembly. Certain deputies openly reject the legitimacy of the coup, while many others prioritize factional interests over coordinated wartime policy. This condition generates confusion within mobilization and operational planning. The Zhili Garrison Command proclaims the immediate dissolution of the National Assembly and the complete suspension of its legislative functions. All legislative authority is transferred to an emergency governing body, and parliamentary immunities as well as procedural privileges are rendered void. The former parliamentary order is halted and a military-centered governing structure is established."
 china_wr.241.a:0 "Proceed with dissolution"
 china_wr.242.t:0 "Purge of Anti-Military Figures"
 china_wr.242.d:0 "With the enforcement of summary trials against collaborators, the military leadership initiates a broader consolidation of the political sphere. Hu Shi and Cai E are placed under house arrest rather than subjected to public trial, and all external political activity and contact with the press are severed. Other prominent figures opposed to military rule are investigated by military authorities, resulting in imprisonment or enforced withdrawal from public life. Some resign formally of their own accord, yet are effectively removed from the political arena. Parliamentary and party structures rapidly contract, while a military-centered power configuration becomes entrenched. The wartime control system grows increasingly rigid."
 china_wr.242.a:0 "Secure the order"
 china_wr.243.t:0 "Establishment of the Revolutionary Tribunal"
 china_wr.243.d:0 "As military-centered governance becomes increasingly entrenched, the judicial system is subjected to reorganization. Ordinary courts continue to address common crimes, yet existing procedures are criticized as too lenient in cases involving collaboration with insurgents, anti-military agitation, or espionage. The high command resolves to establish a special tribunal under the justification of consolidating wartime order. The Revolutionary Tribunal operates as a single-instance court without appeal, employing streamlined hearings and immediate enforcement of sentences. Political and criminal responsibility are merged within this structure, creating a unified mechanism for punishing anti-regime elements. Judicial authority is increasingly concentrated under military supervision."
 china_wr.243.a:0 "Open the tribunal"
 china_wr.244.t:0 "Promulgation of the Special Act on Insurrection"
 china_wr.244.d:0 "Even after the establishment of the Revolutionary Tribunal, clandestine networks, financial assistance to insurgent elements, and information leaks persist in certain regions. The military high command judges that such activities threaten front-line stability and undermine rear-area order. Concluding that ordinary criminal statutes are inadequate for rapid wartime response, a Special Act on Insurrection is enacted. Attempts to overthrow the state, support for armed rebellion, and anti-military agitation are defined as major offenses, and investigative and judicial procedures are shortened. Designated cases are automatically transferred to military jurisdiction, and sentences are enforced without delay. Wartime control is further consolidated through formal legal instruments."
 china_wr.244.a:0 "Promulgate the Act"
 china_wr.245.t:0 "Measures to Dissolve Subversive Parties"
 china_wr.245.d:0 "Despite the enforcement of martial law and the Special Act on Insurrection, certain parties persist in opposing military governance through open or clandestine means. The military leadership assesses that these organizations may undermine wartime control by fostering political cohesion against the regime. Orders are therefore issued to dissolve all parties designated as subversive. Central offices and regional branches are closed, and party assets are frozen or confiscated. Party leaders are barred from political activity or subjected to investigation. The political order is maintained only within limits sanctioned by military authority."
 china_wr.245.a:0 "Dissolve them all"
 china_wr.246.t:0 "Supreme Trial for Those Responsible for the Civil War"
 china_wr.246.d:0 "The military high command proclaims the opening of a Supreme Trial to determine political responsibility for the outbreak and expansion of the civil war. The investigation extends beyond policymakers to include those accused of obstructing military operations or publicly opposing military authority. Individuals named as defendants are detained without delay, and cases are transferred to the Revolutionary Tribunal. Proceedings are conducted under a single-instance structure without appeal. While the declared objective is to assign responsibility for the conflict, the broader reorganization of the political sphere advances concurrently."
 china_wr.246.a:0 "Hold them accountable"
 china_wr.247.t:0 "Order to Dissolve Paramilitary Organizations"
 china_wr.247.d:0 "Despite the enforcement of martial law and special legislation, party-affiliated youth corps, private security formations, and locally based armed groups continue to exist across various regions. The military high command determines that wartime integration cannot be achieved so long as these paramilitary organizations retain independent chains of command. The Zhili Garrison Command issues an order for the immediate dissolution of all non-regular armed groups. Unregistered weapons and equipment must be surrendered to the army, and non-compliant organizations are placed under investigation and subject to arrest. Armed authority within local society is withdrawn, and the use of force is consolidated under centralized military control."
 china_wr.247.a:0 "Disband them all"
 china_wr.248.t:0 "Seizure of Power"
 china_wr.248.d:0 "With the completion of martial law measures and the purge of the political sphere, the direction of authority becomes unmistakable. The National Assembly has been dissolved, major parties have suspended their activities, and anti-military figures have been detained or removed from public life. The military chain of command now extends into administrative and judicial domains, while the emergency governing body exercises effective control over state affairs. Wu Peifu, as Commander-in-Chief of the Army of the Republic of China and Commander-in-Chief of the Zhili Garrison Command, assumes comprehensive direction over wartime governance. Though the outward framework of the republic remains intact, decisive authority is concentrated within the supreme military leadership. The center of power has shifted to the armed forces."
 china_wr.248.a:0 "Reorganize the state"
 china_wr.249.t:0 "Reopening of the National Assembly"
 china_wr.249.d:0 "As the series of consolidation measures and political restructuring reach a defined stage, consideration is given to restoring legislative functions that had been suspended under emergency rule. With major military engagements settled and administrative structures reactivated, the need arises to reaffirm the institutional foundation of governance. The Senate and the House of Representatives are reconvened under restricted authority and strict procedural oversight. Proceedings are conducted under supervision by the military and executive authorities, with review of wartime decrees, budgetary matters, and mobilization reports placed on the agenda. Legislative activity resumes gradually within controlled limits."
 china_wr.249.a:0 "Convene the Assembly"
 china_wr.2370.t:0 "By-Elections for the Senate and the House of Representatives Following the Recovery of Manchuria"
 china_wr.2370.d:0 "With the recovery of key positions in Manchuria, the region is being reintegrated into the central administrative framework. Accordingly, procedures are initiated to fill vacant seats in the Senate and the House of Representatives through by-elections. Conducted under wartime conditions, these elections are supervised jointly by military and civil authorities to ensure security and proper voter registration. Representatives from Manchuria are expected to reflect the priorities of post-recovery reconstruction and regional interests within national deliberations. The composition of the legislature moves toward normalization, and the political consequences of territorial recovery are formally incorporated into the constitutional order."
 china_wr.2370.a:0 "Hold the elections"
 china_wr.250.t:0 "Opening of the Special Advisory Conference"
 china_wr.250.d:0 "The struggle for power has been resolved, yet the direction of state governance remains unsettled. Military action and political purges alone cannot guarantee long-term order; institutional design and administrative reconstruction must now proceed.\n\nThe government has therefore summoned experts in finance, industry, education, justice, and administration to the capital to draft a blueprint for national reconstruction. Each is tasked with presenting practical reform proposals and defining the operational principles of the new system.\n\nThe Special Advisory Conference will function not merely as a consultative body, but as the forum through which the structural framework of the state is to be determined."
 china_wr.250.a:0 "Rebuild the foundations of the state."
 china_wr.251.t:0 "The Establishment of the National Reconstruction Committee"
 china_wr.251.d:0 "After restoring order and reorganizing the structure of power, the government has now entered a new phase: defining a long-term direction for national governance. Securing control through force and decisive action is fundamentally different from consolidating that order through institutions and policy.\n\nAccordingly, scholars, economists, administrators, jurists, and military strategists have been summoned to form the National Reconstruction Committee. This body is not merely advisory in nature; it is tasked with redesigning the state as a whole, including administrative restructuring, fiscal reorganization, industrial policy direction, and the recalibration of civil–military relations.\n\nAccumulated inefficiencies, entrenched practices, and faction-based governance are being gradually dismantled. Policy formation is increasingly grounded in expertise and accountability. The state is moving beyond provisional measures and beginning to operate according to systematic design and long-term planning."
 china_wr.251.a:0 "All for republic."
 china_wr.252.t:0 "The Launch of the Social Purification Campaign"
 china_wr.252.d:0 "The government has formally initiated the comprehensive implementation of the Social Purification Campaign. Corruption, informal power networks, criminal organizations, and declining administrative discipline have steadily eroded the state's governing capacity. In many instances, administration has come to rely more on entrenched practices than on law, while in certain regions public authority has been subordinated to private interests.\n\nIn response, the government is restructuring inspection institutions, conducting wide-ranging reviews of official assets and administrative procedures, and strengthening public security oversight. Criminal groups and illegal organizations are being targeted, while internal disciplinary reforms are simultaneously reinforced within the civil service.\n\nThe campaign is not a temporary crackdown but a structural effort to realign both institutions and social practices. Although resistance and friction may arise, restoring legal order and public authority remains the state's foremost priority."
 china_wr.252.a:0 "Do what's right."
 china_wr.253.t:0 "Designation of Subversive Literature"
 china_wr.253.d:0 "The government has officially designated certain publications as subversive and restricted their circulation, citing concerns that they undermine social order and erode confidence in the constitutional system. These works had reportedly spread rapidly among youth and student circles, promoting radical critiques and ideological opposition to the state.\n\nInspections of publishing houses and bookstores have commenced, and previously distributed copies are being systematically recalled. While segments of the intellectual community have voiced concerns regarding freedom of expression, the government maintains that public stability and national security must take precedence.\n\nWhether this measure will successfully quell ideological agitation or instead drive such ideas into clandestine circulation remains uncertain."
 china_wr.253.a:0 "Order must prevail."
 china_wr.254.t:0 "Designation of Subversive Literature"
 china_wr.254.d:0 "The Wu Peifu government has designated certain publications as subversive as part of its effort to restore order and establish clear standards within the sphere of public discourse. In order to maintain governance based on law and institutional authority, the administration determined that materials potentially harmful to state and military authority required regulatory oversight.\n\nAdministrative inspections of publishing and distribution processes have been implemented, and materials formally designated under existing regulations are subject to circulation limits. The measure is presented as an effort to reinforce public order and promote overall stability.\n\nThe government reiterates that freedom of expression is safeguarded within the framework of law and seeks to cultivate a disciplined and orderly public discourse."
 china_wr.254.a:0 "Restore order."
 china_wr.255.t:0 "Re-election of [CHI.GetLeader]"
 china_wr.255.d:0 "Following victory in the previous presidential election, [CHI.GetLeader] has secured a second term in office. Although the campaign period was marked by intense debate and political confrontation, the final results indicate that public confidence in the incumbent leadership has been maintained.\n\nSupporters emphasize continuity in governance and policy consistency, viewing the outcome as a mandate for stability and order. Meanwhile, opposition figures express concern over potential concentration of power and heightened political tension, closely observing the future relationship between the presidency and the legislature.\n\nWith a renewed mandate, [CHI.GetLeader] now faces the challenge of defining the direction of the Republic's next phase and managing the expectations that accompany a second term."
 china_wr.255.a:0 "A mandate renewed."
 china_wr.256.t:0 "Postponement of the Presidential Election"
 china_wr.256.d:0 "Ongoing wartime conditions have led to the postponement of the scheduled Presidential election. The government has determined that, with national resources fully committed to mobilization and military operations, conducting a nationwide election under present circumstances would be impractical.\n\nAdministrative capacity and security forces are currently directed toward frontline and logistical support, and concerns have been raised that proceeding with the election could generate instability. Accordingly, while maintaining the constitutional framework, the election timetable has been adjusted until the conflict enters a more stable phase.\n\nThe government emphasizes that this postponement is a temporary measure, underscoring that national survival and the restoration of order remain the foremost priorities."
 china_wr.256.a:0 "Wartime demands order."
 china_wr.257.t:0 "Resumption and Result of the Presidential Election"
 china_wr.257.d:0 "The Presidential election, previously postponed due to wartime conditions, has been resumed and the final count completed. Following nationwide preparations and the restoration of constitutional procedures, [CHI.GetLeader] has once again secured victory.\n\nIn the aftermath of wartime governance, voters are widely seen as having chosen stability and continuity. Supporters interpret the outcome as confirmation of consistent leadership and institutional restoration, signaling that political order has returned to a constitutional footing.\n\nWith re-election secured, [CHI.GetLeader] will continue to guide post-war reconstruction and reform efforts, leading the Republic into its next phase under renewed mandate."
 china_wr.257.a:0 "An expected outcome."
 china_wr.258.t:0 "The Law of Troubled Times"
 china_wr.258.d:0 "The numerous administrative measures enacted in the name of the Martial Law Commander, along with the many laws passed by the National Assembly convened under Wu Peifu's authority, are described by some as oppressive, violent, and profoundly authoritarian in nature. Yet in times of chaos, there exists a law suited to chaos itself. As long as China faces the great upheaval of civil war and the looming threat of Japan, these measures must continue to be enforced.\n\nWu Peifu's objective as Martial Law Commander has always remained singular: 'Save the nation from peril.' The China of today has descended into profound disorder through the failures of civilian governance. The land question, economic instability, public confidence, and even the survival of the state stand on fragile ground. To bring an end to this overwhelming turmoil, more drastic methods have become unavoidable..."
 china_wr.258.a:0 "What appears improper may, at times, be the only proper course."
 china_wr.259.t:0 "Wu Peifu Assumes the Presidency"
 china_wr.259.d:0 "Having governed under the authority of Martial Law Commander, Wu Peifu has now formally assumed the office of President. The transition transforms emergency authority exercised during crisis into constitutional executive power, institutionalizing what had once been provisional command.\n\nSupporters interpret this as the continuation of leadership that preserved the nation through peril, emphasizing that unified command has now been integrated within the constitutional framework. Governance that began under martial conditions has thus become formal state leadership.\n\nWu Peifu now stands not merely as a commander in crisis, but as the official head of state, bearing both the authority and responsibility of the presidency."
 china_wr.259.a:0 "China now rests beneath his hand…"
 china_wr.260.t:0 "New Republican Party Joins the Coalition"
 china_wr.260.d:0 "Amid political instability and the expanding influence of the military, the New Republican Party has formally joined the ruling coalition.\n\nAdvocating strong executive authority and the restoration of order, the party has long maintained close ties with the armed forces. Its entry marks a shift in the character of the coalition toward a more stability-oriented alignment. The government secures a stronger parliamentary base while institutionalizing coordination between military-aligned leadership and civilian authority.\n\nThis development carries implications beyond mere seat arithmetic. With a military-aligned force now participating in the cabinet, the direction of governance is likely to converge toward a firmer and more cohesive line of rule."
 china_wr.260.a:0 "The coalition grows stronger."
 china_wr.261.t:0 "Full Rationing Implemented"
 china_wr.261.d:0 "As the war continues to drag on, partial controls have proven insufficient to stabilize the flow of essential resources.\n\nThe government has introduced a comprehensive rationing system in which the production and distribution of food, fuel, clothing, and industrial materials are centrally managed. Planned allocation replaces market distribution, civilian consumption is restricted under regulated standards, and military demand takes absolute priority.\n\nThough it alters everyday life, the system is framed as essential for sustaining war capacity and preserving social order."
 china_wr.261.a:0 "This is a required action."
 china_wr.262.t:0 "Requisition of War Materials"
 china_wr.262.d:0 "To secure the resources necessary for continued warfare, the government has begun formal requisition of civilian and industrial assets.\n\nProduction facilities, stored goods, and transportation resources are incorporated into centralized control, expanding the scale of the military supply network. This step represents not only resource acquisition but a structural transformation of the economy toward wartime priorities.\n\nWhile the burden on civilian society grows heavier, the government emphasizes that such measures are inseparable from national survival."
 china_wr.262.a:0 "The state comes first."
 china_wr.263.t:0 "Wage Freeze"
 china_wr.263.d:0 "As wartime pressures intensify, inflation and labor market imbalance place growing strain on national administration.\n\nThe government freezes wages to stabilize prices and ensure predictable planning across production sectors. The measure limits consumption and directs economic energy toward military supply, aligning industrial and fiscal systems with wartime priorities.\n\nAlthough living standards may tighten, the policy is framed as an unavoidable component of total mobilization."
 china_wr.263.a:0 "Control is necessary in war."
 china_wr.264.t:0 "Lowering the Minimum Working Age"
 china_wr.264.d:0 "Prolonged war has created persistent labor shortages across key industries.\n\nThe government lowers minimum working age requirements to expand workforce participation, allowing broader segments of society to contribute to industrial and military production. This integrates society more deeply into wartime structures and sustains material capacity.\n\nEducational and social patterns shift as a result, but the measure is justified under the demands of national survival."
 china_wr.264.a:0 "Everyone contributes."
 china_wr.265.t:0 "Total War"
 china_wr.265.d:0 "War is no longer solely the concern of the armed forces.\n\nThe government has shifted toward a doctrine of total war, concentrating the entire capacity of the nation on military objectives. Economy and administration, industry and education, culture and media are reorganized under wartime priorities, binding society directly to national strategy.\n\nThe distinction between front and rear gradually dissolves, as production, consumption, labor, and daily life are aligned under a single strategic standard. This marks not a temporary mobilization, but a decisive structural transformation of the state itself."
 china_wr.265.a:0 "The nation itself is the front."
 china_wr.266.t:0 "Outbreak of the Sino-Japanese War"
 china_wr.266.d:0 "The Republic of China and the Empire of Japan have formally entered a state of war. Prolonged diplomatic tensions and military confrontations over Manchuria and other sensitive issues have ultimately escalated into full-scale conflict between the two nations. This is not a mere border dispute or temporary clash, but a comprehensive war in which the survival of the state and its political order are placed at stake.\n\nWe must now mobilize all national instruments, including military strength, industrial capacity, diplomacy, and financial resources. Domestic politics and social order will be reorganized under the singular objective of prosecuting the war, and the fate of the nation will be determined by its outcome.\n\nWar has erupted, and there is no longer any alternative path."
 china_wr.266.a:0 "Now, war."
 china_wr.267.t:0 "Cast the Die!"
 china_wr.267.d:0 "There is a saying attributed to the Caesar of the western Great Qin, who, upon crossing the Rubicon, declared that the die must be cast—for the future is uncertain, and fortune favors bold resolve. Soon after uttering those words, he secured supremacy over his realm. In ancient China, Han Xin likewise arrayed his troops with their backs to the river against the forces of Zhao, denying them retreat and compelling them to fight to the death, thereby achieving victory. In our own age, a single gunshot in Hubei ignited a revolution that swept away a decaying dynasty and raised the banner of the republic. Such episodes are not mere anecdotes, but enduring lessons of history.\n\nKing Zhou of Shang, lost in cruelty and indulgence, forfeited the Mandate of Heaven to King Wu of Zhou. The Tsar of Russia, who turned his guns upon his own subjects, met his end in ruin. The common thread in these histories is clear: when the incapable rule, the state descends into chaos and marches toward collapse. The Republic of China was no exception. Thus Wu Peifu chose to set fire to the rotten roots of a decaying tree and began reshaping the republic into a state governed by virtue.\n\nChina now stands as an indivisible realm, no longer fractured nor easily sundered. Yet this alone is not enough. The land is vast, and the work of transforming the entire continent into a Confucian ideal remains unfinished. Only Wu Peifu possesses the resolve and authority to carry this mission forward. As before, he shall hold firm to supreme power and guide the people of China along the path of benevolence, righteousness, propriety, and wisdom.\n\nToday is a day of triumph, and the general may for a moment raise a cup and sing of the sages' righteous way. When tomorrow dawns, he will resume his duties as both a devoted scholar of the classics and a steadfast commander."
 china_wr.267.a:0 "I came, I saw, I conquered!"
 china_wr.268.t:0 "The Guominjun Uprising"
 china_wr.268.d:0 "Wu Peifu's declaration of martial law has been presented as a measure to restore order, but many political factions and elements within the military increasingly view it as a de facto coup. The suspension of established political procedures and civilian governance by force has sparked growing resistance. In this context, Feng Yuxiang and his Guominjun have declared an uprising, proclaiming the restoration of civilian government as their central cause. The Guominjun emphasizes that their actions are not aimed at seizing power for themselves, but at reversing the breakdown of legitimate political order. This development has the potential to significantly alter the balance of power, forcing regional warlords and political actors to reconsider their positions."
 china_wr.268.a:0 "Restore civilian rule."
 china_wr.269.t:0 "Guominjun Uprising"
 china_wr.269.d:0 "Amid rapidly rising political tensions following Wu Peifu's declaration of martial law, Feng Yuxiang and his Guominjun have declared an uprising. The Guominjun claims that this action is not a mere military revolt, but a measure to restore civilian government and reestablish constitutional order. The situation is evolving beyond a simple armed conflict into a broader struggle over political legitimacy, with the potential to significantly alter the balance of power across China."
 china_wr.269.a:0 "The situation is shifting."
 china_wr.270.t:0 "Swapping the Ballot Boxes"
 china_wr.270.d:0 "President Cao Kun decided to resign and the presidential election that should have been held this March was postponed due to the Great Szechwan Famine and only today was it held. Gao Mingzhao was an election official at a polling station in a small village in eastern Shantung, Weihai.\n\nElection official, even if it was called grandly, it was just moving ballot boxes at the polling station and setting up or cleaning the station. And when people came, it was just about handing out ballots.\n\nHe sat still and watched the clock. The hour hand pointed to five and the minute hand to fifty-five. Soon it would be time for the voting to close.\n\nFour minutes\nThree minutes\nTwo minutes\nOne minute\n\n6:00 PM\n\nHe rose from his seat and began to close and organize the polling station with the other officials. A truly long and tedious day had finally come to an end. A low-ranking official, as it usually was, but today it felt especially so.\n\nCleaning up the polling station and just before loading the boxes onto the truck that came to collect them, it happened.\n\n"You there, wait a moment."\n\nAt those words, Gao Mingzhao turned toward the source of the sound. It was the election chairman.\n\n"Not that ballot box. Load this one instead."\n\n"Chairman, the one we used for voting today wasn't that one, it was..."\n\n"Do as you are told. Do not say anything strange."\n\nIn that moment, the thought that he might have mistaken the box vanished in an instant. Gao Mingzhao knew exactly what this meant. But what could a low-ranking official do? He had no choice but to do as he was told.\n\nSo, just as he was lowering the original box and about to lift the chairman's box into the cargo bed, it was then.\n\n'Whir, click'\n\nIt was the sound of a camera.\n\nTurning around instinctively, two men were photographing this scene.\n\n"Hey, we are caught! Run!"\n\nAs soon as they realized their presence was noticed, they grabbed their camera and fled in haste."
 china_wr.270.a:0 "And then, following that, the chairman's shout of 'Catch those men!' rang out."
 china_wr.271.t:0 "The Ballot Box Swapping Incident in Weihai"
 china_wr.271.d:0 "A systematic attempt to swap ballot boxes at a polling station in eastern Shantung, Weihai, was discovered through the exposure of the media that witnessed the scene. Just as the election officials were about to replace them with pre-prepared fake boxes, the entire process was recorded with photographs and testimonies and revealed to the world. As soon as this evidence of fraud decorated the front pages of daily newspapers, public sentiment ignited uncontrollably. In response, the Kuomintang strongly protested, defining the incident as a direct challenge to democracy and a clear destruction of the constitutional order, and claimed that their heavy defeat in the election was due to such fraudulent activities. The KMT leadership announced that they will develop a large-scale struggle to demand a re-election and the complete invalidation of the presidential election. Meanwhile, the new government, recognizing the gravity of the situation, is hurrying to issue a public address and trying to calm the angry public opinion by promising a thorough investigation. However, between the tarnished administrative credibility and political legitimacy, doubts about whether the investigation will be conducted fairly will only deepen. This incident will serve as a decisive fuse that drives the future political situation of China into unprecedented chaos."
 china_wr.271.a:0 "The truth shall be investigated."
 china_wr.272.t:0 "Mob Violence Against a Politician in Peking"
 china_wr.272.d:0 "Before the election phase even fully began, a brutal collective lynching incident targeting a Progressive Party representative occurred in the heart of downtown Peking. In broad daylight, unidentified thugs in uniform attacked the representative and inflicted indiscriminate violence, and horrific eyewitness accounts and photographs of the bloodshed were rapidly reported through the media. Citizens who encountered this news fell into great shock and fear at the atrocities committed in the city center during the day. The Progressive Party defined this incident as a cowardly political terror against the opposition and a white terror that tramples on democracy, and strongly condemned the incompetence of the authorities. The leadership of the Progressive Party demanded immediate punishment for those responsible and effective measures to prevent a recurrence from the current administration. The authorities have belatedly expressed regret and are promising a thorough investigation to stabilize public sentiment, but it appears that the already tarnished administrative trust will not be easily restored. This lynching incident appears to be an ominous omen suggesting that the upcoming election will not be held peacefully."
 china_wr.272.a:0 "How barbaric!"
 china_wr.273.t:0 "A True Democratic Fighter?"
 china_wr.273.d:0 ""Tao—ugh! Damn, that was close. I've brought more ammo here!"\n\nLiang Xun, a freshman at Peking University, was performing his role surprisingly well for someone thrown into such an unexpected situation. When he heard about the 'political activities' Tao was leading, he expected posters or, at most, a rowdy protest. Who would have imagined a trench war fought over ballot boxes? Who could have guessed he would be crawling through the dirt, head down, hauling ammunition for fear of catching a bullet?\n\nThen again, in today's China, perhaps it was stranger not to expect such things.\n\n"Good job, Liang Xun!"\nWithout a second thought, Tao took the 7.62mm clips Liang Xun had delivered. They were a perfect fit for his Mosin-Nagant.\n\n"Every single one of these rounds protects the will of the people... Ha! Got one! Take that, you government bastards."\nLiang Xun, huddling under the barricade and covering his ears against the gunfire echoing from all sides, could only see Tao's legs peeking over the edge. In truth, he didn't even want to know what was happening on the other side of the line.\n\n"Tao... is this really right?"\nIt was when Tao leaned back down to grab a third clip that his eyes met Liang Xun's.\n\n"What's that supposed to mean, Liang Xun?"\n\n"I-I mean, in a democracy, isn't the will of the citizens expressed through ballots, not bullets? Why are we fighting a trench war to seize ballot boxes? They represent the voice of the people; they aren't something to be captured by force!"\n\nTao stared at Liang Xun for a moment with a look of utter disbelief before barking back in a harsh tone.\n\n"You're spouting nothing but idealistic, weak-minded nonsense, Liang Xun! Democracy is something you fight for and seize!"\n\nJust then, a shout rang out—not exactly close, but loud enough to pierce through the staccato of gunfire.\n\n"Man down! Dammit, he's hit in the waist!"\n\n"Ha, you see that? That's what a true democratic fighter looks like. It's time to grow up and be a man, Liang Xun.""
 china_wr.273.a:0 ""What are you doing? No time to daze off! Move that casualty, now!""
 china_wr.274.t:0 "Discussion on the Restoration of Senate Authority and Redefinition of Status"
 china_wr.274.d:0 "The first item brought to the table in the discussions for partial constitutional reform was the agonizing current state of the Senate. In the past, former Grand President Cao Kun drastically reduced the powers of the Senate under the pretext of smooth national administration, effectively degrading it into a rubber stamp and a vegetative state for the executive branch. Now, constitutional scholars and political elders in Peking are raising their voices, arguing that the Senate must regain its original role. They insist it should function as a coordinator that checks the House of Representatives from overusing populist bills swept up by the frenzy of the masses, while representing the interests of each province that composes the great Republic. However, opinions in the political sphere will diverge over how sharp the Senate's teeth should be forged back into the Constitution."
 china_wr.274.a:0 "The duty of the Senate is thorough check. We shall codify the right to veto laws and the right to impeach high-ranking officials."
 china_wr.274.b:0 "Excessive power only invites national paralysis. Grant only the authority to return bills and request re-deliberation."
 china_wr.275.t:0 "Constitutional Codification of Cabinet Accountability"
 china_wr.275.d:0 "One of the greatest blind spots of the current Constitution was the excessive ambiguity of the clauses regarding to whom the Cabinet is actually responsible. Because of this, a gray zone existed in the past political situation where it was interpreted arbitrarily according to the ruler's taste, as it was unclear whether the Cabinet was responsible to the Grand President or the National Assembly, the representative body of the people. The Constitutional Amendment Committee now intends to erase these ambiguous phrases and clearly engrave who the true master of the Cabinet is. Peking's political circles will once again be split into two over whether to strengthen control by the National Assembly relying on the confidence of the legislature or to guarantee the administrative execution power of the Grand President."
 china_wr.275.a:0 "The Cabinet cannot defy the people's representative body. Stipulate that it cannot exist without the confidence of the National Assembly."
 china_wr.275.b:0 "The Cabinet is a working body that executes the Grand President's national philosophy. Specify accountability to the Grand President."
 china_wr.276.t:0 "The Status of Provincial Constitutions and National Constitutional Hierarchy"
 china_wr.276.d:0 "The trend of provincial autonomy was a method of governing the vast Republic of China, but it was also a double-edged sword that undermined the legal unity of the state. The constitutional system of the past Cao Kun regime had effectively tacitly permitted each province to enact and operate its own independent constitution for the sake of political compromise. However, through this partial constitutional amendment, the National Assembly seeks to clearly organize the ambiguous hierarchy between the national and local constitutions. Conservative right-wingers and centralists will emphasize that the Republic of China is a unitary state and argue that a strong supervisory power of the central government must be specified so that local ordinances never take precedence over or contradict the national Constitution. On the contrary, the Zhigongdang and federalists representing provincial interests will protest strongly, putting forward the principle of subsidiarity. They will insist that all internal administrative powers, except for essential ones directly linked to national security such as defense and diplomacy, must be prioritized to the provinces to effectively govern the vast continent."
 china_wr.276.a:0 "Local ordinances can never contradict the national Constitution. Strengthen central supervisory power."
 china_wr.276.b:0 "All powers except defense and diplomacy come first for the provinces. Guarantee provincial autonomy."
 china_wr.277.t:0 "Transparency in Political Funding and Reform of the Electoral Law"
 china_wr.277.d:0 "The notorious bribed election and the pro-government coup, where former Grand President Cao Kun seized power by bribing members of the National Assembly with money, remained as an indelible dark history in our constitutional annals. Although democracy has matured since that incident, the loose regulations on campaign funding and opaque lobbying activities in the current law are still pointed out as a hotbed of corruption. Civil society and reformist members of the National Assembly are raising their voices to bring bribes and lobbying carried out in the shadows into the institutional sphere for transparent management through this amendment. They will argue that the chronic practice of vote-buying in politics must be rooted out by strictly stipulating a ceiling on election costs and the mandatory disclosure of lobbying funds in the Constitution. However, established politicians and the conservative camp will express reluctance, claiming that excessive regulation will instead shrink even normal political activities. They will counter that the Constitution should be modified to guarantee autonomy in fundraising while strengthening ex post facto punishment."
 china_wr.277.a:0 "We cannot repeat the shame of the past. Stipulate the ceiling on election costs and the duty of disclosure for lobbying."
 china_wr.277.b:0 "Excessive regulation invites the paralysis of politics. Leave it to autonomy but strengthen ex post facto punishment."
 china_wr.278.t:0 "Elevating the Status of the Judiciary and the Power of Constitutional Review"
 china_wr.278.d:0 "In the chaotic history of the Republic, the judiciary often had to bow its head helplessly before the pressure of the executive branch or the swords of warlords. Legal scholars in Peking now argue that to establish the rule of law in its true sense, the judiciary must not only be guaranteed the status of judges but also be granted the authority as a guardian of the Constitution. The core of the discussion will be the locus of the power of constitutional review. Progressive legal professionals will advocate for the active exercise of judicial power, insisting that the Daliyuan, the highest judicial body, should be given the power to control the laws of the National Assembly and ultimately interpret the Constitution. This will serve as a powerful device to protect the minority from the tyranny of the majority. Conversely, politicians who believe in the principle of the National Assembly's supremacy will urge judicial restraint. They will claim that for the judiciary, an unelected power, to invalidate the legislation of the National Assembly is an overstepping of authority against democracy. They will argue that judges should remain faithful to the mechanical application of laws according to individual conscience, and that high-level political judgment should be left only to the National Assembly."
 china_wr.278.a:0 "The judiciary is the ultimate guardian of the Constitution. Grant the Daliyuan final authority over constitutional interpretation."
 china_wr.278.b:0 "The judiciary must remain faithful only to the application of law. Political judgment is the role of the National Assembly."
 china_wr.279.t:0 "Constitutional Government Established Under the Clear Sky"
 china_wr.279.d:0 "'Today, as the gunfire of factional strife has finally ceased and the clear sky has opened, the drafting of a new constitutional amendment by the government of Grand President [CHI.GetLeader] is a manifestation of a strong will to end the chaos and lay an eternal foundation for completing the true democracy of the Five Races Under One Union, serving as an exemplar for the entire world. Despite considerable controversy and overlapping concerns, it is truly encouraging that the leadership of both the Youth Party and the Progressive Party deeply recognized the gravity of this measure, reached a grand compromise, and readily assented to the initiation of an interim committee to ensure its faithful implementation nationwide alongside the introduction of the amendment.\n\nThis proposal primarily establishes the authority of the Senate, the upper house of the legislature, and the judiciary. According to a spokesperson for the Interim Constitutional Committee, the legislative veto system and the parliamentary election system have been completely overhauled to eradicate the evil practice of specific factions or certain influential figures monopolizing power, and to realize the strict rule of law. Furthermore, the legality of state-sanctioned practices, which had become a chronic practice in politics since the past Cao Kun election scandal, was also discussed, thereby correcting the foundation of the rule of law. It is also reported that alongside the equal governance of each provincial government and the settlement of the cabinet-responsible system, the hierarchy of the national constitution, which had not been clearly defined in the past, has been firmly established. This paper ventures to comment that this amendment is equivalent to declaring to the whole world that it is by no means a mere collusion among politicians.\n\nThrough this constitutional reform, which is by no means inferior even when compared to Western democratic nations, this newspaper expresses its deepest respect for the future of Young China, which will overcome both the obsolete authoritarian politics prior to the Xinhai Year and the radical one-party dictatorship schemed by the Southern Nationalist Party to achieve the great enterprise of the Five Races Under One Union. We sincerely pray that the Grand President, who made the resolute decision to share power within the framework of constitutional government rather than filling his personal desires despite holding both power and opportunity in his hands, will continue to lead healthy party politics and state affairs to maintain this current momentum...'\n\nLi Yunjing rubbed his eyes and set down this morning's edition of the Xinbo on his desk. Having served as an elementary school principal in the South before the civil war broke out, as someone who had seen a bit of the world, keeping up with global affairs and the state of the nation late into the night despite his wife's scolding was so deeply ingrained in his nature that he simply couldn't stop. The days when the Kuomintang entered Guangdong, leaving his entire family in an agonizing dilemma over what to do, felt like a distant past. The emotion he felt when the Constitution Protection Army, marching south later on, returned his farmland and house from the Kuomintang was truly profound.\nLooking toward the room of his son, Li Ka-shing, who would be asleep by now, Li Yunjing gave thanks once more that he lived in a country where he didn't have to worry about surviving day to day, but could at least provide for his son and family."
 china_wr.279.a:0 "The light of dawn broke outside the window."
 china_wr.280.t:0 "Victory Day"
 china_wr.280.d:0 "To commemorate the magnificent victory that expelled the invading Japanese imperialists and brought an end to the chaos of the civil war, the Peking government has officially proclaimed this day as Victory Day. The streets of the capital are filled with countless citizens cheering and waving the flags of the Republic, while a grand military parade of the army soldiers who defended our sovereignty on the front lines is being held. This is the moment when a century of humiliation, stained by foreign oppression and warlord balkanization, is finally and completely wiped away. The people look forward to the long-awaited peace and the prosperity of a unified fatherland, and this victory has proven to the entire world that the Republic stands proud as a fully independent sovereign state and a steadfast constitutional nation, shoulder to shoulder with the global powers."
 china_wr.280.a:0 "Long live the Republic of China!"
 china_wr.281.t:0 "Proposal to Join the Yunnan-Burma One Belt One Road"
 china_wr.281.d:0 "The government of the Republic of China has formally invited our nation to participate in its massive national project, the 'One Belt One Road' initiative, aimed at the prosperity of Eurasia. They have proposed to invest immense capital into major transportation networks and port infrastructure traversing our territory through joint investments between the Republic of China and our government, simplifying trade procedures to achieve mutual growth. In the long term, this proposal will bring us immense profits and will be beneficial to us in most cases. We must choose whether to join the Republic of China's grand New Silk Road vision or adhere to our independent course."
 china_wr.281.a:0 "For the shared prosperity of the continent!"
 china_wr.281.b:0 "We will not participate."
 china_wr.282.t:0 "[FROM.GetName] Accepts the One Belt One Road Initiative"
 china_wr.282.d:0 "An official confirmation has arrived stating that the government of [FROM.GetName] has formally accepted the One Belt One Road cooperation proposal we sent. Expressing high expectations for the economic synergy that joint investment and infrastructure expansion will bring, they have resolved to fully join the new logistical network centered on the Republic. With this partnership, the construction of the New Silk Road binding the continent and the ocean together has gained much firmer momentum. We must now immediately initiate practical procedures to inject joint capital and construct railways, roads, and ports traversing their territory."
 china_wr.282.a:0 "A new chapter of cooperation has opened."
 china_wr.283.t:0 "[FROM.GetName] Rejects the One Belt One Road Initiative"
 china_wr.283.d:0 "Regrettably, the government of [FROM.GetName] has ultimately rejected our One Belt One Road cooperation vision. While they cited the financial burden of capital input and concerns over sovereignty, their choice practically reflects wariness against the deep penetration of the Republic's massive economic influence into their borders. Due to this refusal, a partial setback is inevitable for our grand infrastructure plan to connect Eurasia as one through this route. To ensure the complete integration of the New Silk Road, we must find alternative bypass routes or seek new diplomatic alternatives to resolve this deadlock."
 china_wr.283.a:0 "We shall have to find another way."
 china_wr.284.t:0 "Proposal to Join the Trans-Indian One Belt One Road"
 china_wr.284.d:0 "The government of the Republic of China has formally invited our nation to participate in its massive national project, the 'One Belt One Road' initiative, aimed at the prosperity of Eurasia. They have proposed to invest immense capital into major transportation networks and port infrastructure traversing our territory through joint investments between the Republic of China and our government, simplifying trade procedures to achieve mutual growth. In the long term, this proposal will bring us immense profits and will be beneficial to us in most cases. We must choose whether to join the Republic of China's grand New Silk Road vision or adhere to our independent course."
 china_wr.284.a:0 "For the shared prosperity of the continent!"
 china_wr.284.b:0 "We will not participate."
 china_wr.285.t:0 "[FROM.GetName] Accepts the One Belt One Road Initiative"
 china_wr.285.d:0 "An official confirmation has arrived stating that the government of [FROM.GetName] has formally accepted the One Belt One Road cooperation proposal we sent. Expressing high expectations for the economic synergy that joint investment and infrastructure expansion will bring, they have resolved to fully join the new logistical network centered on the Republic. With this partnership, the construction of the New Silk Road binding the continent and the ocean together has gained much firmer momentum. We must now immediately initiate practical procedures to inject joint capital and construct railways, roads, and ports traversing their territory."
 china_wr.285.a:0 "A new chapter of cooperation has opened."
