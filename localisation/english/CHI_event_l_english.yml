 china_wr.288.t:0 "Initiation of the One Belt One Road Project in India"
 china_wr.288.d:0 "With everyone agreeing to the development of the One Belt One Road passing through India, the project has finally commenced. Connecting the massive sector extending from Bombay to Burma will require considerable time and capital, but since the joint development of the One Belt One Road has begun and joint capital is being injected, it will not pose a major problem. Once this development is finished and the One Belt One Road is completely finalized, it will bring us tremendous wealth. For the new Silk Road of the 20th century, we shall stand together with the participating nations of the One Belt One Road."
 china_wr.288.a:0 "Let us begin."
