 BOOKMARK_WELTREICH_INFO:0 "§gWeltreich§! §L-The Age of Weltpolitik§!"
 BOOKMARK_WELTREICH_INFO_DELAYED:0 "§LAugust 1914, the artillery of the Great War dealt a great shock to the world. In fact, from the moment the Kaisermarine sank the fleet of the Russian Empire, Germany's victory could already be considered set in stone. Subsequently, as Germany parted the Jutland Sea, trampled and advanced into the old lands of France and Russia, and seized victory in 1920 to forge a world empire, its repercussions reached even the dark continent that retained the remnants of civilization.\n\nBefore long, the world quietly welcomed the year 1936... and the pillars of world politics still appear robust.\n\nHowever, outside of the Central Powers, much had already changed.\n\nIn the east, the Russian Council feigns obedience while conducting a covert struggle under the banner of revolution, preparing day by day to reclaim their old lands.\n\nIn the west, the French State, its economic backbone severed by the Treaty of Frankfurt, seeks a breakthrough by establishing a so-called 'Latin Brotherhood' with Italy, which is enjoying a golden age in the southern Mediterranean.\n\nEveryone knows that the dead cannot return. It is also clear that if a war breaks out in this generation, the sacrifices will vastly exceed the number of the generation lost in the Great War.\n\nWill someone brave enough to strip away the crown of the world empire truly emerge once more, even if it means paying such a price?§!"