mpire that is not his own, and a solitude that belongs only to him. Perhaps the elder imperial brother residing in Peking, who cast aside ambition and power, may in truth be the one who has faced himself—despite the mockery of those whispering ghosts.\n\n"A man must not be judged by his appearance, just as the sea cannot be measured by words."§!"