 MAN_aisin_gioro_pu_giye_text:0 "§YGrand Monarch of Manchuria–Mongolia Aisin-Gioro Pu Giye§!\n\n\n\n\n\n\n£GFX_MAN_aisin_gioro_pu_giye\n\n\n\n\n\n\n\n§LEvery empire that has upheld the Middle Kingdom has always required a Son of Heaven.\n\nThe Datong Emperor often recalls with a faint smile the voice of his elder imperial brother, who once scolded that the yellow robe is the symbol of the Son of Heaven and that to wear it without right would be an act of grave insolence. Yet loyal men, moved by righteous devotion to the realm, raised their voices and gathered soldiers, striking into the Northeast and presenting its custody to His Majesty. With the aspiration of establishing a Datong world where the Great Way is practiced and all people live as one, he now governs the lands of the Northeast.\n\nYet the weight of the imperial crown placed upon him by the vast spirit of empire has not proven to be the kingly path he once imagined. Are the edicts proclaimed in his name truly his own will? The whispers of countless ghosts guide the contents of that destiny, while beyond the Yalu River the officials of Japan exert their pressure, tightening their grip like a rope around his neck. Even so, His Majesty submits to it all, insisting that this is the life he desired. Like a character in a Peking opera performing beneath elaborate makeup, he dons the mask of the Emperor and plays the role without realizing that it is not truly his own life.\n\nYet His Majesty scarcely dares to know what has already been lost. Everything was sacrificed for something that could never truly be possessed, and still he does not understand what it was that he gave away. The life of the Datong Emperor resembles that of an actor satisfied with the mask he wears, refusing ever to remove it. The only treasure he has believed in and pursued throughout his life is an empire that is not his own, and a solitude that belongs only to him. Perhaps the elder imperial brother residing in Peking, who cast aside ambition and power, may in truth be the one who has faced himself—despite the mockery of those whispering ghosts.\n\n"A man must not be judged by his appearance, just as the sea cannot be measured by words."§!"
 MAN_aisin_gioro_pu_giye_add_text:0 "§YGrand Monarch of Manchuria–Mongolia Aisin-Gioro Pu Giye§!\n\n\n\n\n\n\n£GFX_MAN_aisin_gioro_pu_giye\n\n\n\n\n\n\n\n§YThe Constitutional Emperor"\n  - Surrender Limit: §G+10.00%!\n  - Weekly War Support (Combat Casualties): §G+0.50%§!\n--------------\n§LEvery empire that has upheld the Middle Kingdom has always required a Son of Heaven.\n\nThe Datong Emperor often recalls with a faint smile the voice of his elder imperial brother, who once scolded that the yellow robe is the symbol of the Son of Heaven and that to wear it without right would be an act of grave insolence. Yet loyal men, moved by righteous devotion to the realm, raised their voices and gathered soldiers, striking into the Northeast and presenting its custody to His Majesty. With the aspiration of establishing a Datong world where the Great Way is practiced and all people live as one, he now governs the lands of the Northeast.\n\nYet the weight of the imperial crown placed upon him by the vast spirit of empire has not proven to be the kingly path he once imagined. Are the edicts proclaimed in his name truly his own will? The whispers of countless ghosts guide the contents of that destiny, while beyond the Yalu River the officials of Japan exert their pressure, tightening their grip like a rope around his neck. Even so, His Majesty submits to it all, insisting that this is the life he desired. Like a character in a Peking opera performing beneath elaborate makeup, he dons the mask of the Emperor and plays the role without realizing that it is not truly his own life.\n\nYet His Majesty scarcely dares to know what has already been lost. Everything was sacrificed for something that could never truly be possessed, and still he does not understand what it was that he gave away. The life of the Datong Emperor resembles that of an actor satisfied with the mask he wears, refusing ever to remove it. The only treasure he has believed in and pursued throughout his life is an empire that is not his own, and a solitude that belongs only to him. Perhaps the elder imperial brother residing in Peking, who cast aside ambition and power, may in truth be the one who has faced himself—despite the mockery of those whispering ghosts.\n\n"A man must not be judged by his appearance, just as the sea cannot be measured by words."§!"
 JAP_showa_text:0 "§YHirohito, Emperor of the Empire of Great Japan§!\n\n\n\n\n\n\n£GFX_JAP_emperor_hirohito\n\n\n\n\n\n\n\n§YShowa§!\n  - Stability: §G+20%§!\n--------------\n§LHirohito, the 124th Emperor of Japan, is a noble existence who reigns as the Emperor and living god of the Empire of Great Japan, the sole civilized nation in East Asia. The Showa is one who has endured Japan's most turbulent era. Since the defeat of the Entente in the last Great War, the Japanese Empire has suffered through decades of economic hardship, and His Majesty witnessed with his own eyes the ungrateful elements in China attempting to pressure Great Japan at every turn. Politics were chaotic beyond measure, and the people's grievances pierced the heavens. The Emperor is well aware that present-day Japan is being challenged by a colossal ordeal. As a living god, His Majesty will remain a powerful presence that sustains us even amidst these tribulations.§!"
 BUL_ferdinand_i_text:0 "§YTsar Ferdinand I of the Tsardom of Bulgaria§!\n\n\n\n\n\n\n£GFX_BUL_ferdinand_i\n\n\n\n\n\n\n\n§YSavior of Bulgaria§!\n  - War Support: §R-10%§!\n  - Ideology Drift Defense: §G+25%§!\n\n--------------\n§LBulgaria was ultimately able to remain the victor in the three Balkan Wars. Tsar Ferdinand I of Bulgaria was at the very center of this turbulent era, and a sense of awe and respect for him still lingers in a corner of the people's hearts.\n\nHowever, his autocratic demeanor failed to keep pace with the changing times, and after losing the political struggle, he became a fixture akin to an amulet confined to a corner of the imperial palace. Yet, what does it matter? The status of Tsar still functions as a shield that prevents him from suffering the catastrophe of living in destitution."
 BUL_boris_iii_text:0 "§YTsar Boris III of the Tsardom of Bulgaria§!\n\n\n\n\n\n\n£GFX_BUL_boris_iii\n\n\n\n\n\n\n\n§YPopular Tsar§!\n  - Political Power Gain: §G+10%§!\n  - Ideology Drift Defense: §G+10%§!\n\n--------------\n§LBorn in Sofia, Principality of Bulgaria in 1894, Boris III was a figure of widespread popular appeal since his days as Crown Prince. He witnessed his father, Ferdinand I, elevate the Tsardom of Bulgaria into the hegemon of the Balkans, and he too seeks to exert his utmost efforts to sustain this legacy.\n\nAs the Tsar of Bulgaria who unites the Bulgarian people as one, he may well be one of the essential elements that constitute Bulgaria itself."
 george_v_text:0 "§YGeorge V, King of the United Kingdom of Great Britain and Northern Ireland§!\n\n\n\n\n\n\n£GFX_ENG_georgy_v\n\n\n\n\n\n\n\n§YPopular Figurehead§!\n  - Stability: §G+15%§!\n--------------\n§LIn 1910, as the Edwardian era drew to a close, the reign of George V began in Britain. In the Great War that erupted a mere four years into his ascension, Britain concluded a peace treaty with Germany based on status quo ante bellum; however, this was practically perceived as a defeat and inflicted prolonged suffering upon the nation. Amidst this turmoil, George V firmly served as a central pillar of the British monarchy, effectively uniting the country. Following countless days spent as a diligent and dutiful monarch without a single scandal, the new year of 1936 has dawned. Bedridden for several years due to old age, it appears that his era is drawing to a close. Nevertheless, the future of the empire he sustained remains secure, however uncertain it may be.§!"
 ENG_king_edward_text:0 "§YEdward VIII, King of the United Kingdom of Great Britain and Northern Ireland§!\n\n\n\n\n\n\n£GFX_ENG_edward_viii\n\n\n\n\n\n\n\n§YControversial King§!\n  - Weekly Stability: §R-0.1%§!\n--------------\n§LThe beloved Apollo, Edward VIII, has shown many behaviors breaking convention since his coronation. In particular, it appears he maintains a unique relationship with a married woman named Wallis Simpson;§! §Rif this issue comes to the surface, he would rather abdicate the throne than give up his relationship with her.§!"
 ENG_george_vi_text:0 "§YGeorge VI, King of the United Kingdom of Great Britain and Northern Ireland§!\n\n\n\n\n\n\n£GFX_ENG_georgy_vi\n\n\n\n\n\n\n\n§YPopular Figurehead§!\n  - Stability: §G+15%§!\n--------------\n§LGeorge VI was not originally destined to become king. However, with the abdication of his brother Edward VIII, he was set upon a new path that was not his own. Though frail and burdened with a stutter, he is doing his absolute best to shoulder his new responsibilities. In the emerging future that will sweep across Europe, he will do whatever it takes for the sake of Britain.§!"