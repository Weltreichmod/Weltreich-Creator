l_english:
 LOADING_TIP_0:0 "The world is the representation of the sensibility and the thought of a few superior men.\n- Gabriele D'Annunzio"
 LOADING_TIP_1:0 "He recognized nothing but the triumph of life.\n- Gabriele D'Annunzio"
 LOADING_TIP_2:0 "Every soldier must know, before he goes into battle, how the little battle he is to fight fits into the larger picture.\n- Bernard L. Montgomery"
 LOADING_TIP_3:0 "If we lose the war in the air, we lose the war and we lose it quickly.\n- Bernard L. Montgomery"
 LOADING_TIP_4:0 "Eia! Eia! Eia! Alala!\n- Gabriele D'Annunzio"
 LOADING_TIP_5:0 "The day when the peasants will be educated in the truth, tyrants and slaves will no longer exist on earth.\n- Giuseppe Garibaldi"
 LOADING_TIP_6:0 "Giraffes are heartless creatures."
 LOADING_TIP_7:0 "As long as there are sovereign nations possessing great power, war is inevitable.\n- Albert Einstein"
 LOADING_TIP_8:0 "The people who cast the votes decide nothing. The people who count the votes decide everything.\n- Joseph Stalin"
 LOADING_TIP_9:0 "History shows that there are no invincible armies and that there never have been.\n- Joseph Stalin"
 LOADING_TIP_10:0 "The Pope! How many divisions has he got?\n- Joseph Stalin"
 LOADING_TIP_11:0 "Gaiety is the most outstanding feature of the Soviet Union.\n- Joseph Stalin"
 LOADING_TIP_12:0 "Real power comes only from the barrel of a gun.\n- Joseph Stalin"
 LOADING_TIP_13:0 "Germany must have her place in the sun.\n- Wilhelm II"
 LOADING_TIP_14:0 "It is the soldier and the army, not parliamentary majorities and decisions, that have welded the German Empire together.\n- Wilhelm II"
 LOADING_TIP_16:0 "I put my trust in the army.\n- Wilhelm II"
 LOADING_TIP_17:0 "No matter how friendly we are with Russia, it cannot bring us peace!\n- Wilhelm II"
 LOADING_TIP_18:0 "Success is stumbling from failure to failure with no loss of enthusiasm.\n- Winston Churchill"
 LOADING_TIP_19:0 "If you're going through hell, keep going.\n- Winston Churchill"
 LOADING_TIP_20:0 "The best argument against democracy is a five-minute conversation with the average voter.\n- Winston Churchill"
 LOADING_TIP_21:0 "In future wars, armored forces will play the decisive role wherever battles are fought.\n- Heinz Guderian"
 LOADING_TIP_22:0 "The new German Panther and Tiger tanks can be used until they break down without any attempt to repair them. They have bad engines, transmissions, and suspensions.\n- Red Army Department of Ordnance"
 LOADING_TIP_23:0 "No bastard ever won a war by dying for his country. You won it by making the other poor dumb bastard die for his country.\n- George S. Patton"
 LOADING_TIP_24:0 "A good plan violently executed now is better than a perfect plan executed next week.\n- George S. Patton"
 LOADING_TIP_25:0 "Lead me, follow me, or get out of my way.\n- George S. Patton"
 LOADING_TIP_26:0 "Nobody ever defended anything successfully, there is only attack and attack and attack some more.\n- George S. Patton"
 LOADING_TIP_27:0 "Wars may be fought with weapons, but they are won by men. It is the spirit of the men who follow and of the man who leads that gains the victory.\n- George S. Patton"
 LOADING_TIP_28:0 "The positive testimony of history is that the State invariably had its origin in conquest and confiscation. No primitive State known to history originated in any other manner.\n- Albert Jay Nock"
 LOADING_TIP_29:0 "The mentality of an army on the march is merely a delayed adolescence; it remains persistently, stubbornly and notoriously infantile.\n- Albert Jay Nock"
 LOADING_TIP_30:0 "Leadership consists of picking good men and helping them do their best.\n- Chester W. Nimitz"
 LOADING_TIP_31:0 "Is the proposed operation likely to succeed? Is it feasible from a logistical standpoint?\n- Chester W. Nimitz"
 LOADING_TIP_32:0 "In preparing for battle I have always found that plans are useless, but planning is indispensable.\n- Dwight D. Eisenhower"
 LOADING_TIP_33:0 "What counts is not necessarily the size of the dog in the fight—it's the size of the fight in the dog.\n- Dwight D. Eisenhower"
 LOADING_TIP_34:0 "It goes without saying that when survival is threatened, struggles erupt between peoples, and unfortunate wars between nations.\n- Hideki Tojo"
 LOADING_TIP_35:0 "In a man-to-man fight, the winner is he who has one more round in his magazine.\n- Erwin Rommel"
 LOADING_TIP_36:0 "I would rather be the hammer than the anvil.\n- Erwin Rommel"
 LOADING_TIP_37:0 "Sweat saves blood, blood saves lives, but brains save both.\n- Erwin Rommel"
 LOADING_TIP_38:0 "In the world of socialism, people are not weeded out by the death penalty, not by brute force, not by economic competition, and not by wars between nations and races.\n- Ikki Kita, The Theory of Japan's National Polity and Pure Socialism"
 LOADING_TIP_39:0 "Christian love, which applies to all, is the worst enemy of communism.\n- Nikolai Bukharin"
 LOADING_TIP_40:0 "They shall not pass.\n- Robert Nivelle"
 LOADING_TIP_41:0 "If these gravediggers of the Republic do not realize that their role has come to an end... we will use violence for the sake of justice. We will set up guillotines all over Paris and cut off their heads.\n- Marcel Bucard"
 LOADING_TIP_42:0 "In the first six to twelve months of a war with the US and Great Britain I will win victory after victory. But after that, I can guarantee nothing.\n- Isoroku Yamamoto"
 LOADING_TIP_43:0 "When we come to a minefield, our infantry attacks exactly as if it were not there.\n- Georgy Zhukov"
 LOADING_TIP_44:0 "We underestimated the Russian colossus... If we destroy a dozen of their divisions, they simply replace them with another dozen.\n- Franz Halder"
 LOADING_TIP_45:0 "Nuts!\n- Anthony C. McAuliffe, in reply to the German demand for surrender"
 LOADING_TIP_47:0 "Not one step back!\n- Soviet Order No. 227"
 LOADING_TIP_48:0 "...Therefore, in order to prepare for a French attack, we must build a long and thick defensive line.\n- Friedrich Olbricht, advocating the construction of the Friedrich Line"
 LOADING_TIP_50:0 "Where is, repeat, where is Task Force Thirty-Four? The world wonders.\n- Admiral Chester Nimitz, Battle of Leyte Gulf"
 LOADING_TIP_51:0 "The war situation has developed not necessarily to Japan's advantage, while the general trends of the world have all turned against her interest.\n- Emperor Hirohito, 1945"
 LOADING_TIP_52:0 "Even if there is only a single private left, we will certainly kill him.\n- Ferdinand Foch"
 LOADING_TIP_53:0 "The Prussian army has no ideals, no true spiritual strength, and neither does the whole country. All they have is extreme materialism. ... The German spirit harbors only the glorification of force and the idea of war as a massive act of plunder. That is all. It is worthless.\n- Ferdinand Foch"
 LOADING_TIP_54:0 "In the name of the people and the fatherland, I swear loyalty and devotion to the Party, its ideals, and its leader. I swear to make the ultimate sacrifice for the cause of the national and popular revolution that will give birth to a new, free, and independent France.\n- Jacques Doriot"
 LOADING_TIP_55:0 "Now the shameful humiliation at Frankfurt has become a mere scrap of paper.\n- Jacques Doriot (After the remilitarization of Champagne)"
 LOADING_TIP_56:0 "Scratch one flat top! Dixon to carrier: scratch one flat top!\n- Robert E. Dixon, Battle of the Coral Sea"
 LOADING_TIP_57:0 "Austria is standing precariously on a tightrope. To come back down to earth and stand stably, reforms are essential.\n- Charles I"
 LOADING_TIP_58:0 "What is needed to silence the discontent of the minorities is not the whip, but the carrot.\n- Charles I"
 LOADING_TIP_59:0 "We won the war. But we have left behind far too many problems to solve.\n- Charles I"
 LOADING_TIP_60:0 "To hear him is an education in the English language, also in elegant but deadly wit. He shows human sympathy, courage, and genius.\n- Westminster Gazette, on Oswald Mosley"
 LOADING_TIP_61:0 "We have said a hundred times that if the life of Britain were threatened we would fight again.\n- Oswald Mosley"
 LOADING_TIP_62:0 "The true school of command is general culture.\n- Paul Reynaud"
 LOADING_TIP_63:0 "Victory or death!\n- Arditi motto"
 LOADING_TIP_64:0 "Once again, millions of young men are being marched off to die.\n- American anti-war protest slogan, 1940"
 LOADING_TIP_65:0 "Victory is not simply the result of force, but comes from the spiritual values that sustain that force.\n- Georges Valois"
 LOADING_TIP_66:0 "Once again, the war has begun.\n- US Senator William Borah"
 LOADING_TIP_67:0 "March or die.\n- Franchet d'Espèrey"
 LOADING_TIP_68:0 "The fruits of victory are tumbling into our mouths too quickly.\n- Emperor Hirohito"
 LOADING_TIP_69:0 "Time and Space died yesterday. We already live in the absolute, because we have created eternal, omnipresent speed.\n- Manifesto of Futurism"
 LOADING_TIP_70:0 "Sink, burn, capture, destroy. Let nothing pass.\n- Andrew Cunningham, Battle of Amiens"
 LOADING_TIP_71:0 "I think we might be going a bridge too far.\n- Frederick Browning (Before Operation Market Garden)"
 LOADING_TIP_72:0 "Remember Belgium.\n- British propaganda, 1914"
 LOADING_TIP_73:0 "When you see a rattlesnake poised to strike, you do not wait until he has struck before you crush him.\n- Franklin D. Roosevelt"
 LOADING_TIP_74:0 "Rules are not necessarily sacred, principles are.\n- Franklin D. Roosevelt"
 LOADING_TIP_75:0 "People who are hungry and out of a job are the stuff of which dictatorships are made.\n- Franklin D. Roosevelt"
 LOADING_TIP_76:0 "If you want to live, stay alert. Otherwise, some German son-of-a-bitch is going to sneak up behind you and beat you to death.\n- George S. Patton"
 LOADING_TIP_77:0 "Fortresses, artillery, and foreign aid are of no value unless the ordinary soldier knows that he is defending his country.\n- Carl Gustaf Emil Mannerheim"
 LOADING_TIP_78:0 "Through mud and blood to the green fields beyond.\n- Motto of the Royal Canadian Armoured Corps"
 LOADING_TIP_79:0 "If you love your country you are national, and if you love your people you are a socialist.\n- Oswald Mosley"
 LOADING_TIP_80:0 "For France to survive, the King must return.\n- Charles Maurras"
 LOADING_TIP_81:0 "Experience has shown that an attack on a tank by a determined man with close-combat weapons will generally always succeed.\n- Anti-tank manual of the German Army Group Centre"
 LOADING_TIP_82:0 "The Japanese will regret ever setting foot in China.\n- Chiang Kai-shek"
 LOADING_TIP_84:0 "Save China.\n- Sun Yat-sen"
 LOADING_TIP_85:0 "Do not covet life and do not fear death. The future masters of the world are you. If you render meritorious service, you will be rewarded.\n- Zhang Zuolin"
 LOADING_TIP_86:0 "If I only had one bullet, I would use it to execute the traitors who betrayed the country and democracy a hundred or a thousand times before the Japanese.\n- Kim Ku"
 LOADING_TIP_87:0 "In wartime, truth is so precious that she should always be attended by a bodyguard of lies.\n- Winston Churchill"
 LOADING_TIP_88:0 "In my mind, France cannot be France without greatness.\n- Charles de Gaulle"
 LOADING_TIP_89:0 "We must never forget that French is the most beautiful and perfect language in the world. Even if a people falls into slavery, as long as it holds fast to its language, it is as if it held the key to its prison!!\n- From 'The Last Lesson'"
 LOADING_TIP_91:0 "Is it a question of right or wrong? Maybe it is simply a question of keeping our supremacy.\n- Arthur Balfour, 1907"
 LOADING_TIP_91:0 "Free yourself, France! Free yourself!\n- Jacques Doriot"