 system_info_text:0 "The people of Wuhan and Nanking have risen against the Peking collaborators, raising the banner of the '§2National Revolution§!'.\n'§YRevolutionary Fervor§!' represents how strongly the people support the '§2National Revolution§!'. The higher the §YRevolutionary Fervor§!, the more bonuses you gain to help complete the §2National Revolution§!.\n\n§YRevolutionary Fervor§! will §Gsignificantly increase§! when states are captured from the enemy, and will §Rsignificantly decrease§! when the opposite occurs.\nIt also increases over time, but will §Rdecrease§! every §Y90 days§!."
 GFX_KMT_flag_effect:0 "§YRevolutionary Fervor§! §Gbonuses§! or §Rpenalties§! can be viewed in the national spirit §YRevolutionary Fervor§!."
 CHI_chinese_civil_war_morale:0 "§YWar Exhaustion§! : [GetStatusofmorale]"
 CHI_chinese_civil_war_morale_text:0 "The Constitutional Protection Government views the conflict as a struggle over constitutional order rather than a simple power contest. The actions in Nanking are seen as undermining established political procedures and legitimacy. The government responds through both military action and efforts to assert its authority, prioritizing control over the front and rear.\n\n§YWar Exhaustion§! will §Gsignificantly decrease§! when states are captured from the enemy, and will §Rsignificantly increase§! when the opposite occurs.\nIt also increases over time, and will §Rincrease§! every §Y90 days§!."
