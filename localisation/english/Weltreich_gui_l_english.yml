 MAN_suppress_national_protection_head:0 "Current §YDissatisfaction§!: §Y[?MAN.MAN_suppress_national_protection_var]§!%"
 MAN_suppress_national_protection_text:0 "Barely thirty years have passed since the Qing were expelled from China, and now we have once again crossed Shanhai Pass. However, the Han population harbors deep resentment toward our restored rule and has begun to resist it.\n\nIf this discontent and resistance are left unchecked, our regime will inevitably collapse once more.\n\n§YDissatisfaction§! increases by §R2.5% every month§! and will continue to do so until the §YNational Protection Movement§! is completely eliminated. To suppress the §YNational Protection Movement§!, §YDissatisfaction§! must be kept below a certain level while completing §GDecisions§! aimed at its suppression."
