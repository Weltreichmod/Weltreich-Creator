l_english:
 manchukou_wr.1.t:0 "Chun Jie Offensive"
 manchukou_wr.1.d:0 "It has been barely a month since the bandit forces crossed from the Republic and violated the territory of Manchukuo in the 12th month of the 19th Year of Datong. Yet their campaign, launched without legitimacy, has already faltered after suffering severe losses in the Battle of Anshan and falling back in disarray. The situation now presents us with a decisive opportunity. Should we fail to act, the task of eradicating these bandits will become immeasurably more difficult.\n\nThus, the commanders of Manchukuo have resolved to launch the Chun Jie Offensive. In accordance with the operational plan, we will exert pressure along the entire front against the so-called Northeast Army."
 manchukou_wr.1.a:0 "Advance!"
 manchukou_wr.2.t:0 "Intervention in the Mongolian Situation"
 manchukou_wr.2.d:0 "Since Soviet forces entered Mongolia, the situation along the frontier has rapidly become unstable. The government and military leadership of Manchuria–Mongolia believe that this is not a mere local clash, but a serious challenge threatening the security of both Manchuria and Mongolia.\n\nAccording to observation reports, Soviet forces have continued their advance beyond the northern frontier line under the unilateral orders of General Blyukher, placing severe pressure on frontier settlements and administrative outposts.\n\nThe Emperor has convened an emergency council on his own initiative, mobilizing the frontier defense forces and the mobile cavalry divisions and proclaiming the country's entry into the war. Many within the government appear dissatisfied with this decision, as it was made without sufficient consultation with the cabinet.\n\nThis decision by Manchuria–Mongolia is pushing the regional situation into a new phase, and neighboring states are watching its development closely. §RIf Manchuria–Mongolia were to lose a war entered at the Emperor's sole discretion, the fate of the state would be swept into turmoil.§!"
 manchukou_wr.2.a:0 "We will safeguard order in the North."
 manchukou_wr.3.t:0 "The Situation in Manchuria–Mongolia"
 manchukou_wr.3.d:0 "The ultimate purpose of the Manchuria–Mongolia government is to advance into the Central Plains and reunify China. This objective defines the reason for the state's existence and serves as the standard by which all policy is judged.\n\nHowever, the present reality stands in sharp contrast to this goal. International isolation restricts diplomacy and trade, while uncontrolled migration, ethnic tension, and the proliferation of bandit groups and irregular formations erode internal order. The army is vast in number, yet its command structure and combat effectiveness remain fragmented, and aristocratic privilege consumes resources required for reform.\n\nCompounding these difficulties, the Qing remnant court under Puyi in Peking continues to assert its own claim to Great Qing legitimacy, both symbolically and in foreign perception. The coexistence of two imperial courts, divided by lineage and authority, further undermines the Manchuria–Mongolia government's ability to present itself as the sole and rightful successor.\n\nTo turn the goal of reunifying China into reality, the state must first secure its own survival and legitimacy. Consolidating authority in Fengtian, restoring internal order, and rebuilding the political and military foundations of the government must become our immediate priority."
 manchukou_wr.3.a:0 "There is much to be done."
 manchukou_wr.4.t:0 "The New Year Address of the Emperor"
 manchukou_wr.4.d:0 "As the twentieth year of the Qianlong era dawns, the Emperor of Manchuria–Mongolia addresses the nation at a moment of hardship and resolve. The state stands far from the heart of China, surrounded by doubt abroad and disorder at home. Yet the purpose of the realm remains unchanged.\n\nThe Emperor declares that the suffering of recent decades is not the end of history, but a trial to be endured. Order must be restored, authority reestablished, and the people bound once more to a common purpose. Only through discipline, unity, and perseverance can the state survive the present age.\n\nThis new year is proclaimed not as a time of comfort, but as the beginning of preparation. The road ahead will be long and demanding, yet it is the will of the throne that Manchuria–Mongolia shall endure, strengthen itself, and one day advance southward to reclaim its place in China."
 manchukou_wr.4.a:0 "Long live the Emperor!"
 manchukou_wr.5.t:0 "The Twelve Imperial Edicts"
 manchukou_wr.5.d:0 "By personally issuing the Twelve Imperial Edicts, Emperor Pu Giye places himself at the center of the state's moral and political direction. Rather than delegating ideological authority to ministers, the Emperor speaks in his own voice, presenting standards of conduct meant to guide officials and subjects alike.\n\nThe Edicts encourage harmony among the Five Peoples, elevate agriculture as the foundation of national strength, and stress frugality, education, and respect for constitutional order and law. They demand diligence in labor, honesty in reporting and administration, vigilance in matters of security, and trustworthiness in trade and finance. Balanced rural development and cooperation among Asian peoples are also emphasized as essential to stability.\n\nThrough these principles, Pu Giye seeks to rule through example and discipline, drawing upon the image of the great Qing sovereigns such as Emperor Kangxi. The Edicts bind Pan-Asian ideals and Five Races Harmony to imperial authority, reinforcing legitimacy through moral governance rather than force alone."
 manchukou_wr.5.a:0 "The Edicts shall guide us."
 manchukou_wr.6.t:0 "Rampant Banditry"
 manchukou_wr.6.d:0 "Reports from multiple regions indicate that bandit activity has intensified once again. Armed groups have begun reappearing along rural roads and near market towns, preying on caravans and intimidating local communities. Where administrative reach is weak, these bandits operate openly, collecting protection money and disrupting communications.\n\nLocal authorities lack the manpower and coordination to address the situation on their own. If left unchecked, these groups will entrench themselves, drawing recruits from the countryside and turning temporary disorder into a lasting threat. The continued spread of banditry undermines confidence in the state and erodes control beyond the cities."
 manchukou_wr.6.a:0 "This cannot be ignored."
 manchukou_wr.7.t:0 "Formation of the First Anti-Bandit Force"
 manchukou_wr.7.d:0 "With bandit activity spreading across the countryside, the Manchuria–Mongolia government has authorized the formation of a dedicated anti-bandit force. Regular army units are being reorganized and reinforced with gendarmerie and auxiliary elements to create formations capable of sustained operations beyond major urban centers.\n\nUnlike previous ad hoc deployments, this force is intended to remain in the field for an extended period, securing key routes, occupying known bandit strongholds, and denying armed groups the opportunity to regroup. Commanders have been granted wider operational discretion, reflecting the government's decision to prioritize internal security over short-term economy of force.\n\nThe success or failure of this first organized effort will shape future policy toward internal pacification and determine whether the state can impose lasting order beyond the reach of its cities.\n\n§RIf the suppression is not completed within 15 days, serious consequences will follow.§!"
 manchukou_wr.7.a:0 "The force is dispatched."
 manchukou_wr.8.t:0 "Bandit Suppression Successful"
 manchukou_wr.8.d:0 "Reports from the field confirm that the bandit suppression campaign has achieved its objectives. Sustained troop deployments have dismantled organized bandit groups, secured key routes, and restored government control over previously unstable areas.\n\nWith leadership eliminated and supply networks broken, remaining elements have dispersed and no longer pose a coordinated threat. Local administration is beginning to function again, and confidence in state authority has noticeably improved. While vigilance remains necessary, the immediate danger posed by rampant banditry has been contained."
 manchukou_wr.8.a:0 "Order has been restored."
 manchukou_wr.9.t:0 "Bandit Suppression Falters"
 manchukou_wr.9.d:0 "The bandit suppression campaign has failed to achieve decisive results within the expected timeframe. Insufficient troop presence and coordination allowed bandit groups to evade encirclement, withdraw into difficult terrain, and reestablish their networks.\n\nAs government forces redeployed or thinned out, bandits returned to previously contested areas, resuming raids and intimidation. This failure has damaged confidence in state authority and encouraged armed groups to believe that prolonged resistance remains possible."
 manchukou_wr.9.a:0 "This setback will not be forgotten."
 manchukou_wr.10.t:0 "Formation of the Second Anti-Bandit Force"
 manchukou_wr.10.d:0 "The failure of the initial suppression effort has made clear that bandit groups remain resilient and adaptive. Exploiting gaps in deployment and coordination, surviving elements have regrouped and resumed their activities in the countryside.\n\nIn response, the Manchuria–Mongolia government has authorized the formation of a second anti-bandit force. This time, units are being reinforced and reorganized with greater emphasis on coordination, sustained presence, and control of key terrain. Lessons from the previous operation are being incorporated to prevent another costly stalemate.\n\nThis renewed effort reflects the state's determination to restore order despite earlier setbacks. However, repeated failure would further weaken authority and allow banditry to harden into a permanent feature of rural life."
 manchukou_wr.10.a:0 "The second force is assembled."
 manchukou_wr.11.t:0 "Second Bandit Suppression Successful"
 manchukou_wr.11.d:0 "The second phase of the bandit suppression campaign has achieved decisive results. Extended troop deployments and tighter control over remaining strongholds have eliminated residual bandit networks and sealed off routes previously used for regrouping.\n\nWith their hideouts dismantled and escape corridors blocked, organized banditry has ceased to function as a coherent force. Local administration reports a marked decline in raids and intimidation, and rural areas are increasingly returning to stable governance. Continued vigilance will be required, but the bandit threat has been reduced beyond recovery."
 manchukou_wr.11.a:0 "The countryside is secured."
 manchukou_wr.12.t:0 "Second Bandit Suppression Stalls"
 manchukou_wr.12.d:0 "Despite extended operations, the second suppression campaign has failed to eliminate bandit remnants. While pressure reduced their activity temporarily, insufficient coverage and difficult terrain allowed surviving groups to evade destruction and maintain hidden networks.\n\nAs deployments are strained and costs mount, bandits have begun to reappear in previously cleared areas. This setback suggests that further suppression will require even greater commitment, or that banditry may persist as a chronic problem if decisive action is not taken."
 manchukou_wr.12.a:0 "The problem remains unresolved."
 manchukou_wr.13.t:0 "Formation of the Third Anti-Bandit Force"
 manchukou_wr.13.d:0 "Despite successive suppression efforts, remnants of bandit groups continue to survive in remote regions, relying on difficult terrain and local concealment to avoid destruction. Their continued existence threatens to undo the gains achieved through earlier campaigns.\n\nThe government has therefore authorized the formation of a third and final anti-bandit force. This formation represents a decisive commitment to eliminate the remaining elements through concentrated deployments, tighter encirclement, and prolonged control of suspected hideouts. Resources and manpower are being stretched to their limits, but allowing banditry to persist any further is judged unacceptable.\n\nThis final effort will determine whether the state can permanently secure the countryside, or whether banditry will remain an enduring feature of frontier life."
 manchukou_wr.13.a:0 "This ends now."
 manchukou_wr.14.t:0 "Banditry Finally Suppressed"
 manchukou_wr.14.d:0 "The third suppression campaign has concluded with decisive success. Concentrated deployments, sealed escape routes, and prolonged pressure have eradicated the remaining bandit elements that had survived earlier operations.\n\nWith hideouts destroyed and leadership eliminated, organized banditry no longer functions as a meaningful force. Rural security has stabilized, transport routes are operating reliably, and local administration reports a sustained absence of coordinated armed activity. While isolated criminal acts may persist, the era of banditry as a systemic threat has effectively ended."
 manchukou_wr.14.a:0 "The countryside is finally secure."
 manchukou_wr.15.t:0 "Banditry Persists"
 manchukou_wr.15.d:0 "Despite the commitment of forces and resources, the third suppression campaign has failed to eliminate bandit remnants. Difficult terrain, exhaustion, and the limits of sustained deployment allowed surviving groups to endure and avoid complete destruction.\n\nWhile large-scale activity has diminished, the continued presence of armed groups means that banditry will remain a lingering problem in the countryside. Full resolution will require time, gradual stabilization, and the slow erosion of their support rather than further immediate campaigns."
 manchukou_wr.15.a:0 "The problem will fade with time."
 manchukou_wr.16.t:0 "The Outcome of the Bandit Suppression"
 manchukou_wr.16.d:0 "After three successive suppression campaigns, the bandit problem within Manchuria–Mongolia has been significantly reduced. Whether banditry has been eliminated entirely, however, is a separate question. The recent operations resulted in either complete success or only partial achievement, and the consequences of these outcomes will now become clear..."
 manchukou_wr.16.a:0 "It was a complete success."
 manchukou_wr.16.b:0 "It was only a partial success."
 manchukou_wr.17.t:0 "Efforts to Break Out of Isolation"
 manchukou_wr.17.d:0 "Recognizing that continued isolation threatens long-term survival, the Manchuria–Mongolia government has begun taking concrete steps to reengage with the outside world. While formal recognition remains out of reach, officials have moved to reopen channels of contact through trade, intermediaries, and limited diplomatic exchange.\n\nThese efforts focus on demonstrating stability and reliability rather than demanding immediate legitimacy. By normalizing restricted commerce and maintaining communication with foreign actors willing to engage, the government seeks to expand its diplomatic room for maneuver and reduce total dependence on a single partner.\n\nProgress is expected to be gradual, but even limited success may ease economic pressure and signal that Manchuria–Mongolia is no longer entirely cut off from international affairs."
 manchukou_wr.17.a:0 "Every opening matters."
 manchukou_wr.18.t:0 "On the Eve of the Northeast Bandit Suppression Commemoration"
 manchukou_wr.18.d:0 "Premier Zheng Xiaoxu is scheduled to attend the upcoming Northeast Bandit Suppression Commemoration in person. The ceremony marks the defeat of the Northeast Army and the restoration of order, and large crowds of soldiers, officials, and civilians are expected to gather for the occasion.\n\nRecent intelligence reports, however, indicate suspicious activity surrounding the event. Elements of anti-government groups and remnants of the Northeast Army may attempt to cause unrest during the ceremony or even target senior officials.\n\nZheng Xiaoxu has expressed his determination to attend the ceremony as planned, yet voices within the administration are urging stronger security measures and increased protection. An event of such national significance cannot be allowed to descend into chaos."
 manchukou_wr.18.a:0 "Fate awaits..."
 manchukou_wr.19.t:0 "The Influx of Japanese Capital"
 manchukou_wr.19.d:0 "Following the government's decision to invite Japanese investors, representatives of Japanese financial and industrial capital have begun arriving in major hubs across Manchuria–Mongolia. Negotiations over factory construction, infrastructure development, and resource concessions are advancing rapidly, with concrete investment plans entering the stage of implementation.\n\nFor the government, this inflow of capital provides immediate economic relief and access to technology and expertise that are difficult to obtain under current international conditions. At the same time, voices within the court are raising concerns about the expanding influence of foreign capital and the risk of long-term economic dependence.\n\nNevertheless, a judgment has been made that immediate development and stability must take priority. Questions of autonomy and control remain, but for now, reviving the economy has become the more urgent task."
 manchukou_wr.19.a:0 "Welcome!"
 manchukou_wr.20.t:0 "The First Five-Year Plan"
 manchukou_wr.20.d:0 "With major internal disorder brought under control, the Manchuria–Mongolia government has formally set the First Five-Year Plan in motion. This marks the first attempt since the state's establishment to manage the economy according to a long-term vision rather than improvised measures.\n\nThe plan centers on industrial expansion, infrastructure construction, and systematic resource development. Ministries and planning bodies are tasked with translating central directives into concrete projects, concentrating labor and capital according to defined priorities.\n\nHowever, a national plan of this scale represents an unprecedented challenge for the existing administrative system. Its success will depend not only on the availability of resources, but also on the government's capacity for coordination and sustained execution."
 manchukou_wr.20.a:0 "Breaking ground for a great undertaking."
 manchukou_wr.21.t:0 "Securing Foreign Exchange"
 manchukou_wr.21.d:0 "As the Manchuria–Mongolia Yuan enters wider circulation, securing foreign exchange has emerged as a central concern for monetary stability. The government has begun restructuring trade settlements, tightening control over selected exports, and implementing measures aimed at accumulating foreign currency.\n\nForeign-currency transactions have increased in certain industries, and gradual inflows are being achieved through trade with Japan and third countries. These measures are not intended to produce immediate results, but to establish a foundation for sustaining confidence in the national currency."
 manchukou_wr.21.a:0 "Proceed step by step."
 manchukou_wr.22.t:0 "Foreign Reserves and Economic Stabilization"
 manchukou_wr.22.d:0 "As a result of sustained efforts to secure foreign exchange, the Manchuria–Mongolia government has achieved a sufficient level of reserves. This has eased concerns over currency circulation and external payments, while significantly improving confidence in the Manchuria–Mongolia Yuan.\n\nExchange rate fluctuations have begun to moderate, and merchants and financial institutions are resuming transactions in a more predictable environment. The stabilization of foreign reserves has brought broader economic confidence, providing the state with greater room to pursue fiscal and industrial policy."
 manchukou_wr.22.a:0 "Stability takes hold."
 manchukou_wr.23.t:0 "Beneath the Fertile Plains of Manchuria"
 manchukou_wr.23.d:0 "Across the fertile plains of Manchuria, production rises with a steadiness unseen in previous years. Agricultural yields have stabilized under mechanization efforts, factories maintain consistent output, and railways carry goods between industrial centers without major interruption.\n\nSteel flows from expanded foundries, new workshops hum with activity, and resource extraction supports the growing demands of industry. Trade routes function more efficiently, and shortages that once constrained development have eased.\n\nThis moment marks not a dramatic transformation, but a sustained phase of economic vitality. Output grows, infrastructure supports expansion, and the foundations of material prosperity are firmly taking shape."
 manchukou_wr.23.a:0 "The fields and furnaces prosper."
 manchukou_wr.24.t:0 "All Grass and Wood Perish"
 manchukou_wr.24.d:0 "The train carrying Premier Zheng Xiaoxu from Harbin toward Mukden proceeded south along the railway as planned. As it approached the tracks near Changchun, a sudden explosion erupted beneath the rails.\n\nThe blast tore apart the track and hurled the train off the line, overturning several carriages as smoke and debris filled the air. Guards and survivors attempted to rescue those trapped in the wreckage, but the carriage carrying the Premier had already been completely destroyed.\n\nThe journey to the Northeast Bandit Suppression Commemoration ended there."
 manchukou_wr.24.a:0 "Death waited beneath the rails."
 manchukou_wr.25.t:0 "All Grass and Wood Perish"
 manchukou_wr.25.d:0 "After arriving at Mukden Station, Premier Zheng Xiaoxu entered his motorcade and began the journey toward the West Pagoda. Crowds lined the streets to witness the ceremony, and the convoy moved slowly through the city.\n\nAs the vehicles approached the roads near the pagoda, a gunshot rang out from within the crowd. The Premier was struck inside his vehicle and collapsed as guards rushed to secure the area, but it was already too late.\n\nThe motorcade came to a halt and the ceremony never began."
 manchukou_wr.25.a:0 "A shot rang out from the crowd."
 manchukou_wr.26.t:0 "All Grass and Wood Perish"
 manchukou_wr.26.d:0 "A vast crowd of soldiers and civilians gathered at the West Pagoda square in Mukden for the Northeast Bandit Suppression Commemoration. Standing upon the platform, Premier Zheng Xiaoxu delivered his address celebrating the restoration of order in the Northeast.\n\nIn the middle of the speech, a gunshot echoed across the square. The Premier was struck and collapsed upon the stage as confusion spread rapidly through the assembled crowd.\n\nGuards rushed forward to secure the platform, but the moment had already passed. The ceremony ended where it stood."
 manchukou_wr.26.a:0 "It ended upon the stage."
 manchukou_wr.27.t:0 "Flowers Bloom from Withered Wood"
 manchukou_wr.27.d1:0 "Ahead of the Northeast Bandit Suppression Commemoration, intelligence services and security units carried out extensive inspections along the railway route, the motorcade path, and the West Pagoda ceremony grounds.\n\nThe line from Harbin to Mukden was searched repeatedly, checkpoints were reinforced at key stations and transfer points, and additional guards and plainclothes agents were deployed along the roads leading from Mukden Station to the ceremony site. Surveillance of entrants and spectators around the West Pagoda was also tightened far beyond normal standards.\n\nThese preparations proved decisive. Shortly before the ceremony was set to begin, a plot to assassinate the Premier was uncovered in advance. The suspect, identified as a member of the Concordia Association, was arrested before he could approach the platform, and weapons, infiltration routes, and traces of coordination were seized on the spot. The plot collapsed just moments before it could be carried out.\n\nPremier Zheng Xiaoxu mounted the platform as scheduled and completed his address without incident. The commemoration concluded in order. The day's safety was not a matter of chance, but the product of thorough preparation."
 manchukou_wr.27.d2:0 "Although repeated warnings were raised ahead of the Northeast Bandit Suppression Commemoration, virtually no meaningful security preparations were carried out.\n\nThe railway route received only superficial checks, the motorcade path was left largely unsecured, and security at the West Pagoda remained little different from ordinary ceremonial arrangements. Soldiers and civilians filled the square, but there was no serious system in place for closely screening the crowd.\n\nThen, in the middle of the Premier's speech, an assassin hiding among the onlookers drew a pistol and fired. The attacker, later identified as a member of the Concordia Association, sent a round directly toward the platform. In a moment that seemed almost impossible, the bullet only grazed past the Premier and missed its mark. Guards, soldiers, and attendants nearby lunged at once, and the assassin was overpowered on the spot with the weapon still in hand.\n\nNo careful preparation had prevented the attack. The Premier survived, and the assassin was captured in the act. The outcome was owed not to security planning, but to sheer fortune and the desperate speed of those closest to the platform."
 manchukou_wr.27.a:0 "The danger has passed."
 manchukou_wr.27.b:0 "What luck!"
 manchukou_wr.28.t:0 "Debate over Cabinet Reorganization"
 manchukou_wr.28.d1:0 "Following the Northeast Bandit Suppression Commemoration, calls for reforming the administrative structure of the Manchuria–Mongolia government have rapidly spread. The crisis brought about by the Northeast Army invasion and the disorder that followed revealed that the traditional aristocratic administrative system can no longer reliably govern the state.\n\nZheng Xiaoxu and the constitutionalist elders argue that the government must reorganize itself upon a constitutional foundation and carry out broad reforms in both civil administration and military governance. The Concordia Association, while determined to maintain its influence, has also agreed to cooperate in these discussions.\n\nEmperor Pu Giye has likewise begun considering the formation of a new cabinet in the interest of stability and modernization."
 manchukou_wr.28.d2:0 "The assassination of Premier Zheng Xiaoxu has shaken the power structure of the Manchuria–Mongolia government. The constitutionalists who had rallied around him have lost their central leadership and have begun to fragment, while fierce debates over the future direction of the state are erupting among the aristocratic elders and senior officials.\n\nAmid this confusion, the Concordia Association has begun to expand its influence by emphasizing the role it played in administration and military affairs during the crisis. Some constitutionalist figures have also begun cooperating with the Association, giving rise to a new political alignment.\n\nIn the midst of this uncertain situation, Emperor Pu Giye has begun considering the formation of a new cabinet."
 manchukou_wr.28.a:0 "A new cabinet is necessary."
 manchukou_wr.29.t:0 "The Constitutionalists Push for Reform"
 manchukou_wr.29.d:0 "After the Northeast Army crisis, Zheng Xiaoxu concluded that the state apparatus must be reorganized and began actively promoting cabinet reform. Centering his efforts on the constitution, he aims to restructure the administrative system and gradually transform the traditional aristocratic power structure into a more institutionalized form of government.\n\nThe constitutionalist elders believe this will create a more stable framework for governance and lay the foundation for long-term national modernization. Emperor Pu Giye has shown cautious support for this direction."
 manchukou_wr.29.a:0 "Let the reforms begin."
 manchukou_wr.30.t:0 "Participation of the Concordia Association"
 manchukou_wr.30.d:0 "As discussions over cabinet reform continue, members of the Concordia Association have also begun participating in the reorganization of the government. The military capability and organizational strength demonstrated by the Association during the Northeast Army crisis have earned it a certain degree of recognition within Manchuria–Mongolia.\n\nZheng Xiaoxu and the constitutionalist elders have concluded that completely excluding the Association would be unrealistic, and instead favor maintaining a limited framework of cooperation. As a result, several Concordia figures are likely to take positions in the new cabinet."
 manchukou_wr.30.a:0 "Cooperation is necessary."
 manchukou_wr.31.t:0 "The Zheng Xiaoxu Cabinet Completed"
 manchukou_wr.31.d:0 "After lengthy negotiations, the composition of the new cabinet has finally been completed. Zheng Xiaoxu reorganized the government around the constitutionalist elders while including several members of the Concordia Association in a compromise arrangement.\n\nThe new cabinet will operate under constitutional principles while balancing the influence of aristocratic elites, the Concordia Association, and the constitutionalist faction.\n\nThough not a complete transformation, it marks the first step toward a more stable governing structure for the Manchuria–Mongolia government."
 manchukou_wr.31.a:0 "A new government is formed."
 manchukou_wr.32.t:0 "The Council of Elders Divided"
 manchukou_wr.32.d:0 "Following the death of Zheng Xiaoxu, intense disputes have erupted within the Council of Elders. Some aristocratic figures insist on preserving the existing order, while others argue that the failures revealed by the Northeast Army crisis require the acceptance of a new political structure.\n\nThe constitutionalists themselves have begun to fragment without their central leader. This growing division is destabilizing the government's power structure."
 manchukou_wr.32.a:0 "The turmoil begins."
 manchukou_wr.33.t:0 "The Rising Influence of the Concordia Association"
 manchukou_wr.33.d:0 "While the political situation descends into confusion, the Concordia Association has rapidly expanded its influence. Taking advantage of the division within the Council of Elders, Concordia members are increasingly occupying positions within administrative and military institutions, and several constitutionalist figures have begun aligning themselves with the Association.\n\nIn particular, the Pan-Asianist faction led by Kanji Ishiwara argues that the state must be reorganized along far stronger and more radical lines."
 manchukou_wr.33.a:0 "Their power grows."
 manchukou_wr.34.t:0 "The Appointment of Kanji Ishiwara"
 manchukou_wr.34.d:0 "As political instability continues, members of the Concordia Association and several constitutionalist figures have begun arguing that the state requires stronger leadership to overcome the crisis.\n\nThe administrative and military capabilities demonstrated by the Association during the Northeast Army crisis have strengthened these claims. In the end, Emperor Pu Giye decided that restoring national order and stabilizing government administration required decisive leadership, and appointed Kanji Ishiwara as the new Premier following Zheng Xiaoxu.\n\nThe new cabinet has been formed largely around Concordia Association figures, ushering the Manchuria–Mongolia government into a new political phase."
 manchukou_wr.34.a:0 "A new Premier is appointed."
 manchukou_wr.35.t:0 "Expansion of the Grand Councillor's Authority"
 manchukou_wr.35.d:0 "Within the court there is growing agreement that the state's administrative coordination must be strengthened. The existence of multiple ministries and political factions has increasingly led to confusion in policy execution, as competing interests complicate decision-making and delay implementation.\n\nA proposal has therefore emerged to grant clearer and broader authority to the Grand Councillor, allowing the office to coordinate the work of various ministries and oversee the execution of government policy. This measure is intended not merely to empower a single official but to reorganize the functioning of the administrative system as a whole.\n\nIf the Grand Councillor is able to assume a central role in coordinating the affairs of the court, the efficiency and consistency of governance are expected to improve significantly."
 manchukou_wr.35.a:0 "Expand the authority."
 manchukou_wr.36.t:0 "Our Own Way"
 manchukou_wr.36.d:0 "Debate continues within the court regarding the direction of reform. Some argue that Western institutions should be adopted wholesale, believing that rapid modernization demands decisive change. Others warn that such an approach risks undermining the political traditions and social foundations of Manchuria–Mongolia.\n\nIn the end, reform has been framed around the principle of 'Eastern Spirit, Western Techniques.' Western institutions may be studied and selectively adopted, but the political and cultural foundations of the state will remain rooted in East Asian tradition.\n\nUnder this policy, the government has begun strengthening Confucian-oriented state propaganda and expanding the civil examination system as a modern continuation of the imperial examination tradition. Reform will proceed while preserving the ideological foundations of the state."
 manchukou_wr.36.a:0 "A path suited to our state."
 manchukou_wr.37.t:0 "Chinese Essence, Western Application"
 manchukou_wr.37.d:0 "Officials within the court have begun reassessing the legacy of the Self-Strengthening Movement of the late Qing. While Western weapons and technology were introduced during that period, the lack of deeper educational and institutional reform ultimately limited its success.\n\nLearning from this experience, the government of Manchuria–Mongolia seeks to adopt Western knowledge more systematically. The political structure inherited from the Qing will remain intact, but education and scholarship are to be modernized in order to fully absorb Western science and technology.\n\nPlans are already underway to establish Western-style universities, invite foreign professors, and expand overseas study programs so that technical knowledge can be acquired in a more structured and lasting manner."
 manchukou_wr.37.a:0 "We must learn their knowledge."
 manchukou_wr.38.t:0 "Paradise of the Kingly Way"
 manchukou_wr.38.d:0 "The vision of the state promoted by the Concordia Association has long been summarized under the concept of the 'Paradise of the Kingly Way.' It represents more than simply preserving Manchuria–Mongolia as a successor to the Qing dynasty; it seeks to construct a new political order in which multiple peoples coexist under the principle of Five Races Harmony.\n\nThe term 'Kingly Way' refers to rule grounded not in coercion but in moral authority and social order, while 'Paradise' describes the stable society created under such governance. The Concordia Association now seeks to place this concept at the center of state administration, reorganizing both government institutions and social policy around it.\n\nManchuria is no longer defined as a mere frontier but as a state intended to embody the ideals of the Kingly Way."
 manchukou_wr.38.a:0 "Realize the Kingly Paradise."
 manchukou_wr.39.t:0 "A New Constitution"
 manchukou_wr.39.d:0 "A movement has begun to establish a clearer constitutional structure for the state. The current administrative order developed through compromise between different political forces and lacks a firm institutional foundation.\n\nThe proposed constitution seeks to embed the principles of Five Races Harmony and the Kingly Way within the framework of the state. By clarifying the roles of the emperor, the cabinet, and the administrative institutions, the government aims to give a more coherent structure to the political order.\n\nRather than being a simple legal reform, this constitution represents the institutionalization of the political vision promoted by the Concordia Association."
 manchukou_wr.39.a:0 "Define the new order."
 manchukou_wr.40.t:0 "Promoting the Future of Greater East Asia"
 manchukou_wr.40.d:0 "The Concordia Association portrays Manchuria–Mongolia as a state entrusted with a great mission: the realization of Pan-Asian unity. The concept of Greater East Asia is presented as a political vision in which the peoples of Asia cooperate and coexist within a new international order.\n\nGovernment propaganda institutions and political organizations are actively spreading this vision, portraying Manchuria–Mongolia as the center preparing the future of East Asia. Through schools, newspapers, and various political groups, Pan-Asianism is increasingly presented as one of the long-term objectives of the state.\n\nSuch propaganda serves as an important means of explaining the international order envisioned by the Concordia Association to the population."
 manchukou_wr.40.a:0 "Asia must stand as one."
 manchukou_wr.41.t:0 "A New Manchuria under a New Heaven and Earth"
 manchukou_wr.41.d:0 "The Concordia Association envisions a transformation of Manchuria that goes beyond administrative reform. The region is to be reorganized as the center of a new political order rather than a peripheral territory of a fallen empire.\n\nAdministrative institutions, economic structures, and social organization are being restructured in accordance with this vision. The objective is the creation of a fundamentally new state built upon the ideological framework promoted by the Concordia Association.\n\nSupporters describe this transformation as the creation of 'a New Manchuria under a New Heaven and Earth.'"
 manchukou_wr.41.a:0 "A new age begins."
 manchukou_wr.42.t:0 "Reaffirmation of Pan-Asianism"
 manchukou_wr.42.d:0 "The international order of East Asia has long been shaped under the pressure of Western powers. The many peoples of Asia have followed different paths, yet all have faced common challenges amid foreign interference.\n\nIn response to these circumstances, the government now seeks to once again emphasize the principle of Pan-Asian cooperation. Manchuria–Mongolia presents cooperation and coexistence among the peoples of Asia as the foundation of a new regional order, declaring that the future of East Asia must be shaped not by external domination but by the cooperation of Asian nations themselves.\n\nThis vision is closely connected to the role Manchuria–Mongolia seeks to play within the emerging regional order."
 manchukou_wr.42.a:0 "Asia Is One."
 manchukou_wr.43.t:0 "Legal Codification of the Five Races Harmony"
 manchukou_wr.43.d:0 "The lands of Manchuria and Mongolia are home to many different peoples. Manchus, Mongols, Koreans, Chinese, and Japanese communities have long coexisted across the region, each with their own traditions and histories.\n\nThe government now seeks to recognize this reality by establishing interethnic cooperation as a fundamental principle of the state. New legislation prohibits ethnic discrimination and guarantees equal legal protection for all inhabitants of the state. These principles will not remain merely symbolic but will be incorporated into the administrative and judicial framework of the country.\n\nThrough these measures the state hopes to strengthen stability within a multiethnic society and establish the foundations for shared prosperity."
 manchukou_wr.43.a:0 "Five Peoples, One State."
 manchukou_wr.44.t:0 "People from the West"
 manchukou_wr.44.d:0 "Political upheaval and persecution in Europe have forced many Jewish communities to seek new homes abroad. Some entrepreneurs, intellectuals, and community leaders have begun looking toward East Asia, and the cities of Manchuria—particularly Harbin—are increasingly seen as places of opportunity and relative stability.\n\nGovernment settlement policies and regional development plans have made the area especially attractive. Merchants, engineers, financiers, and scholars are gradually arriving, bringing skills and connections that may contribute to the economic growth of the state.\n\nWhat role this new community will ultimately play within the society of Manchuria–Mongolia remains uncertain, but the streets of Harbin are already beginning to echo with new languages and new hopes."
 manchukou_wr.44.a:0 "Welcome!"
 manchukou_wr.45.t:0 "Victory from the Northern Front"
 manchukou_wr.45.d:0 "The fighting across the Mongolian steppe has finally come to an end. Frontier defense forces and mobile cavalry divisions managed to hold the line through bitter combat and have successfully repelled the Soviet advance. The northern frontier has been stabilized once more, and the enemy forces are now withdrawing.\n\nThis battle carries meaning far beyond a simple border clash. Many had viewed the Emperor's decision to enter the war without full consultation with the cabinet as a dangerous gamble. In the end, however, the army has turned that gamble into victory.\n\nThe outcome has demonstrated that Manchuria–Mongolia is capable of defending its own borders. Military morale has risen, and the prestige of the state has been strengthened. Yet many also remember how perilous this decision truly was."
 manchukou_wr.45.a:0 "The frontier stands secure."
 manchukou_wr.46.t:0 "Lessons of the Past"
 manchukou_wr.46.d:0 "The fall of the Qing Empire was not merely the end of a dynasty but the exposure of deep structural weaknesses within the state itself. Administrative corruption, outdated military institutions, and a political system unable to adapt to a changing world ultimately led to imperial collapse.\n\nToday the leaders of Manchuria–Mongolia once again reflect upon this history. The question facing the state is whether these failures will remain a tragedy of the past, or whether they can serve as lessons for the construction of a stronger and more stable nation.\n\nMany now argue that determined reforms are necessary if the state is to avoid repeating the mistakes that once brought down the empire."
 manchukou_wr.46.a:0 "History must not repeat itself."
 manchukou_wr.47.t:0 "The Datong Restoration"
 manchukou_wr.47.d:0 "The collapse of the Qing Empire marked a profound transformation in the political order of East Asia. Institutions that had governed the empire for centuries—its administrative system, military organization, and social hierarchy—were no longer able to respond effectively to the rapidly changing world beyond its borders. While the global balance of power shifted and new ideas spread across the region, the imperial state struggled to adapt, and its eventual fall revealed the deep weaknesses within its structure.\n\nToday the leaders of Manchuria–Mongolia seek to ensure that these failures do not remain merely a tragedy of history. Efforts are underway to reorganize the state's administrative institutions, modernize the armed forces, and reshape the economic foundations of the country. While preserving the authority of the emperor, the government is attempting to place the machinery of the state upon more efficient and systematic institutions capable of guiding the nation through the challenges of a new era.\n\nThese reforms are widely seen as more than ordinary policy adjustments. Many observers have begun to describe this transformation as the 'Datong Restoration'—a moment when the state seeks to learn from the failures of the past and construct a new political order for the future."
 manchukou_wr.47.a:0 "Ten Thousand Years to the Emperor!"
 manchukou_wr.48.t:0 "The Mukden Victory Parade"
 manchukou_wr.48.d:0 "Crowds gathered in the streets of Mukden. Columns of soldiers marched through the gates of the city while citizens stood along the roads to welcome them home.\n\nThe Emperor himself appeared to greet the returning troops, and the officers and soldiers saluted as they passed before the throne. The outcome of the war in the north is now seen as more than a military success—it has become a moment that reaffirmed the authority and legitimacy of the state.\n\nMany speak of the victory as a sign that Heaven’s favor has returned. In the eyes of the court of Mukden, the Mandate of Heaven has been proven once again."
 manchukou_wr.48.a:0 "Long Live the Emperor!"
 manchukou_wr.49.t:0 "A Letter from the Prime Minister of the Great Unity State"
 manchukou_wr.49.d:0 "To the Government of the Republic of China, from Kanji Ishiwara, Prime Minister of the Great Unity State.\n\nThe future of East Asia now stands at a decisive crossroads. Amid the pressures of imperialist powers and the upheavals of world affairs, if the nations of Asia continue to confront and divide themselves, the consequences will ultimately fall upon us all. In such an age, it cannot be wise for the peoples of Asia to persist in mutual distrust and conflict.\n\nFor many years I have believed that the fate of East Asia is not merely a matter of border disputes or temporary interests. In the greater course of human history, the world will inevitably move toward a final and decisive confrontation. If Asia does not unite as a civilization sharing a common destiny, it will find it difficult to avoid domination and division imposed by outside powers.\n\nFor this reason, the government of the Great Unity State does not seek rivalry or hostility with China. On the contrary, if our two nations of the East can cooperate on the basis of mutual respect and trust, it may become possible to establish a new order that secures stability and prosperity for the whole of East Asia. We hope to build friendly relations and pursue closer cooperation while respecting political independence and mutual sovereignty.\n\nAccordingly, the government of the Great Unity State proposes the establishment of formal friendly relations with the Republic of China, and consultations toward an alliance agreement. This is not an act of hostility directed against any particular nation, but a joint effort to preserve the autonomy and peace of Asia. The future of Asia must be decided by Asians themselves. We await the wise judgment and positive reply of your government.\n\nPrime Minister of the Great Unity State\n\nKanji Ishiwara"
 manchukou_wr.49.a:0 "These people are insane."
 manchukou_wr.50.t:0 "Reform of the Aristocratic Stipend System"
 manchukou_wr.50.d:0 "Amid growing debates over national finances, the stipend system granted to the aristocracy is once again under review. For generations these stipends have served as one of the principal means by which Qing and Mongol nobles maintained their status, yet many now argue that the fiscal structure of the state must be reorganized if modern governance is to be sustained.\n\nWithin the government, reformers have begun to invoke the 'Nineteen Constitutional Principles' discussed in the aftermath of the Xinhai Revolution as a legal justification for gradually regulating aristocratic privileges within a constitutional framework. The reduction of stipends has been proposed as the first step in this process, marking the beginning of a broader effort to bring the state's finances under a more systematic administration."
 manchukou_wr.50.a:0 "Begin the fiscal reforms."
 manchukou_wr.51.t:0 "Regulation of Aristocratic Estates"
 manchukou_wr.51.d:0 "The estates granted to aristocratic families have long served as independent bases of power. These hereditary land grants have often created friction between local administration and the authority of the state.\n\nThe government has therefore begun measures to integrate these estates into a more modern administrative framework. Although resistance from noble families is expected, reformist officials insist that the reorganization of land privileges is necessary to stabilize the overall structure of state governance."
 manchukou_wr.51.a:0 "Reorganize the land system."
 manchukou_wr.52.t:0 "Abolition of the Grain Stipend System"
 manchukou_wr.52.d:0 "The grain stipends provided to aristocrats, known as monthly allotments, have long symbolized the traditional privilege structure of the old order. Yet within the modern economic environment—marked by expanding industry and growing cities—such arrangements are increasingly regarded as inefficient expenditures.\n\nThe government is now considering the abolition of this system in order to reorganize food distribution under a centralized administrative structure. While many nobles view this measure as an attack upon established tradition, reformist officials argue that such changes are essential for modern fiscal and administrative management."
 manchukou_wr.52.a:0 "Terminate the grain allotments."
 manchukou_wr.53.t:0 "Restrictions on Banner Lord Authority"
 manchukou_wr.53.d:0 "For generations Mongol nobles have exercised lordly authority under the Banner System, including the right to mobilize local populations for corvée labor and service. While such authority once formed a cornerstone of regional governance, it has increasingly come into conflict with the modern administrative structure of the state.\n\nThe government has now begun implementing measures to limit certain powers associated with the Banner System, seeking to consolidate local authority under the institutions of the central government."
 manchukou_wr.53.a:0 "Restrict local authority."
 manchukou_wr.54.t:0 "Reform of the Official Appointment System"
 manchukou_wr.54.d:0 "The Manchu–Han Dual Appointment System has long regulated the distribution of official posts through ethnic quotas. While this system once served to preserve the historical balance of power within the empire, it has also generated difficulties within a modern administrative framework.\n\nThe government has therefore begun reviewing the appointment system with the intention of gradually expanding merit-based selection grounded in administrative competence and experience."
 manchukou_wr.54.a:0 "Reform the bureaucracy."
 manchukou_wr.55.t:0 "Adjustment of Aristocratic Parliamentary Privileges"
 manchukou_wr.55.d:0 "Aristocratic elites have traditionally exercised considerable influence within the legislative institutions of the state. As the political system gradually moves toward a constitutional framework, these privileges have increasingly come under scrutiny.\n\nThe government is now discussing measures to limit the political influence and speaking privileges of the aristocracy in order to create a more balanced legislative structure."
 manchukou_wr.55.a:0 "Rebalance parliamentary authority."
 manchukou_wr.56.t:0 "Reorganization of the Privy Institutions"
 manchukou_wr.56.d:0 "Aristocratic advisory bodies have long played a significant role in shaping national policy. However, their authority often overlaps with that of the formal administrative apparatus, leading to criticism that they hinder governmental efficiency.\n\nIn response, the government has begun reorganizing the powers of these privy institutions, integrating their functions more clearly within the executive administrative framework."
 manchukou_wr.56.a:0 "Reorganize the administrative structure."
 manchukou_wr.57.t:0 "Integration of Noble Militias"
 manchukou_wr.57.d:0 "Private armed forces maintained by aristocratic estates have historically served to preserve order within their domains. Yet these militias operate outside the central military structure and in some cases remain beyond effective state control.\n\nThe government has therefore initiated plans to integrate these forces into the national army, seeking to create a more unified and centralized military system."
 manchukou_wr.57.a:0 "Integrate the forces."
 manchukou_wr.58.t:0 "The Rejected Proposal"
 manchukou_wr.58.d:0 "A reply has arrived from the government of [FROM.GetName], but its contents are far from what we had hoped for.\n\nThe proposal for friendly relations and cooperation put forward by the Great Unity State has been firmly rejected. The government of [FROM.GetName] dismissed the initiative as unrealistic and argued that the court in Mukden has no authority to shape the future of East Asia. They further claim that our vision threatens their sovereignty and political order.\n\nKanji Ishiwara has received the reply with calm determination. He had long suspected that the political forces of China would not easily accept such a proposal. Nevertheless, the offer had served as a test of whether cooperation in East Asia was possible.\n\nWith that possibility now denied, the future of East Asia may be decided by other means."
 manchukou_wr.58.a:0 "Then we shall prove it by force."
 manchukou_wr.59.t:0 "A Telegram from the Great Unity State"
 manchukou_wr.59.d:0 "An urgent telegram has arrived at the authorities stationed in Dairen from the government of the Great Unity State. In the message they claim that their current level of military preparedness is insufficient to face the dangers ahead, and request that Japan provide weapons and military supplies.\n\nThe Great Unity State emphasizes that this assistance would not merely be a transaction of matériel, but a matter of shared interest in maintaining stability in the north and preserving order in East Asia. However, if the request is accepted, the military strength of Manchuria–Mongolia would be further enhanced, and how that strength might be used would ultimately remain in their hands.\n\nWhatever response we send will inevitably affect our relations with the Great Unity State, as well as the situation across the northern frontier."
 manchukou_wr.59.a:0 "Provide the weapons."
 manchukou_wr.59.b:0 "Refuse the request."
 manchukou_wr.60.t:0 "Cargo from Dairen"
 manchukou_wr.60.d:0 "The reply to the telegram sent to Dairen arrived not in words, but in the form of freight trains and shipping manifests. The Japanese authorities have accepted our request, and a considerable quantity of weapons and military supplies is now being delivered through the ports and railways.\n\nThe military believes that this assistance will alleviate equipment shortages at the front and accelerate the reorganization of the armed forces. Within the court, many interpret this as a sign that Japan still recognizes the strategic value of the Great Unity State.\n\nOthers warn that such support ultimately serves Japanese interests as much as our own. Nevertheless, for the moment these weapons will provide the means to prepare for the trials that lie ahead."
 manchukou_wr.60.a:0 "Begin distribution at once."
 manchukou_wr.61.t:0 "A Cold Reply"
 manchukou_wr.61.d:0 "A reply has arrived regarding the telegram sent to Dairen, but its contents are far from what we had hoped for. The Japanese authorities have rejected our request and made it clear that they have no intention of becoming involved in additional military support under present circumstances.\n\nThe military fears that this decision will disrupt plans to secure much-needed equipment, while some ministers argue that relying on outside assistance was a dangerous miscalculation from the beginning. Within the court, resentment is growing among those who believe that Japan does not regard the Great Unity State as a true partner.\n\nThe path before us is now clear. If foreign arsenals remain closed, then we must open our own and make the necessary preparations by our own strength."
 manchukou_wr.61.a:0 "Then we shall rely on ourselves."
 manchukou_wr.62.t:0 "Invisible Channels"
 manchukou_wr.62.d:0 "After Japan refused our request for weapons, the court continued to debate how to secure the necessary military supplies. Kanji Ishiwara, however, seemed far less concerned with the official response.\n\nFor years he had cultivated personal connections and informal networks within the Kwantung Army and the Japanese military establishment. Many officers there shared the belief that a coming conflict was inevitable, and some quietly sympathized with strengthening the Great Unity State.\n\nOnly days later, an unscheduled freight train departed from the military warehouses in Dairen. On paper it was nothing more than a routine logistical transfer. In reality, the train's destination was the arsenals of Manchuria–Mongolia.\n\nOfficially, nothing unusual had occurred. Yet the rifles and ammunition inside those crates were now firmly in our hands."
 manchukou_wr.62.a:0 "Weapons go to those who will use them."
 manchukou_wr.63.t:0 "The Dairen Arsenal Incident"
 manchukou_wr.63.d:0 "An unusual report has arrived from the military warehouses in Dairen. During a routine inventory inspection, officials discovered that several crates of rifles and ammunition no longer matched the official records.\n\nOn paper the equipment had been transferred through normal logistical channels, but further inquiry suggests that the shipment may have been loaded onto a train bound for Manchuria–Mongolia. Rumors have begun to circulate that certain officers within the Kwantung Army may have been involved.\n\nHowever, opening a formal investigation could provoke unnecessary friction within the military command.\n\nIn the end, it was decided that the matter would be quietly set aside."
 manchukou_wr.63.a:0 "Best not to ask questions."
 manchukou_wr.64.t:0 "The Banner of Vertical Alliance"
 manchukou_wr.64.d:0 "As the forces of Manchuria–Mongolia cross the frontier and advance into the Central Plains, the situation across the country is rapidly destabilizing. Regional warlords, provincial authorities, and the central government alike now recognize that this crisis can no longer be faced in a state of division.\n\nThe government has immediately called for nationwide resistance and is moving to organize a 'Vertical Alliance Army' that will unify all military forces and administrative structures under a single command. This represents not merely a military mobilization, but a political effort to bind all of China together against foreign invasion.\n\nAt the same time, proclamations such as the following are being spread across the land:\n\n\"A common man wearing the mask of a king dares once more to seize the Central Plains!\nAs in the Xinhai year, we shall tear down the pretender once again!\nAll the people of China are ready. Come, specters of Manchuria—come, you Japanese. Bring your sharpened rifles and blades!\nWe shall drive you back beyond the Three Eastern Provinces!\"\n\nResponses from across the provinces are swift, and forces once divided are now beginning to converge into a single front."
 manchukou_wr.64.a:0 "The Central Plains belong to the Han."
 manchukou_wr.65.t:0 "Join the Vertical Alliance Army"
 manchukou_wr.65.d:0 "The southward advance of the forces of Manchuria–Mongolia can no longer be seen as a crisis limited to a single region. What began in the north is rapidly becoming a struggle that will determine the fate of all China, and no government can now afford to ignore it.\n\nThe government of [ROOT.GetName] has recognized this reality. The need of the moment is not continued division and rivalry, but temporary unity against a common enemy. It has therefore been concluded that, if the order of China is to be preserved, the various armies and regimes of the country must gather under a single front.\n\nFor that reason, the government of [ROOT.GetName] has decided to formally join the Vertical Alliance Army led by the National Protection Government. Former distrust and competition have been set aside, and what remains now is the common struggle to repel the invader."
 manchukou_wr.65.a:0 "Now is the time for unity."
 manchukou_wr.66.t:0 "[FROM.GetName] Joins the Vertical Alliance"
 manchukou_wr.66.d:0 "The government of [FROM.GetName] has formally declared its intention to join the Vertical Alliance Army. With the invasion by Manchuria–Mongolia now fully underway, this decision carries significance far beyond a simple increase in manpower.\n\nThe National Protection Government has long called upon the forces of China to unite in common resistance, and that appeal is now beginning to bear fruit. The entry of [FROM.GetName] is a sign that China has not yet been entirely broken apart, and that a common front against the invader is becoming a reality.\n\nWithin the government, there is a growing sense that past conflicts and rivalries must be set aside for the moment and that this decision should be welcomed. The struggle to defend China has now taken another step forward."
 manchukou_wr.66.a:0 "Let every rifle face the north."
 manchukou_wr.67.t:0 "Outbreak of the Manchurian–Chinese War"
 manchukou_wr.67.d:0 "Since the founding of [MAN.GetName], China has consistently claimed that the territory of [MAN.GetName] rightfully belongs to them, denouncing it as an illegitimate regime occupying Chinese land. The long-standing tensions between the two states finally erupted yesterday. Both sides have now entered a state of full-scale war, a development that is far from welcome for us, given the vast capital we have invested in Manchuria. The government is now considering the possibility of intervening in the conflict to secure the region.\n\nJapan has also experienced continuous economic and diplomatic friction with China, and has at times been forced to accept certain concessions under Chinese pressure. Some voices now argue that this war presents an opportunity to strike back against an increasingly assertive China and restore Japan’s interests on the continent."
 manchukou_wr.67.a:0 "This will not take long to resolve."
 manchukou_wr.68.t:0 "Intervention in the Manchurian–Chinese War"
 manchukou_wr.68.d:0 "The government has ultimately decided to intervene in the Manchurian–Chinese War. As the conflict expands and instability in the northern regions intensifies, it has been concluded that maintaining neutrality can no longer guarantee national interests or security. This decision is also influenced by the vast financial and resource investments tied to [MAN.GetName].\n\nA formal declaration of war has been delivered to the Chinese government, and Japan has now entered into a state of war with China. The military has already begun executing operational plans, mobilizing troops and supplies, while key ports and railways have been placed under military control.\n\nThis decision represents more than a simple intervention; it is expected to have far-reaching consequences for the balance of power in East Asia. The government views this war as a decisive turning point that will shape the long-term strategic environment."
 manchukou_wr.68.a:0 "There is no turning back now."
 manchukou_wr.69.t:0 "Escalation of the Manchurian–Chinese War"
 manchukou_wr.69.d:0 "With full-scale war underway between Manchuria and China, Japan has now formally entered the conflict, sharply escalating tensions across East Asia. Tokyo has justified its intervention as necessary to secure northern stability and protect its interests, but this decision is expected to have consequences far beyond a simple military action, potentially reshaping the regional order.\n\nKey ports and railways have already been placed under military control, and governments across the region are closely monitoring the unfolding situation. The outcome of this war is likely to significantly alter the political landscape of East Asia."
 manchukou_wr.69.a:0 "The war is expanding."
 manchukou_wr.70.t:0 "Proposal for a Common Front"
 manchukou_wr.70.d:0 "As the Manchurian–Chinese War continues to escalate, the Japanese government has come to recognize the need to redefine its relationship with [MAN.GetName]. It has been concluded that closer cooperation between the two states is essential to ensure stability along the northern front and to maintain order in East Asia.\n\nTo that end, Japan has formally invited [MAN.GetName] to join its sphere of influence and establish a common front. This proposal represents not merely a diplomatic gesture, but a transition toward military cooperation and shared strategic interests.\n\nAccepting this offer would allow both nations to build a stronger cooperative framework, but it would also mean a deeper extension of Japanese influence within [MAN.GetName]."
 manchukou_wr.70.a:0 "Great!"
 manchukou_wr.71.t:0 "Demand for Manchuria–Mongolia's Intervention"
 manchukou_wr.71.d:0 "As the war with China intensifies, the strategic importance of the northern front has become increasingly evident. The General Staff has concluded that military cooperation from Manchuria–Mongolia is essential to secure a decisive advantage.\n\nIf the forces of Manchuria–Mongolia launch an offensive from the north, Chinese forces will be forced to disperse, creating favorable conditions for Japanese operations across the entire front.\n\nAccordingly, the government has decided to formally request the intervention of [MAN.GetName]. Now, all that remains is their response."
 manchukou_wr.71.a:0 "Demand their intervention."
 manchukou_wr.72.t:0 "Japanese Request for Intervention"
 manchukou_wr.72.d:0 "A formal telegram has arrived from the Japanese government demanding that [MAN.GetName] immediately enter the war against China in order to secure a strategic advantage.\n\nJapan argues that a northern offensive by Manchuria–Mongolia would force Chinese forces to disperse, thereby weakening their overall resistance and improving the situation across the front.\n\nAccepting this request would strengthen relations with Japan, but it would also mean committing directly to a large-scale war."
 manchukou_wr.72.a:0 "This is a good opportunity."
 manchukou_wr.73.t:0 "The Fate of Outer Mongolia"
 manchukou_wr.73.d:0 "Following victory in the Mongolian War, the influence of [MAN.GetName] has rapidly expanded across Outer Mongolia. Local aristocratic elites and administrative bodies are increasingly acknowledging our authority, and militarily, further resistance has become difficult to sustain.\n\nThe question now is how this territory should be governed. Outer Mongolia can be directly annexed and incorporated into the Empire, or a puppet regime can be established, preserving elements of the existing order while maintaining indirect control.\n\nDirect rule would ensure firm control, but it would also bring administrative burdens and the risk of resistance. Establishing a puppet state may provide greater stability, but it would limit the extent of direct authority. The government must now decide the future of Outer Mongolia."
 manchukou_wr.73.a:0 "Annex it completely."
 manchukou_wr.73.b:0 "Establish a puppet state."