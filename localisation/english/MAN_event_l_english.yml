 chi_border_conflict.9.d:0 "Our military has finally used force to recapture the core territory illegally occupied by [729.Owner.GetName]. After a fierce border conflict, the forces of [729.Owner.GetName] have withdrawn, and the foreign flags fluttering over the concession have all been lowered. This is a great victory for the Chinese nation and the first step in restoring our national sovereignty."
 chi_border_conflict.9.a:0 "This is our rightful territory!"
 chi_border_conflict.10.t:0 "Concession Recapture Operation Failed"
 chi_border_conflict.10.d:0 "Unable to break through the solid defensive lines and overwhelming firepower of [729.Owner.GetName], our military's operation to enter the concession has ended in a dismal failure. Having suffered massive casualties, our forces were forced to retreat from the border region, and their flags still arrogantly wave over our land."
 chi_border_conflict.10.a:0 "A shameful defeat."
