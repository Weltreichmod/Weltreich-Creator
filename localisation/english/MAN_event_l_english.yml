l_english:
 manchukou_wr.1.t:0 "Chun Jie Offensive"
 manchukou_wr.1.d:0 "It has been barely a month since the bandit forces crossed from the Republic and violated the territory of Manchukuo in the 12th month of the 19th Year of Datong. Yet their campaign, launched without legitimacy, has already faltered after suffering severe losses in the Battle of Anshan and falling back in disarray. The situation now presents us with a decisive opportunity. Should we fail to act, the task of eradicating these bandits will become immeasurably more difficult.\n\nThus, the commanders of Manchukuo have resolved to launch the Chun Jie Offensive. In accordance with the operational plan, we will exert pressure along the entire front against the so-called Northeast Army."
 manchukou_wr.1.a:0 "Advance!"
 manchukou_wr.2.t:0 "Intervention in the Mongolian Situation"
 manchukou_wr.2.d:0 "Following the Soviet advance into Mongolia, the situation along the northern frontier has rapidly destabilized. The Manchukuo–Mongolia government and its military leadership have concluded that the crisis is not a mere border incident, but a direct threat to the security of both Manchuria and Mongolia.\n\nAccording to field reports, Soviet troops under General Blyukher's unauthorized command continue to push across the northern border, placing severe pressure on local settlements and administrative outposts.\n\nThe Imperial Council has convened an emergency session and decided that the situation can no longer be tolerated. Border Defense Forces and mobile cavalry divisions have been readied for deployment into the Mongolian front, with the government declaring the intervention as a measure to safeguard 'frontier stability and the order of the northern territories.'\n\nThis decision marks a new phase in the regional balance, and neighboring states are watching the development with great attention."
 manchukou_wr.2.a:0 "We will safeguard order in the North."
 manchukou_wr.3.t:0 "The Situation in Manchuria–Mongolia"
 manchukou_wr.3.d:0 "The ultimate purpose of the Manchuria–Mongolia government is to advance into the Central Plains and reunify China. This objective defines the reason for the state's existence and serves as the standard by which all policy is judged.\n\nHowever, the present reality stands in sharp contrast to this goal. International isolation restricts diplomacy and trade, while uncontrolled migration, ethnic tension, and the proliferation of bandit groups and irregular formations erode internal order. The army is vast in number, yet its command structure and combat effectiveness remain fragmented, and aristocratic privilege consumes resources required for reform.\n\nCompounding these difficulties, the Qing remnant court under Puyi in Beijing continues to assert its own claim to Great Qing legitimacy, both symbolically and in foreign perception. The coexistence of two imperial courts, divided by lineage and authority, further undermines the Manchuria–Mongolia government's ability to present itself as the sole and rightful successor.\n\nTo turn the goal of reunifying China into reality, the state must first secure its own survival and legitimacy. Consolidating authority in Fengtian, restoring internal order, and rebuilding the political and military foundations of the government must become our immediate priority."
 manchukou_wr.3.a:0 "There is much to be done."
 manchukou_wr.4.t:0 "The New Year Address of the Emperor"
 manchukou_wr.4.d:0 "As the twentieth year of the Qianlong era dawns, the Emperor of Manchuria–Mongolia addresses the nation at a moment of hardship and resolve. The state stands far from the heart of China, surrounded by doubt abroad and disorder at home. Yet the purpose of the realm remains unchanged.\n\nThe Emperor declares that the suffering of recent decades is not the end of history, but a trial to be endured. Order must be restored, authority reestablished, and the people bound once more to a common purpose. Only through discipline, unity, and perseverance can the state survive the present age.\n\nThis new year is proclaimed not as a time of comfort, but as the beginning of preparation. The road ahead will be long and demanding, yet it is the will of the throne that Manchuria–Mongolia shall endure, strengthen itself, and one day advance southward to reclaim its place in China."
 manchukou_wr.4.a:0 "Long live the Emperor!"
 manchukou_wr.5.t:0 "The Twelve Imperial Edicts"
 manchukou_wr.5.d:0 "By personally issuing the Twelve Imperial Edicts, Emperor Pu Giye places himself at the center of the state's moral and political direction. Rather than delegating ideological authority to ministers, the Emperor speaks in his own voice, presenting standards of conduct meant to guide officials and subjects alike.\n\nThe Edicts encourage harmony among the Five Peoples, elevate agriculture as the foundation of national strength, and stress frugality, education, and respect for constitutional order and law. They demand diligence in labor, honesty in reporting and administration, vigilance in matters of security, and trustworthiness in trade and finance. Balanced rural development and cooperation among Asian peoples are also emphasized as essential to stability.\n\nThrough these principles, Pu Giye seeks to rule through example and discipline, drawing upon the image of the great Qing sovereigns such as Emperor Kangxi. The Edicts bind Pan-Asian ideals and Five Races Harmony to imperial authority, reinforcing legitimacy through moral governance rather than force alone."
 manchukou_wr.5.a:0 "The Edicts shall guide us."
 manchukou_wr.6.t:0 "Rampant Banditry"
 manchukou_wr.6.d:0 "Reports from multiple regions indicate that bandit activity has intensified once again. Armed groups have begun reappearing along rural roads and near market towns, preying on caravans and intimidating local communities. Where administrative reach is weak, these bandits operate openly, collecting protection money and disrupting communications.\n\nLocal authorities lack the manpower and coordination to address the situation on their own. If left unchecked, these groups will entrench themselves, drawing recruits from the countryside and turning temporary disorder into a lasting threat. The continued spread of banditry undermines confidence in the state and erodes control beyond the cities."
 manchukou_wr.6.a:0 "This cannot be ignored."
 manchukou_wr.7.t:0 "Formation of the First Anti-Bandit Force"
 manchukou_wr.7.d:0 "With bandit activity spreading across the countryside, the Manchuria–Mongolia government has authorized the formation of a dedicated anti-bandit force. Regular army units are being reorganized and reinforced with gendarmerie and auxiliary elements to create formations capable of sustained operations beyond major urban centers.\n\nUnlike previous ad hoc deployments, this force is intended to remain in the field for an extended period, securing key routes, occupying known bandit strongholds, and denying armed groups the opportunity to regroup. Commanders have been granted wider operational discretion, reflecting the government's decision to prioritize internal security over short-term economy of force.\n\nThe success or failure of this first organized effort will shape future policy toward internal pacification and determine whether the state can impose lasting order beyond the reach of its cities.\n\n§RIf the suppression is not completed within 15 days, serious consequences will follow.§!"
 manchukou_wr.7.a:0 "The force is dispatched."
 manchukou_wr.8.t:0 "Bandit Suppression Successful"
 manchukou_wr.8.d:0 "Reports from the field confirm that the bandit suppression campaign has achieved its objectives. Sustained troop deployments have dismantled organized bandit groups, secured key routes, and restored government control over previously unstable areas.\n\nWith leadership eliminated and supply networks broken, remaining elements have dispersed and no longer pose a coordinated threat. Local administration is beginning to function again, and confidence in state authority has noticeably improved. While vigilance remains necessary, the immediate danger posed by rampant banditry has been contained."
 manchukou_wr.8.a:0 "Order has been restored."
 manchukou_wr.9.t:0 "Bandit Suppression Falters"
 manchukou_wr.9.d:0 "The bandit suppression campaign has failed to achieve decisive results within the expected timeframe. Insufficient troop presence and coordination allowed bandit groups to evade encirclement, withdraw into difficult terrain, and reestablish their networks.\n\nAs government forces redeployed or thinned out, bandits returned to previously contested areas, resuming raids and intimidation. This failure has damaged confidence in state authority and encouraged armed groups to believe that prolonged resistance remains possible."
 manchukou_wr.9.a:0 "This setback will not be forgotten."
 manchukou_wr.10.t:0 "Formation of the Second Anti-Bandit Force"
 manchukou_wr.10.d:0 "The failure of the initial suppression effort has made clear that bandit groups remain resilient and adaptive. Exploiting gaps in deployment and coordination, surviving elements have regrouped and resumed their activities in the countryside.\n\nIn response, the Manchuria–Mongolia government has authorized the formation of a second anti-bandit force. This time, units are being reinforced and reorganized with greater emphasis on coordination, sustained presence, and control of key terrain. Lessons from the previous operation are being incorporated to prevent another costly stalemate.\n\nThis renewed effort reflects the state's determination to restore order despite earlier setbacks. However, repeated failure would further weaken authority and allow banditry to harden into a permanent feature of rural life."
 manchukou_wr.10.a:0 "The second force is assembled."
 manchukou_wr.11.t:0 "Second Bandit Suppression Successful"
 manchukou_wr.11.d:0 "The second phase of the bandit suppression campaign has achieved decisive results. Extended troop deployments and tighter control over remaining strongholds have eliminated residual bandit networks and sealed off routes previously used for regrouping.\n\nWith their hideouts dismantled and escape corridors blocked, organized banditry has ceased to function as a coherent force. Local administration reports a marked decline in raids and intimidation, and rural areas are increasingly returning to stable governance. Continued vigilance will be required, but the bandit threat has been reduced beyond recovery."
 manchukou_wr.11.a:0 "The countryside is secured."
 manchukou_wr.12.t:0 "Second Bandit Suppression Stalls"
 manchukou_wr.12.d:0 "Despite extended operations, the second suppression campaign has failed to eliminate bandit remnants. While pressure reduced their activity temporarily, insufficient coverage and difficult terrain allowed surviving groups to evade destruction and maintain hidden networks.\n\nAs deployments are strained and costs mount, bandits have begun to reappear in previously cleared areas. This setback suggests that further suppression will require even greater commitment, or that banditry may persist as a chronic problem if decisive action is not taken."
 manchukou_wr.12.a:0 "The problem remains unresolved."
 manchukou_wr.13.t:0 "Formation of the Third Anti-Bandit Force"
 manchukou_wr.13.d:0 "Despite successive suppression efforts, remnants of bandit groups continue to survive in remote regions, relying on difficult terrain and local concealment to avoid destruction. Their continued existence threatens to undo the gains achieved through earlier campaigns.\n\nThe government has therefore authorized the formation of a third and final anti-bandit force. This formation represents a decisive commitment to eliminate the remaining elements through concentrated deployments, tighter encirclement, and prolonged control of suspected hideouts. Resources and manpower are being stretched to their limits, but allowing banditry to persist any further is judged unacceptable.\n\nThis final effort will determine whether the state can permanently secure the countryside, or whether banditry will remain an enduring feature of frontier life."
 manchukou_wr.13.a:0 "This ends now."
 manchukou_wr.14.t:0 "Banditry Finally Suppressed"
 manchukou_wr.14.d:0 "The third suppression campaign has concluded with decisive success. Concentrated deployments, sealed escape routes, and prolonged pressure have eradicated the remaining bandit elements that had survived earlier operations.\n\nWith hideouts destroyed and leadership eliminated, organized banditry no longer functions as a meaningful force. Rural security has stabilized, transport routes are operating reliably, and local administration reports a sustained absence of coordinated armed activity. While isolated criminal acts may persist, the era of banditry as a systemic threat has effectively ended."
 manchukou_wr.14.a:0 "The countryside is finally secure."
 manchukou_wr.15.t:0 "Banditry Persists"
 manchukou_wr.15.d:0 "Despite the commitment of forces and resources, the third suppression campaign has failed to eliminate bandit remnants. Difficult terrain, exhaustion, and the limits of sustained deployment allowed surviving groups to endure and avoid complete destruction.\n\nWhile large-scale activity has diminished, the continued presence of armed groups means that banditry will remain a lingering problem in the countryside. Full resolution will require time, gradual stabilization, and the slow erosion of their support rather than further immediate campaigns."
 manchukou_wr.15.a:0 "The problem will fade with time."
 manchukou_wr.16.t:0 "The Outcome of the Bandit Suppression"
 manchukou_wr.16.d:0 "After three successive suppression campaigns, the bandit problem within Manchuria–Mongolia has been significantly reduced. Whether banditry has been eliminated entirely, however, is a separate question. The recent operations resulted in either complete success or only partial achievement, and the consequences of these outcomes will now become clear..."
 manchukou_wr.16.a:0 "It was a complete success."
 manchukou_wr.16.b:0 "It was only a partial success."
 manchukou_wr.17.t:0 "Efforts to Break Out of Isolation"
 manchukou_wr.17.d:0 "Recognizing that continued isolation threatens long-term survival, the Manchuria–Mongolia government has begun taking concrete steps to reengage with the outside world. While formal recognition remains out of reach, officials have moved to reopen channels of contact through trade, intermediaries, and limited diplomatic exchange.\n\nThese efforts focus on demonstrating stability and reliability rather than demanding immediate legitimacy. By normalizing restricted commerce and maintaining communication with foreign actors willing to engage, the government seeks to expand its diplomatic room for maneuver and reduce total dependence on a single partner.\n\nProgress is expected to be gradual, but even limited success may ease economic pressure and signal that Manchuria–Mongolia is no longer entirely cut off from international affairs."
 manchukou_wr.17.a:0 "Every opening matters."
 manchukou_wr.18.t:0 "The Beginning of the Datong Restoration"
 manchukou_wr.18.d:0 "As internal problems converge with the demands of the era, Pu Giye has begun to actively pursue a series of reforms that would come to be known as the Datong Restoration. These reforms do not yet possess a clear blueprint or a fully developed structure, but they arise from the recognition that the state can no longer be sustained through improvised governance alone.\n\nWithin and beyond the court, a wide range of reform proposals concerning administration, education, and overall state governance are being put forward, with sharp disagreements over priorities and direction. The atmosphere is unsettled and at times disordered, yet a momentum unlike anything before can also be felt. Rather than preserving the status quo, a decision has been made to accept uncertainty in pursuit of change.\n\nThis process shows Pu Giye moving beyond cautious preservation and beginning to shoulder the responsibilities of rule directly. Whether these early efforts will develop into coherent reform remains uncertain, but a path toward more deliberate and defined state governance has unmistakably been opened."
 manchukou_wr.18.a:0 "A great step forward."
 manchukou_wr.19.t:0 "The Influx of Japanese Capital"
 manchukou_wr.19.d:0 "Following the government's decision to invite Japanese investors, representatives of Japanese financial and industrial capital have begun arriving in major hubs across Manchuria–Mongolia. Negotiations over factory construction, infrastructure development, and resource concessions are advancing rapidly, with concrete investment plans entering the stage of implementation.\n\nFor the government, this inflow of capital provides immediate economic relief and access to technology and expertise that are difficult to obtain under current international conditions. At the same time, voices within the court are raising concerns about the expanding influence of foreign capital and the risk of long-term economic dependence.\n\nNevertheless, a judgment has been made that immediate development and stability must take priority. Questions of autonomy and control remain, but for now, reviving the economy has become the more urgent task."
 manchukou_wr.19.a:0 "Welcome!"
 manchukou_wr.20.t:0 "The First Five-Year Plan"
 manchukou_wr.20.d:0 "With major internal disorder brought under control, the Manchuria–Mongolia government has formally set the First Five-Year Plan in motion. This marks the first attempt since the state’s establishment to manage the economy according to a long-term vision rather than improvised measures.\n\nThe plan centers on industrial expansion, infrastructure construction, and systematic resource development. Ministries and planning bodies are tasked with translating central directives into concrete projects, concentrating labor and capital according to defined priorities.\n\nHowever, a national plan of this scale represents an unprecedented challenge for the existing administrative system. Its success will depend not only on the availability of resources, but also on the government’s capacity for coordination and sustained execution."
 manchukou_wr.20.a:0 "Breaking ground for a great undertaking."
 manchukou_wr.21.t:0 "Securing Foreign Exchange"
 manchukou_wr.21.d:0 "As the Manchuria–Mongolia Yuan enters wider circulation, securing foreign exchange has emerged as a central concern for monetary stability. The government has begun restructuring trade settlements, tightening control over selected exports, and implementing measures aimed at accumulating foreign currency.\n\nForeign-currency transactions have increased in certain industries, and gradual inflows are being achieved through trade with Japan and third countries. These measures are not intended to produce immediate results, but to establish a foundation for sustaining confidence in the national currency."
 manchukou_wr.21.a:0 "Proceed step by step."
 manchukou_wr.22.t:0 "Foreign Reserves and Economic Stabilization"
 manchukou_wr.22.d:0 "As a result of sustained efforts to secure foreign exchange, the Manchuria–Mongolia government has achieved a sufficient level of reserves. This has eased concerns over currency circulation and external payments, while significantly improving confidence in the Manchuria–Mongolia Yuan.\n\nExchange rate fluctuations have begun to moderate, and merchants and financial institutions are resuming transactions in a more predictable environment. The stabilization of foreign reserves has brought broader economic confidence, providing the state with greater room to pursue fiscal and industrial policy."
 manchukou_wr.22.a:0 "Stability takes hold."