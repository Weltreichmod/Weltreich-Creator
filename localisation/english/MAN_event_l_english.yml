l_english:
 manchukou_wr.1.t:0 "Chun Jie Offensive"
 manchukou_wr.1.d:0 "It has been barely a month since the bandit forces crossed from the Republic and violated the territory of Manchukuo in the 12th month of the 19th Year of Datong. Yet their campaign, launched without legitimacy, has already faltered after suffering severe losses in the Battle of Anshan and falling back in disarray. The situation now presents us with a decisive opportunity. Should we fail to act, the task of eradicating these bandits will become immeasurably more difficult.\n\nThus, the commanders of Manchukuo have resolved to launch the Chun Jie Offensive. In accordance with the operational plan, we will exert pressure along the entire front against the so-called Northeast Army."
 manchukou_wr.1.a:0 "Advance!"
 manchukou_wr.2.t:0 "Intervention in the Mongolian Situation"
 manchukou_wr.2.d:0 "Since Soviet forces entered Mongolia, the situation along the frontier has rapidly become unstable. The government and military leadership of Manchuria–Mongolia believe that this is not a mere local clash, but a serious challenge threatening the security of both Manchuria and Mongolia.\n\nAccording to observation reports, Soviet forces have continued their advance beyond the northern frontier line under the unilateral orders of General Blyukher, placing severe pressure on frontier settlements and administrative outposts.\n\nThe Emperor has convened an emergency council on his own initiative, mobilizing the frontier defense forces and the mobile cavalry divisions and proclaiming the country's entry into the war. Many within the government appear dissatisfied with this decision, as it was made without sufficient consultation with the cabinet.\n\nThis decision by Manchuria–Mongolia is pushing the regional situation into a new phase, and neighboring states are watching its development closely. §RIf Manchuria–Mongolia were to lose a war entered at the Emperor's sole discretion, the fate of the state would be swept into turmoil.§!"
 manchukou_wr.2.a:0 "We will safeguard order in the North."
 manchukou_wr.3.t:0 "The Situation in Manchuria–Mongolia"
 manchukou_wr.3.d:0 "The ultimate purpose of the Manchuria–Mongolia government is to advance into the Central Plains and reunify China. This objective defines the reason for the state's existence and serves as the standard by which all policy is judged.\n\nHowever, the present reality stands in sharp contrast to this goal. International isolation restricts diplomacy and trade, while uncontrolled migration, ethnic tension, and the proliferation of bandit groups and irregular formations erode internal order. The army is vast in number, yet its command structure and combat effectiveness remain fragmented, and aristocratic privilege consumes resources required for reform.\n\nCompounding these difficulties, the Qing remnant court under Puyi in Peking continues to assert its own claim to Great Qing legitimacy, both symbolically and in foreign perception. The coexistence of two imperial courts, divided by lineage and authority, further undermines the Manchuria–Mongolia government's ability to present itself as the sole and rightful successor.\n\nTo turn the goal of reunifying China into reality, the state must first secure its own survival and legitimacy. Consolidating authority in Fengtian, restoring internal order, and rebuilding the political and military foundations of the government must become our immediate priority."
 manchukou_wr.3.a:0 "There is much to be done."
 manchukou_wr.4.t:0 "The New Year Address of the Emperor"
 manchukou_wr.4.d:0 "As the twentieth year of the Qianlong era dawns, the Emperor of Manchuria–Mongolia addresses the nation at a moment of hardship and resolve. The state stands far from the heart of China, surrounded by doubt abroad and disorder at home. Yet the purpose of the realm remains unchanged.\n\nThe Emperor declares that the suffering of recent decades is not the end of history, but a trial to be endured. Order must be restored, authority reestablished, and the people bound once more to a common purpose. Only through discipline, unity, and perseverance can the state survive the present age.\n\nThis new year is proclaimed not as a time of comfort, but as the beginning of preparation. The road ahead will be long and demanding, yet it is the will of the throne that Manchuria–Mongolia shall endure, strengthen itself, and one day advance southward to reclaim its place in China."
 manchukou_wr.4.a:0 "Long live the Emperor!"
 manchukou_wr.5.t:0 "The Twelve Imperial Edicts"
 manchukou_wr.5.d:0 "By personally issuing the Twelve Imperial Edicts, Emperor Pu Giye places himself at the center of the state's moral and political direction. Rather than delegating ideological authority to ministers, the Emperor speaks in his own voice, presenting standards of conduct meant to guide officials and subjects alike.\n\nThe Edicts encourage harmony among the Five Peoples, elevate agriculture as the foundation of national strength, and stress frugality, education, and respect for constitutional order and law. They demand diligence in labor, honesty in reporting and administration, vigilance in matters of security, and trustworthiness in trade and finance. Balanced rural development and cooperation among Asian peoples are also emphasized as essential to stability.\n\nThrough these principles, Pu Giye seeks to rule through example and discipline, drawing upon the image of the great Qing sovereigns such as Emperor Kangxi. The Edicts bind Pan-Asian ideals and Five Races Harmony to imperial authority, reinforcing legitimacy through moral governance rather than force alone."
 manchukou_wr.5.a:0 "The Edicts shall guide us."
 manchukou_wr.6.t:0 "Rampant Banditry"
 manchukou_wr.6.d:0 "Reports from multiple regions indicate that bandit activity has intensified once again. Armed groups have begun reappearing along rural roads and near market towns, preying on caravans and intimidating local communities. Where administrative reach is weak, these bandits operate openly, collecting protection money and disrupting communications.\n\nLocal authorities lack the manpower and coordination to address the situation on their own. If left unchecked, these groups will entrench themselves, drawing recruits from the countryside and turning temporary disorder into a lasting threat. The continued spread of banditry undermines confidence in the state and erodes control beyond the cities."
 manchukou_wr.6.a:0 "This cannot be ignored."
 manchukou_wr.7.t:0 "Formation of the First Anti-Bandit Force"
 manchukou_wr.7.d:0 "With bandit activity spreading across the countryside, the Manchuria–Mongolia government has authorized the formation of a dedicated anti-bandit force. Regular army units are being reorganized and reinforced with gendarmerie and auxiliary elements to create formations capable of sustained operations beyond major urban centers.\n\nUnlike previous ad hoc deployments, this force is intended to remain in the field for an extended period, securing key routes, occupying known bandit strongholds, and denying armed groups the opportunity to regroup. Commanders have been granted wider operational discretion, reflecting the government's decision to prioritize internal security over short-term economy of force.\n\nThe success or failure of this first organized effort will shape future policy toward internal pacification and determine whether the state can impose lasting order beyond the reach of its cities.\n\n§RIf the suppression is not completed within 15 days, serious consequences will follow.§!"
 manchukou_wr.7.a:0 "The force is dispatched."
 manchukou_wr.8.t:0 "Bandit Suppression Successful"
 manchukou_wr.8.d:0 "Reports from the field confirm that the bandit suppression campaign has achieved its objectives. Sustained troop deployments have dismantled organized bandit groups, secured key routes, and restored government control over previously unstable areas.\n\nWith leadership eliminated and supply networks broken, remaining elements have dispersed and no longer pose a coordinated threat. Local administration is beginning to function again, and confidence in state authority has noticeably improved. While vigilance remains necessary, the immediate danger posed by rampant banditry has been contained."
 manchukou_wr.8.a:0 "Order has been restored."
 manchukou_wr.9.t:0 "Bandit Suppression Falters"
 manchukou_wr.9.d:0 "The bandit suppression campaign has failed to achieve decisive results within the expected timeframe. Insufficient troop presence and coordination allowed bandit groups to evade encirclement, withdraw into difficult terrain, and reestablish their networks.\n\nAs government forces redeployed or thinned out, bandits returned to previously contested areas, resuming raids and intimidation. This failure has damaged confidence in state authority and encouraged armed groups to believe that prolonged resistance remains possible."
 manchukou_wr.9.a:0 "This setback will not be forgotten."
 manchukou_wr.10.t:0 "Formation of the Second Anti-Bandit Force"
 manchukou_wr.10.d:0 "The failure of the initial suppression effort has made clear that bandit groups remain resilient and adaptive. Exploiting gaps in deployment and coordination, surviving elements have regrouped and resumed their activities in the countryside.\n\nIn response, the Manchuria–Mongolia government has authorized the formation of a second anti-bandit force. This time, units are being reinforced and reorganized with greater emphasis on coordination, sustained presence, and control of key terrain. Lessons from the previous operation are being incorporated to prevent another costly stalemate.\n\nThis renewed effort reflects the state's determination to restore order despite earlier setbacks. However, repeated failure would further weaken authority and allow banditry to harden into a permanent feature of rural life."
 manchukou_wr.10.a:0 "The second force is assembled."
 manchukou_wr.11.t:0 "Second Bandit Suppression Successful"
 manchukou_wr.11.d:0 "The second phase of the bandit suppression campaign has achieved decisive results. Extended troop deployments and tighter control over remaining strongholds have eliminated residual bandit networks and sealed off routes previously used for regrouping.\n\nWith their hideouts dismantled and escape corridors blocked, organized banditry has ceased to function as a coherent force. Local administration reports a marked decline in raids and intimidation, and rural areas are increasingly returning to stable governance. Continued vigilance will be required, but the bandit threat has been reduced beyond recovery."
 manchukou_wr.11.a:0 "The countryside is secured."
 manchukou_wr.12.t:0 "Second Bandit Suppression Stalls"
 manchukou_wr.12.d:0 "Despite extended operations, the second suppression campaign has failed to eliminate bandit remnants. While pressure reduced their activity temporarily, insufficient coverage and difficult terrain allowed surviving groups to evade destruction and maintain hidden networks.\n\nAs deployments are strained and costs mount, bandits have begun to reappear in previously cleared areas. This setback suggests that further suppression will require even greater commitment, or that banditry may persist as a chronic problem if decisive action is not taken."
 manchukou_wr.12.a:0 "The problem remains unresolved."
 manchukou_wr.13.t:0 "Formation of the Third Anti-Bandit Force"
 manchukou_wr.13.d:0 "Despite successive suppression efforts, remnants of bandit groups continue to survive in remote regions, relying on difficult terrain and local concealment to avoid destruction. Their continued existence threatens to undo the gains achieved through earlier campaigns.\n\nThe government has therefore authorized the formation of a third and final anti-bandit force. This formation represents a decisive commitment to eliminate the remaining elements through concentrated deployments, tighter encirclement, and prolonged control of suspected hideouts. Resources and manpower are being stretched to their limits, but allowing banditry to persist any further is judged unacceptable.\n\nThis final effort will determine whether the state can permanently secure the countryside, or whether banditry will remain an enduring feature of frontier life."
 manchukou_wr.13.a:0 "This ends now."
 manchukou_wr.14.t:0 "Banditry Finally Suppressed"
 manchukou_wr.14.d:0 "The third suppression campaign has concluded with decisive success. Concentrated deployments, sealed escape routes, and prolonged pressure have eradicated the remaining bandit elements that had survived earlier operations.\n\nWith hideouts destroyed and leadership eliminated, organized banditry no longer functions as a meaningful force. Rural security has stabilized, transport routes are operating reliably, and local administration reports a sustained absence of coordinated armed activity. While isolated criminal acts may persist, the era of banditry as a systemic threat has effectively ended."
 manchukou_wr.14.a:0 "The countryside is finally secure."
 manchukou_wr.15.t:0 "Banditry Persists"
 manchukou_wr.15.d:0 "Despite the commitment of forces and resources, the third suppression campaign has failed to eliminate bandit remnants. Difficult terrain, exhaustion, and the limits of sustained deployment allowed surviving groups to endure and avoid complete destruction.\n\nWhile large-scale activity has diminished, the continued presence of armed groups means that banditry will remain a lingering problem in the countryside. Full resolution will require time, gradual stabilization, and the slow erosion of their support rather than further immediate campaigns."
 manchukou_wr.15.a:0 "The problem will fade with time."
 manchukou_wr.16.t:0 "The Outcome of the Bandit Suppression"
 manchukou_wr.16.d:0 "After three successive suppression campaigns, the bandit problem within Manchuria–Mongolia has been significantly reduced. Whether banditry has been eliminated entirely, however, is a separate question. The recent operations resulted in either complete success or only partial achievement, and the consequences of these outcomes will now become clear..."
 manchukou_wr.16.a:0 "It was a complete success."
 manchukou_wr.16.b:0 "It was only a partial success."
 manchukou_wr.17.t:0 "Efforts to Break Out of Isolation"
 manchukou_wr.17.d:0 "Recognizing that continued isolation threatens long-term survival, the Manchuria–Mongolia government has begun taking concrete steps to reengage with the outside world. While formal recognition remains out of reach, officials have moved to reopen channels of contact through trade, intermediaries, and limited diplomatic exchange.\n\nThese efforts focus on demonstrating stability and reliability rather than demanding immediate legitimacy. By normalizing restricted commerce and maintaining communication with foreign actors willing to engage, the government seeks to expand its diplomatic room for maneuver and reduce total dependence on a single partner.\n\nProgress is expected to be gradual, but even limited success may ease economic pressure and signal that Manchuria–Mongolia is no longer entirely cut off from international affairs."
 manchukou_wr.17.a:0 "Every opening matters."
 manchukou_wr.18.t:0 "On the Eve of the Northeast Bandit Suppression Commemoration"
 manchukou_wr.18.d:0 "Premier Zheng Xiaoxu is scheduled to attend the upcoming Northeast Bandit Suppression Commemoration in person. The ceremony marks the defeat of the Northeast Army and the restoration of order, and large crowds of soldiers, officials, and civilians are expected to gather for the occasion.\n\nRecent intelligence reports, however, indicate suspicious activity surrounding the event. Elements of anti-government groups and remnants of the Northeast Army may attempt to cause unrest during the ceremony or even target senior officials.\n\nZheng Xiaoxu has expressed his determination to attend the ceremony as planned, yet voices within the administration are urging stronger security measures and increased protection. An event of such national significance cannot be allowed to descend into chaos."
 manchukou_wr.18.a:0 "Fate awaits..."
 manchukou_wr.19.t:0 "The Influx of Japanese Capital"
 manchukou_wr.19.d:0 "Following the government's decision to invite Japanese investors, representatives of Japanese financial and industrial capital have begun arriving in major hubs across Manchuria–Mongolia. Negotiations over factory construction, infrastructure development, and resource concessions are advancing rapidly, with concrete investment plans entering the stage of implementation.\n\nFor the government, this inflow of capital provides immediate economic relief and access to technology and expertise that are difficult to obtain under current international conditions. At the same time, voices within the court are raising concerns about the expanding influence of foreign capital and the risk of long-term economic dependence.\n\nNevertheless, a judgment has been made that immediate development and stability must take priority. Questions of autonomy and control remain, but for now, reviving the economy has become the more urgent task."
 manchukou_wr.19.a:0 "Welcome!"
 manchukou_wr.20.t:0 "The First Five-Year Plan"
 manchukou_wr.20.d:0 "With major internal disorder brought under control, the Manchuria–Mongolia government has formally set the First Five-Year Plan in motion. This marks the first attempt since the state's establishment to manage the economy according to a long-term vision rather than improvised measures.\n\nThe plan centers on industrial expansion, infrastructure construction, and systematic resource development. Ministries and planning bodies are tasked with translating central directives into concrete projects, concentrating labor and capital according to defined priorities.\n\nHowever, a national plan of this scale represents an unprecedented challenge for the existing administrative system. Its success will depend not only on the availability of resources, but also on the government's capacity for coordination and sustained execution."
 manchukou_wr.20.a:0 "Breaking ground for a great undertaking."
 manchukou_wr.21.t:0 "Securing Foreign Exchange"
 manchukou_wr.21.d:0 "As the Manchuria–Mongolia Yuan enters wider circulation, securing foreign exchange has emerged as a central concern for monetary stability. The government has begun restructuring trade settlements, tightening control over selected exports, and implementing measures aimed at accumulating foreign currency.\n\nForeign-currency transactions have increased in certain industries, and gradual inflows are being achieved through trade with Japan and third countries. These measures are not intended to produce immediate results, but to establish a foundation for sustaining confidence in the national currency."
 manchukou_wr.21.a:0 "Proceed step by step."
 manchukou_wr.22.t:0 "Foreign Reserves and Economic Stabilization"
 manchukou_wr.22.d:0 "As a result of sustained efforts to secure foreign exchange, the Manchuria–Mongolia government has achieved a sufficient level of reserves. This has eased concerns over currency circulation and external payments, while significantly improving confidence in the Manchuria–Mongolia Yuan.\n\nExchange rate fluctuations have begun to moderate, and merchants and financial institutions are resuming transactions in a more predictable environment. The stabilization of foreign reserves has brought broader economic confidence, providing the state with greater room to pursue fiscal and industrial policy."
 manchukou_wr.22.a:0 "Stability takes hold."
 manchukou_wr.23.t:0 "Beneath the Fertile Plains of Manchuria"
 manchukou_wr.23.d:0 "Across the fertile plains of Manchuria, production rises with a steadiness unseen in previous years. Agricultural yields have stabilized under mechanization efforts, factories maintain consistent output, and railways carry goods between industrial centers without major interruption.\n\nSteel flows from expanded foundries, new workshops hum with activity, and resource extraction supports the growing demands of industry. Trade routes function more efficiently, and shortages that once constrained development have eased.\n\nThis moment marks not a dramatic transformation, but a sustained phase of economic vitality. Output grows, infrastructure supports expansion, and the foundations of material prosperity are firmly taking shape."
 manchukou_wr.23.a:0 "The fields and furnaces prosper."
 manchukou_wr.24.t:0 "All Grass and Wood Perish"
 manchukou_wr.24.d:0 "The train carrying Premier Zheng Xiaoxu from Harbin toward Mukden proceeded south along the railway as planned. As it approached the tracks near Changchun, a sudden explosion erupted beneath the rails.\n\nThe blast tore apart the track and hurled the train off the line, overturning several carriages as smoke and debris filled the air. Guards and survivors attempted to rescue those trapped in the wreckage, but the carriage carrying the Premier had already been completely destroyed.\n\nThe journey to the Northeast Bandit Suppression Commemoration ended there."
 manchukou_wr.24.a:0 "Death waited beneath the rails."
 manchukou_wr.25.t:0 "All Grass and Wood Perish"
 manchukou_wr.25.d:0 "After arriving at Mukden Station, Premier Zheng Xiaoxu entered his motorcade and began the journey toward the West Pagoda. Crowds lined the streets to witness the ceremony, and the convoy moved slowly through the city.\n\nAs the vehicles approached the roads near the pagoda, a gunshot rang out from within the crowd. The Premier was struck inside his vehicle and collapsed as guards rushed to secure the area, but it was already too late.\n\nThe motorcade came to a halt and the ceremony never began."
 manchukou_wr.25.a:0 "A shot rang out from the crowd."
 manchukou_wr.26.t:0 "All Grass and Wood Perish"
 manchukou_wr.26.d:0 "A vast crowd of soldiers and civilians gathered at the West Pagoda square in Mukden for the Northeast Bandit Suppression Commemoration. Standing upon the platform, Premier Zheng Xiaoxu delivered his address celebrating the restoration of order in the Northeast.\n\nIn the middle of the speech, a gunshot echoed across the square. The Premier was struck and collapsed upon the stage as confusion spread rapidly through the assembled crowd.\n\nGuards rushed forward to secure the platform, but the moment had already passed. The ceremony ended where it stood."
 manchukou_wr.26.a:0 "It ended upon the stage."
 manchukou_wr.27.t:0 "Flowers Bloom from Withered Wood"
 manchukou_wr.27.d1:0 "Ahead of the Northeast Bandit Suppression Commemoration, intelligence services and security units carried out extensive inspections along the railway route, the motorcade path, and the West Pagoda ceremony grounds.\n\nThe line from Harbin to Mukden was searched repeatedly, checkpoints were reinforced at key stations and transfer points, and additional guards and plainclothes agents were deployed along the roads leading from Mukden Station to the ceremony site. Surveillance of entrants and spectators around the West Pagoda was also tightened far beyond normal standards.\n\nThese preparations proved decisive. Shortly before the ceremony was set to begin, a plot to assassinate the Premier was uncovered in advance. The suspect, identified as a member of the Concordia Association, was arrested before he could approach the platform, and weapons, infiltration routes, and traces of coordination were seized on the spot. The plot collapsed just moments before it could be carried out.\n\nPremier Zheng Xiaoxu mounted the platform as scheduled and completed his address without incident. The commemoration concluded in order. The day's safety was not a matter of chance, but the product of thorough preparation."
 manchukou_wr.27.d2:0 "Although repeated warnings were raised ahead of the Northeast Bandit Suppression Commemoration, virtually no meaningful security preparations were carried out.\n\nThe railway route received only superficial checks, the motorcade path was left largely unsecured, and security at the West Pagoda remained little different from ordinary ceremonial arrangements. Soldiers and civilians filled the square, but there was no serious system in place for closely screening the crowd.\n\nThen, in the middle of the Premier's speech, an assassin hiding among the onlookers drew a pistol and fired. The attacker, later identified as a member of the Concordia Association, sent a round directly toward the platform. In a moment that seemed almost impossible, the bullet only grazed past the Premier and missed its mark. Guards, soldiers, and attendants nearby lunged at once, and the assassin was overpowered on the spot with the weapon still in hand.\n\nNo careful preparation had prevented the attack. The Premier survived, and the assassin was captured in the act. The outcome was owed not to security planning, but to sheer fortune and the desperate speed of those closest to the platform."
 manchukou_wr.27.a:0 "The danger has passed."
 manchukou_wr.27.b:0 "What luck!"
 manchukou_wr.28.t:0 "Debate over Cabinet Reorganization"
 manchukou_wr.28.d1:0 "Following the Northeast Bandit Suppression Commemoration, calls for reforming the administrative structure of the Manchuria–Mongolia government have rapidly spread. The crisis brought about by the Northeast Army invasion and the disorder that followed revealed that the traditional aristocratic administrative system can no longer reliably govern the state.\n\nZheng Xiaoxu and the constitutionalist elders argue that the government must reorganize itself upon a constitutional foundation and carry out broad reforms in both civil administration and military governance. The Concordia Association, while determined to maintain its influence, has also agreed to cooperate in these discussions.\n\nEmperor Pu Giye has likewise begun considering the formation of a new cabinet in the interest of stability and modernization."
 manchukou_wr.28.d2:0 "The assassination of Premier Zheng Xiaoxu has shaken the power structure of the Manchuria–Mongolia government. The constitutionalists who had rallied around him have lost their central leadership and have begun to fragment, while fierce debates over the future direction of the state are erupting among the aristocratic elders and senior officials.\n\nAmid this confusion, the Concordia Association has begun to expand its influence by emphasizing the role it played in administration and military affairs during the crisis. Some constitutionalist figures have also begun cooperating with the Association, giving rise to a new political alignment.\n\nIn the midst of this uncertain situation, Emperor Pu Giye has begun considering the formation of a new cabinet."
 manchukou_wr.28.a:0 "A new cabinet is necessary."
 manchukou_wr.29.t:0 "The Constitutionalists Push for Reform"
 manchukou_wr.29.d:0 "After the Northeast Army crisis, Zheng Xiaoxu concluded that the state apparatus must be reorganized and began actively promoting cabinet reform. Centering his efforts on the constitution, he aims to restructure the administrative system and gradually transform the traditional aristocratic power structure into a more institutionalized form of government.\n\nThe constitutionalist elders believe this will create a more stable framework for governance and lay the foundation for long-term national modernization. Emperor Pu Giye has shown cautious support for this direction."
 manchukou_wr.29.a:0 "Let the reforms begin."
 manchukou_wr.30.t:0 "Participation of the Concordia Association"
 manchukou_wr.30.d:0 "As discussions over cabinet reform continue, members of the Concordia Association have also begun participating in the reorganization of the government. The military capability and organizational strength demonstrated by the Association during the Northeast Army crisis have earned it a certain degree of recognition within Manchuria–Mongolia.\n\nZheng Xiaoxu and the constitutionalist elders have concluded that completely excluding the Association would be unrealistic, and instead favor maintaining a limited framework of cooperation. As a result, several Concordia figures are likely to take positions in the new cabinet."
 manchukou_wr.30.a:0 "Cooperation is necessary."
 manchukou_wr.31.t:0 "The Zheng Xiaoxu Cabinet Completed"
 manchukou_wr.31.d:0 "After lengthy negotiations, the composition of the new cabinet has finally been completed. Zheng Xiaoxu reorganized the government around the constitutionalist elders while including several members of the Concordia Association in a compromise arrangement.\n\nThe new cabinet will operate under constitutional principles while balancing the influence of aristocratic elites, the Concordia Association, and the constitutionalist faction.\n\nThough not a complete transformation, it marks the first step toward a more stable governing structure for the Manchuria–Mongolia government."
 manchukou_wr.31.a:0 "A new government is formed."
 manchukou_wr.32.t:0 "The Council of Elders Divided"
 manchukou_wr.32.d:0 "Following the death of Zheng Xiaoxu, intense disputes have erupted within the Council of Elders. Some aristocratic figures insist on preserving the existing order, while others argue that the failures revealed by the Northeast Army crisis require the acceptance of a new political structure.\n\nThe constitutionalists themselves have begun to fragment without their central leader. This growing division is destabilizing the government's power structure."
 manchukou_wr.32.a:0 "The turmoil begins."
 manchukou_wr.33.t:0 "The Rising Influence of the Concordia Association"
 manchukou_wr.33.d:0 "While the political situation descends into confusion, the Concordia Association has rapidly expanded its influence. Taking advantage of the division within the Council of Elders, Concordia members are increasingly occupying positions within administrative and military institutions, and several constitutionalist figures have begun aligning themselves with the Association.\n\nIn particular, the Pan-Asianist faction led by Kanji Ishiwara argues that the state must be reorganized along far stronger and more radical lines."
 manchukou_wr.33.a:0 "Their power grows."
 manchukou_wr.34.t:0 "The Appointment of Kanji Ishiwara"
 manchukou_wr.34.d:0 "As political instability continues, members of the Concordia Association and several constitutionalist figures have begun arguing that the state requires stronger leadership to overcome the crisis.\n\nThe administrative and military capabilities demonstrated by the Association during the Northeast Army crisis have strengthened these claims. In the end, Emperor Pu Giye decided that restoring national order and stabilizing government administration required decisive leadership, and appointed Kanji Ishiwara as the new Premier following Zheng Xiaoxu.\n\nThe new cabinet has been formed largely around Concordia Association figures, ushering the Manchuria–Mongolia government into a new political phase."
 manchukou_wr.34.a:0 "A new Premier is appointed."
 manchukou_wr.35.t:0 "Expansion of the Grand Councillor's Authority"
 manchukou_wr.35.d:0 "Within the court there is growing agreement that the state's administrative coordination must be strengthened. The existence of multiple ministries and political factions has increasingly led to confusion in policy execution, as competing interests complicate decision-making and delay implementation.\n\nA proposal has therefore emerged to grant clearer and broader authority to the Grand Councillor, allowing the office to coordinate the work of various ministries and oversee the execution of government policy. This measure is intended not merely to empower a single official but to reorganize the functioning of the administrative system as a whole.\n\nIf the Grand Councillor is able to assume a central role in coordinating the affairs of the court, the efficiency and consistency of governance are expected to improve significantly."
 manchukou_wr.35.a:0 "Expand the authority."
 manchukou_wr.36.t:0 "Our Own Way"
 manchukou_wr.36.d:0 "Debate continues within the court regarding the direction of reform. Some argue that Western institutions should be adopted wholesale, believing that rapid modernization demands decisive change. Others warn that such an approach risks undermining the political traditions and social foundations of Manchuria–Mongolia.\n\nIn the end, reform has been framed around the principle of 'Eastern Spirit, Western Techniques.' Western institutions may be studied and selectively adopted, but the political and cultural foundations of the state will remain rooted in East Asian tradition.\n\nUnder this policy, the government has begun strengthening Confucian-oriented state propaganda and expanding the civil examination system as a modern continuation of the imperial examination tradition. Reform will proceed while preserving the ideological foundations of the state."
 manchukou_wr.36.a:0 "A path suited to our state."
 manchukou_wr.37.t:0 "Chinese Essence, Western Application"
 manchukou_wr.37.d:0 "Officials within the court have begun reassessing the legacy of the Self-Strengthening Movement of the late Qing. While Western weapons and technology were introduced during that period, the lack of deeper educational and institutional reform ultimately limited its success.\n\nLearning from this experience, the government of Manchuria–Mongolia seeks to adopt Western knowledge more systematically. The political structure inherited from the Qing will remain intact, but education and scholarship are to be modernized in order to fully absorb Western science and technology.\n\nPlans are already underway to establish Western-style universities, invite foreign professors, and expand overseas study programs so that technical knowledge can be acquired in a more structured and lasting manner."
 manchukou_wr.37.a:0 "We must learn their knowledge."
 manchukou_wr.38.t:0 "Paradise of the Kingly Way"
 manchukou_wr.38.d:0 "The vision of the state promoted by the Concordia Association has long been summarized under the concept of the 'Paradise of the Kingly Way.' It represents more than simply preserving Manchuria–Mongolia as a successor to the Qing dynasty; it seeks to construct a new political order in which multiple peoples coexist under the principle of Five Races Harmony.\n\nThe term 'Kingly Way' refers to rule grounded not in coercion but in moral authority and social order, while 'Paradise' describes the stable society created under such governance. The Concordia Association now seeks to place this concept at the center of state administration, reorganizing both government institutions and social policy around it.\n\nManchuria is no longer defined as a mere frontier but as a state intended to embody the ideals of the Kingly Way."
 manchukou_wr.38.a:0 "Realize the Kingly Paradise."
 manchukou_wr.39.t:0 "A New Constitution"
 manchukou_wr.39.d:0 "A movement has begun to establish a clearer constitutional structure for the state. The current administrative order developed through compromise between different political forces and lacks a firm institutional foundation.\n\nThe proposed constitution seeks to embed the principles of Five Races Harmony and the Kingly Way within the framework of the state. By clarifying the roles of the emperor, the cabinet, and the administrative institutions, the government aims to give a more coherent structure to the political order.\n\nRather than being a simple legal reform, this constitution represents the institutionalization of the political vision promoted by the Concordia Association."
 manchukou_wr.39.a:0 "Define the new order."
 manchukou_wr.40.t:0 "Promoting the Future of Greater East Asia"
 manchukou_wr.40.d:0 "The Concordia Association portrays Manchuria–Mongolia as a state entrusted with a great mission: the realization of Pan-Asian unity. The concept of Greater East Asia is presented as a political vision in which the peoples of Asia cooperate and coexist within a new international order.\n\nGovernment propaganda institutions and political organizations are actively spreading this vision, portraying Manchuria–Mongolia as the center preparing the future of East Asia. Through schools, newspapers, and various political groups, Pan-Asianism is increasingly presented as one of the long-term objectives of the state.\n\nSuch propaganda serves as an important means of explaining the international order envisioned by the Concordia Association to the population."
 manchukou_wr.40.a:0 "Asia must stand as one."
 manchukou_wr.41.t:0 "A New Manchuria under a New Heaven and Earth"
 manchukou_wr.41.d:0 "The Concordia Association envisions a transformation of Manchuria that goes beyond administrative reform. The region is to be reorganized as the center of a new political order rather than a peripheral territory of a fallen empire.\n\nAdministrative institutions, economic structures, and social organization are being restructured in accordance with this vision. The objective is the creation of a fundamentally new state built upon the ideological framework promoted by the Concordia Association.\n\nSupporters describe this transformation as the creation of 'a New Manchuria under a New Heaven and Earth.'"
 manchukou_wr.41.a:0 "A new age begins."
 manchukou_wr.42.t:0 "Reaffirmation of Pan-Asianism"
 manchukou_wr.42.d:0 "The international order of East Asia has long been shaped under the pressure of Western powers. The many peoples of Asia have followed different paths, yet all have faced common challenges amid foreign interference.\n\nIn response to these circumstances, the government now seeks to once again emphasize the principle of Pan-Asian cooperation. Manchuria–Mongolia presents cooperation and coexistence among the peoples of Asia as the foundation of a new regional order, declaring that the future of East Asia must be shaped not by external domination but by the cooperation of Asian nations themselves.\n\nThis vision is closely connected to the role Manchuria–Mongolia seeks to play within the emerging regional order."
 manchukou_wr.42.a:0 "Asia Is One."
 manchukou_wr.43.t:0 "Legal Codification of the Five Races Harmony"
 manchukou_wr.43.d:0 "The lands of Manchuria and Mongolia are home to many different peoples. Manchus, Mongols, Koreans, Chinese, and Japanese communities have long coexisted across the region, each with their own traditions and histories.\n\nThe government now seeks to recognize this reality by establishing interethnic cooperation as a fundamental principle of the state. New legislation prohibits ethnic discrimination and guarantees equal legal protection for all inhabitants of the state. These principles will not remain merely symbolic but will be incorporated into the administrative and judicial framework of the country.\n\nThrough these measures the state hopes to strengthen stability within a multiethnic society and establish the foundations for shared prosperity."
 manchukou_wr.43.a:0 "Five Peoples, One State."
 manchukou_wr.44.t:0 "People from the West"
 manchukou_wr.44.d:0 "Political upheaval and persecution in Europe have forced many Jewish communities to seek new homes abroad. Some entrepreneurs, intellectuals, and community leaders have begun looking toward East Asia, and the cities of Manchuria—particularly Harbin—are increasingly seen as places of opportunity and relative stability.\n\nGovernment settlement policies and regional development plans have made the area especially attractive. Merchants, engineers, financiers, and scholars are gradually arriving, bringing skills and connections that may contribute to the economic growth of the state.\n\nWhat role this new community will ultimately play within the society of Manchuria–Mongolia remains uncertain, but the streets of Harbin are already beginning to echo with new languages and new hopes."
 manchukou_wr.44.a:0 "Welcome!"
 manchukou_wr.45.t:0 "Victory from the Northern Front"
 manchukou_wr.45.d:0 "The fighting across the Mongolian steppe has finally come to an end. Frontier defense forces and mobile cavalry divisions managed to hold the line through bitter combat and have successfully repelled the Soviet advance. The northern frontier has been stabilized once more, and the enemy forces are now withdrawing.\n\nThis battle carries meaning far beyond a simple border clash. Many had viewed the Emperor's decision to enter the war without full consultation with the cabinet as a dangerous gamble. In the end, however, the army has turned that gamble into victory.\n\nThe outcome has demonstrated that Manchuria–Mongolia is capable of defending its own borders. Military morale has risen, and the prestige of the state has been strengthened. Yet many also remember how perilous this decision truly was."
 manchukou_wr.45.a:0 "The frontier stands secure."
 manchukou_wr.46.t:0 "Lessons of the Past"
 manchukou_wr.46.d:0 "The fall of the Qing Empire was not merely the end of a dynasty but the exposure of deep structural weaknesses within the state itself. Administrative corruption, outdated military institutions, and a political system unable to adapt to a changing world ultimately led to imperial collapse.\n\nToday the leaders of Manchuria–Mongolia once again reflect upon this history. The question facing the state is whether these failures will remain a tragedy of the past, or whether they can serve as lessons for the construction of a stronger and more stable nation.\n\nMany now argue that determined reforms are necessary if the state is to avoid repeating the mistakes that once brought down the empire."
 manchukou_wr.46.a:0 "History must not repeat itself."
 manchukou_wr.47.t:0 "The Datong Restoration"
 manchukou_wr.47.d:0 "The collapse of the Qing Empire marked a profound transformation in the political order of East Asia. Institutions that had governed the empire for centuries—its administrative system, military organization, and social hierarchy—were no longer able to respond effectively to the rapidly changing world beyond its borders. While the global balance of power shifted and new ideas spread across the region, the imperial state struggled to adapt, and its eventual fall revealed the deep weaknesses within its structure.\n\nToday the leaders of Manchuria–Mongolia seek to ensure that these failures do not remain merely a tragedy of history. Efforts are underway to reorganize the state's administrative institutions, modernize the armed forces, and reshape the economic foundations of the country. While preserving the authority of the emperor, the government is attempting to place the machinery of the state upon more efficient and systematic institutions capable of guiding the nation through the challenges of a new era.\n\nThese reforms are widely seen as more than ordinary policy adjustments. Many observers have begun to describe this transformation as the 'Datong Restoration'—a moment when the state seeks to learn from the failures of the past and construct a new political order for the future."
 manchukou_wr.47.a:0 "Ten Thousand Years to the Emperor!"
 manchukou_wr.48.t:0 "The Mukden Victory Parade"
 manchukou_wr.48.d:0 "Crowds gathered in the streets of Mukden. Columns of soldiers marched through the gates of the city while citizens stood along the roads to welcome them home.\n\nThe Emperor himself appeared to greet the returning troops, and the officers and soldiers saluted as they passed before the throne. The outcome of the war in the north is now seen as more than a military success—it has become a moment that reaffirmed the authority and legitimacy of the state.\n\nMany speak of the victory as a sign that Heaven's favor has returned. In the eyes of the court of Mukden, the Mandate of Heaven has been proven once again."
 manchukou_wr.48.a:0 "Long Live the Emperor!"
 manchukou_wr.49.t:0 "A Letter from the Prime Minister of the Great Unity State"
 manchukou_wr.49.d:0 "To the Government of the Republic of China, from Kanji Ishiwara, Prime Minister of the Great Unity State.\n\nThe future of East Asia now stands at a decisive crossroads. Amid the pressures of imperialist powers and the upheavals of world affairs, if the nations of Asia continue to confront and divide themselves, the consequences will ultimately fall upon us all. In such an age, it cannot be wise for the peoples of Asia to persist in mutual distrust and conflict.\n\nFor many years I have believed that the fate of East Asia is not merely a matter of border disputes or temporary interests. In the greater course of human history, the world will inevitably move toward a final and decisive confrontation. If Asia does not unite as a civilization sharing a common destiny, it will find it difficult to avoid domination and division imposed by outside powers.\n\nFor this reason, the government of the Great Unity State does not seek rivalry or hostility with China. On the contrary, if our two nations of the East can cooperate on the basis of mutual respect and trust, it may become possible to establish a new order that secures stability and prosperity for the whole of East Asia. We hope to build friendly relations and pursue closer cooperation while respecting political independence and mutual sovereignty.\n\nAccordingly, the government of the Great Unity State proposes the establishment of formal friendly relations with the Republic of China, and consultations toward an alliance agreement. This is not an act of hostility directed against any particular nation, but a joint effort to preserve the autonomy and peace of Asia. The future of Asia must be decided by Asians themselves. We await the wise judgment and positive reply of your government.\n\nPrime Minister of the Great Unity State\n\nKanji Ishiwara"
 manchukou_wr.49.a:0 "These people are insane."
 manchukou_wr.50.t:0 "Reform of the Aristocratic Stipend System"
 manchukou_wr.50.d:0 "Amid growing debates over national finances, the stipend system granted to the aristocracy is once again under review. For generations these stipends have served as one of the principal means by which Qing and Mongol nobles maintained their status, yet many now argue that the fiscal structure of the state must be reorganized if modern governance is to be sustained.\n\nWithin the government, reformers have begun to invoke the 'Nineteen Constitutional Principles' discussed in the aftermath of the Xinhai Revolution as a legal justification for gradually regulating aristocratic privileges within a constitutional framework. The reduction of stipends has been proposed as the first step in this process, marking the beginning of a broader effort to bring the state's finances under a more systematic administration."
 manchukou_wr.50.a:0 "Begin the fiscal reforms."
 manchukou_wr.51.t:0 "Regulation of Aristocratic Estates"
 manchukou_wr.51.d:0 "The estates granted to aristocratic families have long served as independent bases of power. These hereditary land grants have often created friction between local administration and the authority of the state.\n\nThe government has therefore begun measures to integrate these estates into a more modern administrative framework. Although resistance from noble families is expected, reformist officials insist that the reorganization of land privileges is necessary to stabilize the overall structure of state governance."
 manchukou_wr.51.a:0 "Reorganize the land system."
 manchukou_wr.52.t:0 "Abolition of the Grain Stipend System"
 manchukou_wr.52.d:0 "The grain stipends provided to aristocrats, known as monthly allotments, have long symbolized the traditional privilege structure of the old order. Yet within the modern economic environment—marked by expanding industry and growing cities—such arrangements are increasingly regarded as inefficient expenditures.\n\nThe government is now considering the abolition of this system in order to reorganize food distribution under a centralized administrative structure. While many nobles view this measure as an attack upon established tradition, reformist officials argue that such changes are essential for modern fiscal and administrative management."
 manchukou_wr.52.a:0 "Terminate the grain allotments."
 manchukou_wr.53.t:0 "Restrictions on Banner Lord Authority"
 manchukou_wr.53.d:0 "For generations Mongol nobles have exercised lordly authority under the Banner System, including the right to mobilize local populations for corvée labor and service. While such authority once formed a cornerstone of regional governance, it has increasingly come into conflict with the modern administrative structure of the state.\n\nThe government has now begun implementing measures to limit certain powers associated with the Banner System, seeking to consolidate local authority under the institutions of the central government."
 manchukou_wr.53.a:0 "Restrict local authority."
 manchukou_wr.54.t:0 "Reform of the Official Appointment System"
 manchukou_wr.54.d:0 "The Manchu–Han Dual Appointment System has long regulated the distribution of official posts through ethnic quotas. While this system once served to preserve the historical balance of power within the empire, it has also generated difficulties within a modern administrative framework.\n\nThe government has therefore begun reviewing the appointment system with the intention of gradually expanding merit-based selection grounded in administrative competence and experience."
 manchukou_wr.54.a:0 "Reform the bureaucracy."
 manchukou_wr.55.t:0 "Adjustment of Aristocratic Parliamentary Privileges"
 manchukou_wr.55.d:0 "Aristocratic elites have traditionally exercised considerable influence within the legislative institutions of the state. As the political system gradually moves toward a constitutional framework, these privileges have increasingly come under scrutiny.\n\nThe government is now discussing measures to limit the political influence and speaking privileges of the aristocracy in order to create a more balanced legislative structure."
 manchukou_wr.55.a:0 "Rebalance parliamentary authority."
 manchukou_wr.56.t:0 "Reorganization of the Privy Institutions"
 manchukou_wr.56.d:0 "Aristocratic advisory bodies have long played a significant role in shaping national policy. However, their authority often overlaps with that of the formal administrative apparatus, leading to criticism that they hinder governmental efficiency.\n\nIn response, the government has begun reorganizing the powers of these privy institutions, integrating their functions more clearly within the executive administrative framework."
 manchukou_wr.56.a:0 "Reorganize the administrative structure."
 manchukou_wr.57.t:0 "Integration of Noble Militias"
 manchukou_wr.57.d:0 "Private armed forces maintained by aristocratic estates have historically served to preserve order within their domains. Yet these militias operate outside the central military structure and in some cases remain beyond effective state control.\n\nThe government has therefore initiated plans to integrate these forces into the national army, seeking to create a more unified and centralized military system."
 manchukou_wr.57.a:0 "Integrate the forces."
 manchukou_wr.58.t:0 "The Rejected Proposal"
 manchukou_wr.58.d:0 "A reply has arrived from the government of [FROM.GetName], but its contents are far from what we had hoped for.\n\nThe proposal for friendly relations and cooperation put forward by the Great Unity State has been firmly rejected. The government of [FROM.GetName] dismissed the initiative as unrealistic and argued that the court in Mukden has no authority to shape the future of East Asia. They further claim that our vision threatens their sovereignty and political order.\n\nKanji Ishiwara has received the reply with calm determination. He had long suspected that the political forces of China would not easily accept such a proposal. Nevertheless, the offer had served as a test of whether cooperation in East Asia was possible.\n\nWith that possibility now denied, the future of East Asia may be decided by other means."
 manchukou_wr.58.a:0 "Then we shall prove it by force."
 manchukou_wr.59.t:0 "A Telegram from the Great Unity State"
 manchukou_wr.59.d:0 "An urgent telegram has arrived at the authorities stationed in Dairen from the government of the Great Unity State. In the message they claim that their current level of military preparedness is insufficient to face the dangers ahead, and request that Japan provide weapons and military supplies.\n\nThe Great Unity State emphasizes that this assistance would not merely be a transaction of matériel, but a matter of shared interest in maintaining stability in the north and preserving order in East Asia. However, if the request is accepted, the military strength of Manchuria–Mongolia would be further enhanced, and how that strength might be used would ultimately remain in their hands.\n\nWhatever response we send will inevitably affect our relations with the Great Unity State, as well as the situation across the northern frontier."
 manchukou_wr.59.a:0 "Provide the weapons."
 manchukou_wr.59.b:0 "Refuse the request."
 manchukou_wr.60.t:0 "Cargo from Dairen"
 manchukou_wr.60.d:0 "The reply to the telegram sent to Dairen arrived not in words, but in the form of freight trains and shipping manifests. The Japanese authorities have accepted our request, and a considerable quantity of weapons and military supplies is now being delivered through the ports and railways.\n\nThe military believes that this assistance will alleviate equipment shortages at the front and accelerate the reorganization of the armed forces. Within the court, many interpret this as a sign that Japan still recognizes the strategic value of the Great Unity State.\n\nOthers warn that such support ultimately serves Japanese interests as much as our own. Nevertheless, for the moment these weapons will provide the means to prepare for the trials that lie ahead."
 manchukou_wr.60.a:0 "Begin distribution at once."
 manchukou_wr.61.t:0 "A Cold Reply"
 manchukou_wr.61.d:0 "A reply has arrived regarding the telegram sent to Dairen, but its contents are far from what we had hoped for. The Japanese authorities have rejected our request and made it clear that they have no intention of becoming involved in additional military support under present circumstances.\n\nThe military fears that this decision will disrupt plans to secure much-needed equipment, while some ministers argue that relying on outside assistance was a dangerous miscalculation from the beginning. Within the court, resentment is growing among those who believe that Japan does not regard the Great Unity State as a true partner.\n\nThe path before us is now clear. If foreign arsenals remain closed, then we must open our own and make the necessary preparations by our own strength."
 manchukou_wr.61.a:0 "Then we shall rely on ourselves."
 manchukou_wr.62.t:0 "Invisible Channels"
 manchukou_wr.62.d:0 "After Japan refused our request for weapons, the court continued to debate how to secure the necessary military supplies. Kanji Ishiwara, however, seemed far less concerned with the official response.\n\nFor years he had cultivated personal connections and informal networks within the Kwantung Army and the Japanese military establishment. Many officers there shared the belief that a coming conflict was inevitable, and some quietly sympathized with strengthening the Great Unity State.\n\nOnly days later, an unscheduled freight train departed from the military warehouses in Dairen. On paper it was nothing more than a routine logistical transfer. In reality, the train's destination was the arsenals of Manchuria–Mongolia.\n\nOfficially, nothing unusual had occurred. Yet the rifles and ammunition inside those crates were now firmly in our hands."
 manchukou_wr.62.a:0 "Weapons go to those who will use them."
 manchukou_wr.63.t:0 "The Dairen Arsenal Incident"
 manchukou_wr.63.d:0 "An unusual report has arrived from the military warehouses in Dairen. During a routine inventory inspection, officials discovered that several crates of rifles and ammunition no longer matched the official records.\n\nOn paper the equipment had been transferred through normal logistical channels, but further inquiry suggests that the shipment may have been loaded onto a train bound for Manchuria–Mongolia. Rumors have begun to circulate that certain officers within the Kwantung Army may have been involved.\n\nHowever, opening a formal investigation could provoke unnecessary friction within the military command.\n\nIn the end, it was decided that the matter would be quietly set aside."
 manchukou_wr.63.a:0 "Best not to ask questions."
 manchukou_wr.64.t:0 "The Banner of Vertical Alliance"
 manchukou_wr.64.d:0 "As the forces of Manchuria–Mongolia cross the frontier and advance into the Central Plains, the situation across the country is rapidly destabilizing. Regional warlords, provincial authorities, and the central government alike now recognize that this crisis can no longer be faced in a state of division.\n\nThe government has immediately called for nationwide resistance and is moving to organize a 'Vertical Alliance Army' that will unify all military forces and administrative structures under a single command. This represents not merely a military mobilization, but a political effort to bind all of China together against foreign invasion.\n\nAt the same time, proclamations such as the following are being spread across the land:\n\n\"A common man wearing the mask of a king dares once more to seize the Central Plains!\nAs in the Xinhai year, we shall tear down the pretender once again!\nAll the people of China are ready. Come, specters of Manchuria—come, you Japanese. Bring your sharpened rifles and blades!\nWe shall drive you back beyond the Three Eastern Provinces!\"\n\nResponses from across the provinces are swift, and forces once divided are now beginning to converge into a single front."
 manchukou_wr.64.a:0 "The Central Plains belong to the Han."
 manchukou_wr.65.t:0 "Join the Vertical Alliance Army"
 manchukou_wr.65.d:0 "The southward advance of the forces of Manchuria–Mongolia can no longer be seen as a crisis limited to a single region. What began in the north is rapidly becoming a struggle that will determine the fate of all China, and no government can now afford to ignore it.\n\nThe government of [ROOT.GetName] has recognized this reality. The need of the moment is not continued division and rivalry, but temporary unity against a common enemy. It has therefore been concluded that, if the order of China is to be preserved, the various armies and regimes of the country must gather under a single front.\n\nFor that reason, the government of [ROOT.GetName] has decided to formally join the Vertical Alliance Army led by the National Protection Government. Former distrust and competition have been set aside, and what remains now is the common struggle to repel the invader."
 manchukou_wr.65.a:0 "Now is the time for unity."
 manchukou_wr.66.t:0 "[FROM.GetName] Joins the Vertical Alliance"
 manchukou_wr.66.d:0 "The government of [FROM.GetName] has formally declared its intention to join the Vertical Alliance Army. With the invasion by Manchuria–Mongolia now fully underway, this decision carries significance far beyond a simple increase in manpower.\n\nThe National Protection Government has long called upon the forces of China to unite in common resistance, and that appeal is now beginning to bear fruit. The entry of [FROM.GetName] is a sign that China has not yet been entirely broken apart, and that a common front against the invader is becoming a reality.\n\nWithin the government, there is a growing sense that past conflicts and rivalries must be set aside for the moment and that this decision should be welcomed. The struggle to defend China has now taken another step forward."
 manchukou_wr.66.a:0 "Let every rifle face the north."
 manchukou_wr.67.t:0 "Outbreak of the Manchurian–Chinese War"
 manchukou_wr.67.d:0 "Since the founding of [MAN.GetName], China has consistently claimed that the territory of [MAN.GetName] rightfully belongs to them, denouncing it as an illegitimate regime occupying Chinese land. The long-standing tensions between the two states finally erupted yesterday. Both sides have now entered a state of full-scale war, a development that is far from welcome for us, given the vast capital we have invested in Manchuria. The government is now considering the possibility of intervening in the conflict to secure the region.\n\nJapan has also experienced continuous economic and diplomatic friction with China, and has at times been forced to accept certain concessions under Chinese pressure. Some voices now argue that this war presents an opportunity to strike back against an increasingly assertive China and restore Japan's interests on the continent."
 manchukou_wr.67.a:0 "This will not take long to resolve."
 manchukou_wr.68.t:0 "Intervention in the Manchurian–Chinese War"
 manchukou_wr.68.d:0 "The government has ultimately decided to intervene in the Manchurian–Chinese War. As the conflict expands and instability in the northern regions intensifies, it has been concluded that maintaining neutrality can no longer guarantee national interests or security. This decision is also influenced by the vast financial and resource investments tied to [MAN.GetName].\n\nA formal declaration of war has been delivered to the Chinese government, and Japan has now entered into a state of war with China. The military has already begun executing operational plans, mobilizing troops and supplies, while key ports and railways have been placed under military control.\n\nThis decision represents more than a simple intervention; it is expected to have far-reaching consequences for the balance of power in East Asia. The government views this war as a decisive turning point that will shape the long-term strategic environment."
 manchukou_wr.68.a:0 "There is no turning back now."
 manchukou_wr.69.t:0 "Escalation of the Manchurian–Chinese War"
 manchukou_wr.69.d:0 "With full-scale war underway between Manchuria and China, Japan has now formally entered the conflict, sharply escalating tensions across East Asia. Tokyo has justified its intervention as necessary to secure northern stability and protect its interests, but this decision is expected to have consequences far beyond a simple military action, potentially reshaping the regional order.\n\nKey ports and railways have already been placed under military control, and governments across the region are closely monitoring the unfolding situation. The outcome of this war is likely to significantly alter the political landscape of East Asia."
 manchukou_wr.69.a:0 "The war is expanding."
 manchukou_wr.70.t:0 "Proposal for a Common Front"
 manchukou_wr.70.d:0 "As the Manchurian–Chinese War continues to escalate, the Japanese government has come to recognize the need to redefine its relationship with [MAN.GetName]. It has been concluded that closer cooperation between the two states is essential to ensure stability along the northern front and to maintain order in East Asia.\n\nTo that end, Japan has formally invited [MAN.GetName] to join its sphere of influence and establish a common front. This proposal represents not merely a diplomatic gesture, but a transition toward military cooperation and shared strategic interests.\n\nAccepting this offer would allow both nations to build a stronger cooperative framework, but it would also mean a deeper extension of Japanese influence within [MAN.GetName]."
 manchukou_wr.70.a:0 "Great!"
 manchukou_wr.71.t:0 "Demand for Manchuria–Mongolia's Intervention"
 manchukou_wr.71.d:0 "As the war with China intensifies, the strategic importance of the northern front has become increasingly evident. The General Staff has concluded that military cooperation from Manchuria–Mongolia is essential to secure a decisive advantage.\n\nIf the forces of Manchuria–Mongolia launch an offensive from the north, Chinese forces will be forced to disperse, creating favorable conditions for Japanese operations across the entire front.\n\nAccordingly, the government has decided to formally request the intervention of [MAN.GetName]. Now, all that remains is their response."
 manchukou_wr.71.a:0 "Demand their intervention."
 manchukou_wr.72.t:0 "Japanese Request for Intervention"
 manchukou_wr.72.d:0 "A formal telegram has arrived from the Japanese government demanding that [MAN.GetName] immediately enter the war against China in order to secure a strategic advantage.\n\nJapan argues that a northern offensive by Manchuria–Mongolia would force Chinese forces to disperse, thereby weakening their overall resistance and improving the situation across the front.\n\nAccepting this request would strengthen relations with Japan, but it would also mean committing directly to a large-scale war."
 manchukou_wr.72.a:0 "This is a good opportunity."
 manchukou_wr.73.t:0 "The Fate of Outer Mongolia"
 manchukou_wr.73.d:0 "Following victory in the Mongolian War, the influence of [MAN.GetName] has rapidly expanded across Outer Mongolia. Local aristocratic elites and administrative bodies are increasingly acknowledging our authority, and militarily, further resistance has become difficult to sustain.\n\nThe question now is how this territory should be governed. Outer Mongolia can be directly annexed and incorporated into the Empire, or a puppet regime can be established, preserving elements of the existing order while maintaining indirect control.\n\nDirect rule would ensure firm control, but it would also bring administrative burdens and the risk of resistance. Establishing a puppet state may provide greater stability, but it would limit the extent of direct authority. The government must now decide the future of Outer Mongolia."
 manchukou_wr.73.a:0 "Annex it completely."
 manchukou_wr.73.b:0 "Establish a puppet state."
 manchukou_wr.74.t:0 "The Cost of Expansion"
 manchukou_wr.74.d:0 "With the acquisition of North China, [ROOT.GetName] has rapidly expanded in both scale and influence. However, this sudden growth has brought with it significant social and economic shocks.\n\nThe newly incorporated territories possess administrative structures fundamentally different from those of the state, and the process of integration has resulted in widespread inefficiencies and confusion. Logistics and production systems remain poorly coordinated, while the distribution of resources has become severely distorted.\n\nIn rural areas, the combined effects of administrative collapse and wartime damage have undermined agricultural production. In the المدن, population influx and rising prices are fueling growing social instability.\n\nThe government recognizes that these issues cannot be resolved quickly. Without systematic reform and reorganization, the consequences of this expansion are likely to deepen further."
 manchukou_wr.74.a:0 "There will be a price to pay."
 manchukou_wr.75.t:0 "Proclamation of the Great Unity State"
 manchukou_wr.75.d:0 "The government of Manchuria–Mongolia has officially announced the adoption of the name 'Great Unity State.' Prime Minister Kanji Ishiwara emphasized that this change is not merely symbolic, but defines the ideological foundation and direction of the state.\n\nThe concept of 'Datong' represents a harmonious order in which different peoples and societies coexist under a shared framework, forming the core of a new political system based on ethnic harmony. This vision extends beyond domestic integration, aligning with a broader Pan-Asian ideal that seeks to unite Asia under a common destiny. The name 'Great Unity State' thus serves as a clear expression of the order and ambitions the state seeks to realize."
 manchukou_wr.75.a:0 "How interesting."
 manchukou_wr.76.t:0 "Return to Peking"
 manchukou_wr.76.d:0 "With North China firmly secured, the court has begun formal discussions on relocating the capital to Peking. Once the seat of the Son of Heaven, the city represents not merely a political center, but the very symbol of imperial legitimacy and authority.\n\nUnder the leadership of Prime Minister Zheng Xiaoxu, the government views the relocation as a decisive step in affirming the state's legitimacy. The return of the court from Manchuria to the imperial capital is not simply the result of territorial expansion, but a restoration of rightful order.\n\nYet the consequences of war still linger, and administrative systems remain incomplete. More importantly, strong resistance is emerging across Han Chinese society, where opposition to the restoration of the dynasty is growing and signs of unrest are becoming increasingly visible.\n\nThe return to Peking may restore authority, but it also marks the beginning of new instability. The imperial capital is not yet fully ours."
 manchukou_wr.76.a:0 "The imperial capital awaits."
 manchukou_wr.77.t:0 "Proclamation of the Great Qing"
 manchukou_wr.77.d:0 "After conquering North China and relocating the capital to Peking, the court has reached a decisive moment. Moving beyond the transitional framework of Manchuria–Mongolia, the restoration of the Great Qing has now been formally proclaimed. Zheng Xiaoxu and his ministers assert that power, once confined to the north, has now taken root in the Central Plains, and that the Mandate of Heaven has been restored. From Peking, the Emperor reclaims his position as the Son of Heaven, and the court proclaims the restoration of order.\n\nYet this declaration is not universally accepted. Strong resistance and distrust persist, particularly among the Han population, and unrest continues in several regions. The Great Qing has been restored—but whether its mandate will truly be recognized across all under Heaven remains uncertain."
 manchukou_wr.77.a:0 "Shall they reclaim the Mandate?"
 manchukou_wr.78.t:0 "Emergency Relief Implemented"
 manchukou_wr.78.d:0 "War and rapid expansion have pushed civilian life into crisis across the country. Food shortages, rising prices, and administrative breakdown have left the population in a highly unstable condition.\n\nRecognizing the urgency of the situation, the government has decided to implement emergency relief measures. Central and local resources are being mobilized to distribute food and essential supplies, while direct aid to affected regions is being expanded.\n\nHowever, logistical difficulties and administrative confusion have disrupted distribution, and some areas remain insufficiently supported. Even so, these measures represent the first step toward restoring stability and securing the livelihood of the people."
 manchukou_wr.78.a:0 "Stabilize the situation first."
 manchukou_wr.79.t:0 "A Devastated Land"
 manchukou_wr.79.d:0 "The data gathered from nationwide statistical surveys has revealed a grim reality to the court. Figures that once existed only on paper now stand in stark contrast to the actual conditions on the ground.\n\nMany rural regions have been devastated by war and disorder, with farmland left abandoned or stripped of its productivity. In some areas, population decline and labor shortages have occurred simultaneously, while administrative records have collapsed entirely.\n\nSurvey teams have confirmed that reported figures for food production and population differ drastically from reality, indicating that state policy has been operating on fundamentally flawed information.\n\nThe court must now confront this harsh truth. Correcting the numbers alone will not be enough."
 manchukou_wr.79.a:0 "Reform is inevitable."
 manchukou_wr.80.t:0 "A Stable Agricultural Foundation"
 manchukou_wr.80.d:0 "Through sustained reforms, investment, and policy implementation, rural regions are gradually regaining stability. Agricultural production systems, once on the verge of collapse, have been reorganized, and food output is steadily returning to reliable levels.\n\nCooperative institutions and financial support are providing farmers with essential resources, while education and the spread of new techniques are improving productivity. Rising harvests and stabilizing prices are beginning to restore public confidence.\n\nAgriculture has once again become a firm foundation for the state, allowing the government to prepare for the next stage from a position of stability."
 manchukou_wr.80.a:0 "At last, a foundation is secured."
 manchukou_wr.81.t:0 "Alignment with the Conglomerates"
 manchukou_wr.81.d:0 "In order to rebuild the economy and expand industrial capacity, the court has decided to align itself with powerful conglomerates. Possessing vast capital and organizational strength, they offer a means to rapidly increase production and investment, alleviating the current economic crisis.\n\nIn exchange for state protection and preferential treatment, these conglomerates will mobilize their resources in support of government policy. As a result, the industrial base will be rapidly reorganized, and the economy will begin to move in a new direction.\n\nHowever, this alignment goes beyond simple cooperation, creating a structure in which economic elites become deeply involved in state governance. The consequences of this decision will shape the future of the regime."
 manchukou_wr.81.a:0 "A necessary decision."
 manchukou_wr.82.t:0 "Political Imprisonment"
 manchukou_wr.82.d:0 "In recent weeks, large numbers of dissidents and agitators have been arrested across the country. The government has classified them not as mere dissenters, but as political prisoners posing a direct threat to state order.\n\nMilitary police and security forces have carried out coordinated operations to identify and detain these individuals. Key figures have been imprisoned and are now undergoing trial or long-term detention procedures. These measures aim to suppress opposition and strengthen control over society.\n\nHowever, criticism has begun to emerge, particularly among intellectuals and urban populations, where concern and tension are spreading.\n\nDespite this, the court maintains that such actions are necessary to preserve order."
 manchukou_wr.82.a:0 "For the sake of order."
 manchukou_wr.83.t:0 "The Yellow River Miracle"
 manchukou_wr.83.d:0 "In the Yellow River basin, once devastated by war and chaos, unexpected signs of recovery have begun to emerge. The restoration of irrigation systems, reorganization of administration, and implementation of agricultural policies have combined to significantly increase productivity.\n\nThis year's harvest, in particular, has been reported as exceptionally abundant compared to previous years, and food prices are beginning to stabilize across the region. This is being interpreted not as coincidence, but as evidence that the government's policies are finally bearing fruit.\n\nPeople have begun to call this development the 'Yellow River Miracle,' as hope spreads that order may yet be restored to the land."
 manchukou_wr.83.a:0 "The Yellow River lives again."
 manchukou_wr.84.t:0 "Reorganization of the Party System"
 manchukou_wr.84.d:0 "Following the limited recognition of party politics, the government has undertaken a comprehensive restructuring of the political system. The ruling Zōngshè Party has been reorganized into the 'Chinese Restoration Party,' redefining itself as a force for controlled modernization within the system.\n\nAt the same time, the 'Chinese Socialist Party' has been established to represent social and labor interests, broadening the political spectrum. The former People's Civic Association has also been reorganized into the 'Democratic Party,' providing a clearer ideological platform within the legal framework.\n\nThe court expects that this structured party system will allow controlled political participation while maintaining overall state stability."
 manchukou_wr.84.a:0 "A new political order."
 manchukou_wr.85.t:0 "A Shift Among Intellectuals"
 manchukou_wr.85.d:0 "Recent policy adjustments and institutional reforms have begun to produce subtle changes within the intellectual class. Open opposition is gradually declining, and some are beginning to seek roles within the system.\n\nIn academic and media circles, extreme criticism is giving way to more pragmatic discussions, and the possibility of cooperation with the government is cautiously emerging.\n\nThough still in its early stages, this shift indicates that the intellectual sphere is no longer uniformly hostile."
 manchukou_wr.85.a:0 "Change is underway."
 manchukou_wr.86.t:0 "Stability Among Intellectuals"
 manchukou_wr.86.d:0 "As a result of sustained reforms and co-optation policies, the intellectual class has ceased organized resistance. Many have accepted roles within the system, contributing to governance, academia, and industry.\n\nThe conflicts of the past are gradually fading, and the intellectual sphere has adapted to the new order. With this, the state's foundations have become significantly more stable."
 manchukou_wr.86.a:0 "Now, we are united."
 manchukou_wr.87.t:0 "Assassination Attempt"
 manchukou_wr.87.d:0 "Amid rising tensions between the court and Japanese-linked figures, a shocking incident has taken place. A Japanese-affiliated officer attempted to assassinate Prime Minister Zheng Xiaoxu.\n\nThe officer was reportedly driven by resentment over the rapid growth of Manchuria–Mongolia and its increasingly independent policies, which diverged from Japanese expectations.\n\nThe attempt was detected in advance and ultimately failed, leaving Zheng Xiaoxu unharmed. The perpetrator has been arrested, and investigations into associated individuals are ongoing.\n\nThis incident is being viewed not as an isolated act, but as a manifestation of the growing strain between Manchuria–Mongolia and Japan."
 manchukou_wr.87.a:0 "This cannot be tolerated."
 manchukou_wr.88.t:0 "Findings of the Investigation"
 manchukou_wr.88.d:0 "The emergency investigation has uncovered a far more alarming reality than initially expected. What began as an inquiry into an assassination attempt has exposed the existence of an extensive Japanese intelligence network operating within the state.\n\nJapanese-affiliated agents were found deeply embedded across administrative institutions, the military, and industrial sectors, with some even gaining access to sensitive information and policy decisions.\n\nMilitary police and intelligence agencies have launched a large-scale crackdown, resulting in the arrest of numerous suspects. The scope of the investigation continues to expand, and further discoveries cannot be ruled out.\n\nThis incident reveals not merely espionage, but a level of infiltration that threatens the very foundation of the state."
 manchukou_wr.88.a:0 "Purge them all."
 manchukou_wr.89.t:0 "Demand for Accountability"
 manchukou_wr.89.d:0 "Recent events in Manchuria–Mongolia cannot be dismissed as mere internal affairs. Following an assassination attempt against Zheng Xiaoxu by a young Qing officer, a large-scale purge resulted in the arrest and execution of numerous Japanese nationals.\n\nWithin the government, this is being viewed as an unjust persecution of Japanese citizens and a serious affront to national honor. Some argue that this incident provides an opportunity to take a stronger stance and reassert influence over Manchuria–Mongolia.\n\nThe government is now considering issuing an ultimatum, demanding full responsibility, a formal apology, and heavy reparations from the Manchurian authorities. These demands are unlikely to be accepted, and in doing so, we will gain sufficient justification to act and secure what we seek."
 manchukou_wr.89.a:0 "There cannot be two suns under heaven."
 manchukou_wr.90.t:0 "Japanese Ultimatum"
 manchukou_wr.90.d:0 "A lengthy ultimatum has arrived from the Japanese government, demanding accountability and reparations for our recent actions in expelling their spy networks. The demands go far beyond any reasonable negotiation: they include the leasing of Shandong, Outer Mongolia, and Inner Mongolia, as well as exclusive rights to exploit major mines and mineral resources—effectively requiring the surrender of our sovereignty.\n\nWithin the court, these demands have been judged as coercive and unacceptable. Accepting them would leave the state as a mere façade, stripped of real authority.\n\nThe government has therefore decided to reject the ultimatum in its entirety. The consequences of this decision are clear—it may well become a historic opportunity to drive Japan from the continent."
 manchukou_wr.90.a:0 "You belong on your islands."
 manchukou_wr.91.t:0 "Qing Rejection"
 manchukou_wr.91.d:0 "The Qing government has outright rejected our ultimatum. They have denounced our demands as a violation of their sovereignty and made it clear that no concessions will be made.\n\nWithin the government, this outcome comes as no surprise. The ultimatum was never intended to be accepted, but rather to provide a justification for further action.\n\nThe path forward is now clear. Diplomatic options have been exhausted, and only force remains. The military reports that preparations are complete, and a full-scale response can be initiated at any time.\n\nThe fate of the continent will once again be decided by strength."
 manchukou_wr.91.a:0 "War it is."
 manchukou_wr.92.t:0 "Capital Relocated to Peking"
 manchukou_wr.92.d:0 "The order of the Central Plains has undergone a major transformation. The Zhongmin regime has collapsed, and Manchuria has secured control over the northern heartland. The court now recognizes that a new phase has begun.\n\nIn response to these developments, it has been decided to relocate the capital to Peking. For centuries a center of political authority, Peking is the most fitting place from which to establish a new order.\n\nThis relocation is not merely administrative, but a symbolic transition marking the expansion of northern authority into the Central Plains.\n\nFrom Peking, the court now prepares to shape a new era."
 manchukou_wr.92.a:0 "We move to Peking."
 manchukou_wr.93.t:0 "The Beginning of the Royal Way"
 manchukou_wr.93.d:0 "The government has formally launched a large-scale construction program. Railways, roads, industrial facilities, and infrastructure are to be expanded nationwide, laying the foundations of a new economic order.\n\nPlans are being drawn and resources allocated across the country, as efforts begin to link previously fragmented regions and industries into a unified system. This is not merely development, but the first step toward realizing the state's envisioned order.\n\nThough everything is only beginning, the successful execution of this program will place the state on far stronger foundations."
 manchukou_wr.93.a:0 "This is only the beginning."
 manchukou_wr.94.t:0 "Formation of the State Foundation Army"
 manchukou_wr.94.d:0 "The government has officially announced the creation of a new military organization to safeguard the stability and ideology of the state. Known as the 'State Foundation Army,' this force differs fundamentally from the regular military, being built upon absolute loyalty to the state and ruling party.\n\nIt is not merely a combat unit, but a key instrument for maintaining internal order and suppressing anti-regime elements. Members will undergo both ideological indoctrination and political training, serving at the forefront of regime defense.\n\nWith its establishment, the state has secured a more direct means of control, strengthening the foundations necessary to preserve the new order."
 manchukou_wr.94.a:0 "The blade of the state is forged."
 manchukou_wr.95.t:0 "Reorganization of the Tuntian System"
 manchukou_wr.95.d:0 "The government has decided to comprehensively reorganize the tuntian system to simultaneously sustain military forces and secure food supplies. Agricultural bases operated alongside military units are being established across the country, with soldiers now expected to participate in production as well as combat.\n\nThis system aims to reduce the cost of maintaining the army while creating a self-sufficient food supply independent of external sources. It also strengthens regional control and allows for more efficient use of available manpower.\n\nHowever, the increased burden on soldiers has sparked signs of discontent in some areas. Despite this, the government considers the measure essential for the survival of the state."
 manchukou_wr.95.a:0 "The sword and the plow are one."
 manchukou_wr.96.t:0 "Anti-Bandit Campaign"
 manchukou_wr.96.d:0 "Following the consolidation of the northern regions, rapid changes and administrative gaps have allowed bandit groups to spread across the countryside. They have disrupted transport routes, looted supplies, and posed a serious threat to local populations.\n\nThe government has deemed the situation intolerable and launched a large-scale suppression campaign. Military units and military police have been deployed to key areas, conducting coordinated operations to dismantle these groups.\n\nThis campaign is not merely about maintaining order, but about firmly establishing the newly formed authority of the state. However, eliminating forces that thrived in chaos will take considerable time."
 manchukou_wr.96.a:0 "Restore order."
 manchukou_wr.97.t:0 "State Media Law Enacted"
 manchukou_wr.97.d:0 "The government has officially enacted a new law placing the press under state control. Under the State Media Law, all media organizations are now subject to registration and direct supervision over their reporting and editorial direction.\n\nAs a result, newspapers, publications, and communication networks are being reorganized to align with state policy and order, while several outlets with anti-government tendencies have been shut down or forcibly restructured.\n\nThe government expects this measure to eliminate information disorder and ensure stability across society. However, criticism is also growing, as many see this as a significant restriction on press freedom."
 manchukou_wr.97.a:0 "Public opinion must be guided."
 manchukou_wr.98.t:0 "Expansion of the New Learning Movement"
 manchukou_wr.98.d:0 "With the implementation of universal education for military purposes, the educational landscape is rapidly changing. Schools across the country now combine academic instruction with military training and discipline, shaping students into individuals deeply aligned with the state.\n\nThis shift extends beyond educational reform, gradually transforming society into a mobilized structure. The youth are now being prepared as both future soldiers and essential pillars of the nation.\n\nThe government expects this to significantly strengthen its long-term military capacity."
 manchukou_wr.98.a:0 "Education is power."
 manchukou_wr.99.t:0 "Gurisan Incident"
 manchukou_wr.99.d:0 "Clashes near Jiulishan, outside Xuzhou, are rapidly escalating. During a night training exercise, Manchurian troops fired near a Zhongmin outpost, triggering an exchange of fire. Both sides have since reinforced their positions, expanding the conflict.\n\nOfficial statements describe the incident as accidental, yet the speed and coordination of the escalation have raised suspicions. Some observers quietly suggest that the confrontation may have been more deliberate than it appears.\n\nThe situation has already moved beyond a minor clash, with the prospect of full-scale conflict growing increasingly likely."
 manchukou_wr.99.a:0 "Just as planned."
 manchukou_wr.100.t:0 "The Realm Divided Again"
 manchukou_wr.100.d:0 "Victory in the war against Japan has proven short-lived. With the external threat removed, the united front that once held the factions together is rapidly collapsing.\n\nPolitical rivalries and power struggles, suppressed during the war, have resurfaced with renewed intensity. Former allies now turn their weapons against one another, as cooperation gives way to the struggle for supremacy.\n\nClashes have already been reported across multiple regions, and the country is once again descending into civil war. External victory has failed to prevent internal division. The realm is dividing once more."
 manchukou_wr.100.a:0 "The war is not over."
 manchukou_wr.102.t:0 "War Resumes"
 manchukou_wr.102.d:0 "With the external enemy gone, long-suppressed internal tensions have resurfaced. The various Chinese factions can no longer find reason to maintain their cooperation, and tensions are rapidly escalating into armed conflict.\n\nLocalized clashes are expanding as frontlines begin to take shape, bringing the era of unity to a complete end. What remains is a struggle to determine who will rule the land. The war has begun once more."
 manchukou_wr.102.a:0 "The war continues."
 manchukou_wr.103.t:0 "Japanese Request for Conditional Surrender"
 manchukou_wr.103.d:0 "Unable to withstand our fierce onslaught, the Japanese government has finally sued for peace. We have successfully defended our homeland, and never again shall anyone dare to covet the Chinese mainland."
 manchukou_wr.103.a:0 "Let us end this here."
 manchukou_wr.103.b:0 "The battle continues until Tokyo falls!"
 manchukou_wr.104.t:0 "[FROM.GetName] Rejects Peace Proposal"
 manchukou_wr.104.d:0 "The [FROM.GetName] government has refused to sign a peace treaty with us. They have declared that they will not cease their hostilities until Tokyo itself is conquered."
 manchukou_wr.104.a:0 "Let them try!"
 manchukuo_wr.105.t:0 "The Oath of Loyalty from Gansu Province"
 manchukuo_wr.105.d:0 "With military superiority in the Central Plains firmly established, the Ma Clique warlords, the power brokers of the Northwest, have conveyed their official oath of loyalty. In a ceremony held in Lanzhou, they declared a complete break with the former republican government and vowed to submit under the order of the Harmony of Five Races advocated by our government. The influential figures of the Northwest have promised full military support and the provision of logistics bases to the National Army, on the condition that their local defense and autonomy are partially guaranteed. Technocrats within the government analyze that their submission will drastically reduce administrative costs in the rugged Northwest region and serve as a strategic bridgehead toward Central Asia. This event symbolizes the expansion of the National Defense State to the western edge of the continent, transcending a simple surrender."
 manchukuo_wr.105.a:0 "Welcome!"
 manchukuo_wr.106.t:0 "The Return of the Great Qing Empire"
 manchukuo_wr.106.d:0 "The puppet regimes that occupied various parts of the South and the Central Plains under the protection of Japanese imperialism have finally collapsed. Faced with our overwhelming offensive, the main forces of the Japanese Army have lost their will to fight and have been completely expelled from the continent, bringing an end to the humiliating division of our land once dictated by foreign interests. [MAN.GetName] now stands tall as the sole sovereign state with legitimacy over the entire continent, extending far beyond Manchuria. Zheng Xiaoxu and the technocrats analyze that this victory signifies more than just a military conquest; it means we are now ready to remodel all of East Asia into a Kingly Way Paradise under technocratic order. A century of foreign violation has come to an end, and commands issued from the Forbidden City in Beijing will now reach the southernmost fringes without obstruction. All subjects of the continent are now united as one under the New Order of the Empire."
 manchukuo_wr.106.a:0 "We have returned."
 manchukou_wr.107.t:0 "A New Scene in the Forbidden City"
 manchukou_wr.107.d:0 "Pujie stood on the high gallery of the Hall of Preserving Harmony, looking down at the courtyard of the Hall of Supreme Harmony. The transparent morning sunlight poured over the golden tiles of the Forbidden City, making the red walls, which had endured centuries of history, glow more vividly than ever before. The dark clouds of war that had oppressed the continent until recently had vanished without a trace. Having triumphed in the arduous conflict against Japan, the Empire had washed away its history of humiliation and stood once again with an unassailable dignity. The square no longer lingered in the silence of the past; it was filled with the vibrant heartbeat of a nation in its prime.\n\nBelow the gallery, guards of the National Army, dressed neatly in modern uniforms, prepared for the changing of the guard in perfect formation. Their rhythmic, disciplined footsteps sounded like music symbolizing the peace and order the Empire had reclaimed. The cumbersome and outdated rituals of the past were gone, replaced by the vitality and sophisticated systems of a nation moving toward the future. The officials moving busily with briefcases bore faces filled not with fatigue, but with the pride of designing a new era. The distant beeps of telegraphs and the hum of car engines were no longer alien noises, but like songs of hope awakening a sleeping continent.\n\nPujie felt a deep sense of emotion as he adjusted the collar of his heavy coat. The scent of gunpowder that once lingered had been replaced by the fresh air announcing the Empire's revival. The Beijing sky grew higher each day, and the city below was transforming daily under the hands of active reconstruction. This scene, where all subjects harmonized in their respective positions under the banner of the Harmony of Five Races, was the true realization of the Kingly Way Paradise that Zheng Xiaoxu had so desired. It was not merely a restoration of past glory, but the birth of a brilliant civilization built upon that foundation with modern ideals.\n\nImagining the vast continent stretching beyond the Hall of Supreme Harmony, Pujie smiled faintly. Every command issued from the Forbidden City would now reach the southernmost fringes without obstruction, clothing the naked and feeding the hungry. The century of national humiliation, stained with division and struggle, was finally over. The Empire stood tall once again at the center of the world, its majesty reaching far across the seas. Pujie realized that the end of the old world he knew was not a sorrowful extinction, but the labor pains for a greater birth.\n\nHe lightly brushed the railing of the gallery, taking in the panoramic view once more. The shining golden roofs, the people moving in an orderly fashion, and the Imperial flag fluttering high in the sky—he confirmed with a full heart that all of this was not a dream but a reality, and that a blessed era unlike any before had finally taken root upon the ruins. The light of Zhonghua would never fade, and the glory of the Empire would flow like an eternal spring."
 manchukou_wr.107.a:0 "He witnessed a new world."
 manchukou_wr.108.t:0 "Strolling through the Imperial Garden"
 manchukou_wr.108.d:0 "Zheng Xiaoxu walked slowly, his hands clasped behind his back. The horizontal rays of the morning sun broke over the calm pond of the Imperial Garden, creating jewel-like ripples. In the place where the smoke of war had cleared, there was now only the pleasant scent of grass and the clear songs of birds. Since returning to the Forbidden City after leading the decisive conflict against Japan to victory, he felt that this serene garden was a microcosm of the sovereign state he had spent his life designing. In the place where the outdated authoritarianism of the past and the unjust interference of foreign powers had vanished, the vitality of an orderly nation now flowed. The jagged rocks and ancient trees placed throughout the garden bore witness to the Empire's long history, while the clear streams flowing between them seemed to symbolize the vitality of the reborn nation.\n\nLooking at the Emperor's back as he walked some distance ahead, Zheng felt a surging sense of relief from deep within. The ideal of imperial restoration, once dismissed as a mere dream, was now taking root across the entire continent. The disciplined demeanor of the guards and officials quietly performing their duties throughout the garden symbolized the advanced level of civilization the Empire had attained. This was not submission through oppression, but a beautiful harmony created by the voluntary devotion of subjects who empathized with the nation's great cause. The clear air of Beijing held the spirit of the flourishing Empire, and the vibrant voices of the people sounded like an overture to a new era. He was certain that the years of hardship he had endured were not in vain, and that the seeds he had sown had finally produced such brilliant blossoms.\n\nHe paused by the pond, contemplating the deer drinking from the water. This scene, where nature and civilization coexisted and nurtured one another rather than being destroyed by artifice, was the true essence of the Oriental order he had dreamed of. The Empire's administrative power was now permeating everywhere the water reached, bringing peace to all people, and the scars of war were being rapidly healed under the hands of active reconstruction. The years of hardship, marked by division and struggle, were over. The Great Way State now stood at the center of the world as a brilliant model unprecedented in human history, where Eastern morality and modern rationality were perfectly combined. The garden's scenery was quiet, but within it lived the powerful yet gentle heartbeat of the great machine of the state.\n\nZheng Xiaoxu no longer felt the weight of his position as Prime Minister as a burden. It was not a painful load, but a glorious mission to assist the Emperor in granting the dignity of sovereignty to all. Across the vast land stretching beyond the Forbidden City, the light of the Empire would now reach every corner. Foreign exploitation and the fear of war were things of the past, replaced by independent order and abundance. He was certain that this peace was not a temporary illusion, but an eternal rest built upon a solid national foundation. Closing his eyes, he offered a silent prayer of gratitude for the fact that tens of thousands of villages and hundreds of millions of subjects would now enjoy peaceful lives under a single will.\n\nThe sky grew higher each day, and the Empire's majesty reached the ends of the sea. Zheng Xiaoxu took another step with a faint smile. The sunlight shining through the brilliantly blooming peonies was like a divine smile blessing the Empire's future. He sensed the glory of the Empire that would last for thousands of years upon the foundation he had laid. The banner of Great Unity would never fall, and the lamp of the revived Empire would become a model illuminating the entire world beyond the continent. Grateful to be standing within this great tide of history, he etched the peaceful scene of the garden into his heart forever. His steps were light, and his gaze was already set upon an even brighter future beyond the horizon."
 manchukou_wr.108.a:0 "The glory of the Empire has finally been restored."
 manchukou_wr.109.t:0 "Enthronement"
 manchukou_wr.109.d:0 "A grand enthronement ceremony was held today at the Hall of Supreme Harmony, proclaiming the rebirth of the Great Qing Empire to the entire world. Under the assistance of Prime Minister Zheng Xiaoxu, the Emperor officially declared the Empire as the sole legitimate sovereign state of the continent, bringing an end to a century of national humiliation and unjust foreign interference. Amidst the cheers of the subjects filling the Forbidden City, this event became a historic milestone signaling the establishment of an independent national defense system and a new national order. The Empire is now fully prepared to advance on a path of independent prosperity, free from the shadow of foreign powers, and has firmly re-established its majesty as the sole protagonist holding the legitimacy of the Central Plains."
 manchukou_wr.109.a:0 "Proclaim the rebirth of the Empire."
 manchukou_wr.110.t:0 "Demand for the Return of Concessions"
 manchukou_wr.110.d:0 "An official letter was delivered today from the [MAN.GetName] government demanding the immediate return of all remaining concessions within the continent. Prime Minister Zheng Xiaoxu emphasized that this measure is an essential procedure to settle the unequal relations that have lasted for a century and to restore the full sovereignty of the Empire. They have made it clear that they are prepared to mobilize all means to protect the integrity of their territory and are urging our government to make a decision. We must now provide an answer to the firm will of the Empire."
 manchukou_wr.110.a:0 "Accept the demand and return the concessions."
 manchukou_wr.110.b:0 "Reject the demand, asserting our rightful claims."
 manchukou_wr.111.t:0 "[FROM.GetName] Accepts the Return of Concessions"
 manchukou_wr.111.d:0 "The government of [FROM.GetName] has finally accepted the Empire's legitimate demand for the return of concessions. Accordingly, the territories that had remained as foreign extraterritorial areas for decades have been fully returned under the administrative network of the Empire. The historic scene of foreign flags being lowered in each concession and the Imperial banner being hoisted high symbolizes that the Empire's sovereignty has been fully restored across the continent. All subjects are cheering the disappearance of the last traces of a century of national humiliation, celebrating the Empire's firm status as a sovereign independent state."
 manchukou_wr.111.a:0 "Long live the Empire!"
 manchukou_wr.112.t:0 "[FROM.GetName] Rejects the Return of Concessions"
 manchukou_wr.112.d:0 "The government of [FROM.GetName] has flatly rejected the Empire's legitimate demand for the return of concessions. They still seek to maintain their unjust privileges within the continent, violating the Empire's sovereignty based on past unequal treaties. Prime Minister Zheng Xiaoxu declared this rejection as a direct challenge to the dignity of the Empire and expressed a strong will that the arrogant attitude of foreign powers will no longer be tolerated. The time for dialogue is over, and the Empire now faces a situation where it must devise all necessary measures to reclaim its tarnished honor and territory."
 manchukou_wr.112.a:0 "We shall reclaim it by force."
 manchukou_wr.113.t:0 "The Exile of Hu Shih"
 manchukou_wr.113.d:0 "An unusually cold sea breeze blew across the pier of Tianjin Port from early morning. Hu Shih raised the collar of his coat and gazed at the distant horizon. Behind him, the noise of a city filled with the vitality of reconstruction echoed. Since the victory in the war against Japan, the Empire had transformed day by day. The streets overflowed with an orderly energy, and the subjects who once suffered from hunger began to sing of prosperity within the stable daily lives provided by the state. It was the landscape of a new civilization where Eastern morality and modern rationality, so emphasized by Prime Minister Zheng Xiaoxu, were combined.\n\nHowever, this brilliant revival reflected in Hu Shih's eyes felt somewhat alien. His colleagues, who had once discussed individual freedom and democracy with him in university lecture halls, had now thrown themselves into the great current of the national cause. They no longer lingered in empty discourse but were striving for practical development within the sophisticated systems designed by the state. Intellectuals were recruited, and intellect became the most powerful fuel moving the giant machine of the nation. Hu Shih realized that within that grand harmony, he alone floated like a buoy of an old era. The people had gained abundant bread and the Empire had restored its powerful sovereignty, but he could not help but ask where the individual independent souls paid as the price had vanished.\n\nJust before boarding, he left his final words to an old student who had come to see him off. It was a sighing warning that there would eventually be neither bread nor freedom in this land. He believed that the abundance promised by the Empire would ultimately become a sweet drug that silenced individual critical thought. To Hu Shih, prosperity without freedom was a castle built on sand, a giant mirage that would one day crumble. He realized that his voice no longer reached the subjects of this continent. The people no longer wanted chaotic freedom; they chose the certain well-being guaranteed by the state and the pride of the Empire.\n\nIn his eyes, the Empire was constructing an all-too-precise and perfect order. The disciplined commands issued from the Forbidden City and the united public sentiment responding to them made the values of Western democracy, which he had studied all his life, appear faded. Hu Shih stood on the ship's deck, staring at the receding coastline of the continent. The Empire emitted a brilliant light under the hands of active reconstruction, yet that light felt so transparent that it seemed cold to him. Now, the place where he belonged was not the site of this massive revival, but only a study in a strange land across the Pacific.\n\nAs the ship left the harbor, Hu Shih sighed deeply and headed to his cabin. He had to admit that the homeland he loved had now been reborn as a completely different, massive, and powerful entity from what he once knew. The spirit of the Empire, washing away the scars of war and standing tall at the center of the world, was certainly great, but within it, individual voices were being buried in the grand chorus of the state. He offered a final silent prayer toward the direction of the receding Forbidden City. It was a shout for the end of an era and a lonely farewell to the blessed, yet alien, new era that had settled upon its ruins."
 manchukou_wr.113.a:0 "He left in the end."
 manchukou_wr.114.t:0 "The Emperor's Council"
 manchukou_wr.114.d:0 "The doors of the newly established administrative council chamber within the Forbidden City opened, cutting through the cold morning air of Beijing. This was a place entirely different from the noisy republican-style parliaments of the past. It was a sanctuary where sages representing all walks of life across the continent and elites with practical capabilities gathered under the Emperor's authority to discuss the future of the Empire, serving as the heart where national strategies were determined. On the faces of those entering the hall, there was no trace of the servility of politicians who once squabbled for factional interests; instead, there was a sublime pride in performing the great task of national revival.\n\nPrime Minister Zheng Xiaoxu stood at the rostrum and scanned the agendas, which were organized with flawless precision. The Empire had now completely washed away the scars of war and began to function like a massive machine whose parts were intricately interlocked. The council was no longer an arena of conflict. It was the supreme advisory body that refined and supplemented the Emperor's will so that it could reach the lives of the subjects in the most efficient and compassionate way. Representatives selected from each region felt a true sense of belonging and stability as their voices harmoniously blended into the grand chorus of the nation. The subjects found their places within the certain prosperity and order guaranteed by the state, rather than the chaos brought by irresponsible freedom.\n\nOutside the window, a panoramic view of the actively reconstructed Peking cityscape unfolded. The smoke rising from chimneys and the hum of cars traveling along orderly roads testified to the heights of civilization the Empire had reached. The decisions made in the Emperor's Council were delivered across the entire continent without obstruction, clothing the naked and renewing the old. This was the most perfect political fruit found by a continent that had finally ended a century of wandering. The talents gathered under the blue tiles began to strive toward a single goal. The glory of the Empire was taking root even more firmly upon this quiet yet powerful decision-making system, and the light of Great Unity was shining more brilliantly than ever before."
 manchukou_wr.114.a:0 "The Empire now moves as one will."
 manchukou_wr.115.t:0 "Demand for Submission from [FROM.GetName]"
 manchukou_wr.115.d:0 "An ultimatum from [FROM.GetName] arrived this morning. The message states that they will declare war upon us unless we submit to their authority and join their ranks. The disparity in national power and legitimacy between our two nations is vast, and this situation could prove to be extremely unfavorable for our future. We must now decide whether to accept their terms for the sake of unity or to risk everything to maintain our current standing."
 manchukou_wr.115.a:0 "China shall become one."
 manchukou_wr.115.b:0 "We are an independent government!" 
 manchukou_wr.116.t:0 "[FROM.GetName] Rejects Our Demand"
 manchukou_wr.116.d:0 "The government of [FROM.GetName] has formally rejected our proposal for unification. Diplomacy has reached its limit, and war is now the only remaining means to annex their territory. We must now prepare to secure our rightful claims and restore the integrity of the continent through the force of arms."
 manchukou_wr.116.a:0 "To war!"
 manchukou_wr.117.t:0 "Under the Heavenly Cover"
 manchukou_wr.117.d:0 "The morning in Peking no longer began with the sharp sound of gunfire or the moans of the hungry. Instead, that space was filled with the white steam of dumplings rising from orderly rows of street vendors and the light clanging of trams running along newly paved tree-lined streets. Old Wang, who ran a fabric shop, opened his doors with practiced hands. The air in the street was cold, but it was mixed with the vitality and hope the Empire had regained. Only a few years ago, the continent was moaning under the endless fire of civil war, and the sky was hidden by the dark clouds of war. However, since the victory in the decisive battle against Japan and the Emperor's return as the master of the Forbidden City, the world had transformed like magic.\n\nOld Wang offered a slight bow to the Imperial Guard passing by his shop. They were different from the disorganized armies he had seen during the devastation of the civil war. Their disciplined gait, neat uniforms, and polite attitude toward the subjects symbolized the level of noble civilization the Empire had reached. As Prime Minister Zheng Xiaoxu said, a new order where morality and rationality harmonized had now settled in this land. Officials from the government offices moved busily with briefcases, but their eyes held a sense of practical pride. People no longer worried about tomorrow's bread, fulfilling their respective roles within the certain system guaranteed by the state.\n\nOld Wang looked at the morning sunlight streaming into the shop. The sunlight pouring over the golden roofs of the Forbidden City felt like an act of grace, as if the Emperor's benevolent gaze were covering all people. The sky over Peking grew clearer by the day, and under it, the subjects finally realized what 'Heavenly Cover' meant. It was not oppression, but a sturdy roof protecting the home from harsh winds and rain. The distant whistle of a train was a signal announcing the revival of the Empire flowing through its arteries. Old Wang smiled faintly as he organized the newly arrived silk bundles. In this brilliant paradise built upon ruins, he felt a sense of peace that seemed eternal for the first time in his life. The light of Great Unity was now warmly illuminating every alley and home."
 manchukou_wr.117.a:0 "The Empire's light covers the world."
 manchukou_wr.118.t:0 "The Old Man"
 manchukou_wr.118.d:0 "As the twilight of Peking settled over the golden tiles of the Forbidden City, an old man sat in a teahouse near Zhengyangmen, staring at the distant silhouette of the palace. In his hand was a worn teacup, etched with the hardships of time. Born as a descendant of a Manchu bannerman, he was a living witness who had observed that fateful day of 1911. The shame of that tumultuous autumn of the Xinhai year, when the Emperor abdicated and queues were forcibly cut, still remained as a cold lump in his heart. The new era that began under the grand name of a Unified Republic brought him only a sense of loss, and the Manchu people had to live like strangers in a foreign land, hiding their identities.\n\nThe thirty years that followed were a succession of darkness and chaos. The unified Republic could not overcome ideological conflicts and fell into a giant whirlpool of civil war, and those who claimed to be revolutionaries endlessly demanded the blood of their own for private power. Western powers took advantage of this chaos to trample the Empire's sovereignty using concessions as their bases. The old man wandered the cold northern wilderness to escape the fire of civil war, waiting only for the day when Heaven would once again look down upon the continent. And that wait was not in vian. On the day when the Empire emerged victorious from the great battlefield against Japan and the legitimate Emperor was once again proclaimed the master of the Forbidden City, the old man shouted 'Long live the Emperor' until his throat was hoarse in the streets of Peking. It was not merely the restoration of a dynasty, but the moment when the pride of a fallen civilization stood up once more.\n\nNow, the streets are again filled with order and vitality. The reconstruction projects led by Prime Minister Zheng Xiaoxu breathed life into the city ruined by civil war. The scars left by past chaos were buried under orderly railways and roads, and the subjects no longer looked at the faces of foreign powers, proudly holding their heads high as subjects of the Empire. The old man looked at the young people visible outside the teahouse window. They no longer trembled with hunger or the fear of war. Within the certain well-being and systematic order provided by the state, they were designing the brilliant future of the Empire. The old man found in their eyes that strong spirit he had lost in his youth.\n\nThose who went into exile across the Pacific lamented that there was no freedom in this land, but the old man snorted. The freedom they spoke of was ultimately nothing more than the irresponsible civil war and license that had stained the continent with blood for thirty years. What flowed through the continent now was not license, but a sublime order in which the massive organism of the state moved toward a single goal. Under the benevolent rule of the Emperor, the people were finally enjoying the true peace provided by the 'Heavenly Cover.' The old man set down his teacup and took a deep breath. The wandering that began in the ruins of the Xinhai Revolution was now over. The Empire stood tall once again at the center of the world, and he was grateful to see not the great twilight, but the brilliant morning of the Empire before he died. The arteries of the continent were pulsating powerfully once more, and the glory of the Empire seemed eternal."
 manchukou_wr.118.a:0 "The Great Qing lives on."
 manchukou_wr.119.t:0 "Twilight"
 manchukou_wr.119.d:0 "In a quiet tavern a block away from the bustling streets of Peking, a man sitting in a corner fiddled with his already cooled sake cup. No one remembered his name anymore; people simply called him the Continental Ronin. Thirty years ago, he crossed the sea from Japan, dreaming of a new order for Asia. The continent he first encountered was a ruin stained by the devastation of disarray, making the name of a Unified Republic appear meaningless. The man roamed the battlefields, trying to intervene in the destiny of the continent, sometimes with a blade and sometimes with a scheme. There was a time when he believed only the power of Japan could save this vast continent from chaos.\n\nHowever, history flowed in a completely different direction than the man had anticipated. After a desperate decisive battle with Japan, the Empire rose on its own, and the master of the Forbidden City once again became the Emperor. The Japanese-led Asian order he had dreamed of collapsed, but upon those ruins rose an even more massive and sophisticated civilization, combining morality and rationality as advocated by Prime Minister Zheng Xiaoxu. At first, the man intended to leave the continent, soaked in a sense of defeat, but he stopped in his tracks as he watched the reconstructed streets of Peking. It was because the order and well-being he had so yearned for were being realized not under Japanese bayonets, but under the legitimacy and sovereignty of the Empire.\n\nTo the eyes of the now-aged ronin, the Empire was a single, massive, and perfect organism. The streets were clean and orderly, and the faces of the subjects were filled with trust and pride in the state rather than the anxiety of the Republican era. The man felt a sense of awe at the inclusiveness of this land that had accepted him as a member of the Empire rather than a stranger. The Empire had gathered even him, a former enemy, under the 'Heavenly Cover.' He had now laid down his sword and was watching the revival of the Empire as an ordinary subject. As the whistle of a train echoed outside the tavern, the man emptied his cup and stood up. The twilight of the continent was fading, but he was certain that the morning the Empire would welcome would be more brilliant than ever before."
 manchukou_wr.119.a:0 "This is my final home."
 manchukou_wr.120.t:0 "The Great Revival of the Great Qing Empire"
 manchukou_wr.120.d:0 "In the autumn of the Xinhai year of 1911, when the foundation of the sacred Empire that had sustained the continent for centuries collapsed, the world believed it was the eternal end of an era. The Republic that followed, under the guise of unification, transformed into a lawless land where civil war, corruption, and banditry ran rampant. The subjects had to endure miserable economic downfall amidst hunger and pillaging, and the legacy of the Empire seemed to fade into the background of history, dismissed as a relic of the past. Even the brief restoration attempt in 1916 only added to the chaos, as the continent's sovereignty was torn to pieces by foreign powers and warlords.\n\nHowever, the flame of the Empire was never extinguished. Even in the darkest times, the loyalty of the subjects toward the Emperor and the will to defend the Empire's legitimacy continued steadily through the arteries of the continent. Finally, rising again from the devastation of civil war, the Empire began to reconstruct the order of the continent by pacifying the divided factions one by one. This was more than a mere reclamation of power; it was a sacred process of restoring fallen morality and sovereignty. The Empire did not stop at subduing internal enemies but also triumphed in the decisive battle against Japan, the powerhouse of the East, thereby proving the complete liberation and independent sovereignty of the continent to the entire world.\n\nNow, the traces of a century of national humiliation have been completely washed away. The Imperial banner hoisted high over the Forbidden City no longer wavers, and under the dedicated administration of Prime Minister Zheng Xiaoxu, the continent enjoys unprecedented prosperity and peace. The Manchu, the Han, and all ethnic groups have become one under the Emperor's benevolent 'Heavenly Cover,' realizing the ideal of Great Unity. This brilliant paradise built upon ruins has now become a beacon for the world beyond Asia, and the glorious history of the Empire will flow majestically toward the future like an eternal Grand Canal."
 manchukou_wr.120.a:0 "We have returned!"
 manchukou_wr.121.t:0 "Unification of All Under Heaven"
 manchukou_wr.121.d:0 "At last, the great currents of the world have converged into one. The governments that long oppressed the continent, along with the gunfire of civil war and the wails of division, have fallen silent under the orderly sequence of the Great East State. From the Forbidden City in Peking to the southern coastlines, the banner of the Great East State flutters proudly under the blue sky, serving as a proclamation to all subjects that a new era has arrived.\n\nThis unification is not a mere conquest by force. It is the fruit of a sacred task achieved through the harmony of morality, rationality, and the essence of Eastern civilization as emphasized by Prime Minister Ishiwara Kanji. The spirit of the people, once scattered by the corruption and incompetence of the previous Republican era, is now reuniting within the massive organism of the Great East State. All subjects fulfill their respective roles within the certain system guaranteed by the state, singing of the hope for prosperity rather than the fear of war.\n\nThe Great East State has solidified its status as the sole sovereign of the continent. We have risen from the ruins of civil war to realize the vision of the Kingly Land, where morality rules and justice flows like a river. All under heaven are now united under the benevolent Harmony of Five Races of the Great East State, establishing a firm foundation to protect Eastern pride against the global trials to come. Today, the arteries of the continent pulsate powerfully once more, and the light of the Great East State warms the entire world."
 manchukou_wr.121.a:0 "The Era of Great Unity has begun!"
 manchukou_wr.122.t:0 "Beheading the Pretenders"
 manchukou_wr.122.d:0 "In the cold dawn air of Peking, the subjects of the Great East State watched the square with bated breath. The men standing on the scaffold are traitors who divided the continent by conspiring with foreign powers under the guise of the past Min-guk. They once believed themselves to be the masters of history, establishing pretender regimes in the south and plunging the subjects into misery, but now they stand there to be judged for their crimes under the legitimate rule of law of the Great East State. Prime Minister Ishiwara Kanji read the verdict in a resolute tone. This is not a mere death sentence; it is a final judgment on the era of disorder and corruption of the Min-guk period that oppressed the continent for decades.\n\nWith the sound of the sentence carried out, the ghosts of the Min-guk that lingered over the continent finally lost their heads. The subjects filling the square remained silent for a moment, but soon cheered, realizing that true justice has been realized in this land. The beheading of the traitors is a symbolic ceremony proving that the Kingly Land aimed for by the Great East State is not a mere slogan but a tangible order. Now, the source of injustice that disturbed the south of the continent is completely gone, and the Kingly Land of the Great East State has taken even firmer root in every corner of the world. Upon the ruins of the defunct Min-guk, the subjects are finally witnessing the peaceful future promised by the Great East State."
 manchukou_wr.122.a:0 "Justice has been realized."
 manchukou_wr.123.t:0 "Dawn of Greater East Asia"
 manchukou_wr.123.d:0 "The night in Peking was deep, but Prime Minister Ishiwara Kanji, standing on a pavilion of the Forbidden City, had eyes that shone more clearly than ever. A cold night wind brushed against his cheeks, yet a sense of pride for unifying the continent and a resolute will for the future to come flowed hotly in his heart. Since the riots of the Xinhai year in 1911, all that had ruled this land was the incompetence of the republic era and the whirlpool of endless chaos. He did not forget that while many shouted for freedom and democracy, the results were always hunger, foreign mockery, and the gluttony of corrupt traitors. Where the plausible shell of the republic was stripped away, only the moans of suffering subjects remained.\n\nHowever, under the banner of the Great East State, all under heaven have finally regained an orderly sequence. Prime Minister Ishiwara heard the sound of this massive national organism he designed breathing in harmony. This is not a mere expansion of territory obtained through force, but the realization of the Kingly Land—the new pinnacle of human civilization where Eastern morality and rationality harmonize. The grand sight of Manchus, Hans, and Mongols fulfilling their respective roles under the value of the Harmony of Five Races is the most perfect foundation to prepare for the Final War, the global trial to come. He confirmed how firmly this new system, established by boldly excising the remnants of the republic, was supporting the arteries of the continent.\n\nHe raised his teacup and stared at the night view of Peking in the distance. The lights of the street no longer tremble in fear, and the subjects are protected under the certain well-being and systematic rule of law guaranteed by the state. In their eyes, instead of the despair of the past republic era, there was pride as members of the Great East State and confidence in the revival. Prime Minister Ishiwara took a deep breath, certain that the path he had walked was not in vain. The arteries of the continent now flow according to the will of the Great East State, and Eastern civilization is leaping once again toward the center of the world. Welcoming the dawn that pushed back the darkness of Peking, he was proclaiming to the entire world that this Kingly Land would become an eternal wall for humanity."
 manchukou_wr.123.a:0 "The dream of the Kingly Land has become a reality."
 manchukou_wr.124.t:0 "Purification of the South"
 manchukou_wr.124.d:0 "The Great East State government in Peking has initiated an extensive administrative renewal to eradicate the remnants of the old regime and corruption within the southern occupied territories. Corrupt officials and bandits of the Southern Court, who have maintained their vested interests under Japanese protection since the past republic era, are now being held accountable for their crimes under the strict rule of law of the Great East State. Prime Minister Ishiwara Kanji has ordered the dissolution of the abnormal administrative structures in the south and the implantation of a new bureaucratic system based on morality and rationality.\n\nThe government offices in Nanking, once stained with opium trafficking and illicit wealth, are being reborn as administrative centers governed by the orderly sequence of the Great East State. Observing the punishment of the traitors who once exploited them, the subjects are beginning to realize that the Kingly Land aimed for by the Great East State is a tangible justice. The abundant resources of the south, secured through this purification work, will now be utilized as a clean and powerful lifeblood for the revival of the Great East State and the progress of all Asia."
 manchukou_wr.124.a:0 "Completely eradicate the remnants of corruption."
 manchukou_wr.125.t:0 "Proclamation of Constitutionalism"
 manchukou_wr.125.d:0 "In the government offices of Peking, the Datong Emperor officially promised the enactment of an Imperial Constitution to the subjects. This is the result of Prime Minister Ishiwara Kanji's pragmatic judgment that mysticism, such as the Living God, has clear limitations as a governing mechanism for subjects who have experienced forty years of republicanism under the Republic. Now, the Emperor is redefined not as an agent of God, but as the supreme organ of the state and a modern monarch exercising governing power under the constitution.\n\nThis measure is a highly calculated political move to organize the chaos of the Republic era in the name of the law and to co-opt intellectuals and subjects accustomed to republicanism. Within the order guaranteed by the constitution, subjects now recognize their rights and duties, taking pride as members of the Datong State, a state governed by the rule of law. With this, the Datong State has laid the foundation for modern constitutionalism to lead Asia, moving beyond a mere empire. This order, combining the legacy of the old era with the vision of the new state, will serve as the most solid ideological bulwark for the Datong State ahead of the World Final War."
 manchukou_wr.125.a:0 "But this is merely Kanji's world."
 manchukou_wr.126.t:0 "Portrait of the Law"
 manchukou_wr.126.d:0 "The night in Peking was still, yet the air in the Forbidden City was thick with the heavy scent of ink. Pujie ran his hand over the draft of the Imperial Constitution lying on his desk. It was adorned with brilliant gold leaf, but to him, it was no different from a pair of exquisitely crafted shackles. To the subjects who had been baptized by forty years of republicanism, ancient mysticism no longer held sway. Prime Minister Ishiwara Kanji knew this reality better than anyone, and thus, he bound the Emperor with the constraints of the law as a constitutional monarch instead of the sacred mask of a Living God.\n\nPujie stared at himself in the mirror. The man reflected was not a sovereign commanding the world, but the supreme component of the vast state machine that had to move according to the blueprint of the constitution. The constitutionalism introduced to quell the chaos of the Republic era was a promise of order to the subjects, yet to the Emperor, it was a transparent prison that permitted not a single step of deviation. He was now redefined not as an agent of God, but as a state organ performing duties prescribed by law—signing, approving, and remaining silent.\n\nThe night view of Peking visible through the window was cold and orderly. The pulse of the Datong State, marching toward the World Final War envisioned by Prime Minister Ishiwara, seemed to vibrate through the ground. The subjects were now preparing for war not through the Emperor’s divinity, but within the order guaranteed by the constitution. Pujie felt this bizarre stability more cruel than the disorder of the Republic era. The aspirations of those who once dreamed of a free republic had now perverted into the legitimacy for the nation’s transformation into a Garrison State under the name of constitutionalism.\n\n'Am I, in the end, not the protagonist of this grand play, but merely the most decorative stage prop?' Pujie swallowed hard as he flipped through the constitutional clauses. Personal anguish and human longing were written nowhere in those articles. Only the duties as a symbol representing the will of the state were densely packed within. He now pushed himself into the framework of the law, accepting the magnificent yet cold path of progress the Datong State would walk. The darkness of the Forbidden City deepened, but the letters on the draft constitution shone like razor-sharp blades."
 manchukou_wr.126.a:0 "Accepting the shackles named the rule of law."
 manchukou_wr.127.t:0 "Destiny"
 manchukou_wr.127.d:0 "The Forbidden City of Peking was shrouded in silence. The draft of the Imperial Constitution on the desk was adorned with brilliant gold leaf, but to Pujie, it appeared as nothing more than an exquisitely crafted chain. To the subjects of the continent, who had been baptized by forty years of republicanism, the ways of the past no longer held any sway. Prime Minister Ishiwara Kanji saw through this reality more ruthlessly than anyone else, and thus bound the Emperor with the shackles of the law as a constitutional monarch.\n\nPujie stared at himself in the mirror. The man reflected was not a sovereign commanding the world, but the supreme component of the vast state machine that had to operate according to the blueprint of the constitution. The constitutionalism introduced to quell the chaos of the Republic era was a promise of order to the subjects, yet to the Emperor, it was a transparent prison that permitted not a single step of deviation. He now had to function as the symbol of the Garrison State designed by Ishiwara, performing duties prescribed by law as the supreme organ of the state.\n\nThe night view of Peking visible through the window was cold and orderly. The pulse of the Datong State, squeezing every resource toward the World Final War, seemed to vibrate through the ground. The subjects were now becoming components of war, not under the Emperor's authority, but within the order guaranteed by the constitution. Pujie felt this bizarre stability to be more cruel than the disorder of the Republic era. He now pushed himself into the framework of the law, silently accepting the magnificent yet cold path of progress the Datong State would walk. The darkness of the Forbidden City deepened, but the letters on the draft constitution shone like razor-sharp blades."
 manchukou_wr.127.a:0 "It cannot be defied."
 manchukou_wr.128.t:0 "The End of Han Feizi"
 manchukou_wr.128.d:0 "The execution of Hu Shih, who symbolized the intellect of the Republic, has been carried out at the Peking prison. This is a resolute measure by Prime Minister Ishiwara Kanji to establish the ideological identity of the Datong State and eliminate remaining liberal impurities ahead of the World Final War. Hu Shih was branded a reactionary who denied the authority of the Datong Emperor as a Living God and incited division among the subjects, and he was punished according to the legal procedures of Burning Books and Burying Scholars.\n\nThis execution is a symbolic event that erases all critical thinking within the Datong State and completes the nation as a Garrison State. Just as Han Feizi met his end under the legalism of the Qin Dynasty, the intellect of the old era has now knelt before the new order of the Datong State. All intellect on the continent will now be consolidated toward the single goal of national prosperity and victory in the war, and the government of the Datong State plans to further solidify ideological integration through this measure."
 manchukou_wr.128.a:0 "I saw a star falling from the sky."
 manchukou_wr.129.t:0 "The First Parliamentary Session"
 manchukou_wr.129.d:0 "The first parliamentary opening ceremony since the enactment of the Great Unity State Constitution was held in Peking. The Datong Emperor declared the session open from his position symbolizing national permanence and unity, announcing to the world that actual state affairs would be conducted through the Parliament, the representative body of the subjects. This opening is analyzed as a highly calculated political move by Prime Minister Ishiwara Kanji to respect the republican traditions of the Republic era and secure legalistic legitimacy. Subjects gathered in the square in front of the Forbidden City to celebrate the beginning of modern constitutionalism, expecting stability and order within the new legal framework proclaimed by the Great Unity State."
 manchukou_wr.129.a:0 "Well, at least it functions, doesn't it?"
 manchukou_wr.130.t:0 "Kyowa-go Education A New Voice for Greater East Asia"
 manchukou_wr.130.d:0 "The Ministry of Education of the Great Unity State has issued a directive to strengthen Kyowa-go (Concordia Language) education nationwide as of today. This is a measure to reorganize the complex and fragmented linguistic systems inherited from the Republic era, laying the foundation for the diverse nations of Asia to communicate under a single goal. Prime Minister Ishiwara Kanji emphasized that efficient communication and administration are the core of a Garrison State, and that the unification of language is the only way to reduce unnecessary friction between ethnic groups and concentrate national capacity on the World Final War.\n\nKyowa-go classes have already begun in schools and factories in major cities, including Peking and Nanking. This new language, based on simplified grammar and common vocabulary, is becoming a powerful tool to bind all subjects of the continent—Han, Manchu, Mongol, and others—under the banner of the Great Unity State. Although some older generation intellectuals express concerns over the decline of native languages, the government defines this as an essential process for Asia to be reborn as one against the threats of Western powers and is pushing forward with the education. Now, a single voice toward a single future has begun to resonate throughout the Great Unity State."
 manchukou_wr.130.a:0 "Concord begins with language."
 manchukou_wr.131.t:0 "The World Final War"
 manchukou_wr.131.d:0 "In the Prime Minister's office in Peking, Prime Minister Ishiwara Kanji issued the final logistical and operational directives for the World Final War. Under the National Defense State system, all civilian factories of the Great Unity State have now been completely converted into wartime production bases, with the entire industrial capacity of the nation concentrated on military buildup for victory at the front. The outdated and fragmented production systems of the Republic era have been discarded, and factories across the continent are now operating in perfect unison according to the order of the Garrison State.\n\nSimultaneously, within the military, old doctrines of the past have been entirely scrapped in favor of a new World Final War doctrine designed to maximize the geographic characteristics of Asia and the vast human resources of the Great Unity State. Subjects continue their voluntary devotion under the wartime special laws approved by the Parliament, and the Great Unity State has now been reborn as a solid war machine capable of overwhelming the material offensives of Western civilization. All preparations are complete, and the Great Unity State is now ready to march toward the great clash that will decide the fate of civilization."
 manchukou_wr.131.a:0 "Victory comes only through thorough preparation."
 # 중국(공격자) 시점
 chi_border_conflict.1.t:0 "Concession Recaptured by Force"
 chi_border_conflict.1.d:0 "Our military has finally used force to recapture the core territory illegally occupied by [743.Owner.GetName]. After a fierce border conflict, the forces of [743.Owner.GetName] have withdrawn, and the foreign flags fluttering over the concession have all been lowered. This is a great victory for the Chinese nation and the first step in restoring our national sovereignty."
 chi_border_conflict.1.a:0 "This is our rightful territory!"
 chi_border_conflict.2.t:0 "Concession Recapture Operation Failed"
 chi_border_conflict.2.d:0 "Unable to break through the solid defensive lines and overwhelming firepower of [743.Owner.GetName], our military's operation to enter the concession has ended in a dismal failure. Having suffered massive casualties, our forces were forced to retreat from the border region, and their flags still arrogantly wave over our land."
 chi_border_conflict.2.a:0 "A shameful defeat."
 # 조계지 소유국(방어자) 시점
 chi_border_conflict.3.t:0 "Concession Defensive Line Collapsed"
 chi_border_conflict.3.d:0 "We have failed to defend against a massive surprise offensive by the Chinese forces across the border, ultimately losing control of the concession. The local garrison suffered devastating casualties and was forced to withdraw, and all our massive interests and infrastructure built in the region have been seized."
 chi_border_conflict.3.a:0 "This is a disgrace."
 chi_border_conflict.4.t:0 "Successful Defense of the Concession"
 chi_border_conflict.4.d:0 "Our garrison has completely crushed the reckless provocation of the Chinese forces that violated the border. Faced with our overwhelming firepower and tactical superiority, the enemy fled in disgrace. With this victory, our control over the concession has been further solidified, teaching a bitter lesson to those who dare covet the Empire's interests."
 chi_border_conflict.4.a:0 "The Empire's interests remain firm."
