l_english:
 BOOKMARK_FRANCE_INFO:0 "§BÉtat Français§!"
 BOOKMARK_FRANCE_INFO_DELAYED:0 "§YThe Country Reworked on 0.3.0 Update§!\n§W--------------§!\n\n£GFX_texticon_bookmark_FRA\n\n\n\n\n§LThe Treaty of Frankfurt, signed on September 2, 1919, brought France to its knees. Forced to accept humiliating terms — enormous reparations, colonial losses, and the demilitarization of its borders — the nation was fractured between north and south, city and countryside. Scars of war ran deep, and the people fell into despair. Workers and peasants alike rose up for their own causes, plunging politics into chaos and division.\n\nAfter the defeat, political strife intensified between left and right. The split between Pierre Laval and Édouard Herriot gave way to a sweeping victory of the Left Alliance in the general elections, but violent riots, the Bloody Week, and the tragic death of President Paul Deschanel completely shattered the prestige of the Republic. At the height of the turmoil, Marshal Philippe Pétain seized power through a military coup, bringing the Third Republic to its end.\n\nIn 1922, Pétain proclaimed himself §YSupreme Commander§! and founded the §YFrench State§!. Backed by Charles de Gaulle and his Party of Republican Order, he suppressed dissent through the Gendarmerie and Mobile Police. Meanwhile, he pursued rearmament, economic reforms, and an industrial reconstruction policy known as the 'Gamelin Plan,' establishing a new order upon the ruins of defeat.\n\nYet, the dictatorship would not last. The Great Depression and the Stavisky Affair eroded the regime's authority, and as the Popular and Democratic Unions rose, Jacques Doriot's Popular Socialist militias marched on Paris. In the winter of 1934, the Marshal's government finally collapsed. Once again, France stands at a crossroads. Will it choose order or liberty, vengeance or justice?\n\n"Unless we do everything for freedom, we have done nothing at all." – Maximilien Robespierre§!\n\n§YPaths of the French State§!\n- Jacques Doriot's Popular Socialism\n- Marcel Déat's Neo-Socialism\n- François de La Rocque's National Orderism\n- Charles de Gaulle's Republican Military Government\n- Marcel Bucard's Revanchism Regime\n- Charles Maurras' Integral Nationalism\n- Léon Blum's Social Democracy\n- Paul Reynaud's Liberalism\n- Pierre Monatte's Syndicalism"
 BOOKMARK_ITALY_INFO:0 "§GItalian State§!"
 BOOKMARK_ITALY_INFO_DELAYED:0 "§YWill be Reworked as Follows§! in §G'Arditi'§! Update\n§W--------------§!\n\n£GFX_texticon_bookmark_ITA\n\n\n\n\n§LItaly was defeated by the Austro-Germanic barbarians. When Paris, the heart of Latin civilization, burned, Rome had no choice but to raise the white flag. Italia Irredenta, oppressed by the Austrians, seemed fated to be crushed beneath them forever.\n\nYet Latin blood rejected such a cruel destiny head-on. Italy's pride and hero, the Poet-Soldier (Il Poeta Soldato), Gabriele D'Annunzio, gathered the Arditi and numerous activists and set out for Venice in 1922. The city's desperate and valiant fighting ended in defeat, but D'Annunzio became the hope of the Italian people.\n\nThe reactionary and Germanic House of Savoy betrayed Italy. It ignored the heroic march on Venice and attempted to arrest D'Annunzio, but the soldiers and police stood with Italy, and none could bring themselves to fire upon his decorations. Leading Arditi, Futurists, soldiers, revolutionaries, and anarchists, D'Annunzio marched on Rome in 1924, and the House of Savoy had no choice but to flee. From a balcony, D'Annunzio proclaimed the 'Italian Republic.'\n\nThrough the efforts of Alceste De Ambris, Filippo Marinetti, and Commander (Comandante) D'Annunzio, the Italian Republic raised the Charter of the Mediterraneum (Charter of the Mediterranean). With cooperative corporatism built on ten professional guilds, the Futurist cult of speed, technology, and the future, and the youth and heroism championed by D'Annunzio and Arditismo, Italy is remade into a state that is wholly and unmistakably Italian.\n\nGabriele D'Annunzio—the Poet-Soldier, the Commander, the Prophet (Il Vate). His grand epic surges toward its climax, and its curtain is now rising.§!"
 BOOKMARK_CANADA_INFO:0 "§RDominion of Canada§!"
 BOOKMARK_CANADA_INFO_DELAYED:0 "§YNew Playable Country§!\n\n§LAlthough Canada lost the World War, it did not suffer much damage because it was far from Europe, and was not deeply involved in the war. However, the Great Depression of 1931 destroyed all of Canada's economic foundations. Especially since its suzerain, Great Britain, was also slow to recover, as it lost the World War, making it seem like Canada's economic recovery was so slow that it hardly seemed to take place.\n\nThe Conservative Party successfully used Section 98 of the Criminal Code to stop the expansion of extremist forces, but lost the 1935 general election because it produced little success in overcoming the Great Depression. The coalition is unstable even though the Liberal-CCF-Conservative coalition government was formed as a result of the 1935 general election to keep the Social Credit Party in check.§!\n\n§YPathes of Canada§!§W\n- Stable Coalition\n- Social Credit Party in Power\n- Liberal Party in Power\n- CCF in Power\n- Communist Party of Canada in Power\n- National Unity Party of Canada in Power§!"
 BOOKMARK_GERMANY_INFO:0 "§gGerman Empire§!"
 BOOKMARK_GERMANY_INFO_DELAYED:0 "§YWill be Reworked as Follows§! in §g'Weltreich'§! Update\n§W--------------§!\n\n£GFX_texticon_bookmark_GER\n\n\n\n\n§LThe German Empire had won the Great War and Germany seemed to be entering a golden age. But in 1931, the Great Depression began to shake things up.\n\nThe Social Democrats, who controlled the parliament at the time, were unable to respond quickly enough to the Great Depression, and the German people began to express their anger at their economically crumbling lives. Not surprisingly, the Social Democrats were defeated in the 1931 general election, and conservative parties came to power. The Kaiser appointed Paul von Hindenburg as the new chancellor, with the will of parliament and the people, and Hindenburg formed the Hindenburg Cabinet, including Franz von Papen and Kurd von Schleicher.\n\nHindenburg's first cabinet, however, was even more incompetent than the Social Democrats, and Hindenburg placed the blame on Papen, forcing him out of the cabinet and forming a new one. Under the second cabinet, which included Alfred Hugenberg as economy minister, Germany showed a visible economic recovery and gained public support.\n\nIn 1934, Hindenburg died of old age while still chancellor. Hindenburg's heir apparent, Schleicher, became the next Chancellor, but he wanted to make the power of the Chancellor more powerful and was preparing for an autocoup after a conflict with the Kaiser. The country is in political turmoil internally, and externally, France and Soviet Russia are just waiting for Germany to fall on their swords of revenge. If we don't sort out the internal and external chaos, we may fall apart.\n\n"We Germans fear God and but nothing else in the world." - Otto von Bismark§!"
 BOOKMARK_AUSHUN_INFO:0 "§WAustro-Hungarian Monarchy§!"
 BOOKMARK_AUSHUN_INFO_DELAYED:0 "§YWill be Reworked as Follows§! in §W'Unsern Kaiser, Unser Land'§! Update\n§W--------------§!\n\n£GFX_texticon_bookmark_AUH\n\n\n\n\n§LAs revenge for Franz Ferdinand sounded the victory bell, Austria-Hungary desperately sought to prop up the disintegrating land. With post-war panic gripping the country and Slavic peoples agitated by the wages of war, Kaiser Karl was determined. In 1921, the Reichsrat did just that, ushering in an era of reform.\n\nThe Vienna Reichsrat continued its successful reforms, but the Pannonian Steppe was not about to let its interests be violated. The Croatian crisis of 1927 brought down Ignaz Seipel's cabinet and plunged the empire into the horrors of war, but it also proved that Hungary's ethnic policies were ineffective. The Magyars antagonized Vienna but feared the consequences, even if they were extreme.\n\nIn 1931, the century of peace ended with the collapse of Austria's largest bank, the Creditanstalt. Wilhelm Miklas, a prominent member of the Christian Social Party, was able to hold on to his chancellorship, preventing the Great Depression from choking off the imperial economy, but no one knew that Austria's era was over.\n\nBy 1936, the new Vienna regime was faltering. Metternich's diplomatic skills are gone, relations with Germany remain unstable, and Otto Bauer's cabinet is barely surviving the aftermath of the Great Depression, which has been raging for years. With an Ausgleich with Hungary, which distrusts Vienna, looming on the horizon, Emperor Karl's government faces the daunting task of keeping the Empire alive...\n\n"All the world is subject to Austria."§!"
 BOOKMARK_CHINA_INFO:0 "§LRepublic of China§!"
 BOOKMARK_CHINA_INFO_DELAYED:0 "§YThe Country Reworked on 0.4.0 Update§!\n§W--------------§!\n\n£GFX_texticon_bookmark_CHI\n\n\n\n\n§L"Indeed. My heart grew emptier, wandering like the white clouds drifting between mountain ridges, like the evening wind that sweeps across the boundless plains, with no place to return to."\n\nOn the streets of Peking, a man marvels at the torch of democracy-an unparalleled liberal democratic state in the East. Amid the glittering lights and splendor of the city, no different from those of any Western metropolis, many scholars and seekers find themselves captivated. Yet, they remain unaware of the Zhongqing Party deputies shouting across the chamber, the Progressive Party legislators hurling chairs, the Speaker slamming the gavel while shouting to restore order, or the Kuomintang militias brandishing clubs at polling stations to intimidate voters. They do not hear the cries of commoners lamenting the rising cost of living, nor do they see the factories sealed shut and blanketed in dust.\n\nWith the peaceful end of Yuan Shikai's term, the Republic has gradually begun laying its foundations. Upon the pillars erected by Song Jiaoren, Cao Kun laid his roof, and thus the Republic became the sole state in the East to realize a government of the people. Yet now, it wanders adrift, as though lost in an endless wilderness. The March 3rd Uprising, which erupted in defiance of Sun Yat-sen's autocratic leadership, and his sudden death thereafter, have left the Kuomintang military-now functioning as a de facto warlord faction-unchecked in its abuses. Meanwhile, provincial governments grow ever bolder in their calls for autonomy, and mutual fearmongering in electoral campaigns continues to threaten the dream of democracy and the rule of law. How much longer must China roam this vast wilderness before it can truly become the light of the East?§!"
 BOOKMARK_MAN_MON_INFO:0 "§YGrand Monarchy of Manchuria–Mongolia§!"
 BOOKMARK_MAN_MON_INFO_DELAYED:0 "§Y0.4.0 Update Reworked Nation§!\n§W--------------§!\n§LFrom Xinjiang to the Maritime Province, the Qing Empire once ruled lands too vast to measure with ease. Manchuria, the Central Plains, the Tibetan Plateau, Mongolia, and Xinjiang all fell under its dominion. Yet where there is a beginning, there is also an end. The Taiping Rebellion, the Opium Wars, the Sino-Japanese War, and finally the Xinhai Revolution brought the empire to a devastating collapse.\n\nYet the Son of Heaven still lived, and those who believed the Mandate endured remained. Zaifeng, Shanqi, and other figures who dreamed of Qing restoration took advantage of turmoil in the Central Plains and, with Japanese support, launched a restoration movement. In 1916, the Grand Monarchy of Manchuria–Mongolia was established, rooted in Manchuria and Inner Mongolia. From its inception, however, the new state stood on fragile ground. Apart from Japan, no power granted formal recognition, and during Sun Yat-sen's presidency its very survival was severely threatened. Only after Sun's sudden death did the state endure, though compared to the days when it commanded the Central Plains, it had become but a shadow of its former glory.\n\nIn 1935, the legacy of Sun Yat-sen was taken up by Zhang Xueliang and turned against Manchuria–Mongolia. Forces once assembled to conquer it crossed Shanhai Pass under the name of the “Northeast Army.” Within weeks they advanced to the outskirts of Shenyang itself. Yet plagued by disorder and little better than bandits in discipline, the invading forces were shattered within a month, their ranks collapsing under defeat.\n\nStill, remnants of the Northeast Army continue to roam Liaodong. Between Japan, China, and Soviet Russia, this desolate land has become a battleground of competing powers. In such a world, can Manchuria–Mongolia reclaim the Mandate of Heaven?§!"