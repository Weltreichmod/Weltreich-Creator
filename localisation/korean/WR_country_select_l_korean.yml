 BOOKMARK_WELTREICH_INFO:0 "§g벨트라이히§! §L-세계정치의 시대§!"
 BOOKMARK_WELTREICH_INFO_DELAYED:0 "§L1914년 8월, 대전쟁의 포성은 세계에 타동을 가하였습니다. 사실 카이저마리네가 러시아 제국의 함대를 격침시켰을 때부터, 이미 독일의 승리는 정해졌다고 할 수 있습니다. 이후 독일이 유틀란트해를 가르고 프랑스와 러시아의 고토를 짓밟아 진주하여 1920년에 승리를 거머쥐어 세계제국을 이루어내자, 그 파장은 문명화의 잔재를 간직하던 암흑의 대륙에까지 닿았습니다.\n\n어느새 세계는 조용히 1936년을 맞았고... 세계정치의 기둥은 여전히 건재해 보입니다.\n\n그러나 동맹국을 제외하고는, 이미 많은 것이 변해 있었습니다.\n\n동방의 러시아 평의회는 면종복배하여 혁명을 기치로 내걸어 암투하면서, 나날이 고토를 수복할 준비를 하고 있습니다.\n\n프랑크푸르트 조약으로 경제의 허리가 절단된 서방의 프랑스국은 지중해 남방에서 황금기를 보내던 이탈리아와 소위 '라틴 형제' 관계를 이루어 활로를 모색하고 있습니다.\n\n죽은 이가 돌아올 수 없음은 누구나 압니다. 지금 세대에서 전쟁이 발발한다면 그 희생은 대전쟁에서 사라진 세대들의 수를 월등히 넘을 것임도 분명합니다.\n\n과연 그러한 대가를 치러서라도, 세계제국의 왕관을 빼앗아가겠다는 용감한 이가 다시 나타날까요?§!"