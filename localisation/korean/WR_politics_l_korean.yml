 MAN_aisin_gioro_pu_giye_text:0 "§Y만몽국 대군주 아이신기오로 푸제§!\n\n\n\n\n\n\n£GFX_MAN_aisin_gioro_pu_giye\n\n\n\n\n\n\n\n§L중원을 지탱해온 이때까지의 모든 제국은 늘 천자를 필요로 했습니다.\n\n노란 옷은 천자의 상징이니 감히 입으면 무엄한 것이라 윽박지르던 황형의 목소리를 회상하시는 대동제께선 늘 어렴풋이 웃으시곤 합니다. 우국충정의 기사들이 의롭게 목소리를 내어 군병을 모아 동북을 쳐 폐하에게 동북의 보관을 바치었기 때문이옵니다. 큰 도가 행해지고 모든 사람이 하나 되어 살아가는 대동세계를 이루시겠다는 열망으로 동북을 통치하시고 계시옵니다.\n\n허나 제국이라는 거대한 혼이 씌운 보관의 무게란 폐하께서 생각하시던 왕도가 아니였사옵니다. 정녕 폐하께서 교지하시는 것이 폐하의 뜻이 맞사옵니까? 숙명에 담긴 내용물은 언제나 속삭이는 만귀들의 입맛대로 흘러보내시옵고 압록강 너머에선 왜국 관료들이 압박하니 목에 줄이 감긴 듯 답답해 하시기만 하심에도 늘 자신이 원하던 삶이라며 순종하시옵니다. 마치 분장을 하고 춤추는 경극의 등장인물처럼 폐하께서는 황제의 가면을 쓰며 그것이 자신의 삶이 아니라는 것조차 모른 채 황제를 연기하실 뿐이옵니다.\n\n하지만 폐하께선 무엇을 잃었는지조차 감히 알지 못하옵니다. 가질 수 없는 것을 위해 모든 것을 바쳤으나 정작 폐하께선 자신이 바친 모든 것이 무엇인지도 모르는 실정이오니 대동제의 삶은 한낱 배우가 가면을 쓴 삶에 만족하며 벗는 것을 거부하는 것과도 같습니다. 대동제께서 평생을 꿈꿔오시고 믿어온 유일한 재산은 외로운 삶과 폐하의 것이 아닌 제국뿐입니다. 어쩌면 욕심을 던지고 북경에 거치하는 폐하의 황형이야말로 만귀들의 비웃음과 다르게 진정으로 자신을 직면하고 있는 것일지도 모르옵니다.\n\n"사람은 용모로 취해서는 안되고, 바닷물은 말로 잴 수가 없다."§!"
 MAN_aisin_gioro_pu_giye_add_text:0 "§Y만몽국 대군주 아이신기오로 푸제§!\n\n\n\n\n\n\n£GFX_MAN_aisin_gioro_pu_giye\n\n\n\n\n\n\n\n§Y입헌천자§!\n  - 항복 한계치: §G+10.00%§!\n  - 매주 전쟁 지지도 (전투 사상자): §G+0.50%§!\n--------------\n§L중원을 지탱해온 이때까지의 모든 제국은 늘 천자를 필요로 했습니다.\n\n노란 옷은 천자의 상징이니 감히 입으면 무엄한 것이라 윽박지르던 황형의 목소리를 회상하시는 대동제께선 늘 어렴풋이 웃으시곤 합니다. 우국충정의 기사들이 의롭게 목소리를 내어 군병을 모아 동북을 쳐 폐하에게 동북의 보관을 바치었기 때문이옵니다. 큰 도가 행해지고 모든 사람이 하나 되어 살아가는 대동세계를 이루시겠다는 열망으로 동북을 통치하시고 계시옵니다.\n\n허나 제국이라는 거대한 혼이 씌운 보관의 무게란 폐하께서 생각하시던 왕도가 아니였사옵니다. 정녕 폐하께서 교지하시는 것이 폐하의 뜻이 맞사옵니까? 숙명에 담긴 내용물은 언제나 속삭이는 만귀들의 입맛대로 흘러보내시옵고 압록강 너머에선 왜국 관료들이 압박하니 목에 줄이 감긴 듯 답답해 하시기만 하심에도 늘 자신이 원하던 삶이라며 순종하시옵니다. 마치 분장을 하고 춤추는 경극의 등장인물처럼 폐하께서는 황제의 가면을 쓰며 그것이 자신의 삶이 아니라는 것조차 모른 채 황제를 연기하실 뿐이옵니다.\n\n하지만 폐하께선 무엇을 잃었는지조차 감히 알지 못하옵니다. 가질 수 없는 것을 위해 모든 것을 바쳤으나 정작 폐하께선 자신이 바친 모든 것이 무엇인지도 모르는 실정이오니 대동제의 삶은 한낱 배우가 가면을 쓴 삶에 만족하며 벗는 것을 거부하는 것과도 같습니다. 대동제께서 평생을 꿈꿔오시고 믿어온 유일한 재산은 외로운 삶과 폐하의 것이 아닌 제국뿐입니다. 어쩌면 욕심을 던지고 북경에 거치하는 폐하의 황형이야말로 만귀들의 비웃음과 다르게 진정으로 자신을 직면하고 있는 것일지도 모르옵니다.\n\n"사람은 용모로 취해서는 안되고, 바닷물은 말로 잴 수가 없다."§!"
 JAP_showa_text:0 "§Y대일본제국 덴노 히로히토§!\n\n\n\n\n\n\n£GFX_JAP_emperor_hirohito\n\n\n\n\n\n\n\n§Y쇼와§!\n  - 안정도: §G+20%§!\n--------------\n§L일본의 제124대 덴노이신 히로히토는 동아시아 유일의 문명국인 대일본제국의 현인신이시며 천황이신 고귀한 존재입니다. 쇼와께서는 일본의 가장 어려운 시기를 겪으신 분이십니다. 지난 대전쟁에서 협상국이 패전한 이후 일본제국은 수십년의 경제적 고난을 받아왔으며, 중국의 되먹지도 못한 자들이 시도때도 없이 대일본을 압박하려 든 것을 그 두 눈으로 똑똑히 보았습니다. 정치는 혼란하기 그지 없었으며 국민들의 원성은 하늘을 찌르고 있습니다. 덴노께서는 작금의 일본이 하나의 거대한 시험에 도전받고 있음을 아시고 계십니다. 폐하는 현인신으로서 이러한 고통 가운데에 서도 우리를 붙드는 강력한 존재가 되실것입니다.§!"
 BUL_ferdinand_i_text:0 "§Y불가리아 차르국 차르 페르디난트 1세§!\n\n\n\n\n\n\n£GFX_BUL_ferdinand_i\n\n\n\n\n\n\n\n§Y불가리아의 구원자§!\n  - 전쟁 지지도: §R-10%§!\n  - 이념 변화 방어: §G+25%§!\n\n--------------\n§L불가리아는 세 차례에 걸친 발칸 전쟁에서 끝끝내 승리자로 남을 수 있었습니다. 불가리아의 차르 페르디난트 1세는 이 격동의 시대 한 가운데에 있었으며 여전희 국민들의 마음 한켠에는 그에 대한 경외와 존경심이 있습니다.\n\n그러나 전제자적인 그의 모습은 시대의 흐름에 따라가지 못하는 것이었고 정쟁에서 패배하여 황궁 한켠에 틀어박힌 부적과도 같은 존재가 되었습니다. 그러나 그렇다면 어떻습니다. 차르라는 지위는 적어도 그가 부족하게 사는 참사를 막아주는 방패로 여전히 작동하고 있습니다."
 BUL_boris_iii_text:0 "§Y불가리아 차르국 차르 보리스 3세§!\n\n\n\n\n\n\n£GFX_BUL_boris_iii\n\n\n\n\n\n\n\n§Y인기있는 차르§!\n  - 정치력 획득: §G+10%§!\n  - 이념 변화 방어: §G+10%§!\n\n--------------\n§L1894년 불가리아 공국 소피아에서 태어난 보리스 3세는 왕태자 시절부터 대중적인 인기를 가진 사람이었습니다. 그는 아버지 페르디난트 1세가 불가리아 차르국을 발칸의 패자로 들어 올리는 것을 보았고 그 또한 이를 위해 최선을 다해 움직이고자 하고 있습니다.\n\n불가리아의 차르로서 불가리아의 국민을 하나로 단결시키는 존재인 그는 어쩌면 불가리아를 구성하는 하나의 필수적인 요소 중 하나일 지도 모릅니다." 
 george_v_text:0 "§Y그레이트브리튼 및 북아일랜드 연합왕국 국왕 조지 5세§!\n\n\n\n\n\n\n£GFX_ENG_georgy_v\n\n\n\n\n\n\n\n§Y인기 있는 얼굴마담§!\n  - 안정도: §G+15%§!\n--------------\n§L1910년 에드워드 시대가 저물고 조지 5세의 치세가 영국에 시작되었습니다. 재위로부터 불과 4년 만에 발발한 대전쟁에서 영국은 독일과 무배상 평화협정을 맺었으나, 이는 사실상의 패전으로 간주되었으며 오랜 기간 영국의 발목을 잡고 고통스럽게 만들었습니다. 그러한 가운데 조지 5세는 영국의 군주로서 하나의 중심축이 되어 영국을 결집시키는 역할을 톡톡히 해냈습니다. 단 한 건의 스캔들 없이 근면 성실한 군주로서 살아온 수많은 날들이 지나가고 1936년의 새해가 밝았습니다. 노환으로 병석에 누운 지 수년이 흘러 그의 시대는 얼마 남지 않은 듯 보입니다. 그러나 그가 유지시킨 제국의 앞날은 비록 불분명하긴 하나 건재할 것입니다.§!"
 ENG_king_edward_text:0 "§Y그레이트브리튼 및 북아일랜드 연합왕국 국왕 에드워드 8세§!\n\n\n\n\n\n\n£GFX_ENG_edward_viii\n\n\n\n\n\n\n\n§Y논란이 있는 국왕§!\n  - 매주 안정도: §R-0.1%§!\n--------------\n§L사랑받는 아폴로, 에드워드 8세는 즉위식 때부터 관례를 깨는 행동을 많이 보였습니다. 특히 그가 월리스 심프슨이라는 유부녀와 독특한 관계를 유지하고 있는 것으로 보이는데,§! §R이 문제가 수면 위로 올라온다면 그는 왕위를 포기하더라도 그녀와의 관계를 유지하려 할 것입니다.§!"
 ENG_george_vi_text:0 "§Y그레이트브리튼 및 북아일랜드 연합왕국 국왕 조지 6세§!\n\n\n\n\n\n\n£GFX_ENG_georgy_vi\n\n\n\n\n\n\n\n§Y인기 있는 얼굴마담§!\n  - 안정도: §G+15%§!\n--------------\n§L조지 6세는 본디 왕이 될 운명이 아니었습니다. 그러나 그의 형 에드워드 8세가 퇴위하면서 그는 자신의 길이 아닌 새로운 길을 걷게 되었습니다. 유약하고 말더듬이 증상이 있으나 그는 새로운 책무를 짊어지기 위해 최선을 다하고 있습니다. 앞으로 불어닥칠 유럽의 새로운 미래 속에서 그는 영국을 위해서라면 무엇이든지 할 것입니다.§!"