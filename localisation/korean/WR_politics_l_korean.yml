 MAN_aisin_gioro_pu_giye_text:0 "§Y만몽국 대군주 아이신기오로 푸제§!\n\n\n\n\n\n\n£GFX_MAN_aisin_gioro_pu_giye\n\n\n\n\n\n\n\n§L중원을 지탱해온 이때까지의 모든 제국은 늘 천자를 필요로 했습니다.\n\n노란 옷은 천자의 상징이니 감히 입으면 무엄한 것이라 윽박지르던 황형의 목소리를 회상하시는 대동제께선 늘 어렴풋이 웃으시곤 합니다. 우국충정의 기사들이 의롭게 목소리를 내어 군병을 모아 동북을 쳐 폐하에게 동북의 보관을 바치었기 때문이옵니다. 큰 도가 행해지고 모든 사람이 하나 되어 살아가는 대동세계를 이루시겠다는 열망으로 동북을 통치하시고 계시옵니다.\n\n허나 제국이라는 거대한 혼이 씌운 보관의 무게란 폐하께서 생각하시던 왕도가 아니였사옵니다. 정녕 폐하께서 교지하시는 것이 폐하의 뜻이 맞사옵니까? 숙명에 담긴 내용물은 언제나 속삭이는 만귀들의 입맛대로 흘러보내시옵고 압록강 너머에선 왜국 관료들이 압박하니 목에 줄이 감긴 듯 답답해 하시기만 하심에도 늘 자신이 원하던 삶이라며 순종하시옵니다. 마치 분장을 하고 춤추는 경극의 등장인물처럼 폐하께서는 황제의 가면을 쓰며 그것이 자신의 삶이 아니라는 것조차 모른 채 황제를 연기하실 뿐이옵니다.\n\n하지만 폐하께선 무엇을 잃었는지조차 감히 알지 못하옵니다. 가질 수 없는 것을 위해 모든 것을 바쳤으나 정작 폐하께선 자신이 바친 모든 것이 무엇인지도 모르는 실정이오니 대동제의 삶은 한낱 배우가 가면을 쓴 삶에 만족하며 벗는 것을 거부하는 것과도 같습니다. 대동제께서 평생을 꿈꿔오시고 믿어온 유일한 재산은 외로운 삶과 폐하의 것이 아닌 제국뿐입니다. 어쩌면 욕심을 던지고 북경에 거치하는 폐하의 황형이야말로 만귀들의 비웃음과 다르게 진정으로 자신을 직면하고 있는 것일지도 모르옵니다.\n\n"사람은 용모로 취해서는 안되고, 바닷물은 말로 잴 수가 없다."§!"
 MAN_aisin_gioro_pu_giye_add_text:0 "§Y만몽국 대군주 아이신기오로 푸제§!\n\n\n\n\n\n\n£GFX_MAN_aisin_gioro_pu_giye\n\n\n\n\n\n\n\n§Y입헌천자§!\n  - 항복 한계치: §G+10.00%§!\n  - 매주 전쟁 지지도 (전투 사상자): §G+0.50%§!\n--------------\n§L중원을 지탱해온 이때까지의 모든 제국은 늘 천자를 필요로 했습니다.\n\n노란 옷은 천자의 상징이니 감히 입으면 무엄한 것이라 윽박지르던 황형의 목소리를 회상하시는 대동제께선 늘 어렴풋이 웃으시곤 합니다. 우국충정의 기사들이 의롭게 목소리를 내어 군병을 모아 동북을 쳐 폐하에게 동북의 보관을 바치었기 때문이옵니다. 큰 도가 행해지고 모든 사람이 하나 되어 살아가는 대동세계를 이루시겠다는 열망으로 동북을 통치하시고 계시옵니다.\n\n허나 제국이라는 거대한 혼이 씌운 보관의 무게란 폐하께서 생각하시던 왕도가 아니였사옵니다. 정녕 폐하께서 교지하시는 것이 폐하의 뜻이 맞사옵니까? 숙명에 담긴 내용물은 언제나 속삭이는 만귀들의 입맛대로 흘러보내시옵고 압록강 너머에선 왜국 관료들이 압박하니 목에 줄이 감긴 듯 답답해 하시기만 하심에도 늘 자신이 원하던 삶이라며 순종하시옵니다. 마치 분장을 하고 춤추는 경극의 등장인물처럼 폐하께서는 황제의 가면을 쓰며 그것이 자신의 삶이 아니라는 것조차 모른 채 황제를 연기하실 뿐이옵니다.\n\n하지만 폐하께선 무엇을 잃었는지조차 감히 알지 못하옵니다. 가질 수 없는 것을 위해 모든 것을 바쳤으나 정작 폐하께선 자신이 바친 모든 것이 무엇인지도 모르는 실정이오니 대동제의 삶은 한낱 배우가 가면을 쓴 삶에 만족하며 벗는 것을 거부하는 것과도 같습니다. 대동제께서 평생을 꿈꿔오시고 믿어온 유일한 재산은 외로운 삶과 폐하의 것이 아닌 제국뿐입니다. 어쩌면 욕심을 던지고 북경에 거치하는 폐하의 황형이야말로 만귀들의 비웃음과 다르게 진정으로 자신을 직면하고 있는 것일지도 모르옵니다.\n\n"사람은 용모로 취해서는 안되고, 바닷물은 말로 잴 수가 없다."§!"