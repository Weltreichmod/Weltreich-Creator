l_korean:
 manchukou_wr.1.t:0 "춘절 대공세"
 manchukou_wr.1.d:0 "대동 19년 12월로 부터, 민국으로부터 넘어온 도적때가 만몽의 영토를 침범한지 1개월 남짓밖에 지나지 않았지만, 명분이 부족한 출병과, 안산전투에서 치명적인 손실을 입고 후퇴함으로서 불리한 상황에 놓이게 되었습니다. 이는 우리에게 매우 결정적인 기회이며 이 시기를 놓치게 된다면 도적때를 소탕하는데 큰 어려움을 겪게 될 것입니다. 이에 따라 만몽의 지휘관들은 춘철 대공세를 계획했으며 공세 계획에 따라 우리는 동북군과의 모든 전선을 따라 전방위적인 압력을 가할 것입니다."
 manchukou_wr.1.a:0 "돌격!"
 manchukou_wr.2.t:0 "몽골 사태 개입 결정"
 manchukou_wr.2.d:0 "소비에트군이 몽골로 진입한 이후, 국경 일대의 정세가 급속히 불안정해지고 있습니다. 만몽국 정부와 군부는 이번 사태가 단순한 국지적 충돌이 아니라, 만주와 몽골의 안전 보장을 위협하는 중대한 도전이라고 판단하고 있습니다.\n\n관측 보고에 따르면, 소련군은 블류헤르 장군의 독단적 명령 아래 북방 국경선을 넘어 진격을 계속하고 있으며, 그 여파로 지방 정착민과 행정 거점이 심각한 압박을 받고 있다고 합니다.\n\n대동제는 독단적으로 긴급 회의를 소집하여 국경방위군과 기동기병사단을 소집. 전쟁참전을 선포했습니다. 내각과의 충분한 논의 없이 일어진 이 사태에 상당수가 불만을 가진것으로 보입니다.\n\n만몽국의 이번 결정은 지역 정세를 새로운 국면으로 이끌고 있으며, 주변국들은 그 향방을 예의주시하고 있습니다. §R황제의 독단으로 참전한 이 전쟁에서 패배한다면 만몽의 운명은 소용돌이에 휩쓸릴 것입니다.§!"
 manchukou_wr.2.a:0 "북방의 질서를 우리가 지킨다."
 manchukou_wr.3.t:0 "만몽의 상황"
 manchukou_wr.3.d:0 "만주-몽골 정부가 존재하는 궁극적인 목적은 중원으로 진출하여 중국을 재통일하는 것입니다. 이 목표는 만몽국의 존립 이유이자 모든 정책의 기준입니다.\n\n그러나 현재의 현실은 이 목표와 크게 어긋나 있습니다. 국제적 고립으로 외교와 무역이 제한되어 있으며, 무질서한 인구 유입과 민족 간 긴장, 마적과 단련의 난립이 내부 질서를 잠식하고 있습니다. 군대는 수적으로 방대하지만 지휘 체계와 전투력은 분산되어 있고, 귀족 특권은 개혁에 필요한 자원을 소모하고 있습니다.\n\n여기에 더해, 베이징에 잔존한 푸이의 청나라 소조정은 대외적으로나 상징적으로 대청의 정통성을 주장하고 있으며, 이는 만몽국의 통치 정당성을 더욱 불안정하게 만들고 있습니다. 황실의 혈통이 분리된 채 두 조정이 병존하는 상황은 만주-몽골 정부가 스스로를 유일한 계승자로 자리매김하는 데 중대한 장애로 작용하고 있습니다.\n\n중원 통일이라는 목표를 현실로 만들기 위해서는 먼저 국가의 존립과 정통성을 확보해야 합니다. 봉천을 중심으로 권력을 통합하고 내부 혼란을 정리하며 정치적·군사적 기반을 재건하는 것이 우리의 첫 목표가 되어야 할 것입니다."
 manchukou_wr.3.a:0 "할 일이 많다."
 manchukou_wr.4.t:0 "푸제 황제의 신년사"
 manchukou_wr.4.d:0 "건륭 20년의 새해를 맞아, 만주-몽골의 황제 푸제는 국가와 백성 앞에 서서 현 정세에 대한 인식과 앞으로의 방향을 천명하였습니다. 국가는 중원의 중심에서 멀리 떨어져 있으며, 대외적으로는 의심과 고립에 놓여 있고 대내적으로는 혼란과 불안이 누적되어 있습니다.\n\n그러나 황제는 지난 수십 년의 고난이 역사의 종말이 아니라 감내해야 할 시련임을 분명히 하였습니다. 질서를 회복하고 권위를 다시 세우며, 백성을 하나의 목적 아래 결속시키는 것이 지금의 과제임을 강조하였습니다. 이는 인내와 규율, 그리고 통합을 통해서만 달성될 수 있는 일입니다.\n\n이번 신년은 안일을 약속하는 시간이 아니라 준비의 시작으로 선포되었습니다. 앞길은 길고 험난하겠지만, 만주-몽골 국가는 존속하고 스스로를 강화하여 언젠가 남하하여 중국에서의 자리를 되찾아야 한다는 것이 황제의 뜻입니다."
 manchukou_wr.4.a:0 "황제 폐하 만세!"
 manchukou_wr.5.t:0 "12개의 조서"
 manchukou_wr.5.d:0 "푸제는 국가의 이념과 통치 방향을 각료나 관청에 맡기지 않고 스스로 국훈을 반포함으로써, 황제가 직접 국가 운영의 기준에 서 있음을 분명히 하였습니다. 이는 불안정한 국제 환경과 내부 질서의 흔들림 속에서, 통치의 근거를 명령이나 무력보다 규범과 모범에 두고자 하는 선택이었습니다.\n\n12개의 조서는 오족 간의 협화를 바탕으로 한 사회 질서를 강조하고, 농업을 국가 존립의 근간으로 삼아 백성을 풍족하게 할 것을 요구하고 있습니다. 절약과 검소한 생활 태도, 교육의 중시, 헌법과 법률에 대한 존중은 관리와 백성 모두가 따라야 할 기준으로 제시되었습니다. 또한 노동에 힘쓰고 보고와 문서에서 거짓을 배제할 것을 강조하며, 안보와 치안의 중요성, 무역과 금융에서의 신뢰 유지를 국가적 덕목으로 삼고 있습니다. 향촌 간의 균형 있는 발전과 아시아 민족 간의 공영 역시 국가가 지향해야 할 질서로 포함되었습니다.\n\n푸제는 이러한 조서를 통해 자신을 단순한 상징적 군주가 아니라, 강희제와 같은 성군의 전통을 계승하는 통치자로 드러내고자 하였습니다. 황제의 덕과 규범을 앞세운 통치는 대동아주의와 오족협화라는 만몽국의 이상을 일상 행정과 사회 질서 속에 스며들게 하며, 대청의 정통성을 점진적으로 강화하는 기반으로 작용하게 됩니다."
 manchukou_wr.5.a:0 "조서를 받들어 따른다."
 manchukou_wr.6.t:0 "날뛰는 마적"
 manchukou_wr.6.d:0 "여러 지역에서 마적의 활동이 다시금 격화되고 있다는 보고가 올라오고 있습니다. 무장한 도적 무리는 농촌 도로와 장시 인근에 모습을 드러내며 상단을 습격하고 주민들을 위협하고 있습니다. 행정력이 미치지 않는 지역에서는 이들이 공공연히 금품을 갈취하며 교통과 통신을 방해하고 있습니다.\n\n지방 관청과 향촌 조직만으로는 이러한 상황에 대응하기 어려운 상태입니다. 지금 제압하지 못한다면 마적은 농촌 사회에 뿌리를 내리고 세력을 확대하여 일시적인 혼란을 상시적인 위협으로 바꾸게 됩니다. 마적의 확산은 국가가 변경을 통제할 수 없다는 인식을 퍼뜨리며 봉천 이외 지역에서의 권위를 빠르게 약화시키고 있습니다."
 manchukou_wr.6.a:0 "대응이 필요하다."
 manchukou_wr.7.t:0 "1차 마적 토벌대 편성"
 manchukou_wr.7.d:0 "농촌과 변경 전역에서 마적의 활동이 확산됨에 따라, 만주-몽골 정부는 전담 토벌 부대의 편성을 승인하였습니다. 기존 정규군 부대는 헌병과 보조 병력을 포함한 편제로 재편되어, 도시 외곽과 교통로를 장기간 통제할 수 있는 부대로 운용될 예정입니다.\n\n이번 조치는 과거의 단발적인 출동과 달리, 일정 기간 현지에 주둔하며 주요 이동로와 마적의 근거지를 점령하는 방식으로 진행됩니다. 정부는 내부 치안을 우선 과제로 설정하고, 현장 지휘관들에게 보다 넓은 작전 재량을 부여하였습니다.\n\n이 첫 조직적 토벌의 성과는 향후 치안 정책의 방향을 결정하게 되며, 국가가 봉천 이외 지역에까지 지속적인 질서를 확립할 수 있는지를 가늠하는 기준이 될 것입니다.\n\n§R15일 안에 토벌을 완수하지 못한다면 좋지 않은 결과가 뒤따를 것입니다.§!"
 manchukou_wr.7.a:0 "토벌대를 편성한다."
 manchukou_wr.8.t:0 "마적 토벌의 성공"
 manchukou_wr.8.d:0 "현지 보고에 따르면 마적 토벌 작전은 목표를 달성하였습니다. 병력이 일정 기간 주둔하며 주요 거점과 이동로를 장악한 결과, 조직적인 마적 세력은 해체되었고 불안정 지역은 다시 행정의 통제 아래로 편입되고 있습니다.\n\n지도부가 제거되고 보급망이 붕괴되면서 잔존 세력은 흩어졌으며, 더 이상 통일된 위협을 가하지 못하는 상태입니다. 지방 행정은 점차 정상화되고 있으며, 국가가 치안을 회복할 수 있다는 인식이 현지 사회에 확산되고 있습니다. 경계는 여전히 필요하지만, 마적이 초래하던 즉각적인 위기는 일단 진정되었습니다."
 manchukou_wr.8.a:0 "질서가 회복되었다."
 manchukou_wr.9.t:0 "마적 토벌의 실패"
 manchukou_wr.9.d:0 "마적 토벌 작전은 예정된 기간 내에 결정적인 성과를 거두지 못하였습니다. 병력의 밀도와 협조가 부족한 틈을 타 마적 세력은 포위를 피해 험지로 이탈하였고, 기존의 연계망을 유지한 채 세력을 보존하는 데 성공하였습니다.\n\n정부 병력이 철수하거나 분산되자 마적은 다시금 이전 지역으로 복귀하여 약탈과 위협을 재개하였으며, 치안은 빠르게 악화되고 있습니다. 이번 실패는 국가가 변경과 농촌을 완전히 통제하지 못한다는 인식을 확산시키며, 무장 세력에게 장기적인 저항이 가능하다는 신호를 주고 있습니다."
 manchukou_wr.9.a:0 "상황이 악화되고 있다."
 manchukou_wr.10.t:0 "2차 마적 토벌대 편성"
 manchukou_wr.10.d:0 "1차 토벌이 충분한 성과를 거두지 못하면서, 마적 세력은 병력의 공백과 지휘상의 허점을 이용해 다시금 재편되었습니다. 잔존 세력은 농촌과 변경 지역으로 흩어져 활동을 재개하며 치안을 지속적으로 위협하고 있습니다.\n\n이에 따라 만주-몽골 정부는 2차 마적 토벌대의 편성을 승인하였습니다. 이번 토벌대는 이전 작전의 경험을 반영하여 병력 배치와 지휘 체계를 보강하고, 주요 지형과 이동로에 대한 장기 통제를 중시하는 방식으로 운용될 예정입니다.\n\n연이은 대응은 국가가 혼란을 방치하지 않겠다는 의지를 보여주지만, 토벌이 반복적으로 실패할 경우 국가 권위는 더욱 약화되고 마적 문제는 고착될 위험에 직면하게 됩니다."
 manchukou_wr.10.a:0 "다시 토벌에 나선다."
 manchukou_wr.11.t:0 "2차 마적 토벌의 성공"
 manchukou_wr.11.d:0 "2차 마적 토벌은 결정적인 성과를 거두었습니다. 병력의 장기 주둔과 잔여 거점에 대한 집중 통제를 통해, 마적의 조직망과 도주로는 철저히 차단되었습니다.\n\n근거지가 해체되고 이동이 봉쇄되면서, 마적은 더 이상 통일된 세력으로 활동할 수 없게 되었습니다. 지방 행정은 약탈과 협박의 급감을 보고하고 있으며, 농촌 지역은 점차 안정적인 통치 체계로 복귀하고 있습니다. 지속적인 경계는 필요하지만, 마적 문제는 사실상 회복 불가능한 수준까지 약화되었습니다."
 manchukou_wr.11.a:0 "변경의 질서가 확립되었다."
 manchukou_wr.12.t:0 "2차 마적 토벌의 실패"
 manchukou_wr.12.d:0 "2차 마적 토벌은 기대한 만큼의 성과를 거두지 못하였습니다. 압박은 일시적으로 마적의 활동을 위축시켰으나, 지형과 병력 분산의 한계를 이용한 잔존 세력은 소탕을 피해 은신처와 연계망을 유지하고 있습니다.\n\n작전이 장기화되며 부담이 커지는 사이, 일부 지역에서는 마적이 다시 모습을 드러내기 시작했습니다. 이는 추가적인 토벌 없이는 문제를 근본적으로 해결하기 어렵다는 점을 보여주며, 마적 문제가 장기적인 부담으로 남을 가능성을 높이고 있습니다."
 manchukou_wr.12.a:0 "아직 끝나지 않았다."
 manchukou_wr.13.t:0 "3차 마적 토벌대 편성"
 manchukou_wr.13.d:0 "연이은 토벌에도 불구하고, 일부 마적 세력은 험지와 외곽 지역에 은신하며 명맥을 유지하고 있습니다. 이들의 존속은 지금까지 확보한 치안 성과를 잠식할 위험을 내포하고 있습니다.\n\n이에 따라 만주-몽골 정부는 3차 마적 토벌대의 편성을 승인하였습니다. 이번 토벌대는 남은 세력을 완전히 제거하기 위한 최종 조치로서, 병력의 집중 투입과 엄격한 포위, 의심 지역에 대한 장기 통제를 핵심으로 삼고 있습니다. 부담은 극도로 커지고 있지만, 더 이상의 방치는 허용할 수 없다는 판단이 내려졌습니다.\n\n이번 대응의 결과는 변경과 농촌이 영구적으로 안정되는지, 아니면 마적 문제가 장기적인 상수로 남게 되는지를 가르게 될 것입니다."
 manchukou_wr.13.a:0 "이번에 끝을 낸다."
 manchukou_wr.14.t:0 "마적 토벌의 종결"
 manchukou_wr.14.d:0 "3차 마적 토벌은 결정적인 성과와 함께 마무리되었습니다. 병력의 집중 투입과 도주로 봉쇄, 장기 주둔을 통한 압박으로 이전 작전에서 살아남았던 잔존 세력까지 소탕되었습니다.\n\n은신처와 지휘망이 해체되면서 마적은 더 이상 조직적인 형태로 활동할 수 없게 되었습니다. 농촌 치안은 안정 국면에 접어들었고, 교통과 유통망 역시 지속적으로 유지되고 있습니다. 개별 범죄는 완전히 사라지지 않겠지만, 마적이 국가 질서를 위협하는 구조적인 문제로 남아 있지는 않게 되었습니다."
 manchukou_wr.14.a:0 "변경의 위협이 사라졌다."
 manchukou_wr.15.t:0 "마적 문제의 장기화"
 manchukou_wr.15.d:0 "3차 마적 토벌에도 불구하고, 일부 잔존 세력은 끝내 소탕되지 않은 채 명맥을 유지하고 있습니다. 험준한 지형과 장기 작전에 따른 부담은 병력의 압박을 제한하였고, 마적은 완전한 괴멸을 피하는 데 성공하였습니다.\n\n대규모 약탈과 조직적 활동은 줄어들었으나, 무장 집단의 존속은 농촌 치안에 지속적인 불안을 남기고 있습니다. 이 문제는 단기간의 추가 토벌로 해결되기보다는, 시간이 흐르며 점진적으로 약화되는 양상을 보이게 될 것입니다."
 manchukou_wr.15.a:0 "시간이 해결할 것이다."
 manchukou_wr.16.t:0 "마적 토벌의 결과"
 manchukou_wr.16.d:0 "세 차례에 걸친 토벌 끝에 만몽 내 마적 문제는 상당히 축소되었습니다. 그러나 마적이 완전히 토벌되었는지는 이와 다른 문제입니다. 우리는 지난 토벌에서 완전한 성공 또는 실패를 겪었으며 이에 따른 토벌의 결과는..."
 manchukou_wr.16.a:0 "완벽히 성공했다."
 manchukou_wr.16.b:0 "부분적으로만 성공했다."
 manchukou_wr.17.t:0 "고립에서 벗어나기 위한 노력"
 manchukou_wr.17.d:0 "지속되는 국제적 고립이 국가의 장기적인 존립을 위협하고 있다는 인식 아래, 만주-몽골 정부는 대외 접촉을 재개하기 위한 구체적인 움직임에 나섰습니다. 공식적인 승인에는 이르지 못하더라도, 무역과 중개 채널, 제한적인 외교 교류를 통해 외부와의 연결을 복원하고자 하고 있습니다.\n\n이러한 시도는 즉각적인 정통성 확보보다는 안정성과 신뢰를 보여주는 데 초점이 맞추어져 있습니다. 제한된 상업 활동을 정상화하고 접촉을 유지함으로써, 정부는 외교적 선택지를 넓히고 단일 국가에 대한 과도한 의존을 완화하려 하고 있습니다.\n\n성과는 점진적으로 나타나겠지만, 작은 변화라도 경제적 압박을 줄이고 만주-몽골이 더 이상 완전히 고립된 존재가 아니라는 신호를 보내는 데 기여할 것입니다."
 manchukou_wr.17.a:0 "가능한 길을 넓힌다."
 manchukou_wr.18.t:0 "동북초비 기념행사를 앞두고"
 manchukou_wr.18.d:0 "곧 개최될 동북초비 기념행사에는 정샤오쉬 총리가 직접 참석할 예정입니다. 이 행사는 동북군을 격퇴하고 질서를 회복한 사건을 기념하는 중요한 국가 행사로, 수많은 군인과 관료, 시민들이 모일 것으로 예상되고 있습니다.\n\n그러나 최근 정보 기관은 행사와 관련하여 불온한 움직임이 감지되었다는 보고를 올리고 있습니다. 일부 반정부 세력과 잔존 동북군 인물들이 행사 기간 중 혼란을 일으키거나 고위 인사를 노릴 가능성이 제기되고 있습니다.\n\n정샤오쉬 총리는 예정대로 행사에 참석하겠다는 의지를 밝히고 있지만, 경호 인력과 보안 조치를 강화해야 한다는 의견이 내부에서 제기되고 있습니다. 국가적 상징성을 지닌 이 행사에서 어떠한 불상사도 발생해서는 안 됩니다."
 manchukou_wr.18.a:0 "운명이 기다린다..."
 manchukou_wr.19.t:0 "일본 자본의 유입"
 manchukou_wr.19.d:0 "정부가 일본인 투자자 초청을 결정한 이후, 금융과 산업 분야의 일본 자본 관계자들이 만주-몽골 각지의 주요 거점으로 들어오기 시작하였습니다. 공장 설립과 기반시설 건설, 자원 채굴권을 둘러싼 협의가 빠르게 진행되고 있으며, 구체적인 투자 계획들이 현실화 단계에 접어들고 있습니다.\n\n정부로서는 이 자본 유입을 통해 즉각적인 경제적 숨통을 트고, 현재의 국제 환경에서는 얻기 어려운 기술과 경험을 확보할 수 있게 됩니다. 동시에 외국 자본의 영향력이 확대되는 것에 대한 우려와, 장기적인 경제적 종속 가능성을 걱정하는 목소리 또한 조정 내부에서 제기되고 있습니다.\n\n그럼에도 불구하고 당장의 발전과 안정이 우선되어야 한다는 판단이 내려졌습니다. 자율성과 통제에 대한 문제는 남아 있지만, 지금은 경제를 움직이는 것이 더 시급한 과제가 되고 있습니다."
 manchukou_wr.19.a:0 "환영하오!"
 manchukou_wr.20.t:0 "제1차 5개년 계획"
 manchukou_wr.20.d:0 "내부의 대규모 혼란이 일단락되면서, 만주-몽골 정부는 제1차 5개년 계획을 공식적으로 가동하였습니다. 이는 건국 이후 처음으로 임기응변이 아닌 장기적 구상에 따라 경제를 운영하려는 시도입니다.\n\n계획은 산업 확대와 기반시설 건설, 체계적인 자원 개발을 핵심 축으로 삼고 있습니다. 각 부처와 계획 기관들은 중앙의 지침에 따라 목표를 구체적인 사업으로 전환하고, 인력과 자본을 집중 배치하게 됩니다.\n\n그러나 이와 같은 규모의 국가 계획은 현재의 행정 체계에 있어 전례가 없는 도전이기도 합니다. 계획의 성패는 자원의 확보뿐만 아니라, 조정 능력과 지속적인 집행력에 달려 있게 될 것입니다."
 manchukou_wr.20.a:0 "위대한 첫 삽을 뜨다."
 manchukou_wr.21.t:0 "외환 확보 조치"
 manchukou_wr.21.d:0 "만주-몽골 위안화가 본격적으로 유통되면서, 통화 안정의 핵심 과제로 외환 확보 문제가 부상하였습니다. 정부는 무역 결제 구조를 재정비하고, 특정 수출 품목에 대한 통제를 강화하며 외화를 확보하기 위한 조치를 단계적으로 시행하고 있습니다.\n\n일부 산업에서는 외화 결제 비중이 확대되었고, 일본 및 제3국과의 거래를 통해 외환이 점진적으로 유입되고 있습니다. 이러한 조치는 단기간에 가시적인 성과를 내기보다는, 통화 신뢰를 유지하기 위한 기초를 다지는 데 목적을 두고 있습니다."
 manchukou_wr.21.a:0 "차근차근 모아간다."
 manchukou_wr.22.t:0 "외환 확보와 경제 안정"
 manchukou_wr.22.d:0 "지속적인 외환 확보 노력의 결과, 만주-몽골 정부는 일정 수준 이상의 외환 보유를 달성하는 데 성공하였습니다. 이는 통화 유통과 대외 결제에 대한 불안을 완화시키고, 만주-몽골 위안화에 대한 신뢰를 눈에 띄게 개선시키고 있습니다.\n\n환율 변동은 점차 완화되고 있으며, 상인과 금융 기관들은 보다 예측 가능한 환경 속에서 거래를 재개하고 있습니다. 외환 보유의 안정화는 경제 전반에 심리적 안정을 가져오며, 이후의 재정 및 산업 정책을 보다 능동적으로 운용할 수 있는 여지를 제공하고 있습니다."
 manchukou_wr.22.a:0 "안정이 자리잡는다."
 manchukou_wr.23.t:0 "비옥한 만주평야 아래에서"
 manchukou_wr.23.d:0 "비옥한 만주평야 전역에서 생산은 이전과는 다른 안정된 속도로 증가하고 있습니다. 기계화된 농업 아래에서 수확량은 안정되었고, 공장들은 일정한 생산량을 유지하며, 철도는 산업 거점 사이를 원활하게 연결하고 있습니다.\n\n확장된 제철소에서는 철강이 꾸준히 생산되고 있으며, 새로 세워진 작업장들은 활기를 띠고 있습니다. 자원 채굴은 산업의 수요를 뒷받침하고 있으며, 물자 부족으로 인한 제약은 점차 완화되고 있습니다.\n\n이 시기는 급격한 변화가 아니라 지속적인 성장의 단계로 특징지어지고 있습니다. 생산은 확대되고 기반시설은 이를 지탱하며, 물질적 번영의 토대가 안정적으로 형성되고 있습니다."
 manchukou_wr.23.a:0 "풍요는 밭과 공장에서 시작된다."
 manchukou_wr.24.t:0 "초목구후"
 manchukou_wr.24.d:0 "하얼빈에서 묵던으로 향하던 총리 정샤오쉬의 열차는 평소와 다름없이 남하하고 있었습니다. 그러나 창춘 인근 선로에 이르렀을 때, 갑작스러운 폭발이 선로 아래에서 터져 나왔습니다.\n\n폭발로 선로가 파괴되며 열차가 탈선했고, 객차 여러 칸이 뒤집히며 연기가 치솟았습니다. 경호 병력과 생존자들이 잔해 속에서 사람들을 구조하려 했지만, 총리가 탑승한 객차는 이미 완전히 파괴된 상태였습니다.\n\n동북초비 기념행사로 향하던 여정은 그 자리에서 끝나고 말았습니다."
 manchukou_wr.24.a:0 "선로 아래에 죽음이 숨겨져 있었다."
 manchukou_wr.25.t:0 "초목구후"
 manchukou_wr.25.d:0 "묵던역에 도착한 총리 정샤오쉬는 경호 차량에 올라 서탑으로 향하고 있었습니다. 거리에는 기념행사를 보기 위해 모인 시민들이 줄지어 서 있었고 차량 행렬은 천천히 도로를 지나가고 있었습니다.\n\n그러나 서탑 인근 도로에 이르렀을 때 군중 속 어딘가에서 총성이 울렸습니다. 총리는 차량 안에서 피격되어 쓰러졌고 경호 병력이 즉시 주변을 봉쇄했지만 이미 치명적인 상처를 입은 뒤였습니다.\n\n행렬은 곧바로 멈추었고 기념행사는 시작도 하지 못한 채 침묵 속에 중단되었습니다."
 manchukou_wr.25.a:0 "군중 속에서 총성이 울렸다."
 manchukou_wr.26.t:0 "초목구후"
 manchukou_wr.26.d:0 "묵던 서탑 광장에는 동북초비 기념행사를 보기 위해 수많은 군인과 시민들이 모여 있었습니다. 연단에 오른 총리 정샤오쉬는 동북의 안정을 기념하며 연설을 이어가고 있었습니다.\n\n그러나 연설이 한창이던 순간 광장 어딘가에서 총성이 울렸습니다. 총리는 연단 위에서 피격되어 그대로 쓰러졌고 군중 사이에는 순식간에 혼란이 퍼졌습니다.\n\n경호 병력이 연단을 둘러싸며 상황을 통제하려 했지만 이미 늦었습니다. 기념행사는 그 자리에서 끝나고 말았습니다."
 manchukou_wr.26.a:0 "연단 위에서 모든 것이 끝났다."
 manchukou_wr.27.t:0 "고목생화"
 manchukou_wr.27.d1:0 "동북초비 기념행사를 앞두고 정보 기관과 경호 부대는 철도 구간과 차량 이동 경로, 서탑 행사장 일대에 대한 대대적인 보안 점검을 실시하였습니다.\n\n하얼빈에서 묵던으로 이어지는 철도는 반복적으로 수색되었고, 주요 역과 환승 지점에는 검문 인력이 증원되었습니다. 묵던역에서 서탑으로 향하는 도로에도 경호 병력과 사복 요원들이 배치되었으며, 행사장 주변의 출입자와 군중에 대한 감시 역시 평소와 비교할 수 없을 정도로 강화되었습니다.\n\n그 결과 행사 개시를 불과 얼마 남겨두지 않은 시점에서, 총리를 노린 암살 음모가 사전에 적발되었습니다. 체포된 용의자는 협화회 소속 인물로 확인되었으며, 무기와 잠입 경로, 접선 흔적까지 현장에서 확보되었습니다. 보안 기관은 그가 행사장에 접근하기 전에 신병을 확보하는 데 성공하였고, 계획은 실행 직전에 무너졌습니다.\n\n총리 정샤오쉬는 예정대로 연단에 올라 연설을 마쳤으며, 기념행사는 큰 혼란 없이 끝났습니다. 오늘의 무사는 우연이 아니라 철저한 대비가 만들어낸 결과였습니다."
 manchukou_wr.27.d2:0 "동북초비 기념행사를 앞두고 여러 차례의 경고와 우려가 제기되었지만, 실제로는 그 어떠한 체계적인 대비도 이루어지지 못한 채 행사가 진행되었습니다.\n\n철도 구간은 형식적인 확인만 거쳤고, 차량 이동 경로에도 별다른 통제가 없었으며, 서탑 행사장 경비 역시 평시 수준에 머물러 있었습니다. 행사장에는 수많은 군인과 시민들이 뒤섞여 있었지만, 군중 속을 세밀하게 살피는 체계는 사실상 존재하지 않았습니다.\n\n그리고 연설 도중, 군중 속에 숨어 있던 협화회 소속 암살범이 권총을 꺼내 총리를 향해 발포하였습니다. 총성은 광장 전체를 얼어붙게 만들었고, 날아든 총탄은 총리의 몸을 스치듯 지나가며 빗나갔습니다. 그 순간 주변에 있던 병사들과 수행 인원들이 즉시 범인에게 달려들었고, 암살범은 현장에서 총을 든 채 곧바로 제압되었습니다.\n\n아무런 준비가 없었음에도 총리는 살아남았고, 암살범은 현행범으로 체포되었습니다. 오늘의 결과는 경호의 성과가 아니라, 설명하기 어려운 천운과 현장의 즉각적인 몸싸움이 겨우 만들어낸 생존이었습니다."
 manchukou_wr.27.a:0 "위기는 지나갔다."
 manchukou_wr.27.b:0 "행운아가 따로없군!"
 manchukou_wr.28.t:0 "내각 개편 논의"
 manchukou_wr.28.d1:0 "동북초비 기념행사 이후, 만주-몽골 정부 내부에서는 국가 운영 체계를 정비해야 한다는 의견이 빠르게 확산되고 있습니다. 동북군의 침공 위기와 그 이후의 혼란은 기존 귀족 중심 행정 구조가 더 이상 국가를 안정적으로 이끌기 어렵다는 사실을 드러냈습니다.\n\n정샤오쉬와 입헌파 원로들은 헌법을 기초로 보다 체계적인 정부 구조를 정비하고, 행정과 군정 전반에 걸친 개편을 추진해야 한다고 주장하고 있습니다. 협화회 역시 일정한 영향력을 유지하는 조건 아래 이러한 논의에 협력하고 있습니다.\n\n황제 푸제 역시 국가의 안정과 현대화를 위해 새로운 내각 구성을 검토하기 시작했습니다."
 manchukou_wr.28.d2:0 "정샤오쉬 총리의 암살은 만주-몽골 정부의 권력 구조를 크게 흔들어 놓았습니다. 그를 중심으로 결집되어 있던 입헌파는 지도력을 잃고 빠르게 분열하기 시작했으며, 원로 귀족들과 관료들 사이에서도 향후 정국을 둘러싼 논쟁이 격화되고 있습니다.\n\n이 혼란 속에서 협화회는 행정과 군사 분야에서 자신들이 보여준 역할을 강조하며 점차 영향력을 확대하고 있습니다. 특히 일부 입헌파 인물들이 협화회와 협력하는 방향으로 움직이면서 새로운 정치 구도가 형성되기 시작했습니다.\n\n황제 푸제는 이러한 상황 속에서 새로운 내각 구성을 검토하기 시작했습니다."
 manchukou_wr.28.a:0 "새로운 내각이 필요하다."
 manchukou_wr.29.t:0 "입헌파의 개각 추진"
 manchukou_wr.29.d:0 "정샤오쉬는 동북군 사태 이후 국가 체제를 정비해야 한다는 판단 아래 내각 개편을 본격적으로 추진하기 시작했습니다. 그는 헌법을 중심으로 행정 구조를 정리하고, 귀족 중심의 전통적 권력 구조를 일정 부분 제도화된 정부 체계로 전환하려 하고 있습니다.\n\n입헌파 원로들은 이를 통해 정부 운영을 보다 안정적인 형태로 만들고, 장기적으로는 국가 현대화를 추진할 기반을 마련하려 하고 있습니다. 황제 푸제 역시 이러한 방향에 대해 조심스러운 지지를 보이고 있습니다."
 manchukou_wr.29.a:0 "개혁을 시작하자."
 manchukou_wr.30.t:0 "협화회의 참여"
 manchukou_wr.30.d:0 "내각 개편 논의가 진행되는 가운데 협화회 인사들 역시 정부 개편 과정에 참여하기 시작했습니다. 동북군 위기 속에서 협화회가 보여준 군사적 능력과 조직력은 만몽 내부에서도 일정한 평가를 받고 있습니다.\n\n정샤오쉬와 입헌파 원로들은 협화회를 완전히 배제하기보다는 일정한 범위 안에서 협력 관계를 유지하는 것이 현실적인 선택이라고 판단하고 있습니다. 이에 따라 일부 협화회 인사들이 새 내각에 참여하게 될 가능성이 높아지고 있습니다."
 manchukou_wr.30.a:0 "협력은 필요하다."
 manchukou_wr.31.t:0 "정샤오쉬 내각의 완성"
 manchukou_wr.31.d:0 "긴 논의 끝에 새로운 내각 구성이 마침내 완성되었습니다. 정샤오쉬는 입헌파 원로들을 중심으로 정부 구조를 재편하면서도 협화회 인사 일부를 포함시키는 절충적인 구성을 선택했습니다.\n\n새 내각은 헌법을 행정 운영의 기준으로 삼으며, 귀족 세력과 협화회, 입헌파 사이의 균형 속에서 국가 운영을 이어가게 될 것입니다.\n\n완전한 개혁은 아니지만, 이는 만주-몽골 정부가 보다 안정적인 통치 체제로 나아가기 위한 첫 단계가 되었습니다."
 manchukou_wr.31.a:0 "새로운 정부가 출범했다."
 manchukou_wr.32.t:0 "분열된 원로회"
 manchukou_wr.32.d:0 "정샤오쉬의 죽음 이후 원로회 내부에서는 격렬한 논쟁이 벌어지고 있습니다. 일부 귀족 원로들은 기존 질서를 유지해야 한다고 주장하고 있으며, 다른 이들은 동북군 사태가 보여준 한계를 인정하고 새로운 정치 구성을 받아들여야 한다고 말하고 있습니다.\n\n입헌파 역시 지도력을 잃은 상태에서 여러 파벌로 갈라지기 시작했습니다. 이러한 혼란은 정부의 권력 구조를 불안정하게 만들고 있습니다."
 manchukou_wr.32.a:0 "혼란이 시작되었다."
 manchukou_wr.33.t:0 "협화회의 영향력 확대"
 manchukou_wr.33.d:0 "정국이 혼란에 빠진 사이 협화회는 빠르게 영향력을 확대하고 있습니다. 원로회가 분열된 틈을 타 행정 기관과 군사 조직에서 협화회 인사들이 차지하는 비중이 점차 늘어나고 있으며, 일부 입헌파 인물들 역시 협화회와 협력하는 방향으로 움직이고 있습니다.\n\n특히 이시와라 간지를 중심으로 한 대동아주의자들은 국가가 보다 강력하고 급진적인 방향으로 재편되어야 한다고 주장하고 있습니다."
 manchukou_wr.33.a:0 "그들의 힘이 커지고 있다."
 manchukou_wr.34.t:0 "이시와라 간지의 총리 임명"
 manchukou_wr.34.d:0 "정치적 혼란이 계속되는 가운데 협화회와 일부 입헌파 인사들은 국가 위기를 수습하기 위해 보다 강력한 지도력이 필요하다고 주장하기 시작했습니다.\n\n동북군 사태 당시 행정과 군사 분야에서 협화회가 보여준 조직력은 이러한 주장에 힘을 실어주고 있습니다. 결국 황제 푸제는 국가 질서 회복과 정부 운영의 안정화를 명분으로 정샤오쉬의 뒤를 이어 이시와라 간지를 새로운 총리로 임명하기로 결정했습니다.\n\n새 내각은 협화회 인사들을 중심으로 구성되며 만주-몽골 정부의 정치 구조 역시 새로운 단계로 접어들게 되었습니다."
 manchukou_wr.34.a:0 "새 총리가 임명되었다."
 manchukou_wr.35.t:0 "궁정대신 권한 확대"
 manchukou_wr.35.d:0 "최근 조정 내부에서는 국가 행정의 조정 능력을 강화해야 한다는 의견이 점차 힘을 얻고 있습니다. 여러 부처와 권력 집단이 서로 다른 이해관계를 주장하면서 정책 집행 과정에서 혼선이 발생하는 일이 반복되고 있기 때문입니다.\n\n이에 따라 궁정대신에게 보다 명확한 권한을 부여하여 각 부처의 업무를 조정하고 행정 결정을 통합적으로 관리하도록 하는 방안이 제기되었습니다. 이러한 조치는 단순히 한 직위의 권한을 강화하는 문제가 아니라 국가 행정 체계를 보다 안정적으로 정비하려는 시도이기도 합니다.\n\n궁정대신이 조정 전반을 조율하는 중심 역할을 맡게 된다면 정책 집행의 속도와 일관성이 크게 향상될 것으로 기대되고 있습니다."
 manchukou_wr.35.a:0 "권한을 확대하라."
 manchukou_wr.36.t:0 "우리의 방식으로"
 manchukou_wr.36.d:0 "조정 내부에서는 국가 개혁의 방향을 둘러싼 논의가 이어지고 있습니다. 일부 인사들은 서방의 제도를 그대로 받아들여야 한다고 주장하지만, 다른 이들은 그러한 방식이 만주-몽골의 정치적 현실과 전통을 무너뜨릴 수 있다고 우려하고 있습니다.\n\n결국 개혁의 방향은 동도서기라는 원칙 위에서 정리되었습니다. 서방의 제도와 기술을 참고하되 국가의 정치적 기반과 문화적 기치는 동아시아적 전통 위에 두겠다는 것입니다.\n\n조정은 이러한 방침 아래 국가 선전을 유교적 가치에 맞추어 정비하고, 과거 제도의 연장선에 있는 고시 제도를 확대하여 관료 선발 체계를 정비하려 하고 있습니다. 전통을 버리지 않으면서도 제도적 개혁을 추진하려는 시도가 시작되고 있습니다."
 manchukou_wr.36.a:0 "우리에게 맞는 길이다."
 manchukou_wr.37.t:0 "중체서용"
 manchukou_wr.37.d:0 "조정에서는 과거 청나라가 추진했던 양무운동의 경험을 다시 검토하고 있습니다. 당시 개혁은 서양식 무기와 기술을 도입하는 데에는 성공했지만, 교육과 제도 개혁이 뒤따르지 못하면서 결국 국가 전반의 변화로 이어지지 못했습니다.\n\n이러한 실패를 교훈으로 삼아 만주-몽골 정부는 보다 근본적인 방식으로 서양의 기술과 지식을 받아들이려 하고 있습니다. 중국적 정치 질서와 국가 체제를 유지하되, 교육과 학문 분야에서는 서양식 제도를 적극적으로 도입하려는 것입니다.\n\n서양식 대학의 설립과 외국 교수 초빙, 유학생 제도 확대가 추진되고 있으며 이를 통해 기술과 학문을 체계적으로 흡수하려는 계획이 진행되고 있습니다."
 manchukou_wr.37.a:0 "기술은 배워야 한다."
 manchukou_wr.38.t:0 "왕도낙토"
 manchukou_wr.38.d:0 "협화회가 제시해 온 국가 구상은 오래전부터 '왕도낙토'라는 이름으로 정리되어 왔습니다. 이는 만주-몽골을 단순한 청나라의 계승국으로만 만드는 것을 넘어, 오족협화의 원칙 아래 여러 민족이 공존하는 새로운 국가 질서를 구축한다는 정치적 이상입니다.\n\n왕도라는 말은 무력에 의존한 지배가 아니라 도덕과 질서에 기반한 통치를 의미하며, 낙토는 그러한 질서 속에서 안정된 사회를 가리킵니다. 협화회는 이러한 개념을 국가 운영의 중심 원리로 삼아 행정과 사회 정책 전반을 재정비하려 하고 있습니다.\n\n만주는 이제 단순한 변방이 아니라 왕도의 이상을 실현하는 국가로 규정되고 있습니다."
 manchukou_wr.38.a:0 "왕도낙토를 실현한다."
 manchukou_wr.39.t:0 "신헌법"
 manchukou_wr.39.d:0 "협화회가 구상하는 국가 질서를 보다 명확히 하기 위해 새로운 헌법 정비가 추진되고 있습니다. 지금까지의 행정 체계는 여러 정치 세력의 이해관계 속에서 형성된 임시적인 구조에 가까웠으며 국가의 이념과 통치 원칙을 명확히 규정하지 못하고 있었습니다.\n\n새로운 헌법은 오족협화와 왕도정치라는 원칙을 국가의 제도 속에 명확히 반영하는 것을 목표로 하고 있습니다. 이를 통해 황제와 정부, 행정 기관 사이의 권한을 재정비하고 국가가 지향하는 정치 질서를 제도적으로 정착시키려는 것입니다.\n\n이 헌법은 단순한 법률 문서를 넘어 협화회가 구상하는 국가 체제를 공식화하는 기초가 되고 있습니다."
 manchukou_wr.39.a:0 "새 질서를 세운다."
 manchukou_wr.40.t:0 "대동아의 미래 선전"
 manchukou_wr.40.d:0 "협화회는 만주-몽골을 장차 등장할 대동아주의를 이루기 위한 위대한 업을 지고있는 국가로 묘사하고 있습니다. 대동아라는 개념은 아시아 민족들이 서로 협력하고 공존하는 새로운 국제 질서를 제시하는 정치적 구상으로 설명되고 있습니다.\n\n국가 선전 기관과 정치 조직들은 이러한 비전을 적극적으로 확산시키며 만주-몽골이 동아시아의 미래를 준비하는 중심지라는 이미지를 만들어가고 있습니다. 학교 교육과 언론, 각종 정치 조직을 통해 대동아주의가 국가의 장기적 목표로 제시되고 있습니다.\n\n이러한 선전은 협화회가 구상하는 국제 질서를 국민들에게 이해시키는 중요한 수단이 되고 있습니다."
 manchukou_wr.40.a:0 "아시아는 하나가 되어야 한다."
 manchukou_wr.41.t:0 "새로운 천지의 새로운 만주"
 manchukou_wr.41.d:0 "협화회가 구상하는 국가 건설은 단순한 행정 개혁에 그치지 않습니다. 만주를 새로운 정치 질서의 중심지로 재편하여 전혀 다른 형태의 국가를 만들어가려는 구상이 함께 제시되고 있습니다.\n\n행정 제도와 경제 구조, 사회 조직에 이르기까지 국가 전반을 재정비하여 완전히 새로운 체제를 구축하려는 계획이 추진되고 있습니다. 이러한 변화는 만주를 과거 제국의 변방이 아니라 새로운 시대의 중심지로 만들려는 시도와 연결되고 있습니다.\n\n협화회는 이를 '새로운 천지의 새로운 만주'라는 구호로 설명하고 있습니다."
 manchukou_wr.41.a:0 "새로운 시대를 열자."
 manchukou_wr.42.t:0 "대동아주의 재천명"
 manchukou_wr.42.d:0 "동아시아의 국제 질서는 오랫동안 서구 열강의 압력 속에서 형성되어 왔습니다. 아시아의 여러 민족들은 서로 다른 길을 걸어왔지만 외부의 간섭 속에서 공통된 도전에 직면해 왔습니다.\n\n정부는 이러한 시대적 상황 속에서 범아시아적 협력의 원칙을 다시 한 번 강조하려 하고 있습니다. 만몽은 아시아 민족 간의 협력과 공존을 새로운 지역 질서의 기반으로 제시하고 있으며, 동아시아의 미래는 외부 세력의 지배가 아니라 아시아 국가들 스스로의 협력 속에서 형성되어야 한다는 입장을 천명하였습니다.\n\n이러한 구상은 만몽이 새로운 지역 질서 속에서 수행하려는 역할과도 깊이 연결되어 있습니다."
 manchukou_wr.42.a:0 "아시아는 하나다."
 manchukou_wr.43.t:0 "오족협화의 법제화"
 manchukou_wr.43.d:0 "만주와 몽골의 사회는 다양한 민족이 함께 살아가는 공간입니다. 만주인과 몽골인, 한인과 조선인, 그리고 일본인을 포함한 여러 공동체는 오랫동안 서로 다른 역사와 전통 속에서 공존해 왔습니다.\n\n정부는 이러한 현실을 인정하고 민족 간 협력을 국가 질서의 기본 원칙으로 규정하려 하고 있습니다. 새로운 법률은 민족적 차별을 금지하고 모든 주민에게 동일한 법적 보호를 적용하도록 규정하고 있습니다. 이는 단순한 선언이 아니라 행정과 사법 체계 전반에 적용되는 국가 원칙으로 자리 잡게 될 것입니다.\n\n이러한 조치는 다양한 민족이 공존하는 국가의 안정성을 확보하고 공동의 번영을 위한 기반을 마련하려는 움직임입니다."
 manchukou_wr.43.a:0 "오족은 하나의 국가를 이룬다."
 manchukou_wr.44.t:0 "동쪽으로 향하는 사람들"
 manchukou_wr.44.d:0 "유럽에서의 정치적 격변과 박해는 수많은 유대인 공동체를 새로운 삶의 터전으로 떠나게 만들고 있습니다. 일부 지도자들과 기업가들은 이미 동아시아로 눈을 돌리고 있으며, 특히 하얼빈과 만주 지역은 비교적 안정된 환경과 경제적 기회를 제공할 수 있는 곳으로 여겨지고 있습니다.\n\n정부가 제시한 정착 정책과 경제 개발 계획은 이들에게 새로운 가능성을 제시하고 있습니다. 상인과 기술자, 금융가와 지식인들이 점차 이 지역으로 이동하고 있으며, 일부는 만몽의 경제와 산업 발전에 중요한 역할을 할 수 있을 것으로 기대되고 있습니다.\n\n이 새로운 공동체가 만몽 사회 속에서 어떤 위치를 차지하게 될지는 아직 알 수 없지만, 하얼빈의 거리는 점차 새로운 언어와 문화로 채워지고 있습니다."
 manchukou_wr.44.a:0 "환영하오!"
 manchukou_wr.45.t:0 "북방에서 전해진 승리"
 manchukou_wr.45.d:0 "몽골 초원에서 이어진 전투가 마침내 끝을 맺었습니다. 국경 방위군과 기동기병사단은 혹독한 전투 속에서도 전선을 유지하며 소련군의 공세를 저지하는 데 성공했습니다. 북방 국경은 다시 안정되었고 적군은 후퇴하기 시작했습니다.\n\n이번 전투는 단순한 국경 충돌 이상의 의미를 지니고 있습니다. 많은 이들이 황제가 내각과 충분한 논의 없이 전쟁에 뛰어든 결정을 위험한 모험으로 여겼지만, 결과적으로 군대는 그 도박을 승리로 바꾸어 놓았습니다.\n\n이 승리는 만몽국이 스스로의 힘으로 국경을 지킬 수 있는 국가임을 보여주었으며 군대의 사기와 국가의 권위를 크게 높였습니다. 그러나 동시에 많은 이들은 이번 사태가 얼마나 위험한 선택이었는지 잊지 않고 있습니다."
 manchukou_wr.45.a:0 "국경은 지켜졌다."
 manchukou_wr.46.t:0 "지난날의 교훈"
 manchukou_wr.46.d:0 "청 제국의 몰락은 단순한 한 왕조의 종말이 아니라 국가 체제 전체가 안고 있던 문제들이 드러난 사건이었습니다. 행정의 부패와 군제의 낙후, 그리고 변화하는 세계 질서에 대응하지 못한 정치 구조는 결국 제국을 무너뜨리는 결과를 가져왔습니다.\n\n오늘날 만몽국의 지도자들은 이러한 역사를 다시 돌아보고 있습니다. 과거의 실패를 단순한 비극으로 남겨둘 것인지, 아니면 새로운 국가를 건설하기 위한 교훈으로 삼을 것인지가 지금의 정치적 과제가 되고 있습니다.\n\n많은 이들은 이제 국가가 과거의 오류를 반복하지 않기 위해 보다 강력하고 체계적인 개혁을 추진해야 한다고 주장하고 있습니다."
 manchukou_wr.46.a:0 "역사는 잊지 않는다."
 manchukou_wr.47.t:0 "대동유신"
 manchukou_wr.47.d:0 "청 제국이 무너진 이후 동아시아의 정치 질서는 급격히 변화했습니다. 수 세기 동안 유지되어 온 제국의 행정 체계와 군사 조직, 그리고 사회 질서는 더 이상 시대의 요구에 부응하지 못했습니다. 외부 세계는 빠르게 변화하고 있었지만 제국의 제도는 그 변화에 충분히 대응하지 못했고, 결국 그 결과는 제국의 몰락으로 이어졌습니다.\n\n오늘날 만몽국의 지도자들은 이러한 과거의 실패를 단순한 역사적 비극으로 남겨두지 않으려 하고 있습니다. 국가의 행정 체계와 군사 조직, 경제 구조를 다시 정비하고 새로운 시대에 맞는 정치 질서를 구축하려는 움직임이 나타나고 있습니다. 전통적인 황권의 권위를 유지하면서도 국가 운영을 보다 체계적이고 효율적인 제도 위에 올려놓으려는 시도가 이어지고 있습니다.\n\n이러한 변화는 단순한 개혁 정책을 넘어 국가의 방향 자체를 새롭게 정립하려는 움직임으로 받아들여지고 있습니다. 많은 이들은 이 시대를 '대동유신'이라 부르기 시작했습니다. 과거의 실패를 교훈으로 삼아 새로운 국가 질서를 구축하려는 거대한 변화가 이제 시작되고 있습니다."
 manchukou_wr.47.a:0 "황제 폐하 만세!"
 manchukou_wr.48.t:0 "묵던 개선식"
 manchukou_wr.48.d:0 "묵던의 거리에는 수많은 사람들이 모여들었습니다. 군대는 정연한 대열을 이루어 성문을 지나고 있었으며, 시민들은 길 양쪽에 서서 그들을 맞이하고 있습니다.\n\n황제 폐하 역시 직접 모습을 드러내어 군대를 맞이하였고, 장군들과 병사들은 황제 앞에서 경례를 올렸습니다. 북방에서 벌어진 전쟁의 결과는 이제 단순한 군사적 승리를 넘어 국가의 권위와 정통성을 다시 확인하는 사건으로 받아들여지고 있습니다.\n\n많은 사람들은 이러한 승리를 두고 하늘의 뜻이 다시 국가 위에 내려온 것이라 이야기하고 있습니다. 묵던의 조정은 이제 스스로의 권위를 다시 한 번 증명했다고 믿고 있습니다."
 manchukou_wr.48.a:0 "황제폐하 만세!"
 manchukou_wr.49.t:0 "대동국 총리로 부터 온 서신"
 manchukou_wr.49.d:0 "대동국 총리 이시와라 간지로부터 중화민국 정부에 전합니다.\n\n동아시아의 장래는 지금 중대한 갈림길에 서 있습니다. 제국주의 열강의 압력과 세계 정세의 격변 속에서 아시아의 여러 민족이 서로 대립하고 분열한다면, 그 피해는 결국 우리 모두에게 돌아올 것입니다. 이러한 시대에 아시아 민족들이 상호 불신과 충돌을 계속하는 것은 결코 현명한 길이 아닙니다.\n\n나는 오래전부터 동아시아의 운명이 단순한 국경 분쟁이나 일시적인 이해관계를 넘어서는 문제라고 보아 왔습니다. 인류 역사의 흐름 속에서 결국 세계는 거대한 최종적인 대립과 결전을 향해 나아가게 될 것이며, 그 과정에서 아시아가 하나의 공동 운명을 지닌 문명권으로서 단결하지 않는다면 외부 세력의 지배와 분열을 피하기 어려울 것입니다.\n\n따라서 대동국 정부는 중국과의 대립이나 경쟁을 바라지 않습니다. 오히려 동양의 두 국가가 상호 존중과 신뢰를 바탕으로 협력한다면, 동아시아 전체의 안정과 번영을 위한 새로운 질서를 세울 수 있을 것입니다. 우리는 정치적 독립과 상호 주권을 존중하는 가운데, 우호 관계를 수립하고 보다 긴밀한 협력을 모색하기를 희망합니다.\n\n이에 대동국 정부는 중화민국 정부와의 공식적인 친선 관계 수립과 동맹 협정을 위한 협의를 제안합니다. 이는 특정 국가를 겨냥한 적대적 행위가 아니라, 아시아의 자주성과 평화를 지키기 위한 공동의 노력입니다. 아시아의 미래는 아시아인 스스로가 결정해야 합니다. 귀국 정부의 현명한 판단과 긍정적인 회신을 기대합니다.\n\n대동국 총리\n\n이시와라 간지"
 manchukou_wr.49.a:0 "미친놈들."
 manchukou_wr.50.t:0 "봉록 제도 정비"
 manchukou_wr.50.d:0 "국가 재정을 둘러싼 논의 속에서 귀족에게 지급되는 봉록 제도가 다시 검토되고 있습니다. 봉록은 오랫동안 청나라와 몽골 귀족들의 지위를 유지하는 핵심 수단이었으나, 현대 국가 운영을 위해서는 재정 지출의 구조를 재조정해야 한다는 의견이 점차 힘을 얻고 있습니다.\n\n정부는 신해혁명 직후 논의되었던 헌법에 관한 19대신의 조항을 근거로 삼아 귀족 특권을 헌정 질서 안에서 단계적으로 조정하려 하고 있습니다. 봉록 감축은 그 첫 번째 조치로 제시되었으며, 이를 통해 국가 재정을 보다 체계적으로 운용하려는 시도가 시작되고 있습니다."
 manchukou_wr.50.a:0 "재정 개혁을 시작한다."
 manchukou_wr.51.t:0 "귀족 기지 정비"
 manchukou_wr.51.d:0 "귀족들에게 내려졌던 기지는 오랫동안 독자적인 권력 기반으로 기능해 왔습니다. 이러한 토지 특권은 지역 행정과 국가 권력이 충돌하는 원인이 되기도 했습니다.\n\n정부는 토지 관리 체계를 보다 현대적인 행정 질서 안으로 편입시키기 위해 기지 제도의 정비를 추진하기 시작했습니다. 귀족들의 반발이 예상되지만, 헌법 질서를 강조하는 개혁 세력은 이러한 조치가 국가 통치 구조를 안정시키는 데 필요하다고 주장하고 있습니다."
 manchukou_wr.51.a:0 "토지 제도를 정비한다."
 manchukou_wr.52.t:0 "월향 제도 폐지"
 manchukou_wr.52.d:0 "귀족들에게 제공되어 온 곡물 지급 제도인 월향은 전통적인 특권 체계의 상징으로 여겨져 왔습니다. 그러나 산업과 도시가 성장하는 현대 경제 구조 속에서 이러한 제도는 점차 비효율적인 지출로 평가되고 있습니다.\n\n정부는 식량 공급 체계를 국가 행정 체계로 통합하기 위해 월향 제도의 폐지를 검토하고 있습니다. 일부 귀족들은 이를 오래된 질서를 훼손하는 조치로 보고 있으나, 개혁 세력은 이러한 변화가 국가 재정과 행정 체계를 정비하는 데 필수적이라고 주장하고 있습니다."
 manchukou_wr.52.a:0 "곡물 지급을 중단한다."
 manchukou_wr.53.t:0 "맹기제 권한 제한"
 manchukou_wr.53.d:0 "몽골 귀족들은 오랫동안 맹기제 아래에서 영주로서 백성들을 부역에 동원할 권한을 행사해 왔습니다. 이러한 권한은 지방 통치의 핵심 요소였지만, 국가 행정 체계와 충돌하는 경우도 적지 않았습니다.\n\n정부는 지방 행정 권한을 중앙 정부 체계로 통합하기 위해 맹기제의 일부 권한을 제한하는 조치를 추진하기 시작했습니다. 이는 전통적인 권력 구조를 재조정하려는 시도로 받아들여지고 있습니다."
 manchukou_wr.53.a:0 "지방 권력을 제한한다."
 manchukou_wr.54.t:0 "관료 임용 제도 개혁"
 manchukou_wr.54.d:0 "만한병용제는 오랫동안 관직 임명에 민족적 할당을 적용하는 제도로 유지되어 왔습니다. 이 제도는 역사적 질서를 유지하는 역할을 했지만, 현대 행정 체계와 충돌하는 문제도 나타나고 있습니다.\n\n정부는 보다 효율적인 관료 체계를 구축하기 위해 임용 제도를 재검토하고 있으며, 능력과 행정 경험을 기준으로 한 임명 체계를 점진적으로 확대하려 하고 있습니다."
 manchukou_wr.54.a:0 "관료 제도를 개혁한다."
 manchukou_wr.55.t:0 "귀족 의회 특권 조정"
 manchukou_wr.55.d:0 "귀족 세력은 의회에서 상당한 영향력을 유지해 왔습니다. 그러나 정치 체계가 점차 헌정 질서에 기반한 구조로 이동하면서 이러한 특권 역시 재조정의 대상이 되고 있습니다.\n\n정부는 의회의 기능을 보다 균형 잡힌 구조로 만들기 위해 귀족 세력의 발언권과 정치적 영향력을 제한하는 방안을 논의하고 있습니다."
 manchukou_wr.55.a:0 "의회 권한을 재조정한다."
 manchukou_wr.56.t:0 "추밀 기구 개편"
 manchukou_wr.56.d:0 "귀족 중심 자문 기관들은 오랫동안 국가 정책 결정에 큰 영향을 행사해 왔습니다. 그러나 이러한 기구들은 행정부와 중복되는 권한을 가지며 행정 효율성을 저해한다는 비판을 받고 있습니다.\n\n정부는 추밀 기구의 권한을 행정부 체계 안으로 재편하여 국가 정책 결정 과정을 보다 명확한 구조로 정리하려 하고 있습니다."
 manchukou_wr.56.a:0 "행정 구조를 정비한다."
 manchukou_wr.57.t:0 "귀족 사병 통합"
 manchukou_wr.57.d:0 "귀족 영지에서 유지되는 사병 조직은 오랫동안 지역 질서를 유지하는 역할을 해 왔습니다. 그러나 이러한 병력은 중앙 군사 체계와 분리되어 있으며 국가 통제에서 벗어난 경우도 있었습니다.\n\n정부는 이러한 병력을 국가 군대 안으로 편입시키는 방안을 추진하고 있으며, 이를 통해 군사 체계를 보다 통합된 구조로 만들려 하고 있습니다."
 manchukou_wr.57.a:0 "군대를 통합한다."
 manchukou_wr.58.t:0 "거부된 제안"
 manchukou_wr.58.d:0 "[FROM.GetName] 정부로부터 답신이 도착했습니다. 그러나 그 내용은 우리가 기대했던 것과는 전혀 달랐습니다.\n\n대동국 정부가 제안했던 친선 관계와 협력 구상은 전면적으로 거부되었으며, 그들은 우리의 제안을 현실성이 없는 공상에 불과하다고 평가했습니다. [FROM.GetName] 정부는 동아시아의 질서를 논의할 권한이 묵던의 조정에게 있다고 보지 않으며, 우리의 구상이 그들의 주권과 정치 질서를 위협할 가능성이 있다고 주장하고 있습니다.\n\n이시와라 간지는 이러한 답신을 냉정하게 받아들이고 있습니다. 그는 오래전부터 중원의 정치 세력이 이러한 제안을 쉽게 받아들일 것이라고 기대하지 않았습니다. 그럼에도 불구하고 이번 제안은 동아시아의 미래를 위한 하나의 시험이었습니다.\n\n이제 대동국은 선택해야 합니다. 협력의 가능성이 사라진 이상, 동아시아의 질서는 다른 방식으로 결정될 수도 있습니다."
 manchukou_wr.58.a:0 "그렇다면 힘으로 증명하겠다."
 manchukou_wr.59.t:0 "대동국의 전보"
 manchukou_wr.59.d:0 "다롄 주재 당국 앞으로 대동국 정부의 긴급 전보가 도착했습니다. 전보에서 그들은 현재의 군사적 준비 상태로는 다가올 위기에 충분히 대응하기 어렵다고 주장하며, 일본 측이 무기와 군수 물자를 제공해 줄 것을 요청하고 있습니다.\n\n대동국은 이번 지원이 단순한 물자 거래가 아니라 북방의 안정을 유지하고 동아시아 질서를 수호하기 위한 공동의 이해관계라고 강조하고 있습니다. 다만 이 요청을 받아들일 경우 만몽의 군사력은 더욱 강화될 것이며, 이를 어떻게 활용할지는 전적으로 그들의 판단에 달려 있게 될 것입니다.\n\n우리가 어떤 답을 보내느냐에 따라 대동국과의 관계, 그리고 북방 정세 역시 적지 않은 영향을 받게 될 것입니다."
 manchukou_wr.59.a:0 "무기를 제공하라."
 manchukou_wr.59.b:0 "거절한다."
 manchukou_wr.60.t:0 "다롄에서 온 화물"
 manchukou_wr.60.d:0 "다롄으로 보낸 전보에 대한 답신이 화물 열차와 선적 명세서로 도착했습니다. 일본 당국은 우리의 요청을 받아들였고, 항만과 철도를 통해 상당한 양의 무기와 군수 물자가 인도되고 있습니다.\n\n군부는 이 지원이 전선의 장비 부족을 완화하고 부대 재편을 가속화할 수 있을 것이라 보고 있습니다. 조정 내부에서도 일본이 아직 대동국의 전략적 가치를 인정하고 있다는 해석이 힘을 얻고 있습니다.\n\n그러나 일부는 이러한 지원이 어디까지나 일본의 이해관계에 따른 것일 뿐이라고 경고하고 있습니다. 그럼에도 지금으로서는 이 무기들이 곧 다가올 시련에 대비할 수단이 되어 줄 것입니다."
 manchukou_wr.60.a:0 "당장 보급을 시작하라."
 manchukou_wr.61.t:0 "차가운 답신"
 manchukou_wr.61.d:0 "다롄으로 보낸 전보에 대한 답신이 도착했지만, 그 내용은 기대와는 거리가 멀었습니다. 일본 당국은 우리의 요청을 받아들이지 않았으며, 현재의 정세에서 추가적인 군수 지원에 관여할 뜻이 없음을 분명히 했습니다.\n\n군부는 이 결정이 장비 확보 계획에 차질을 가져올 것이라고 우려하고 있으며, 일부 대신들은 애초에 외부 지원에 기대를 거는 것 자체가 위험한 판단이었다고 지적하고 있습니다. 조정 내부에서는 일본이 대동국을 진정한 동반자로 여기지 않는다는 불만도 커지고 있습니다.\n\n이제 남은 길은 분명합니다. 외부의 창고가 닫혔다면, 우리 스스로의 무기고를 열고 필요한 준비를 갖추어야 할 것입니다."
 manchukou_wr.61.a:0 "우리 힘으로 해결할거다."
 manchukou_wr.62.t:0 "보이지 않는 경로"
 manchukou_wr.62.d:0 "일본이 우리의 요청을 거절한 이후, 조정 내부에서는 군수 물자 확보 문제를 두고 긴 논의가 이어졌습니다. 그러나 이시와라 간지는 외교적 답신에 크게 개의치 않는 모습이었습니다.\n\n그는 이미 오래전부터 관동군 내부와 일본 군부 곳곳에 형성된 개인적 인맥과 비공식 네트워크를 잘 알고 있었습니다. 전쟁이 다가오고 있다는 인식은 일본군 내부에서도 적지 않은 공감을 얻고 있었으며, 그 중 일부는 대동국의 준비를 돕는 것이 동아시아 전체의 이익이라고 생각하고 있었습니다.\n\n며칠 뒤 다롄 항만의 군수 창고에서 예정되지 않았던 화물 열차가 출발했습니다. 서류상으로는 단순한 물류 이동에 불과했지만, 그 열차가 향한 곳은 만몽국의 군수 창고였습니다.\n\n공식적으로는 아무 일도 일어나지 않았습니다. 그러나 상자 속의 총과 탄약은 이미 우리 손에 들어와 있었습니다."
 manchukou_wr.62.a:0 "쓸 사람에게 가는 법이다."
 manchukou_wr.63.t:0 "다롄 군수 창고 사건"
 manchukou_wr.63.d:0 "다롄의 군수 창고에서 이상한 보고가 올라왔습니다. 정기 점검 과정에서 일부 무기 상자와 탄약이 기록과 일치하지 않는다는 사실이 발견된 것입니다.\n\n조사 결과 해당 물자는 서류상으로는 정상적인 물류 이동으로 처리되어 있었지만, 실제로는 만몽국 방향으로 향한 열차에 실려 있었던 것으로 보입니다. 관동군 내부의 일부 장교들이 이 사건에 관여했을 가능성이 있다는 소문도 나오고 있습니다.\n\n그러나 현재 상황에서 이 문제를 공개적으로 조사할 경우 군 내부의 불필요한 마찰을 일으킬 수 있다는 의견도 적지 않습니다.\n\n결국 이 사건은 조용히 덮어두는 것이 최선이라는 결론이 내려졌습니다."
 manchukou_wr.63.a:0 "모르는 일이 더 낫다."
 manchukou_wr.64.t:0 "합종의 기치"
 manchukou_wr.64.d:0 "만몽군이 국경을 넘어 중원으로 진격을 개시하면서, 전국의 정세가 급격히 요동치고 있습니다. 각지의 군벌과 지방 세력, 그리고 중앙 정부는 더 이상 분열된 상태로 이 위기를 감당할 수 없다는 사실을 분명히 인식하고 있습니다.\n\n정부는 즉시 전국에 공동 항전을 호소하며, 모든 군사 세력과 지방 행정 조직을 통합하는 '합종군'의 편성을 추진하고 있습니다. 이는 단순한 군사 동원이 아니라, 외부의 침략에 맞서 중화 전체가 하나로 결집하는 정치적 조치입니다.\n\n이와 함께 각지에 다음과 같은 격문이 전파되고 있습니다.\n\n"군왕의 가면을 쓴 필부가, 다시 한번 중원을 손에 넣으려 온다!\n그러니 신해년에 그러하였듯, 필부의 모가지를 다시 끌어내리자!\n중화의 모든 인민들은 준비되었다. 만귀들이여 오거라, 왜놈들이여 오거라. 잘 벼려진 총과 칼을 들고 오거라!\n우린 너희를 동삼성 너머로 밀어버릴 것이다!"\n\n각지의 반응은 빠르게 나타나고 있으며, 분열되어 있던 세력들 또한 점차 하나의 전선으로 집결하고 있습니다."
 manchukou_wr.64.a:0 "중원은 한족의 것이다."
 manchukou_wr.65.t:0 "합종군에 가담하다"
 manchukou_wr.65.d:0 "만몽군의 남하와 중원 침공은 더 이상 일부 지역의 위기로만 남아 있지 않습니다. 북방에서 시작된 전쟁은 곧 중화 전체의 존망을 가르는 싸움으로 번지고 있으며, 어느 세력도 더 이상 이를 외면할 수 없는 상황에 놓였습니다.\n\n[ROOT.GetName] 정부 역시 이러한 현실을 외면하지 않았습니다. 지금 필요한 것은 분열과 대립이 아니라 공동의 적에 맞선 일시적 단결이며, 중화의 질서를 지키기 위해서는 각지의 군대와 정권이 하나의 전선 아래 결집해야 한다는 판단이 내려졌습니다.\n\n이에 [ROOT.GetName] 정부는 호법정부가 주도하는 합종군에 정식으로 가담하기로 결정했습니다. 과거의 불신과 경쟁은 잠시 뒤로 미뤄졌고, 이제 남은 것은 침략자를 물리치기 위한 공동의 항전뿐입니다."
 manchukou_wr.65.a:0 "지금은 단결할 때다."
 manchukou_wr.66.t:0 "[FROM.GetName]의 합류"
 manchukou_wr.66.d:0 "[FROM.GetName] 정부가 마침내 합종군에 가담하겠다는 뜻을 밝혀왔습니다. 만몽군의 침공이 본격화되는 지금, 이들의 합류는 단순한 병력 증강 이상의 의미를 지니고 있습니다.\n\n호법정부는 오랫동안 각지의 세력에게 공동 항전을 호소해 왔으며, 이제 그 호소가 점차 실제 결실로 이어지고 있습니다. [FROM.GetName]의 가담은 중화가 아직 완전히 분열되지 않았음을 보여주는 신호이자, 침략자에 맞선 공동 전선이 현실이 되고 있음을 보여주는 증거이기도 합니다.\n\n정부 내부에서는 과거의 갈등과 이해관계를 잠시 접어두고, 지금은 이 결단을 환영해야 한다는 분위기가 강해지고 있습니다. 중화를 지키기 위한 싸움은 이제 한 걸음 더 앞으로 나아가고 있습니다."
 manchukou_wr.66.a:0 "모든 총구는 북쪽을 향하리라."
 manchukou_wr.67.t:0 "만주-중국 전쟁 발발"
 manchukou_wr.67.d:0 "중국은 [MAN.GetName]이 건국될 시절부터 [MAN.GetName]의 영토를 자신들의 영토며 [MAN.GetName]은 그들의 영토를 불법적으로 점거한 반국가세력이라 주장해왔습니다. 이 두 국가의 오랜 감정이 결국 어제 폭발하였습니다. 두 국가는 전면전 상태에 돌입하였으며 이는 만주에 막대한 자본을 투자해온 우리에게는 전혀 좋은 소식이 아닙니다. 정부는 만주를 구원하기 위해 이 전쟁에 참전하는 방안도 검토중에 있습니다.\n\n일본 또한 중국과 경제적, 외교적으로 지속적인 마찰을 항상 빚어왔으며 중국의 경제적 압박을 이기지 못하여 몇가지 외교적 '양보'를 수용하는 수 밖에 없었던 적도 있습니다. 일부 여론은 이번 전쟁에 참전하여 이런 기세등등한 중국을 꺾고 일본의 이권을 회복해야 한다는 주장을 하고있습니다."
 manchukou_wr.67.a:0 "결론이 나기까지 얼마 안 걸릴 것 같군."
 manchukou_wr.68.t:0 "만주-중국 전쟁에 개입"
 manchukou_wr.68.d:0 "정부는 결국 만주-중국 전쟁에 개입하기로 결정하였습니다. 최근 전선의 확대와 북방 정세의 불안정이 심화되면서, 더 이상 중립을 유지하는 것은 국가의 이익과 안보를 보장할 수 없다는 판단이 내려졌습니다. 이러한 결정에는 [MAN.GetName]에 묶인 막대한 자금과 자원때문이기도 합니다.\n\n정부는 중국 정부에 공식적인 선전포고문을 전달하였으며, 이에 따라 일본은 중국과의 전쟁 상태에 돌입하였습니다. 군부는 이미 작전 계획을 수립하고 병력과 물자의 이동을 개시하였으며, 주요 항만과 철도 역시 군사적 목적에 따라 통제되고 있습니다.\n\n이 결정은 단순한 군사 개입을 넘어 동아시아 질서 전반에 중대한 영향을 미칠 것으로 보이며, 정부는 이번 전쟁이 장기적인 전략 환경을 좌우할 분수령이 될 것이라고 보고 있습니다."
 manchukou_wr.68.a:0 "더 이상 물러설 수 없다."
 manchukou_wr.69.t:0 "만주-중국 전쟁 확전"
 manchukou_wr.69.d:0 "만주와 중국 간 전면전이 발발한 가운데 일본이 전쟁에 공식 개입하면서 동아시아 정세가 급격히 긴장되고 있습니다. 일본 정부는 북방 안정과 자국 이권 보호를 이유로 내세우고 있으나, 이번 결정은 단순한 군사 개입을 넘어 지역 질서 전반에 영향을 미칠 것으로 보입니다.\n\n주요 항만과 철도는 군사 통제 아래 들어갔으며, 각국은 사태의 전개를 예의주시하고 있습니다. 이번 전쟁의 결과에 따라 동아시아 정국은 크게 바뀔 것입니다."
 manchukou_wr.69.a:0 "전쟁이 확대되고 있다."
 manchukou_wr.70.t:0 "공동 전선 제안"
 manchukou_wr.70.d:0 "만주-중국 전쟁이 확대되는 가운데, 일본 정부는 [MAN.GetName]과의 관계를 재정립할 필요성을 강하게 인식하고 있습니다. 북방 전선의 안정과 동아시아 질서 유지를 위해서는 양국 간의 보다 긴밀한 협력이 필요하다는 판단이 내려졌습니다.\n\n이에 일본 정부는 [MAN.GetName]을 공식적으로 자국의 세력권에 초대하고, 공동 전선을 구축할 것을 제안하고 있습니다. 이는 단순한 외교적 제안이 아니라 군사적 협력과 전략적 이해관계를 공유하는 관계로의 전환을 의미합니다.\n\n이 제안을 받아들일 경우 양국은 보다 강력한 협력 체계를 구축할 수 있을 것이나, 동시에 일본의 영향력 또한 더욱 깊숙이 작용하게 될 것입니다."
 manchukou_wr.70.a:0 "좋다!"
 manchukou_wr.71.t:0 "만몽에 대한 참전 요구"
 manchukou_wr.71.d:0 "중국과의 전쟁이 본격화되면서, 북방 전선의 전략적 중요성이 크게 부각되고 있습니다. 참모부는 전쟁을 보다 유리하게 이끌기 위해 만몽의 군사적 협력이 필요하다는 결론을 내렸습니다.\n\n만몽군이 북쪽에서 공세를 가할 경우 중국군은 병력을 분산시킬 수밖에 없으며, 이는 전선 전반에 걸쳐 일본군에게 유리한 상황을 만들어낼 것입니다.\n\n이에 따라 정부는 [MAN.GetName]에 공식적으로 참전을 요청하기로 결정했습니다. 이제 남은 것은 그들의 답뿐입니다."
 manchukou_wr.71.a:0 "참전을 요구하라."
 manchukou_wr.72.t:0 "일본의 참전 요청"
 manchukou_wr.72.d:0 "일본 정부로부터 공식적인 전보가 도착했습니다. 그들은 중국과의 전쟁에서 전략적 우위를 확보하기 위해 [MAN.GetName]의 즉각적인 참전을 요구하고 있습니다.\n\n일본 측은 북방 전선에서의 공세가 중국군의 전력을 분산시키고 전쟁을 유리하게 이끌 수 있을 것이라 주장하고 있습니다.\n\n이 요청을 받아들일 경우 일본과의 관계는 더욱 공고해질 것이나, 동시에 대규모 전쟁에 직접 뛰어들게 될 것입니다."
 manchukou_wr.72.a:0 "좋은 기회다."
 manchukou_wr.73.t:0 "외몽고의 운명"
 manchukou_wr.73.d:0 "몽골전쟁에서 승리함에 따라, 외몽고 전역에서 [MAN.GetName]의 영향력이 빠르게 확대되고 있습니다. 현지의 귀족 세력과 행정 조직은 점차 우리의 권위를 인정하고 있으며, 군사적으로도 더 이상의 저항은 어려운 상황에 놓여 있습니다.\n\n이제 문제는 이 지역을 어떤 방식으로 통치할 것인가입니다. 외몽고를 직접 병합하여 제국의 영토로 편입할 수도 있으며, 기존의 질서를 일정 부분 유지한 채 괴뢰 정권을 수립하여 간접적으로 지배하는 방안도 고려되고 있습니다.\n\n직접 통치는 행정적 부담과 저항의 위험을 동반하지만, 확실한 통제력을 확보할 수 있습니다. 반면 괴뢰국 수립은 안정적인 통치를 도모할 수 있으나, 완전한 지배에는 한계가 따를 것입니다. 정부는 이제 외몽고의 미래를 결정해야 합니다."
 manchukou_wr.73.a:0 "완전히 병합한다."
 manchukou_wr.73.b:0 "괴뢰국으로 둔다."
 manchukou_wr.74.t:0 "급격한 팽창의 대가"
 manchukou_wr.74.d:0 "[ROOT.GetName]이 북중국을 장악하면서 국가는 단기간에 그 규모와 영향력을 크게 확대하게 되었습니다. 그러나 이러한 급격한 팽창은 예상치 못한 사회적, 경제적 충격을 동반하고 있습니다.\n\n새롭게 편입된 지역은 기존의 행정 체계와 완전히 다른 구조를 가지고 있으며, 이를 통합하는 과정에서 각종 혼선과 비효율이 발생하고 있습니다. 물류와 생산 체계는 서로 맞물리지 못하고 있으며, 자원의 분배 역시 심각하게 왜곡되고 있습니다.\n\n특히 농촌 지역에서는 행정 공백과 전쟁의 여파가 겹치며 생산 기반이 흔들리고 있고, 도시에서는 인구 유입과 물가 상승이 동시에 발생하면서 사회적 불안이 증폭되고 있습니다.\n\n정부는 이러한 문제를 단기간에 해결하기 어렵다는 점을 인식하고 있으며, 체계적인 재정비와 개혁이 이루어지지 않는다면 이 충격은 더욱 심화될 가능성이 있습니다."
 manchukou_wr.74.a:0 "대가를 치러야 할 것이다."
 manchukou_wr.75.t:0 "대동국 선포"
 manchukou_wr.75.d:0 "만몽 정부가 '대동국'으로의 국호 변경을 공식 발표했습니다. 총리 이시와라 간지는 이번 조치가 단순한 명칭 변경이 아니라, 국가의 이념과 방향성을 명확히 하는 결정이라고 강조했습니다.\n\n정부는 '대동'이라는 개념이 다양한 민족과 사회가 조화를 이루는 질서를 의미하며, 이는 오족협화를 기반으로 한 새로운 정치 체제의 핵심이라고 설명하고 있습니다. 이러한 구상은 단순한 국내 통합을 넘어, 아시아 전체가 하나의 공동 운명 아래 결집해야 한다는 아시아주의적 비전과도 깊이 연결되어 있습니다. 대동국이라는 국호는 이러한 이상을 상징하는 이름으로서, 국가가 지향하는 질서와 목표를 대내외에 분명히 드러내고 있습니다."
 manchukou_wr.75.a:0 "재미있군."
 manchukou_wr.76.t:0 "북경으로의 귀환"
 manchukou_wr.76.d:0 "북중국이 안정적으로 확보되면서, 조정은 마침내 수도를 북경으로 옮기는 문제를 공식적으로 논의하기 시작했습니다. 한때 천자의 도읍이었던 이 도시는 단순한 정치 중심지를 넘어, 왕조의 정통성과 권위를 상징하는 공간입니다.\n\n총리 정샤오쉬를 중심으로 한 정부는 북경으로의 천도가 국가의 정통성을 대내외에 천명하는 중요한 조치가 될 것이라 판단하고 있습니다. 만주에서 출발한 조정이 다시 황도의 자리에 앉는 것은 단순한 영토 확장의 결과가 아니라, 질서의 회복을 의미합니다.\n\n그러나 전쟁의 여파는 여전히 남아 있으며, 행정 체계 역시 완전히 정비되지 않은 상태입니다. 무엇보다 한족 사회 전반에서는 왕조의 복귀에 대한 강한 반발이 일어나고 있으며, 곳곳에서 불만과 저항의 움직임이 감지되고 있습니다.\n\n북경으로의 귀환은 권위의 회복을 의미하지만, 동시에 새로운 불안정의 시작이기도 합니다. 이 황도는 아직 완전히 우리의 것이 아닙니다."
 manchukou_wr.76.a:0 "황도는 우리를 기다리고 있다."
 manchukou_wr.77.t:0 "대청국 선포"
 manchukou_wr.77.d:0 "만몽이 북중국을 점령하고 북경으로 천도를 단행한 이후, 조정은 마침내 중대한 결정을 내렸습니다. 만몽이라는 과도적 체제를 넘어, 대청국의 재건을 공식적으로 선포한 것입니다. 정샤오쉬를 비롯한 대신들은 북방에서 시작된 권력이 이제 중원에 자리잡았으며, 천명이 다시금 이어졌다고 주장하고 있습니다. 황제는 북경에서 천자의 지위를 회복하였고, 조정은 이를 통해 질서의 재건을 선언하고 있습니다.\n\n그러나 이러한 선언이 곧바로 모든 이들에게 받아들여지는 것은 아닙니다. 한족 사회를 중심으로 강한 반발과 불신이 여전히 존재하며, 일부 지역에서는 저항의 움직임 또한 이어지고 있습니다. 대청국은 다시 세워졌습니다. 그러나 그 천명이 온 천하에 받아들여질지는 아직 확실하지 않습니다."
 manchukou_wr.77.a:0 "천명을 되찾을 것인가?"
 manchukou_wr.78.t:0 "긴급 구호 시행"
 manchukou_wr.78.d:0 "전쟁과 급격한 통치 확대로 인해 각지의 민생은 심각한 위기에 처해 있습니다. 식량 부족과 물가 상승, 행정 공백이 겹치며 주민들의 생활은 극도로 불안정해졌습니다.\n\n조정은 이러한 상황을 방치할 수 없다고 판단하고, 긴급 구호책의 시행을 결정했습니다. 중앙과 지방의 재정을 동원하여 식량과 필수 물자를 배급하고, 피해 지역에 대한 직접적인 지원을 확대하고 있습니다.\n\n그러나 물자 수송과 분배 과정에서 혼선이 발생하고 있으며, 일부 지역에서는 여전히 지원이 충분히 이루어지지 못하고 있습니다. 그럼에도 불구하고 이번 조치는 무너진 민생을 다시 붙잡기 위한 첫걸음이 될 것입니다."
 manchukou_wr.78.a:0 "우선 숨통을 틔워야 한다."
 manchukou_wr.79.t:0 "처참한 대지"
 manchukou_wr.79.d:0 "전국적인 통계 조사 과정에서 수집된 자료는 조정에 충격적인 현실을 드러내고 있습니다. 서류 위에서만 존재하던 수치들이 실제 현장에서는 전혀 다른 모습을 보이고 있었던 것입니다.\n\n전쟁과 혼란으로 인해 많은 농촌 지역은 황폐화되어 있었고, 경작지는 방치되거나 생산력을 상실한 상태였습니다. 일부 지역에서는 인구 감소와 노동력 부족이 동시에 발생하며, 행정 기록조차 제대로 유지되지 않고 있었습니다.\n\n조사단은 식량 생산량과 인구 통계가 기존 보고와 크게 어긋나 있다는 사실을 확인하였으며, 이는 국가 정책 전반이 부정확한 정보 위에서 운영되고 있었음을 의미합니다.\n\n이제 조정은 이 처참한 현실을 직시해야 합니다. 숫자를 바로잡는 것만으로는 충분하지 않습니다."
 manchukou_wr.79.a:0 "계혁은 필연적이다."
 manchukou_wr.80.t:0 "안정된 농업기반"
 manchukou_wr.80.d:0 "지속적인 개혁과 투자, 그리고 각종 정책의 시행을 통해 농촌 지역은 점차 안정을 되찾고 있습니다. 한때 붕괴 상태에 놓여 있던 농업 생산 체계는 재정비되었으며, 식량 생산 또한 점차 안정적인 수준으로 회복되고 있습니다.\n\n협동조합과 금융 지원은 농민들에게 필요한 자원을 제공하고 있으며, 교육과 기술 보급은 생산성을 높이는 데 기여하고 있습니다. 각지에서 수확량이 증가하고 물가 또한 안정되기 시작하면서, 민심 역시 점차 회복되는 모습을 보이고 있습니다.\n\n농업은 다시 국가를 지탱하는 기반으로 자리잡고 있으며, 조정은 이제 보다 안정된 토대 위에서 다음 단계를 준비할 수 있게 되었습니다."
 manchukou_wr.80.a:0 "마침내 기반이 마련되었다."
 manchukou_wr.81.t:0 "재벌과의 결탁"
 manchukou_wr.81.d:0 "경제 재건과 산업 확장을 위해 조정은 대규모 자본을 보유한 재벌들과의 협력을 결정했습니다. 이들은 막대한 자금과 조직력을 통해 생산과 투자를 빠르게 확대할 수 있으며, 현재의 경제 위기를 단기간에 완화할 수 있는 수단으로 여겨지고 있습니다.\n\n국가는 보호와 특혜를 제공하는 대신, 재벌은 생산과 자본을 동원하여 국가의 정책을 뒷받침하게 됩니다. 이로써 산업 기반은 빠르게 재편될 것이며, 경제는 새로운 방향으로 움직이기 시작할 것입니다.\n\n그러나 이러한 결합은 단순한 협력을 넘어, 경제 세력이 국가 운영에 깊이 관여하는 구조를 형성하게 됩니다. 이 선택이 가져올 결과는 앞으로의 통치 방식에 큰 영향을 미칠 것입니다."
 manchukou_wr.81.a:0 "필요한 선택이다."
 manchukou_wr.82.t:0 "정치범 투옥"
 manchukou_wr.82.d:0 "최근 각지에서 체제에 반대하는 인사들과 선동가들이 대거 체포되었습니다. 정부는 이들을 단순한 의견 표출의 범주를 넘어, 국가 질서를 위협하는 정치범으로 규정하고 있습니다.\n\n헌병대와 치안 기관은 조직적인 색출 작전을 통해 관련 인물들을 검거하였으며, 주요 인사들은 즉시 구금되어 재판 또는 장기 수감 절차에 들어갔습니다. 이 조치는 반정부 활동을 억제하고 사회 전반의 통제를 강화하기 위한 것입니다.\n\n그러나 일부에서는 이러한 조치가 과도하다는 비판도 제기되고 있으며, 지식인과 도시 계층을 중심으로 불안과 긴장이 확산되고 있습니다.\n\n그럼에도 불구하고, 조정은 질서 유지를 위해 이러한 조치가 불가피하다고 보고 있습니다."
 manchukou_wr.82.a:0 "질서를 위해서다."
 manchukou_wr.83.t:0 "황하강의 기적"
 manchukou_wr.83.d:0 "한때 혼란과 전쟁으로 황폐화되었던 황하 유역에서 예상치 못한 회복의 징후가 나타나고 있습니다. 수리 시설의 복구와 행정 체계의 정비, 그리고 농업 정책의 시행이 맞물리며 생산력이 눈에 띄게 증가하고 있습니다.\n\n특히 올해의 수확은 과거 몇 년과 비교할 수 없을 정도로 풍성한 것으로 보고되고 있으며, 각지에서 식량 가격이 안정되기 시작하고 있습니다. 이는 단순한 우연이 아니라, 조정이 추진해온 정책이 점차 성과를 내고 있음을 보여주는 신호로 해석되고 있습니다.\n\n사람들은 이를 두고 '황하강의 기적'이라 부르고 있으며, 무너졌던 질서가 다시금 회복될 수 있다는 희망이 퍼지고 있습니다."
 manchukou_wr.83.a:0 "황하가 다시 살아났다."
 manchukou_wr.84.t:0 "정당 질서의 재편"
 manchukou_wr.84.d:0 "정당정치의 제한적 인정 이후, 조정은 정치 질서를 보다 체계적으로 재편하기 위한 조치를 단행했습니다. 기존의 집권 세력이었던 종사당은 새로운 시대에 맞추어 '중국유신당'으로 개편되었으며, 체제 내 개혁과 근대화를 표방하는 정당으로 재정립되었습니다.\n\n이와 동시에, 사회 문제와 노동 계층을 대변하는 '중국사회당'이 창당되며 정치적 스펙트럼이 확대되었습니다. 또한 기존의 국민 민정회는 보다 명확한 정치적 노선을 갖춘 '민주당'으로 개편되어, 제도권 내에서 다양한 의견이 표출될 수 있는 기반이 마련되었습니다.\n\n조정은 이러한 정당 체제가 통제 가능한 범위 내에서 정치적 참여를 허용하면서도, 국가 질서를 유지하는 균형을 이룰 수 있을 것으로 기대하고 있습니다."
 manchukou_wr.84.a:0 "새로운 정치 질서다."
 manchukou_wr.85.t:0 "지식인들의 변화"
 manchukou_wr.85.d:0 "최근 정책 변화와 제도 정비의 영향으로, 지식인 계층 내부에서 서서히 분위기의 변화가 감지되고 있습니다. 과거처럼 공개적인 반발을 이어가던 움직임은 점차 줄어들고 있으며, 일부는 체제 내부에서 역할을 찾으려는 태도를 보이고 있습니다.\n\n학계와 언론에서도 극단적인 비판 대신 현실적인 논의가 증가하고 있으며, 정부 정책에 대한 협력 가능성 역시 조심스럽게 제기되고 있습니다.\n\n이러한 변화는 아직 초기 단계에 불과하지만, 지식인 사회가 완전히 적대적인 상태에서 벗어나고 있음을 보여주고 있습니다."
 manchukou_wr.85.a:0 "변화가 시작되고 있다."
 manchukou_wr.86.t:0 "지식인 사회의 안정"
 manchukou_wr.86.d:0 "지속적인 정책 조정과 포섭 전략의 결과, 지식인 계층은 더 이상 조직적인 반발을 이어가지 않고 있습니다. 많은 이들이 체제 내에서 역할을 받아들이고 있으며, 학문과 행정, 산업 전반에서 국가 발전에 기여하고 있습니다.\n\n과거의 갈등은 점차 사라지고 있으며, 지식인 사회는 새로운 질서에 적응한 상태에 이르렀습니다. 이로써 국가의 통치 기반은 한층 더 안정된 모습을 갖추게 되었습니다."
 manchukou_wr.86.a:0 "이제 하나가 되었다."
 manchukou_wr.87.t:0 "암살 시도"
 manchukou_wr.87.d:0 "최근 조정 내부와 일본 측 인사들 사이에서 긴장이 고조되는 가운데, 충격적인 사건이 발생했습니다. 일본과 연계된 한 장교가 총리 정샤오쉬를 암살하려 시도한 것입니다.\n\n이 장교는 만몽의 급격한 성장과 정책 변화에 강한 불만을 품고 있었으며, 특히 일본의 기대와 달리 독자적인 노선을 강화하는 움직임에 분노를 표출해 왔던 것으로 알려졌습니다.\n\n암살 시도는 사전에 감지되어 실패로 끝났으며, 정샤오쉬는 무사한 상태입니다. 범인은 즉시 체포되었고, 관련 인물들에 대한 조사 또한 확대되고 있습니다.\n\n이 사건은 단순한 개인의 일탈이 아니라, 만몽과 일본 사이에 쌓여온 긴장이 표면으로 드러난 사례로 받아들여지고 있습니다."
 manchukou_wr.87.a:0 "용납할 수 없다."
 manchukou_wr.88.t:0 "조사의 결과"
 manchukou_wr.88.d:0 "긴급 조사 과정에서 예상치를 훨씬 뛰어넘는 충격적인 사실이 드러났습니다. 단순한 암살 시도의 배후를 추적하던 수사는, 광범위하게 퍼져 있던 일본 정보망의 존재를 밝혀내는 결과로 이어졌습니다.\n\n각지의 행정 기관과 군, 산업 시설에 이르기까지 일본과 연계된 인물들이 깊숙이 침투해 있었으며, 일부는 핵심 정보와 정책에까지 접근하고 있었던 것으로 확인되었습니다.\n\n헌병대와 정보 기관은 이들에 대한 일제 검거 작전을 개시하였고, 수많은 용의자들이 체포되었습니다. 조사 범위는 여전히 확대되고 있으며, 추가적인 적발 가능성도 배제할 수 없는 상황입니다.\n\n이 사건은 단순한 정보 활동을 넘어, 국가의 근간을 위협하는 수준의 침투가 이루어졌음을 보여주고 있습니다."
 manchukou_wr.88.a:0 "전면적으로 정리하라."
 manchukou_wr.89.t:0 "책임 요구"
 manchukou_wr.89.d:0 "최근 만몽에서 발생한 사건은 단순한 내부 문제로 치부하기 어려운 성격을 지니고 있습니다. 청년 장교에 의한 정샤오쉬 암살 시도와 그 이후 이어진 대규모 숙청 과정에서, 다수의 일본인이 체포되어 처형된 것으로 확인되었습니다.\n\n정부 내부에서는 이를 일본인에 대한 부당한 탄압이자, 국가의 명예를 훼손하는 중대한 사안으로 보고 있습니다. 일부에서는 이 사건을 빌미로 보다 강경한 대응을 통해 만몽에 대한 영향력을 재확립해야 한다는 주장이 힘을 얻고 있습니다.\n\n이에 따라 정부는 만몽 측에 이번 사태에 대한 전적인 책임을 묻고, 매우 무거운 배상과 사과를 요구하는 최후통첩을 전달하는 방안을 검토하고 있습니다. 이 요구는 아마 받아들여 지지 않을 것입니다. 그리고 우리는 우리가 원하는 것을 얻기위해 행동에 나설 충분한 명분을 가질것입니다."
 manchukou_wr.89.a:0 "하늘 아래 두 태양이 있을 수는 없지."
 manchukou_wr.90.t:0 "일본의 최후통첩"
 manchukou_wr.90.d:0 "일본 정부로부터 우리가 행한 일련의 스파이 '축출' 작업으로 부터 책임과 배상을 요구하는 장문의 최후통첩이 도착했습니다. 해당 최후통첩에는 산둥과 외몽고, 내몽고에 대한 조차를 요구하는 것은 물론, 주요 광산과 자원에 대한 독점 채굴권까지 포함된 요구는 사실상 국가의 주권을 포기하라는 것과 다름없었습니다.\n\n조정 내부에서는 이를 협상의 여지가 없는 강압적 요구로 규정하였으며, 이러한 조건을 수용할 경우 국가는 형식만 유지한 채 실질적인 통제력을 상실하게 될 것이라는 판단이 내려졌습니다.\n\n이에 따라 정부는 일본 측의 요구를 전면적으로 거부하기로 결정했습니다. 이 선택이 어떤 결과를 초래할지는 분명하며, 왜놈들을 대륙으로 부터 축출한 위대한 기회가 될 것입니다."
 manchukou_wr.90.a:0 "네놈들이 있을곳은 섬뿐이다 쪽바리."
 manchukou_wr.91.t:0 "대청국의 거부"
 manchukou_wr.91.d:0 "대청국은 우리의 최후통첩을 전면적으로 거부했습니다. 그들은 우리의 요구를 주권 침해로 규정하며, 어떠한 양보도 받아들일 수 없다는 입장을 분명히 했습니다.\n\n정부 내부에서는 이러한 반응을 예상된 결과로 보고 있습니다. 애초에 이번 요구는 협상을 위한 것이 아니라, 행동의 명분을 확보하기 위한 것이었기 때문입니다.\n\n이제 선택은 명확해졌습니다. 외교적 수단은 소진되었으며, 남은 것은 힘에 의한 해결뿐입니다. 군부는 이미 작전 준비를 완료했으며, 전면적인 대응이 언제든지 가능하다고 보고하고 있습니다.\n\n대륙의 질서는 다시 한번 힘으로 결정될 것입니다."
 manchukou_wr.91.a:0 "전쟁이다."
 manchukou_wr.92.t:0 "북경 천도"
 manchukou_wr.92.d:0 "중원의 질서는 큰 변화를 맞이했습니다. 중민 정권은 무너졌고, 만주는 북방의 중심을 장악하는 데 성공했습니다. 조정은 이제 새로운 국면에 접어들었다고 판단하고 있습니다.\n\n이러한 변화에 발맞추어, 수도를 북경으로 옮기기로 결정되었습니다. 북경은 오랜 세월 정치와 권위의 중심지로 기능해 온 도시이며, 새로운 질서를 정립하기에 가장 적합한 장소입니다.\n\n이번 천도는 단순한 행정적 조치가 아니라, 북방에서 시작된 질서가 중원으로 확장되었음을 보여주는 상징적 전환점입니다.\n\n조정은 이제 북경에서 새로운 시대를 준비하고자 합니다."
 manchukou_wr.92.a:0 "우리는 북경으로 간다."
 manchukou_wr.93.t:0 "왕도낙토의 시작"
 manchukou_wr.93.d:0 "정부는 마침내 대규모 건설 계획의 시행을 공식화했습니다. 철도와 도로, 산업 시설과 기반 시설을 전국적으로 확충하여 국가의 물적 기반을 새롭게 구축하고자 합니다.\n\n각지에서 계획이 수립되고 자원이 배분되면서, 그동안 분절되어 있던 지역과 산업을 하나의 체계로 연결하는 작업이 본격적으로 시작되고 있습니다. 이는 단순한 개발이 아니라, 국가가 지향하는 질서를 현실 속에 구현하려는 첫걸음입니다.\n\n아직 모든 것은 시작에 불과하지만, 이 계획이 성공적으로 추진된다면 국가는 보다 강력한 기반 위에 서게 될 것입니다."
 manchukou_wr.93.a:0 "이제부터다."
 manchukou_wr.94.t:0 "건국군 창설"
 manchukou_wr.94.d:0 "정부는 체제의 안정과 이념 수호를 위해 새로운 군사 조직의 창설을 공식 발표했습니다. '건국군'이라 명명된 이 조직은 기존 군과는 다른 성격을 지니며, 국가와 당에 대한 절대적인 충성을 기반으로 구성되고 있습니다.\n\n건국군은 단순한 전투 부대가 아니라, 내부 질서 유지와 반체제 세력 억제에 있어 핵심적인 역할을 수행하게 될 것입니다. 이들은 사상적 교육과 정치적 훈련을 동시에 받으며, 체제 수호의 최전선에 배치될 예정입니다.\n\n이로써 국가는 보다 직접적인 통제 수단을 확보하게 되었으며, 새로운 질서를 유지하기 위한 기반을 한층 강화하게 되었습니다."
 manchukou_wr.94.a:0 "체제의 검이 완성되었다."
 manchukou_wr.95.t:0 "둔전의 재편"
 manchukou_wr.95.d:0 "정부는 군사력 유지와 식량 확보를 동시에 달성하기 위해 둔전제를 전면적으로 재정비하기로 결정했습니다. 각지에 군과 함께 운영되는 농업 거점이 설치되고 있으며, 병력은 단순한 전투 임무를 넘어 생산 활동에도 참여하게 됩니다.\n\n이 체계는 병력 유지 비용을 줄이고, 외부에 의존하지 않는 식량 자급 기반을 마련하는 데 목적이 있습니다. 동시에 지역 통제력을 강화하고, 유휴 인력을 효율적으로 활용할 수 있는 수단으로도 기능하게 될 것입니다.\n\n그러나 이러한 변화는 병사들에게 새로운 부담을 안겨주고 있으며, 일부 지역에서는 반발의 조짐 또한 나타나고 있습니다. 그럼에도 불구하고, 정부는 이를 국가 생존을 위한 필수적인 조치로 보고 있습니다."
 manchukou_wr.95.a:0 "군과 농은 하나다."
 manchukou_wr.96.t:0 "비적 토벌"
 manchukou_wr.96.d:0 "북부 지역을 장악한 이후, 급격한 정세 변화와 행정 공백을 틈타 각지에서 비적 세력이 급속히 확산되고 있습니다. 이들은 교통로를 차단하고 물자를 약탈하며, 지역 주민들을 위협하는 등 질서를 심각하게 훼손하고 있습니다.\n\n정부는 이러한 상황을 더 이상 방치할 수 없다고 판단하고, 대대적인 토벌 작전을 개시했습니다. 군과 헌병대가 주요 거점을 중심으로 투입되었으며, 조직적인 소탕이 이루어지고 있습니다.\n\n이번 작전은 단순한 치안 유지가 아니라, 새롭게 확립된 질서를 실질적으로 뿌리내리게 하기 위한 과정입니다. 그러나 혼란 속에서 성장한 이들을 완전히 제거하기까지는 상당한 시간이 필요할 것입니다."
 manchukou_wr.96.a:0 "질서를 바로 세워라."
 manchukou_wr.97.t:0 "관영언론법 공포"
 manchukou_wr.97.d:0 "정부는 언론을 국가의 통제 아래 두기 위한 새로운 법안을 공식적으로 공포했습니다. 이번 관영언론법은 모든 언론 기관을 등록제 아래 두고, 보도 내용과 방향에 대해 정부의 감독을 받도록 규정하고 있습니다.\n\n이에 따라 각종 신문과 출판물, 통신 기관은 국가의 정책과 질서에 부합하는 방향으로 재편되고 있으며, 일부 반정부적 성향을 보이던 매체들은 폐쇄되거나 강제 개편되고 있습니다.\n\n정부는 이를 통해 정보의 혼란을 차단하고, 사회 전반의 안정을 확보할 수 있을 것으로 기대하고 있습니다. 그러나 동시에 언론의 자유가 크게 제한되었다는 비판도 점차 확산되고 있습니다."
 manchukou_wr.97.a:0 "여론은 관리되어야 한다."
 manchukou_wr.98.t:0 "신학풍운동의 확산"
 manchukou_wr.98.d:0 "군대를 위한 보편교육 정책이 시행되면서, 교육 현장은 빠르게 변화하고 있습니다. 각지의 학교에서는 군사 훈련과 규율 교육이 병행되고 있으며, 학생들은 점차 국가와 군에 대한 책임 의식을 내면화하고 있습니다.\n\n이러한 변화는 단순한 교육 개혁을 넘어, 사회 전체를 하나의 동원 체제로 재편하는 흐름으로 이어지고 있습니다. 청년들은 이제 미래의 병사이자 국가를 지탱하는 핵심 인력으로 길러지고 있습니다.\n\n정부는 이를 통해 국가의 장기적인 군사 기반이 강화될 것으로 기대하고 있습니다."
 manchukou_wr.98.a:0 "교육은 곧 전력이다."
 manchukou_wr.99.t:0 "구리산 사건"
 manchukou_wr.99.d:0 "쉬저우 인근 저우리산에서 발생한 충돌이 빠르게 확대되고 있습니다. 야간 훈련 중이던 만몽군 부대가 남중민군 초소 인근에서 총을 격발하며 교전이 시작되었고, 이후 양측은 즉각적으로 병력을 투입하며 전선을 확대하고 있습니다.\n\n공식 발표는 이를 우발적인 사고로 설명하고 있으나, 충돌 이후의 전개는 지나치게 신속하고 체계적이라는 평가가 나오고 있습니다. 일부 관측에서는 이번 사건이 사전에 준비된 도발일 가능성도 배제하지 않고 있습니다.\n\n사태는 이미 단순한 충돌의 단계를 넘어섰으며, 전면적인 군사 행동으로 이어질 가능성이 점점 높아지고 있습니다."
 manchukou_wr.99.a:0 "계획대로다."
 manchukou_wr.100.t:0 "다시 갈라진 천하"
 manchukou_wr.100.d:0 "대외 전쟁에서의 승리는 오래가지 않았습니다. 일본과의 전쟁이 종결되면서, 공통의 적을 상대로 형성되었던 합종 체제는 급속히 붕괴되고 있습니다.\n\n전쟁 기간 동안 억눌려 있던 정치적 갈등과 권력 투쟁이 다시 수면 위로 떠오르면서, 각 세력은 서로를 향해 무기를 들기 시작했습니다. 협력은 끝났고, 이제 남은 것은 천하의 주인을 가리는 싸움뿐입니다.\n\n이미 여러 지역에서 충돌이 보고되고 있으며, 국가는 다시 내전의 소용돌이로 빠져들고 있습니다. 대외의 승리는 내부의 분열을 막지 못했습니다. 천하는 다시 갈라지고 있습니다."
 manchukou_wr.100.a:0 "전쟁은 끝나지 않았다."
 manchukou_wr.102.t:0 "전쟁의 재개"
 manchukou_wr.102.d:0 "외부의 적이 사라지자, 억눌려 있던 내부 갈등이 다시 모습을 드러냈습니다. 중국 각 세력은 더 이상 협력을 유지할 이유를 찾지 못했고, 긴장은 빠르게 무력 충돌로 번지고 있습니다.\n\n국지적 교전은 점차 확대되며 전선이 형성되고 있으며, 협력의 시대는 완전히 막을 내렸습니다. 이제 남은 것은 누가 천하를 장악할 것인가를 가리는 싸움뿐입니다. 전쟁은 다시 시작되었습니다."
 manchukou_wr.102.a:0 "전쟁은 계속된다."
 manchukou_wr.103.t:0 "일본의 조건부 항복 요청"
 manchukou_wr.103.d:0 "일본 정부는 우리의 맹렬한 공격을 견디지 못하고 결국 항복을 요청했습니다. 우리는 우리의 조국을 지키는데 성공했으며 더 이상 그 누구도 중국 대륙을 넘보지 못할것입니다."
 manchukou_wr.103.a:0 "여기까지 하자."
 manchukou_wr.103.b:0 "도쿄가 무너질때 까지 전투는 계속된다."
 manchukou_wr.104.t:0 "[FROM.GetName]의 평화 협정 거부"
 manchukou_wr.104.d:0 "[FROM.GetName] 정부는 우리와 평화협정 체결하기를 거절했습니다. 그들은 도쿄를 정복할때 까지 전투를 멈추지 않을 것이라고 전했습니다."
 manchukou_wr.104.a:0 "할 수 있으면 해봐라!"