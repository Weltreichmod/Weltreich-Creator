l_korean:
 manchukou_wr.1.t:0 "춘절 대공세"
 manchukou_wr.1.d:0 "대동 19년 12월로 부터, 민국으로부터 넘어온 도적때가 만몽의 영토를 침범한지 1개월 남짓밖에 지나지 않았지만, 명분이 부족한 출병과, 안산전투에서 치명적인 손실을 입고 후퇴함으로서 불리한 상황에 놓이게 되었습니다. 이는 우리에게 매우 결정적인 기회이며 이 시기를 놓치게 된다면 도적때를 소탕하는데 큰 어려움을 겪게 될 것입니다. 이에 따라 만몽의 지휘관들은 춘철 대공세를 계획했으며 공세 계획에 따라 우리는 동북군과의 모든 전선을 따라 전방위적인 압력을 가할 것입니다."
 manchukou_wr.1.a:0 "돌격!"
 manchukou_wr.2.t:0 "몽골 사태 개입 결정"
 manchukou_wr.2.d:0 "소비에트군이 몽골로 진입한 이후, 국경 일대의 정세가 급속히 불안정해지고 있습니다. 만몽국 정부와 군부는 이번 사태가 단순한 국지적 충돌이 아니라, 만주와 몽골의 안전 보장을 위협하는 중대한 도전이라고 판단하고 있습니다.\n\n관측 보고에 따르면, 소련군은 블류헤르 장군의 독단적 명령 아래 북방 국경선을 넘어 진격을 계속하고 있으며, 그 여파로 지방 정착민과 행정 거점이 심각한 압박을 받고 있다고 합니다.\n\n만몽국 황정은 긴급 회의를 소집하여 대응 방안을 논의한 끝에, 더 이상 사태를 방관할 수 없다고 판단했습니다. 이에 따라 국경방위군과 기동기병사단이 몽골 방면으로 출동할 준비를 마치고 있습니다. 정부는 '국경 안정과 북방 질서 수호'를 명분으로 개입을 공식화했습니다.\n\n만몽국의 이번 결정은 지역 정세를 새로운 국면으로 이끌고 있으며, 주변국들은 그 향방을 예의주시하고 있습니다."
 manchukou_wr.2.a:0 "북방의 질서를 우리가 지킨다."
 manchukou_wr.3.t:0 "만몽의 상황"
 manchukou_wr.3.d:0 "만주-몽골 정부가 존재하는 궁극적인 목적은 중원으로 진출하여 중국을 재통일하는 것입니다. 이 목표는 만몽국의 존립 이유이자 모든 정책의 기준입니다.\n\n그러나 현재의 현실은 이 목표와 크게 어긋나 있습니다. 국제적 고립으로 외교와 무역이 제한되어 있으며, 무질서한 인구 유입과 민족 간 긴장, 마적과 단련의 난립이 내부 질서를 잠식하고 있습니다. 군대는 수적으로 방대하지만 지휘 체계와 전투력은 분산되어 있고, 귀족 특권은 개혁에 필요한 자원을 소모하고 있습니다. 이러한 상태에서는 중원 통일을 논하는 것 자체가 공허합니다.\n\n중원 통일이라는 목표를 현실로 만들기 위해서는 먼저 국가의 존립을 확보해야 합니다. 봉천을 중심으로 권력을 통합하고 내부 혼란을 정리하며 정치적·군사적 기반을 재건하는 것이 우리의 첫 목표가 되어야 할 것입니다."
 manchukou_wr.3.a:0 "할 일이 많다."
 manchukou_wr.4.t:0 "푸제 황제의 신년사"
 manchukou_wr.4.d:0 "건륭 20년의 새해를 맞아, 만주-몽골의 황제 푸제는 국가와 백성 앞에 서서 현 정세에 대한 인식과 앞으로의 방향을 천명하였습니다. 국가는 중원의 중심에서 멀리 떨어져 있으며, 대외적으로는 의심과 고립에 놓여 있고 대내적으로는 혼란과 불안이 누적되어 있습니다.\n\n그러나 황제는 지난 수십 년의 고난이 역사의 종말이 아니라 감내해야 할 시련임을 분명히 하였습니다. 질서를 회복하고 권위를 다시 세우며, 백성을 하나의 목적 아래 결속시키는 것이 지금의 과제임을 강조하였습니다. 이는 인내와 규율, 그리고 통합을 통해서만 달성될 수 있는 일입니다.\n\n이번 신년은 안일을 약속하는 시간이 아니라 준비의 시작으로 선포되었습니다. 앞길은 길고 험난하겠지만, 만주-몽골 국가는 존속하고 스스로를 강화하여 언젠가 남하하여 중국에서의 자리를 되찾아야 한다는 것이 황제의 뜻입니다."
 manchukou_wr.4.a:0 "황제 폐하 만세!"