 MAN_suppress_national_protection_head:0 "현재 §Y불만도§! : §Y[?MAN.MAN_suppress_national_protection_var]§!%"
 MAN_suppress_national_protection_text:0 "중화대륙으로 부터 청나라가 축출된지 불과 30년 만에 우리는 다시 산해관을 넘었습니다. 그러나 한족은 다시금 시작된 우리의 통치에 매우 큰 불만을 가지며 이에 반발하고 있습니다. 그들의 이러한 불만과 행동을 방치한다면 우리는 다시 무너질 수 밖에 없을 것입니다.\n\n§Y불만도§!는 매달 §R2.5%씩 증가§!하며 §Y호국운동§!을 완전히 제거하기 전까지 계속됩니다. §Y호국운동§!을 분쇄하기 위해서는 일정수준 이하로 §Y불만도§!를 관리하며 §Y호국운동§! 진압을 위한 §G디시전§!을 완료해야합니다."
 MAN_inc_national_protection_2_5_tt:0 "§Y불만도§!가 §R소폭 증가§!합니다."
 MAN_inc_national_protection_5_tt:0 "§Y불만도§!가 §R증가§!합니다."
 MAN_dec_national_protection_2_5_tt:0 "§Y불만도§!가 §G소폭 감소§!합니다."
 MAN_dec_national_protection_5_tt:0 "§Y불만도§!가 §G감소§!합니다."