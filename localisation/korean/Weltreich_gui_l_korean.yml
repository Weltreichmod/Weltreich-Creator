 war_situation_text:0 "주요도시 통제 현황\n베이징 : [GetSituationBJ]\n난징 : [GetSituationNJ]\n광저우 : [GetSituationGZ]"
 undercontrol:0 "§G통제중§!"
 outofcontrol:0 "§R상실함§!"
 system_info_text:0 "중화의 부와 영혼을 침탈하는 서구 제국주의 열강에 맞서는 대신 그들에게 맹종하며 제 잇속을 챙기기 바빴던 북경 한간 무리들의 전횡을 견디다 못한 무한(우한)과 남경의 인민들이 궐기하여 청천백일의 기치를 높게 들어올리며 '§2국민혁명§!'의 막이 올랐습니다.\n'§Y혁명의 열기§!'는 인민들이 '§2국민혁명§!'을 얼마나 지지하는지 를 나타냅니다.  §Y혁명의 열기§!가 높으면 높을수록 §2국민혁명§!을 완수하는데 도움이 되는 여려 효과를 얻을 수 있습니다.\n\n§Y혁명의 열기§!는 적으로 부터 주를 점령할시 §G상당히 증가§!하며 반대의 경우에는 §R상당히 감소§!하게 됩니다.\n시간에 따라서도 증가하며 §Y90일§!마다 §R감소§!할 것입니다."
 GFX_KMT_flag_effect:0 "§Y혁명의 열기§!를 통한 §G버프§! 또는 §R디버프§!는 국민정신 §Y혁명의 열기§!에서 확인할 수 있습니다."
 CHI_chinese_civil_war_morale:0 "§Y염전도§! : [GetStatusofmorale]"
 CHI_chinese_civil_war_morale_text:0 "호법정부는 현재의 충돌을 권력 투쟁이 아닌 헌정 질서를 둘러싼 투쟁으로 인식하고 있습니다. 남경의 움직임은 기존 정치 절차를 무시한 것으로 간주되며, 국가의 정통성이 위협받고 있습니다. 이에 따라 호법정부는 군사적 대응과 함께 정치적 정당성을 확보하려 하며, 전선과 후방의 통제 유지에 주력하고 있습니다.\n\n§Y염전도§!는 적으로 부터 주를 점령할시 §G상당히 감소§!하며 반대의 경우에는 §R상당히 증가§!하게 됩니다.\n시간에 따라서도 증가하며 §Y90일§!마다 §R증가§!할 것입니다."
 CHI_chinese_civil_war_bar_tt:0 "현재 §Y염전도§! : §Y[?CHI.CHI_chinese_civil_war_var]§!%"
 GetStatusofmorale_high:0 "§R높음§!"
