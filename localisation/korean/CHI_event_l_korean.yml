 kuomintag_wr.114.t:0 "화평건국"
 kuomintag_wr.114.d:0 "집무실 창밖으로 보이는 남경의 하늘은 지독하리만치 푸르렀다. 왕징웨이는 한참 동안 창가에 서서 멀리 흐르는 양쯔강의 유장한 물줄기를 바라보았다. 쑨원 선생께서 서거하신 이후 민국정신을 수호하여 선생의 유지를 받들기 위해 걸어온 영수로서의 고된 여정이 주마등처럼 뇌리를 스쳐 지나갔다. 호법을 자처하는 위선자들, 쥐새끼 같은 배신자 이종인과 패거리들...하지만 왕징웨이는 결코 대의를 꺾지 않았고, 열강에게 중화민족의 자존을 팔아넘기자는 소위 '이성적인' 노선 따위 집어치웠다. 외세에 굴복하지 않고 오직 중화의 힘으로 평화를 이룩하겠다는 신념, 쑨원이 지명한 계승자라는 책무는 언제나 버팀목처럼 그를 지탱해왔다.\n\n마침내 필생의 과업으로 삼고 매진해 왔던 화평건국의 정치가 결실을 맺는 순간이 도래했다. 외세에 영토를 구걸하고 실용이니 합의를 따지던 호법파가 무어라 했던가? 왕징웨이의 구상은 위험하고 급진적이다, 국민당은 전쟁광이다, 기초적인 외교론도 배우지 못한 무지렁이들이다...\n\n하지만 지금은 어떤가? 주권을 완전하게 수호한 상태에서 대내외적 안정을 확고히 다졌고, 국가를 재건해낸 것은 왕징웨이가 아니던가. 그동안 부서져 표류하는 쪽배와도 같았던 중화의 자본과 농민, 노동자를 위한 부조의 골격을 하나로 긴밀히 맞물려 본격적인 사회주의로의 이행을 세계 만방에 선포한 것도 왕징웨이가 아니던가. 서구의 맹목적인 사적 자본주의도, 소비에트 러시아의 파괴적인 계급 투쟁도 아닌 삼민주의의 '민생'을 대륙에 맞추어 완벽히 실현해낸 것도 그가 아니면 도대체 누가 할 수 있었을까?\n\n노사와 자본이 국가의 엄격하고 현명한 지도 아래 서로 손을 잡았고, 대륙의 모든 역량은 오직 민생과 발전이라는 단 하나의 목표를 향해 일사불란하게 결집하기 시작했다. 정당한 계승자로서 백성이 풍요로운 삶을 살 수 있게 하자는 민국정신을 완벽히 입증해 낸 것이다. 왕징웨이는 천천히 서명대 앞으로 걸어가 만년필을 쥐었다. 곧 새겨질 그의 이름과 함께 시작될 신세계가 선생이 꿈꾸었던 영원한 평화와 번영을 보장하는 기틀이 되리라 확신하며 그는 깊은 숨을 내쉬었다."
 kuomintag_wr.114.a:0 "쑨원 선생의 이상이 비로소 대지 위에 구현되었다."
 kuomintag_wr.115.t:0 "혁명은 계속된다"
 kuomintag_wr.115.d:0 ""참으로 좋구나!"\n왕징웨이는 그의 집무실에 가만히 앉아 청천 아래 밝게 빛나는 백일이 대지를 비추는 것을 올려다보았다.\n\n마침내 국민당 내부의 오랜 다툼이 끝나고 국민당은 비로소 하나로 통합되었다.\n불법 정부에 대항한 국민혁명이 승리로 끝을 맺고 내치 또한 안정되고 있다는 중요한 분기점으로 볼 수 있었다. 외세에 굴복하여 수많은 부패를 일삼고 대총통 선거에도 부정선거를 저지른 자들을 모두 쓸어내고 얻은 과실이었다.\n\n"아직 할 일이 많다..."\n\n하지만 여전히 많은 일이 그의 앞에 남아있었다.\n내전으로 황폐화된 중국을 다시 일으켜 세우고 중국에서 설치고 있는 외세를 모두 내쫓아 중국을 오로지 중국의 것으로, 중국을 오로지 인민의 것으로 만드는 것. 삼민주의에 입각한 새로운 중국을 건국하는 것. 그에게는 막중한 책임이 있었다. 쉴 틈은 없다. 그는 서둘러 펜을 들고 집무를 이어갔다."
 kuomintag_wr.115.a:0 "승자의 관."
 kuomintag_wr.116.t:0 "자식기언"
 kuomintag_wr.116.d:0 ""왕형이... 죽어...?"\n청천벽력 같은 소리에 장제스는 잠시 멍하니 허공을 바라보았다. 있을 수 없는 일이었다. 쑨원의 가장 유력한 후계자가 리쭝런 반역도당에 의해 무참히 살해당해 상하이 앞바다에 버려졌다는 소식은 그에게 있어 매우 충격적일 수밖에 없었다. 불순하고 부정부패를 일삼는 정부에 대항하여 혁명을 일으켰건만 돌아오는 것은 집안의 분열이라니. 있을 수 없었다.\n\n"더러운 기회주의자 놈들..."\n\n장제스는 분에 겨워 몸을 떨며 조용히 분노에 잠긴 욕지거리를 내뱉었다. 혁명이라는 대의에 뭉치기는커녕 제 사리사욕을 위해 혁명을 배반하다니. 총살해 마땅한 자들이었다. 왕징웨이를 지키지 못했다는 죄책감은 왕징웨이를 죽인 자들에 대한 복수심으로 치환되기 시작했다.\n가만히 있을 시간이 없었다. 그들을 이기기 위해서는 그들보다 빨리 움직여야 했다. 이 국민당을 이끌 이는 이제 자신밖에 남지 않았다. 다른 무능하고 우유부단한 행정 관료에게 일을 맡긴다면 작금의 사태와 같이 일을 그르치게 될 것이 뻔했다.\n\n그는 그의 어깨를 짓누르는 막중한 책임을 느꼈다."
 kuomintag_wr.116.a:0 "시간이 없다."
 kuomintag_wr.117.t:0 "비상대권 선포"
 kuomintag_wr.117.d:0 "중산함 사태로 왕징웨이가 암살당한 이후 군권을 장악하고 있던 장제스가 비상대권을 선포하며 국민당의 전권을 장악했습니다. 장제스는 대총통 자리를 공석으로 두고 계임대총통을 자처하며 국민당의 실질적인 최고 지도자가 되었습니다. 그는 왕징웨이와 함께 쑨원을 보필하던 핵심 측근 중 하나였으며, 쑨원 사후 당권을 장악한 왕징웨이를 보좌해 왔습니다. 그러나 왕징웨이가 리쭝런의 음모로 중산함에서 사망하자, 그는 비상사태임을 내세워 비상대권을 선포하였습니다.\n\n내전이 한창 진행되는 와중에 분열된 국민당을 과연 그가 잘 이끌어 갈 수 있을지 국민당과 중화의 인민들이 그를 바라보고 있습니다. 내전 중에 발생한 또 다른 내전 위기라는 초유의 사태에 그가 어떻게 대처할지는 두고 볼 일입니다."
 kuomintag_wr.117.a:0 "장제스라면 믿을 만할지도?"
 kuomintag_wr.118.t:0 "장제스 비상대권 선포"
 kuomintag_wr.118.d:0 "중화민국 총리 왕징웨이가 중산함에서 암살당했다는 전대미문의 비보 직후, 남경 정부는 유례없는 대혼란에 직면했습니다. 리쭝런 일파의 반역으로 시작된 당내 분열이 극에 달한 가운데, 군권을 쥐고 있던 총사령관 장제스가 결국 정국의 전면에 나섰습니다. 장제스는 대총통직을 공석으로 둔 채 계임대총통을 자처하며 비상대권을 선포했습니다. 쑨원과 왕징웨이를 보필하며 군부의 실력자로 자리 잡았던 그가 마지못해 당과 국가의 전권을 장악함에 따라, 국민당 내부의 권력 지형은 완전히 재편되었습니다. 스스로를 지도자가 아닌 군인으로 규정하는 이 위태로운 파수꾼이 과연 분열된 민국을 파멸에서 구해낼 수 있을지 전 세계가 주목하고 있습니다."
 kuomintag_wr.118.a:0 "혁명의 불길을 지켜내야 한다."
 kuomintag_wr.118.b:0 "중원에 더 큰 폭풍이 몰아치는군."
 kuomintag_wr.119.t:0 "보밀국"
 kuomintag_wr.119.d:0 "남경의 혼란상을 틈타 온갖 반동 무리가 고개를 들고 있는 지금, 더는 음성적인 청년 결사대 수준의 조직으로는 혁명의 유산을 온전히 보존할 수 없다는 결론이 내려졌습니다. 그동안 당과 군의 보이지 않는 방패 역할을 하던 남의사가 공식적으로 해체 및 재편되어, 중화민국의 정식 정보기관인 '보밀국'으로 출범합니다.\n\n이 새로운 국가 정보기관은 특정 개인에 대한 맹목적인 충성이 아닌, 오직 쑨원 선장과 서거한 왕 총통이 남긴 혁명 과업을 사수하는 것을 절대적인 교리로 삼을 것입니다. 보밀국의 감시망은 최전선의 군 장교단부터 남경 조정의 부패한 좌익 기회주의자들까지, 민국을 침해하는 모든 반혁명적 동향을 철저히 감시하고 통제할 공식적인 대권을 부여받았습니다. 혁명을 위협하는 모든 음모는 이제 법과 국가의 이름으로 처단될 것입니다."
 kuomintag_wr.119.a:0 "그림자 속에서 혁명을 사수하라."
 kuomintag_wr.120.t:0 "선군정치 선포"
 kuomintag_wr.120.d:0 "당과 국가의 모든 역량을 군대에 집중시키는 선군정치가 공식적으로 선포되었습니다. 현재 직면한 전대미문의 국가적 위기 상황과 내전의 위협을 극복하기 위해, 행정과 경제 및 사회 전반을 포함한 모든 국정 운영의 최우선 순위가 군사 부문으로 전면 재편됩니다. 모든 국가 자원은 최전선의 전력 강화와 군수 생산을 위해 최우선적으로 배정될 것이며, 민간 부문의 희생 역시 불가피해질 것입니다. 군대를 단순한 국방 조직을 넘어 국가를 이끌어가는 핵심 기둥이자 혁명의 전위대로 삼는 이 조치는 전 사회적인 사상적 무장과 함께 국가 전반에 거대한 변화를 불러올 것입니다. 이제 중화의 모든 인민과 조직은 군대의 전진과 혁명의 완수를 위해 모든 것을 바쳐야 하는 시대를 맞이했습니다."
 kuomintag_wr.120.a:0 "군사가 곧 국가다."
 kuomintag_wr.121.t:0 "정치장교단 배치"
 kuomintag_wr.121.d:0 "장제스 계임총통의 행정명령에 따라 군 내부에 정식으로 정치장교 제도가 도입되었습니다. 이들은 각 부대에 배치되어 장병들에게 국민혁명과 삼민주의 사상을 주입하고, 군 내부에서 암약하는 우익 반동 분자들과 군벌 잔당들의 동향을 철저히 감시할 것입니다. 고위 장교단 일각에서는 사상 통제가 군의 자율성을 침해한다고 우려하지만, 당과 혁명에 절대적으로 복종하는 군대를 건설하기 위해 정치장교의 확립은 필수적입니다. 이로써 군대는 사상적으로 무장한 혁명의 군대로 거듭나게 될 것입니다."
 kuomintag_wr.121.a:0 "사상으로 군을 무장시켜라."
 kuomintag_wr.122.t:0 "이념에 충실한 군대"
 kuomintag_wr.122.d:0 "삼민주의 국민혁명에 철저히 복종하는 군대를 건설하기 위한 사상 정화 작업이 마침내 결실을 맺었습니다. 과거 사리사욕을 탐하던 군벌의 잔재와 부패한 우익 반동 분자들은 장교단과 일선 부대에서 완전히 축출되었습니다. 이제 국민혁명군은 특정 군벌이나 개인의 안위가 아닌, 오직 쑨원 선장과 서거한 왕 총통이 남긴 신성한 혁명 과업과 노동자, 농민, 병사의 해방을 위해 복종하는 이념의 군대로 재탄생했습니다. 철저한 사상적 각성과 엄격한 규율로 무장한 장병들은 당의 지침을 절대적인 명령으로 받들며 전선과 후방을 가리지 않고 혁명의 적들을 궤멸시킬 준비를 마쳤습니다. 군부의 사상적 통일은 혁명 정국의 안정과 당의 통제력을 확고히 다지는 가장 강력한 기반이 될 것입니다."
 kuomintag_wr.122.a:0 "혁명 이념만이 군대의 유일한 지침이다."
 kuomintag_wr.123.t:0 "지방군의 병사 국민회의"
 kuomintag_wr.123.d:0 "각급 부대로 확대된 병사 위원회의 영향력이 마침내 변방의 지방군과 구 군벌 세력의 장병들에게까지 침투하기 시작했습니다. 이들은 중앙의 삼민주의 국민혁명 노선에 호응하여 자신들을 억압하던 구태의연한 장교들을 고발하고, 하급 병사들이 주축이 되는 '지방군의 병사 국민회의'를 소집했습니다. 기존 군벌 성향의 고위 장교단은 당의 이러한 조치가 군의 위계질서를 무너뜨린다며 강하게 반발하고 있으나, 억압받던 수많은 하급 병사들은 열렬한 지지를 보내며 국민혁명군의 정식 일원으로 합류하기를 갈망하고 있습니다."
 kuomintag_wr.123.a:0 "하층 장병들을 혁명의 품으로 받아들여라."
 kuomintag_wr.124.t:0 "전민혁명 선언"
 kuomintag_wr.124.d:0 "군대와 노동자, 농민을 포함한 전국의 모든 인민이 하나로 뭉치는 전민혁명이 공식적으로 선언되었습니다. 삼민주의 국민혁명의 기치 아래 사회의 모든 모순과 구시대적 적폐를 타파하기 위한 전면적인 대변혁이 시작됩니다. 이제 인민은 단순한 통치 대상이 아닌 공화국의 진정한 주권자로서 역사에 동참할 것이며, 당과 군은 인민의 거대한 지지를 바탕으로 그 어떤 내외세의 위협에도 흔들리지 않는 무적의 기반을 완성했습니다. 중화의 대지에 혁명의 완전한 승리가 도래했습니다."
 kuomintag_wr.124.a:0 "새로운 공화국의 기틀이 완성되었다."
 kuomintag_wr.125.t:0 "신국민운동 제창"
 kuomintag_wr.125.d:0 "장제스 계임총통은 오랜 호법 정부의 폭정과 사회적 혼란 속에서 인민들의 도덕성이 극도로 타락하고 국가적 규율이 마비되었다고 진단했습니다. 비위생적인 생활 습관, 사회 전반에 만연한 부패, 극단적인 이기주의와 공공정신의 결여는 민국의 전진과 국민혁명의 완수를 가로막는 가장 큰 내부의 걸림돌입니다. 이에 장 계임총통은 전통적인 사유삼화의 도덕적 가치를 현대적인 군사 규율 및 합리적인 생활 방식과 결합한 '신국민운동'을 전 국가적으로 전개할 것을 공식 선포했습니다. 이 운동은 인민의 정신과 신체, 그리고 일상생활을 근본적으로 개조하여 후방의 안정력을 확보하고, 어떠한 외부의 침략과 내부의 반동 책동에도 흔들리지 않는 강력한 국가적 단결력을 구축하는 핵심 토대가 될 것입니다."
 kuomintag_wr.125.a:0 "철저한 개혁으로 신국민을 양성하라."
 kuomintag_wr.126.t:0 "예"
 kuomintag_wr.126.d:0 "장제스 계임총통은 신국민운동의 핵심 과제로서 '예'를 사회 전반에 전면적으로 도입하겠다는 강력한 의지를 표명했습니다. 오랜 호법 정부의 폭정으로 인해 현재 민국의 후방 사회는 공공질서의 극심한 마비, 비위생적인 악습, 그리고 도덕적 무질서가 임계점에 달한 상태입니다. 공공장소에서의 무질서한 행태와 기본적인 위생 관념의 부재, 타인을 존중하지 않는 이기적인 풍조는 단순한 개인의 습관 문제를 넘어 국가의 기강을 내부에서부터 좀먹고 국민혁명의 대외적 위신을 심각하게 추락시키는 근본적인 원인으로 지목되었습니다. 장 계임총통은 이러한 구태의연한 폐단을 완전히 타파하고 중화민족을 근대적이고 조직화된 신국민으로 개조하기 위해서는 사회적 규범과 질서의 법도인 '예'를 국가적 차원에서 반드시 도입해야 한다고 강조했습니다. 이 조치는 인민들 스스로가 공공의 규칙을 철저히 준수하고 공동체에 대한 사회적 책임을 자각하게 만듦으로써, 극심한 혼란 속의 후방 정국을 안정시키고 당의 일사불란한 행정 통제력을 확립하기 위한 필수불가결한 선택입니다. 당과 정부는 향후 대대적인 계도와 단속을 통해 인민의 일상생활을 뿌리부터 쇄신하고 혁명의 가장 견고한 도덕적 기반을 다져나갈 것입니다."
 kuomintag_wr.126.a:0 "질서가 바로 선 민국을 건설하라."
 kuomintag_wr.127.t:0 "의"
 kuomintag_wr.127.d:0 "장제스 계임총통은 신국민운동의 핵심 과제로서 '의'를 국가 공동체의 최상위 가치로 도입하기 위한 전면적인 계획을 발표했습니다. 오랜 세월 동안 이어진 사회적 혼란과 부패 속에서 인민들 사이에는 오직 개인의 안위와 가문의 이익만을 탐하는 이기주의와 냉소주의가 깊게 자리 잡았습니다. 국가가 위기에 처했음에도 불구하고 탈세를 일삼거나 병역을 기피하고, 사리사욕을 위해 공동체의 안전을 해치는 행위는 국민혁명의 완수를 가로막는 가장 치명적인 내부의 적으로 규정되었습니다. 장 계임총통은 반혁명 우익 세력과 잔당, 그리고 외세의 위협에 맞서 민국을 수호하기 위해서는 인민들이 개인의 영달을 버리고 국가와 대의를 위해 기꺼이 헌신하는 '의'의 정신을 반드시 체득해야 한다고 역설했습니다. 올바른 정의와 사회적 의리를 뜻하는 '의'를 도입함으로써, 인민들에게 민국과 혁명에 대한 신성한 의무를 자각시키고 국방과 전시 생산에 자발적으로 동참하는 애국적 풍토를 조성해야만 이 거대한 위기를 극복할 수 있습니다. 당은 이 가치를 인민의 가슴속에 심어주어 사리사욕을 배격하고 공공의 이익을 위해 목숨까지 바칠 수 있는 강력한 혁명적 결속력을 구축할 준비를 하고 있습니다."
 kuomintag_wr.127.a:0 "공공의 정의와 의리를 다하라."
 kuomintag_wr.128.t:0 "염"
 kuomintag_wr.128.d:0 "장제스 계임총통은 신국민운동의 핵심 과제로서 '염'을 민국의 새로운 행동 강령으로 공포했습니다. 수십 년간 이어진 내전과 부패한 관료주의는 민국의 행정적 기초를 갉아먹는 가장 큰 해악이었습니다. 사리사욕을 앞세운 공직자들과 기업가들은 국가의 이익보다 자신의 주머니를 채우는 데 급급했으며, 이는 국민들의 불신을 키우고 혁명의 대의를 훼손했습니다. 청렴함과 부정에 물들지 않는 숭고한 마음을 뜻하는 '염'은 단순한 도덕적 수사가 아닌, 공직 사회와 민간 전반에 걸쳐 공정하고 투명한 질서를 확립하기 위한 필수적인 가치입니다. 장 계임총통은 이러한 고질적인 병폐를 완전히 척결하고 중화민족의 정신을 근본적으로 개조하기 위해 '염'을 국가적 차원에서 반드시 도입해야 한다고 강조했습니다. 이 조치는 모든 국민들이 부정부패를 배척하고 국가를 위해 정직하게 봉사하는 풍토를 조성하여, 민국의 도덕적 결속력을 강화하고 국민혁명의 깨끗하고 공정한 이미지를 완성하기 위한 결단입니다. 당은 이 가치를 인민의 가슴속에 심어주어 공정한 사회를 구축할 준비를 하고 있습니다."
 kuomintag_wr.128.a:0 "청렴한 관직과 깨끗한 사회를 구축하라."
 kuomintag_wr.129.t:0 "치"
 kuomintag_wr.129.d:0 "장제스 계임총통은 신국민운동의 핵심 과제로서 '치'를 국가 공동체의 최상위 가치로 도입하기 위한 전면적인 계획을 발표했습니다. 오랜 세월 동안 이어진 사회적 혼란과 도덕적 마비 속에서 인민들 사이에는 오직 개인의 안위와 가문의 이익만을 탐하는 이기주의와 도덕적 냉소주의가 깊게 자리 잡았습니다. 국가가 위기에 처했음에도 불구하고 탈세를 일삼거나 병역을 기피하고, 사리사욕을 위해 공동체의 안전을 해치는 행위를 하면서도 부끄러움을 느끼지 못하는 풍토는 국민혁명의 완수를 가로막는 가장 치명적인 내부의 적으로 규정되었습니다. 자신의 잘못을 부끄러워하고 도덕적 양심을 지키는 마음을 뜻하는 '치'는 단순한 개인의 양심 문제가 아닌, 사회 구성원들이 도덕적 자각을 통해 자신의 행동을 통제하고 사회적 책임을 다하도록 유도하는 핵심 기제입니다. 장 계임총통은 반혁명 세력과 외세의 위협에 맞서 민국을 수호하기 위해서는 인민들이 사리사욕에 빠져 도덕적 양심을 버리는 것을 스스로 부끄럽게 여기는 '치'의 정신을 반드시 체득해야 한다고 역설했습니다. 이 가치를 인민의 가슴속에 심어주어 도덕적 자각을 통해 사리사욕을 배격하고 공공의 이익을 위해 헌신할 수 있는 강력한 혁명적 결속력을 구축할 준비를 하고 있습니다."
 kuomintag_wr.129.a:0 "도덕적 자각으로 혁명을 수호하라."
 kuomintag_wr.130.t:0 "계몽"
 kuomintag_wr.130.d:0 "장제스 계임총통은 사유삼화에 기반한 신국민운동의 핵심 정신적 기둥으로서 인민의 '계몽'을 전 국가적 의제로 선포했습니다. 오랜 호법 정부의 폭정과 사회적 혼란 속에서 인민들의 지적 수준은 크게 퇴보했으며, 구시대적인 미신과 비합리적인 관습이 여전히 사회 기저를 지배하고 있습니다. 민국의 전진과 국민혁명의 완수를 가로막는 이 무지와 문맹을 타파하지 않고서는 진정한 근대 국가로의 개조는 불가능합니다. 이에 당과 정부는 문해율 향상을 위한 전국적인 야간 학교 개설, 근대적 위생 관념 주입, 그리고 비합리적 악습 타파를 위한 계도 캠페인을 대대적으로 전개할 계획입니다. 인민의 이성을 일깨우는 이 대대적인 정신 개조 운동은 전 국민을 조직화된 민국의 신공민으로 양성하는 가장 견고한 토대가 될 것입니다."
 kuomintag_wr.130.a:0 "지식을 전파하고 이성을 일깨워라."
 kuomintag_wr.131.t:0 "충정"
 kuomintag_wr.131.d:0 "장제스 계임총통은 신국민운동의 또 다른 도덕적 지주이자 공민들이 갖추어야 할 최고의 미덕으로서 '충정'의 가치를 전면에 내세웠습니다. 개인주의와 이기주의, 그리고 가문의 이익만을 탐하는 구태 속에서 국가와 공동체에 대한 헌신 정신은 극도로 마비된 상태였습니다. 반혁명 반동 세력과 외세의 위협에 맞서 삼민주의 민국을 수호하기 위해서는 오직 국가와 국민혁명에 전적으로 복종하고 헌신하는 충정이 필수적입니다. 인민들은 사리사욕을 과감히 배격하고 국가적 대의를 위해 자신을 희생할 줄 아는 강력한 결속력을 갖추어야 합니다. 당은 군사 규율에 준하는 엄격한 규범을 후방 사회 전반에 도입하여, 국가에 대한 절대적인 충성과 혁명 정신을 인민의 가슴속에 깊이 아로새길 것입니다."
 kuomintag_wr.131.a:0 "민국과 혁명에 영원한 충성을 다하라."
 kuomintag_wr.132.t:0 "여성 해방위원회 출범"
 kuomintag_wr.132.d:0 "장제스 계임총통과 당 지도부는 중화민족의 근대적 각성과 총력전 수행 능력의 극대화를 위해 '여성 해방위원회'의 공식 출범을 공포했습니다. 그동안 민국의 여성들은 유교적 악습과 가부장적인 전습, 그리고 전족과 같은 구시대적 사슬에 묶여 사회적, 경제적 활동에서 철저히 소외되어 왔습니다. 인구의 절반을 차지하는 여성들이 무지와 억압 속에 방치되어 있는 한, 삼민주의가 표방하는 공평한 사회는 물론이고 외세와 반혁명 세력에 맞설 강력한 국가 구축은 불가능하다는 것이 당 지도부의 판단입니다.\n\n이번 조치에 따라 여성 해방위원회는 민국 전역의 여성들을 대상으로 대대적인 문해 교육과 근대적 보건위생 지식 보급에 착수할 것입니다. 나아가 공장과 행정 기구, 준군사 조직에 여성이 참여할 수 있도록 법적, 제도적 기반을 마련하고, 가부장적 악습을 조장하는 구시대적 혼인 관습을 철저히 단죄할 예정입니다.\n\n보수적인 지방 유림과 일부 전통주의 세력은 가문의 질서를 무너뜨리는 급진적인 조치라며 거세게 반발하고 있으나, 당의 의지는 단호합니다. 여성의 지위 향상과 사회적 해방은 단순한 시혜적 조치가 아니라, 민국의 인적 자원을 한계까지 동원하여 총력전 체제를 완성하기 위한 필수 불가결한 국가적 결단입니다. 이제 민국의 여성들은 구시대의 족쇄를 벗어던지고, 청천백일기 아래에서 당당한 공민으로서 민족의 미래를 함께 짊어질 준비를 마쳤습니다."
 kuomintag_wr.132.a:0 "구습의 족쇄를 부수고 신공민으로 거듭나라."
 kuomintag_wr.133.t:0 "전국적인 국기 게양식"
 kuomintag_wr.133.d:0 "장제스 계임총통이 선포한 사회 군사화 법령이 민국 전역에서 전면 가동됨에 따라, 모든 도시와 부락, 행정 기구는 물론 전국의 학교와 공장에 이르기까지 예외 없이 매일 아침 청천백일만지홍기를 향한 경례와 엄숙한 국기 게양식이 의무화되었습니다. 동이 트는 이른 아침마다 민국의 하늘을 울리는 날카로운 나팔 소리에 맞추어, 인민들은 남녀노소를 가리지 않고 일사불란하게 광장으로 모여 군대식 대열을 정비합니다. 이들은 엄숙한 침묵 속에서 올라가는 국기를 우러러보며 국가를 제창하고, 정해진 규율에 따라 신체를 단련하며 국가와 국민혁명에 대한 자신들의 신성한 의무를 되새기고 있습니다.\n\n물론 일각에서는 일상의 매 순간을 규제하고 개인의 사생활을 극단적으로 통제하는 조치라며 숨죽인 불만과 불평이 제기되기도 합니다. 특히 급격한 생활 방식의 변화에 적응하지 못한 일부 민간 계층은 매일 반복되는 집단적 규율에 피로감을 호소하고 있습니다. 그러나 외세의 위협과 내부의 반혁명 책동이 지속되는 전시에 준하는 위기 정국 속에서, 이러한 일상적인 군사 질서 수립은 더 이상 미룰 수 없는 국가적 과제라는 것이 당 지도부의 확고한 신념입니다.\n\n이 철저한 집단화 과정을 통해 민국의 인민들은 파편화된 개인에서 벗어나, 국가의 부름에 언제든 응할 수 있는 강력한 애국적 기틀 아래 결속되고 있습니다. 매일 아침 전국을 뒤흔드는 청천백일기 아래의 군사적 질서는 민국의 결속력을 강화하고 국민혁명의 깨끗하고 공정한 이미지를 완성하기 위한 강력한 기반으로 자리 잡아가고 있습니다."
 kuomintag_wr.133.a:0 "국기 아래 전 인민이 단결하라."
 kuomintag_wr.134.t:0 "항전건국"
 kuomintag_wr.134.d:0 "집무실 창밖으로 보이는 대륙의 하늘은 지독하리만치 푸르렀다. 장제스는 한참 동안 창가에 서서 멀리 흐르는 강줄기와 견고하게 구축된 방어선을 바라보았다. 쑨원 선생께서 서거하신 이후 민국정신을 수호하여 선생의 유지를 받들기 위해 걸어온 영수로서의 고된 여정이 주마등처럼 뇌리를 스쳐 지나갔다. 호법을 자처하며 분열을 조장하는 위선자들, 혁명의 대의를 망각한 반동 세력들... 하지만 장제스는 결코 대의를 꺾지 않았고, 적당히 타협하여 중화민족의 자존을 팔아넘기자는 소위 '이성적인' 노선 따위 집어치웠다. 외세와 반동의 위협에 결코 굴복하지 않고 오직 우리 자신의 힘으로 조국을 수호하며 건설하겠다는 신념, 혁명의 정당한 계승자라는 책무는 언제나 버팀목처럼 그를 지탱해왔다.\n\n마침내 필생의 과업으로 삼고 매진해 왔던 항전건국의 정치가 결실을 맺는 순간이 도래했다. 침략자들 앞에 영토를 구걸하고 패배주의에 찌들어 실용이니 합의를 따지던 유약한 자들이 무어라 했던가? 장제스의 총력전 구상은 위험하고 급진적이다, 국민당은 전 국민을 사지로 모는 전쟁광들이다, 전쟁 통에 국가를 건설하겠다는 것은 망상에 불과하다...\n\n하지만 지금은 어떤가? 침략자와 반혁명 세력의 포화 속에서도 대내외적 결속을 확고히 다졌고, 전선의 총칼과 후방의 망치를 하나로 묶어 국가를 재건해낸 것은 장제스가 아니던가. 그동안 부서져 표류하는 쪽배와도 같았던 중화의 인민들을 사유삼화와 신국민운동의 엄격한 규율 아래 긴밀히 맞물려, 전 국민이 조직화된 신공민으로서 저항하는 총력전의 골격을 세계 만방에 선포한 것도 장제스가 아니던가. 서구의 유약한 방임주의도, 파괴적인 계급 투쟁도 아닌 삼민주의의 '민생'과 '민족'을 전시 상황에 맞추어 완벽히 실현해낸 것도 그가 아니면 도대체 누가 할 수 있었을까?\n\n학교와 공장, 농촌과 군대가 국가의 엄격하고 현명한 지도 아래 서로 손을 잡았고, 대륙의 모든 역량은 오직 항전과 건국이라는 단 하나의 목표를 향해 일사불란하게 결집하기 시작했다. 정당한 계승자로서 백성과 조국을 사수하자는 민국정신을 완벽히 입증해 낸 것이다. 장제스는 천천히 서명대 앞으로 걸어가 만년필을 쥐었다. 곧 새겨질 그의 이름과 함께 시작될 신세계가 선생이 꿈꾸었던 영원한 평화와 승리, 그리고 번영을 보장하는 기틀이 되리라 확신하며 그는 깊은 숨을 내쉬었다."
 kuomintag_wr.134.a:0 "총칼과 망치 위에 민국의 신세계가 세워질 것이다."
 kuomintag_right_wr.1.t:0 "물밑 투쟁"
 kuomintag_right_wr.1.d:0 "정변의 불길이 가라앉은 뒤 출범한 국민당 우파 정부는 겉보기에 더할 나위 없이 공고해 보입니다. 당의 적통을 자처하는 후한민이 임시 대총통의 자리에 올랐고, 막강한 군권을 틀어쥔 리종런이 육해군 총사령관에 취임하며 이 두 영수가 완벽한 협력 관계를 구축한 것처럼 연출되고 있기 때문입니다. 그러나 남경의 집무실 밑바닥에서 요동치는 실상은 대외적인 선전과 전혀 다릅니다. 이들은 새롭게 들어선 임시정부의 주도권을 완전히 장악하고 상대를 정계에서 축출하기 위해 보이지 않는 곳에서 치열한 권력 투쟁을 벌이고 있습니다. 당 정통성을 내세운 정통파와 물리적 실력을 거머쥔 신계계의 대립은 이미 돌이킬 수 없는 강을 건넜습니다. 대륙 전역에서 내전의 포성이 한창 울려 퍼지는 긴박한 시국일지라도 권력을 향한 정치적 암투는 단 하루도 쉴 수 없는 법입니다. 서산회의파와 정학회 등 저울의 추를 쥘 주변 세력들을 더 빠르고 더 확실하게 포섭하는 자만이, 마침내 도래할 새로운 국민당 정부의 옥좌를 차지하고 중원의 진정한 지배자로 군림하게 될 것입니다."
 kuomintag_right_wr.1.a:0 "후한민이야말로 진정한 쑨원의 후계자이다."
 kuomintag_right_wr.1.b:0 "리종런의 강력한 힘이 중원을 평화롭게 하리라."
 kuomintag_right_wr.2.t:0 "권력투쟁의 결착"
 kuomintag_right_wr.2.d:0 "임시정부 출범 이래 물밑에서 치열하게 전개되던 국민당 우파 내부의 암투가 마침내 그 끝을 맺었습니다. 각 파벌의 세력 판도를 정밀하게 저울질하고 원외 세력들의 지지 성향을 종합하여 평균을 내어본 결과, 정국의 향방을 결정지을 최종적인 승자가 수면 위로 드러났습니다. 한 세력이 완벽한 주도권을 쥐고 남경 정부의 실권을 장악함에 따라, 경쟁에서 패배한 영수는 권력의 중심부에서 완전히 밀려나 명목상의 지위만을 유지하는 허수아비 신세로 전락하게 되었습니다. 이 오랜 정치적 진통을 끝으로 내부 전열을 재정비한 국민당 임시정부는, 이제 단일화된 지도체제 아래 중원 패권을 가로막는 전선의 적들을 향해 총구의 방향을 일제히 정렬하기 시작했습니다."
 kuomintag_right_wr.2.a:0 "후한민이 승리하였다!"
 kuomintag_right_wr.2.b:0 "리쭝런이 권력을 잡았다!"
 kuomintag_right_wr.3.t:0 "국산화 계획의 결실"
 kuomintag_right_wr.3.d:0 "해외 수입품에 의존하던 핵심 산업 자재와 군수물자의 자체 생산 전환 작업이 마침내 성공적으로 궤도에 올랐습니다. 초기 공정 전환 과정에서 발생했던 극심한 생산 차질과 기술적 시행착오는 가시적인 국산화 성과 앞류 완전히 상쇄되었습니다. 이제 전국의 주요 공장들은 외부 공급선이 차단된 극한의 상황 속에서도 독자적으로 장비를 찍어낼 수 있는 내구성을 갖추게 되었습니다. 기술적 자립을 완수해낸 현장의 엔지니어들과 노동자들의 사기는 하늘을 찌를 듯 높으며, 임시정부는 이 견고한 공업 기반을 바탕으로 중원 통일을 위한 장기 항전 체제를 더욱 확고히 이어갈 것입니다."
 kuomintag_right_wr.3.a:0 "위대한 경제적 자립을 달성하다!"
 kuomintag_right_wr.4.t:0 "대상단 회의"
 kuomintag_right_wr.4.d:0 "중국 광저우와 주강을 중심으로 하는 지역은 수 많은 상단과 기업, 기업가들이 활동하고 있습니다. 이들은 일찍이 대상단을 형성하여 경제적 자주성을 가지고자 하였으며 중국 남부에서 막강한 재정적 영향력을 끼치고 있습니다. 천롄보를 회장으로 하는 대상단의 영향력은 우리에게 경제적으로 긍정적으로 영향을 줄것이나 동시에 정치적으로 부담이 될 것입니다. 따라서 우리는 이 영향력을 적절히 조절해야 할 것입니다."
 kuomintag_right_wr.4.a:0 "알았다."
 kuomintag_right_wr.5.t:0 "광동 민행 설립"
 kuomintag_right_wr.5.d:0 "광동 지역의 대기업과 상단들이 주도하는 민간은행들의 설립이 공식 승인되었습니다. 이 은행들은 국가 금융의 보조 역할을 수행하며, 정부가 직접 자금을 투입하지 않고도 민간 자본을 동원해 대륙의 경제를 활성화하는 데 크게 기여할 것입니다. 하지만 이들에게 과도한 금융 자율성을 부여하는 것은 장기적으로 정권의 통제력을 약화시킬 위험도 존재합니다. 우리는 이들의 자본력을 적극적으로 수용하여 재정의 활로를 열어갈 것입니다."
 kuomintag_right_wr.5.a:0 "민간 금융의 활성화를 환영한다."
 kuomintag_right_wr.6.t:0 "조세개혁 단행"
 kuomintag_right_wr.6.d:0 "대륙의 방만하고 복잡했던 기존 세제를 전면적으로 정비하는 조세개혁안이 통과되었습니다. 새로운 징세 체계는 부조리한 탈세를 근절하고, 국가 운영과 장기적인 항전을 뒷받침할 안정적인 국고 수입을 보장할 것입니다. 비록 초기에는 갑작스러운 세제 변화로 인해 일부 상단과 중산층의 반발이 예상되지만, 이는 강력한 국가 재정을 건설하기 위해 반드시 거쳐야 할 과정입니다."
 kuomintag_right_wr.6.a:0 "재정의 근간을 바로 세울 것이다."
 kuomintag_right_wr.7.t:0 "공검저축운동의 전개"
 kuomintag_right_wr.7.d:0 "정부가 추진한 범국가적 저축 독려 정책인 공검저축운동이 대륙 전역에서 시작되었습니다. 노동자들과 대중은 근면과 절약을 미덕으로 삼아 일상적인 소비를 절제하고 있으며, 이들이 금융기관에 예치한 막대한 민간 잉여 자금은 고스란히 국가의 재정적 원동력으로 전환 될 것으로 보입니다. 소비 위축으로 인한 단기적인 내수 침체 우려가 일부 제기되기도 했으나, 이 자본들이 국책 사업과 주요 군수 산업으로 집중되면서 대륙의 공업 기반은 그 어느 때보다 빠르게 팽창할 것입니다. 국민들의 땀방울과 절약 정신이 국가 번영의 든든한 주춧돌이 될 것입니다."
 kuomintag_right_wr.7.a:0 "저축은 곧 국력이다."
 kuomintag_right_wr.8.t:0 "종인웨건"
 kuomintag_right_wr.8.d:0 "정부가 추진해 온 국민자동차 보급 계획의 첫 결과물인 '종인웨건'이 마침내 공장 라인에서 모습을 드러냈습니다. 대중에게 저렴하고 실용적인 차량을 보급하겠다는 명분 아래 생산된 이 차량은, 무모한 국책 사업이라는 정계와 학계의 우려에도 불구하고 대중의 폭발적인 관심을 끌고 있습니다. 비록 기술적 한계와 조악한 마감에 대한 비판이 일부 존재하지만, 거리에 굴러다니기 시작한 종인웨건은 남경 정부의 공업 생산력과 근대화 성과를 과시하는 가장 완벽한 선전 도구로 자리매김하고 있습니다."
 kuomintag_right_wr.8.a:0 "대륙의 도로를 우리의 자동차로 채워라."
 kuomintag_right_wr.9.t:0 "어음 돌려막기"
 kuomintag_right_wr.9.d:0 "시장에 발행되었던 상업승인어음들의 만기가 점차 다가오면서 금융망 내부에서 미미한 잡음이 발생하고 있습니다. 당장 현금 흐름이 막힌 일부 상단과 기업들은 만기 어음을 상환하기 위해 새로운 어음을 발행하여 기존 대금을 넘기는 이른바 '어음 돌려막기'를 시도하기 시작했습니다. 아직은 대규모 연쇄 도산이나 파국을 우려할 만한 수준은 아니며, 금융 시장 역시 이러한 임시방편을 통해 표면적인 안정성을 유통성 있게 유지하고 있습니다. 그러나 신용으로 신용을 메우는 구조가 조금씩 자리를 잡아가면서, 관료들과 경제 전문가들 사이에서는 장기적인 리스크를 경계해야 한다는 목소리가 조심스럽게 흘러나오고 있습니다."
 kuomintag_right_wr.9.a:0 "우선은 시장의 유동성을 유지해야 한다."
 kuomintag_right_wr.10.t:0 "종인웨건의 결함 사태"
 kuomintag_right_wr.10.d:0 "무리한 대량 생산과 조악한 공정 관리의 부작용이 결국 수면 위로 드러나고 말았습니다. 대중에게 대대적으로 보급되던 국민자동차 '종인웨건'에서 엔진 과열, 차축 파손, 제동 장치 결함 등 운행에 치명적인 불량 사례가 대량으로 보고되기 시작했습니다. 거리 곳곳에 고장으로 멈춰 선 차량들과 분노한 차주들의 거센 항의는 정부가 쌓아 올린 근대화 선전에 심각한 타격을 입히고 있습니다. 기술적 완성도를 도외시한 채 실적에만 급급했던 대가가 부메랑이 되어 돌아온 지금, 우리는 재정을 투입해 전량 수습에 나서거나 언론을 통제해 사태를 무마해야 하는 기로에 섰습니다."
 kuomintag_right_wr.10.a:0 "싸게 구매했으면 된 거 아닌가?"
