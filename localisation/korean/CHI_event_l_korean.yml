 kuomintag_wr.112.t:0 "사법원의 위헌법률심사권 위상"
 kuomintag_wr.112.d:0 "민국의 법치주의를 완성할 최고 사법 기구인 사법원의 권한을 두고 최종적인 정립 작업이 진행 중입니다. 핵심 쟁점은 사법원에 정부의 법률과 명령을 전면 무효화할 수 있는 독점적인 위헌법률심사 지위를 부여할 것인가 여부입니다. 사법 독립과 인권 보장을 중시하는 법조계 원로들은 사법부의 결정이 최종적인 법적 구속력을 가져야 한다고 주장합니다. 반면 당권파와 집행부 측은 사법부의 해석을 단순한 의견 제시로 제한하고, 최종적인 법률 무효화 권한은 전 인민을 대변하는 국민대회나 오원 합동회의로 넘겨야 한다며 맞서고 있습니다."
 kuomintag_wr.112.a:0 "사법원에 법률과 명령을 전면 무효화할 수 있는 독점적 위헌법률심사 지위를 부여한다."
 kuomintag_wr.112.b:0 "사법원의 해석은 의견 제시로 제한하고, 최종 법률 무효화 권한은 국민대회나 오원 합동회의로 넘긴다."
 kuomintag_wr.113.t:0 "사법행정권의 관할권 귀속 분쟁"
 kuomintag_wr.113.d:0 "법원의 인사, 예산, 조정을 담당하는 사법행정권의 관할권을 두고 사법원과 행정부 법무부가 정면으로 충돌했습니다 사법부는 사법행정권을 사법원 직속으로 일원화하여 행정부의 외압으로부터 완전한 독립 지위를 달성해야만 공정한 재판과 법통 수호가 가능하다고 강력히 요구합니다. 그러나 행정원의 집행파들은 법무부를 통한 행정원의 사법 행정 관할을 인정하여 정부의 일체화된 통제력을 유지하는 것이 국가 비상시 정국 안정과 일사불란한 치권 집행에 필수적이라고 반박합니다."
 kuomintag_wr.113.a:0 "사법행정권을 사법원 직속으로 일원화하여 행정부로부터의 완전한 독립 지위를 달성한다."
 kuomintag_wr.113.b:0 "법무부를 통한 행정원의 사법 행정 관할을 인정하여 정부의 일체화된 통제력을 유지한다."
