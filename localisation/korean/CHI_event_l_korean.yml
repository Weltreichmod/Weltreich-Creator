 china_wr.305.t:0 "알마아타-타슈켄트 일대일로 참여 제안"
 china_wr.305.d:0 "중화민국 정부가 유라시아의 번영을 목표로 추진 중인 거대 국책 사업, '일대일로' 계획에 우리 국가를 정식 초청했습니다. 중화민국과 우리정부의 공동 투자를 통해 우리 영토를 관통하는 주요 교통망과 항만 인프라에 막대한 자본을 투자하고, 통상 절차를 간소화하여 양국의 공동 번영을 이룩하자고 제안해 왔습니다. 이 제안은 장기적으로 막대한 이익을 우리에게 가져 줄 것이며 대부분의 경우에 있어서 우리에게 이득이 될 것입니다. 민국의 거대한 신실크로드 구상에 동참할 것인지, 아니면 독자적인 노선을 고수할 것인지 선택해야 합니다."
 china_wr.305.a:0 "대륙의 공동 번영을 위하여!"
 china_wr.305.b:0 "참여하지 않을 것이다."
 china_wr.306.t:0 "[FROM.GetName]의 일대일로 구상 승인"
 china_wr.306.d:0 "우리가 발송한 일대일로 협력 제안을 [FROM.GetName] 정부가 공식적으로 수락했다는 승인 통보가 도착했습니다. 그들은 공동 투자와 인프라 확충이 가져올 경제적 시너지에 큰 기대감을 표명하며, 민국 중심의 새로운 물류망에 전격 동참하기로 결의했습니다. 이번 동맹으로 대륙과 해양을 하나로 묶는 신실크로드 건설은 한층 더 확고한 탄력을 받게 되었습니다. 이제 공동 자본을 투입하고 해당 국가의 영토를 관통하는 철도와 도로, 항만을 부설하기 위한 실무 절차를 즉각 개시해야 합니다."
 china_wr.306.a:0 "새로운 협력의 장이 열렸다."
 china_wr.307.t:0 "[FROM.GetName]의 일대일로 구상 거절"
 china_wr.307.d:0 "안타깝게도 [FROM.GetName] 정부는 우리의 일대일로 협력 구상을 최종적으로 거절했습니다. 그들은 자본 투입에 따른 재정적 부담과 주권 침해 우려를 이유로 들었으나, 실질적으로는 민국의 거대한 경제적 영향력이 자국 내로 깊숙이 침투하는 것을 경계한 선택으로 보입니다. 이번 거절로 인해 해당 경로를 통해 유라시아를 하나로 연결하려던 우리의 거대 인프라 계획은 일부 차질이 불가피해졌습니다. 신실크로드의 완전한 연결을 위해서 우리는 이 외교적 교착 상태를 해결할 우회 경로를 찾거나 새로운 대안을 모색해야 합니다."
 china_wr.307.a:0 "다른 방도를 찾아야 할 것이다."
 china_wr.308.t:0 "[FROM.GetName]의 거절로 방해받은 일대일로"
 china_wr.308.d:0 "안타깝게도 [FROM.GetName] 정부는 일대일로 협력 구상을 최종적으로 거절했습니다. 그들은 자본 투입에 따른 재정적 부담과 주권 침해 우려를 이유로 들었으나, 실질적으로는 민국의 거대한 경제적 영향력이 자국 내로 깊숙이 침투하는 것을 경계한 선택으로 보입니다. 이번 거절로 인해 해당 경로를 통해 유라시아를 하나로 연결하려던 우리의 거대 인프라 계획은 일부 차질이 불가피해졌습니다. 인도대륙에서의 신실크로드 건설은 불가능해 질 것으로 보입니다."
 china_wr.308.a:0 "다른 방도를 찾아야 할 것이다."
 china_wr.309.t:0 "알마아타-타슈켄트에서의 일대일로 사업 개시"
 china_wr.309.d:0 "알마아타-타슈켄트를 이어 일대일로를 모스크바까지 잇는 사업에 모두가 동의하면서 마침내 사업이 개시되었습니다. 신강에서 알마아타에 이르는 거대한 구간을 연결하기 위해서는 상당한 시간과 자본이 소요될것이나 일대일로 공동 개발이 시작되어 공동의 자본이 투입되어 큰 문제가 되지 않을것입니다. 이 개발이 완료되고 일대일로가 완전히 완성된다면 우리에게 막대한 부를 얻게 해줄 것입니다. 20세기의 새로운 실크로드을 위하여 우리는 일대일로 참여국들과 함께할 것입니다."
 china_wr.309.a:0 "시작하자."
