 kuomintag_wr.110.t:0 "감찰원의 탄핵권과 최고 권력층"
 kuomintag_wr.110.d:0 "정부의 최고 사정 기관인 감찰원이 공식 수립되면서, 부정부패를 기소하고 관리를 파면할 수 있는 탄핵권의 사정 범위를 어디까지 인정할 것인가를 두고 뜨거운 공방이 일어났습니다. 감찰부 내부의 강경파들은 쑨원의 가르침에 따라 성역 없는 사정을 감행하기 위해 국민당 중앙집행위원과 고위 장성 등 당의 중추까지 탄핵할 수 있는 무제한적인 감찰 지위가 보장되어야 한다고 외칩니다. 반면 총통부와 군부 원로들은 국가 비상시기에 군정과 당의 안정을 지키려면 탄핵 대상을 하부 행정 관료로 한정해야 한다며 압박을 가하고 있습니다."
 kuomintag_wr.110.a:0 "감찰원에 당 중앙위원까지 탄핵할 수 있는 무제한적 감찰 지위를 부여한다."
 kuomintag_wr.110.b:0 "하부 행정 관료로 탄핵 대상을 제한한다."
 kuomintag_wr.111.t:0 "규정권과 시정 요구의 법적 구속력"
 kuomintag_wr.111.d:0 "행정부의 업무가 위법하거나 부당하다고 판단될 때 감찰원이 발동하는 규정권의 법적 성격을 확정해야 합니다. 행정원의 독단적인 국가 자원 남용과 전횡을 확실히 통제하기 위해 감찰원의 시정 요구에 강제적인 법적 구속력을 부여해 강력한 견제 지위를 확립해야 한다는 주장이 대두되었습니다. 그러나 행정원의 기술 관료들과 집행파들은 규정권을 단순한 권고 조항으로 처리하여 정부의 신속하고 일관성 있는 정책 집행권을 온전히 보장해야 한다고 반발하고 있습니다."
 kuomintag_wr.111.a:0 "감찰원의 규정권에 법적 구속력을 부여하여 행정원에 대한 강력한 견제 지위를 확립한다."
 kuomintag_wr.111.b:0 "규정권을 단순 권고 조항으로 처리하여 행정원의 정책 집행권을 보장한다."
