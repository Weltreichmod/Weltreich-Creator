 china_wr.322.d:0 "베네치아 항구를 지나가는 일대일로 개발에 모두가 동의하면서 마침내 사업이 개시되었습니다. 사이공의 항구를 더욱 확장하기 위해서는 상당한 시간과 자본이 소요될것이나 일대일로 공동 개발이 시작되어 공동의 자본이 투입되어 큰 문제가 되지 않을것입니다. 이 개발이 완료되고 일대일로가 완전히 완성된다면 우리에게 막대한 부를 얻게 해줄 것입니다. 20세기의 새로운 실크로드을 위하여 우리는 일대일로 참여국들과 함께할 것입니다."
 china_wr.322.a:0 "시작하자."
 china_wr.323.t:0 "사천-귀주 일대 완공"
 china_wr.323.d:0 "험준한 산악 지형과 열악한 기후를 극복하고 사천에서 귀주를 잇는 일대일로 내륙 구간이 마침내 완공되었습니다. 영토 전역을 관통하는 현대적인 철도망과 고속도로가 개통되면서, 그동안 중앙 정부의 행정력과 물류 접근성이 제한적이었던 내륙 오지에 거대한 변화의 물결이 몰아치고 있습니다. 붕괴 직전의 인프라를 보수하고 물류 정체를 완전히 해소함으로써, 민국 내륙의 막대한 천연자원과 노동력이 해안가 공업 지대로 신속하게 이동할 수 있는 대동맥이 완성되었습니다. 이번 국책 사업의 성공은 단순한 교통망 확충을 넘어, 국내 시장의 결속을 다지고 대외적인 유라시아 연결망을 굳건히 받쳐줄 든든한 기반이 될 것입니다. 대륙의 심장부가 마침내 세계를 향해 활짝 열렸습니다."
 china_wr.323.a:0 "일대일로는 계속된다."
