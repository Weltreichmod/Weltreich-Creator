 KMT_five_power_separation_production_speed_buildings_factor_change_tt:0 "§Y오권분립§!의 건설 속도 수정치가 §G5% 증가§!합니다."
 KMT_five_power_separation_required_garrison_factor_change_tt:0 "§Y오권분립§!의 필요한 주둔군 수정치가 §G10% 감소§!합니다."
 kuomintag_wr.104.t:0 "임시 입법원의 인적 구성"
 kuomintag_wr.104.d:0 "새롭게 발족할 임시 입법원의 의원단을 어떻게 구성할 것인가를 두고 논쟁이 분분합니다. 국민당 중앙집행위원회의 추천을 받은 충성스러운 당원들로 의회를 채워 이념적 순수성과 당의 지도력을 공고히 해야 한다는 주장과, 사회 각계각층을 대변할 직능대표, 소수자대표, 지역대표를 고루 임명하여 민국 입법부의 정당성과 다원성을 확보해야 한다는 주장이 대립하고 있습니다."
 kuomintag_wr.104.a:0 "국민당 중앙집행위원회의 추천을 받은 당원들로 구성한다."
 kuomintag_wr.104.b:0 "직능대표, 소수자대표, 지역대표를 정해진 비율에 따라 임명한다."
 kuomintag_wr.105.t:0 "입법원과 행정원의 관계"
 kuomintag_wr.105.d:0 "오권분립 체제 하에서 임시 입법원이 행정원과 어떤 관계를 맺을 것인지 정립해야 합니다. 민국의 신속한 근대화와 효율적인 국정 집행을 위해 행정원의 법안과 예산안을 군말 없이 신속하게 통과시켜 주는 협조적 기조를 유지할 것인지, 아니면 명목상 대등한 치권 기구로서 행정부의 독주를 막기 위해 모든 법안과 예산 안건을 철저하게 심의하고 견제할 것인지 선택해야 합니다."
 kuomintag_wr.105.a:0 "행정원의 신속한 국정집행을 존중하여 법안과 예산 심의에 통과 협조 기조를 유지한다."
 kuomintag_wr.105.b:0 "대등한 견제 기구로서 법안과 예산 안건을 철저하게 심의한다."
 KMT_five_power_separation_drift_defence_factor_change_tt:0 "§Y오권분립§!의 이념 방어력 수정치가 §G15% 증가§!합니다."
 KMT_five_power_separation_research_speed_factor_change_tt:0 "§Y오권분립§!의 연구 속도 수정치가 §G5% 증가§!합니다."
 KMT_five_power_separation_political_advisor_cost_factor_change_tt:0 "§Y오권분립§!의 정치 고문 고용 비용 수정치가 §G15% 감소§!합니다."
 KMT_five_power_separation_consumer_goods_factor_change_tt:0 "§Y오권분립§!의 소비재 공장 수정치가 §G5% 감소§!합니다."
 kuomintag_wr.106.t:0 "행정원회의의 위상과 권한"
 kuomintag_wr.106.d:0 "최고 행정 실무 기구인 행정원회의의 법적 지위를 두고 남경 정부 안에서 격렬한 정견 대립이 발생했습니다. 행정원을 총통조차 함부로 번복할 수 없는 국가 최고 정책의 최종 합의 의결 기관으로 규정하여 치권의 핵심 보루로 세울 것인지, 혹은 총통의 원활한 국정 운영을 전폭적으로 보조하는 행정 실무 및 자문 기구로 제한하여 집행의 효율성을 극대화할 것인지 결정해야 합니다."
 kuomintag_wr.106.a:0 "행정원회의를 총통도 함부로 뒤집을 수 없는 국정 최고 정책의 최종 합의 의결 기관으로 규정한다."
 kuomintag_wr.106.b:0 "행정원회의의 지위를 총통의 국정 운영을 보조하는 행정 실무 및 자문 기구로 제한한다."
 kuomintag_wr.107.t:0 "복의 청구권의 구속력 범위"
 kuomintag_wr.107.d:0 "입법부의 과도한 독주를 제어하기 위한 행정원의 무기인 복의 청구권을 두고 구체적인 거부권 행사 요건을 확정해야 합니다. 행정원이 환부한 법안을 입법원이 재의결할 때 원안 유지 조건을 출석 위원 3분의 2 이상으로 상향하여 행정부의 거부 지위를 확고히 다질 것인지, 아니면 입법원 총위원 과반수의 결의만으로도 원안이 확정되도록 완화하여 의회와의 협치를 도모할 것인지 선택해야 합니다."
 kuomintag_wr.107.a:0 "복의 청구 시 입법원의 원안 유지 조건을 출석 위원 3분의 2 이상으로 상향하여 행정원의 법적 거부 지위를 강화한다."
 kuomintag_wr.107.b:0 "복의 청구 제도를 완화하여 입법원 총위원 과반수의 결의만으로 원안이 확정되도록 타협한다."
