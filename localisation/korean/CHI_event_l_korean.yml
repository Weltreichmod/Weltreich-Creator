l_korean:
 china_wr.1.t:0 "병역법 개정안 재입안"
 china_wr.1.d:0 "차오쿤 정권 말기, 국회는 군벌 의용군 체제를 억제하고 군권을 중앙으로 통합하기 위해 병역법 개정안을 통과시키려 하였으나, 차오쿤이 해당 법안에 거부권을 행사하면서 법안은 논의조차 제대로 이루어지지 못한 채 폐기되었습니다. 이후 정국은 급속히 혼란으로 빠져들었고, 북벌군 무단 출병과 동북 문제까지 더해지면서 병역 제도 전반의 근본적인 개편이 불가피해졌습니다.\n\n옌후이칭 과도정부는 군권의 안정적 관리와 군벌 세력의 해체를 위해 병역법 개정을 다시 추진하고 있습니다. 이번 개정안은 이전 법안에서 논란이 되었던 징병 절차의 투명성, 의용군의 제도적 지위, 병력 편제권의 중앙 집중에 더하여, 최근 발생한 무단 출병 사례를 방지하는 조항까지 포함하고 있습니다.\n\n개정안이 국회를 통과한다면, 민국은 다시금 중앙정부가 군사권을 독점하는 구조를 회복할 수 있게 됩니다. 그러나 친 군벌 의원들과 일부 지역 대표들은 자신들의 병력 기반이 약화될 것을 우려하여 강하게 반발하고 있습니다. 과도정부는 이 문제를 반드시 해결해야만 합니다."
 china_wr.1.a:0 "한 걸음씩."
 china_wr.2.t:0 "조곤 경장 부분적 수용"
 china_wr.2.d:0 "차오쿤이 강행하였던 소위 '조곤 경장'은 대총통 직선제 도입, 선거구 대개편, 의석수 확대 등 민국의 정치 체제를 크게 흔들어 놓았으며, 정권 붕괴 이후에도 정리되지 못한 채 혼란만을 가중시켰습니다.\n\n옌후이칭 과도정부는 헌정 질서를 서서히 정상화하기 위하여 조곤 경장의 전면 폐지 대신, 국가 운영에 필요한 일부 조항만을 선별적으로 수용하기로 결정하였습니다. 이번 조치는 군벌이 독점하던 지역 권한을 중앙이 다시 회수하고, 선거 및 행정의 일관성을 회복하기 위한 과도적 조정 단계입니다.\n\n비록 단기적으로 정치적 부담과 사회적 비용이 따르겠으나, 민국의 안정을 위하여 반드시 필요한 조치입니다."
 china_wr.2.a:0 "국가는 안정적으로 나아가야 한다."
 china_wr.3.t:0 "조곤경장 전면 수용"
 china_wr.3.d:0 "옌후이칭 과도정부는 조곤 경장의 일부만을 수용하는 것으로는 민국의 헌정 질서를 완전히 회복할 수 없다고 판단하였습니다. 이에 따라 정부는 조곤 경장의 전체 구조를 재검토한 뒤, 그 핵심 제도들을 전면적으로 재도입하는 결정을 내렸습니다.\n\n이 조치는 대총통 직선제·선거구 재편·의석수 확대와 같은 주요 제도를 중앙정부 기준에 맞추어 안정적으로 재구성하며, 군벌이 장악하던 지역적 영향력을 축소하는 데 큰 효과를 가져올 것입니다. 그러나 단기적으로는 정치적 갈등이 심화되고 사회적 불안이 증가할 수밖에 없습니다.\n\n그럼에도 불구하고 민국이 다시 일관된 체제로 나아가려면 이 '전면수용'은 반드시 필요한 고통입니다."
 china_wr.3.a:0 "필요한 결정이다."
 china_wr.4.t:0 "대일 외교 협상 개시"
 china_wr.4.d:0 "동북군이 정부 승인 없이 출병하여 관동주 인근의 일본 조계지에서 약탈 행위를 벌이자, 일본 정부는 강하게 반발하였습니다. 옌후이칭 과도정부는 사태가 더 악화될 경우 일본의 군사적 압박으로 이어질 수 있다고 판단하였습니다.\n\n과도정부는 공식 사절단을 파견하여 이번 사태가 중앙정부와 무관하다는 점을 분명히 밝히고, 깊은 유감을 표명하였습니다. 또한 사태의 조속한 마무리를 위해 일본 측에 강남 철도부설권 일부를 임시 양도하는 이권 제안을 전달하였습니다.\n\n이 협상은 치욕적이라는 비판도 있으나, 당장의 위기를 넘기기 위해서는 불가피한 선택입니다."
 china_wr.4.a:0 "협상안을 일본 측에 제시하자."
 china_wr.5.t:0 "중국의 해명과 이권 제안"
 china_wr.5.d:0 "중국 사절단은 최근 동북군이 관동주 인근 조계지에서 벌인 약탈과 무단 출병은 중앙정부의 승인과는 전혀 무관한 독단적인 행동이었다고 공식적으로 해명하였습니다. 또한 사절단은 중국 정부가 해당 사태에 깊은 유감을 표하며, 일본 측의 불편을 초래한 것에 대해 사과를 표했습니다.\n\n아울러 중국은 사태의 조속한 수습과 양국 간 긴장 완화를 위해, 일본 측에 강남 철도부설권 일부를 임시 양도하겠다는 제안을 제시하였습니다. 이는 일본의 경제적 이익을 보장하는 동시에, 이번 사건을 외교적으로 마무리하려는 시도로 보입니다.\n\n우리 정부는 이 제안을 어떻게 받아들일지 결정해야 합니다."
 china_wr.5.a:0 "중국의 해명을 받아들이고 제안을 검토한다."
 china_wr.5.b:0 "중국의 말은 믿기 어렵다. 더 강경한 대응이 필요하다."
 china_wr.6.t:0 "일본이 협상을 수락하다"
 china_wr.6.d:0 "일본 정부는 우리 정부가 전달한 공식 해명과 사과를 받아들였으며, 강남 철도부설권 일부의 임시 양도 제안 또한 긍정적으로 수용하였습니다. 외교적 압박이 완화되면서 당장의 위기는 일단락된 것으로 보입니다.\n\n옌후이칭 과도정부는 이번 결과가 대규모 충돌을 피하기 위한 불가피한 조치였다고 설명하고 있으나, 내부에서는 '치욕적 양보'라는 비판 여론이 서서히 나타나고 있습니다. 그럼에도 불구하고, 이번 협상 타결은 불안정한 정국 속에서 잠시나마 숨을 돌릴 수 있는 시간을 벌어준 것은 분명합니다."
 china_wr.6.a:0 "당장은 위기가 지나갔다."
 china_wr.7.t:0 "일본이 협상을 거절하다"
 china_wr.7.d:0 "일본 정부는 우리 측의 공식 해명과 사과를 받아들이지 않았으며, 강남 철도부설권 임시 양도 제안 역시 일축하였습니다. 일본은 동북군의 무단 출병과 약탈이 '단순한 독단 행동'이 아니라 중국 정부의 통제 능력 부재를 보여주는 증거라며 강경한 입장을 유지하고 있습니다.\n\n옌후이칭 과도정부는 사태가 예상보다 심각하다는 판단 아래 즉각적인 대책 마련에 착수하였습니다. 국회와 여론은 일본의 태도를 규탄하고 있으나, 일본이 추가적인 압박이나 군사적 조치를 준비 중이라는 우려 또한 확산되고 있습니다.\n\n정국은 다시금 긴장 속으로 빠져들고 있습니다."
 china_wr.7.a:0 "상황이 더 악화되고 있다..."
 china_wr.8.t:0 "총통 선거"
 china_wr.9.t:0 "사천성 상황에 대한 공식 보고"
 china_wr.9.d:0 "계임 대총통 각하,\n\n금번 사천성 일대의 농사 상황과 민심 동향에 관하여 현지에서 제출된 보고를 정리하여 보고드립니다. 금년 들어 일부 군현에서 수확량이 예년 대비 다소 감소한 정황이 관측되었으나, 이는 국지적 현상으로 파악되며 전반적인 생산 기반에는 중대한 영향이 없다는 것이 지방 당국의 의견입니다. 또한 곡물 가격이 일시적으로 상승하여 민간의 우려가 일부 제기되었으나, 해당 지역 관리들은 이미 조정을 시행하여 상황은 점차 안정되고 있다 하였습니다.\n\n장강 수운로를 통한 물자 수송 과정에서 경미한 오해로 인한 마찰이 있었다고 하나, 이는 단발적 사건으로 현지 치안 부대가 신속히 중재하여 더 이상의 확대 가능성은 낮다고 보고하고 있습니다. 현재 현장의 치안과 행정은 대체로 원활히 작동하고 있으며, 특별한 우려를 표할 만한 이상 징후는 발견되지 않았다는 점도 함께 보고드립니다.\n\n종합적으로 판단하건대, 사천성의 현 상황은 지방 차원에서 충분히 관리 가능한 범위에 있으며, 중앙정부의 즉각적 개입이 필요한 비상 사태는 아니라는 것이 현지의 최종 의견입니다."
 china_wr.9.a:0 "계속 지켜보도록 하라."
 china_wr.10.t:0 "사천 대기근"
 china_wr.10.d:0 "사천 일대에서 발생하던 작황 부진과 국지적 기아가 마침내 통제 불능의 대기근으로 번지고 있다는 보고가 도착하였습니다. 일부 현 단위 보고에서는 이미 대규모 아사자와 인구 유출이 발생하고 있으며, 지방 관료들이 상부의 문책을 두려워해 피해를 축소 보고하고 있다는 의혹까지 제기되고 있습니다.\n\n지금까지 중앙정부는 '기근의 위협' 단계로 상황을 관리하려 했으나, 더 이상 사태를 국지적 재난으로 규정하기는 어려운 지경에 이르렀습니다. 사천의 재난은 단순한 자연재해가 아니라, 민국의 행정·물류·치안 능력을 한꺼번에 시험하는 중대한 위기가 되었습니다. 이제 우리는 이 사태를 국가적 비상사건으로 공식 인정하고, 장기적인 구호와 복구 체계를 마련해야 합니다."
 china_wr.10.a:0 "이제부터가 진짜 시작이다."
 china_wr.11.t:0 "사천을 휩쓰는 대기근"
 china_wr.11.d:0 "중국 서부의 대지에서 전례 없는 기근이 발생하고 있다는 소식이 전해지고 있습니다. 사천 일대의 농촌과 산간 지역에서는 수확량이 급감하고, 취약한 교통·물류망 탓에 식량이 도시와 시골 모두에 제대로 공급되지 못하고 있습니다. 외신 기자들은 굶주림을 피해 떠나는 피난민 행렬과 텅 빈 시장, 아사 소문이 떠도는 마을들의 참상을 전하고 있습니다.\n\n중국 중앙정부는 이번 사태를 '국가적 재난'으로 규정하고 구호 조치를 발표했으나, 재정과 행정 능력이 충분한지에 대해서는 의문이 제기되고 있습니다. 국제 사회에서는 인도적 차원의 지원 필요성을 언급하는 목소리와 함께, 중국의 정치적 안정이 유지될지 우려하고 있습니다."
 china_wr.11.a:0 "굶주림은 국경을 가리지 않는다."
 china_wr.12.t:0 "사천에 도착한 첫 구호 물자"
 china_wr.12.d:0 "장기간 지체되던 구호품 수송이 마침내 가시적인 성과를 내기 시작했습니다. 중앙정부가 조직한 수송선단과 군용 수송대는 파손된 교량과 붕괴된 도로를 우회하여, 강과 임시 항구, 산악로를 통해 사천 내 여러 거점에 도달하는 데 성공하였습니다.\n\n각 현·현 소재지에는 임시 배급소와 의료소가 설치되었고, 가장 심각한 피해 지역부터 식량과 의약품이 우선적으로 배분되고 있습니다. 여전히 모든 지역을 완전히 감당하기에는 부족하지만, 아사자들의 수가 눈에 띄게 줄어들었다는 보고가 올라오고 있습니다. 이번 성공은, 아직 완전한 해결에는 멀었을지라도, 대기근을 되돌릴 수 있다는 희망을 보여주고 있습니다."
 china_wr.12.a:0 "조금은 숨을 고를 수 있게 되었다."
 china_wr.13.t:0 "취소된 조기 대선"
 china_wr.13.d:0 "사천 대기근과 이에 따른 전국적 동요 속에서, 정부가 이전에 약속하였던 조기 대선 일정이 사실상 무기한 연기되었다는 소식이 전해지고 있습니다. 선거인 명부 정리조차 완료되지 못한 지역이 수두룩한 가운데, 대규모 난민과 치안 불안, 행정 마비로 인해 공정한 선거를 치를 수 있는 환경은 이미 무너졌다는 것이 행정부의 공식 입장입니다.\n\n그러나 민중과 정당들은 이를 단순한 '불가피한 행정 조치'로 받아들이지 않고 있습니다. 야당과 언론은 정부가 위기를 핑계로 권력 연장을 꾀하고 있다고 비판하며, 거리에서는 '굶주림 속에 선거마저 빼앗겼다'는 불만이 늘어나고 있습니다. 조기 대선의 취소는 사천의 비극 위에 또 하나의 정치적 불신을 쌓아 올리고 있습니다."
 china_wr.13.a:0 "위기 속에서 정치적 신뢰는 더 쉽게 무너진다."
 china_wr.14.t:0 "열강에 보낸 구호 요청 서한"
 china_wr.14.d:0 "사천 대기근이 장기화되자, 중앙정부는 마침내 단독 대응이 불가능하다는 결론을 내리고 주변 열강과 주요 국가들에게 공식적인 구호 요청 서한을 발송하였습니다. 서한에는 기근 피해 규모, 사망자 추정치, 식량·의약품·기술 지원의 긴급 필요성이 상세히 기술되어 있습니다.\n\n일각에서는 외교적 자존심과 '내정 문제'라는 이유로 외국의 개입을 경계해야 한다는 목소리도 있었으나, 결국 수백만 명의 생명을 구하는 일이 최우선이라는 판단이 내려졌습니다. 이제 국제 사회는 이 서한에 어떻게 응답할지, 인도주의와 자국의 이해관계 사이에서 선택을 내려야 합니다."
 china_wr.14.a:0 "도움을 구할 수 있다면 어디로든 손을 내밀 수밖에 없다."
 china_wr.15.t:0 "[FROM.GetName]에 도착한 중국의 구호 요청"
 china_wr.15.d:0 "중국 정부는 사천을 비롯한 서부 지역에서 발생한 대기근에 대처하기 위해, [ROOT.GetName]을 포함한 여러 국가에 공식적인 구호 지원을 요청해 왔습니다. 그들은 식량·의약품·전문 인력과 더불어, 구호 물자를 내륙까지 안전하게 수송할 수 있는 기술적 조언까지 호소하고 있습니다.\n\n이번 위기에 응답하는 방식은, 단지 몇 척의 선박과 몇 톤의 곡물을 보내는 문제를 넘어섭니다. [ROOT.GetAdjective] 정부가 어떤 결정을 내리는지는, 향후 중국과의 관계, 국제 여론, 그리고 우리 스스로가 표방해 온 문명과 인도주의의 가치에 대한 시험대가 될 것입니다."
 china_wr.15.a:0 "인도주의의 이름으로 지원을 승인한다."
 china_wr.15.b:0 "우리의 이익과 거리가 먼 일에 개입할 필요는 없다."
 china_wr.16.t:0 "[FROM.GetName]의 구호 승인"
 china_wr.16.d:0 "[FROM.GetName](은)는 사천 대기근에 관한 우리의 구호 요청을 승인하였습니다. 그들은 일정 규모의 식량과 의약품, 그리고 구호 활동에 투입될 전문 인력을 제공하겠다는 의사를 공식적으로 통보해 왔습니다. 또한 일부 항만과 수송망을 중국행 구호 물자 전용으로 배정하겠다는 제안도 함께 도착했습니다.\n\n물론 이 지원만으로 모든 문제가 해결되지는 않겠지만, 각지의 창고와 배급소에서는 이미 '외국에서 온 곡물'에 대한 소문이 돌기 시작했습니다. 중앙정부는 이 귀중한 지원이 최대한 효율적으로 활용되도록, 배분과 수송을 위한 별도 위원회를 설치하기로 결정했습니다."
 china_wr.16.a:0 "이 호의를 잊지 말아야 한다."
 china_wr.17.t:0 "[FROM.GetName]의 구호 거부"
 china_wr.17.d:0 "[FROM.GetName](은)는 사천 대기근에 대한 우리의 구호 요청을 정중하지만 단호하게 거부하였습니다. 그들은 재정적 여건, 국내 사정, 혹은 외교적 고려 등을 이유로 들며, 이번 사태에 직접적인 개입은 어렵다는 입장을 전달해 왔습니다.\n\n공식 외교 문서는 조심스러운 표현으로 가득 차 있지만, 실질적으로 우리가 기대할 수 있는 것은 아무것도 없습니다. 일부 관료들은 '애초에 기대가 과했다'며 체념하고, 다른 이들은 국제 사회가 중국의 고통에 냉담하다는 사실에 분노하고 있습니다."
 china_wr.17.a:0 "기대는 줄이고, 스스로 버텨낼 수밖에 없다."
 china_wr.18.t:0 "사천 구호 작전의 귀결"
 china_wr.18.desc.a:0 "우리는 여러 나라에 사천 대기근에 대한 국제 구호를 요청하는 서한을 보냈으나, 돌아온 답장은 차갑기만 했습니다. 어느 국가도 실질적인 지원을 약속하지 않았고, 대부분은 '유감'을 표하며 조심스럽게 거리를 두는 데 그쳤습니다.\n\n결국 사천을 구할 힘은 외부에서 오지 않을 것입니다. 중앙정부는 제한된 예산과 인력, 취약한 물류 기반을 총동원해 버티는 수밖에 없습니다. 이번 일은 우리에게 분명한 교훈을 남겼습니다. 타국의 선의에만 기대어 민국의 운명을 맡길 수는 없다는 사실을 말입니다."
 china_wr.18.desc.b:0 "우리의 구호 요청에 응답한 국가들은 많지 않았지만, 그럼에도 몇몇 나라가 식량과 의약품, 구호 인력을 제공하겠다고 나섰습니다. 이들 나라의 지원은 가장 심각한 지역의 참사를 완화하고, 대기근이 완전히 파국으로 치닫는 것을 막는 데 일정 부분 도움을 줄 것입니다.\n\n그러나 여전히 사천의 들판과 산골 마을 곳곳에는 손이 닿지 않는 빈곤과 굶주림이 남아 있습니다. 이번 국제 지원은 '완전한 해결'이 아니라 '붕괴를 늦추는 지지대'에 가깝습니다. 우리는 제한된 도움을 최대한 효율적으로 활용하는 동시에, 장기적인 자구책을 모색해야 합니다."
 china_wr.18.desc.c:0 "우리의 호소에 응답하여, 요청을 보냈던 거의 모든 국가가 구호를 승인하였습니다. 곡물과 약품을 가득 실은 선박과 열차가 차례로 도착하고 있으며, 각국의 전문가와 자원봉사자들이 사천 곳곳에서 구호 활동에 참여하고 있습니다.\n\n물론 그 어떤 지원도 이미 잃어버린 생명을 되돌릴 수는 없습니다. 그러나 이번 대규모 국제 지원은 사천의 대기근을 장기적 재난으로 고착시키지 않고, 어느 정도 선에서 수습할 수 있는 기반을 제공하고 있습니다. 동시에, 중국이 국제 사회의 일원으로서 다시금 신뢰를 회복하는 계기가 되고 있습니다."
 china_wr.18.a:0 "결국 남은 것은 우리 스스로뿐이다."
 china_wr.18.b:0 "적어도 최악은 피할 수 있을지 모른다."
 china_wr.18.c:0 "이 제한된 도움이라도 끝까지 살려 써야 한다."
 china_wr.18.d:0 "이 은혜를 잊지 않고 갚을 날이 올 것이다."
 china_wr.19.t:0 "조기 대선 약속"
 china_wr.19.d:0 "잇따른 혼란 속에서 중앙정부에 대한 정치적 불신이 커지자, 옌후이칭 계임대총통은 정국 안정을 위해 '조기 대선'을 공식적으로 약속하였습니다. 그는 이 비상사태가 어느 정도 진정되는 즉시, 기존 임기와 무관하게 새로운 대총통과 국회를 국민의 직접 의사에 따라 선출하겠다고 선언했습니다.\n\n이 약속은 즉각적인 해결책은 아니지만, 최소한 현 정권이 무기한 집권을 꾀하고 있다는 의혹을 일부 누그러뜨리고 있습니다. 이제 국민과 정당들은, 이 약속이 단지 시간을 벌기 위한 언사에 그칠지, 실제로 헌정 질서를 복원하기 위한 첫 걸음이 될지 지켜보게 될 것입니다."
 china_wr.19.a:0 "약속을 지켜야만 신뢰를 되찾을 수 있다."
 china_wr.20.t:0 "사천 기근의 끝"
 china_wr.20.d:0 "민국을 짓눌러 온 사천 대기근이 마침내 진정 국면에 접어들었습니다. 장강 수운망을 활용한 대규모 구호 작전, 국내 물류망 총동원령, 그리고 제한적이나마 도착한 국제적 지원이 복합적으로 작용하여, 가장 심각했던 기아 지역에서도 더 이상 조직적인 아사 보고는 올라오지 않고 있습니다.\n\n물론 사천의 들판과 산촌 곳곳에는 여전히 상흔이 남아 있습니다. 가족을 잃은 이들, 빚과 채무에 짓눌린 농가, 고향을 떠나 돌아오지 못한 피난민들은 이 재난의 긴 그림자를 증언하고 있습니다. 그럼에도 불구하고 중앙정부는 최소한 '대량 아사'라는 최악의 국면을 벗어났다고 판단하고 있으며, 이제는 비상 구호 단계에서 중장기 복구와 재건 단계로의 전환을 준비해야 합니다.\n\n사천 대기근은 민국이 가진 역량과 한계를 동시에 드러낸 사건이었습니다. 이제 남은 과제는, 이 비극을 단순한 자연재해로 기억하는 것이 아니라, 제도와 행정, 경제 구조를 재검토하는 출발점으로 삼는 일입니다."
 china_wr.20.a:0 "이제는 복구와 책임의 시간을 준비해야 한다."
 china_wr.21.t:0 "계임 대총통의 선택"
 china_wr.21.d:0 "사천 대기근이 진정 국면에 접어들고 조기 대선 준비가 본격화되면서, 민국 정치의 중심은 다시금 '다음 대총통'을 향하고 있습니다. 정국을 수습해 온 옌후이칭 계임대총통은, 향후 민국의 항로를 함께 논의할 대표적 후보들과 비공식 대담을 진행하기로 결정하였습니다.\n\n진보당은 '민생균부'를 기치로 내세우며, 당장 굶주리고 헐벗은 인민의 삶을 바로 세우는 것이 가장 시급한 과제라고 주장합니다. 중국청년당은 '민권헌정'을 내세워, 사천의 비극 역시 낡은 정치 관행과 헌정 무시의 결과라며 제도 개혁을 강조합니다. 국민당은 '북벌 통일'을 앞세워, 만몽과 조계지 문제를 정면 돌파하지 않는 한 어떠한 개혁도 반쪽짜리에 그칠 것이라 경고합니다.\n\n옌후이칭은 이들 세 정당의 대표적 인물들과 각각 대담을 진행함으로서, 민국이 직면한 문제와 각자의 해법을 직접 확인하고자 합니다. 그의 선택과 고민은, 다가오는 선거의 정치 지형을 가늠하는 중요한 이정표가 될 것입니다."
 china_wr.21.a:0 "진보당과 민생을 논한다."
 china_wr.21.b:0 "중국청년당과 헌정을 논한다."
 china_wr.21.c:0 "국민당과 통일을 논한다."
 china_wr.22.t:0 "진보당과의 대담"
 china_wr.22.d:0 "옌후이칭 계임대총통은 진보당의 대총통 후보 차이어를 비공개 회의실로 초청하여, 사천 대기근 이후 민국이 나아가야 할 방향을 함께 논의했습니다. 차이어는 첫 발언부터 '정치는 곧 민생'이라며, 기근 현장에서 마주친 농민과 노동자의 사례를 생생하게 들려주었습니다.\n\n그는 사천의 비극이 단순한 흉작 때문이 아니라, 토지 제도의 불균형, 취약한 노동 보호, 지방 관료의 무책임, 사회 복지 제도의 부재가 겹쳐 폭발한 구조적 문제라고 진단했습니다. 이어 농민·노동자·영세 상공인을 위한 '민생균부' 개혁안을 제시하며, 세제 개정·금융 구조 조정·지방 균형 발전을 위한 로드맵을 설명했습니다.\n\n옌후이칭은 이러한 조치가 과도한 재정 부담으로 이어지지 않을지, 중앙 행정이 이를 감당할 역량이 있는지를 신중히 질문했습니다. 그러나 대담이 끝날 무렵, 그는 사천의 상처를 치유하지 못한다면 어떤 제도 개혁도 공허할 뿐이라는 사실을 인정하지 않을 수 없었습니다."
 china_wr.22.a:0 "굶주린 인민을 외면하는 정치는 존재할 수 없다."
 china_wr.23.t:0 "중국청년당과의 대담"
 china_wr.23.d:0 "중국청년당의 대총통 후보 후스는 헌법 초안과 여러 연구 서적을 들고 응접실에 나타났습니다. 그는 사천 대기근을 '정치의 실패이자 헌정 질서 붕괴가 낳은 비극'이라 규정하며 토론을 시작했습니다.\n\n그에 따르면 기근의 조짐을 조기에 파악하고도 대응하지 못한 이유는, 권력이 특정 진영에 집중되면서 행정 정보가 왜곡되고 감시 장치가 마비되었기 때문입니다. 그는 권력 분립 재정립, 국회·사법부의 독립, 언론·시민 사회의 자유 보장을 핵심 과제로 제시하며 위기 상황에서도 제도가 자동적으로 작동하는 '헌정 국가'를 만들 수 있다고 주장했습니다.\n\n옌후이칭은 이러한 이상이 현실 정치 속에서 구현될 수 있을지, 급진 세력과 구권위적 관료 세력이 어떻게 반발할지를 조목조목 물었습니다. 후스는 감정적 대립이 아닌 점진적 개혁과 사회적 타협을 통해 길을 열어야 한다고 강조했습니다. 대담을 마친 옌후이칭은 자유와 질서를 동시에 지키는 일이 얼마나 어려운지 다시금 깨닫게 되었습니다."
 china_wr.23.a:0 "헌정이 없다면 어떤 개혁도 모래 위에 세운 집일 뿐이다."
 china_wr.24.t:0 "국민당과의 대담"
 china_wr.24.d:0 "국민당 대총통 후보 왕징웨이는 누구보다 엄숙한 태도로 대담에 임했습니다. 그는 사천의 혼란·경제 불안·정치 갈등의 근본 원인은 모두 북방이 외세 영향권에 떨어져 있다는 사실 하나로 귀결된다고 주장했습니다.\n\n왕징웨이는 만몽국이 장악한 만주·몽골에서 유출되는 곡물·광물·철도 이권, 그리고 조계지와 치외법권 지대에서 빠져나가는 부를 조목조목 지적했습니다. 그는 '북벌통일'이 단순한 군사 모험이 아니라 국가의 정통성을 되찾고 착취 구조를 끊어내기 위한 필연적인 선택이라고 역설했습니다.\n\n옌후이칭은 무력 충돌이 새로운 유혈사태를 부르지 않을지, 이미 지친 인민이 군사 동원을 감당할 수 있을지 우려를 표했습니다. 그러나 왕징웨이는 '통일 없는 평화는 허상'이라며, 북방을 되찾아야 비로소 개혁과 복지가 가능하다고 맞섰습니다. 대담은 끝까지 긴장을 유지했습니다."
 china_wr.24.a:0 "통일의 대가가 무엇인지 끝까지 고민해야 한다."
 china_wr.25.t:0 "공장 지대에 울려 퍼지는 진보당의 연설"
 china_wr.25.d:0 "진보당은 다가오는 대총통 선거에서 노동자 계층의 지지를 확보하기 위해, 주요 공업 도시와 항만 지대에 집중적인 선거운동대를 파견하였습니다. 후보와 당 간부들은 새벽 교대 시간에 맞춰 공장 정문 앞에서 연설을 시작하고, 퇴근 시간에는 노동조합 회관과 공장 식당을 찾아 구체적인 공약을 설명하고 있습니다.\n\n그들은 사천 대기근이 단지 농촌만의 비극이 아니라, 도시 노동자의 임금 동결과 해고, 물가 폭등으로 이어진 '전 국민의 위기'임을 강조합니다. 진보당은 근로 시간 단축, 안전 규정 강화, 실업 보험과 산재 보상 제도 도입, 최저 임금제 단계적 도입 등 구체적인 입법 과제를 제시하며, "이번 선거가 노동자의 삶을 바꿀 수 있는 최초의 기회"라고 호소하고 있습니다.\n\n피로에 절은 노동자들은 여전히 정치에 회의적이지만, 일부 현장에서는 진보당의 이름이 처음으로 진지한 토론의 대상이 되기 시작했습니다. 공장 굴뚝 사이로 울려 퍼지는 연설은, 아직 미약하지만 새로운 정치적 가능성을 예고하고 있습니다."
 china_wr.25.a:0 "정치는 마침내 공장 문 앞까지 다가오고 있다."
 china_wr.26.t:0 "중도 연합을 모색하는 지식인과 온건파"
 china_wr.26.d:0 "선거가 다가오면서 민국의 정치 지형은 점점 더 양극화되고 있습니다. 한쪽에서는 급진적 사회 개혁과 계급 투쟁을 외치고, 다른 한쪽에서는 강경한 북벌과 무력 통일을 주장하며, 길거리와 신문 지면은 서로 다른 구호로 가득 차 있습니다. 이러한 상황에서, 진보당과 중국청년당 내부의 온건파, 그리고 무당파 지식인들이 조용히 머리를 맞대기 시작했습니다.\n\n그들은 사천 대기근의 교훈이 극단적 이념 선동이 아니라, 책임 있는 행정과 점진적 개혁에 있다는 점을 상기시키며, 서로 다른 이념적 배경에도 불구하고 '헌정 수호'와 '민생 안정'이라는 공통 분모를 찾아내고 있습니다. 일부 지역에서는 진보당과 청년당이 서로의 후보에 대한 인신공격을 자제하고, 공동 정책 토론회를 개최하는 이례적인 장면도 연출되고 있습니다.\n\n이러한 중도 연합의 움직임은 아직 눈에 잘 띄지 않는 물밑 흐름에 불과하지만, 정치에 환멸을 느낀 시민들과 학계·전문직 종사자들 사이에서 서서히 지지를 얻고 있습니다. 민국의 미래는, 어쩌면 이 조용한 연합이 어느 방향으로 무게를 실을 것인가에 달려 있을지도 모릅니다."
 china_wr.26.a:0 "극단의 소음 너머에서, 새로운 다수가 형성되고 있다."
 china_wr.27.t:0 "강남의 무법지대를 겨냥한 일제 단속"
 china_wr.27.d:0 "선거 열기가 서서히 고조되는 가운데, 강남 지역에서는 폭력 조직과 토착 세력이 혼란을 틈타 영향력을 확장하고 있습니다. 일부 조직은 특정 정당과 결탁하여 상대 후보의 선거 운동을 물리적으로 방해하거나, 상인과 주민을 협박해 한쪽에 표를 몰아주도록 압박하고 있다는 보고가 올라오고 있습니다.\n\n이에 중앙정부는 강남 일대에 대한 대대적인 치안 강화 조치를 발표하고, 경찰·헌병·군 경비대를 동원한 합동 단속 작전을 개시했습니다. 불법 집회와 무허가 도박장, 무기 은닉 창고가 순차적으로 급습당하고 있으며, 여러 폭력 조직의 핵심 인물들이 체포되었다는 소식이 이어지고 있습니다. 일부 정당에서는 정치적 의도를 의심하며 불만을 표출하고 있으나, 강남 시민 다수는 최소한 선거 기간만이라도 거리의 폭력이 줄어들기를 바라고 있습니다.\n\n이번 작전이 진정으로 '법 앞의 평등'을 위한 것인지, 아니면 특정 정치 세력을 견제하기 위한 수단인지에 대한 논쟁은 계속될 것입니다. 그러나 한 가지 사실만은 분명합니다. 폭력과 협박 위에 세워진 선거는, 어떠한 명분으로도 민국의 이름을 지킬 수 없습니다."
 china_wr.27.a:0 "총성과 함께 치러지는 선거는 더 이상 용납될 수 없다."
 china_wr.28.t:0 "청방과 손을 잡은 정치인들"
 china_wr.28.d:0 "강남 단속이 공식적으로는 '무법 세력 일소'와 '선거 질서 확립'을 표방하고 있는 한편, 후방에서는 전혀 다른 움직임이 포착되고 있습니다. 국민당계 일부 인사들이 상하이의 거대 범죄 조직인 청방(青帮)과 비공식 접촉을 시도하고 있다는 보고가 올라온 것입니다.\n\n청방은 항만 노동자와 하역업자, 도시 빈민층에 이르기까지 폭넓은 동원력과 정보망을 보유하고 있습니다. 이들과의 협력은 특정 지역의 선거 분위기를 장악하고, 경쟁 정당의 선전 활동을 물밑에서 방해하는 데 있어 강력한 수단이 될 수 있습니다. 실제로 일부 항만과 시장에서는 국민당 후보의 유세장만 유난히 '조용하고 질서 정연하다'는 소문이 돌고 있습니다.\n\n그러나 이러한 거래는 민국의 법치와 정당 정치의 토대를 스스로 무너뜨리는 위험한 선택입니다. 지금은 선거 승리에 도움이 될지 몰라도, 언젠가 청방이 중앙 권력에 영향력을 요구하기 시작한다면, 그 대가는 상상 이상이 될 것입니다. 그럼에도 불구하고, 몇몇 정치인들은 당장의 승리를 위해 이 위험한 주사위를 던지고 있습니다."
 china_wr.28.a:0 "악마와의 거래는 항상 나중에 값을 치르게 된다."
 china_wr.29.t:0 "사천에서의 국민당 투표 거부 선언"
 china_wr.29.d:0 "사천에서의 상황이 점차 악화일로를 걷고 있는 와중, 국민당 사천 지부는 연일 당국에 대한 강도높은 비판을 이어가다 오늘 있었던 집회에서 기습적으로 '투표 거부'를 선언하였습니다. 그들은 치안과 행정이 아직 완전히 회복되지 않은 상황에서 선거를 강행하는 것은, "기아에 허덕이는 인민들의 눈을 가리고 선거를 조작 하기 위한 수작질"이라며, 사천 유권자에게 투표 참여를 자제해 달라고 공개적으로 호소하고 있습니다.\n\n국민당 사천 지부는 이어서 "투표 거부는 기근 피해 지역의 정치적 악용을 막기 위한 유일하며 불가피한 수단", "당국은 기근을 정치적 목적으로 이용하기 위해 의도적으로 방치 중" 이라 주장했습니다. \n\n그러나 사천의 다른 정당과 대부분의 언론은 이를 사실상 "선거 패배 가능성을 우려한 정치적 행동"이라고 비판하고 있고, 심지어는 일부 국민당원들까지 국민당 사천 지부의 발언에 우려를 표하고 있습니다. 무엇보다도 사천 주민들 사이에서는 "지난 몇 달 동안 사천의 질서를 어지럽히던 이들이 이제 와서야 우리를 위한다며 우리의 권리를 포기하라 떠들고 있다."는 냉소적인 반응이 번지고 있습니다.\n\n이 선언을 접한 국민당 지도부에서 사천 지부의 선언이 "완전히 독단적인 것"이며, "국민당 지지자 여러분은 부디 소중한 한표를 국민당을 위해 행사해주시길 바란다."고 성명을 발표하며 국민당 지지층 전체에 큰 혼란을 야기했습니다."
 china_wr.29.a:0 "그래서 투표를 하라는 거야, 하지 말라는 거야?"
 china_wr.30.t:0 "라디오 '자유의 목소리'의 선거 개입"
 china_wr.30.d:0 "중국청년당이 운영하는 라디오 방송 '자유의 목소리'는 그동안 주로 헌정주의와 법치, 사회 문제에 대한 해설을 다루는 교양 프로그램으로 알려져 있었습니다. 그러나 선거가 다가오면서, 이 방송은 점차 직접적인 정치 선전의 전면으로 나서기 시작했습니다.\n\n방송은 대놓고 특정 정당을 비난하는 대신, 사천 대기근과 조기 대선 약속, 개헌 논의 등 민감한 이슈를 다루면서 "절차의 정당성"과 "권력 남용에 대한 견제"의 중요성을 반복적으로 강조하고 있습니다. 전문가와 학자를 초청한 토론 프로그램, 청년층을 대상으로 한 청취자 참여 코너, 지방의 소식을 전하는 현장 연결 등 다양한 형식을 통해, 청년당이 표방하는 온건 개혁과 헌정 수호 노선을 자연스럽게 홍보하고 있습니다.\n\n도시의 지식인과 학생층, 라디오를 통해 정보를 접하는 중소 도시 시민들 사이에서 '자유의 목소리'를 듣지 않고는 정국을 논할 수 없다는 말이 나올 정도입니다. 비록 공식적으로는 어느 정당의 선전 기관지도 아니라고 주장하지만, 이 방송이 선거의 향방에 적지 않은 영향을 미치리라는 점은 부인할 수 없습니다."
 china_wr.30.a:0 "전선은 거리에서 전파 속으로 옮겨가고 있다."
 china_wr.31.t:0 "광장에 모인 목소리"
 china_wr.31.d:0 "진보당은 사천 대기근 이후 정치 불신이 깊어진 민심을 다시 결집하기 위해, 전국적 규모의 인민 궐기대회를 개최하기로 결정했습니다. 회의실 안에서의 토론이나 신문 지면의 논쟁으로는 더 이상 민생의 절규를 담아낼 수 없다는 것이 그들의 판단이었습니다.\n\n대회는 새벽부터 붉은 깃발과 손수 만든 표어를 들고 몰려든 노동자·학생·서민들로 붐볐습니다. 연단에 오른 연설자들은 복잡한 통계나 어려운 이론 대신, 기근 피해 지역에서 직접 들은 증언과 공장·항만·시장 곳곳에서 마주친 삶의 고통을 생생하게 전했습니다. 청중은 때로는 침묵으로, 때로는 우레와 같은 환호로 응답했습니다. "이 나라의 정치는 더 이상 위에서 아래로 떨어지는 명령이 아니라, 아래에서 위로 밀고 올라오는 삶의 힘이어야 한다"는 진보당의 구호는 대회장 전체를 뜨겁게 달구었습니다.\n\n대회가 절정에 달하자, 진보당 지도부는 '민생균부' 정책의 골자를 공개했습니다. 최저임금제의 단계적 실시, 식량·주거·의료 안전망 강화, 노동 보호법 개정, 지방 경제 균형 정책 등은 시민들에게 구체적인 미래상을 제시하며 큰 반향을 일으켰습니다. 수많은 사람이 연설장 주변을 떠나지 못한 채 서로의 의견을 나누며, 정치가 다시 일상의 문제와 연결될 수 있다는 희미한 희망을 이야기했습니다.\n\n그날의 궐기대회가 민국의 정치 지형을 뒤흔들 역사적 분기점이 될지는 아직 알 수 없습니다. 그러나 단 한 가지 사실만큼은 분명해졌습니다. 인민이 스스로 목소리를 내기 시작할 때, 정치의 방향 또한 그들의 삶을 향해 움직이기 시작한다는 것입니다."
 china_wr.31.a:0 "정치의 중심은 결국 인민에게 있다."
 china_wr.32.t:0 "자유의 논례"
 china_wr.32.d:0 "오늘 열린 '자유논례' 토론회에서 후스는 사회적 통념을 뒤흔드는 파격적 발언들을 연달아 펼쳐 청중을 크게 술렁이게 만들었습니다.\n\n그는 토론의 첫머리에서 "전통은 존중을 해야 한다는 건 일부 사실이지만 노예가 자기 팔에 사슬을 묶어놓고는 나 노예요, 하면서 노예인 것에 자부심을 느끼며 꺼드럭거리는데 이걸 우습게 보지 않을 수 없다"며,  '그냥 이 중국의 모든 사회 구조가 개인의 자유와 학문의 발전은 물론 상상할 수 있는 모든 걸 억누른다'고 비판했습니다. 토론 도중 일부 상대들은 자리를 박차고 일어나 항의하곤 했으나 후스는 개의치 않고 말을 이었습니다.\n\n이어 그는 언론 검열과 군벌·정당의 폭력을 정면으로 비난하며, "국가에 해로운 것은 자유가 아니라 자유 간판을 달고 꺼드럭대는 똥통의 구더기들"이라고 잘라 말했습니다. 이 발언은 토론장을 일순간 정적에 빠뜨렸습니다.\n\n가장 논란을 부른 대목은 여성·청년층과 관련된 그의 발언이었다. 후스는 "반쯤 굶고 반쯤 배우는 청년이 배부르고 순종하는 노인보다 백 배 가치 있다."고 말하며 교육과 기회의 문을 여성과 빈민에게 전면 개방해야 한다고 주장했습니다. 토론 조율 이후 일부 기자들이 주장이 급진적인 것이라고는 생각해 본 적 없는지 묻자, "그리 느끼는 자가 있으면 그 놈들이 낡아빠진 것이다."라고 응했다.\n\n후스의 발언은 청중 일부에게 열렬한 환호를 불러일으켰으나, 동시에 보수 성향 참석자들을 격분시키며 정치적 파문을 예고하고 있습니다."
 china_wr.32.a:0 "저 인간은 눈치 좀... 보라고 해."
 china_wr.33.t:0 "민생균부 청문회"
 china_wr.33.d:0 "진보당은 '민생균부' 노선의 실질적 추진을 위해 대규모 공공 청문회를 열고 있습니다. 사천 대기근 이후 무너진 생활 기반을 복구하기 위해 무엇이 필요한지, 인민 각계의 목소리를 직접 듣겠다는 취지입니다.\n\n청문회에는 농민, 항만 노동자, 공장 노동자, 상공인, 교사, 의사 등 다양한 계층이 참석하여 임금·식량·주거·의료·부채 문제에 대한 구체적인 사례를 증언하고 있습니다. 진보당 지도부는 이 증언을 토대로 최저임금제 도입, 식량 공급망 안정화, 근로환경 개선, 지방 경제 균형 정책 등을 반영한 '민생균부 패키지'를 공개하고 있습니다.\n\n이번 청문회는 단순한 선거 이벤트가 아니라, 인민의 삶을 정책으로 직접 연결하고 있다는 인상을 강하게 남기고 있습니다. 서남 지역을 중심으로 상당한 지지 상승세가 나타나고 있으며, 진보당은 자신들의 노선이 민국 재건의 중심이 될 수 있다고 자신감을 드러내고 있습니다."
 china_wr.33.a:0 "인민의 삶을 듣는 것에서 정치가 시작된다."
 china_wr.34.t:0 "민권헌정 개혁 포럼"
 china_wr.34.d:0 "중국청년당은 '민권헌정' 노선을 구체화하기 위해 전국적 규모의 헌정 개혁 포럼을 열고 있습니다. 사천에서 드러난 행정 실패의 근본 원인을 '권력 집중'과 '감시 부재'로 진단하며, 이를 고치는 것이 민국을 재건하는 첫걸음이라고 강조하고 있습니다.\n\n포럼에서는 국회 권한 강화, 사법부 독립 보장, 언론 자유 확대, 시민 사회 활성화, 중앙-지방 권력 조정 등 구체적인 제도 개혁안이 논의되고 있습니다. 연단에 선 학자들은 '제도가 시민을 보호하지 않는 국가는 위기 때마다 무너질 수밖에 없다'고 경고하고 있으며, 청년 지식층은 이러한 주장에 깊은 관심을 보이며 활발한 토론을 이어가고 있습니다.\n\n중국청년당은 이번 포럼을 통해 자신의 정치 노선이 단순한 개혁 구호가 아니라, 헌정 기반을 실제로 복원하려는 실천적 계획임을 강조하고 있습니다."
 china_wr.34.a:0 "헌정이 바로 설 때, 개혁도 바로 선다."
 china_wr.35.t:0 "북벌통일 전략 회의"
 china_wr.35.d:0 "국민당은 만몽국이 장악한 북방 문제를 민국 침체의 핵심 원인으로 규정하고 있으며, 이를 해결하기 위한 '북벌통일' 전략 회의를 전국 조직과 함께 개최하고 있습니다.\n\n회의에서는 만몽국이 통제하고 있는 철도·광물·항만 이권, 그리고 조계지·치외법권 지역에서 빠져나가는 막대한 부가 민국의 재건을 방해하고 있다는 분석이 제시되고 있습니다. 국민당 지도부는 북방 영토 회복, 철도망 확보, 병참 기반 재정비, 국경 경비 강화 등을 포함한 장기 전략을 분명히 하고 있습니다.\n\n이 전략 회의는 국민당이 군사 행동을 단순한 무력 시위로 보지 않고, 국가의 존립과 정통성을 되찾기 위한 필수 과정으로 보고 있음을 보여주고 있습니다. 국민당 지지층은 강한 결속력을 보이며, 북벌의 명분은 점점 더 민국 정치의 중심이 되고 있습니다."
 china_wr.35.a:0 "통일 없는 정치와 경제는 허상일 뿐이다."
 china_wr.36.t:0 "사천 기근의 진정과 선거 재개"
 china_wr.36.d:0 "사천 대기근이 마침내 진정 국면에 접어들었다는 소식이 중앙정부에 도달하고 있습니다. 장강 수운망을 활용한 구호 작전과 각 성의 물자 지원이 효과를 내기 시작하면서, 그동안 끊이지 않던 아사 보고가 크게 줄어들었습니다. 더불어 치안 또한 서서히 안정되며, 현지 행정은 정상적인 기능을 회복하고 있습니다.\n\n사태가 긴급 단계를 벗어남에 따라, 중단되었던 대총통 선거 준비 역시 다시 추진될 수 있게 되었습니다. 비록 사천 주민들의 상흔은 여전히 깊게 남아 있지만, 민국은 더 이상 정치 일정을 미룰 수 없다는 목소리가 강하게 올라오고 있습니다.\n\n중앙정부는 이제 선거의 정상적 시행을 선언하고, 민국이 다시 앞으로 나아가야 할 때임을 천명하고 있습니다."
 china_wr.36.a:0 "민국은 다시 움직여야 한다."
 china_wr.37.t:0 "대총통 선거의 결과"
 china_wr.37.d:0 "장기간의 불안과 사천 기근의 혼란을 넘어, 마침내 민국의 대총통 선거가 완료되었습니다. 진보당의 차이어, 중국청년당의 후스, 국민당의 왕징웨이—세 후보는 각자의 길에서 민국의 미래를 두고 치열한 경쟁을 벌였습니다.\n\n유권자들은 민생, 자유, 통일이라는 서로 다른 비전을 놓고 숙고했고, 세 후보 역시 전국을 돌며 마지막 순간까지 지지를 호소하였습니다. 긴 투표와 개표 과정이 모두 마무리된 지금, 민국은 새 시대를 열 새로운 지도자를 맞이할 준비를 하고 있습니다.\n\n이제 선거의 최종 결과가 발표될 것입니다."
 china_wr.37.a:0 "차이어가 승리했다."
 china_wr.37.b:0 "후스가 승리했다."
 china_wr.38.t:0 "국민당의 항의 성명"
 china_wr.38.d:0 "사천 사태가 선거 기간 내내 국민당을 괴롭혀 왔던 가운데, 대총통 선거의 패배가 확정되자 국민당 지도부는 즉각적으로 성명을 발표했습니다. 그들은 선거의 패배 원인을 '사천 지역에서의 투표 거부 혼란'과 '중앙정부의 미흡한 대응'에 돌리며, 이 모든 과정이 선거 결과를 왜곡했다고 주장하고 있습니다.\n\n국민당 지도부는 "사천 주민이 온전히 투표권을 행사하지 못하도록 만든 것은 명백한 방해 행위"라고 규정하며, 이를 바로잡지 않는 한 선거의 정당성을 인정할 수 없다고 주장했습니다. 일부 강경파는 심지어 재투표를 요구하며 거리 집회를 추진하고 있습니다.\n\n그러나 다른 정당과 언론은 국민당이 이미 흔들리던 지지 기반을 스스로 무너뜨린 결과를 '부정선거'라는 명분으로 포장하고 있을 뿐이라고 비판하고 있습니다. 민국은 지금, 패배의 충격을 외부 요인으로 돌리는 국민당의 정치적 대응을 지켜보고 있습니다."
 china_wr.38.a:0 "또다시 책임을 남 탓으로 돌리는군."
 china_wr.39.t:0 "국민당의 여론전"
 china_wr.39.d:0 "선거 패배 이후, 국민당은 이번에는 언론을 향해 날을 세우기 시작했습니다. 당 지도부는 여러 신문과 라디오 방송이 선거 기간 내내 자당 후보를 의도적으로 배제하고, 특정 정당의 주장에 유리한 보도를 이어왔다고 주장했습니다.\n\n국민당 대변인은 긴급 기자회견에서 "언론이 공정성을 상실해 여론을 왜곡했고, 그 결과 우리 당은 정당한 평가를 받지 못했다"고 강하게 비판했습니다. 심지어 일부 의원은 "언론의 편향이야말로 이번 선거의 진짜 부정행위"라고 주장하며, 언론조사위원회 설치를 요구하고 있습니다.\n\n하지만 대부분의 언론사는 국민당의 주장을 정면으로 반박하며, 오히려 선거 기간 동안 국민당이 언론을 기피하고 내부 혼란만 노출했다고 반격했습니다. 국민당이 여론전으로 패배의 충격을 덮으려는 것인지, 아니면 실제로 언론 환경이 문제였는지는 향후 정치적 논쟁의 핵심이 될 전망입니다."
 china_wr.39.a:0 "언론 탓까지 하기 시작했군."
 china_wr.40.t:0 "국민당의 조작설 제기"
 china_wr.40.d:0 "국민당 지도부 일부가 이번에는 선거의 지역별 득표 양상을 문제 삼기 시작했습니다. 특히 각종 산업도시와 항만, 대학이 밀집한 지역에서 국민당의 득표율이 크게 하락한 것이 논란의 중심이 되었습니다.\n\n강경파 의원들은 "일부 도시 선거 관리기관이 중립 의무를 저버리고 특정 정당에 유리한 환경을 조성했다"고 주장하며, 개표 담당자 교체·투표함 이동 경로·비밀 투표소 운영 등을 근거로 '조작 가능성'을 제기했습니다.\n\n그러나 선거관리위원회는 모든 의혹을 즉각 부인하고, 모든 지역에서 동일한 기준으로 투표가 진행되었다고 발표했습니다. 다른 정당들은 국민당이 '전략적 패배'를 인정하지 않고, 도시에서의 지지층 이탈을 부정선거 프레임으로 덮으려 한다고 비판하고 있습니다.\n\n국민당이 제기한 조작설은 아직 명확한 증거를 갖추지 못했지만, 선거 결과를 둘러싼 정치적 갈등은 다시 한 번 불을 지피고 있습니다."
 china_wr.40.a:0 "패배를 인정할 줄도 알아야 한다."
 china_wr.41.t:0 "사천 의용군의 무장 시위"
 china_wr.41.d:0 "대총통 선거 결과가 발표되자마자, 국민당 사천 지부가 후원하던 의용군 단체가 성내 여러 지역에서 무장 시위를 벌이기 시작하였습니다. 그들은 '부정선거 규탄'을 외치며 도로를 봉쇄하고, 일부는 군용 잔존 장비를 들고 정부군 지휘소 근처까지 접근하여 긴장을 고조시키고 있습니다.\n\n정부군은 아직 대규모 무력 사용을 자제하고 있으나, 몇몇 지역에서는 의용군이 검문을 거부하며 총성이 오가는 작은 충돌이 발생했다는 보고가 올라오고 있습니다. 국민당 중앙당은 "조직적 지시가 아니다"라고 주장하고 있으나, 현장의 분위기는 점차 통제 불가능한 방향으로 흘러가고 있습니다."
 china_wr.41.a:0 "불길한 조짐이다..."
 china_wr.42.t:0 "사천 의용군의 조직적 충돌"
 china_wr.42.d:0 "사천 일대에서 국민당 의용군과 정부군 사이의 충돌이 본격적인 교전 양상을 띠기 시작했습니다. 의용군 일부는 선거 논란을 이유로 정부군 주둔지를 기습했고, 양측의 충돌 끝에 부상자가 발생했습니다.\n\n정부는 이를 '산발적 폭력'이라 발표하고 있으나, 현장에서는 도로·창고·우편기지 공격 등 점점 더 조직적인 형태의 교란이 보고되고 있습니다. 특히 산악 지대를 중심으로 의용군이 거점을 구축하고 있다는 소식은 사태가 단순 소요를 넘어서고 있음을 보여줍니다."
 china_wr.42.a:0 "상황이 심상치 않다."
 china_wr.43.t:0 "사천 의용군의 반란 조짐"
 china_wr.43.d:0 "사천 의용군은 이제 사실상 중앙정부에 대한 무장 반란 직전 단계에 있습니다. 그들은 정부군 보급호송대를 습격하고, 일부 지역 행정청사를 점거하며 무력 시위를 넘어선 행동을 이어가고 있습니다.\n\n일부 지휘관은 '사천은 더 이상 정부의 명령을 따르지 않는다'며 지역 자치를 선언하고 나섰으며, 주변 지역의 불만 세력이 합류하려는 움직임도 포착되고 있습니다. 국민당 중앙은 사태를 축소하고 있으나, 현지에서는 폭발적 충돌이 임박했다는 우려가 커지고 있습니다."
 china_wr.43.a:0 "지금 진압하지 않으면 돌이킬 수 없다."
 china_wr.44.t:0 "장강 구호 수송선 격침 사건"
 china_wr.44.d:0 "사천 기근 복구를 위해 장강을 따라 북상하던 대형 구호 수송선이 새벽 무렵 국민당 포병 진지의 집중 사격을 받고 침몰하는 사건이 발생했습니다. 선박에는 식량과 의약품, 간이 주택 자재 등 필수 구호물자가 실려 있었으며, 정부는 즉각 성명을 발표해 이번 공격을 '고의적 폭력 행위'로 규정했습니다.\n\n생존자들의 증언에 따르면, 수송선은 장강을 오르며 충분한 신호를 보내고 있었음에도 국민당 포병대는 사격을 멈추지 않았습니다. 일부 포탄은 침몰한 선박에서 탈출 중이던 구명정 주변까지 떨어졌다고 하며, 현장은 아수라장이 되었습니다. 국민당 측은 '오인 사격'이라고 해명했지만, 사천 주민과 여론은 이를 명백한 보복이자 정치적 폭력으로 인식하며 격렬히 분노하고 있습니다.\n\n이번 사건은 단순한 충돌을 넘어, 선거 패배 이후 급격히 격앙된 국민당 과격파가 본격적인 무장 행동으로 치닫고 있다는 우려를 증폭시키고 있습니다. 장강 수송로는 사천 복구의 핵심 동맥인 만큼, 수송선의 격침은 민국 전체에 큰 충격을 주고 있습니다."
 china_wr.44.a:0 "구호 물자를 향한 공격은 용서받을 수 없다."
 china_wr.45.t:0 "사천 국민당 의용군 해산 명령"
 china_wr.45.d:0 "사천 지역은 최근 몇 달간 기근과 행정 마비, 그리고 대선을 둘러싼 정치적 긴장이 한꺼번에 뒤섞이며 극도로 불안정한 상태에 놓여 있었습니다. 특히 사천에는 오래전부터 국민당계 의용군이 존재해 왔으며, 이들은 지역 방위를 명분으로 활동하면서도 사실상 지방 정부군과 별개의 무력 체계로 움직여 왔습니다.\n\n기근이 심화되자 중앙 정부와 지방 관료들은 긴급 구호 물자를 수송하는 구호선을 통해 사천으로 식량과 의약품을 보내기 시작했습니다. 그러나 대선 국면에서 지역 갈등이 폭발하면서, 사천 정부군과 사천 국민당 의용군은 여러 지점에서 잦은 충돌을 벌였습니다. 서로가 상대방을 '대선 개입 세력'이라고 비난하며 국지전이 빈번히 벌어졌고, 이 과정에서 사천의 치안은 사실상 붕괴하기 시작했습니다.\n\n그리고 사건의 결정적 전환점이 찾아왔습니다. 사천 정부가 보낸 구호선 한 척이 강을 따라 진입하던 중, 국민당 성향의 의용군이 이를 '부정선거 조작과 외부 개입'이라고 규정하며 포격을 가한 것입니다. 구호선을 향한 이 공격은 사천 전역을 충격과 공포에 빠뜨렸고, 기근으로 고통받던 주민들의 분노는 걷잡을 수 없이 치솟았습니다.\n\n사건 직후 중앙 정부는 더 이상 사천 의용군을 지역 치안 조직으로 인정할 수 없다는 입장을 분명히 하였습니다. 구호선을 공격한 행위는 단순한 충돌이 아니라, 국가의 구호 체계와 행정 명령을 정면으로 거부한 폭력 행위라고 규정되었고, 결국 오늘 중앙 정부는 사천 국민당 의용군 전 병력에 대해 즉각적인 해산 명령을 공식적으로 선포했습니다.\n\n사천 정부군은 명령을 따를 준비를 하고 있지만, 의용군 내부에서는 거센 반발의 조짐이 보이고 있습니다. 일부 지휘관은 해산 요구를 '정치 탄압'으로 규정하고 있으며, 의용군 병사들 사이에서도 불만이 누적되고 있습니다. 주민들 사이에서도 의견은 엇갈립니다. 구호선을 공격한 의용군에 반발하는 목소리와, 의용군이 사천을 방어해왔다고 주장하는 목소리가 뒤섞여 혼란은 더욱 깊어지고 있습니다.\n\n이번 해산 명령은 사천 지역 불안정 사태의 중대한 분수령이 될 것이며, 앞으로의 정치적 파장은 쉽게 가라앉지 않을 것으로 보입니다."
 china_wr.45.a:0 "질서부터 바로잡아야 한다."
 china_wr.46.t:0 "국민당의 격렬한 반발"
 china_wr.46.d:0 "정부가 지방 의용군 해산 명령을 발표하자, 국민당 중앙당부는 즉각 긴급회의를 소집하고 성명을 발표했습니다. 국민당 지도부는 의용군이 단순한 지역 무장 집단이 아니라, 다년간 당을 지탱해온 군사적 기반이자 북방 위협에 대비한 '민족 방위 세력'이라고 주장하며 정부의 조치를 강하게 비난하고 있습니다.\n\n국민당은 성명에서 "지방 의용군의 해산은 민국의 안보를 스스로 무너뜨리는 행위이며, 특정 정당의 정치적 이득을 위해 국민당의 군사적 기반을 약화시키려는 시도"라고 규정했습니다. 일부 강경파는 정부가 의도적으로 국민당을 무장 해제시키려 한다며, 중앙당부 청사 앞에서 항의 시위를 조직하고 있습니다.\n\n지방 의용군 지휘관들 역시 거센 반발을 표출하며 해산 명령을 거부할 조짐을 보이고 있습니다. 일부 지역에서는 '항명 선언'까지 논의되고 있어, 민국 정국은 다시 한 번 위험한 갈림길에 서게 되었습니다."
 china_wr.46.a:0 "상황이 점점 더 위험해지고 있다."
 china_wr.47.t:0 "사천의 대규모 교전 발생"
 china_wr.47.d:0 "사천 전역에서 정부군과 국민당계 지방 의용군 사이의 충돌이 마침내 전면적 군사 교전으로 확산되었습니다. 처음에는 몇몇 교량 주변에서 벌어진 작은 총격전으로 보였으나, 불과 하루 만에 주요 도로·행정 중심지·강 수운 거점까지 충돌이 퍼져나가며 사천은 사실상 무정부 상태에 돌입했습니다.\n\n사천 정부군은 기근 수습 이후 재편된 행정 질서를 유지하기 위해 출동했으나, 국민당 의용군은 중앙정부의 '해산 명령'은 불법이며 자신들은 사천 시민을 지키기 위한 정당한 무장 세력이라 주장하며 격렬히 저항하고 있습니다. 양측은 각기 다른 명분을 내세우며 점차 중화기의 사용까지 확대하고 있어, 피해 규모는 눈에 띄게 증가하고 있습니다.\n\n일부 지역에서는 관공서·군수 물자 창고·교량 등이 파괴되었다는 보고가 이어지고 있으며, 사천 곳곳의 주민들은 대피하거나 지역 사회가 붕괴되는 상황을 두려움 속에서 지켜보고 있습니다. 중앙정부는 이번 사태가 방치될 경우 민국 전체의 안정이 무너질 수 있다고 보고 있어, 긴급한 대응이 필요한 국면이 도래했습니다."
 china_wr.47.a:0 "사태가 걷잡을 수 없이 악화되고 있다."
 china_wr.48.t:0 "사천 내전"
 china_wr.48.d:0 "사천성에서 벌어지던 산발적인 충돌이 마침내 전면적인 무력 충돌로 비화하였습니다. 사천성 정부군과 국민당 계열의 국민혁명군 사천군간의 대규모 교전을 벌이고 있다는 소식이 중국에서 부터 전해지고 있습니다.\n\n사천 대기근의 상흔이 채 아물기도 전에, 선거를 둘러싼 논쟁과 지방 의용군 해산 문제가 겹쳐지면서 사천의 정국은 급속도로 불안정해졌습니다. 중앙정부가 지방 의용군 해산을 명령하고 사천 사태에 개입하려 하자, 국민당 측은 이를 '부정선거를 덮기 위한 무장 탄압'이라 주장하며 무장 봉기를 본격화했습니다."
 china_wr.48.a:0 "세계는 중국의 혼란을 주시하고 있다."
 china_wr.49.t:0 "사천 비적 활동"
 china_wr.49.d:0 "사천 대기근 이후 사천 전역에서 비적들의 약탈이 다시 고개를 들고 있습니다. 장강 유역과 농촌 도로를 중심으로 식량과 물자를 노린 무장 집단이 등장하고 있으며, 일부 지역에서는 마을 단위의 치안조차 유지되지 못하고 있습니다.\n\n사천성 정부는 민심이 극도로 불안정해진 상황을 우려하고 있으나, 기근의 여파로 현지 행정력과 치안력이 모두 약화된 상태라 즉각 대응에도 한계가 드러나고 있습니다. 주민들은 각자 생존을 위해 문을 걸어 잠그고, 지방 관료들조차 비적 봉기를 두려워하는 상황입니다."
 china_wr.49.a:0 "비적이 다시 들끓고 있다..."
 china_wr.50.t:0 "사천 치안 붕괴"
 china_wr.50.d:0 "사천 대기근의 충격이 누적되면서, 성 전역의 치안 체계가 사실상 마비되고 있습니다. 경찰과 헌병은 기근 이후 급증한 약탈·폭력·탈영 사건을 통제하지 못하고 있으며, 성도 외곽과 농촌 지대에서는 행정기관이 기능을 멈췄다는 보고가 잇따르고 있습니다.\n\n여러 지역에서는 주민들이 스스로 무장을 시작하고 있으며, 지방 사병조직이 다시 등장하는 조짐까지 보이고 있습니다. 사천성은 지금 한 걸음만 더 나아가면 무정부 상태에 빠질 것이라는 우려가 고조되고 있습니다."
 china_wr.50.a:0 "사태가 통제 불능이 되어가고 있다."
 china_wr.51.t:0 "국민혁명정부를 선포한 중국 국민당"
 china_wr.51.d:0 "중앙정부에 충성을 맹세한 국민혁명군이 치안 유지를 명목으로 전투 없이 난징에 무혈입성한지 약 20시간만에 난징의 국민혁명군 사령부는 기존에 선포했던 정부에 대한 충성 멩세를 철회하고, 현 정부의 부정선거와 부패를 규탄하는 성명을 내는 동시에 '국민혁명정부'를 선포했습니다. 이에 난징의 시민들은 다양한 반응을 보이고 있으나 여론은 대체로 국민정부를 지지하는것으로 보입니다.\n\n지금도 혼란이 지속되고있는 남중국의 다른 성 정부들은 대부분 '국민정부'측에 우호적인 반응을 보이고 있습니다. 그 중 우한 시는 이미 '국민혁명정부'에 가입을 선포했으며 안칭시 일부를 점거한 친국민당 민병대 역시 국민정부 가입을 선포했습니다.\n그러나 안칭시의 양쯔강 강변은 여전히 정부군이 통제중이기 때문에, 친국민당 민병대측이 점령한 안칭시의 구획은 사실상 정부군에 완벽히 포위되어 있습니다. 정부군은 안칭시를 완전히 탈환하기 위해 공세를 준비중이며, 다른 지방에서도 산발적인 교전이 점차 그 강도를 높이고 있습니다. 이는 중국 전역에서 계속되고있는 무력충돌이 사실상 내전의 단계로 접어들었음을 시사하고 있습니다."
 china_wr.51.a:0 "역적놈의 새끼들!"
 china_wr.51.b:0 "쑨원 만세! 국민혁명 만세!"
 china_wr.52.t:0 "중국 내전 발발"
 china_wr.52.d:0 "사천에서 시작된 무력 충돌이 마침내 전국으로 번져, 중국은 다시금 거대한 내전에 빠져들고 있습니다. 국민당 강경파의 무력 봉기 선언 이후 각지에서 교전이 잇따라 발생하고 있으며, 일부 지역은 순식간에 통신과 행정이 마비된 것으로 전해지고 있습니다.\n\n중앙정부는 이번 사태를 명백한 반란으로 규정하고 진압 작전에 돌입했으나, 국민당 군대 역시 빠르게 세력을 확대하며 주요 도시와 도로 축선을 장악하고 있습니다. 국제사회는 중국 전역으로 확산되는 혼란을 깊은 우려 속에 지켜보고 있습니다."
 china_wr.52.a:0 "중국의 미래가 흔들리고 있다."
 china_wr.53.t:0 "서남호국군의 합류"
 china_wr.53.d:0 "서남호국군이 장기간의 고립과 사천 내전의 확산 속에서 마침내 호법정부에 합류하겠다는 입장을 공식적으로 밝혔습니다. 그들은 국민당의 강경파적 노선과 중앙정부 장악 시도의 위험성을 지적하며, '헌정 질서의 회복'을 위해 호법정부가 유일한 정당한 중심이라고 강조하고 있습니다.\n\n서남호국군의 합류는 단순한 병력 증가를 넘어, 서남 지역 전체에서 호법정부의 정통성을 강화하고 전선의 균형을 흔들 중대한 전환점이 될 것으로 평가받고 있습니다. 내부에서는 이들의 합류를 환영하며 즉각적인 지휘계통 조정과 작전 통합 준비가 진행되고 있습니다."
 china_wr.53.a:0 "정통은 다시 우리에게 모이고 있다."
 china_wr.54.t:0 "서남호국군의 변절"
 china_wr.54.d:0 "서남호국군이 호법정부와의 협력을 공식 선언함에 따라, 국민당 내부에서는 큰 충격과 분노가 일고 있습니다. 그들은 기존에 중립적 태도를 유지하던 서남호국군이 사천 사태를 빌미로 호법정부 측에 서기로 한 것은 명백한 배신이며, 중앙의 권위를 무너뜨리는 불순한 선택이라고 비판하고 있습니다.\n\n일부 강경파 장성들은 즉각적인 군사적 대응을 주장하고 있으나, 지도부는 전선 분열을 막기 위해 신중한 태도를 유지하고 있습니다. 서남 지역에서의 영향력 약화는 불가피해 보이며, 국민당의 전략 또한 재조정이 필요한 상황이 되었습니다."
 china_wr.54.a:0 "또 하나의 배신이라니..."
 china_wr.55.t:0 "티베트 독립 선언"
 china_wr.55.d:0 "사천 내전으로 중앙정부의 통제력이 급격히 약화되자, 티베트 지방정부는 오랫동안 유지되어 온 명목상의 종속 관계가 사실상 단절되었다고 판단했습니다. 라싸의 관리들과 종교 지도자들은 연이은 혼란과 전쟁이 티베트의 안정을 위협한다며, 더 이상 중원의 정치적 격변에 휘말릴 수 없다는 입장을 표명했습니다.\n\n오늘, 티베트 당국은 공식적으로 완전한 독립을 선포하며 자체 정부의 수립과 국경 방위 강화 조치를 발표했습니다. 사천과 청해 일대의 군사적 진공 상태를 틈탄 결정으로 보이며, 주변 지역 군벌과 외세 역시 이 움직임을 주의 깊게 관찰하고 있습니다.\n\n중앙정부는 이를 불법적인 분리 행위로 규정했으나, 현재의 혼란 속에서 즉각적인 대응을 하기에는 역량이 크게 제한되어 있습니다. 티베트의 독립 선언은 중국 내전으로 흔들리는 정세에 또 하나의 균열을 더하고 있습니다."
 china_wr.55.a:0 "중국의 혼란은 끝없이 번져간다."
 china_wr.56.t:0 "신강성 권력 재편"
 china_wr.56.d:0 "신강성에서 성스차이가 군정·행정 전반을 사실상 주도하고 있다는 보고가 접수되었습니다. 그는 기존 성 정부의 요직을 광범위하게 재편하며, 자신에게 충성하는 측근들로 핵심 기관을 재구성하고 있습니다.\n\n성스차이는 여전히 형식적으로는 호법정부에 충성을 표하고 있으나, 실질적으로는 신강성 전역의 행정·치안·군사권을 자신의 통제 아래 두고 있습니다. 그의 독자적 조치는 지역 군벌 세력과 소수민족 지도자들을 포섭하거나 배제하는 방식으로 이루어지고 있으며, 이에 따라 신강성은 점차 중앙의 직접적 통제에서 멀어지고 있습니다.\n\n호법정부는 신강의 급격한 권력 재편을 우려하고 있으나, 현 단계에서 성스차이를 제어할 수단은 제한적이라는 평가가 지배적입니다."
 china_wr.56.a:0 "신강이 점점 독자적으로 움직이고 있다."
 china_wr.57.t:0 "서북연군 성립"
 china_wr.57.d:0 "서북 지역에서 주요 장군직을 지내며 영향력을 행사해 온 마씨 가문이 '서북연군'이라는 통합 군사체제를 실질적으로 구성하였다는 소식이 전해지고 있습니다. 이들은 지역 방위와 치안 유지를 명분으로 내세우며, 광범위한 군사적 자치를 확보하고 있습니다.\n\n마씨 군벌은 형식적으로는 호법정부에 충성을 유지하고 있으나, 실제로는 독자적인 병력 운용과 행정적 판단을 통해 서북 전역을 자신들의 영향권 아래 두고 있습니다. 중앙정부의 명령은 서북에서 점차 형식적인 절차로만 받아들여지고 있으며, 마씨의 군사적 기반은 나날이 공고해지고 있습니다.\n\n일각에서는 서북연군이 장기적으로 사실상의 독립 권력으로 굳어질 가능성까지 제기하고 있어, 호법정부는 서북 상황을 면밀하게 주시하고 있습니다."
 china_wr.57.a:0 "서북이 중앙에서 멀어지고 있다."
 china_wr.58.t:0 "산서의 독자적 행보"
 china_wr.58.d:0 "산서성을 장기간 통치해 온 옌시산이 중앙의 혼란과 사천 내전의 격화 속에서 사실상 독자적인 행정·군사 체제를 구축하고 있다는 소식이 전해지고 있습니다. 그는 표면적으로는 호법정부에 대한 충성을 유지하고 있으나, 실제로는 중앙의 지시보다 산서의 안정을 우선시하며 독자적인 정책을 펼치고 있습니다.\n\n최근 산서성 정부는 중앙 정부군의 이동을 제한하고, 세금·병력·행정 결정 등 주요 사안을 산서 내부에서만 처리하기 시작했습니다. 옌시산이 산서군을 재편하며 외부 개입을 차단하고 있다는 보고까지 나오고 있어, 산서는 명목상은 민국의 일부이지만 사실상 반독립 상태에 가까운 모습을 보이고 있습니다.\n\n정치권 일각에서는 옌시산의 행보가 장기적으로 산서의 완전한 이탈로 이어질 수 있다고 우려하고 있으며, 중앙정부는 산서 문제의 향방을 주시하고 있습니다."
 china_wr.58.a:0 "산서도 중앙에서 멀어지고 있다."
 china_wr.59.t:0 "서북초비사령부 수립"
 china_wr.59.d:0 "섬서성과 인접 지역에서 영향력을 확대해 온 펑위상이 마침내 독자적인 군사·행정 체제를 구축했다는 소식이 전해지고 있습니다. 그는 혼란스러운 정국 속에서 호법정부와 국민당 어느 쪽에도 전폭적인 신뢰를 두지 않겠다며, '서북초비사령부'라는 명칭의 새로운 군사사령부를 선포하였습니다.\n\n펑위상은 성경비를 명분으로 내세우며 해당 지역의 치안·징세·병력 재편 등을 모두 자신의 지휘체계 아래 통합하고 있습니다. 서북초비사령부는 공식적으로는 호법정부의 일원임을 표방하고 있으나, 실질적으로는 중앙의 명령과 국민당의 지시에 모두 독자적으로 대응하며 독립적인 세력으로 떠오르고 있습니다.\n\n일각에서는 펑위상이 중원 전체의 불안을 기회로 삼아 더 넓은 자치권을 확보하려 한다는 분석이 나오고 있습니다. 호법정부는 그의 움직임이 장차 양측 모두의 전선을 복잡하게 만들 수 있다고 우려하며 상황을 예의주시하고 있습니다."
 china_wr.59.a:0 "또 하나의 세력이 떠오르고 있다."
 china_wr.60.t:0 "신강 정변"
 china_wr.60.d:0 "내전으로 전국이 혼돈에 빠진 가운데, 신강성에서 충격적인 소식이 전해지고 있습니다. 기존의 신강성주 양쩡신이 알 수 없는 무장세력의 습격을 받아 살해되었고, 그의 뒤를 이어 진수런이 사실상 신강의 새로운 성주로 부상했다는 것입니다.\n\n진수런은 사건 직후 곧바로 군부 핵심을 장악하고, 주요 도시와 수비대 지휘권을 손에 넣으며 정국을 빠르게 장악했습니다. 그는 자신이 '질서 회복'을 위해 불가피한 조치를 취했을 뿐이라고 주장하고 있으나, 사건 경위가 지나치게 신속하고 정교했다는 점에서 실질적인 권력 탈취라는 관측이 지배적입니다.\n\n신강의 각 군구는 혼란 속에서도 하나둘씩 진수런에게 충성을 맹세하고 있으며, 중앙정부와 호법정부 모두 이번 사태를 어떻게 규정해야 할지 혼란에 빠진 모습입니다. 신강은 지금, 전국적 내전의 열기 속에서 또 하나의 독자적 권력이 탄생하려 하고 있습니다."
 china_wr.60.a:0 "신강은 또 다른 혼란 속으로 빠지고 있다."
 china_wr.61.t:0 "신강의 새로운 폭정"
 china_wr.61.d:0 "양쩡신의 통치는 구시대적이었을지라도 최소한 일정한 안정성을 유지하고 있었습니다. 그러나 그의 죽음 이후 권력을 장악한 진수런은 집권 초기부터 신강을 급격한 혼란으로 몰아넣고 있습니다. 그는 재정 원칙을 무너뜨리며 통화량을 단기간에 1억 4,500만 냥으로 폭증시켰으며, 가축 도축세를 비롯한 새로운 세금을 무더기로 신설하면서 민생을 크게 압박하고 있습니다.\n\n진수런은 금·옥·양가죽 등 주요 산업을 사적으로 독점하여 막대한 부를 축적하고 이를 베이징으로 빼돌리고 있습니다. 당시 신강을 여행하던 영국인 피터 플레밍은 그를 "탐욕이 능력을 앞지른 관료"라고 평가했습니다. 이러한 경제적 폭정으로 인해 신강 전역에서는 불만이 빠르게 확산되고 있습니다."
 china_wr.61.a:0 "폭정의 그림자가 짙어지고 있다."
 china_wr.62.t:0 "소수민족 억압"
 china_wr.62.d:0 "진수런의 폭정은 경제를 넘어 신강의 다민족 질서를 붕괴시키고 있습니다. 양쩡신이 오랜 기간 유지해 왔던 미묘한 균형은 그의 손에서 무너져 내리고 있습니다. 진수런은 신강의 무슬림들에게 메카 성지순례를 금지하는 명령을 내렸으며, 기존의 비한족 엘리트들을 숙청하고 한족 관료들로 대체하고 있습니다. 또한 몽골·키르기스 유목민들에게 한족 관리의 통제를 강요하고 종교 지도자의 권한을 축소시키면서 갈등을 악화시키고 있습니다.\n\n그는 더 나아가 양쩡신이 용인해 왔던 소규모 칸국을 모두 폐지했습니다. 하미 칸국의 군주 막수드 샤가 사망하자 진수런은 칸국을 해체하고 새로운 행정구역을 설치했습니다. 위구르인들은 처음엔 이를 환영했으나, 진수런이 농업세를 두 배로 올리고 휴경지를 몰수해 한족 이민자들에게 재분배하면서 상황은 급격히 악화되고 있습니다. 한족 이민자들에게는 농기구·종자·세금 면제 등의 혜택이 주어지고 있으며, 위구르인들은 점점 척박한 지역으로 밀려나고 있습니다."
 china_wr.62.a:0 "신강은 깊은 균열 속으로 빠져들고 있다."
 china_wr.63.t:0 "신강 대규모 혼란"
 china_wr.63.d:0 "진수런의 폭정과 급격한 통치 실패는 마침내 신강성 전역을 심각한 혼란으로 몰아넣고 있습니다. 경제는 붕괴 직전에 놓여 있으며, 무리한 증세와 산업 독점 정책으로 인해 주민들의 생활은 급속도로 피폐해지고 있습니다. 한족 관료 중심의 강압적 행정은 위구르·카자흐·키르기스 등 지역 민족들의 불만을 폭발시키고 있으며, 곳곳에서 항의와 충돌이 잇따르고 있습니다.\n\n또한 진수런의 부정 행정과 중앙과의 단절은 치안 체계를 약화시켜 도적대와 무장 세력의 활동을 더욱 활발하게 만들고 있습니다. 일부 지역은 사실상 정부의 통제가 무너진 상태이며, 신강은 사천과 같이 전면적인 무정부적 혼란 속으로 빠져들고 있습니다.\n\n중앙정부는 사태를 우려 깊게 지켜보고 있지만, 내전의 불길이 중국 전역으로 번지고 있는 상황에서 신강 문제에 즉각 개입할 여력은 거의 없는 실정입니다."
 china_wr.63.a:0 "신강도 무너지고 있다."
 china_wr.64.t:0 "둥가니스탄 점령"
 china_wr.64.d:0 "신강 전역이 혼란에 빠지자, 마중잉은 '질서 회복'을 명분으로 내세우며 둥간계 지역이 위치한 둥가니스탄 일대를 전격적으로 점령하고 있습니다. 그는 자신의 병력이야말로 유일하게 안정적으로 전투가 가능한 세력이라고 주장하며, 진수런의 통치를 무능과 폭정으로 규정하고 있습니다.\n\n마중잉의 군대는 지역 지휘관들과의 교전 없이 주요 도시와 교통 요지를 빠르게 장악하였으며, 일부 둥간 지도자들은 그가 가져올 질서 회복을 기대하면서도 그의 야심에 대한 두려움을 동시에 드러내고 있습니다. 신강의 기존 행정 체계가 붕괴된 상황에서, 그의 '질서 회복' 선언은 사실상 새로운 무단 통치의 시작을 의미하고 있습니다.\n\n중앙정부는 이 사태가 신강 상황을 안정시키기는커녕 오히려 갈등의 또 다른 불씨가 될 것을 우려하고 있습니다."
 china_wr.64.a:0 "저 인간도 별 다를 바 없다."
 china_wr.65.t:0 "성스차이의 권력 장악"
 china_wr.65.d:0 "신강 전역이 진수런의 폭정과 무능, 그리고 각지의 혼란으로 급속히 붕괴하자, 성스차이는 더 이상 사태를 좌시할 수 없다며 본격적으로 군사적 행동에 돌입했습니다.\n\n성스차이는 진수런 측의 병력을 각지에서 궤멸시키며 주요 도시와 요충지를 신속히 장악했습니다. 진수런은 결국 지지 기반을 잃고 성도의 관청에서 축출되었으며, 그는 도주 과정에서 소수의 측근들과 함께 행방을 감춘 것으로 알려지고 있습니다. 신강의 관료들과 지방 엘리트들은 성스차이에게 충성을 선언하며 새로운 권력 질서에 적응하기 시작하고 있습니다.\n\n그러나 성스차이의 군사적 장악이 신강에 진정한 안정과 질서를 가져올지는 알 수 없습니다. 그의 통치는 지역의 분열을 수습하는 계기가 될 수도 있지만, 또 다른 강권적 지배의 서막이 될 가능성 역시 존재하고 있습니다."
 china_wr.65.a:0 "신강의 미래는 그에게 달렸다."
 china_wr.66.t:0 "산서의 요청"
 china_wr.66.d:0 "중국 내전이 걷잡을 수 없는 국면으로 접어들자, 산서의 옌시산은 정세가 더 악화되기 전에 국민당에 비공식 접촉을 시도하였습니다. 그는 국민당이 전국적인 주도권을 확보하고 있는 만큼, 산서 역시 독자적으로 버티는 데 한계가 있다고 판단하고 있는 듯합니다.\n\n옌시산은 사절단을 통해 "산서의 안정과 질서는 지금까지 자신이 유지해 왔으며, 앞으로도 산서가 혼란에 빠지지 않도록 협조할 의지가 있다"고 전했습니다. 그러나 그 협조의 대가로, 그는 자신이 산서에서 쌓아온 지위와 권한을 국민당이 보장해 줄 것을 요구하고 있습니다.\n\n국민당 지도부는 그의 제안이 가져올 정치적 이득과 부담을 신중히 검토하고 있으며, 옌시산의 협력이 사천 사태 이후의 전국 정세에 어떤 영향을 미칠지 판단하고 있습니다."
 china_wr.66.a:0 "옌시산의 제안을 수락한다."
 china_wr.66.b:0 "산서를 굴복시킬것이다."
 china_wr.67.t:0 "국민당의 승인"
 china_wr.67.d:0 "국민당 지도부는 옌시산이 보낸 협조 제안을 공식적으로 승인하였다는 통보를 보내왔습니다. 국민당은 산서가 질서를 유지해 온 점을 일정 부분 인정하며, 앞으로의 전국적 전선에서 산서의 협조가 긍정적 역할을 할 것이라 평가하고 있습니다.\n\n다만 국민당은 옌시산 개인의 지위와 권한 보장에 대해서는 명확한 약속을 피하고, 산서의 군사·행정 체계를 국민당의 지휘 아래 단계적으로 통합하겠다는 방침을 제시하였습니다. 이는 협조 요청은 받아들이되, 산서의 향후 권한은 국민당이 직접 결정하겠다는 의미로 해석되고 있습니다.\n\n옌시산은 이번 통보를 통해 당장의 생존과 안정은 확보했지만, 향후 산서의 자치권과 자신의 위치가 얼마나 유지될지는 여전히 불투명합니다."
 china_wr.67.a:0 "이것이 최선의 선택일지도 모른다."
 china_wr.68.t:0 "국민당의 거부"
 china_wr.68.d:0 "국민당 지도부는 옌시산의 협조 제안을 공식적으로 거부한다는 성명을 산서로 전달하였습니다. 국민당은 현재 전국적 전황이 자신들에게 유리하게 흐르고 있으며, 산서의 협조 없이도 충분히 정세를 장악할 수 있다고 판단하고 있는 것으로 보입니다.\n\n국민당은 산서가 지금까지 유지해 온 독자적 체제를 '중앙 질서 확립에 대한 걸림돌'이라고 규정하며, 산서가 국민당에 합류하려면 기존 권력을 모두 해체하고 전면 복종해야 한다고 요구하고 있습니다. 사실상 항복을 강요한 셈입니다.\n\n이 통보를 받은 옌시산과 산서 고위 관료들은 충격에 빠져 있으며, 산서는 앞으로 독자 방어 체제를 강화할지, 혹은 다른 정파와의 연대를 모색할지 중대한 선택 앞에 놓이게 되었습니다."
 china_wr.68.a:0 "산서는 스스로를 지켜야 한다."
 china_wr.69.t:0 "마부팡의 승계"
 china_wr.69.d:0 "서북군 사령관 마린이 정체불명의 무장 세력에게 암살되는 사건이 발생하며 서북은 단숨에 혼란에 빠지고 말았습니다. 사건 직후 관청과 군영에서는 지휘 체계가 붕괴되기 시작했고, 일부 지역에서는 무장 집단 간 충돌과 약탈이 벌어지고 있다는 보고까지 올라오고 있습니다.\n\n그러나 이러한 혼란은 오래가지 않았습니다. 마부팡은 암살 소식이 전해지자마자 자신의 핵심 측근들과 충성 장교들을 신속하게 규합하고, 서북의 주요 요충지와 성도 관부를 장악하였습니다. 이어서 지방 유지와 종교 지도자들이 잇달아 그에게 충성을 선언하면서, 서북의 실권은 거의 저항 없이 그의 손에 넘어가게 되었습니다.\n\n마부팡의 승계는 마씨 가문 내부에서 오래 지속되었던 갈등의 종결을 의미함과 동시에, 서북의 권력 구도가 다시 한 번 급격하게 재편되고 있음을 보여주고 있습니다. 그의 통치가 서북에 안정을 가져올지, 혹은 더 강압적인 지배의 시대를 여는 신호탄이 될지는 아직 확실하지 않습니다."
 china_wr.69.a:0 "서북은 이제 마부팡 아래에 있다."
 china_wr.70.t:0 "마중잉의 쿠데타"
 china_wr.70.d:0 "둥가니스탄을 장악한 뒤 급격히 영향력을 확대해 온 마중잉이 마부팡의 통치를 부정하며 무력으로 서북 권력의 재편을 시도하고 있습니다. 그는 스스로를 '서북의 진정한 수호자'라 주장하며, 마부팡의 이전 권력 승계가 정당성을 결여했다고 비판하고 있습니다.\n\n쿠데타 세력은 둥가니스탄에서 끌어온 병력을 앞세워 청해 주요 거점을 공격하고 있으며, 일부 지역에서는 이미 마중잉 진영이 행정기관을 장악했다는 보고도 이어지고 있습니다. 그러나 마부팡 역시 오랜 기반과 충성스러운 장교단을 이용해 강력히 저항하고 있어, 청해 전역은 일촉즉발의 내전에 휘말릴 가능성이 커지고 있습니다.\n\n이제 서북의 미래는 어느 세력이 최종적으로 우위를 점하느냐에 따라 갈릴 것입니다."
 china_wr.70.a:0 "마중잉은 실패했고 죽임당했다."
 china_wr.70.b:0 "마중잉이 서북을 이끌 것이다."
 china_wr.71.t:0 "서북연군의 붕괴"
 china_wr.71.d:0 "마중잉이 쿠데타에 성공한 뒤 청해성장 자리를 강제로 계승한 이후, 그는 자신에게 반대했던 세력들을 무자비하게 탄압하며 권력을 공고히 하고자 하였습니다. 그는 반대 장교들을 처형하거나 축출하고, 평소 적대적이라 여겼던 소수민족 지역에 군대를 투입하여 보복 조치를 가하면서 서북 전역을 공포 분위기로 몰아넣었습니다.\n\n그러나 이러한 폭정은 오래 지속될 수 없었습니다. 과도한 탄압과 무리한 조세, 반복되는 군사 동원이 주민들의 분노를 폭발시키며 곳곳에서 봉기와 탈영이 발생하고 있습니다. 마중잉의 측근들조차 그를 떠나기 시작했고, 서북연군 내부에서는 장교단이 둘로 갈라져 충돌하는 사태까지 벌어지고 있습니다.\n\n결국 서북연군은 통제력을 완전히 잃고 급속히 붕괴하고 있으며, 청해를 포함한 서북 전역은 무장 세력들이 난립하는 혼란 상태로 빠져들고 있습니다. 마중잉의 폭정은 스스로가 만든 권력 기반을 무너뜨리는 결과만을 남기고 있습니다."
 china_wr.71.a:0 "서북은 다시 혼란 속으로 빠져들고 있다."
 china_wr.72.t:0 "국민당 분열"
 china_wr.72.d:0 "장제스와 왕징웨이의 협력 관계는 중앙 지도부 차원에서는 안정적으로 유지되고 있습니다. 두 계파 모두 중국의 정치적 혼란 속에서 당이 흔들리는 것을 막기 위해 긴밀히 협의하며 공동 대응을 이어가고 있습니다. 그러나 이러한 안정과는 달리 국민당 내부의 다른 파벌들은 점점 과격해지고 있으며, 특히 극우 계열은 당 지도부의 결정을 인정하지 않겠다며 강하게 반발하고 있습니다.\n\n극우파는 장·왕 양계가 모든 정책 결정을 독점하고 있다며 공개적으로 비난하고 있으며, 불만을 품은 지방 조직들은 중앙의 통제를 거부하려는 움직임까지 보이고 있습니다. 여러 회의에서는 고성과 폭언이 난무하고, 일부 의원들은 위협 편지를 받는 등 당내 긴장은 갈수록 악화되고 있습니다.\n\n현재 장왕합작은 그대로 유지되고 있지만, 그 외 파벌의 불만이 누적되면서 국민당 전체가 심각한 균열 상태에 놓여 있습니다."
 china_wr.72.a:0 "누가 이 당을 통제할 수 있을까."
 china_wr.73.t:0 "대총통 후보를 둔 국민당 내 불만"
 china_wr.73.d:0 "왕징웨이가 국민당의 대총통 후보로 공식 확정되자, 당 지도부는 이를 통해 내부의 혼란을 정리할 수 있을 것이라 기대했으나, 현실은 정반대의 결과를 보이고 있습니다. 후보 선출 과정이 특정 계파 중심으로 이루어졌다는 불만이 당 전역에서 터져 나오며, 급진 성향의 계파들은 왕징웨이를 인정할 수 없다며 회의를 무산시킬 정도의 격렬한 항의를 이어가고 있습니다.\n\n극우 인사들은 왕징웨이를 '당을 망치는 타락한 인물' 또는 '빨갱이'라 비난하며 후보 교체를 요구하고 있고, 지방 조직들 사이에서는 중앙의 결정에 따르지 않겠다는 선언까지 등장하고 있습니다. 회의석상에서는 의원들이 서류를 집어 던지거나 서로 고성을 지르며 충돌하는 사건이 빈번해지고 있습니다.\n\n왕징웨이의 후보 확정은 통합을 이루기보다는 오히려 국민당 내부의 권력 갈등과 불만을 더욱 드러내며, 당 전체를 심각한 혼란 속으로 빠뜨리고 있습니다."
 china_wr.73.a:0 "선거가 다가올수록 균열은 더 깊어지고 있다."
 china_wr.74.t:0 "국민당 내부의 또 다른 충돌"
 china_wr.74.d:0 "국민당의 내부 갈등은 지도부와 계파 간의 정치적 문제를 넘어, 이제 무장 조직들 사이의 직접적인 충돌로 확산되고 있습니다. 일부 급진 장교들은 자신들과 다른 의견을 가진 지휘관들을 적대시하기 까지 하고 있습니다.\n\n최근 보고에 따르면 몇몇 지역에서 국민당 내부 무장조직들이 서로 총격전을 벌이는 사태까지 발생했으며, 지방 경찰이나 행정력이 개입해야 할 정도로 상황이 악화되고 있습니다. 지방 당부들은 중앙의 통제력이 약화되었다고 판단해 독자적인 방침을 고수하는 경향을 보이고 있고, 그 과정에서 계파 간 언쟁은 점점 더 폭력적인 양상으로 변하고 있습니다.\n\n당 지도부는 이를 '일부 과열된 충돌'로 축소하고 있으나, 내부 보고서들은 국민당 전체가 심각한 분열 상태에 빠져 있으며, 무장 충돌이 더 확산될 경우 당의 존립 자체가 흔들릴 수 있다는 우려를 담고 있습니다."
 china_wr.74.a:0 "국민당의 균열은 더 큰 위기를 향해 가고 있다."
 china_wr.75.t:0 "서북지역의 충성 선언"
 china_wr.75.d:0 "호법정부가 내전 속에서 급속히 붕괴하자, 그동안 명목상으로만 호법정부에 소속되어 있던 서북 지역 각 세력은 새로운 질서를 모색하기 시작하였습니다. 서북지방은 서로 다른 권력 집단이 뒤섞인 복잡한 구도 속에서도, 중앙의 공백이 가져올 혼란을 우려하며 행동에 나섰습니다.\n\n오늘, 서북 지역을 대표하는 장군단은 국민당 정부에 공식 사절단을 보내어 '중국의 안정을 위해 국민당과 보조를 맞추겠다'고 선언하였습니다. 그들은 호법정부의 몰락으로 더 이상 서북이 고립된 군벌 상태로 남을 수 없으며, 국민당이야말로 정통 정부로서 중국 혼란을 수습할 유일한 힘이라고 강조하고 있습니다.\n\n그러나 이 충성 선언이 실질적인 복종을 의미하는지는 아직 불투명합니다. 서북 각지의 장군들은 여전히 강력한 지역 기반을 보유하고 있으며, 충성의 깊이와 진정성은 향후 중앙과의 관계 설정에 따라 크게 달라질 것입니다. 그럼에도 불구하고, 국민당으로서는 서북이 공개적으로 합류 의사를 밝힌 것만으로도 정치적·군사적 우위를 확보하는 중요한 성과라 할 수 있습니다."
 china_wr.75.a:0 "서북은 결국 국민당을 택했다."
 china_wr.76.t:0 "강남 부분 계엄 선포"
 china_wr.76.d:0 "사천 내전의 여파가 장강 하류와 강남 일대로 확산되자, 호법정부는 마침내 강남 전역에 부분 계엄을 선포하였습니다.\n\n정부는 치안 악화와 선동 세력의 확대를 막기 위한 불가피한 조치라고 설명하며, 주요 항만과 철도 요충지, 공업 지대에 군과 헌병을 전진 배치하였습니다.\n\n야간 통행 제한과 대규모 집회 금지, 선동성 문서와 신문에 대한 검열이 강화되자, 상인과 노동자, 학생층에서는 불만의 목소리가 높아지고 있습니다. 그럼에도 중앙정부는 "강남이 흔들리면 민국 전체가 무너질 수 있다"며, 사태가 안정될 때까지 계엄 조치를 유지하겠다는 입장을 분명히 하고 있습니다."
 china_wr.76.a:0 "현명한 조치다."
 china_wr.76.b:0 "[CHI.GetLeader]가 미쳐버린건가?"
 china_wr.77.t:0 "국민당의 부정선거 주장"
 china_wr.77.d:0 "이번 대선은 사천 기근과 행정적 혼란 속에서 강행되었고, 선거관리위원회는 전례 없는 규모의 투표소 관리 실패와 개표 지연, 유권자 대기시간 폭증, 지역 간 편차가 큰 감독 수준 등 수많은 문제를 노출했습니다. 여러 지역에서는 감독관이 제대로 배치되지 않았고, 일부 투표소는 며칠씩 개표 결과를 내지 못해 전국적인 조롱과 의혹을 낳았습니다. 선거 직후부터 선관위의 무능은 전국적 화제가 되었으며, 정부가 선관위 개편을 서둘러 검토할 만큼 파장이 컸습니다.\n\n그러나 문제는 단순한 무능으로 끝나지 않았습니다. 국민당 지지층 사이에서는 선관위의 실수와 혼란이 단순한 실수가 아니라 '고의적 개입'이라는 인식이 빠르게 확산됐습니다. 특히 사천과 강남 일대에서 개표 지연이 심하자, 국민당 지지층은 선거가 여당에 유리하게 조작되었다는 주장을 공개적으로 제기하기 시작했습니다. 처음에는 극소수의 과격한 주장으로 치부되었으나, 선관위 논란이 점점 커지자 이러한 의혹은 곧 지지층 대부분의 공통된 의견으로 자리 잡았습니다.\n\n이 분위기 속에서 국민당 내부에서도 강경파뿐 아니라 중도파 지도부까지 '선관위의 총체적 실패로 인해 선거 신뢰성이 훼손되었다'는 주장을 받아들이기 시작했습니다. 결국 오늘, 국민당 중앙위원회는 공식 성명을 발표하며 이번 대선이 '심각한 절차적 하자와 선관위의 구조적 무능으로 인해 공정성을 상실했다'고 규정했습니다. 성명은 정부가 선거를 제대로 관리하지 못했으며, 일부 지역에서는 고의적 개입 가능성까지 배제할 수 없다고 언급하며 사실상 선거 불복을 선언했습니다.\n\n이 성명은 전국 정치판에 큰 충격을 던지고 있습니다. 국민당 지지층은 환호하며 대규모 집회를 준비하기 시작했고, 반면 정부는 이를 '정치적 선동'으로 규정하며 과민하게 대응하고 있습니다. 여러 지방 정부는 상황을 예의주시하며 치안 강화 조치를 검토하고 있으며, 군부 일부에서도 이번 성명을 계기로 정치적 입장을 드러내는 움직임이 감지되고 있습니다.\n\n국민당의 이번 결정은 단순한 불만 표출이 아닙니다. 지지층 여론이 당론을 밀어붙였고, 선관위 논란이 적당히 넘어가지 못한 결과, 정치국가적 위기가 공식화되는 순간이 되어버렸습니다. 정부는 이제 상황을 수습할 수 없게 되었으며, 위기는 새로운 국면에 접어들고 있습니다."
 china_wr.77.a:0 "불길한데..."
 china_wr.78.t:0 "병역법 개정안의 재입안"
 china_wr.78.d:0 "중앙 정부가 추진했던 병역법 개정안은 사천 지역을 휩쓴 대규모 기근으로 인해 한동안 중단되어야 했습니다. 수많은 인력이 구조와 구호 활동에 투입되었고, 정치적 여유 또한 부족해지면서 개혁 논의는 멈춰버린 상태였습니다. 그러나 국민당 문제는 여전히 국내 정세를 불안하게 만드는 핵심 요인으로 남아 있으며, 중앙군의 체계적 복원 없이는 어떤 중장기 계획도 세울 수 없는 상황입니다.\n\n재입안된 병역법은 국가 차원의 징병 제도를 강화하고 각 성이 보유한 독자적인 사병 및 보안대 체계를 근본적으로 해체하는 것을 목표로 하고 있습니다. 이는 단순한 군사 개편이 아니라, 중국의 정치 위기를 해소하기 위한 국가적 개혁의 핵심 축입니다. 개혁이 성공한다면 중앙 정부는 병력을 직접 통제할 수 있게 되고, 지방 세력의 무기력한 자율성은 크게 약화될 것입니다.\n\n그러나 문제는 언제나 독자적인 자치권과 기득권을 고수하려는자들입니다. 개혁을 밀어붙이면 반발은 필연적입니다. 일부 성 정부와 지방 지도층은 이미 해당 법안이 자신들의 세력을 위협한다고 판단하고 강하게 반대 의사를 표명하고 있습니다. 반면 개혁을 위해 이들 지방 세력과 일정 수준에서 타협을 시도할 경우, 사병 금지 조항이나 징병권 조정에서 후퇴해야 할 가능성도 존재합니다.\n\n정부는 이제 선택해야 합니다. 개혁의 기회를 다시 잡은 지금, 지방 세력과 충돌을 감수하고라도 강경 개혁을 밀어붙일 것인가? 아니면 그들의 협력을 얻어 점진적 개혁으로 나아갈 것인가? 이 결정을 어떻게 내리느냐에 따라 향후 정치 위기의 방향 또한 크게 달라질 것입니다."
 china_wr.78.a:0 "지방 세력과 타협한다."
 china_wr.78.b:0 "강경하게 밀어붙인다."
 china_wr.79.t:0 "충정부대의 언론인 즉결 처형"
 china_wr.79.d:0 "충정부대가 도심 언론사 건물 인근에서 친국민당 성향의 언론인을 체포한 뒤, 어떠한 재판 절차도 없이 현장에서 즉시 총살한 사건이 발생했습니다. 해당 언론인은 국민당 잔존 세력의 시민 시위를 선동하고 정부 비판 기사를 연이어 게재해 온 인물이었으며, 오랫동안 정부 내 강경파의 감시 대상이 되어 있었습니다.\n\n사건 당시 충정부대는 해당 인물이 \"반정부 선동을 지속하며 지역 치안을 위협했다\"는 이유로 긴급 체포를 시도했고, 체포 과정에서 언론인이 저항하자 '즉결 조치'를 가했다는 것이 공식 설명입니다. 그러나 현장에서 목격한 주민들의 증언은 전혀 다른 이야기를 들려주고 있습니다. 주민들은 체포 과정에서 언론인이 무장을 하지 않았으며, 충정부대가 체포 절차를 제대로 고지하지도 않았다고 말하고 있습니다.\n\n총성이 울리자 주변 시민들은 공포에 휩싸였고, 현장은 순식간에 긴장 상태에 빠졌습니다. 정부는 이번 사건이 치안 유지와 내전 재발 방지를 위한 불가피한 판단이었다고 해명하고 있지만, 언론인 처형이라는 민감한 사안은 이미 국내·국외에서 큰 논란을 만들어내고 있습니다.\n\n근본적으로 국민당 잔존 세력에 대한 공포와 강경 정책이 충정부대를 지나치게 긴장시키고 있으며, 이와 같은 작전상의 과잉 대응이 앞으로 더 빈번하게 발생할 것이라는 우려가 커지고 있습니다. 이번 사건은 단순한 총격이 아니라, 국가의 통제와 정당성에 대한 심각한 질문을 던지고 있습니다."
 china_wr.79.a:0 "통제 미흡이었을 뿐이다."
 china_wr.80.t:0 "서주 시위대에 대한 실탄 발포"
 china_wr.80.d:0 "서주 지역에서 벌어진 대규모 국민당 지지 시위가 충정부대와 충돌하면서, 결국 실탄 발포로 이어지는 심각한 사태가 벌어졌습니다. 시위대는 지역 행정청 앞에서 집결하여 국민당 지도부 석방과 정부의 강경 정책 중단을 요구했으며, 일부 시위대는 도심 중심가까지 행진하며 구호를 외쳤습니다.\n\n현지 경찰은 시위대가 건물을 점거할 가능성이 있다고 판단해 충정부대의 지원을 요청했습니다. 충정부대는 '치안 확보'를 명령받고 현장에 전개되었으나, 대치 과정에서 일부 시위대가 돌을 던지고 장벽을 흔들자 부대 지휘관은 경고 사격 없이 즉각 실탄 사용을 명령했습니다.\n\n전개된 부대는 시위대를 향해 일제히 사격을 가했고, 그 결과 100여 명의 시민이 죽거나 중상을 입는 참혹한 사태가 발생했습니다. 사거리가 짧은 도심에서의 무차별적인 발포는 공포를 증폭시켰고, 시민들은 패닉 상태에 빠져 사방으로 도망쳤습니다. 사건 이후 현장에는 피로 얼룩진 돌바닥과 버려진 신발만이 남았습니다.\n\n중앙 정부는 '폭도 진압 과정에서 발생한 불가피한 사상'이라고 발표했지만, 서주 시민들과 여러 지방 관료들은 과도한 무력 사용에 대해 깊은 충격과 분노를 표하고 있습니다. 이번 사건은 국민당 잔존 세력에 대한 강경책이 어디까지 치닫고 있는지를 보여주는 상징적 사건으로 평가되고 있으며, 향후 국내 정치 판도에 커다란 파문을 일으킬 가능성이 높습니다."
 china_wr.80.a:0 "무슨 일이 벌어지는거야?"
 china_wr.81.t:0 "우한 난민 행렬에 가해진 총격"
 china_wr.81.d:0 "우한 지역에 부분 계엄령이 선포된 이후, 시내 곳곳에서 치안 공백과 행정 혼란이 이어지고 있습니다. 전투 피난민, 내전 잔존 세력의 난민, 기근을 피해 움직이는 주민들까지 섞이면서 우한 시내 주요 도로에는 매일같이 거대한 행렬이 형성되고 있습니다. 계엄령 발표 이후 외출과 이동은 엄격히 제한되었지만, 자택조차 잿더미가 된 주민들에게는 규제를 지킬 방법조차 없었습니다.\n\n그러나 오늘, 우한 북부 도로에서 정부 경비대가 난민 행렬을 향해 실탄을 발사하는 참혹한 사건이 벌어졌습니다. 경비대는 난민들이 '계엄령 하 이동 금지 명령을 위반했다'는 이유로 해산 명령을 내렸고, 난민들 중 일부가 죽은 가족의 시신이나 최소한의 짐을 들고 있어 즉시 흩어지지 못하자, 경비대장은 이를 '집단적 위반 및 반정부적 행동'으로 간주했습니다.\n\n목격자에 따르면 경비대는 최후의 경고도 없이 난민 행렬을 향해 총격을 가했습니다. 총성은 도로 전체를 뒤흔들었고, 난민들은 공포에 질린 채 사방으로 흩어졌습니다. 어린아이를 안고 달아나다가 넘어지거나, 노인이 짐을 지키려다 총탄에 쓰러지는 비극적인 장면이 여러 곳에서 목격되었습니다. 현장은 순식간에 아수라장이 되었고, 수십 명의 사망자와 부상자가 발생했습니다.\n\n정부는 공식 발표에서 난민 행렬 중 일부가 계엄 통제선을 돌파하려 했으며 폭동 우려가 있어 '필요한 조치'를 취했다고 주장했습니다. 그러나 우한 주민과 지방 관료들은 이 사건을 '무능과 공포가 빚어낸 국가 폭력'이라고 비판하고 있습니다. 일각에서는 충정부대·경비대 전반이 과도한 긴장 상태에 놓여 있으며, 국민당 잔존 세력에 대한 공포가 무차별적 진압으로 이어지고 있다는 분석까지 나오고 있습니다.\n\n이번 사건은 단순한 오발이나 판단 착오의 문제가 아니라, 정부의 강경한 계엄 정책이 낳은 필연적 결과라는 우려가 제기되고 있습니다. 우한 난민 총격 사건은 향후 정국에 또 하나의 큰 파문을 남길 것으로 보이며, 정부의 정당성과 통치력에 대한 의문을 더욱 고조시키고 있습니다."
 china_wr.81.a:0 "질서가 우선이다."
 china_wr.82.t:0 "국민당 강경파의 무력 봉기 선언"
 china_wr.82.d:0 "대총통 선거를 둘러싼 부정선거 논란이 폭발적으로 확산되면서, 국민당 내부의 분위기는 걷잡을 수 없는 속도로 급변했습니다. 선거관리청의 허술한 운영과 지역별 개표 지연, 감독 부실이 계속해서 드러나자 국민당 지지층에서는 '이번 선거는 처음부터 조작되었으며 정권이 승리를 훔쳐갔다'는 주장이 사실상 주류로 굳어졌습니다.\n\n특히 국민당 내부 강경파들은 이 여론을 근거로 '정부가 선거를 조작해 정권을 탈취했다'고 규정하며, 더 이상 정치적 항의를 넘어 무력 봉기를 공개적으로 주장하기 시작했습니다. 중앙위원회 내부는 처음에는 강경파의 주장을 기각하려 했으나, 당 지지층이 대규모 성명을 발표하며 "부정선거는 전쟁선포와 같다"라고 주장하며 분위기가 완전히 뒤집혔습니다.\n\n오늘 새벽, 국민당의 강경파 장교들과 지도부 일부가 독단적으로 군 병력을 동원하여 반정부 무장 행동을 개시했습니다. 이들은 '정권 탈취에 맞선 국민혁명'을 선포하며 지방군 병력과 의용 조직들의 지지를 호소하고 있습니다. 충격적인 것은, 이 결정이 온건파와 중도파 지도부의 명확한 승인 없이 이루어졌다는 점입니다.\n\n그러나 상황은 더욱 악화되고 있습니다. 이미 총격전이 벌어지고 내전이 시작된 이상, 국민당 내 온건파와 중도파는 선택지가 거의 사라졌습니다. 강경파는 그들을 공개적으로 압박하고 있으며, 지지층 또한 '가만히 있으면 반역자'라는 분위기를 조성하고 있습니다. 결국 온건파와 중도파 지도부 상당수는 원하든 원치 않든 내전에 가담할 수밖에 없는 처지로 내몰리고 있습니다.\n\n정부는 이번 사태를 '명백한 군사 반란'으로 규정하며 즉각적인 진압 태세에 들어갔습니다. 하지만 선거 불복에서 시작된 일이 하루아침에 군사 충돌과 정치적 붕괴로 이어지면서, 국가는 더 이상 평화로운 해결이 가능한 지점을 넘어서 버린 것으로 보입니다.\n\n국민당의 내전 돌입은 단순한 정치 항의가 아니라, 선거 부정을 명분으로 한 전면적인 체제 도전입니다. 앞으로 중국은 전례 없는 혼란 속으로 빠져들 전망입니다."
 china_wr.82.a:0 "최악의 상황이 시작되는군..."
 china_wr.83.t:0 "거국일치정부 출범"
 china_wr.83.d:0 "국민당 강경파의 무력 봉기로 내전이 촉발되고, 선거 혼란과 사천 사태까지 겹치면서 국가는 통제 불능의 혼란에 빠져들었습니다. 주요 도시의 행정은 마비되고 지방에서는 무장조직이 제각기 세력을 확장하며, 기존 정부는 더 이상 효과적인 대응을 하지 못하고 있었습니다.\n\n이러한 비상 상황 속에서 진보당과 중국청년당은 국가 붕괴를 막기 위해 결국 직접 나서기로 결정했습니다. 두 정당은 각 지역·각 사회계층·각 정치세력의 대표들을 긴급히 소집해 논의를 진행했고, 그 결과 국가 기능을 유지하기 위한 초당적 비상내각인 '거국일치정부'가 공식적으로 수립되었습니다.\n\n새로 출범한 거국일치정부는 치안 확보, 행정 복구, 식량 수급 안정, 교통망 유지, 지방군 통합 관리 등 국가 운영의 핵심 기능을 즉각적으로 접수하며 사실상의 통치 주체로 자리잡아 가고 있습니다. 기존 관료제와 지방 정부도 불안정한 정세를 우려해 이 새로운 내각과 협력하기 시작하면서, 권력의 중심이 서서히 거국일치정부 쪽으로 이동하고 있다는 평가가 나오고 있습니다.\n\n반면 국민당 강경파는 이를 '정당성을 무시한 정치적 장악'이라 규탄하며 강하게 반발하고 있고, 일부 군부는 아직 어느 쪽을 지지할지 결정을 내리지 못한 채 눈치를 보는 상황입니다. 그럼에도 많은 시민들은 최소한 질서를 회복하려는 움직임이 시작된 것에 안도감을 드러내고 있습니다.\n\n기존 정부와 새 비상내각이 동시에 존재하는 전례 없는 구조 아래에서, 이제 중국의 향방은 이 거국일치정부가 혼란을 얼마나 효과적으로 진정시킬 수 있는지에 달려 있습니다."
 china_wr.83.a:0 "이제 새로운 출발이다."
 china_wr.84.t:0 "반국민당 인사 실종"
 china_wr.84.d:0 "대총통 선거 이후 불안정한 정국 속에서, 최근 진보당 및 중국청년당을 지지하는 인파에 홍문과 청방과 관련된 조직폭력배들이 집단폭행을 가한다거나 반국민당적 보도를 진행한 기자 여럿이 납치 및 실종되는 사태가 이어지고 있습니다.\n\n수사당국에 의하면 이러한 일련의 사태가 홍문과 청방에 의해 주도적으로 이루어지는 것으로 보인다고 발표하였습니다. 이들은 모두 국민당과 밀접한 관련이 있는 것으로 알려진 조직폭력배이며, 특히 청방은 지난 대총통 선거 유세기간 동안 상대 유세인파를 협박하고 폭행한 적이 있습니다. 국민당은 이에 관련하여 어떠한 입장도 발표하고 있지 않지만 이것이 그들과 관련되어 있다는 것은 분명합니다."
 china_wr.84.a:0 "글쎄? 우리는 모르는 일이야."
 china_wr.85.t:0 "북경에서의 대대적 구금 사태"
 china_wr.85.d:0 "국민당 지도부가 북경의 불안정한 정세를 우려하며 난징으로 이동하는 방안을 검토하고 있었음에도 불구하고, 정작 실제 이동 조치는 제때 이루어지지 않았습니다. 그 결과, 북경에 남아 있던 주요 인사들은 예상치 못한 상황과 마주하게 되었습니다.\n\n도시 전역에서 치안 불안이 심화되고, 정부의 비상 조치가 강화되자 여러 국민당 의원·간부들이 갑작스럽게 체포되거나 조사를 명목으로 구금되기 시작했습니다. 일부는 사전에 경고를 받고 도망쳤으나, 다수는 대응할 틈도 없이 관공서나 자택에서 연행되었습니다.\n\n정부는 '폭력 사태 가능성이 있는 정치 인물들에 대한 예방적 조치'라고 발표하고 있으나, 국민당 내부에서는 이를 노골적인 정치 탄압으로 규정하고 격렬하게 반발하고 있습니다. 북경의 정세는 더욱 얼어붙고 있으며, 주요 인사 다수가 억류된 채 연락이 두절되면서 당 전체의 지휘 체계에도 큰 혼란이 생기고 있습니다.\n\n난징으로의 이동을 제때 실행하지 못한 대가는 지금처럼 혹독하게 돌아오고 있습니다. 당의 핵심 인력 중 일부는 이미 북경을 빠져나갔지만, 나머지 인사들이 어떤 처우를 받을지는 아무도 장담할 수 없는 상황입니다."
 china_wr.85.a:0 "우리가 너무 늦었어..."
 china_wr.86.t:0 "삼애주의 재정의"
 china_wr.86.d:0 "중국청년당의 한 원로가 오랫동안 당에서 주장해온 삼애주의—애민, 애물, 애세계—를 토대로 새 정부의 국가 강령을 만들자며 방대한 로드맵을 들고 회의장에 나타났습니다. 그는 정치 개혁, 경제 재편, 외교 노선, 사회 정책까지 세세히 설명하며 이것이 새로운 시대의 이정표가 될 것이라 주장했습니다.\n\n그러나 발표가 끝나자 회의장의 공기는 무겁게 가라앉았습니다. 후스는 문서를 조용히 넘기다 발표 내용을 정면으로 지적했습니다. 그는 기존 삼애주의가 국민당의 삼민주의와 지나치게 흡사하며, '애물'과 '애세계' 같은 가치가 내전과 재건이라는 현실에서 지나칠 정도로 추상적이라고 평가했습니다.\n\n후스는 "우리가 지금 필요한 것은 보편적 도덕 강연이 아니라, 혼란 속에서 실제로 국가를 지켜낼 수 있는 원칙입니다."라고 말했습니다. 그는 곧바로 빈 종이를 꺼내 새롭게 세 가지 원칙을 적었습니다.\n\n'애민, 애자유, 애주'\n\n그는 종이를 테이블 위에 내려놓으며 단호히 말했습니다. "인민을 사랑하고, 자유를 사랑하고, 우리가 발 딛고 사는 이 땅을 사랑한다—이 세 가지면 충분합니다. 지나친 미사여구는 모두 버립시다. 이것조차 정리되지 않는다면 제가 직접 정치를 끌고 가겠습니다." \n\n회의장은 깊은 침묵에 빠졌고, 중국청년당의 원로 역시 더는 반박하지 못한 채 자신이 준비한 문서를 접었습니다. 이 회의는 결국 후스가 정부의 이념 기조를 직접 재정의하는 순간으로 기록되었으며, 삼애주의는 완전히 새로운 형태로 다시 태어나게 되었습니다."
 china_wr.86.a:0 "새로운 기준이 정해졌다."
 china_wr.87.t:0 "강남 의석 재보궐 선거"
 china_wr.87.d:0 "내전에서 정부군이 승리하면서 국가 통합이 다시 이루어졌지만, 강남 지역은 오랜 전투와 행정 마비로 인해 의석 상당수가 공석으로 남아 있었습니다. 많은 의원들이 전투 중 피난하거나 지역을 떠났고, 일부는 내전 기간 동안 행정 기능이 완전히 무너진 탓에 직무를 수행할 수 없는 상태로 분류되었습니다. 내전이 끝났음에도 강남 일대의 의회 의석은 정상적인 활동을 재개하기 어려웠고, 정부는 이 지역의 대표성을 회복하기 위해 즉각적인 재보궐 선거를 실시하기로 결정했습니다. 선거는 혼란이 완전히 정리되지 않은 가운데 빠르게 준비되었고, 치안 회복이 더딘 일부 구역에서는 투표소 운영과 개표 과정에 여러 문제들이 보고되었습니다. 그럼에도 정부는 가능한 한 많은 지역에서 정상적 절차를 유지하기 위해 병력과 행정 인력을 파견하며 선거를 밀어붙였습니다. 결과적으로 대부분의 공석은 새 의원들로 채워졌고, 강남 지역은 비로소 국정 운영 체계에 다시 편입되었습니다. 비록 아직 지역마다 전후 복구가 진행 중이며 불안정한 요소가 남아 있지만, 이번 재보궐 선거는 강남의 정치적 공백을 메우고 전국적 안정으로 나아가기 위한 중요한 이정표가 되었습니다."
 china_wr.87.a:0 "강남의 공백은 이제 메워졌다."
 china_wr.88.t:0 "호법정부로의 귀환"
 china_wr.88.d:0 "내전의 종결과 함께 호법정부가 명백한 승리자로 자리잡자, 전쟁 동안 호법정부를 지지해온 지방정부들이 하나둘씩 중앙의 통치 체계로 완전히 복귀하고 있습니다. 내전 기간 동안 이들은 독자적인 행정과 방위 체계를 유지한 채 각자의 방식으로 호법정부를 지원했으나, 전황이 전국적으로 정리되면서 더 이상 분리된 형태의 임시 권한을 유지할 이유가 사라졌습니다. \n\n강남·호북·산서 등 여러 지역의 행정 책임자들은 중앙정부에 복귀 의사를 공식 전달했으며, 호법정부 역시 이들을 정식 정부 기구의 일부로 재편하는 절차를 신속히 진행하고 있습니다. 많은 지방 관료와 주민들은 내전의 혼란 속에서도 자신들이 선택한 정부가 최종적으로 승리했다는 사실에 안도감을 표하고 있습니다. \n\n이번 복귀는 단순한 행정 재통합이 아니라, 호법정부가 주장해 온 정통성이 전국적으로 확인되었다는 정치적 상징을 의미합니다. 지역마다 남아 있는 불안정 요소가 완전히 해소된 것은 아니지만, 지방정부들이 중앙의 품으로 돌아온 지금, 국가는 전쟁 이후의 재건에 본격적으로 돌입할 수 있는 기반을 마련하게 되었습니다."
 china_wr.88.a:0 "모두 제자리로 돌아왔다."
 china_wr.89.t:0 "폭발하는 인플레이션"
 china_wr.89.d:0 "대전쟁 이후 지속되던 전쟁특수가 끝나자, 국가는 급격히 수축하는 경기를 방치할 수 없었습니다. 정부는 조선업을 중심으로 한 대규모 산업 부양책을 추진하며 경기 회복을 시도했습니다. 그러나 조선업 지원은 기대만큼의 성과를 내지 못했고, 생산 기반을 재건하기도 전에 대량의 자금만 시중에 풀려 버리는 결과를 낳았습니다.\n\n그 여파로 내전 이전부터 인플레이션이 서서히 진행되고 있었습니다. 당시에는 관리 가능한 수준이라 여겨졌고, 적절한 유동성 회수와 재정 정비로 안정될 것이라는 전망도 존재했습니다. 하지만 내전이 시작되자 상황은 완전히 달라졌습니다. 행정 체계는 흔들렸고, 물자 유통망은 붕괴했으며, 지방마다 통화가치에 대한 신뢰가 급속도로 무너졌습니다.\n\n결국, 이미 취약해진 화폐 체계는 내전의 충격을 견디지 못했습니다. 불과 몇 주 사이에 물가는 기하급수적으로 치솟았고, 시민들은 일상적인 생필품조차 감당할 수 없는 지경에 놓였습니다. 상인들은 가격을 하루에도 여러 번 수정해야 했고, 일부 지역에서는 물물교환이 다시 등장할 정도로 통화 기능이 약화되었습니다.\n\n정부는 이를 '일시적 금융 혼란'이라 설명하고 있지만, 시장과 국민이 체감하는 현실은 훨씬 심각합니다. 내전이 장기화될 조짐을 보이는 상황에서, 인플레이션이 국가 경제 전반에 가져올 악영향은 가늠조차 어려워지고 있습니다."
 china_wr.89.a:0 "통제를 잃고 있다..."
 china_wr.90.t:0 "의용군의 전면 통합"
 china_wr.90.d:0 "중국 전역에 흩어져 있던 각종 의용군 조직은 오랫동안 치안 불안과 행정 혼란의 원인이 되어 왔습니다. 명목상으로는 지역 방위를 내세웠지만, 실제로는 중앙의 통제를 벗어난 무장 세력으로 기능하며 징발, 사적 보복, 독단적 무력 사용을 일삼는 경우도 적지 않았습니다.\n\n내전이 종결되고 정부가 전국적 통제력을 회복하자, 이러한 의용군 문제를 더 이상 방치할 수 없다는 판단이 내려졌습니다. 정부는 대대적인 무장 해제와 재편 작업을 단행했고, 모든 의용군 조직을 정규 지휘 체계 아래로 편입시키는 데 성공했습니다.\n\n일부 조직은 해산되었고, 다른 일부는 정규군·치안부대·보조 행정 인력으로 재배치되었습니다. 무엇보다 중요한 것은, 더 이상 중국 땅 어디에도 정부의 명령을 따르지 않는 무장 집단이 존재하지 않게 되었다는 점입니다.\n\n의용군의 전면 통합은 단순한 군사 개편이 아니라, 국가가 다시 하나의 질서로 묶였음을 상징하는 조치입니다. 이제 무력은 더 이상 지역의 것이 아니라, 국가의 통제 아래 놓이게 되었습니다."
 china_wr.90.a:0 "이제 총은 국가의 손에 있다."
 china_wr.91.t:0 "의용군의 부분 통합"
 china_wr.91.d:0 "전국 각지에서 활동하던 의용군은 오랫동안 정부의 통제를 벗어난 채 존재해 왔으며, 치안과 행정에 복합적인 부담을 남겨왔습니다. 내전 종결 이후 정부는 이들을 정리하고 국가 질서 안으로 편입시키기 위한 작업에 착수했습니다.\n\n그러나 현실은 단순하지 않았습니다. 일부 의용군 조직은 정부의 통합 방침에 협조했지만, 다른 조직들은 무장 해제를 거부하거나 지역 이해관계를 이유로 명령을 지연시키고 있습니다. 지방 행정력의 한계와 물리적 통제 범위 문제 역시 통합 작업의 속도를 늦추고 있습니다.\n\n그 결과, 의용군의 상당수는 정규 지휘 체계 아래로 편입되었지만, 여전히 일부 지역에서는 완전한 통합이 이루어지지 않은 상태로 남아 있습니다. 정부는 이들을 즉각적인 위협으로 간주하지는 않지만, 장기적으로 해결해야 할 불안 요소로 인식하고 있습니다.\n\n의용군 문제는 분명히 진전되고 있으나, 아직 완전히 끝난 것은 아닙니다. 국가 질서의 최종적인 정착을 위해서는 더 많은 시간과 정치적 결단이 요구되고 있습니다."
 china_wr.91.a:0 "아직 끝난 것은 아니다."
 china_wr.92.t:0 "부패 관료의 공개 처형"
 china_wr.92.d:0 "정부의 반부패 조사 과정에서 중대한 횡령과 권력 남용이 확인된 일부 고위 공무원들이 체포되었습니다. 재판은 신속하게 진행되었으며, 판결은 가혹했습니다. 정부는 이 사건을 단순한 처벌이 아닌, 공직 사회 전반에 대한 경고로 삼겠다는 입장을 분명히 했습니다.\n\n판결이 집행된 날, 처형장은 엄중한 경비 속에 공개되었습니다. 교수형이 집행되자 현장에는 침묵이 흘렀고, 소식은 빠르게 전국으로 퍼져 나갔습니다. 일부 시민들은 국가의 결단을 지지했지만, 다른 이들은 처벌의 방식과 속도를 두고 불안과 논란을 제기하고 있습니다.\n\n정부는 법 앞에 예외는 없으며, 공직자의 부패는 국가에 대한 배신이라는 점을 분명히 했습니다. 이번 조치는 향후 행정 개혁의 방향을 상징적으로 보여주는 사건으로 기록될 것입니다."
 china_wr.92.a:0 "경고는 분명해졌다."
 china_wr.93.t:0 "생계형 비리의 확산"
 china_wr.93.d:0 "정부는 공직 사회의 기강을 바로잡기 위해 일벌백계 원칙에 따라 부패 관료들을 엄중히 처벌해 왔습니다. 그러나 공무원 임금 인상과 같은 구조적 보완 조치가 동반되지 않은 상태에서 처벌만이 강조되자, 예상치 못한 부작용이 드러나기 시작했습니다.\n\n낮은 급여와 불안정한 생활 여건에 놓인 하급 공무원들 사이에서, 노골적인 횡령이나 권력형 비리는 줄어든 반면 생계를 유지하기 위한 소규모 뇌물과 편법이 빠르게 늘어나고 있습니다. 일부 관료들은 단속을 피해 더욱 은밀한 방식으로 부정 행위를 저지르고 있으며, 이는 오히려 행정 전반의 투명성을 악화시키고 있습니다.\n\n최근 적발된 사례들 대부분은 거액의 범죄가 아닌, 생활비와 생존을 이유로 한 소규모 비리였습니다. 하지만 이러한 행위가 반복되면서 행정 현장에서는 법과 현실 사이의 괴리가 커지고 있다는 우려가 제기되고 있습니다.\n\n정부 내부에서도 처벌 중심의 정책만으로는 문제를 해결할 수 없다는 인식이 확산되고 있으며, 공직자의 생계 문제를 외면한 개혁은 한계를 드러내고 있다는 평가가 나오고 있습니다."
 china_wr.93.a:0 "경고만으로는 충분하지 않다."
 china_wr.94.t:0 "법폐개혁 실시"
 china_wr.94.d:0 "정부는 장기간 누적된 통화 불안과 인플레이션을 더 이상 방치할 수 없다고 판단하였습니다. 기존 법폐 체계는 반복된 남발과 신뢰 붕괴로 인해 경제 질서를 유지하는 데 실패했으며, 이는 국가 전반의 불안으로 이어지고 있었습니다.\n\n이에 따라 정부는 강도 높은 법폐개혁을 단행하기로 결정하였습니다. 이번 개혁은 통화 발행과 유통을 전면적으로 재정비하고, 중앙은행의 권한을 강화하며, 화폐 정책의 일관성을 회복하는 것을 목표로 하고 있습니다. 단기적으로는 혼란과 반발이 불가피하겠지만, 통화 질서를 바로잡지 않는다면 더 큰 붕괴가 찾아올 것이라는 인식이 개혁을 밀어붙이고 있습니다.\n\n법폐개혁은 단순한 기술적 조정이 아니라, 국가가 경제를 통제할 수 있는 능력을 회복하겠다는 정치적 선언이기도 합니다. 이제 정부는 혼란의 악순환을 끊고, 새로운 통화 질서를 구축하기 위한 첫걸음을 내딛었습니다."
 china_wr.94.a:0 "더 이상 미룰 수는 없다."
 china_wr.95.t:0 "금은복본위제의 한계"
 china_wr.95.d:0 "정부는 현재의 통화 혼란이 단순한 관리 실패가 아니라, 금은복본위제라는 구조적 문제에서 비롯되었다는 결론에 도달하였습니다. 금과 은을 동시에 기준으로 삼는 체계는 표면적으로는 안정적으로 보였으나, 실제로는 통화 정책을 극도로 경직시키는 족쇄로 작용해 왔습니다.\n\n금과 은의 국제 시세는 서로 다른 속도로 변동하며, 두 금속의 비율이 흔들릴 때마다 통화 가치 역시 불안정해졌습니다. 이는 환율 혼선, 투기적 교환, 금속 유출을 초래했고, 정부가 통화량을 조절하려 할수록 시장의 반응은 더욱 왜곡되었습니다.\n\n더 큰 문제는 위기 상황에서 이 제도가 아무런 완충 장치가 되지 못했다는 점입니다. 경기 침체나 재정 압박이 발생해도, 금과 은 보유량에 묶인 통화 체계는 필요한 유동성을 공급하지 못했고, 그 결과 경제는 급격한 수축과 혼란에 빠졌습니다.\n\n정부는 이제 분명히 인식하고 있습니다. 금은복본위제는 안정의 상징이 아니라, 변화하는 현실에 대응하지 못하는 낡은 틀이었으며, 이를 유지하는 한 통화 질서의 회복은 불가능하다는 사실을 말입니다."
 china_wr.95.a:0 "이제 벗어나야 할 때다."
 china_wr.96.t:0 "런던의 금융 전문가 초빙"
 china_wr.96.d:0 "정부는 통화 개혁과 금융 안정화를 보다 체계적으로 추진하기 위해, 국제 금융의 중심지였던 런던에서 금융 전문가들을 초빙하기로 결정하였습니다. 이들은 통화 안정, 중앙은행 운영, 금융 제도 개편 등 다양한 분야에서 실무 경험을 축적한 인물들입니다.\n\n런던에서 초빙된 전문가들은 단순한 자문 역할에 그치지 않고, 중앙은행과 재무 부처 내부에 직접 참여하여 개혁 과정 전반을 점검하고 조정하게 됩니다. 이를 통해 기존의 미숙한 통화 운용에서 벗어나, 보다 전문적이고 국제 기준에 부합하는 금융 체계를 구축하려는 것입니다.\n\n일부에서는 외국 전문가에 대한 의존을 우려하고 있으나, 정부는 지금이 체면보다 실질을 택해야 할 시점이라고 판단하고 있습니다."
 china_wr.96.a:0 "배울 것은 배운다."
 china_wr.97.t:0 "워싱턴과의 금 거래"
 china_wr.97.d:0 "정부는 금본위제로의 이행을 준비하기 위해 충분한 금 보유량을 확보할 필요가 있다고 판단하였습니다. 이에 따라 워싱턴과의 외교·금융 채널을 활용하여 금 매입을 추진하기로 결정하였습니다.\n\n이번 금 거래는 단순한 재정 거래가 아니라, 향후 통화 개혁의 신뢰성을 뒷받침하는 핵심 조치입니다. 충분한 금 보유는 새 화폐 체계에 대한 국내외 신뢰를 높이고, 시장의 불안을 완화하는 데 중요한 역할을 하게 될 것입니다.\n\n정부는 단기적인 재정 부담을 감수하더라도, 통화 안정이라는 장기적 목표를 위해 이 거래를 반드시 성사시켜야 한다고 보고 있습니다."
 china_wr.97.a:0 "금이 신뢰를 만든다."
 china_wr.98.t:0 "재무장관 해임"
 china_wr.98.d:0 "통화 혼란이 장기화되면서, 정부 내부에서도 기존 재무 정책에 대한 책임론이 거세지고 있습니다. 특히 재무장관이 주도해 온 통화 운용과 재정 관리가 인플레이션을 억제하지 못했다는 비판이 확산되고 있습니다.\n\n결국 정부는 통화 개혁의 신뢰성을 회복하기 위해 재무장관을 해임하기로 결정하였습니다. 이는 정책 실패에 대한 책임을 분명히 하는 동시에, 중앙은행 중심의 새로운 통화 질서를 확립하겠다는 의지를 보여주는 조치입니다."
 china_wr.98.a:0 "책임을 물을 때다."
 china_wr.99.t:0 "화폐 도안 변경"
 china_wr.99.d:0 "정부는 기존 화폐가 지나친 발행과 혼란 속에서 신뢰를 상실했다고 판단하였습니다. 단순한 제도 개편만으로는 시장의 인식을 바꾸기 어렵다는 결론 아래, 새로운 화폐 도안을 도입하기로 결정하였습니다.\n\n새로운 도안은 통화 개혁의 상징으로서, 국가가 이전의 무질서한 통화 운용과 결별했음을 분명히 보여주기 위한 조치입니다. 정부는 이를 통해 화폐에 대한 심리적 신뢰를 회복하고자 합니다."
 china_wr.99.a:0 "새로운 시작이다."
 china_wr.100.t:0 "중앙은행 권한 강화"
 china_wr.100.d:0 "금본위제와 관리통화제가 실질적으로 기능하기 위해서는, 정치적 간섭으로부터 자유로운 중앙은행이 필요하다는 인식이 확산되고 있습니다. 정부는 통화 정책의 일관성과 신뢰성을 확보하기 위해 중앙은행의 권한을 대폭 강화하기로 결정하였습니다.\n\n앞으로 중앙은행은 화폐 발행과 통화 관리에서 보다 독립적인 지위를 가지게 되며, 단기적인 정치 판단보다 장기적인 통화 안정을 우선하게 될 것입니다. 이는 통화 개혁을 제도적으로 뒷받침하는 핵심 조치로 평가됩니다."
 china_wr.100.a:0 "통화는 전문가에게 맡긴다."
 china_wr.101.t:0 "토지개혁의 개시"
 china_wr.101.d:0 "정부는 왜곡된 농촌 토지 구조를 더 이상 방치할 수 없다는 결론에 도달했습니다. 산업화 과정에서 농지는 대지주에게 집중되었고, 수천만 명의 소작농들은 부채와 착취 속에서 생존을 강요받아 왔습니다. 이는 단번에 폭발하는 위기는 아니었지만, 농민들에게는 하루하루가 재앙과도 같은 현실이었습니다.\n\n토지개혁은 이러한 구조적 모순을 해소하고 농촌 사회에 숨통을 트이게 하기 위한 결단입니다. 자영농 기반을 회복하고, 농촌 인구의 불만을 완화하며, 장기적으로는 산업화와 도시화를 뒷받침할 토대를 마련하는 것이 목표입니다.\n\n그러나 이 개혁은 시간이 오래 걸릴수록 저항과 혼란만 키울 뿐입니다. 정부는 토지개혁을 1년 안에 완수해야 한다는 강력한 시간표를 설정했으며, 그 안에 성과를 내지 못할 경우 농촌 사회의 모순은 더 이상 되돌릴 수 없는 단계로 치달을 것입니다."
 china_wr.101.a:0 "더는 미룰 수 없다."
 china_wr.102.t:0 "난항에 빠진 토지개혁"
 china_wr.102.d:0 "토지개혁은 공식적으로 추진되고 있으나, 현장에서는 점점 더 뚜렷한 한계에 부딪히고 있습니다. 지주층의 조직적인 비협조와 지방 행정의 미온적 집행, 그리고 개혁 과정에서 발생하는 혼선이 겹치며, 개혁은 당초 예상보다 훨씬 더딘 속도로 진행되고 있습니다.\n\n일부 지역에서는 토지 조사 자체가 지연되고 있으며, 다른 지역에서는 명목상 재분배가 이루어졌음에도 실질적인 경작권 이전이 이뤄지지 않고 있습니다. 농민들 사이에서는 개혁에 대한 기대가 서서히 불신으로 바뀌고 있고, 정부의 통치력에 대한 의문 역시 확산되고 있습니다.\n\n개혁을 밀어붙이지 못한다면, 토지개혁은 구조적 모순을 해소하는 수단이 아니라 새로운 불만의 원천으로 전락할 위험이 있습니다. 정부는 이제 더 강한 결단을 내릴 것인지, 아니면 점진적 조정을 택할 것인지 선택의 기로에 서 있습니다."
 china_wr.102.a:0 "더 강한 조치가 필요하다."
 china_wr.103.t:0 "집체주의에 대한 공개적 비판"
 china_wr.103.d:0 "정부가 집체주의에 반대하는 노선을 공식화하자, 지식인 사회와 도시 중산층을 중심으로 즉각적인 반응이 나타나고 있습니다. 다수의 학자와 언론인은 개인의 자유와 자율을 억압해 온 집체주의적 사고가 중국 사회의 활력을 갉아먹어 왔다고 주장하며 정부의 방향 전환을 환영하고 있습니다.\n\n반면 일부 관료와 조직화된 단체들은 국가적 단결이 약화될 수 있다며 우려를 표하고 있습니다. 특히 전통적인 공동체 질서에 의존해 온 지역에서는 개인주의 확산이 사회적 혼란을 초래할 수 있다는 목소리도 나오고 있습니다.\n\n그럼에도 불구하고 정부는 개인의 자유와 책임을 강화하지 않고서는 근대적 시민 사회로의 전환은 불가능하다는 입장을 분명히 하고 있습니다."
 china_wr.103.a:0 "개인의 자유가 국가의 토대다."
 china_wr.104.t:0 "언론법의 폐지"
 china_wr.104.d:0 "언론을 규제해 온 기존의 언론법이 공식적으로 폐지되면서, 신문과 잡지, 출판계 전반에 큰 변화가 일어나고 있습니다. 검열 기관은 해체되었고, 언론인들은 더 이상 사전 승인 없이 정부와 사회를 비판할 수 있게 되었습니다.\n\n자유화된 언론 환경은 다양한 사상과 의견이 공개적으로 충돌하는 공간을 만들어내고 있지만, 동시에 허위 정보와 과격한 주장 역시 빠르게 확산되고 있습니다. 일부 관료들은 통제 없는 언론이 정치적 불안을 증폭시킬 수 있다고 경고하고 있습니다.\n\n정부는 이러한 혼란을 감수하더라도 표현의 자유는 후퇴할 수 없는 원칙이며, 공개적 비판 속에서만 건강한 정치가 가능하다는 입장을 유지하고 있습니다."
 china_wr.104.a:0 "자유로운 언론은 위험하지만 필요하다."
 china_wr.105.t:0 "제2차 부녀운동의 확산"
 china_wr.105.d:0 "여성 교육의 보급이 일정 수준에 이르자, 그 영향은 단순한 학습의 영역을 넘어 사회 전반으로 확산되기 시작했습니다. 교육을 받은 여성들은 더 이상 가정과 학교에 머무르지 않고, 자신들의 지위와 역할에 대해 공개적으로 문제를 제기하기 시작했습니다.\n\n각지에서 여성 단체와 지식인들이 조직되며, 교육·노동·법적 권리 전반에 대한 요구가 분출되고 있습니다. 이 흐름은 단순한 계몽 운동이 아니라, 여성 스스로가 정치와 사회의 주체임을 선언하는 움직임으로 발전하고 있으며, 사람들은 이를 '제2차 부녀운동'이라 부르고 있습니다.\n\n보수적인 세력은 이를 급진적 사회 동요로 규정하며 반발하고 있지만, 정부와 개혁 진영 내부에서는 이 운동이 근대 시민 사회로 나아가는 과정에서 피할 수 없는 단계라는 인식이 점차 확산되고 있습니다."
 china_wr.105.a:0 "새로운 사회적 흐름은 막을 수 없다."
 china_wr.106.t:0 "반권위주의적 논조의 확산"
 china_wr.106.d:0 "언론과 지식인 사회를 중심으로 권위주의적 통치 관행을 비판하는 목소리가 빠르게 확산되고 있습니다. 개인의 자유와 권리를 강조하는 논조는 점차 대중에게도 영향을 미치며, 국가 권력의 한계와 책임을 공개적으로 논의하는 분위기를 형성하고 있습니다.\n\n이러한 흐름은 정치 체제의 정당성을 강화할 수 있는 기회인 동시에, 기존 질서에 익숙한 관료층과 보수 세력에게는 불안 요인으로 작용하고 있습니다. 정부가 이 담론을 억누를지, 제도 안으로 흡수할지는 향후 정치 문화의 방향을 좌우하게 될 것입니다."
 china_wr.106.a:0 "비판은 억압이 아니라 관리의 대상이다."
 china_wr.107.t:0 "개인주의 문화의 확산"
 china_wr.107.d:0 "오랫동안 집단과 질서를 우선시해 온 사회 구조 속에서, 개인의 선택과 존엄을 중시하는 새로운 문화가 확산되고 있습니다. 교육과 언론은 개인의 권리와 책임, 자율성을 강조하며 시민 의식의 변화를 촉진하고 있습니다.\n\n이러한 개인주의적 흐름은 사회 전반의 활력을 높일 수 있지만, 동시에 공동체 질서의 약화를 우려하는 목소리도 함께 커지고 있습니다. 정부는 이 변화가 분열이 아닌 성숙한 시민 사회로 이어지도록 방향을 제시해야 합니다."
 china_wr.107.a:0 "개인의 자유는 근대 국가의 토대다."
 china_wr.108.t:0 "여성 참정권 문제"
 china_wr.108.d:0 "제2차 부녀운동의 확산과 여성 교육의 보급은 정치 영역으로까지 파장을 미치고 있습니다. 여성 단체와 지식인들은 이제 교육과 사회 참여를 넘어, 시민으로서의 정치적 권리를 공개적으로 요구하고 있습니다.\n\n정부는 중대한 선택의 기로에 서 있습니다. 모든 여성에게 참정권을 부여하여 원칙적 평등을 선언할 것인지, 아니면 일정한 교육 수준과 재산 요건을 갖춘 여성에게만 제한적으로 허용할 것인지를 결정해야 합니다. 이 결정은 중국 정치 질서의 성격을 근본적으로 규정하게 될 것입니다."
 china_wr.108.a:0 "모든 여성에게 참정권을 부여한다."
 china_wr.108.b:0 "교육과 재산을 갖춘 여성에게만 허용한다."
 china_wr.109.t:0 "개몽된 중국인"
 china_wr.109.d:0 "연이은 사회 개혁과 사상 논쟁을 거치며, 중국 사회 내부에서는 이전과는 분명히 다른 시민 의식이 형성되기 시작했습니다. 언론과 교육, 공적 토론의 확대는 국민들에게 국가와 권리, 의무에 대해 스스로 사고하는 능력을 요구했고, 점차 이에 응답하는 계층이 늘어나고 있습니다.\n\n이제 국가는 더 이상 막연한 권위나 전통만으로 유지되지 않습니다. 시민들은 법과 제도, 정치적 선택이 자신들의 삶과 직결된다는 사실을 인식하기 시작했으며, 무비판적 복종 대신 참여와 판단을 요구하고 있습니다.\n\n이러한 변화는 단기간에 완성된 성과가 아니라, 긴 혼란과 논쟁 속에서 축적된 결과입니다. 개몽된 시민의 등장은 국가 운영을 더욱 어렵게 만들 수도 있지만, 동시에 중국이 근대 국가로 나아가기 위한 필수적인 토대이기도 합니다."
 china_wr.109.a:0 "중국은 더 이상 과거의 중국이 아니다."
 china_wr.110.t:0 "제도적 탈권위 개혁 방침 발표"
 china_wr.110.d:0 "정부는 오늘 공식 성명을 통해 기존의 권위적 사회 구조를 단계적으로 개혁하겠다는 방침을 발표했습니다. 이번 발표는 단순한 원칙 표명이 아니라, 향후 제도 개편과 행정 개혁을 수반하는 실질적 개혁 노선의 출발점임을 분명히 하고 있습니다.\n\n정부는 중국 사회를 지탱해 온 위계적 질서와 관습적 권위가 일정한 안정성을 제공해 온 것은 사실이나, 동시에 개인의 자유와 사회 전반의 활력을 제약해 왔다고 평가했습니다. 이에 따라 법과 행정, 사회 전반의 제도에서 권위에 의존한 관행을 정비하고, 보다 자유주의적인 방향으로 개혁을 추진하겠다고 밝혔습니다.\n\n발표 직후 사회 각계의 반응은 엇갈리고 있습니다. 지식인과 개혁 성향 언론은 이를 사회 전환의 신호로 평가하고 있으며, 일부 관료와 보수적 세력은 기존 질서의 약화를 우려하고 있습니다. 정부는 구체적인 개혁 조치는 순차적으로 공개될 예정이며, 이번 방침이 중국 사회를 보다 개방적이고 유연한 방향으로 이끌 것이라고 전망하고 있습니다."
 china_wr.110.a:0 "개혁의 방향은 분명하다."
 china_wr.111.t:0 "사법개혁 선언"
 china_wr.111.d:0 "정부는 내전과 장기간의 혼란 속에서 사법 체계가 심각하게 훼손되었다는 점을 공식적으로 인정하며, 전면적인 사법개혁 추진 방침을 발표하였습니다. 그동안 재판 지연, 정치적 개입 의혹, 지역별 판결 편차는 사법에 대한 신뢰를 크게 약화시켜 왔습니다.\n\n이번 사법개혁 선언은 특정 법률의 즉각적 개정이라기보다, 사법부의 독립성과 절차적 정당성을 회복하겠다는 국가 차원의 입장 표명에 가깝습니다. 정부는 향후 법관 인사 제도, 재판 절차, 행정권과의 관계 전반을 재검토하겠다고 밝혔습니다.\n\n법조계와 언론은 이를 환영하는 반면, 일부에서는 실제 개혁이 어느 정도까지 이뤄질지에 대해 신중한 관망론을 제기하고 있습니다. 사법개혁은 이제 선언의 단계를 넘어 실질적 조치로 이어질 수 있을지가 관건이 되고 있습니다."
 china_wr.111.a:0 "사법에 대한 신뢰를 회복해야 한다."
 china_wr.112.t:0 "비대한 행정조직 감편 방침"
 china_wr.112.d:0 "정부는 오랜 전쟁과 비상 통치 과정에서 비대해진 행정조직이 국가 운영의 효율성을 심각하게 저해하고 있다는 점을 인정하며, 행정조직 감편 방침을 공식 발표하였습니다. 중복된 부서, 책임이 불분명한 기구, 과도한 인력 운용은 재정 부담과 행정 마비를 동시에 초래해 왔습니다.\n\n이번 발표는 즉각적인 대규모 구조조정이 아니라, 행정 기능 전반을 재점검하고 불필요한 조직을 단계적으로 정리하겠다는 방향을 제시하는 것입니다. 정부는 효율성과 책임성을 기준으로 한 행정 재편을 추진하겠다고 밝혔습니다.\n\n관료 사회에서는 긴장과 반발이 동시에 나타나고 있으며, 시민들 사이에서는 정부가 마침내 행정 비효율 문제를 공개적으로 인정했다는 점에서 긍정적인 반응도 나오고 있습니다."
 china_wr.112.a:0 "올바른 길을 향하여."
 china_wr.113.t:0 "정부 입법 규제 원칙 발표"
 china_wr.113.d:0 "정부는 혼란기 동안 남발된 행정 명령과 긴급 입법이 정치·경제 전반에 불확실성을 초래했다는 평가를 수용하며, 향후 입법 활동에 대한 규제 원칙을 발표하였습니다. 그동안 법률과 명령이 빈번하게 변경되면서 사회 전반의 예측 가능성이 크게 저하되었습니다.\n\n이번 원칙은 정부가 더 이상 즉흥적인 입법에 의존하지 않겠다는 선언에 가깝습니다. 입법의 필요성과 영향에 대한 사전 검토를 강화하고, 장기적 제도 안정성을 중시하겠다는 방향이 제시되었습니다.\n\n재계와 지식인 사회는 이를 환영하고 있으나, 일부에서는 위기 상황에서 정부의 대응 속도가 저하될 수 있다는 우려도 제기하고 있습니다."
 china_wr.113.a:0 "법은 신중하게 만들어져야 한다."
 china_wr.114.t:0 "공가점타도"
 china_wr.114.d:0 "후스 행정부는 오늘 공식 성명을 통해 '공가점타도' 정책의 시행을 선언하였습니다. 이는 공자 개인에 대한 비판을 넘어, 수천 년 동안 중국 사회를 지배해 온 유교 이념과 그로부터 파생된 권위적 가치 체계를 국가 차원에서 전면적으로 해체하겠다는 정치적 선언입니다.\n\n정부는 유교적 질서가 개인의 자유와 사회적 이동을 억압하고, 신분과 연령, 관습에 기반한 권위를 절대화함으로써 근대적 시민 사회의 형성을 가로막아 왔다고 평가하고 있습니다. 후스 행정부는 이러한 문화적 구조를 그대로 둔 채 제도 개혁만을 시도하는 것은 근본적인 변화를 가져올 수 없다고 판단하였습니다.\n\n이에 따라 정부는 교육, 행정, 공공 담론 전반에서 유교적 상징과 권위를 비판적으로 재검토하고, 공자와 유교 윤리를 절대적 기준으로 삼아온 기존 관행을 단계적으로 폐기하는 방향을 제시하였습니다. 이는 단순한 학술 논쟁이나 문화 캠페인이 아니라, 국가가 주도하는 가치 체계 재편 정책으로 규정되고 있습니다.\n\n이 조치에 대해 사회 각계의 반응은 엇갈리고 있습니다. 일부는 오랜 전통을 국가 권력으로 부정하는 지나치게 급진적인 조치라고 비판하고 있으나, 다른 한편에서는 중국 사회가 근본적으로 탈권위적 방향으로 나아가기 위해 불가피한 선택이라는 평가도 제기되고 있습니다.\n\n공가점타도는 단기간에 사회 전반을 바꾸는 즉각적 조치라기보다는, 중국 사회의 문화적 기반을 재구성하겠다는 명확한 국가 의지를 천명한 선언에 가깝습니다. 이 정책이 향후 중국의 사회 질서와 정치 문화에 어떤 변화를 가져올지는 아직 단정할 수 없으나, 기존 질서와의 결별이 공식화되었다는 점만은 분명해 보입니다."
 china_wr.114.a:0 "전통에 도전하라."
 china_wr.115.t:0 "정신문명이라는 신화"
 china_wr.115.d:0 "후스 행정부는 최근 공식 논평을 통해, 동양 사회가 산업화에 뒤처진 이유를 '정신문명'이라는 개념으로 합리화해 온 기존 담론을 강하게 비판하였습니다. 정부는 이른바 정신문명론이 패배와 낙후를 미화하는 정신적 자기위안에 불과하다고 평가하고 있습니다.\n\n논평에서 후스는 동양에 특별한 '정신문명'이 존재했다는 주장 자체를 부정하였습니다. 그는 과학, 합리성, 비판적 사고, 그리고 근대 문명이야말로 진정한 의미의 정신적 성취이며, 산업화와 과학 발전을 거부하거나 경시하는 태도를 정신적 우월성으로 포장하는 것은 사실상 현실 도피에 가깝다고 지적하였습니다.\n\n정부는 정신문명론이 결과적으로 기술 발전의 지연, 제도 개혁의 회피, 그리고 구조적 문제에 대한 책임 회피를 정당화해 왔다고 분석하고 있습니다. '우리는 물질은 뒤졌지만 정신은 앞섰다'는 논리는 실패의 원인을 외면하게 만들었고, 그 대가로 중국 사회는 과학·산업·행정 전반에서 심각한 정체를 겪어야 했다는 것입니다.\n\n이번 논평은 단순한 학술적 논쟁이 아니라, 국가가 공식적으로 과거의 자기기만적 사고와 결별하겠다는 선언으로 받아들여지고 있습니다. 후스 행정부는 근대 문명을 받아들이는 것이 정신의 타락이 아니라, 오히려 인간의 이성과 자유를 확장하는 진정한 정신적 진보라고 강조하고 있습니다.\n\n정신문명이라는 이름 아래 유지되어 온 안일한 자기위안은 이제 더 이상 국가 재건의 논리가 될 수 없습니다. 정부는 중국이 앞으로 나아가기 위해서는 신화가 아닌 과학과 제도, 그리고 냉정한 자기 성찰 위에 서야 한다고 분명히 하고 있습니다."
 china_wr.115.a:0 "자기기만과 결별할 때다."
 china_wr.116.t:0 "국고정리운동"
 china_wr.116.d:0 "정부와 학계는 최근 중국 전통문화 전반을 보다 체계적으로 재해석하고 재평가하려는 움직임에 착수하였습니다. 이른바 '국고정리운동'이라 불리는 이 흐름은, 전통을 무조건 부정하거나 파괴하는 것이 아니라 그 속에서 현대 사회에도 유효한 요소를 가려내어 계승하자는 문제의식에서 출발하고 있습니다.\n\n국고정리운동은 중국의 고전, 사상, 관습, 제도 가운데 근대 국가와 사회에 기여할 수 있는 요소는 보존하되, 과학 발전과 개인의 자유, 사회적 평등을 가로막아 온 낡은 관념과 관행은 과감히 정리해야 한다는 입장을 취하고 있습니다. 이는 전통을 신성불가침의 유산으로 떠받드는 태도도, 반대로 무차별적으로 부정하는 태도도 모두 경계하는 중도적 접근입니다.\n\n정부는 이 운동이 과거와의 단절이 아니라, 전통을 냉정하게 재구성하는 작업임을 강조하고 있습니다. 전통은 그대로 답습할 대상이 아니라, 비판적으로 검토하고 시대에 맞게 재편할 자산이라는 인식이 점차 확산되고 있습니다.\n\n국고정리운동은 급진적 문화 혁명과는 구별되는 흐름으로, 문화적 연속성을 유지하면서도 근대적 가치와 충돌하는 요소를 정리하려는 시도로 평가되고 있습니다. 이를 통해 정부는 문화적 혼란을 최소화하면서도 사회 전반의 사상적 정비를 추진하고자 하고 있습니다."
 china_wr.116.a:0 "남길 것은 남기고, 버릴 것은 버려라."
 china_wr.117.t:0 "문제와주의"
 china_wr.117.d:0 "최근 후스는 공개 연설을 통해 중국 사회를 둘러싼 '문제와주의'의 대립을 정면으로 지적하였습니다. 그는 현재 중국이 처한 위기를 특정 이념의 부재로 설명하려는 주장에 대해 강한 의문을 제기하며, 이러한 사고방식 자체가 문제 해결을 지연시키고 있다고 비판하였습니다.\n\n후스는 일부 세력이 '올바른 이념만 확립되면 모든 문제가 해결될 것'이라 주장하고 있다고 언급하며, 이것은 현실을 외면한 위험한 착각이라고 밝혔습니다. 실업, 문맹, 낙후된 행정과 산업 붕괴는 이념 선언으로 사라지지 않으며, 오직 구체적인 분석과 정책 집행을 통해서만 해결될 수 있다는 것입니다.\n\n그는 중국이 무너진 이유가 이념을 충분히 외치지 못했기 때문이 아니라, 눈앞에 쌓여 있던 문제들을 방치해 왔기 때문이라고 단언하였습니다. 이념 논쟁에 매달리는 동안, 국가는 문제를 해결할 기회를 반복해서 놓쳐 왔다는 지적입니다.\n\n후스 행정부는 이 발언을 통해 국가 운영의 기준을 명확히 하고 있습니다. 국가는 이데올로기의 승부를 가리기 위해 존재하는 것이 아니라, 현실의 문제를 해결하기 위해 존재합니다. 이념은 수단일 뿐이며, 문제가 우선되어야 한다는 입장이 공식적으로 확인되었습니다.\n\n이번 연설은 중국의 향후 개혁 노선이 이념 중심이 아닌 문제 해결 중심으로 전환되었음을 알리는 신호로 받아들여지고 있습니다."
 china_wr.117.a:0 "문제부터 해결해야 한다."
 china_wr.118.t:0 "전면서화 선언"
 china_wr.118.d:0 "후스 행정부는 오늘 공식 성명을 통해 중국 사회 전반을 근본적으로 재편하기 위한 '전면서화' 노선을 천명하였습니다. 정부는 부분적 개혁이나 전통과의 절충으로는 중국이 누적된 구조적 문제에서 벗어날 수 없다고 판단하고 있으며, 정치·법률·행정·교육·사회 제도 전반에 걸친 전면적 서구화를 국가의 명확한 방향으로 설정하였습니다.\n\n이번 선언에서 정부는 중국이 처한 위기의 근본 원인을 제도의 낙후와 비합리적 관행에서 찾고 있습니다. 서구 근대 국가들이 확립한 법치, 합리적 행정, 과학 중심 교육, 개인의 권리 개념을 적극적으로 도입함으로써 중국을 '정상적인 현대 국가'의 궤도에 올려놓겠다는 것이 핵심 목표입니다.\n\n전면서화는 전통을 점진적으로 개량하는 접근이 아니라, 필요하다면 과거의 관습과 가치 체계를 과감히 폐기하는 선택을 포함하고 있습니다. 정부는 이를 문화적 배신이 아닌 생존과 재건을 위한 불가피한 결단으로 규정하고 있습니다.\n\n이 선언은 즉각적인 제도 변화의 시작을 의미하지는 않지만, 향후 모든 개혁 정책과 입법, 행정 조치가 이 노선을 기준으로 추진될 것임을 분명히 하고 있습니다. 사회 각계에서는 기대와 우려가 교차하고 있으나, 정부는 더 이상의 모호함은 허용하지 않겠다는 입장을 분명히 하고 있습니다."
 china_wr.118.a:0 "이제 방향은 분명하다."
 china_wr.119.t:0 "국부 재평가 논쟁"
 china_wr.119.d:0 "국회와 언론을 중심으로 국부 쑨원의 정치적 유산을 어떻게 해석해야 하는지를 둘러싼 논쟁이 다시 부상하고 있습니다. 일부 인사들은 쑨원의 결단력과 강력한 지도력을 강조하며, 국가 운영은 소수의 유능한 인물에게 집중되어야 한다는 주장을 펴고 있습니다.\n\n이에 대해 후스는 정면 비판이 아닌, 보다 복합적인 평가를 제시했습니다. 그는 쑨원의 업적과 역사적 위상을 누구보다 높게 인정하면서도, 그러한 정치 방식은 쑨원이었기에 가능했던 특수한 사례였다고 선을 그었습니다. 후스는 국부의 이름을 빌려 현재의 권력 집중을 정당화하려는 시도에 강한 경계심을 드러냈습니다.\n\n동시에 그는 또 다른 가능성도 열어두었습니다. 쑨원의 결단과 책임감, 그리고 국가를 위해 모든 부담을 짊어지려 했던 태도 자체는 오늘날에도 되새길 가치가 있다는 점을 부정하지 않았기 때문입니다.\n\n이 발언 이후 정치권의 논쟁은 두 갈래로 갈라지고 있습니다. 하나는 쑨원을 예외적 인물로서 더 높이 올려세우며, 그를 기준으로 현재의 정치 현실을 재정의하려는 흐름입니다. 다른 하나는 쑨원의 행위 그 자체가 남긴 한계를 짚으며, 동일한 방식의 반복을 경계해야 한다는 주장입니다. 국부를 어떻게 해석하느냐에 따라, 중국의 정치적 방향성 또한 달라질 것으로 보입니다."
 china_wr.119.a:0 "쑨원은 시대가 만들어낸 유일무이한 존재였다."
 china_wr.119.b:0 "문제는 인물이 아니라, 그 방식 자체다."
 china_wr.120.t:0 "공칠과삼"
 china_wr.120.d:0 "국부 쑨원을 둘러싼 논쟁이 이어지는 가운데, 후스는 평가의 기준을 분명히 제시했습니다. 그는 쑨원의 혁명적 공헌과 민국 수립의 역할을 명확히 인정하면서도, 집권 과정에서 드러난 권력 집중과 정치적 독주 역시 역사로 남겨야 한다고 밝혔습니다.\n\n후스는 위대한 인물일수록 신성화의 대상이 아니라 비판과 검토의 대상이 되어야 한다고 강조했습니다. 공은 공대로 기록하고, 과는 과대로 남기는 태도만이 인물 숭배와 전면 부정을 동시에 넘어서게 한다는 입장입니다.\n\n이 발언은 쑨원을 절대적 권위로 삼으려는 시도에 제동을 거는 한편, 역사적 평가를 성숙한 토론의 장으로 돌려놓으려는 시도로 받아들여지고 있습니다."
 china_wr.120.a:0 "공은 공으로, 과는 과로 남겨야 한다."
 china_wr.121.t:0 "쑨원 격하운동"
 china_wr.121.d:0 "일부 정치 세력이 쑨원의 이름을 앞세워 엘리트 중심 통치와 권력 집중을 정당화하려 하자, 후스는 보다 분명한 입장을 내놓았습니다. 그는 쑨원의 방식이 특정한 역사적 조건에서만 가능했던 선택이었음을 강조하며, 이를 오늘날 그대로 모방하려는 시도는 민국의 원칙을 훼손한다고 지적했습니다.\n\n후스는 쑨원을 높이 평가하되, 그의 이름을 방패로 삼아 비판을 봉쇄하는 행태를 단호히 거부했습니다. 이는 국부를 부정하려는 움직임이 아니라, 국부의 권위를 정치적 면죄부로 사용하는 관행을 끊어내려는 시도로 설명되고 있습니다.\n\n이후 언론과 학계에서는 쑨원의 정치적 판단과 통치 방식에 대한 비판적 재검토가 확산되고 있으며, 인물 중심 정치에서 제도와 책임 중심 정치로 나아가야 한다는 논의가 힘을 얻고 있습니다."
 china_wr.121.a:0 "쑨원의 이름으로 모든 것을 정당화할 수는 없다."
 china_wr.122.t:0 "중국의 시대정신"
 china_wr.122.d:0 "쑨원 집권기의 정치 운영 방식은 오늘날까지도 격렬한 논쟁의 대상입니다. 그는 단일 후보로 권력을 장악한 이후 부총통 임명을 거부하고, 국무회의와 핵심 국가 기관을 전면적으로 자신의 측근으로 채웠으며, 언론에 대한 강도 높은 통제를 실시했습니다. 이러한 조치들은 분명 헌정 질서를 위태롭게 만들었지만, 동시에 당시의 국제 환경과 국내 혼란 속에서 일정한 안정과 결단력을 제공한 것도 사실입니다.\n\n후스 행정부는 이 문제를 도덕적 평가나 개인 숭배의 영역으로 끌어들이지 않습니다. 오히려 쑨원의 행위를 의도적으로 극단까지 끌어올려 재해석합니다. 쑨원이기에 가능했던 통치였으며, 그의 개인적 권위와 혁명적 상징성이 있었기에 성립할 수 있었던 예외적 상황이었다는 점을 강조하는 것입니다. 이는 곧, 오늘날 누구든지 같은 방식의 엘리트 독주 통치를 정당화할 수 있다는 주장에 대한 공개적인 반박입니다.\n\n쑨원을 모방하려는 시도는 곧 질문으로 되돌아옵니다. 과연 누가 쑨원만큼의 정통성과 책임을 감당할 수 있는가. 후스는 이 질문을 통해 훈정론자들과 권위주의적 정치인들에게 분명한 선을 긋고자 합니다. 쑨원의 이름은 면허가 아니라, 경고로서 제시되고 있습니다."
 china_wr.122.a:0 "쑨원은 쑨원이었고, 우리는 그가 아니다"
 china_wr.123.t:0 "원교의 방향"
 china_wr.123.d:0 "일본의 압박이 지속되는 가운데, 중화민국은 원교 전략의 구체적인 방향을 결정해야 하는 시점에 이르렀습니다. 지리적으로 떨어진 강대국과의 관계 강화는 일본에 대한 외교적 완충 장치를 마련하는 데 핵심적인 수단으로 여겨지고 있습니다.\n\n현재 정부 내부에서는 두 가지 선택지가 논의되고 있습니다. 하나는 유럽 대륙에서 일본과 직접적인 이해관계 충돌이 비교적 적은 프랑스와의 관계를 심화하는 방안이며, 다른 하나는 일본과 잠재적 경쟁 구도를 형성하고 있는 독일과의 협력을 모색하는 방안입니다. 어느 쪽을 택하느냐에 따라, 중화민국의 외교 노선과 국제적 입지는 분명한 차이를 보이게 될 것입니다."
 china_wr.123.a:0 "프랑스와의 관계를 강화한다"
 china_wr.123.b:0 "독일과의 협력을 모색한다"
 china_wr.124.t:0 "중독통상조약 갱신 제안"
 china_wr.124.d:0 "중화민국 정부는 독일과 체결된 기존 통상 조약을 재검토한 끝에, 이를 갱신하고 협력을 확대할 것을 공식적으로 제안하기로 결정했습니다. 이 제안은 단순한 경제 협력의 연장이 아니라, 일본의 영향력 확대에 대응하기 위한 외교적 선택지의 확보를 목적으로 하고 있습니다.\n\n베이징은 독일이 동아시아에서 보다 유연한 입장을 취함으로써 상호 이익을 얻을 수 있을 것이라 판단하고 있으며, 독일 정부의 반응은 향후 중국의 대유럽 외교 노선에 중대한 영향을 미치게 될 것입니다."
 china_wr.124.a:0 "베를린에 공식 제안을 전달하라."
 china_wr.125.t:0 "중독통상조약에 대한 독일의 입장"
 china_wr.125.d:0 "중화민국으로부터 전달된 통상 조약 갱신 제안은 독일 정부 내부에서 신중한 검토에 들어갔습니다. 이 제안은 경제적 이익을 제공할 수 있는 동시에, 동아시아 정세와 일본과의 관계에 영향을 줄 가능성도 내포하고 있습니다.\n\n독일은 중국과의 협력을 확대함으로써 새로운 시장을 확보할 수 있지만, 그 대가로 외교적 부담을 감수해야 할 수도 있습니다."
 china_wr.125.a:0 "제안을 승인한다."
 china_wr.125.b:0 "제안을 거부한다."
 china_wr.126.t:0 "통상조약 갱신 성사"
 china_wr.126.d:0 "독일 정부는 중화민국의 제안을 수락하고, 기존 통상 조약을 갱신하는 데 동의했습니다. 이는 중국이 유럽과의 경제적 연결을 유지하고 있음을 국제 사회에 보여주는 중요한 성과로 평가되고 있습니다.\n\n이번 합의는 중국 외교가 일본이라는 단일 변수에 종속되지 않음을 입증하며, 향후 보다 폭넓은 외교적 선택지를 마련하는 계기가 될 것입니다."
 china_wr.126.a:0 "외교적 성과를 확보했다."
 china_wr.127.t:0 "통상조약 갱신 무산"
 china_wr.127.d:0 "독일 정부는 중국의 통상 조약 갱신 제안을 거부하기로 결정했습니다. 이는 중국이 기대했던 유럽과의 경제적 연결 강화에 제동을 거는 결과로 이어졌습니다.\n\n중화민국 정부는 이 결정을 외교적 실패로 규정하지는 않지만, 독일이 동아시아 문제에서 신중한 거리 두기를 선택했음을 분명히 인식하게 되었습니다."
 china_wr.127.a:0 "다른 외교적 선택지를 모색해야한다."
 china_wr.128.t:0 "프랑스와의 협력 강화 모색"
 china_wr.128.d:0 "중화민국은 과거 협상국의 일원이었던 프랑스와의 외교 관계를 재정립하고, 협력을 강화할 가능성을 검토하고 있습니다. 프랑스는 동아시아에서 일본과 직접적인 이해관계 충돌이 비교적 제한적인 국가로, 중국에게는 안정적인 외교 파트너로 인식되고 있습니다.\n\n이번 접근은 즉각적인 군사 동맹이 아니라, 외교와 경제를 중심으로 한 점진적 협력을 목표로 하고 있습니다."
 china_wr.128.a:0 "파리에 외교 사절을 파견하라."
 china_wr.129.t:0 "중국의 외교적 접근에 대한 프랑스의 입장"
 china_wr.129.d:0 "중화민국의 협력 강화 제안은 프랑스 외교 당국의 관심을 끌었습니다. 프랑스는 중국과의 관계 강화를 통해 극동에서의 외교적 영향력을 유지할 수 있지만, 이는 다른 열강들과의 관계 조정도 요구하게 됩니다.\n\n프랑스 정부는 중국과의 협력이 가져올 외교적 이익과 부담을 저울질하고 있습니다."
 china_wr.129.a:0 "협력에 동의한다."
 china_wr.129.b:0 "제안을 거부한다."
 china_wr.130.t:0 "중불 외교 협력 진전"
 china_wr.130.d:0 "프랑스는 중화민국과의 외교 및 경제 협력 강화를 승인했습니다. 이는 중국이 유럽의 주요 국가와 안정적인 외교 관계를 구축했음을 의미하며, 국제 사회에서의 위상 역시 한층 강화되었습니다.\n\n이번 성과는 중국 외교가 점진적 협력이라는 노선을 통해 실질적인 결과를 도출할 수 있음을 보여주고 있습니다."
 china_wr.130.a:0 "외교적 입지가 강화된다."
 china_wr.131.t:0 "프랑스의 유보적 태도"
 china_wr.131.d:0 "프랑스는 중국과의 협력 강화 제안에 대해 즉각적인 동의를 피하고, 신중한 거리를 유지하기로 결정했습니다. 이는 중국에 대한 명확한 거부라기보다는, 국제 정세를 고려한 외교적 유보로 해석되고 있습니다.\n\n중화민국은 이 결정을 받아들이며, 프랑스와의 관계를 장기적인 관점에서 다시 조율할 필요성을 인식하게 되었습니다."
 china_wr.131.a:0 "외교 노선을 재조정하라."
 china_wr.132.t:0 "유럽 식민주의에 대한 성명"
 china_wr.132.d:0 "중화민국 정부는 최근 국제 정세를 검토한 끝에, 유럽 열강이 유지해 온 식민주의적 질서에 대해 공식적인 비판 성명을 발표하기로 결정했습니다. 이 성명은 특정 국가를 직접적으로 규탄하기보다는, 오랜 기간 국제 질서를 왜곡해 온 불평등한 구조 자체를 문제 삼는 데 초점을 맞추고 있습니다.\n\n정부는 중국이 더 이상 침묵 속에서 기존 질서를 수용하는 위치에 머물지 않을 것임을 분명히 하며, 주권과 평등을 기반으로 한 새로운 국제 관계의 필요성을 강조하고 있습니다. 이번 성명은 무력 충돌이나 외교적 단절을 의도한 것이 아니라, 중국이 국제 사회에서 스스로의 입장을 명확히 밝히는 정치적 선언으로 제시되고 있습니다."
 china_wr.132.a:0 "중국의 입장을 국제 사회에 알려라."
 china_wr.133.t:0 "중국의 유럽 식민주의 비판 성명"
 china_wr.133.d:0 "중화민국 정부는 유럽 열강이 형성해 온 식민주의적 국제 질서에 대해 공개적인 비판 성명을 발표했습니다. 이 성명에서 중국은 특정 국가를 직접 겨냥하지는 않았으나, 식민 지배와 불평등한 조약이 국제 관계를 왜곡해 왔다는 점을 분명히 했습니다.\n\n중국 정부는 이번 발표가 대결을 위한 것이 아니라, 주권과 평등을 중시하는 새로운 국제 질서를 요구하기 위한 정치적 발언임을 강조했습니다. 국제 사회는 중국이 보다 적극적인 외교적 목소리를 내기 시작했다는 점에 주목하고 있습니다."
 china_wr.133.a:0 "뭐라는지 잘 안들리는 걸?"
 china_wr.133.b:0 "그 말이 옳다."
### ─────────────────────────────────────────────────────────
### 소비에트군 승리 루트
### ─────────────────────────────────────────────────────────
 china_wr.134.t:0 "소비에트 점령군 철수 요구"
 china_wr.134.d:0 "블류헤르가 지휘한 소비에트군의 개입은 이미 성공으로 귀결되었고, 그 결과 신강과 몽골, 탄누투바의 지위는 소비에트 러시아에 유리한 방향으로 고착되었습니다. 중국 정부는 이 군사적 현실을 전제로, 전후 질서를 외교적으로 조정하기 위한 공식 요구를 제기하기로 결정했습니다.\n\n요구안은 최소한의 영토 회복부터, 중앙아시아 전반에서의 철수까지를 포함하는 단계별 선택지로 구성되어 있습니다."
 china_wr.134.a:0 "신강의 반환을 요구하라."
 china_wr.134.b:0 "신강 반환과 몽골 철수를 요구하라."
 china_wr.134.c:0 "신강 반환과 몽골 및 탄누투바 철수를 요구하라."
### (승리) 요구안 1 ─ 신강 반환
 china_wr.135.t:0 "중국의 신강 반환 요구"
 china_wr.135.d:0 "중국 정부는 소비에트 러시아에 신강의 반환을 공식적으로 요구했습니다. 이는 몽골과 탄누투바 문제를 즉각적으로 건드리지 않으면서도, 중국의 핵심 영토에 대한 주권 회복을 최우선으로 삼는 요구입니다.\n\n모스크바는 제한적인 양보로 중소 관계를 안정시킬 것인지, 아니면 점령 결과를 그대로 유지할 것인지 결단해야 하는 상황입니다."
 china_wr.135.a:0 "요구를 수락하라."
 china_wr.135.b:0 "요구를 거부하라."
 china_wr.136.t:0 "신강 반환 합의"
 china_wr.136.d:0 "소비에트 러시아는 중국의 요구를 수락하고 신강 반환에 동의했습니다. 중국 정부는 이를 주권 회복의 중요한 성과로 규정하며, 전후 국경 질서를 외교적으로 재정비할 발판을 확보했다고 판단했습니다.\n\n그러나 이번 합의가 중앙아시아 전반의 문제를 완전히 해소한 것은 아니며, 몽골과 탄누투바 문제는 여전히 외교적 쟁점으로 남아 있습니다."
 china_wr.136.a:0 "민국 만세!"
 china_wr.137.t:0 "신강 반환 거부"
 china_wr.137.d:0 "소비에트 러시아는 중국의 신강 반환 요구를 거부했습니다. 중국 정부는 이를 영토 주권에 대한 정면 부정으로 간주하며, 소비에트가 군사적 결과를 외교적으로도 고착시키려 한다는 점을 분명히 인식하게 되었습니다.\n\n이로써 중소 관계는 협상보다는 압박과 경계의 국면으로 이동하게 될 가능성이 커졌습니다."
 china_wr.137.a:0 "또 다른 방법을 써야겠군."
### (승리) 요구안 2 ─ 신강 반환 + 몽골 철수
 china_wr.138.t:0 "중국의 신강 반환 및 몽골 철수 요구"
 china_wr.138.d:0 "중국 정부는 신강 반환과 함께 몽골에서의 소비에트 철수를 요구했습니다. 이는 단순한 영토 반환을 넘어, 중앙아시아에서 소비에트의 군사적 개입 결과를 제한하려는 보다 강경한 요구입니다.\n\n모스크바는 이 요구를 수용할 경우 전략적 입지에 어떤 손실이 발생하는지, 거부할 경우 중국과의 관계가 어디까지 악화될지를 계산하고 있습니다."
 china_wr.138.a:0 "요구를 수락하라."
 china_wr.138.b:0 "요구를 거부하라."
 china_wr.139.t:0 "신강 반환과 몽골 철수 합의"
 china_wr.139.d:0 "소비에트 러시아는 중국의 요구를 수락하고 신강 반환과 몽골 철수에 동의했습니다. 중국 정부는 이를 중앙아시아 질서의 부분적 정상화로 평가하며, 소비에트가 무력 성과를 무제한으로 확장할 수 없다는 점을 확인했다고 판단했습니다.\n\n다만 탄누투바 문제는 합의 범위 밖에 남아 있으며, 향후 추가 협상의 여지가 존재합니다."
 china_wr.139.a:0 "민국 만세!"
 china_wr.140.t:0 "신강과 몽골 요구 거부"
 china_wr.140.d:0 "소비에트 러시아는 중국의 요구를 거부했습니다. 중국 정부는 이 거부가 신강과 몽골을 소비에트 영향권으로 고착시키려는 의도를 드러낸 것으로 판단하고 있습니다.\n\n이 결정은 중국이 소련을 단순한 협상 상대가 아니라, 국경 질서의 잠재적 위협으로 간주하게 만드는 계기가 되었습니다."
 china_wr.140.a:0 "또 다른 방법을 써야겠군."
### (승리) 요구안 3 ─ 신강 반환 + 몽골/탄누투바 철수
 china_wr.141.t:0 "중국의 전면 철수 요구"
 china_wr.141.d:0 "중국 정부는 신강 반환뿐만 아니라, 몽골과 탄누투바 전역에서의 소비에트 철수를 요구했습니다. 이는 소비에트군 개입의 결과를 전면적으로 되돌리려는 가장 강경한 외교적 요구입니다.\n\n모스크바는 이를 수용할 경우 사실상 개입의 성과를 포기하게 되며, 거부할 경우 중국과의 장기적 대립을 감수해야 할 수 있습니다."
 china_wr.141.a:0 "요구를 수락하라."
 china_wr.141.b:0 "요구를 거부하라."
 china_wr.142.t:0 "전면 철수 합의"
 china_wr.142.d:0 "소비에트 러시아는 중국의 요구를 수락하고 신강 반환과 몽골 및 탄누투바 철수에 동의했습니다. 중국 정부는 이를 전후 주권 질서의 회복으로 선언하며, 중앙아시아에서 소비에트 영향력이 제한되었다고 판단했습니다.\n\n이번 합의는 단기적으로 국경 안정에 기여할 수 있으나, 소비에트 내부의 반발과 향후 재개입 가능성을 완전히 제거하지는 못합니다."
 china_wr.142.a:0 "민국 만세!"
 china_wr.143.t:0 "전면 철수 요구 거부"
 china_wr.143.d:0 "소비에트 러시아는 중국의 전면 철수 요구를 거부했습니다. 중국 정부는 이 결정을 중앙아시아 전반을 소비에트 영향권으로 유지하려는 의지의 표명으로 해석하고 있습니다.\n\n이로써 중국은 소련이 국경 질서를 장기적으로 위협할 수 있다는 전제를 정책에 반영하게 되었으며, 향후 외교적 충돌 가능성은 크게 증가했습니다."
 china_wr.143.a:0 "또 다른 방법을 써야겠군."
### ─────────────────────────────────────────────────────────
### 소비에트군 패배 루트
### ─────────────────────────────────────────────────────────
 china_wr.144.t:0 "북방 국경에 대한 요구"
 china_wr.144.d:0 "블류헤르가 지휘한 소비에트군의 개입은 이미 실패로 끝났고, 신강은 중국의 통제 아래로 복귀했으며 몽골은 소비에트로부터 완전한 독립 상태를 유지하게 되었습니다. 다만 탄누투바는 여전히 소비에트 러시아의 영향 아래 남아 있는 상태입니다.\n\n중국 정부는 이 전후 현상을 외교적으로 확정하고, 향후 재개입 가능성을 차단하기 위해 소비에트 러시아에 공식 요구를 제기하기로 결정했습니다."
 china_wr.144.a:0 "현재의 상황을 공식적으로 공인하라고 요구하라."
 china_wr.144.b:0 "공인과 함께 탄누투바 철수를 요구하라."
 china_wr.145.t:0 "중국의 국경 공인 요구"
 china_wr.145.d:0 "중국 정부는 신강이 중국령이며 몽골이 소비에트로부터 완전한 독립국이라는 현재의 전후 현상을 소비에트 러시아가 공식적으로 공인할 것을 요구했습니다. 이는 재개입 명분을 차단하고 국경 질서를 외교적으로 고정하려는 요구입니다.\n\n모스크바는 이를 수용할 경우 향후 영향력 확대의 여지를 줄이게 되며, 거부할 경우 불필요한 긴장을 초래할 수 있습니다."
 china_wr.145.a:0 "요구를 수락하라."
 china_wr.145.b:0 "요구를 거부하라."
 china_wr.146.t:0 "소비에트의 국경 공인 수락"
 china_wr.146.d:0 "소비에트 러시아는 중국의 요구를 수락하고 전후 현상을 공식적으로 공인했습니다. 중국 정부는 이를 국경 안정의 성과로 평가하며, 중앙아시아에서의 불확실성을 일부 제거했다고 판단했습니다.\n\n탄누투바 문제는 여전히 남아 있으나, 최소한 신강과 몽골을 둘러싼 재개입 명분은 약화되었습니다."
 china_wr.146.a:0 "민국 만세!"
 china_wr.147.t:0 "소비에트의 국경 공인 거부"
 china_wr.147.d:0 "소비에트 러시아는 중국의 전후 현상 공인 요구를 거부했습니다. 중국 정부는 이를 향후 재개입 가능성을 남겨 두려는 의도로 해석하고 있으며, 중앙아시아 국경 질서가 외교적으로 확정되지 못한 상태로 남게 되었습니다.\n\n이 거부는 중소 관계에서 불신을 심화시키고, 국경 지역의 긴장을 장기화할 위험을 키우고 있습니다."
 china_wr.147.a:0 "어차피 이미 우리 손에 있다."
 china_wr.148.t:0 "신강 전역의 재확보"
 china_wr.148.d:0 "중국군은 신강 전역에서 결정적인 승리를 거두었으며, 현지에서 조직적으로 저항하던 세력은 더 이상 의미 있는 전투 능력을 유지하지 못하게 되었습니다. 주요 거점과 교통로는 모두 중앙정부의 통제 아래로 복귀했으며, 군사 작전은 사실상 종료 단계에 들어섰습니다.\n\n정부는 이번 승리를 통해 북서 변경에 대한 주권을 다시 한 번 명확히 했다고 평가하고 있으며, 향후 행정 재편과 치안 회복을 우선 과제로 설정하고 있습니다."
 china_wr.148.a:0 "신강은 다시 중앙의 통제 아래 있다."
 china_wr.149.t:0 "신강 작전의 실패"
 china_wr.149.d:0 "신강에서 전개된 군사 작전은 목표를 달성하지 못한 채 종료되었습니다. 중국군은 지형과 보급 문제, 그리고 외부 세력의 개입 가능성으로 인해 더 이상의 공세를 유지할 수 없었으며, 작전은 중단되었습니다.\n\n정부는 이번 실패가 북서 변경의 불안정을 장기화시킬 수 있다고 우려하고 있으며, 군사적 수단 외의 다른 접근을 검토해야 하는 상황에 놓였습니다."
 china_wr.149.a:0 "쉽지 않은 전장이었다."
 china_wr.150.t:0 "몽골 지역에서의 승리"
 china_wr.150.d:0 "몽골 지역에서 벌어진 일련의 교전 끝에 중국군은 결정적인 승리를 확보했습니다. 현지 무장 세력은 더 이상 조직적인 저항을 이어갈 수 없는 상태에 놓였으며, 주요 지역은 중국의 영향권 아래로 편입되었습니다.\n\n정부는 이번 승리가 북방 국경 질서를 재편하는 중요한 계기가 되었다고 판단하고 있습니다."
 china_wr.150.a:0 "북방의 주도권을 확보했다."
 china_wr.151.t:0 "몽골 작전의 좌절"
 china_wr.151.d:0 "몽골 지역에서 진행된 군사 작전은 기대한 성과를 거두지 못했습니다. 중국군은 장기적인 교착 상태와 외교적 부담을 고려하여 공세를 중단했으며, 전선은 원래의 상태로 되돌아갔습니다.\n\n정부는 이번 결과가 북방 정책 전반에 부담으로 작용할 수 있다고 보고 있습니다."
 china_wr.151.a:0 "당분간은 물러난다."
 china_wr.152.t:0 "탄누투바 평정"
 china_wr.152.d:0 "탄누투바에서 전개된 군사 작전은 중국군의 승리로 마무리되었습니다. 현지 무장 세력과 외부 영향력은 결정적으로 약화되었으며, 주요 거점은 더 이상 저항 없이 확보되었습니다.\n\n정부는 이번 승리를 통해 북방 국경의 마지막 불안 요소를 제거했다고 평가하고 있습니다."
 china_wr.152.a:0 "북부의 위협은 제거되었다."
 china_wr.153.t:0 "탄누투바 작전의 실패"
 china_wr.153.d:0 "탄누투바에서 시도된 군사 작전은 목표를 달성하지 못한 채 종료되었습니다. 중국군은 험준한 지형과 장거리 보급 문제, 그리고 외부 세력의 압박으로 인해 작전을 지속할 수 없었습니다.\n\n정부는 이번 실패가 북방 국경에 잠재적인 불안 요소를 남겼다고 판단하고 있습니다."
 china_wr.153.a:0 "지금은 물러날 수밖에 없다."
 china_wr.154.t:0 "신강 전선의 방어 성공"
 china_wr.154.d:0 "신강 전선에서 중국군의 공세는 좌절되었으며, 소비에트군이 유지해 온 군사적 영향력은 그대로 보존되었습니다. 중국 측은 더 이상의 공세를 이어가지 못했고, 전선의 구조적 균형은 유지되었습니다.\n\n소비에트 지도부는 이번 결과를 중앙아시아에서의 전략적 입지가 여전히 유효하다는 증거로 평가하고 있습니다."
 china_wr.154.a:0 "현상은 유지되었다."
 china_wr.155.t:0 "신강 전선의 후퇴"
 china_wr.155.d:0 "신강 전선에서 중국군이 주도권을 확보함에 따라, 소비에트의 기존 영향력은 실질적으로 붕괴되었습니다. 군사적 개입의 성과는 유지되지 못했고, 지역 통제는 중국 측으로 넘어갔습니다.\n\n소비에트 지도부는 이를 북방 전략의 중대한 후퇴로 인식하고 있으며, 대응 노선의 재검토가 불가피해졌습니다."
 china_wr.155.a:0 "전략적 조정이 필요하다."
 china_wr.156.t:0 "몽골 방어선 유지"
 china_wr.156.d:0 "몽골 지역에서 중국군의 작전은 성과를 거두지 못했으며, 소비에트가 유지해 온 정치적·군사적 영향력은 흔들리지 않았습니다. 지역 질서는 기존의 틀 안에서 유지되었습니다.\n\n소비에트 지도부는 이번 결과를 중국의 북방 확장 시도가 한계를 드러낸 사례로 평가하고 있습니다."
 china_wr.156.a:0 "북방 방어선은 건재하다."
 china_wr.157.t:0 "몽골 영향력 상실"
 china_wr.157.d:0 "몽골 지역에서 중국군이 결정적인 우위를 점함에 따라, 소비에트의 기존 영향력은 후퇴했습니다. 정치적 균형은 더 이상 모스크바에 유리하게 유지되지 못하고 있습니다.\n\n소비에트 지도부는 이를 중앙아시아 전략 전반에 부담을 주는 결과로 받아들이고 있습니다."
 china_wr.157.a:0 "상황은 악화되었다."
 china_wr.158.t:0 "탄누투바 거점 유지"
 china_wr.158.d:0 "탄누투바에서 중국군의 공세는 실패로 끝났으며, 소비에트가 유지해 온 영향력과 통제는 계속 유지되었습니다. 이 지역은 여전히 중앙아시아에서 중요한 전략 거점으로 기능하고 있습니다.\n\n지도부는 이번 결과가 중국의 군사적 한계를 보여 주었다고 평가하고 있습니다."
 china_wr.158.a:0 "거점은 유지되었다."
 china_wr.159.t:0 "탄누투바 거점 상실"
 china_wr.159.d:0 "탄누투바에서 중국군이 승리를 거두면서, 소비에트는 중앙아시아의 중요한 전략 거점을 상실했습니다. 이는 군사적 손실을 넘어, 소비에트 영향력 전반에 상징적인 타격을 주는 결과입니다.\n\n지도부는 이번 사태를 심각하게 받아들이고 있으며, 대중국 정책의 전면적 재검토를 고려하고 있습니다."
 china_wr.159.a:0 "중대한 손실이다."
 china_wr.160.t:0 "중국의 탄누투바 철수 요구"
 china_wr.160.d:0 "중국 정부는 전후 현상 공인 요구에 더해, 탄누투바에서의 소비에트 철수까지 요구했습니다. 이는 중앙아시아에서 소비에트의 마지막 거점을 제거함으로써 재개입 가능성을 근본적으로 약화시키려는 강경한 요구입니다.\n\n모스크바는 이를 수용할 경우 상징적·전략적 손실을 감수해야 하며, 거부할 경우 중국과의 관계 악화를 감수해야 합니다."
 china_wr.160.a:0 "요구를 수락하라."
 china_wr.160.b:0 "요구를 거부하라."
 china_wr.161.t:0 "소비에트의 탄누투바 철수"
 china_wr.161.d:0 "소비에트 러시아는 중국의 요구를 수락하고 전후 현상을 공인하는 동시에 탄누투바에서의 철수에 동의했습니다. 중국 정부는 이를 중앙아시아 질서의 정상화로 평가하며, 소련의 재개입 가능성이 크게 낮아졌다고 판단했습니다.\n\n이 합의는 국경 안정과 외교적 명확성을 제공하지만, 소비에트가 다른 방식으로 영향력을 회복하려 할 가능성까지 제거하지는 못합니다."
 china_wr.161.a:0 "민국 만세!"
 china_wr.162.t:0 "소비에트의 탄누투바 철수 거부"
 china_wr.162.d:0 "소비에트 러시아는 중국의 요구를 거부했습니다. 중국 정부는 이 거부가 중앙아시아에서의 영향력 거점을 유지하려는 의지의 표현이라고 판단하고 있으며, 탄누투바 문제가 장기적인 분쟁의 씨앗으로 남게 되었습니다.\n\n중국은 소련을 향한 외교 정책에서 더 강한 불신과 경계를 전제로 삼게 될 것입니다."
 china_wr.162.a:0 "또 다른 방법을 써야겠군."
 china_wr.163.t:0 "탄누투바의 귀속"
 china_wr.163.d:0 "소비에트 러시아가 탄누투바에서 철수한 이후, 해당 지역의 권력 공백은 오래 지속되지 않았습니다. 기존의 행정 구조와 군사 통제는 신속히 붕괴되었고, 탄누투바는 외교적 혼란 속에서 중국의 보호와 행정 통합을 선택하게 되었습니다.\n\n중국 정부는 이를 역사적 현실에 부합하는 귀속으로 평가하고 있으며, 북방 국경의 안정과 질서 회복을 위한 불가피한 조치로 받아들이고 있습니다."
 china_wr.163.a:0 "탄누투바는 다시 중국의 일부가 되었다."
 china_wr.164.t:0 "외몽골의 병합"
 china_wr.164.d:0 "만주와 몽골 지역에서 형성된 중국의 영향력은 외몽골에까지 미치게 되었으며, 현지의 정치적 공백과 혼란을 계기로 중국은 외몽골을 직접 병합하는 조치를 단행했습니다. 이 결정은 사전 협의나 국제적 승인 없이 이루어졌으며, 신속한 군사적·행정적 조치로 기존 질서는 해체되었습니다.\n\n중국 정부는 이를 국경 질서 회복과 북방 안정의 연장선으로 규정하고 있으며, 외몽골 문제를 더 이상 미결 상태로 둘 수 없었다는 입장을 취하고 있습니다."
 china_wr.164.a:0 "현실을 받아들일 수밖에 없다."
 china_wr.164.t:0 "외몽골의 무단 병합"
 china_wr.164.d:0 "만주와 몽골 일대의 정세가 불안정한 가운데, 몽골은 외몽골 지역에 대한 무단 병합을 단행했습니다. 이 조치는 중국과의 사전 협의나 국제적 승인 없이 이루어졌으며, 군사적 진입과 행정 장악을 통해 기존의 질서는 신속히 해체되었습니다.\n\n중국 정부는 이를 북방 국경 질서를 훼손하는 일방적 행동으로 규정하고 있으며, 외몽골 문제가 다시금 정치적·외교적 쟁점으로 부상했다고 판단하고 있습니다."
 china_wr.164.a:0 "현실을 받아들일 수밖에 없다."
 china_wr.165.t:0 "탄누투바 점령"
 china_wr.165.d:0 "소비에트 러시아가 탄누투바에서 철수한 이후, 몽골은 해당 지역에 형성된 권력 공백을 활용하여 군사적 점령을 단행했습니다. 조직적인 저항은 제한적이었으며, 주요 행정 거점은 단기간 내에 몽골의 통제 아래로 편입되었습니다.\n\n몽골 정부는 이번 조치를 국경 안정과 안보 확보를 위한 불가피한 선택으로 규정하고 있으며, 탄누투바를 자국의 영향권에 두는 것이 현실적인 판단이었다고 평가하고 있습니다."
 china_wr.165.a:0 "탄누투바는 우리의 통제 하에 있다."
 china_wr.166.t:0 "중국의 조계지 반환 요구"
 china_wr.166.d:0 "중화민국 정부는 자국 내 조계지를 불평등한 국제 질서의 잔재로 규정하고, 해당 지역의 반환을 공식적으로 요구했습니다. 이 요구는 외교적 경로를 통해 전달되었으며, 즉각적인 무력 충돌이 아닌 협상을 통한 해결을 전제로 하고 있습니다.\n\n그들은 우리가 이 요구를 승인할지, 아니면 기존의 권익을 유지하기 위해 거부할지를 지켜보고 있습니다."
 china_wr.166.a:0 "반환하라."
 china_wr.166.b:0 "헛소리다."
 china_wr.167.t:0 "조계지 반환 승인"
 china_wr.167.d:0 "[FROM.GetName]가 중국의 조계지 반환 요구를 승인했다는 결정이 정부에 보고되었습니다. 중국 정부는 이를 주권 회복 과정에서의 중대한 외교적 성과로 평가하고 있으며, 불평등한 질서를 외교적으로 해체할 수 있음을 입증한 사례로 받아들이고 있습니다.\n\n정부는 이번 결과를 국제 사회에 알리며, 다른 조계지 문제 해결의 선례로 활용할 방침입니다."
 china_wr.167.a:0 "주권 회복의 진전이다."
 china_wr.168.t:0 "조계지 반환 거부"
 china_wr.168.d:0 "[FROM.GetName]가 중국의 조계지 반환 요구를 거부했다는 결정이 정부에 보고되었습니다. 중국 정부는 이를 주권 회복 노선을 부정하는 행위로 인식하고 있으며, 불평등한 질서를 유지하려는 의지가 분명히 드러났다고 판단하고 있습니다.\n\n정부는 외교 노선을 재검토하며, 보다 강경한 대응 수단을 검토하기 시작했습니다."
 china_wr.168.a:0 "멍청한 놈들."
 china_wr.169.t:0 "중국의 무기 판매 제안"
 china_wr.169.d:0 "중화민국 정부는 현재의 국제 정세를 고려하여, 우리 정부에 소총과 야포를 판매할 수 있다는 제안을 전달해 왔습니다. 중국 측은 이를 상업적 거래로 설명하고 있으나, 이 제안은 군사적·외교적 계산에 직접적인 영향을 미칠 수 있는 사안입니다.\n\n우리 정부는 중국의 제안을 수락하여 무기를 구매할지, 아니면 외교적 파장을 우려하여 이를 거부할지를 결정해야 합니다."
 china_wr.169.a:0 "무기 구매 제안을 수락한다."
 china_wr.169.b:0 "무기 구매 제안을 거부한다."
 china_wr.170.t:0 "무기 판매 성사"
 china_wr.170.d:0 "우리 정부가 제안한 소총과 야포의 판매가 [FROM.GetName]에 의해 수락되었다는 보고가 접수되었습니다. 중국 정부는 이번 거래를 외교적 영향력을 확대할 수 있는 성과로 평가하고 있으며, 무기 수출은 제한적이고 통제된 방식으로 진행될 예정입니다.\n\n이번 성사는 중국이 군수 자원을 외교적 수단으로 활용할 수 있음을 보여주는 사례로 인식되고 있습니다."
 china_wr.170.a:0 "거래를 진행한다."
 china_wr.171.t:0 "무기 판매 제안 거부"
 china_wr.171.d:0 "우리 정부가 제안한 소총과 야포의 판매가 [FROM.GetName]에 의해 거부되었다는 보고가 접수되었습니다. 중국 정부는 이를 해당 국가가 외교적 거리를 유지하려는 선택으로 평가하고 있으며, 무기 거래가 양국 관계에서 갖는 한계를 재확인하게 되었습니다.\n\n정부는 단기적 성과보다 외교적 자율성을 중시하는 노선을 유지하기로 결정했습니다."
 china_wr.171.a:0 "다른 외교 수단을 모색한다."
 china_wr.172.t:0 "중국의 군사 협력 제안"
 china_wr.172.d:0 "중화민국 정부는 태평양 지역의 안보 환경과 일본의 군사적 팽창을 언급하며, 우리 정부에 군사 협력을 제안해 왔습니다. 중국 측은 이 제안이 즉각적인 동맹 체결을 의미하지 않으며, 군사 훈련 교류와 기술 협력, 제한적인 장비 지원을 포함한 실무적 협력이라고 설명하고 있습니다.\n\n우리 정부는 이 제안을 승인하여 중국과 제한적 군사 협력을 시작할지, 혹은 전략적 거리 유지를 위해 이를 거부할지를 결정해야 합니다."
 china_wr.172.a:0 "제안을 승인한다."
 china_wr.172.b:0 "제안을 거부한다."
 china_wr.173.t:0 "미국과의 군사 협력 성사"
 china_wr.173.d:0 "미국 정부가 우리의 군사 협력 요청을 수락했다는 보고가 접수되었습니다. 중국 정부는 이를 외교적 고립을 완화하고, 군사 현대화를 가속할 수 있는 중요한 계기로 평가하고 있습니다.\n\n이번 합의에 따라 양국 간 군사 훈련 교류와 정보 협력이 이루어질 예정이며, 중국은 제한적이지만 실질적인 군사 지원에 접근할 수 있는 기반을 확보하게 되었습니다."
 china_wr.173.a:0 "협력을 개시한다."
 china_wr.174.t:0 "미국의 군사 협력 거부"
 china_wr.174.d:0 "미국 정부가 우리의 군사 협력 요청을 거부했다는 보고가 접수되었습니다. 미국 측은 신중한 외교 노선과 기존의 국제적 약속을 이유로 들었으나, 중국 정부는 이를 전략적 거리 유지를 선택한 결정으로 해석하고 있습니다.\n\n정부는 미국에 대한 기대를 조정하고, 다른 국가들과의 군사 협력 가능성을 모색하는 방향으로 외교 노선을 재검토하기로 했습니다."
 china_wr.174.a:0 "다른 선택지를 검토한다."
 china_wr.175.t:0 "중국의 대일 포위 제안"
 china_wr.175.d:0 "중화민국 정부는 일본의 군사적·외교적 팽창이 태평양 지역의 안정에 위협이 되고 있다고 판단하며, 미국과 네덜란드, 영국에 공동으로 일본을 외교적·경제적으로 압박하자는 제안을 전달했습니다. 이 제안은 즉각적인 군사 행동을 요구하지 않으며, 해양 강국 간의 외교적 연대와 단계적 압박을 통해 일본의 선택지를 제한하려는 구상입니다.\n\n중국은 공동 대응이 성립될 경우 지역 균형을 회복할 수 있다고 주장하고 있으며, 이제 [ROOT.GetName] 정부는 이 제안을 승인할지 여부를 결정해야 합니다."
 china_wr.175.a:0 "제안을 승인한다."
 china_wr.175.b:0 "제안을 거부한다."
 china_wr.176.t:0 "[FROM.GetName], 중국의 제안을 승낙하다"
 china_wr.176.d:0 "[FROM.GetName] 정부는 중국이 제안한 대일 포위·압박 구상에 동의하기로 결정했습니다. 이 결정은 즉각적인 군사 행동을 의미하지는 않지만, 외교적 공조와 단계적 압박을 통해 일본의 행동 반경을 제한하려는 의지를 명확히 보여주는 조치입니다.\n\n중국 정부는 이를 중요한 외교적 성과로 평가하고 있으며, 협력국과의 조율을 통해 대일 전략을 체계화할 준비에 들어갔습니다."
 china_wr.176.a:0 "외교적 연대를 강화하라."
 china_wr.177.t:0 "[FROM.GetName], 중국의 제안을 거절하다"
 china_wr.177.d:0 "[FROM.GetName] 정부는 중국이 제안한 대일 포위·압박 구상에 동의하지 않기로 결정했습니다. [FROM.GetName]은 현재의 외교적 이해관계와 지역 내 긴장 고조 가능성을 고려하여, 공동 압박에 참여하지 않는 노선을 선택했습니다.\n\n중국 정부는 이 결정을 각국의 신중한 계산의 결과로 받아들이며, 당분간 독자적인 대일 외교 노선을 유지할 필요에 직면했습니다."
 china_wr.177.a:0 "독자 노선을 검토하라."
 china_wr.178.t:0 "[FROM.GetName]의 대일 무역장벽 조치"
 china_wr.178.d:0 "[FROM.GetName] 정부는 일본을 대상으로 한 무역장벽 조치를 공식적으로 시행했습니다. 이번 조치는 관세 인상과 통관 절차 강화를 포함하고 있으며, 일본의 대외 교역과 산업 전반에 실질적인 부담을 가할 것으로 평가되고 있습니다.\n\n정부 내에서는 이 조치가 외교적 압박 수단으로 활용되고 있다는 점을 분명히 인식하고 있으며, 단기적인 경제적 충격과 함께 중장기적인 대응 방안 검토가 필요하다는 판단이 내려지고 있습니다."
 china_wr.178.a:0 "상황을 주시하라."
 china_wr.179.t:0 "칼날 위의 인내"
 china_wr.179.d:0 "중화민국 군부의 분노는 어제오늘의 일이 아닙니다. 해먹을 것조차 남지 않은 빈약한 군고, 사사건건 군의 발목을 잡으며 신무기 개발조차 가로막았던 문민정부의 '군비 칼질'은 이미 수십 년 전부터 이어져 온 고질적인 억압이었습니다. 군벌화를 막겠다는 명목하에 자행된 그 무능한 견제의 끝은 결국 나라를 갈가리 찢어놓은 참혹한 내전이었습니다.\n\n군부는 묻고 있습니다. 나라를 지킨 대가가 이것인가? 그토록 군의 힘을 억눌렀던 정부가 정작 내전이라는 국가적 재난 앞에서는 얼마나 무기력했는지를 군인들은 뼈저리게 목격했습니다. 이제 군 내부에 감도는 기류는 단순한 불만을 넘어, 정부의 통치 역량 그 자체를 부정하는 거대한 냉소로 변했습니다.\n\n이 파국을 간신히 지탱하고 있는 것은 민국에 대한 오패부 장군의 마지막 남은 신념과 인내심뿐입니다. 그러나 민생이 박살나고 인플레이션이 가속화되는 무능의 현장이 반복될수록, 장군의 머릿속에는 정부를 뒤엎기 위한 결심이 독버섯처럼 피어오르고 있습니다. 장군의 인내심이 바닥나는 순간, 그것은 곧 민국의 종말이자 '구국의 결단'이 시작되는 날이 될 것입니다."
 china_wr.179.a:0 "장군의 눈은 더 이상 전장만이 아닌, 정부를 향하고 있다."
 china_wr.180.t:0 "호법정부의 중국 평정"
 china_wr.180.d:0 "중화민국 전역을 휩쓴 장기간의 내전은 결국 호법정부의 승리로 막을 내렸습니다. 헌정 질서의 수호를 기치로 내세운 호법정부는 주요 군사 거점을 장악하며 경쟁 세력을 제압하였고, 북경을 중심으로 한 중앙 통치 체계를 재확립하는 데 성공하였습니다.\n\n이번 승리는 무너졌던 헌정 질서를 복원하고 민국 체제를 재정비할 수 있는 정치적 전기를 마련하였다는 평가를 받고 있습니다. 중국 사회는 새로운 안정 국면에 대한 기대와 함께 향후 개혁의 방향을 주시하고 있습니다."
 china_wr.180.a:0 "중국은 다시 하나가 되었다."
 china_wr.181.t:0 "국민당의 중국 평정"
 china_wr.181.d:0 "중화민국을 뒤흔들어 온 내전은 국민당의 군사적 승리로 종결되었습니다. 국민당은 전국적 작전과 조직력을 바탕으로 경쟁 세력을 무너뜨리고, 중앙집권적 통치 체계를 확립하는 데 성공하였습니다.\n\n중국은 이제 새로운 정치 질서의 출현을 맞이하고 있으며, 국민당이 약속한 국가 통합과 재편이 실제로 어떠한 모습으로 전개될지에 대하여 국내외의 이목이 집중되고 있습니다."
 china_wr.181.a:0 "중국은 다시 하나가 되었다."
 china_wr.1000.t:0 "[FROM.FROM.GetCapitalVictoryPointName] 점령"
 china_wr.1000.d:0 "[FROM.FROM.GetCapitalVictoryPointName] 점령은 우리에게 중대한 전과를 안겨주었습니다. 해당 도시는 적 국가의 정치적·군사적 중심지로서 상징적 의미가 매우 크며, 이번 점령은 전쟁의 흐름을 우리에게 유리하게 전환시키는 결정적 성과로 평가됩니다.\n\n적의 지휘 체계와 행정 구조는 심각한 타격을 입었으며, 국제 사회 역시 이번 사태를 전황의 중대한 변화로 인식하고 있습니다."
 china_wr.1000.a:0 "결정적인 승리이다."
 china_wr.1001.t:0 "[FROM.FROM.GetCapitalVictoryPointName] 상실"
 china_wr.1001.d:0 "[FROM.FROM.GetCapitalVictoryPointName] 상실은 국가 전반에 심각한 충격을 주고 있습니다. 수도의 상징성과 정치적 의미를 고려할 때, 이번 사태는 단순한 군사적 패배를 넘어 전쟁 수행 능력 전반에 중대한 영향을 미치고 있습니다.\n\n지휘 체계의 혼란과 민심의 동요가 확산되고 있으며, 정부는 전황을 수습하기 위한 중대한 결단을 내려야 하는 상황에 직면하였습니다."
 china_wr.1001.a:0 "상황이 심각하다."
 china_wr.182.t:0 "군비 확장 요구"
 china_wr.182.d:0 "내전이 장기화되면서 군부는 현 전력과 보급 체계가 더 이상 작전 지속을 담보하기 어렵다고 판단하고 있습니다. 군 내부에서는 병력 편제와 장비 생산, 탄약 비축을 동시에 확장하지 않으면 전쟁의 주도권을 상실할 수 있다는 위기의식이 확산되고 있습니다.\n\n군부는 국가가 더 많은 재정을 군비에 우선 배정하여, 단순한 소모 보충을 넘어 전쟁 수행 능력을 근본적으로 강화해야 한다고 요구하고 있습니다."
 china_wr.182.a:0 "그들의 요구를 들어주어라."
 china_wr.182.b:0 "그들의 요구는 지나치다."
 china_wr.183.t:0 "군수산업 전환 확대 요구"
 china_wr.183.d:0 "군부는 현재의 군수품 생산 속도가 전선의 소모를 따라가지 못하고 있다고 보고 있습니다. 이들은 민간 산업의 일부를 군수 생산으로 보다 과감하게 전환하지 않으면 장기전에서 불리한 위치에 놓이게 될 것이라고 주장하고 있습니다.\n\n이 요구는 군사적 측면에서는 실질적인 도움이 될 수 있으나, 민생과 경제 전반에 부담을 가중시킬 가능성도 내포하고 있습니다."
 china_wr.183.a:0 "그들의 요구를 들어주어라."
 china_wr.183.b:0 "그들의 요구는 지나치다."
 china_wr.184.t:0 "우수 인재 징집 확대 요구"
 china_wr.184.d:0 "군부는 장교단과 지휘 인력의 질적 저하를 심각한 문제로 인식하고 있습니다. 유능한 장군과 인재들이 국민당으로 대거 유입되었다는 인식이 퍼지며, 현 체제가 전쟁 수행에 필요한 인적 기반을 확보하지 못하고 있다는 불만이 제기되고 있습니다.\n\n군부는 대학 병역 면제를 폐지하고, 우수한 인재를 선별하여 징병 및 임관시키는 제도 개편을 요구하고 있습니다."
 china_wr.184.a:0 "그들의 요구를 들어주어라."
 china_wr.184.b:0 "그들의 요구는 지나치다."
 china_wr.185.t:0 "신무기 개발 예산 확장 요구"
 china_wr.185.d:0 "군부는 기존의 장비와 교리가 내전의 현실에 점점 부합하지 않고 있다고 판단하고 있습니다. 전황이 고착될수록 화력, 통신, 포병 운용, 기계화 지원에서의 기술 격차가 치명적인 약점으로 작용할 수 있다는 우려가 커지고 있습니다.\n\n이에 따라 군부는 신무기 개발과 시험, 조달을 위한 예산을 대폭 확장할 것을 요구하고 있습니다."
 china_wr.185.a:0 "그들의 요구를 들어주어라."
 china_wr.185.b:0 "그들의 요구는 지나치다."
 china_wr.186.t:0 "군부 자율권 확대 요구"
 china_wr.186.d:0 "군부는 작전의 속도와 유연성을 확보하기 위해 지휘 체계에 더 큰 자율권을 부여해야 한다고 주장하고 있습니다. 이들은 독일식 임무형 지휘 체계를 예로 들며, 상급 지휘부가 목표를 제시하고 하급 지휘관이 전술적 판단을 수행하는 구조가 필요하다고 보고 있습니다.\n\n이 요구는 현장 대응력을 높일 수 있으나, 정치적 통제와의 균형 문제가 함께 제기되고 있습니다."
 china_wr.186.a:0 "그들의 요구를 들어주어라."
 china_wr.186.b:0 "그들의 요구는 지나치다."
 china_wr.187.t:0 "전시 최고지휘부 권한 확대 요구"
 china_wr.187.d:0 "군부는 내전이라는 비상 상황에서 최고지휘부에 더 넓은 권한이 부여되어야 한다고 주장하고 있습니다. 작전, 보급, 인사 문제를 신속히 처리하지 못하면 전선이 붕괴될 수 있다는 위기감이 군 내부에 퍼지고 있습니다.\n\n군부는 전시 기간에 한해 최고지휘부가 국가 동원과 군 운영 전반을 보다 직접적으로 통제할 수 있어야 한다고 요구하고 있습니다."
 china_wr.187.a:0 "그들의 요구를 들어주어라."
 china_wr.187.b:0 "그들의 요구는 지나치다."
 china_wr.188.t:0 "군사재판권 확대 요구"
 china_wr.188.d:0 "군부는 기강 확립과 후방 안정이 전쟁 수행의 필수 조건이라고 강조하며, 군사재판권의 확대를 요구하고 있습니다. 전시 범죄와 항명, 군수 비리 등을 민간 사법 절차로 처리할 경우 대응이 지나치게 지연된다는 불만이 누적되고 있습니다.\n\n군부는 특정 범주의 사건에 대해 군사재판을 확대 적용함으로써 내부 질서를 신속히 유지해야 한다고 주장하고 있습니다."
 china_wr.188.a:0 "그들의 요구를 들어주어라."
 china_wr.188.b:0 "그들의 요구는 지나치다."
 china_wr.189.t:0 "당 영상 쇄신"
 china_wr.189.d:0 "진보당은 원로 세대가 당대 지식인 사회에서 형성된 보수적인 공화주의 정견을 유지해 온 정당이었습니다. 동시에 당 내부에는 량치차오에서 차이어로 이어지는 사상적 계보를 계승하며, 제도와 법치를 통해 민국을 발전시키고자 하는 젊은 당원들이 존재해 왔습니다. 이들은 급진적 좌익 노선과는 거리를 두고 있으며, 국민당 좌파가 선점한 급진적 아젠다와 달리 민주사회주의를 가장 좌측 한계로 삼는 온건한 진보주의를 지향하고 계십니다.\n\n차이어는 이러한 당의 이중적 성격을 분명히 인식하고 계십니다. 그는 개인 숭배나 감정적 선동에 기댄 정치가 아니라, 공화주의 원칙과 이상주의적 중화민족주의를 명확히 전달해야 한다고 판단하고 계십니다. 이 민족주의는 배타적 폭력이 아니라, 소수민족을 포함한 모든 민국 시민을 하나의 정치 공동체로 포용하는 질서 위에 서 있습니다. 당 영상 쇄신은 이러한 노선을 분명히 드러내어, 진보당이 무엇을 지향하는 정당인지 대중에게 명확히 설명하기 위한 조치로 이해되고 있습니다."
 china_wr.189.a:0 "민국의 원칙을 분명히 한라."
 china_wr.190.t:0 "국회 운영 질서의 재정립"
 china_wr.190.d:0 "민국 수립 이후 국회는 입법 기관으로서의 위상을 확립해야 했으나, 실제로는 장기간에 걸쳐 정치적 대립과 절차적 혼란 속에 놓여 있었습니다. 양원의장의 직권상정은 본래 비상 상황을 위한 예외적 수단이었음에도 불구하고, 점차 정치적 편의를 위해 반복적으로 사용되고 있습니다. 이 과정에서 충분한 심의와 토론은 형식화되었고, 국회 내부의 신뢰는 지속적으로 훼손되고 있습니다.\n\n더 나아가 국회 내 물리적 충돌과 회의 방해는 빈번하게 발생하고 있습니다. 일부 의원들은 의사 진행을 저지하거나 강행 처리에 대응한다는 명분 아래 폭력을 행사하고 있으며, 이러한 행태는 입법 과정 자체를 무력화하고 있습니다. 이른바 날치기 입법은 숙의와 합의를 대체하는 수단으로 굳어지고 있으며, 그 결과 법률의 정당성과 안정성은 심각한 의문에 직면하고 있습니다.\n\n이와 동시에 국회의원의 겸직 문제는 입법부의 독립성을 잠식하고 있습니다. 의원이 행정부, 경제 단체, 또는 지역 권력과 이해관계를 공유하는 상황이 누적되면서, 입법이 공공의 이익이 아니라 특정 이해관계를 대변한다는 인식이 확산되고 있습니다. 이는 국회가 민의를 대변하는 기관이라는 근본적인 신뢰를 약화시키고 있습니다.\n\n이러한 문제를 해결하기 위해 행정부와 국회 내 다수 세력은 국회 운영 질서를 제도적으로 재정비하고 있습니다. 양원의장의 직권상정 요건을 명확히 제한하여 예외가 상시화되는 상황을 차단하고, 국회 내 폭력을 명시적으로 금지함으로써 의사당을 물리적 투쟁의 공간이 아니라 토론의 공간으로 되돌리고 있습니다. 또한 절차를 무시한 입법 강행을 제도적으로 봉쇄하여, 모든 법률이 정해진 절차를 거치도록 하고 있습니다.\n\n아울러 무제한 토론 제도를 도입하여 소수 의견이 배제되지 않고 제도 안에서 충분히 제기될 수 있도록 하고 있습니다. 이는 다수결 이전에 숙의가 이루어져야 한다는 원칙을 분명히 하는 조치입니다. 동시에 국회의원의 겸직을 금지하여 입법부가 외부 권력으로부터 독립된 판단을 내릴 수 있도록 하고 있습니다.\n\n이번 조치는 국회를 갈등과 충돌의 장이 아니라, 제도와 절차를 통해 국가의 방향을 결정하는 숙의의 공간으로 재정립하기 위한 시도로 이해되고 있습니다."
 china_wr.190.a:0 "국회 운영 질서를 제도적으로 확립하라."
 china_wr.191.t:0 "참의원 선출 제도의 개혁"
 china_wr.191.d:0 "민국 수립 이후 참의원은 입법 과정에서 신중함과 균형을 담당하는 기관으로 설계되었으나, 그 선출 방식은 오랜 시간 동안 구조적 한계를 드러내고 있습니다. 참의원이 간접 선출 방식으로 구성되면서, 실제로는 민의를 직접 반영하기보다 성 정부와 지역 유력자, 기존 정치 세력의 이해관계를 재생산하는 경향이 누적되고 있습니다.\n\n이러한 구조 아래에서 참의원은 상원의 기능보다는 기득권 조정 기구에 가깝게 운영되고 있습니다. 일부 참의원들은 선출 과정에서 특정 성 정부나 정치 세력에 의존하고 있으며, 그 결과 국회 하원에서 형성된 민의가 제도적으로 제약받고 있다는 비판이 제기되고 있습니다. 참의원이 신중함을 제공하기보다 개혁을 지연시키는 장치로 인식되고 있다는 점은 민국 정치에 부담으로 작용하고 있습니다.\n\n행정부와 개혁파는 이러한 문제의 근원이 선출 방식에 있다고 판단하고 있습니다. 간접 선출 구조는 책임의 귀속을 불분명하게 만들고 있으며, 참의원이 국민 전체가 아니라 제한된 정치 집단을 대변하도록 만들고 있습니다. 이에 따라 참의원의 권위는 유지되면서도, 그 정당성을 새롭게 재구성할 필요성이 제기되고 있습니다.\n\n이에 정부는 참의원 선출 제도를 미국식 상원 모델의 방식으로 개혁하고 있습니다. 각 지역은 독립된 정치 단위로서 참의원을 선출하되, 선출 과정은 명확한 법적 절차와 임기 규정을 통해 제도화되고 있습니다. 이를 통해 참의원은 지역의 이해를 대표하면서도, 특정 성 정부나 행정 권력에 종속되지 않는 구조로 전환되고 있습니다."
 china_wr.191.a:0 "진정한 민주주의를 향해, 한 걸음."
 china_wr.192.t:0 "사법권 독립의 확립"
 china_wr.192.d:0 "민국 수립 이후 사법부는 법치의 핵심 기관으로 기능해야 했으나, 실제로는 행정부와 지방 권력의 영향에서 완전히 자유롭지 못한 상태가 지속되고 있습니다. 일부 성 정부와 지역 토호 세력은 재판 과정에 직간접적으로 개입하고 있으며, 사법 판단이 법률과 증거보다 정치적 고려나 행정적 편의에 좌우되고 있다는 비판이 누적되고 있습니다.\n\n이러한 상황은 법 앞의 평등이라는 민국의 근본 원칙을 훼손하고 있습니다. 사법부가 독립적인 판단을 내리지 못할 경우, 법은 시민을 보호하는 기준이 아니라 권력을 가진 자의 도구로 전락하게 됩니다. 그 결과 민중은 제도를 통해 권리를 구제받을 수 있다는 신뢰를 상실하고 있으며, 이는 민국 체제 전반의 정당성을 약화시키고 있습니다.\n\n행정부는 사법권의 독립이 더 이상 미룰 수 없는 과제라고 판단하고 있습니다. 법관의 인사와 재판 절차에서 행정 권력의 개입을 차단하고, 사법부가 오직 법률과 규정에 근거하여 운영되도록 제도적 장치를 정비하고 있습니다. 이를 통해 성 정부와 정치 세력이 사법부에 행사해 오던 영향력은 단계적으로 제거되고 있습니다.\n\n이번 조치는 사법부를 행정부와 대립하는 권력으로 키우기 위한 것이 아니라, 민국의 법질서를 안정적으로 유지하기 위한 필수적인 개혁으로 이해되고 있습니다. 사법권의 독립은 민국 시민 모두에게 법이 동일하게 적용되고 있음을 보여주는 제도적 기반을 형성하고 있습니다."
 china_wr.192.a:0 "개편에 개편을 거듭하고."
 china_wr.193.t:0 "성의회 장악 문제에 대한 대응"
 china_wr.193.d:0 "성의회 및 지방자치 제도가 개편되는 과정에서, 또 다른 문제가 드러나고 있습니다. 일부 지방 유지 세력은 제도 개혁 이후에도 기존의 인맥과 자본, 사회적 영향력을 활용하여 성의회를 사실상 장악하려 하고 있습니다. 이들은 표면적으로는 새로운 제도를 수용하는 듯 보이지만, 실제로는 선거구 구조와 지역 기반을 이용해 자신들의 지위를 유지하고 있습니다.\n\n이러한 상황이 지속될 경우, 성의회 개편은 형식적인 조치에 그칠 가능성이 크며, 지방 정치는 다시금 소수 유력자의 이해관계에 종속될 위험에 놓이게 됩니다. 중앙정부는 성의회가 진정으로 민의를 반영하는 기관으로 기능하기 위해서는 보다 적극적인 개입이 필요하다고 보고 있습니다.\n\n행정부 내부에서는 대응 방안을 둘러싸고 의견이 갈리고 있습니다. 한쪽에서는 치공당을 포함한 합법 정당들과 협력하여 선거구를 재편하고, 제도적 방식으로 지방 유지들의 영향력을 분산시켜야 한다고 주장하고 있습니다. 이들은 정당 정치의 활성화를 통해 지방 권력이 자연스럽게 재편될 수 있다고 보고 있습니다.\n\n반면 다른 한편에서는 제도적 접근만으로는 한계가 명확하다고 판단하고 있습니다. 이들은 지방 유지 세력이 이미 행정과 치안을 잠식하고 있는 만큼, 군을 파견하여 이들을 일거에 척결함으로써 성의회 질서를 강제로 재정립해야 한다고 주장하고 있습니다.\n\n중앙정부는 이제 지방 정치의 향방을 결정할 중대한 선택을 앞두고 있습니다."
 china_wr.193.a:0 "정당과 협력하여 선거구를 개편한다"
 china_wr.193.b:0 "군을 파견해 지방 유지들을 일거에 척결한다"
 china_wr.194.t:0 "개혁을 위한 최후의 조치"
 china_wr.194.d:0 "중앙정부는 성의회 개편과 지방자치 정비, 선거구 개혁과 정치 질서 재편을 단계적으로 추진해 왔습니다. 그러나 제도와 규범을 아무리 정비하더라도, 이를 집행하는 행정 기구가 낡은 인적 구조에 머무르는 한 개혁은 완결될 수 없다는 판단에 이르고 있습니다.\n\n성정부의 관료 조직은 오랜 관행과 연고 관계 속에서 경직되어 있으며, 중앙의 개혁 방향을 흡수하고 집행하는 데 한계를 드러내고 있습니다. 이러한 인적 정체는 행정의 순환을 막고, 개혁의 성과가 지방에 정착되는 것을 가로막고 있습니다.\n\n행정부는 더 이상의 점진적 조정이나 부분적 개선으로는 행정 질서를 근본적으로 전환할 수 없다고 보고 있습니다. 이제 개혁을 완결하기 위해서는 행정의 핵심을 직접 재편하는 조치가 불가피하다는 결론에 도달하고 있습니다.\n\n이에 중앙정부는 성정부의 주요 직위를 중앙에서 파견된 관료들로 교체하고 있습니다. 이 조치는 타협의 산물이 아니라, 민국 개혁을 마무리하기 위한 마지막 단계로 이해되고 있습니다. 파견 관료들은 법과 제도에 근거하여 행정을 집행하며, 성정부는 중앙의 개혁 노선을 온전히 구현하는 행정 기관으로 재정립되고 있습니다.\n\n이번 조치를 통해 중앙정부는 지방 행정의 흐름을 완전히 정상화하고, 개혁의 방향이 되돌릴 수 없는 단계에 접어들었음을 분명히 하고 있습니다."
 china_wr.194.a:0 "개혁을 완결한다"
 china_wr.195.t:0 "이미육대구습의 의미"
 china_wr.195.d:0 "차이위안페이는 민국 사회가 전근대적 관습에서 벗어나기 위해 무엇이 필요한가에 대해 분명한 입장을 밝히고 있습니다. 그가 제시한 이미육대구습은 단순히 전통을 부정하거나 강제로 폐기하는 주장이 아니라, 사회의 감정과 정서를 새로운 방향으로 이끄는 교육적 전환을 의미하고 있습니다.\n\n차이위안페이는 구습이 단지 제도나 규범의 문제만이 아니라, 오랜 시간에 걸쳐 형성된 감정과 미의식 속에 뿌리내리고 있다고 보고 있습니다. 강압적인 개혁은 저항과 반발을 낳을 뿐이며, 진정한 변화는 사람들의 감각과 가치관이 바뀌는 데서 시작되어야 한다고 설명하고 있습니다.\n\n이미육대구습은 예술과 미적 교육을 통해 퇴폐적이고 경직된 사회적 감정 구조를 대체하려는 시도입니다. 음악과 미술, 문학을 통한 정서 교육은 개인의 품성을 함양하고 공동체 의식을 회복하는 수단으로 활용되고 있으며, 이를 통해 낡은 관습은 자연스럽게 설 자리를 잃게 되고 있습니다.\n\n이러한 접근은 구습을 단번에 제거하려는 것이 아니라, 그 영향력을 점진적으로 약화시키는 방식으로 작동하고 있습니다. 차이위안페이의 설명은 계몽 정책이 단절이 아니라 전환이어야 함을 분명히 하고 있으며, 이미육대구습은 민국 사회 개혁의 문화적 토대로 자리 잡고 있습니다."
 china_wr.195.a:0 "미적 교육을 통해 사회를 전환한다."
 china_wr.196.t:0 "중화민족의 정의"
 china_wr.196.d:0 "중화민국은 이미 제도의 형태로 성립하였으나, 그 제도를 떠받칠 중화민족은 아직 완전히 형성되지 않은 상태에 머물러 있습니다. 민국은 존재하고 있으나, 그 안에서 하나의 정치적 공동체로서 스스로를 인식하는 민족적 자각은 여전히 분절되어 있다는 평가가 제기되고 있습니다.\n\n행정부와 진보당은 국가의 지속성과 발전이 단순한 제도 유지에 있지 않다고 보고 있습니다. 민국이 진정으로 안정되기 위해서는, 법과 헌정 위에 서는 시민적 민족 개념이 확립되어야 하고 있습니다. 이를 위해 신세대 계몽강령은 단순한 사회 개혁을 넘어, 중화민족을 새롭게 정의하는 역할을 맡고 있습니다.\n\n이 구상은 중화민족이라는 개념을 처음으로 체계화했던 량치차오의 정신을 계승하고 있습니다. 량치차오는 혈통이나 지역이 아니라, 공동의 역사와 책임, 그리고 미래를 향한 의지를 통해 민족이 형성된다고 보았습니다. 이 관점에서 중화민족은 배타적 집단이 아니라, 함께 진보하는 시민 공동체로 이해되고 있습니다.\n\n신세대 계몽강령은 이러한 인식을 사회 전반에 확산시키고 있습니다. 교육과 문화, 정치 참여를 통해 각기 다른 지역과 배경을 지닌 사람들은 하나의 중화인민으로 결속되고 있으며, 4억 중화인민이 하나의 방향을 향해 나아가고 있다는 의식이 형성되고 있습니다.\n\n이제 중화민국은 단순히 세워진 국가가 아니라, 스스로를 정의하는 민족 국가로 전환되고 있습니다. 신세대 계몽강령은 중화민족을 규정하는 출발점으로 자리 잡고 있습니다."
 china_wr.196.a:0 "신세대 계몽강령으로 중화민족을 정의한다."
 china_wr.197.t:0 "완전 보통선거의 논의"
 china_wr.197.d:0 "행정부와 국회는 민국의 정치 질서를 한 단계 발전시키기 위해 완전 보통선거의 도입을 본격적으로 논의하고 있습니다. 제한적 선거 제도는 제도적 안정을 제공해 왔으나, 정치 참여의 범위를 더 넓혀야 한다는 요구 역시 누적되고 있습니다.\n\n보통선거의 원칙에 대해서는 광범위한 공감대가 형성되고 있으나, 선거 연령과 같은 구체적 기준을 둘러싸고는 다양한 의견이 제기되고 있습니다. 지나치게 이른 연령은 정치적 성숙도에 대한 우려를 낳고 있으며, 반대로 높은 연령 기준은 참여 확대라는 취지와 충돌하고 있습니다.\n\n이에 따라 정부는 우선 완전 보통선거의 방향성을 확인하고, 선거 연령에 대한 문제는 추후 별도의 논의를 통해 결정하기로 하고 있습니다."
 china_wr.197.a:0 "진정한 민주주의로."
 china_wr.198.t:0 "선거 연령의 결정"
 china_wr.198.d:0 "완전 보통선거 도입이 가시화되면서, 선거 연령을 어디에 둘 것인지에 대한 결정이 요구되고 있습니다. 선거 연령은 정치 참여의 폭과 사회적 안정 사이의 균형을 좌우하는 핵심 기준으로 인식되고 있습니다.\n\n정부와 입법부는 서로 다른 연령 기준이 지니는 의미와 파급 효과를 검토하고 있으며, 민국의 현실에 가장 부합하는 선택을 내려야 하는 상황에 놓여 있습니다."
 china_wr.198.a:0 "선거 연령을 19세로 정한다"
 china_wr.198.b:0 "선거 연령을 20세로 정한다"
 china_wr.198.c:0 "선거 연령을 21세로 정한다"
 china_wr.199.t:0 "완전 보통선거의 공표"
 china_wr.199.d:0 "몇 주간 이어진 논의 끝에 선거 연령이 [GetAgeVote]세로 결정이 되며, 정부는 마침내 완전 보통선거의 시행을 공식적으로 공표하게 되었습니다. 이는 특정 계층이나 조건에 의해 제한되었던 정치 참여를 전면적으로 개방하는 조치로 이해되고 있습니다.\n\n정부는 보통선거가 단순한 제도 변화가 아니라, 민국 시민 모두를 정치 공동체의 주체로 인정하는 선언이라고 밝히고 있습니다. 이를 통해 정치적 책임과 권리는 더 넓은 사회로 확장되고 있으며, 민국의 정치 질서는 새로운 단계에 접어들고 있습니다."
 china_wr.199.a:0 "드디어!"
 china_wr.200.t:0 "신여성운동"
 china_wr.200.d:0 "교육과 계몽 정책의 확산 속에서 여성의 사회적 역할에 대한 인식 또한 변화하고 있습니다. 신여성운동은 여성을 가정과 관습의 영역에만 한정하지 않고, 민국 사회의 적극적인 구성원으로 참여시키고자 하는 흐름으로 자리 잡고 있습니다. 정부는 이러한 변화를 제도적으로 뒷받침하기 위해 여성권 신장에 관한 구체적인 조치들을 검토하고 있습니다."
 china_wr.200.a:0 "여성 또한 사람이다."
 china_wr.201.t:0 "여성 교육의 확대"
 china_wr.201.d:0 "정부는 여성의 사회 참여를 제도적으로 뒷받침하기 위해 교육 접근성을 확대하고 있습니다. 그동안 제한되었던 교육 기회는 점진적으로 개방되고 있으며, 여성 교육은 개인의 자립뿐 아니라 사회 전반의 식자 수준을 향상시키는 기반으로 인식되고 있습니다.\n\n교육을 통해 여성은 새로운 직업과 역할에 접근하고 있으며, 이는 민국 사회의 인적 자원을 확장하는 방향으로 작동하고 있습니다."
 china_wr.201.a:0 "교육은 참여의 출발점이다"
 china_wr.202.t:0 "여성의 법적 지위 정비"
 china_wr.202.d:0 "정부는 민법과 행정 제도 전반에서 여성의 법적 지위를 명확히 하고 있습니다. 기존의 관행은 여성의 권리를 모호하게 만들었으며, 이는 제도적 보호의 공백으로 이어져 왔습니다.\n\n법적 지위의 정비는 여성의 권리와 책임을 제도 안에 명시하는 조치로 이해되고 있으며, 이는 법 앞의 평등을 현실로 구현하는 과정으로 평가되고 있습니다."
 china_wr.202.a:0 "법은 모두에게 동일해야 한다"
 china_wr.203.t:0 "여성 취업의 제도화"
 china_wr.203.d:0 "정부는 여성의 노동 참여를 제도적으로 장려하고 있습니다. 취업 기회의 확대와 차별 관행의 완화는 여성의 경제적 자립을 가능하게 하고 있으며, 이는 가계와 사회 전반의 안정성에 기여하고 있습니다.\n\n여성의 노동 참여는 단기적 정책이 아니라, 민국 경제 구조를 장기적으로 확장하는 요소로 인식되고 있습니다."
 china_wr.203.a:0 "노동은 성별을 가리지 않는다"
 china_wr.204.t:0 "여성의 정치 참여"
 china_wr.204.d:0 "정치 참여의 확대는 여성권 신장의 핵심 단계로 인식되고 있습니다. 여성은 점진적으로 공적 의사결정 과정에 참여하고 있으며, 이는 정치 대표성의 폭을 넓히는 방향으로 작동하고 있습니다.\n\n정부는 여성의 정치 참여가 제도의 안정성을 해치기보다, 오히려 사회적 합의를 강화하는 역할을 하고 있다고 평가하고 있습니다."
 china_wr.204.a:0 "정치는 모두의 일이다"
 china_wr.205.t:0 "전국적 무력 봉기"
 china_wr.205.d:0 "사천 내전이 장기화되면서 중앙정계의 갈등은 극한에 도달하여 폭발하고 말았습니다. 국민당 내부의 강경파는 사천 사태를 '정부 무능의 명백한 증거'라고 규정하며, 더 이상 협상이나 선거 절차로는 국가를 바로잡을 수 없다고 주장하고 있습니다.\n\n오늘 새벽, 국민당 계열의 주요 장성들과 지방 조직이 일제히 중앙정부에 대한 무력 거부를 선언하였습니다. 그들은 성명에서 "헌정과 민의를 가장한 부정과 조작이 중원을 병들게 하고 있다"며, "국가를 바로 세우기 위해 불가피한 행동에 돌입한다"고 발표하였습니다.\n\n여러 지역에서 무장 충돌이 보고되고 있으며, 일부 도시는 사실상 국민당 군대의 통제 아래 들어간 것으로 파악되고 있습니다. 중앙정부는 이를 명백한 반란으로 규정하고, 즉각적인 진압 준비에 돌입하고 있습니다.\n\n사천에서 시작된 불씨는 마침내 전국적 내전의 형태로 번지고 있습니다. 민국은 다시 한번 분열의 갈림길에 서 있습니다."
 china_wr.205.a:0 "중국은 피로 물들 것이다."
 china_wr.205.b:0 "국민당을 위하여!"
 china_wr.206.t:0 "광둥성의 국민혁명정부 가입 선포"
 china_wr.206.d:0 "지난달 광시성에서 국민혁명군 제 7군을 이끌고 주강을 넘어 광저우에 입성한 리쭝런은 오늘 아침 공식적으로 광둥성이 국민정부에 가입했으며, 리쭝런 자신과 휘하의 병력들은 국민혁명 완수를 위해 끝까지 싸워나갈것임을 천명했습니다.\n\n리쭝런의 국민정부 가입 선포 직후, 이전부터 치안 유지를 명분으로 광저우시의 정치활동을 통제중이던 국민혁명군 제 7군은 공식적으로 광둥성 내에서 국민당을 제외한 모든 정당활동을 금지시켰으며, 정치활동 금지의 선포와 동시에 7군은 즉각 성 의회를 해산하고 광저우의 치공당 당사를 급습하여 광저우시를 떠나지 않았던 치공당원과 직원들을 모두 체포했습니다.\n치공당 이외의 다른 군소 정당조직 역시 대부분 와해되었으며, 리쭝런 개인에게 충성 맹세를 거부한 광둥성정부의 의원과 관료들도 모두 체포되며 광둥성 전역이 리쭝런의 제 7군 통제하에 들어갔습니다."
 china_wr.206.a:0 "이게 국민당 패거리가 말하는 '혁명'이라는 것인가?"
 china_wr.206.b:0 "혁명의 고향이 우리에게 있다!"
 china_wr.207.t:0 "국민혁명정부에 가입한 장시성과 저장성"
 china_wr.207.d:0 "오늘 저녁, 전통적으로 국민당 지지세가 강하던 장시성과 저장성 지도부는 거의 만장일치로 국민혁명정부에 가입하는 선언문에 서명했습니다. 이윽고 장시성 지방군은 명령체계의 혼선으로 혼란에 빠져 주둔지에서 움직이지 못하고 있던 장시성 주둔 정부군 주둔지를 포위하고 투항을 요구했으며, 대부분은 지방군의 투항 요구에 순응하여 무장을 해제했으나 일부 부대는 투항을 거부하고 지방군과 교전을 벌이고 있습니다.\n\n순식간에 압도적인 숫적 열세에 처한 정부군은 전면전을 포기하고 장시성의 복잡한 산간지대로 숨어들었습니다. 장시성 지방군의 화력은 톈타이 산맥의 험준한 지형을 방패삼아 숨어든 정부군을 섬멸하기에 충분하지 않기 때문에, ㅌ톈타이 산맥에서의 유격전은 단기간에 해결할 수 없는 지난한 과제가 될 것으로 보입니다."
 china_wr.207.a:0 "끝까지 민국을 위해 싸워라!"
 china_wr.207.b:0 "그래봤자 한줌에 불과하지!"
 china_wr.208.t:0 "후난성의 국민혁명정부 가입"
 china_wr.208.d:0 "우한이 국민정부에 가입한 이후, 그 영향을 짙게 받는 후난성의 국민정부 가입은 반정도 기정사실이나 다름없었지만, 연성주의자인 자오헝티 후난성장이 연달아 거부권을 행사하며 국민정부 가입을 가로막고 있었습니다.\n광저우에서 도망쳐온 치공당원을 보호하며 날로 국민정부와의 대립각을 새우던 자오헝티는 오늘 새벽 일어난 후난성 지방군 국민당원 청년장교들의 쿠데타로 실각하여 약간의 호위 병력과 함께 간신히 후난성 밖으로 도망쳤습니다.\n이에 정당한 절차를 통해 집권한 자오헝티를 지지하는 후난성 주민들의 반대와 규탄이 연일 이어지고 있으나, 후난성국혁명군정부는 이에 강경정책 일변도로 대처하고 있습니다."
 china_wr.208.a:0 "자오헝티는 후난으로 돌아갈 것이다!"
 china_wr.208.b:0 "국민혁명의 대오에 동참한것을 환영하오 청년 동지들!"
 china_wr.209.t:0 "푸젠성의 베이징 지지 선언"
 china_wr.209.d:0 "난징에서 타오른 혁명의 불길은 남방의 성들을 휩쓸었고, 이윽고 그 불길은 동남쪽 우이산맥에 둘러싸여 고립된 푸젠성에도 닿았습니다. 국민정부는 지금까지 다른 성들이 그래왔듯 푸젠성 또한 쉬이 혁명의 대오에 합류하리라 여겼으나, 뜻밖에도 푸젠 성정부는 국민정부의 가입 요청을 공식적으로 거절했습니다.\n\n국민정부는 여론의 뜻이 혁명에 있는 이상, 지도부가 압력에 굴복하든 청년장교들의 '의거'가 일어나든 결국 푸젠성이 합류할 것이라 낙관했습니다. 그러나 주요 해안 도시인 푸저우와 샤먼은 국민당 지지세가 강한 곳이 아니었습니다. 무엇보다 푸젠성을 사실상 지배하는 민계 해군 파벌의 수장이자 전 성장인 싸전빙이 공개적으로 국민당을 비판하자, 푸젠성의 여론은 국민당에게서 완전히 등을 돌렸습니다.\n\n싸전빙의 비판 성명 발표 이틀 만에 현 성장 양수장은 전폭적인 중앙정부 지지를 선언했습니다. 즉각 모든 지방군에 소집 명령이 내려지는 등, 푸젠성을 둘러싼 군사적 긴장은 해소될 기미 없이 날로 고조되고 있습니다."
 china_wr.209.a:0 "그야말로 출어니이불염이로군."
 china_wr.209.b:0 "좋다, 그렇다면 전쟁이다."
 china_wr.210.t:0 "국민혁명군의 푸젠성 침공!"
 china_wr.210.d:0 "푸젠성이 국민혁명정부 합류를 거부하고 중앙정부 지지를 선언하자, 국경지대의 잦은 충돌은 순식간에 전면전으로 비화했습니다. 전황은 국민혁명군과 민병대가 뒤섞여 무질서하게 밀고 들어오면 푸젠성 지방군이 이를 막아내려다 결국 중과부적으로 후퇴하는 양상의 반복이었습니다.\n\n험준한 푸젠의 산맥을 따라 국민정부군의 보급선이 늘어지고, 해군의 함포 사격에 대한 우려로 진격이 멈추면서 공세는 돈좌되었습니다. 전선은 일시적인 소강상태에 들어섰으나, 긴장은 여전히 팽팽합니다. 국민혁명군은 이미 푸젠성의 절반을 점령했으며, 여전히 지방군을 압도하는 전력을 유지하고 있기 때문입니다.\n\n지난 전투의 상흔이 채 가시기도 전에, 전쟁의 먹구름이 다시금 푸젠성의 하늘을 뒤덮고 있습니다."
 china_wr.210.a:0 "우리는 푸젠을 위해 무엇이든 해야만 한다."
 china_wr.210.b:0 "결국 이장폐천에 불과하다."
 china_wr.211.t:0 "호국군의 발족"
 china_wr.211.d:0 "윈난성장 탕지야오가 지난달 윈난 육군강무당 찬조 강연에서 공식적으로 국민혁명정부를 비판하고 윈난성의 중앙정부 지지를 재확인한 이후, 윈난성은 마찬가지로 국민혁명에 미온적인 구이저우성과 광시성을 끌어들여 방어적 성격의 공수동맹을 맺고자 노력을 지속해 왔습니다.\n\n그동안 구이저우와 광시 성정부는 동맹 자체가 필요 이상으로 국민정부를 자극할 수 있다는 이유로 결성에 매우 소극적인 반응을 보여왔습니다. 그러나 후난성에서의 청년장교단 쿠데타와 국민혁명군의 푸젠성 침공은 국민정부가 어정쩡한 중립을 용인할 의사가 없음을 명확히 보여주었고, 결국 위기감을 느낀 구이저우성과 광시성이 호국군에 가담하는 결과를 낳았습니다.\n\n호국군은 '서남제성연합'이라는 거창한 명칭을 내걸고 있으나, 광시성과 구이저우성은 세력이 지극히 분권화되어 있어 윈난성 지방군 외에는 유효한 전력이 부족합니다. 이 때문에 실질적인 공세 능력은 미미한 것으로 평가받고 있음에도 불구하고, 10만 이상의 병력을 보유한 만큼 국민혁명군의 '북벌' 수행에 있어 상당한 위협이 될 것임은 자명해 보입니다."
 china_wr.211.a:0 "탕지야오는 민국의 충의지사로다!"
 china_wr.211.b:0 "인민의 고혈을 빠는 비적 무리가 모여봤자 비적에 불과하다."
 china_wr.212.t:0 "우한 공세 개시"
 china_wr.212.d:0 "우한을 중심으로 재편을 마친 북양군은 장강 중류의 주도권을 장악하기 위한 공세를 개시하였습니다. 우한은 철도와 수로가 교차하는 전략적 요충지로, 이 지역의 확보 여부는 전선 전반의 주도권과 직결되고 있습니다. 북양군은 포병과 공병을 집중 배치하여 교두보를 확장하고, 인접 거점을 단계적으로 압박하는 방식으로 진격을 시도하였습니다. 일부 지역에서는 방어선을 돌파하는 성과를 거두었으나, 보급선이 장강 연안에 길게 늘어지면서 병력 운용에 부담이 가중되고 있습니다. 전선은 빠르게 유동화되고 있으며, 전황은 단기간 내 결판이 나기 어려운 양상으로 전개되고 있습니다."
 china_wr.212.a:0 "공세를 유지하라."
 china_wr.212.b:0 "방어하라!"
 china_wr.213.t:0 "우한 공세의 좌절"
 china_wr.213.d:0 "우한을 기점으로 전개된 북양군의 공세는 예상보다 강력한 국민당 병력의 저항에 직면하였습니다. 도심과 교외 요충지는 이미 견고한 방어진지로 정비되어 있었으며, 국민혁명군은 기동 부대를 활용해 측면과 후방을 지속적으로 압박하였습니다. 장강 연안을 따라 진격하던 북양군은 집중된 화력과 조직적인 역습에 노출되었고, 전열은 점차 분산되었습니다. 단기간에 우한을 돌파하려던 계획은 차질을 빚었으며, 지휘부는 추가 손실을 방지하기 위해 공세를 중단하고 방어 태세로 전환하였습니다. 장강 중류의 주도권은 여전히 결판이 나지 않은 상태로 남아 있습니다."
 china_wr.213.a:0 "전열을 정비하라."
 china_wr.213.b:0 "그들은 지나가지 못하리라!"
 china_wr.214.t:0 "안칭시를 탈환한 중앙정부군"
 china_wr.214.d:0 "친국민당 민병대가 안칭시의 일부를 점거한지 약 한달여만에 결국 민병대가 정부군의 공세를 버티지 못하고 와해되었습니다. 비축해둔 탄약과 식량이 부족했던 민병대는 중앙정부군을 상대로 조직적인 저항을 수행할 수 없었고, 정부군은 매우 적은 피해로 안칭시를 탈환하는데 성공했습니다. 마지막 저항 세력이 숨어든 학교 건물 소탕을 마지막으로 정부군은 안칭시를 완전히 탈환했고, 아주 적은 수의 민병대원만이 강을 넘어 국민당군 점령지로 도망칠 수 있었습니다.\n\n안칭에서의 승리 소식을 전한 정부군 지도부 대리인은 '앞으로 3개월 이내에 난징을 탈환할 것'이라며 낙관적인 관측을 내놓았고, 또 '정부군 지도부가 즉각적으로 우한시를 탈환하기 위한 공세 작전을 입안 중' 이라고 발표했습니다. 정부군의 발표 과정에서 안칭시의 탈환 과정에서 발생한 다량의 민간인 피해는 공식적으로 발표되지 않았습니다."
 china_wr.214.a:0 "춘절이 오기 전에 집에 갈 수 있겠군."
 china_wr.214.b:0 "이보 전진을 위한 일보 후퇴에 불과하다."
 china_wr.215.t:0 "전면적인 개헌의 필요성 대두"
 china_wr.215.d:0 "중화민국이 건국된 이래, 우리의 헌법은 아시아 최초의 민국을 지탱하는 든든한 기둥 역할을 해왔습니다. 그러나 시대가 변하며 건국 초기에 제정된 헌법의 한계가 점차 명확해지고 있습니다.\n\n현재의 헌법은 초기 국가의 안정을 위해 행정부의 권한을 지나치게 보장하고 있어, 고도로 발전한 현대 대중 민주주의의 역동성을 담아내기에는 지나치게 경직되고 권위적이라는 비판을 받고 있습니다. 의회를 비롯한 정계와 시민사회에서는 단순한 조항 몇 개를 수정하는 수준을 넘어, 성숙한 민주주의 국가에 걸맞은 완전히 새로운 헌법 체계를 구축해야 한다는 목소리가 날이 갈수록 커지고 있습니다. 시대의 요구에 응답할 때가 왔습니다."
 china_wr.215.a:0 "누더기를 깁는 것으론 민국의 미래를 담을 수 없다. 백지상태에서 새로운 헌법을 제정하라!"
 china_wr.215.b:0 "국가의 근간을 함부로 흔들 수는 없다. 기존 헌법을 유지하되, 독소 조항과 모호한 부분만 도려내라."
 china_wr.216.t:0 "헌법기초위원회 구성 논쟁"
 china_wr.216.d:0 "전면적인 개헌이 선포되고 새 헌법을 작성할 '헌법기초위원회'를 구성할 때가 다가오자, 베이징의 정계는 텅 빈 백지 위에 어떤 밑그림을 그릴 것인가를 두고 격렬한 토론의 장으로 변모했습니다.\n\n국회의 우파와 보수적인 지식인층은 헌법이 국가를 지탱하는 가장 근본적인 뼈대임을 강조합니다. 이들은 대중의 포퓰리즘에 휘둘리지 않는 정교하고 빈틈없는 법리가 필수적이라고 주장하며, 저명한 헌법학자들과 엘리트 정치학자들에게 초안 작성을 전적으로 위임해야 한다고 목소리를 높이고 있습니다.\n\n반면, 진보 성향의 정파와 시민사회의 생각은 다릅니다. 이들은 헌법이 단순한 법조문이 아니라 민국을 구성하는 인민들의 거대한 '사회적 합의'라고 역설합니다. 따라서 위원회는 소수의 전문가들로만 채워져서는 안 되며, 각계각층의 대표자와 다양한 정파를 아울러 폭넓게 구성하여 그들의 목소리를 법학자들이 다듬는 형태가 되어야 한다고 맞서고 있습니다."
 china_wr.216.a:0 "헌법은 국가의 이성이며 정교한 법리이다. 최고 전문가들에게 초안을 맡겨라."
 china_wr.216.b:0 "헌법은 인민의 합의로 완성된다. 각계각층의 대표를 위원회에 포함하라."
 china_wr.217.t:0 "대총통의 위상과 권한 규정"
 china_wr.217.d:0 "헌법기초위원회가 직면한 가장 핵심적인 쟁점은 단연 '국가원수의 위상을 어떻게 규정할 것인가'입니다. 건국 초기부터 지금까지 대총통은 국가의 구심점으로서 막강한 권한을 행사해왔습니다.\n\n우파와 보수 진영은 여전히 광활한 대륙을 통치하고 급변하는 국제 정세에 기민하게 대응하기 위해서는 행정권, 군 통수권, 그리고 비상대권을 양손에 틀어쥔 강력한 '실권형 대총통'이 필수적이라고 주장합니다. 이들에게 국정의 최고 책임자는 곧 확고한 리더십을 의미합니다.\n\n그러나 후스를 위시한 자유주의자들과 지식인층의 반발도 만만치 않습니다. 이들은 현재 대총통의 권한이 제왕적 수준에 이르렀다고 비판하며, 행정부의 권력 남용을 막기 위해 대총통을 국정의 조정자이자 상징적인 국가원수로 남겨두고 실권은 의회와 내각으로 분산시켜야 한다고 역설합니다."
 china_wr.217.a:0 "난세의 파도를 헤쳐나가려면 강력하고 명확한 영도력이 필요하다."
 china_wr.217.b:0 "과도한 권력 집중은 부패를 낳을 뿐이다. 대총통의 권한을 대폭 축소하라."
 china_wr.218.t:0 "성정부의 지위 확립"
 china_wr.218.d:0 "중화민국 체제하에서 광대한 각 지방을 관할하는 성정부에 어느 정도의 권한을 부여할 것인가는 민국의 행정 효율성을 결정짓는 중대한 문제입니다.\n\n중앙집권적 행정을 중시하는 관료들과 여당 내 주류 세력은 성장이란 철저히 중앙정부의 명령을 각 지방에 하달하고 집행하는 '행정관'에 머물러야 한다고 주장합니다. 이들은 국가 정책의 일관성과 행정적 통일성이 그 어떤 자치권보다 우선시되어야 한다고 믿습니다.\n\n하지만 치공당을 비롯한 연성주의자들과 각 지역의 대표들은 이에 타협안을 요구하고 있습니다. 각 성이 지닌 고유한 역사적, 경제적 맥락을 무시한 획일적인 통치는 불가능하며, 효율적인 지방 관리를 위해 성정부의 고유 권한을 헌법으로 인정하고 제한적인 입법권, 즉 조례 제정권 등을 보장해야 한다는 것입니다."
 china_wr.218.a:0 "중화민국은 분할될 수 없는 하나다. 지방 행정의 통일성을 확립하라."
 china_wr.218.b:0 "지방의 실정은 지방이 가장 잘 안다. 각 성의 제한적 자치와 입법권을 보장하라."
 china_wr.219.t:0 "내각의 책임 소재와 국정 운영"
 china_wr.219.d:0 "헌법의 윤곽이 잡혀가면서, 행정부의 핵심인 내각이 누구에게 책임을 져야 하는지에 대한 논의가 탁상에 올랐습니다.\n\n대총통의 강력한 권한을 옹호하는 측에서는 내각이 철저히 대총통의 수족으로 기능해야 한다고 주장합니다. 국정 운영의 연속성과 안정성을 유지하기 위해 내각은 오직 대총통에게만 책임을 지며, 의회가 함부로 내각을 뒤흔들 수 없도록 중의원의 불신임권을 헌법적으로 엄격히 제한해야 한다는 것입니다.\n\n반면, 의회주의자들은 전혀 다른 청사진을 제시합니다. 이들은 직접 선거로 선출된 대총통과 부총통을 제외한 모든 내각 관료는 인민의 대의기관인 중의원의 신임에 전적으로 의존해야 한다고 역설합니다. 만약 내각이 중의원의 불신임을 받는다면 즉각 총사퇴해야 한다는 이 조항은, 행정부에 대한 가장 강력하고 민주적인 통제 장치가 될 것입니다."
 china_wr.219.a:0 "행정의 연속성과 굳건함이 곧 국력이다. 내각은 대총통을 보좌할 뿐이다."
 china_wr.219.b:0 "내각은 인민의 대의기관 앞에 책임져야 한다. 의회의 내각 불신임권을 명시하라."
 china_wr.220.t:0 "중의원 선거구제 개편 논의"
 china_wr.220.d:0 "새로운 헌법의 뼈대가 세워지면서, 민의를 대변하는 중의원의 의석을 어떻게 배분할 것인가가 베이징 정계의 가장 뜨거운 감자로 떠올랐습니다.\n\n보수 및 주류 정당들은 정국의 안정을 최우선으로 내세웁니다. 이들은 한 선거구에서 단 한 명의 승자만을 배출하는 소선거구제를 중심으로 선거 제도를 재편해야 한다고 주장합니다. 군소 정당들의 난립을 막고 다수당에게 명확하게 힘을 실어주어야만, 행정부가 일관성 있고 안정적인 국정 운영을 펼칠 수 있다는 논리입니다.\n\n반면, 소수 정당과 진보 진영은 강하게 반발하고 있습니다. 이들은 1위 후보에게 가지 않은 수많은 표가 사표가 되는 현행 제도는 진정한 민주주의라 볼 수 없다고 비판합니다. 정당의 득표율에 비례하여 의석을 배분하는 비례대표제를 대폭 확대해야만, 다원화된 사회의 다양한 목소리가 원내에 진입하여 진정한 '민의'를 반영할 수 있다고 역설하고 있습니다."
 china_wr.220.a:0 "정국의 안정이 곧 국가의 안위다. 다수당의 책임 정치를 보장하라."
 china_wr.220.b:0 "버려지는 표는 없어야 한다. 소수파의 원내 진입을 보장하는 비례대표제를 확대하라."
 china_wr.221.t:0 "참의원의 입법권 및 거부권 논쟁"
 china_wr.221.d:0 "하원에 해당하는 중의원 문제에 이어, 상원에 해당하는 '참의원'의 역할을 재규정하는 작업 역시 베이징에서 격렬한 논쟁을 불러일으켰습니다.\n\n진보 진영과 개혁파는 헌법이 현대 대중 사회의 속도에 맞춰야 함을 강조합니다. 이들은 하원의 입법을 심의하되, 그 거부권은 엄격히 제한되어야 한다고 주장합니다. 영국의 귀족원처럼 자문 및 심의 기구로 기능하는 '약상원'을 만들어야만, 대중의 요구가 담긴 하원의 입법이 신속하고 효율적으로 처리될 수 있다는 것입니다.\n\n하지만 엘리트층과 보수파의 시각은 전혀 다릅니다. 이들은 대중의 열광에 휩쓸린 포퓰리즘 입법을 막기 위해서는 참의원이 중의원을 철저히 견제해야 한다고 굳게 믿습니다. 미국의 상원처럼 하원과 대등한 입법권 및 강력한 법률 거부권을 유지해야만, 국가의 명운을 가를 입법 과정에 필수적인 신중함을 기할 수 있다는 강경한 입장입니다."
 china_wr.221.a:0 "입법의 중심은 인민의 대표인 중의원이다. 참의원의 거부권을 축소하라."
 china_wr.221.b:0 "신중함 없는 입법은 국가적 재앙이다. 참의원의 강력한 거부권을 보장하라."
 china_wr.222.t:0 "참의원 선출 방식 규정"
 china_wr.222.d:0 "참의원의 권한 설정이 마무리 단계에 접어들자, 헌법기초위원회는 "그렇다면 그 참의원은 누가, 어떻게 뽑을 것인가?"라는 마지막 난제에 봉착했습니다.\n\n기존의 질서를 중시하는 학자들과 정치인들은 참의원이 중의원과는 다른 고유의 전문성과 경륜을 갖추어야 한다고 봅니다. 따라서 각 직능 단체의 대표자나 지방 의회가 선출하는 간선제를 개량하여 유지해야 한다고 주장합니다. 사회 각계의 엘리트들과 지역 유지들이 참의원에 포진해야 포퓰리즘에 휩쓸리지 않는 이성적인 판단이 가능하다는 것입니다.\n\n반대로, 민주주의의 절대성을 맹신하는 급진파와 자유주의자들은 이 제안을 기득권의 권력 유지 수단으로 치부합니다. 이들은 국가의 법을 다루는 자리는 예외 없이 인민의 손에서 직접 나와야 한다고 일갈합니다. 참의원 역시 국민의 직접 선거로 선출하여 명확한 민주적 정당성을 부여해야 한다는 입장이 베이징의 광장과 언론을 달구고 있습니다."
 china_wr.222.a:0 "경륜과 전문성이야말로 상원의 본질이다. 엘리트 간선제를 유지하라."
 china_wr.222.b:0 "모든 권력은 인민의 투표용지에서 나온다. 참의원 역시 인민이 직접 선출하라."
 china_wr.223.t:0 "기본권의 성격과 법체계 규정"
 china_wr.223.d:0 "베이징의 헌법기초위원회에서 다루는 논의가 국가의 뼈대에서 인민의 삶과 직결되는 문제로 넘어가면서, 기본권의 성격을 어떻게 규정할 것인지를 두고 치열한 법리 논쟁이 벌어지고 있습니다.\n\n여당과 보수적인 법학자들은 독일을 참조한 대륙법적 질서를 지지합니다. 이들은 국가의 헌법이 인민의 기본권을 보장해야 함에는 동의하지만, 국가의 질서 유지와 공공복리가 언제나 우선시되어야 한다고 굳게 믿습니다. 즉, 인민의 자유는 어디까지나 '법률이 정하는 범위 내에서' 허용되는 것이며, 위기 상황에서는 국가가 합법적으로 이를 제한할 수 있어야 한다는 논리입니다.\n\n그러나 후스를 위시한 자유주의자들과 진보 진영의 반발은 거셉니다. 이들은 국가가 원한다면 언제든 자유를 제한할 수 있는 법률 유보 조항은 국가주의의 씨앗이라고 맹비난합니다. 이들은 영미법적 전통에 따라 인민의 자유와 권리를 하늘이 부여한 천부인권이자 불가침의 성역으로 명시하여, 국가 권력의 간섭을 최소화하고 개인의 자유를 극대화해야 한다고 역설하고 있습니다."
 china_wr.223.a:0 "자유는 법률의 테두리 안에서 보장된다. 국가 질서와 공공복리가 우선이다."
 china_wr.223.b:0 "인민의 권리는 하늘이 부여한 성역이다. 국가의 간섭을 최소화하라."
 china_wr.224.t:0 "군 통수권의 소재와 문민통제 원칙"
 china_wr.224.d:0 "과거 제국과 철혈의 시대를 지나온 민국에게 있어, 총구를 누가 통제할 것인가의 문제는 곧 체제의 존망과 직결됩니다. 베이징의 정치인들은 무력이 다시는 민주주의를 위협하지 못하도록 확실한 헌법적 족쇄를 채우려 하고 있습니다.\n\n강력한 국가를 지향하는 보수 우파는 '대총통 직속 체제'를 요구합니다. 비스마르크 체제의 군부처럼, 국가원수인 대총통이 곧 대원수로서 군령권과 군정권을 모두 틀어쥐어 국방의 효율성을 극대화해야 한다는 것입니다. 반면, 의회주의자들은 군대를 행정부 산하의 일개 부처로 격하시켜 철저한 문민 우위를 헌법에 명시해야 한다고 맞섭니다. 군무총장이 군을 철저히 통제하여 어떠한 독단적 행동도 차단해야 한다는 입장입니다.\n\n이 첨예한 대립 속에서 실용주의적인 타협안도 제시되었습니다. 우페이푸 장군과 같이 민국에 충성하는 호헌파 직업 군인들의 전문성을 인정하여 군의 지휘를 맡기되, 민간인 출신의 '군무정무차관' 직위를 헌법에 신설하자는 것입니다. 이 강력한 권한을 가진 민간 차관이 군 인사와 예산을 쥐고 군부를 철저히 감시하도록 만드는 정교한 견제 장치입니다."
 china_wr.224.a:0 "대총통이 곧 대원수다. 군령과 군정을 통합하여 국방의 효율을 극대화하라"
 china_wr.224.b:0 "군은 행정부의 일개 부처에 불과하다. 내각 책임하의 철저한 문민 우위를 명시하라."
 china_wr.224.c:0 "호헌파 장교들의 전문성을 존중하되, 민간 군무차관을 두어 군부를 감시하라."
 china_wr.225.t:0 "중화민국 신헌법 반포"
 china_wr.225.d:0 "'혼란기가 저물고 마침내 헌정의 시대가 도래하였다. [CHI.GetLeader] 총통이 오늘 반포한 신국가헌법을 두고 그저 일개 법전이라 칭함은 지나친 겸손일 것이다. 지난 20년 민국 역사가 4억 민중의 피와 땀으로 세운 만세의 기반이었음은 자명하나 그간의 헌법은 현 시국의 중대함을 온전히 담아내지 못해 적지 않은 폐단을 낳아온 것이 사실이다.\n\n오늘 총통은 신헌법을 반포하며 '구 헌법이 미처 대비하지 못했던 현 시국의 난제들에 능동적으로 대처하고, 모호했던 조항들을 확고히 정립하였다'고 밝혔다. 국회 내 정파들 또한 일각의 우려가 있었음에도 불구하고 대국적 견지에서 합의를 도출하여 이번 헌법 반포를 뒷받침하였다고 전해진다.\n\n이번 신국가헌법의 핵심은 대총통의 권한을 통수권자로서의 상징성과 헌정 수호의 책무로 명확히 한정한 데 있다. 특히 이전 헌법에서 모호했던 내각책임제와 중의원 선거법의 기준을 명확히 세운 점은 고무적이다. 참의원의 입법거부권과 선출 방식, 군 통수권에 관한 일련의 변화 또한 주목할 만하다. 그러나 무엇보다 빛나는 것은 국민의 기본권 보장이다. 거주, 이전의 자유, 언론, 출판·결사의 자유는 법률에 의하지 않고는 제한할 수 없도록 못 박았으며 사법권의 독립을 통해 이를 엄격히 보호하였다. 이제 민국의 백성은 한낱 신민이 아닌 민국민으로 거듭난 것이다.\n\n총통 또한 관보를 통해 '서구 공화사가 증명하듯 헌법은 군주가 신민에게 하사하는 은전이 아니라 국민이 스스로의 권리를 지키기 위해 정부를 옭아맬 수 있는 것'임을 역설하였다. 남방 국민당이 획책했던 오욕의 역사를 씻어내고 진정한 법치의 뿌리가 내리기를 고대하며....'\n\n리윈징은 눈을 비비며 오늘 새벽 배달된 신보를 책상에 내려놓았다. 내전 전, 남방에서 소학교 교장까지 지냈던 학구열 때문일까. 아내의 핀잔에도 밤늦게까지 국정의 향방을 탐구하는 일을 도무지 멈출 수가 없었다. 국민당이 광동에 들어왔을 적 갈팡질팡하며 온 가족이 피란을 고심하던 기억이 마치 먼 옛적 일처럼 아득했다. 호법군이 남진하여 리윈징의 농토와 집을 되찾아 주었을 때 느꼈던 그 안도감은 실로 만감이 교차하는 것이었다.\n\n지금쯤 곤히 잠들었을 아들 리카싱의 방을 바라보며 리윈징은 상념에 잠겼다. 적어도 자신이 주인 없는 땅에서 떠도는 처지가 아니라 제 아들과 가족, 그리고 이 땅의 이웃들을 챙겨줄 수 있는 나라에서, 비록 당장 완벽하지는 않을지라도 잘못된 폐단을 스스로 고쳐나갈 기회가 있는 나라에서 살고 있음에 감사했다."
 china_wr.225.a:0 "이 세상에 살아가는 이들..."
 china_wr.226.t:0 "아편 문제의 부분적 완화"
 china_wr.226.d:0 "건강보험 제도의 정비와 의료 접근성 확대는 아편 중독 문제에 제한적이나마 변화를 만들어내고 있다. 치료를 포기하던 빈곤층과 장애인 계층이 의료 체계 안으로 유입되면서, 일부 지역에서는 중독 재발률이 눈에 띄게 감소하고 있다.\n\n그러나 의료 지원이 생활 전반의 불안정까지 해소하지는 못하고 있으며, 농촌과 도시 하층에서는 여전히 아편이 고통을 잊기 위한 수단으로 사용되고 있다. 문제는 완화되고 있으나, 구조적 해결과는 거리가 남아 있다."
 china_wr.226.a:0 "출발선에는 섰다."
 china_wr.2001.t:0 "지역 기반 시설 확충"
 china_wr.2001.d:0 "정부가 추진해 온 행정 개편과 권한 분산 조치에 따라, 각 지역에서는 자체적인 판단 아래 필요한 건설 사업을 진행할 수 있는 여건이 마련되고 있습니다. 중앙은 일률적인 지침을 강요하기보다, 지역의 여건과 우선순위에 맞는 시설 확충을 승인하는 방식을 택하고 있습니다.\n\n이에 따라 일부 지역에서는 산업과 행정을 뒷받침할 시설이, 다른 지역에서는 교통과 물류를 보완할 기반이, 또 다른 곳에서는 군사적·사회적 수요에 대응하는 건축이 진행되고 있습니다. 이러한 건설 사업은 단일한 목적을 강제하지 않으며, 각 지역이 처한 현실에 맞게 선택되고 있다는 점에서 의미를 지니고 있습니다.\n\n정부는 이러한 분산적 건설이 장기적으로는 행정 효율을 높이고, 지역 간 불균형을 완화하는 데 기여할 것으로 기대하고 있습니다."
 china_wr.2001.a:0 "필요한 곳에, 필요한 것을."
 china_wr.226.t:0 "아편 문제의 부분적 완화"
 china_wr.226.d:0 "건강보험 제도의 정비와 의료 접근성 확대가 누적되면서, 아편 중독 문제는 제한적이나마 완화 조짐을 보이고 있습니다. 치료 비용 부담이 줄어들자 일부 지역에서는 치료를 선택하는 사례가 증가하고 있으며, 중독으로 인한 방치 사례와 극단적 사건도 이전보다 감소하고 있습니다.\n\n다만 의료 접근성의 개선만으로 생활 전반의 불안정이 즉각 해소되지는 않고 있습니다. 농촌과 도시 하층에서는 아편이 고통을 회피하는 수단으로 남아 있으며, 불법 유통과 관행 또한 여러 지역에 잔존하고 있습니다."
 china_wr.226.a:0 "대책을 지속해야 한다."
 china_wr.227.t:0 "아편 중독의 뚜렷한 감소"
 china_wr.227.d:0 "국가 차원의 의료 보장과 공공 치료 체계가 확대되면서, 아편 중독 문제는 전국적으로 뚜렷한 감소세를 보이고 있습니다. 치료와 재활이 제도권 안에서 이루어지기 시작했고, 경제적 사정 때문에 치료를 포기하던 계층도 의료 체계로 유입되고 있습니다.\n\n주요 거점에서는 아편 유통망이 약화되는 징후가 관측되고 있으며, 중독과 결합되던 범죄와 사회적 불안도 함께 완화되고 있습니다. 그러나 오지와 국경 지역을 중심으로 잔존 문제가 남아 있어, 지속적인 감독과 보완이 요구되고 있습니다."
 china_wr.227.a:0 "성과를 굳혀야 한다."
 china_wr.228.t:0 "아편 문제의 광범위한 해소"
 china_wr.228.d:0 "의료 보장, 생활 안정, 교육 확대가 장기간 결합되면서 아편 중독은 더 이상 사회 전반을 압박하는 수준으로 관측되지 않고 있습니다. 다수 지역에서는 치료와 재활이 안정적으로 정착되었고, 중독은 예외적 사례로 관리되는 단계에 이르고 있습니다.\n\n불법 유통망은 크게 약화되었으며, 아편에 의존하던 관행도 급속히 쇠퇴하고 있습니다. 남아 있는 사례 역시 의료 및 행정 체계의 관리 아래 놓이게 되면서, 질병과 빈곤이 중독으로 이어지던 악순환이 상당 부분 차단되고 있습니다."
 china_wr.228.a:0 "재발을 막기 위한 체계를 유지해야 한다."
 china_wr.229.t:0 "남부 치안의 공백"
 china_wr.229.d:0 "호법정부는 국민당과의 전면 충돌에서 승리를 거두었으나, 남부 일대의 질서는 아직 안정되지 못하고 있습니다. 전선이 무너진 이후에도 국민당 잔당과 무장 세력은 산악과 농촌, 항만 주변으로 흩어져 조직을 재편하고 있으며, 일부 지역에서는 철도와 도로를 노린 습격, 세무기관과 파출소에 대한 기습이 끊이지 않고 있습니다.\n\n행정의 공백은 치안 붕괴를 더욱 심화시키고 있습니다. 성정부의 지휘 체계가 흔들리거나 관료들이 도피한 구역에서는 징세와 치안이 사실상 마비되었고, 지역 유지와 사병, 범죄 조직이 그 틈을 메우며 민간을 위협하고 있습니다. 주민들은 낮에는 행정에 협조하더라도 밤에는 무장 세력의 보복을 두려워하며 침묵하고 있으며, 이로 인해 정보망은 쉽게 복구되지 못하고 있습니다.\n\n정부가 이 상태를 방치한다면 남부는 단순한 불안정 지역을 넘어, 국가 전체의 통치 역량을 소모시키는 상시적 출혈 지대로 굳어질 위험이 있습니다. 남부 치안의 회복은 군사적 소탕만으로 달성될 수 없으며, 행정 재건과 치안 조직의 재편, 주민 보호와 회유 정책이 동시에 추진되어야 합니다."
 china_wr.229.a:0 "위기의 민국."
 china_wr.230.t:0 "오족공화의 현실화"
 china_wr.230.d:0 "민국의 정치 담론에서 오족공화는 오래전부터 이상적인 국가 질서로 제시되어 왔으나, 실제 행정과 제도 속에서는 그 의미가 충분히 구현되지 못한 채 상징적 표현으로 남아 있었습니다. 소수민족 지역은 여전히 치안과 행정의 불안정에 노출되어 있으며, 중앙의 통치 역시 일관된 기준을 적용하는 데 어려움을 겪어 왔습니다.\n\n정부는 이러한 괴리가 오족공화의 신뢰를 약화시키고 있다고 판단하고 있습니다. 오족공화를 실질적인 원칙으로 정착시키기 위해서는 선언이 아니라 제도적 기반이 필요하며, 행정·사법·치안 전반에서 소수민족을 포괄하는 질서를 구축해야 한다는 인식이 확산되고 있습니다.\n\n이에 따라 정부는 소수민족 지역의 자치와 권리를 법과 제도 안에 명확히 위치시키고, 중앙의 권한과 책임 또한 분명히 규정하는 방향으로 개편을 추진하고 있습니다. 이는 분리나 방임을 의미하지 않으며, 민국의 통일된 질서 속에서 다양성이 제도적으로 작동하도록 만드는 과정으로 이해되고 있습니다."
 china_wr.230.a:0 "말이 아니라 제도로 옮기자."
 china_wr.231.t:0 "봉쇄조항의 조정"
 china_wr.231.d:0 "선거제 개편 논의의 연장선에서, 소수민족 계열 정당에 적용되는 봉쇄조항을 어느 수준까지 완화할 것인지가 최종적으로 검토되었습니다. 기존 8% 기준은 군소정당의 난립을 억제하는 데에는 효과적이었으나, 인구와 지역 기반이 제한된 정당에게는 제도적 진입 자체를 봉쇄하는 장치로 기능해 왔습니다.\n\n이에 따라 정부와 의회는 소수민족 정당에 한해 봉쇄조항을 5%로 조정하기로 결정했습니다. 이는 의회의 과도한 분열을 초래하지 않는 선에서, 정치적 대표성과 오족공화의 원칙을 제도적으로 반영하기 위한 절충안입니다.\n\n이번 조정으로 기존의 다수당 중심 구조는 유지되면서도, 소수민족의 정치적 목소리가 합법적이고 안정적인 경로를 통해 의회에 반영될 수 있는 여지가 마련되었습니다."
 china_wr.231.a:0 "필요한 조정이다."
 china_wr.232.t:0 "비례대표제의 도입"
 china_wr.232.d:0 "중의원 선거 제도에 비례대표제가 공식적으로 도입되었습니다. 기존의 선거 방식은 다수파에게 안정적인 의석 확보를 가능하게 했으나, 그 과정에서 상당한 민의가 의회 구성에 반영되지 못하는 한계를 드러내 왔습니다.\n\n비례대표제의 도입으로 각 정당과 사회 집단이 획득한 지지율은 보다 직접적으로 의석 배분에 반영되며, 정치적 소수와 지역·계층의 목소리 또한 제도권 안에서 가시화되고 있습니다. 이는 중의원이 단일한 정치 노선이 아닌, 사회 전체의 복합적인 의사를 담아내는 공간으로 재편되었음을 의미합니다.\n\n의회 운영은 이전보다 복잡해질 수 있으나, 입법 과정에서 합의와 조정이 필수 요소로 자리 잡게 되었으며, 정치 질서는 다수의 강행보다 공론과 협의를 중심으로 재구성되고 있습니다."
 china_wr.232.a:0 "민의가 의석으로 이어진다."
 china_wr.233.t:0 "탕지야오 암살"
 china_wr.233.d:0 "호국군이 공식 발족된 직후, 윈난성장 탕지야오는 귀주성의 호국군 합류를 축하하기 위해 현지를 방문했습니다. 서남 각지에서 모여든 환영 인파 속에서 행사가 진행되던 가운데, 군중 사이에 숨어 있던 무장 인물이 남부권총을 발포하며 혼란이 발생했습니다. 탕지야오는 즉각 중상을 입었고, 긴급 후송에도 불구하고 현장에서 사망이 확인되었습니다.\n\n범인은 현장에서 사살되었으나, 국민당과의 연계 정황이 빠르게 확산되었습니다. 사건 직후 호국군 내부에서는 이번 암살이 단순한 개인 범행이 아니라, 서남 질서를 교란하기 위한 정치적 공격이라는 인식이 굳어졌습니다. 탕지야오의 죽음은 곧 호국군의 지휘 공백과 권력 재편 문제로 직결되었습니다.\n\n운남성 지방군의 실력자이자 탕지야오의 최측근 장성이었던 루한은 암살 사건의 진상을 규명한다는 명분 아래 조사위원회 구성을 주도했습니다. 조사 과정에서 국민당과 연계된 인물, 지휘 계통에 불복한 군벌 세력, 정치적 중립을 가장한 반대파가 차례로 숙청 대상에 올랐습니다. 조사는 곧 군 내부 질서 재편과 권력 정리로 이어졌습니다.\n\n서남 각 성의 군정 대표들은 혼란을 수습하고 통합 지휘를 유지하기 위해 루한에게 전권을 위임했습니다. 이에 따라 루한은 호국군 서남총사령관에 취임하며, 윈난성 지방군 장성의 지위를 넘어 서남 전역의 군사·정치 질서를 총괄하는 위치에 오르게 되었습니다."
 china_wr.233.a:0 "질서는 피로 세워진다."
 china_wr.234.t:0 "[GetYear]년 중의원 선거"
 china_wr.234.d:0 "[GetYear]년 중의원 선거가 전국적으로 실시되고 있습니다. 이번 선거는 민국의 입법 권력을 구성하는 중의원을 새로 구성하는 절차로서, 각 정당과 정치 세력의 향후 노선을 가늠하는 중대한 계기로 인식되고 있습니다.\n\n개헌 논의와 각종 제도 개혁을 거치며 정치 질서는 일정 부분 정비되었으나, 지역별 이해관계와 정당 간 노선 차이는 여전히 선명하게 드러나고 있습니다. 유권자들은 안정적인 국정 운영과 개혁의 지속, 혹은 새로운 정치적 대안을 둘러싸고 각기 다른 선택을 고민하고 있습니다.\n\n이번 선거의 결과는 단순한 의석 분포를 넘어, 향후 입법 일정과 행정부의 개혁 추진력, 그리고 민국 정치의 방향성을 좌우하는 기준점으로 작용하게 될 것입니다."
 china_wr.234.a:0 "개표를 시작한다."
 china_wr.235.t:0 "[GetYear]년 참의원 선거"
 china_wr.235.d:0 "[GetYear]년 참의원 선거가 전국적으로 실시되고 있습니다. 참의원은 입법 과정에서 신중함과 균형을 담당하는 기관으로서, 하원의 입법을 검토하고 제도의 안정성을 보완하는 역할을 수행해 왔습니다.\n\n이번 선거는 최근의 제도 개편과 정치 환경 변화 이후 처음 치러지는 참의원 선거로서, 참의원의 위상과 기능을 둘러싼 평가가 선거 결과에 반영될 것으로 보입니다. 각 정치 세력은 신중한 입법과 제도적 연속성을 강조하며 유권자의 지지를 호소하고 있습니다.\n\n선거 결과는 향후 입법 과정에서의 견제와 조율 방식, 그리고 국회 전반의 권력 균형에 중대한 영향을 미치게 될 것입니다."
 china_wr.235.a:0 "개표를 시작한다."
 china_wr.238.t:0 "군부의 반란"
 china_wr.238.d:0 "중화민국 군부 내부에서 누적되어 온 불만이 마침내 폭발했습니다. 오패부를 중심으로 한 호헌파 장성들은 정부가 군의 전통과 권위를 약화시키고 있으며, 국가 안보를 정치적 계산에 종속시키고 있다고 비판해 왔습니다.\n\n새벽을 기해 수도의 주요 통신 시설과 병영이 무장 병력에 의해 통제되었고, 정부 청사 일대에는 군 병력이 전개되었습니다. 군부는 '헌정 질서의 수호'를 명분으로 내세우며 행정부의 기능을 정지시키고 군이 국가 운영을 직접 담당하겠다고 발표했습니다.\n\n정치권과 지방 행정은 급격히 동요하고 있으며, 일부 지역에서는 충돌과 저항 움직임도 감지되고 있습니다. 민국은 또다시 불확실성과 긴장 속으로 빠져들고 있습니다."
 china_wr.238.a:0 "혼란에 혼란이 더해진다."
 china_wr.239.t:0 "직예성 경비총사령부 포고계자 제1호"
 china_wr.239.d:0 "북경에서의 정변 이후 군부는 정권의 완전한 장악을 위해 직예성 일대에 계엄령을 선포했으며, 강경한 포고문을 발표하였습니다. 포고문의 내용은 다음과 같습니다.\n\n"직예성 경비총사령부 포고계자 제1호\n\n본 사령부는 직예성 전역에 계엄을 선포함에 있어 다음과 같이 공고한다.\n\n현재 대륙의 상황이 혼란스럽고 간첩의 침투가 우려되는바, 직예 성내의 치안을 확보하고 인밍의 안전을 보장하기 위해 본 사령부는 법에 의거하여 [GetDate] 0시를 기해 직예성 전역에 계엄을 실시함을 선포한다. 이에 각계는 다음 사항을 준수해야 한다.\n\n제1조 (행정 및 사법)\n본 성 내의 모든 행정 및 사법 사무는 계엄 기간 중 본 사령부의 지휘와 감독을 받는다. 다만, 일반 행정 기관 및 사법 기관의 통상적인 업무는 규정에 따라 계속 집행하되 본 사령부의 조치에 저촉되어서는 아니 된다.\n\n제2조 (집회, 결사 및 단체 활동)\n  1. 본 사령부의 허가 없이 3인 이상의 실외 집회나 시위를 할 수 없으며, 모든 파업(동맹파업), 동맹휴학, 시장 철수 등을 엄격히 금지한다.\n  2. 종교적 활동이나 관습적인 제례 절차 등은 치안에 방해가 되지 않는 범위 내에서 허용하되, 사전 보고가 필요할 수 있다.\n\n제3조 (언론 및 출판)\n신문, 잡지, 도서 및 기타 인쇄물의 발행과 배포, 모든 우편물과 전보, 라디오 방송은 본 사령부의 사전 검열을 받아야 한다. 유언비어를 유포하거나 인심을 현혹하여 군의 사기를 저하시키는 행위는 엄중히 처벌한다.\n\n제4조 (통행 및 등화)\n  1. 매일 밤 12시부터 다음 날 새벽 5시까지 통행금지를 실시한다. (단, 공무 수행자나 사전에 통행증을 발급받은 자는 제외한다.)\n  2. 항만, 공항, 철도역 및 중요 군사 기지 부근의 통행을 제한하며, 본 사령부의 지시에 따라 등화관제를 실시할 수 있다.\n\n제5조 (무기 및 물자 통제)\n  1. 허가 없이 총기, 탄약, 폭발물 및 기타 위험물을 소지하는 것을 금지한다.\n  2. 식량, 연료 및 생활 필수품의 매점매석이나 가격 조작을 엄격히 금지한다. 위반 시 군법에 의거하여 처벌한다.\n\n제6조 (군법 적용)\n범죄를 저지른 자 중 국가의 안녕을 해치거나 사회 질서를 파괴하는 자(살인, 강도, 방화, 간첩 활동 등)는 현행범으로 간주하여 본 사령부의 군법회의에서 재판하며, 법에 따라 엄중히 처벌(즉결 처분 포함)한다.\n\n제7조 (외국인 보호)\n본 성에 거주하는 외국인의 생명과 재산은 법에 따라 보호한다. 다만, 계엄 규정을 위반하는 자는 예외 없이 처벌한다.\n\n위의 모든 규정은 공포한 시점부터 즉시 효력을 발생한다. 모든 군인과 민간인은 본 포고를 엄격히 준수하여 사회 질서를 유지하는 데 협조하기 바란다.\n\n중화민국 육군 총사령관 겸 직예성 경비총사령부 총사령 우페이푸 [GetDate] 공포""
 china_wr.239.a:0 "불순분자는 모두 진압하라!"
 china_wr.240.t:0 "북경 통금령 시행"
 china_wr.240.d:0 "직예성 계엄 선포 이후 수도의 불안은 완전히 해소되지 않았습니다. 야간에 유언비어가 확산되고 일부 지역에서 소규모 충돌이 발생하면서 군은 질서 회복을 위한 추가 조치를 검토하였습니다. 직예성 경비총사령부는 북경 시내 전역에 야간 통금령을 시행하기로 결정하였습니다. 매일 자정부터 새벽까지 모든 일반인의 통행은 금지되며, 주요 교차로와 관공서는 무장 병력이 배치됩니다. 허가 없이 이동하는 자는 즉시 연행 대상이 됩니다. 수도는 전시 통제 하에 들어가고 있습니다."
 china_wr.240.a:0 "엄격히 집행하라"
 china_wr.241.t:0 "국회 해산 포고령"
 china_wr.241.d:0 "직예성 계엄 체제 하에서 군부는 국회의 존속 여부를 최종적으로 심의하였습니다. 일부 의원은 정변의 정당성을 부정하고 있으며, 다수는 전시 대응보다 정파적 이해관계를 우선하고 있습니다. 이러한 상황은 군의 작전 수행과 동원 체계에 혼선을 초래하고 있습니다. 직예성 경비총사령부는 국회의 즉각적인 해산과 입법 기능의 전면 정지를 공포하였습니다. 모든 입법 권한은 비상 통치 기구로 이관되며, 의원의 면책 특권과 회기 관련 권한도 효력을 상실합니다. 기존의 의회 질서는 정지되고 군 중심의 통치 구조가 확립되고 있습니다."
 china_wr.241.a:0 "해산을 단행하라"
 china_wr.242.t:0 "반군부 인사의 숙청"
 china_wr.242.d:0 "내란 동조세력에 대한 즉결심판이 시행되면서 군부는 정치권 전반에 대한 정리 작업에 착수하였습니다. 후스와 차이어는 공개 재판 대신 가택연금 조치가 내려졌으며, 외부 정치 활동과 언론 접촉이 전면 차단되었습니다. 기타 반군부 성향의 유력 인사들 또한 군사 당국의 조사를 거쳐 투옥되거나 사실상 정치 활동을 중단하도록 압력을 받았습니다. 일부는 자진 사퇴 형식을 취하였으나, 실질적으로는 정계에서 배제되고 있습니다. 국회와 정당 조직은 급속히 위축되며, 군 중심의 권력 구조가 고착되고 있습니다. 전시 통제 체제는 한층 강화되고 있습니다."
 china_wr.242.a:0 "질서를 확립하라"
 china_wr.243.t:0 "혁명재판소 설치"
 china_wr.243.d:0 "군 중심의 통치 체제가 공고화되면서 사법 체계 또한 재편의 대상이 되고 있습니다. 일반 법원은 통상 범죄를 담당하고 있으나, 내란 동조와 반군부 선동, 간첩 활동과 같은 중대 사안에 대해서는 기존 절차가 지나치게 완만하다는 비판이 제기되고 있습니다. 군 지휘부는 전시 질서 확립을 명분으로 특별 재판 기구의 설치를 결의하였습니다. 혁명재판소는 항소 절차를 배제한 단심 구조로 운영되며, 심리는 간소화되고 판결은 즉시 집행됩니다. 정치적 책임과 형사적 책임이 결합되는 구조 속에서 반체제 인사에 대한 처벌은 제도적으로 일원화되고 있습니다. 사법 권한은 군의 감독 하에 집중되고 있습니다."
 china_wr.243.a:0 "재판소를 개설하라"
 china_wr.244.t:0 "내란 특별법 공포"
 china_wr.244.d:0 "혁명재판소 설치 이후에도 일부 지역에서는 은밀한 조직 활동과 자금 지원, 정보 유출이 지속되고 있습니다. 군 지휘부는 이러한 움직임이 전선의 안정을 잠식하고 후방 질서를 위협하고 있다고 보고 있습니다. 기존 형법 체계로는 전시 상황에 신속히 대응하기 어렵다는 판단 아래, 내란 관련 범죄를 별도로 규정하는 특별법이 제정되었습니다. 국가 전복 기도, 무장 봉기 지원, 반군부 선동 행위는 중대 범죄로 분류되며, 수사와 재판 절차는 단축됩니다. 일정 범주의 사건은 자동으로 군사 관할로 이관되며, 판결은 신속히 집행됩니다. 전시 통제 질서는 법률적 장치를 통해 더욱 강화되고 있습니다."
 china_wr.244.a:0 "법을 공포하라"
 china_wr.245.t:0 "불순정당 해산 조치"
 china_wr.245.d:0 "계엄과 특별법 시행 이후에도 일부 정당은 공개적 혹은 은밀한 방식으로 군부 통치에 반대하는 활동을 지속하고 있습니다. 군 지휘부는 이러한 정당 조직이 정치적 결집을 통해 전시 통제 체제를 약화시킬 수 있다고 보고 있습니다. 이에 불순정당으로 지정된 단체에 대해 해산 명령이 내려졌습니다. 중앙당과 지방 지부는 폐쇄되며, 당 재산은 동결 또는 몰수됩니다. 지도부 인사는 정치 활동을 금지당하거나 수사 대상에 포함됩니다. 정당 질서는 군의 승인 하에 제한적으로만 유지되고 있습니다."
 china_wr.245.a:0 "모두 해산하라"
 china_wr.246.t:0 "내전 책임자에 대한 최고재판"
 china_wr.246.d:0 "군 지휘부는 내전의 원인과 확산에 대한 정치적 책임을 규명한다는 명목으로 최고재판의 개시를 선언하였습니다. 조사 범위는 전시 정책 결정자와 군사 작전 비협조 인사, 반군부 언동을 보인 정치 인물까지 확대되고 있습니다. 피의자로 지목된 인물은 즉시 구금되며, 사건은 혁명재판소에 이관됩니다. 재판은 단심 구조로 진행되고 항소는 허용되지 않습니다. 내전의 책임을 묻는다는 공적 목적이 강조되고 있으나, 정계 전반의 재편과 반대 세력의 제거가 동시에 이루어지고 있습니다."
 china_wr.246.a:0 "책임을 엄중히 묻는다"
 china_wr.247.t:0 "준군사조직 해산 명령"
 china_wr.247.d:0 "계엄 체제와 특별법 시행 이후에도 각지에서는 정당 산하 청년단과 사설 경비 조직, 지역 기반 무장 단체가 존속하고 있습니다. 군 지휘부는 이러한 준군사 조직이 독자적 지휘 체계를 유지하는 한 전시 통합이 완성될 수 없다고 판단하였습니다. 직예성 경비총사령부는 모든 비정규 무장 단체에 대해 즉각적인 해산을 명령하였습니다. 등록되지 않은 무기와 장비는 군에 반납하도록 통보되었으며, 불응 조직은 수사와 체포 대상에 포함됩니다. 지역 사회의 무장 권한은 전면 회수되고, 무력 사용은 중앙 군 통제 하에 일원화되고 있습니다."
 china_wr.247.a:0 "모두 해산시켜라"
 china_wr.248.t:0 "정권 장악"
 china_wr.248.d:0 "일련의 계엄 조치와 정치권 숙정이 마무리되면서 권력의 향방은 명확해지고 있습니다. 국회는 해산되었고, 주요 정당은 활동을 중지하였으며, 반군부 인사는 구금되거나 정치 무대에서 배제되었습니다. 군 지휘 체계는 행정과 사법 영역까지 확장되었고, 비상 통치 기구는 실질적인 국가 운영 권한을 행사하고 있습니다. 오패부는 중화민국 육군 총사령관이자 직예성 경비총사령부 총사령의 지위에서 전시 국가 운영 전반을 지휘하게 되었습니다. 공화 체제의 형식은 유지되고 있으나, 결정 권한은 군 최고지휘부에 집중되고 있습니다. 정권의 중심은 군으로 이동하였습니다."
 china_wr.248.a:0 "국가를 재편한다"
 china_wr.249.t:0 "국회 개회"
 china_wr.249.d:0 "일련의 정리 조치와 권력 재편 과정이 일정 단계에 도달하면서, 비상 통치 하에 정지되었던 입법 기능의 복원이 검토되었습니다. 주요 군사 충돌이 정리되고 행정 체계가 재가동되자 국정 운영의 제도적 기반을 재확인할 필요성이 제기되고 있습니다. 이에 참의원과 중의원이 제한된 권한과 엄격한 의사 절차 하에서 다시 소집되었습니다. 회의는 군과 행정부의 감독 아래 진행되며, 전시 법령의 재검토와 예산 및 동원 관련 보고가 주요 안건으로 상정됩니다. 입법 기능은 통제된 범위 내에서 점진적으로 회복되고 있습니다."
 china_wr.249.a:0 "의회를 소집하라"
 china_wr.2370.t:0 "만주 수복에 따른 참의원 및 중의원 보궐선거"
 china_wr.2370.d:0 "만주의 주요 거점이 수복되면서 해당 지역은 다시 중앙의 행정 체계에 편입되고 있습니다. 이에 따라 공석으로 남아 있던 참의원 및 중의원 의석을 충원하기 위한 보궐선거 절차가 개시되었습니다. 전시 상황에서 실시되는 선거인 만큼 치안 유지와 유권자 등록 절차는 군과 행정 당국의 공동 감독 아래 진행되고 있습니다. 만주 각지의 대표는 수복 이후의 질서 재건과 지역 이해를 국정에 반영할 수 있는 인물로 선출될 예정입니다. 국회 구성은 점차 정상화 단계로 진입하고 있으며, 영토 회복의 정치적 효과가 제도적으로 반영되고 있습니다."
 china_wr.2370.a:0 "선거를 실시하라"
 china_wr.250.t:0 "전견회의의 개막"
 china_wr.250.d:0 "권력의 향방은 정리되었으나, 국가 운영의 방향은 아직 확정되지 않았습니다. 군사적 조치와 정치적 숙청만으로는 장기적 질서를 담보할 수 없으며, 제도적 설계와 행정 재구축이 병행되어야 하는 시점에 이르렀습니다.\n\n이에 따라 정부는 재정·산업·교육·사법·행정 각 분야의 전문가들을 수도로 소집하여 국가 재건의 청사진을 마련하고자 합니다. 이들은 각자의 전문 영역에서 현실적인 개혁 방안을 제출하고, 새로운 체제의 작동 원리를 구체화하는 임무를 맡게 됩니다.\n\n전견회의는 단순한 자문 기구가 아니라, 향후 국가 구조를 규정할 정책적 방향을 집약하는 회의로 기능하게 될 것입니다."
 china_wr.250.a:0 "국가의 틀을 다시 세운다."
 china_wr.251.t:0 "국가경장위원회의 출범"
 china_wr.251.d:0 "격변의 정국을 수습하고 권력 구조를 재정비한 이후, 정부는 이제 국가 운영의 방향을 장기적으로 설계할 단계에 접어들고 있습니다. 무력과 결단으로 질서를 정리하는 것과, 그 질서를 제도와 정책으로 굳히는 일은 전혀 다른 문제입니다.\n\n이에 따라 각 분야의 학자, 경제 전문가, 행정 관료, 법률가, 군사 전략가들을 소집하여 '국가경장위원회'를 출범시키고 있습니다. 이 회의는 단순한 자문 기구에 그치지 않으며, 행정 체계의 정비, 재정 구조의 재편, 산업 정책의 방향 설정, 군정과 민정의 관계 조정 등 국가 전반을 재설계하는 역할을 맡고 있습니다.\n\n그동안 축적되어 온 비효율과 관행, 인맥과 파벌 중심의 운영 방식은 단계적으로 정리되고 있으며, 정책은 전문성과 책임성에 기반하여 수립되고 있습니다. 국가는 더 이상 임시적 대응에 의존하지 않고, 체계적인 설계와 계획에 따라 움직이기 시작하고 있습니다."
 china_wr.251.a:0 "모든 것은 민국을 위하여."
 china_wr.252.t:0 "사회정화운동의 개시"
 china_wr.252.d:0 "정부는 사회정화운동의 전면적 시행을 공식화하고 있습니다. 장기간 누적되어 온 부패, 비공식 권력망, 폭력 조직, 그리고 공직 사회의 기강 해이는 국가의 통치 역량을 잠식해 왔습니다. 행정은 법률이 아니라 관행에 기대어 운영되는 경우가 늘어났고, 일부 지역에서는 공권력이 사적 이해관계에 종속되는 현상까지 나타나고 있습니다.\n\n이에 따라 정부는 행정 감찰 기구를 확대 개편하고, 공직자 재산·행정 집행·치안 체계 전반에 대한 일제 점검을 실시하고 있습니다. 동시에 범죄 조직과 불법 사조직을 집중 단속하며, 공직 기강 확립을 위한 내부 정비 절차를 병행하고 있습니다.\n\n사회정화운동은 단기간의 소탕 작전이 아니라, 제도와 관행을 동시에 재편하는 구조적 조치로 진행되고 있습니다. 그 과정에서 일정한 반발과 마찰이 발생할 수 있으나, 정부는 법치와 공공 질서의 회복을 최우선 과제로 삼고 있습니다."
 china_wr.252.a:0 "옳바른 일을 하라."
 china_wr.253.t:0 "불온서적 지정 조치"
 china_wr.253.d:0 "정부는 최근 사회 질서를 교란하고 체제에 대한 불신을 조장하는 일부 출판물을 공식적으로 불온서적으로 지정하고 유통을 제한하고 있습니다. 해당 서적들은 청년층과 학생 사회를 중심으로 빠르게 확산되며 급진적 사상과 체제 부정 논리를 전파해 왔다는 평가를 받고 있습니다.\n\n출판사와 서점에 대한 단속이 시작되었으며, 이미 인쇄·배포된 물량은 회수 조치가 진행되고 있습니다. 일부 지식인과 언론은 표현의 자유 침해를 우려하고 있으나, 정부는 공공 질서와 국가 안정이 우선되어야 한다는 입장을 밝히고 있습니다.\n\n이번 조치가 사상적 갈등을 잠재우는 계기가 될지, 혹은 지하 출판과 은밀한 유통을 부추기는 계기가 될지는 아직 알 수 없습니다."
 china_wr.253.a:0 "질서를 바로 세운다."
 china_wr.254.t:0 "불온서적 지정"
 china_wr.254.d:0 "우페이푸 정부는 사회 질서를 바로 세우고 공공 담론의 기준을 확립하기 위하여 일부 서적을 불온서적으로 지정하였습니다. 정부는 법과 제도에 기반한 통치 질서를 유지하기 위해, 국가와 군의 권위를 훼손할 우려가 있는 출판물에 대해 일정한 관리가 필요하다고 판단하였습니다.\n\n이에 따라 출판 및 유통 과정에 대한 행정적 점검이 실시되고 있으며, 관련 규정에 따라 지정된 서적은 유통이 제한됩니다. 이는 공공 질서를 정비하고 사회 전반의 안정을 도모하기 위한 조치로 설명되고 있습니다.\n\n정부는 표현의 자유가 법의 테두리 안에서 보호되어야 한다는 원칙을 재확인하며, 제도적 질서를 중심으로 한 건전한 담론 환경을 구축하고자 합니다."
 china_wr.254.a:0 "질서를 바로 세운다."
 china_wr.255.t:0 "[CHI.GetLeader]의 재선"
 china_wr.255.d:0 "지난 대총통 선거에서 승리했던 [CHI.GetLeader]가 이번 선거에서도 다시 한 번 당선되었습니다. 선거 과정에서 여러 논쟁과 공방이 이어졌으나, 최종 개표 결과는 현 지도자에 대한 유권자의 신임이 여전히 유지되고 있음을 보여주고 있습니다.\n\n지지 세력은 연속성 있는 국정 운영과 정책의 일관성을 강조하며, 재선은 안정과 질서의 선택이었다고 평가하고 있습니다. 반면 일부 야당과 비판 세력은 권력 집중과 정치적 긴장 고조를 우려하며 향후 의회와의 관계 설정에 주목하고 있습니다.\n\n두 번째 임기를 맞이한 [CHI.GetLeader]는 향후 국정 방향과 개혁 과제를 어떻게 조율할 것인지 중대한 시험대에 서게 되었습니다."
 china_wr.255.a:0 "연속성의 선택."
 china_wr.256.t:0 "대총통 선거의 연기"
 china_wr.256.d:0 "작금의 전쟁 상황으로 인해 예정되어 있던 대총통 선거가 불가피하게 연기되었습니다. 정부는 전시 동원과 군사 작전에 국력을 집중해야 하는 현 시점에서 전국적 선거를 정상적으로 치르는 것이 현실적으로 어렵다고 판단하였습니다.\n\n행정력과 치안 역량이 전선과 후방 지원에 투입된 상황에서 선거를 강행할 경우 혼란이 가중될 수 있다는 우려도 제기되었습니다. 이에 따라 기존 헌정 질서를 유지하되, 전쟁이 안정 국면에 접어들 때까지 선거 일정을 조정하기로 결정되었습니다.\n\n정부는 이번 연기가 일시적 조치임을 강조하며, 국가의 존립과 질서 회복이 우선 과제라는 입장을 분명히 하고 있습니다."
 china_wr.256.a:0 "전시에는 전시의 질서가 있다."
 china_wr.257.t:0 "대총통 선거의 재개와 결과"
 china_wr.257.d:0 "전쟁으로 연기되었던 대총통 선거가 재개되어 최종 개표가 완료되었습니다. 전국적 준비와 절차가 정비된 가운데 치러진 이번 선거에서 [CHI.GetLeader]가 다시 한 번 당선되었습니다.\n\n전시 체제 이후의 과도기를 지나 헌정 절차가 복원된 상황에서, 유권자들은 안정과 연속성을 선택하였다는 평가가 나오고 있습니다. 지지 세력은 정책의 지속성과 국가 운영의 일관성이 확인되었다고 보고 있으며, 선거 결과는 정치 질서가 다시 제도 위에 안착했음을 보여주고 있습니다.\n\n재선에 성공한 [CHI.GetLeader]은 전후 정비와 개혁 과제를 이어가게 되었으며, 민국은 다시 한 번 동일한 지도 아래 다음 국면으로 나아가게 되었습니다."
 china_wr.257.a:0 "예상한 결과다."
 china_wr.258.t:0 "난세의 법도"
 china_wr.258.d:0 "계엄사령관의 이름으로 이루어진 수많은 행정조치와 우페이푸에 의해 개회된 국회가 통과시킨 수많은 법들을 두고 혹자는 억압적이고 폭력적이며, 매우 독재적인 행보라고 평가합니다. 그러나 혼란스러운 난세의 시기에는 그에 걸맞는 '난세의 법도'가 있는 법입니다. 중국이 내전이라는 대혼란과 일본이라는 적수를 두고있는한 이 조치는 지속적으로 이행되어야 합니다.\n\n우페이푸 계엄사령관의 목표는 언제나와 같이 하나입니다. '부위구국' 위기로 부터 국가를 구원하라. 작금의 중국은 문민정부의 실패로 너무나도 혼란스러워졌습니다. 토지문제와 경제문제, 민심과 국가의 존립은 모두 위태로운 상태입니다. 너무나도 혼란스러운 이 상황을 종식시키기 위해서는 더욱 극단적인 방법을 쓰는 수 밖에 없습니다..."
 china_wr.258.a:0 "때로는 올바르지 않아 보이는 것이 가장 올바른 방법일 수 있다."
 china_wr.259.t:0 "대총통에 취임한 우페이푸"
 china_wr.259.d:0 "그동안 계엄사령관의 자격으로 국정을 이끌어 온 우페이푸가 이제 정식으로 대총통의 자리에 올랐습니다. 비상 권한 아래 행사되던 통치 권력이 헌정 절차를 통해 최고 행정 권력으로 전환되면서, 임시적 권위는 제도적 권위로 재편되었습니다.\n\n지지 세력은 이를 위기 속에서 국가를 지켜 온 지도력의 연속으로 평가하며, 강력한 지휘 체계가 이제 헌정 질서 안으로 편입되었다고 보고 있습니다. 계엄 체제에서 시작된 통치는 대총통 취임과 함께 명실상부한 국가 지도력으로 자리잡게 되었습니다.\n\n우페이푸는 이제 비상 사령관이 아닌 국가의 공식 수반으로서, 통치의 책임과 권한을 동시에 짊어지게 되었습니다."
 china_wr.259.a:0 "중국이 그의 손 아래..."
 china_wr.260.t:0 "연정에 신공화당 합류"
 china_wr.260.d:0 "정국의 불안과 군의 영향력 확대 속에서, 신공화당이 공식적으로 연정에 합류하였습니다.\n\n신공화당은 강한 행정력과 질서 회복을 내세우며 군과 긴밀한 관계를 유지해 온 정당으로, 이번 합류는 연정의 성격을 보다 안정 지향적으로 전환시키는 계기가 되고 있습니다. 정부는 의회 내 의석 기반을 강화하는 한편, 군과 정치권 사이의 정책 조율을 제도권 안에서 정식화하게 되었습니다.\n\n그러나 이는 단순한 의석 확대 이상의 의미를 지닙니다. 군과 가까운 세력이 내각에 참여함으로써, 국가 운영의 방향은 보다 강경하고 일관된 통치 기조로 수렴될 가능성이 높아지고 있습니다."
 china_wr.260.a:0 "연정은 더욱 공고해진다."
 china_wr.261.t:0 "완전 배급제 실시"
 china_wr.261.d:0 "전쟁이 장기화되면서 기존의 부분적 통제로는 물자 흐름을 안정적으로 유지하기 어려워졌습니다.\n\n정부는 식량과 연료, 의복과 공업 자재에 이르기까지 필수 물자의 생산과 분배 전 과정을 국가가 직접 관리하는 완전 배급제를 도입하였습니다. 시장의 자율적 배분 대신 계획된 공급 체계가 자리 잡으며, 민간 소비는 일정 기준 아래 제한되고 군수 수요가 최우선 순위를 차지하게 됩니다.\n\n이 조치는 생활 수준의 변화를 수반하지만, 국가의 지속적인 전쟁 수행과 사회 질서 유지를 위해 필수적인 체계로 자리 잡고 있습니다."
 china_wr.261.a:0 "이는 필요한 조치이다."
 china_wr.262.t:0 "전시물자 징발"
 china_wr.262.d:0 "전쟁 수행에 필요한 자원을 확보하기 위해 정부는 민간과 산업이 보유한 물자를 공식적으로 징발하기 시작했습니다.\n\n생산 설비와 저장 물자, 운송 수단까지 국가 관리 아래 편입되며 군수 체계는 더욱 확대됩니다. 이는 단순한 자원 확보가 아니라 경제 구조 전체를 전쟁 목적에 맞게 재조정하는 과정이기도 합니다.\n\n민간 영역의 부담은 증가하지만, 정부는 이를 국가 생존과 직결된 불가피한 선택으로 강조하고 있습니다."
 china_wr.262.a:0 "국가가 먼저다."
 china_wr.263.t:0 "임금 동결"
 china_wr.263.d:0 "전시 경제가 심화되면서 물가 상승과 노동 시장의 불균형이 국가 운영에 부담으로 작용하고 있습니다.\n\n정부는 임금 상승을 억제하여 물가 안정과 생산 계획의 예측 가능성을 확보하고자 합니다. 임금 동결은 소비를 제한하고 자원을 군수 분야로 집중시키는 효과를 가지며, 산업과 재정 운영을 전시 기준에 맞추는 핵심 수단으로 자리 잡고 있습니다.\n\n생활 여건의 압박이 커질 수 있으나, 국가 생존을 위한 전반적 동원 체계 속에서 불가피한 조치로 간주되고 있습니다."
 china_wr.263.a:0 "전시에는 통제가 필요하다."
 china_wr.264.t:0 "최저 노동연령 하향"
 china_wr.264.d:0 "전쟁 장기화로 노동력이 부족해지면서 국가 생산 체계는 새로운 인력 확보를 요구하고 있습니다.\n\n정부는 노동 참여 연령 기준을 하향 조정하여 더 많은 인구가 산업과 군수 생산에 참여할 수 있도록 하고 있습니다. 이는 사회 전체를 전시 생산 구조에 편입시키는 조치로, 국가의 물적 역량을 유지하는 데 중요한 역할을 합니다.\n\n교육과 생활 구조에도 변화가 따르지만, 전시 체제 유지라는 명분 아래 제도적 전환이 추진되고 있습니다."
 china_wr.264.a:0 "모두가 전쟁에 참여한다."
 china_wr.265.t:0 "총력전"
 china_wr.265.d:0 "전쟁은 더 이상 군대만의 문제가 아닙니다.\n\n정부는 국가의 모든 역량을 전쟁 수행에 집중시키는 총력전 체제로의 전환을 선언하였습니다. 경제와 행정, 산업과 교육, 문화와 언론까지 전쟁 목표에 맞추어 재편되며, 개인과 사회는 국가 전략과 직접적으로 연결됩니다.\n\n전선과 후방의 구분은 점차 희미해지고 있으며, 생산과 소비, 노동과 생활 방식은 모두 전쟁 수행이라는 단일한 기준 아래 조직됩니다. 이는 일시적 동원이 아니라 국가 운영 구조 자체를 전쟁 중심으로 고정하는 중대한 전환점이 되고 있습니다."
 china_wr.265.a:0 "국가 전체가 전선이다."
 china_wr.266.t:0 "중일전 발발"
 china_wr.266.d:0 "중화민국과 일본 제국은 공식적으로 전쟁 상태에 돌입하였습니다. 만몽을 비롯한 여러 민감한 사항을 두고 이어진 외교적 긴장과 군사적 대치는 결국 국가간 전면전으로 치닫게 되었습니다. 이는 단순한 국경 분쟁이나 일시적 충돌이 아니라, 국가의 존립과 체제를 걸고 맞서는 총체적 전쟁을 의미합니다.\n\n이제 우리는 군사력과 산업 역량, 외교와 재정을 포함한 모든 국가적 수단을 동원해야합니다. 국내 정치와 사회 질서는 전쟁 수행이라는 단일한 목표 아래 재편될 것이며, 국가의 생존과 향방은 전쟁의 결과에 의해 결정될 것입니다.\n\n전쟁이 발발하였고, 선택의 여지는 더 이상 존재하지 않습니다."
 china_wr.266.a:0 "전쟁이다."
 china_wr.267.t:0 "주사위를 던져라!"
 china_wr.267.d:0 "서방 대진국의 가이사가 노비공강을 건너며 한 말이 있습니다, 앞날이란 어찌될지 모르는 일이므로 도박이라도 응당 해봐야 한다는 뜻으로, 이 말을 한 직후 결국 가이사는 대진국의 패권을 잡는 것에 성공하였습니다. 옛 중국에서도 한신이 조나라 군대와 싸울 때 병사들이 도망가지 못하게 강을 등지고 진을 쳐서 필사적으로 싸우게 하여 승리한 고사가 있으며, 오늘날의 민국 또한 후베이에서 쏘아진 총알 한 발로 혁명을 시작하여, 무능한 황조를 내쫓고 공화의 기치를 내걸었으니 어찌 격언이 아닐 수 없겠습니까?\n\n악비 달기와 함께 잔혹한 형벌을 일삼고 주색에 빠져 정사를 돌보지 않은 은나라 주왕은 주나라 무왕에게 천명을 빼았겼고, 아라사의 황제는 신민들에게 발포하여 끝장을 본 끝에 목이 내걸렸습니다. 이 모든 고사의 공통점은 무엇일까요? 바로 무능한 자들이 나라를 이끈다면, 내흉에 휩싸여 망국의 길을 걷게 된다는 것입니다. 중화민국도 그러했던 것입니다. 그래서 오패부는 친히 썩어들어가는 나무의 뿌리에 불을 질렀습니다. 그리고 민국을 '덕이 다스리는' 나라로 천천히 바꾸었습니다.\n\n이제 중국은 완전히 불가분적인, 결코 나뉘어질 수 없는 낙토가 되었습니다. 하지만 아직 부족합니다, 중국은 넓고 이 대륙 전체를 유학의 이상향으로 만들기 위해선 아직 해야 할 일이 너무나도 많죠. 그리고 이 모든 일을 할 수 있는 이는 오직 오패부 장군 뿐입니다! 그는 지금까지 그래왔듯 대권을 꿋꿋히 잡아 중화 인민을 인의예지의 길로 이끌어나갈 것입니다.\n물론 오늘은 기쁜 날이니 장군은 잠시 술과 함께 선인들의 옳은 길을 노래하며 휴식을 취해도 될 것입니다. 하지만 내일이 되면 장군은 충실한 유학자이자, 무관으로서 해야 할 일을 이어갈 것입니다."
 china_wr.267.a:0 "왔노라, 보았노라, 이겼노라!"
 china_wr.268.t:0 "국민군의 봉기"
 china_wr.268.d:0 "오페부의 계엄 선포는 질서 유지를 위한 조치로 주장되고 있으나, 다수 정치 세력과 군 내부에서는 이를 사실상의 쿠데타로 간주하고 있습니다. 기존의 정치 절차와 문민 통치 구조가 무력에 의해 중단되었다는 인식이 확산되면서, 이에 대한 반발이 점차 조직화되고 있습니다. 이러한 상황 속에서 펑위샹이 이끄는 국민군은 문민정부의 회복을 대의명분으로 내세우며 봉기를 선언하였습니다. 국민군은 자신들의 행동이 특정 세력의 권력 장악에 맞서는 것이 아니라, 국가의 정당한 정치 질서를 되돌리기 위한 것임을 강조하고 있습니다. 이들의 움직임은 기존 권력 구도에 중대한 변화를 가져올 수 있으며, 각지의 군벌과 정치 세력 또한 이에 대한 입장을 정리해야 하는 상황에 놓이게 되었습니다."
 china_wr.268.a:0 "문민정부를 회복하라."
 china_wr.269.t:0 "국민군 봉기"
 china_wr.269.d:0 "최근 오페부의 계엄 선포를 둘러싼 정치적 긴장이 급격히 고조되는 가운데, 펑위샹이 이끄는 국민군이 봉기를 선언했습니다. 국민군은 이번 행동을 단순한 군사적 반란이 아닌, 문민정부를 회복하고 헌정 질서를 되돌리기 위한 조치라 주장하고 있습니다. 이번 사태는 단순한 군사 충돌을 넘어 정치 질서의 정당성을 둘러싼 문제로 확대되고 있으며, 중국 전역의 권력 구도에 중대한 변화를 초래할 가능성이 제기되고 있습니다."
 china_wr.269.a:0 "정세가 요동치고 있다."
 china_wr.270.t:0 "투표함 바꿔치기"
 china_wr.270.d:0 "차오쿤 대총통이 하야를 결정하고 올해 3월 실시되었어야 할 대총통 선거가 사천 대기근으로 연기되어 오늘에야 열리게 되었다. 가오밍자오는 산동 동부 웨이하이의 작은 마을 투표소의 선거관리 위원이었다.\n\n선거관리 위원이라 거창하게 붙여봤자 그냥 투표소에서 투표함을 나르고 투표소 설치 및 정리하는 게 전부였다. 그리고 사람들이 오면 투표지를 나눠주는 정도였다.\n\n그는 가만히 앉아 시계를 바라보았다. 시침이 5시를, 분침이 55분을 가리키고 있었다. 곧 있으면 투표가 마감될 시간이었다.\n\n4분\n3분\n2분\n1분\n\n오후 6시\n\n그는 자리에서 일어나 다른 위원들과 같이 투표소를 닫고 정리하기 시작했다. 참으로 길고 지루한 하루가 겨우 끝난 것이었다. 하급 공무원이랄 게 본디 그러한 것이긴 하나 오늘은 더욱 그러한 듯했다.\n\n투표소를 정리하고 투표함을 수거하러 온 트럭에 투표함을 싣기 직전이었다.\n\n"거기, 잠깐."\n\n그 말에 가오밍자오는 소리의 근원을 향해 고개를 돌렸다. 선거위원장이었다.\n\n"그 투표함 아니니까. 이걸 싣도록."\n\n"위원장님 오늘 투표했던 건 그 투표함이 아니라 저거..."\n\n"하라면 하라는 대로 해. 이상한 소리 하지 말고."\n\n순간 투표함을 착각한 것인가 싶었던 생각이 한순간에 날아갔다. 가오밍자오도 이를 의미하는 바가 무엇인지 잘 알고 있었다. 하지만 하급 공무원이 할 수 있는 것이 무엇이 있겠는가. 시키면 시키는 대로 하는 수밖에 없었다.\n\n하여 기존에 올리려던 투표함을 내리고 선거위원장이 가져온 투표함을 화물칸에 올리려던 찰나였다.\n\n'위잉 찰칵'\n\n카메라 소리였다.\n\n순간적으로 돌아보니 두 남자가 이 모습을 찍고 있었다.\n\n"야 들켰다! 튀어!"\n\n그 모습을 눈치챘다는 것을 깨닫자마자 그들은 카메라를 들고 부리나케 도망쳤다."
 china_wr.270.a:0 "그리고 뒤이어 저놈 잡아라 하는 위원장의 외침이 울려 퍼졌다."
 china_wr.271.t:0 "웨이하이의 투표함 바꿔치기 사건"
 china_wr.271.d:0 "산동 동부 웨이하이의 한 투표소에서 자행된 조직적인 투표함 바꿔치기 시도가 현장을 목격한 언론의 폭로로 발각되었습니다. 선거 관리 위원들이 사전에 준비된 가짜 투표함으로 교체하려던 찰나, 이 모든 과정이 사진과 증언으로 기록되어 세상에 낱낱이 공개되었습니다. 이러한 부정의 증거들이 일간지의 일 면을 장식하자마자 민심은 걷잡을 수 없이 타올랐습니다. 이에 대해 국민당은 이번 사건을 민주주의에 대한 정면 도전이자 명백한 헌정 질서 파괴로 규정하며 강력히 반발하였으며 이번 선거에서의 대패를 이러한 부정선거 때문이라 주장하였습니다. 국민당 지도부는 대총통 선거의 전면 무효를 주장하며 재선거를 요구하는 대규모 장외 투쟁을 전개할 것을 예고하였습니다. 한편 사태의 심각성을 인지한 신정부 역시 서둘러 대국민 담화를 발표하고 철저한 진상 조사를 약속하며 성난 여론을 잠재우고자 하고 있습니다. 하지만 이미 실추된 행정 신뢰도와 정치적 정당성 사이에서 이번 조사가 과연 공정하게 이루어질지에 대한 의구심은 더욱 깊어만 가고 있습니다. 이 사건은 향후 중화의 정국을 유례없는 혼란 속으로 몰아넣는 결정적인 도화선이 될 것입니다."
 china_wr.271.a:0 "진상을 규명해야 할 것이다."
 china_wr.272.t:0 "베이징에서 발생한 정치인 집단린치"
 china_wr.272.d:0 "본격적인 선거 국면에 접어들기도 전에 베이징 도심 한복판에서 진보당 의원을 겨냥한 잔혹한 집단 린치 사건이 발생하였습니다. 대낮에 정복을 입은 괴한들이 의원을 습격하여 무차별적인 폭행을 가하였으며, 이 과정에서 발생한 처참한 유혈 사태의 목격담과 사진이 언론을 통해 신속하게 보도되었습니다. 이 소식을 접한 시민들은 대낮 도심에서 벌어진 만행에 커다란 충격과 공포에 빠졌습니다. 진보당은 이번 사건을 야당에 대한 비열한 정치적 테러이자 민주주의를 짓밟는 백색 테러로 규정하고 당국의 무능을 강력하게 규탄하였습니다. 진보당 지도부는 현 행정부에 즉각적인 책임자 처벌과 실효성 있는 재발 방지 대책을 요구했습니다. 당국은 뒤늦게 유감을 표하며 철저한 조사를 약속하고 민심을 수습하려 하고있으나, 이미 실추된 행정적 신뢰는 쉽게 회복되지 않을 것으로 보입니다. 이번 린치 사건은 다가올 선거가 평화적으로 치러질 수 없을 것임을 암시하는 불길한 전조로 보입니다."
 china_wr.272.a:0 "야만적이군!"
 china_wr.273.t:0 "진정한 민주투사?"
 china_wr.273.d:0 ""타오 선ㅂ... 윽! 하 씨 위험했네. 여기 총알 더 가져왔어요!"\n\n북경대학 신입생 량쉰은 예상하지 못한 일을 하게 된 것 치고는 나름 스스로의 역할을 잘 수행하는 중이었다. 선배가 끌고 나가는 '정치 활동'이라고 한다면 대자보나 기껏해봐야 다소 폭력적인 시위일줄 알지, 그 누가 투표함을 사이에 낀 참호전일것이라 생각한단 말인가? 자신이 거기에서 총알에 맞을까봐 머리를 박고 기어다니며 탄약을 옮기게 될 것이라는 생각은 누가 하겠는가?\n\n아니, 지금의 중국에서는 그렇게 생각하지 않는 것이 더 이상한 것일지도 모르겠다.\n\n"잘 했어 량쉰!"\n타오는 망설임 없이 량쉰이 가져온 7.62mm 총알 클립을 받아들었다. 그의 모신나강에 딱 맞는 클립이었다.\n\n"이 총알 한발 한발이 민중의 의지를 지켜내는거지... 하! 맞았다! 정부의 개자식같으니."\n사방에서 울려퍼지는 총성을 피해 귀를 막으며 바리케이드 밑에서 머리만 숙이고 있던 량쉰은 바리케이드 위로 고개를 살짝 내민 선배의 다리만이 보였을 뿐이었다. 그리고, 저 반대편 진영에서 무슨 일이 일어났는지 딱히 알고싶지도 않았다.\n\n"그... 선배, 이게 맞나요?"\n타오가 세번째 클립을 가져가기 위해 고개를 숙여 량쉰과 고개를 마주쳤을때였다.\n\n"그게 무슨 소리냐, 량쉰?"\n\n"ㄱ, 그러니까, 민주주의에서 시민의 의지는 총알의 개수가 아니라 표의 개수로 표현하는것 아닌가요? 왜 투표함을 차지하려고 참호전을 벌이고 있는거죠? 투표함은 민중의 목소리고 차지하면 안되는거잖아요!"\n\n타오는 잠시 얼이 빠진 표정으로 량쉰을 쳐다보더니 조금 거친 목소리로 답했다.\n\n"이상주의적이고 나약해 빠진 소리만 늘어놓는군 량쉰! 민주주의는 싸워서 쟁취하는거야!"\n\n그때였다. 마냥 가깝지는 않지만, 목소리가 총성에 묻히지는 않을 정도의 거리에서 들려온 외침이었다.\n\n"부상자 발생! 젠장, 허리에 맞았어!"\n\n"하, 봤어? 저게 진정한 민주투사의 모습이지. 꼬마가 아니라 남자가 될 때다 량쉰.""
 china_wr.273.a:0 ""뭐해? 얼빠질 틈 없어! 빨리 부상자나 수송해!""
 china_wr.274.t:0 "참의원 권한 복원 및 위상 재정립 논의"
 china_wr.274.d:0 "부분 개헌 논의의 첫 번째 도마에 오른 것은 참의원의 뼈아픈 현주소입니다. 과거 차오쿤 전 대총통은 이른바 '원활한 국정 운영'이라는 미명 아래 참의원의 권한을 대폭 축소하여, 사실상 행정부의 거수기이자 식물 상태로 전락시켜 버렸습니다.\n\n이제 베이징의 헌법학자들과 정치 원로들은 참의원이 본연의 역할을 되찾아야 한다고 목소리를 높이고 있습니다. 중의원이 대중의 열광에 휩쓸려 포퓰리즘적 법안을 남발하는 것을 견제하고, 거대한 민국을 구성하는 각 성의 이익을 대변하는 조정자로서 기능해야 한다는 것입니다. 그러나 헌법에 참의원의 이빨을 어느 정도로 날카롭게 다시 벼려 넣을 것인지를 두고 정계의 의견이 엇갈리고 있습니다."
 china_wr.274.a:0 "참의원의 본분은 철저한 견제다. 법률 거부권과 고위직 탄핵 소추권을 명문화한다."
 china_wr.274.b:0 "과도한 권한은 국정 마비를 부를 뿐이다. 법안 반려 및 재심의 요구 권한만 부여하라."
 china_wr.275.t:0 "내각 책임 소재의 헌법적 명문화"
 china_wr.275.d:0 "현행 헌법이 지닌 가장 큰 맹점 중 하나는 내각이 도대체 누구에게 책임을 지느냐에 대한 조항이 턱없이 모호하다는 것입니다. 이로 인해 과거 정국에서는 내각이 대총통에게 책임을 지는지, 아니면 인민의 대의기관인 의회에 책임을 지는지 명확하지 않아 권력자의 입맛에 따라 자의적으로 해석되는 회색지대가 존재해왔습니다.\n\n헌법개정위원회는 이제 이 모호한 문구를 지워버리고, 내각의 진정한 주인이 누구인지를 명확히 새겨넣고자 합니다. 의회의 신임에 의존하는 의원내각제적 통제를 강화할 것인가, 아니면 대총통의 행정 집행력을 보장할 것인가를 두고 베이징 정계가 다시 한번 둘로 나뉘었습니다."
 china_wr.275.a:0 "내각은 인민의 대의기관을 거스를 수 없다. 의회의 신임 없이는 존립할 수 없음을 명시하라."
 china_wr.275.b:0 "내각은 대총통의 국정 철학을 집행하는 실무 기구다. 대총통에 대한 책임을 명시하라."
 china_wr.276.t:0 "성 헌법의 지위와 국가 헌법의 위계"
 china_wr.276.d:0 "연성자치의 유행은 거대한 중화민국을 다스리는 하나의 방식이었으나, 이는 동시에 국가의 법적 통일성을 훼손하는 양날의 검이었습니다. 과거 차오쿤 정권의 헌법 체제는 정치적 타협을 위해 각 성이 독자적인 헌법을 제정하고 운영하는 것을 사실상 묵인해 왔습니다.\n\n하지만 이번 부분 개헌을 통해 의회는 국가 헌법과 지방 헌법 사이의 모호한 위계질서를 확실히 정리하고자 합니다. 보수 우파와 중앙집권주의자들은 중화민국이 단일국가임을 강조하며, 지방의 자치 조례가 결코 국가 헌법에 우선하거나 반할 수 없도록 중앙 정부의 강력한 감독권을 명시해야 한다고 주장합니다.\n\n반면, 치공당과 지방의 권익을 대변하는 연성주의자들은 이른바 '보충성의 원칙'을 내세워 강하게 반발하고 있습니다. 이들은 국방과 외교 등 국가 안위에 직결된 필수 권한을 제외한 모든 내정 권한은 지방에 우선적으로 부여되어야만 거대한 대륙을 효율적으로 통치할 수 있다고 역설합니다."
 china_wr.276.a:0 "지방의 조례는 결코 국가 헌법에 반할 수 없다. 중앙의 감독권을 강화하라."
 china_wr.276.b:0 "국방과 외교를 제외한 모든 권한은 지방에 우선한다. 연성자치를 보장하라."
 china_wr.277.t:0 "정치 자금 투명화와 선거법 개정 논의"
 china_wr.277.d:0 "과거 차오쿤 전 대총통이 의원들을 돈으로 매수하여 권력을 쥐었던 악명 높은 회선사건과 친위 쿠데타는 우리 헌정사에 지울 수 없는 흑역사로 남아있습니다. 비록 그 사건 이후로 민주주의는 성숙해졌으나, 현행법의 느슨한 선거 자금 규정과 불투명한 로비 활동은 여전히 부패의 온상으로 지적받고 있습니다.\n\n시민사회와 개혁파 의원들은 이번 개헌을 통해 음지에서 이루어지는 뇌물과 로비를 제도권 안으로 끌어들여 투명하게 관리해야 한다고 목소리를 높입니다. 이들은 헌법에 선거 비용 상한제와 로비 자금 공개 의무를 엄격하게 못 박아 정치권의 고질적인 매표 행위를 뿌리 뽑아야 한다고 주장합니다.\n\n하지만 기득권 정치인들과 보수 진영은 과도한 규제가 오히려 정상적인 정치 활동마저 위축시킬 것이라며 난색을 표합니다. 이들은 정치 자금 모금의 자율성을 보장하되 사후 처벌을 강화하는 선에서 헌법을 손질해야 한다고 맞서고 있습니다."
 china_wr.277.a:0 "과거의 수치를 반복할 순 없다. 선거 비용 상한제와 로비 공개 의무를 명시하라."
 china_wr.277.b:0 "과도한 규제는 정치의 마비를 부른다. 자율에 맡기되 사후 처벌을 강화하라."
 china_wr.278.t:0 "사법부의 위상 제고와 위헌 법률 심판권"
 china_wr.278.d:0 "민국의 혼란스러운 역사 속에서, 사법부는 종종 행정부의 압력이나 총칼 앞에서 무기력하게 고개를 숙여야만 했습니다. 베이징의 법학자들은 이제 진정한 의미의 법치주의를 확립하기 위해서는 법관의 철저한 신분 보장은 물론, 헌법 수호 기관으로서의 권한을 사법부에 부여해야 한다고 주장합니다.\n\n논의의 핵심은 위헌 법률 심판권의 소재입니다. 진보적인 법조인들은 적극적인 사법권 행사를 옹호하며, 최고위 사법 기관인 대리원에 의회의 법률을 통제하고 헌법을 최종적으로 해석할 권한을 주어야 한다고 역설합니다. 이는 다수의 횡포로부터 소수를 보호하는 강력한 장치가 될 것입니다.\n\n반면, 의회 우위 원칙을 신봉하는 정치인들은 사법 자제를 촉구합니다. 선출되지 않은 권력인 사법부가 국민의 대의기관인 의회의 입법을 무효화하는 것은 민주주의에 대한 월권이라는 것입니다. 이들은 법관이 개인의 양심에 따라 법률을 기계적으로 적용하는 데 충실해야 하며, 고도의 정치적 판단은 오직 국회의 몫으로 남겨두어야 한다고 주장합니다."
 china_wr.278.a:0 "사법부는 헌법의 최후 수호자다. 대리원에 헌법 해석의 최종 권한을 부여하라."
 china_wr.278.b:0 "사법부는 법률의 적용에만 충실해야 한다. 정치적 판단은 의회의 몫이다."
 china_wr.279.t:0 "청천 아래 정립되는 헌정"
 china_wr.279.d:0 "'당쟁의 포화가 마침내 멎고 청천이 열린 오늘 [CHI.GetLeader] 총통령 정부가 새로운 개헌안을 입안함은 혼란을 종식하고 오족공화의 참된 민주를 완성하려는 만세의 초석을 세우고자 하는 강한 의지의 표명이니 천하의 귀감이 되는 바다. 비록 적잖은 논란과 우려가 교차했음에도 불구하고 청년당과 진보당의 수뇌부 모두가 이번 안의 중대함을 깊이 인식하여 대국적 합의를 도출하고 개헌안 발의와 함께 이를 전국이 충실히 이행할 수 있도록 하기 위한 임시위원회의 촉발에 흔쾌히 찬동하였다고 하니 참으로 고무적인 일이다.\n\n이번 입안은 주로 입법부의 상원인 참의원과 사법부의 권한을 확고히 정립하였으며 개헌임시위원회 대변인에 따르자면 특정 정파나 일부 검인이 권력을 독점하는 폐단을 근절하고 엄격한 법치를 실현하기 위해 입법 거부 제도와 의원 선출 제도를 전면적으로 개조하였다. 아울러 과거 조곤 회선 이후 정계의 고질적인 관행으로 자리 잡았던 관설의 합법화 여부 역시 논의되어 법치의 기틀을 바로잡았다 전한다. 또한 각 성정부의 국정 평등과 내각책임제의 정착 못지않게 기왕에는 명확히 규정치 못하였던 국가헌법의 위계를 공고히 확립하였으며 본보는 감히 이번 개헌안이 결코 위정자들의 야합에 불과한 것이 아님을 만천하에 표명한 것과도 같다 평론한다.\n\n본보는 서구 민주국가와 비교하여도 결코 뒤처지지 않는 이번 개헌을 통해 신해년 이전의 구태의연한 권위정치와 남방 국민당이 획책하던 급진일당독재를 모두 극복하고 오족공화의 대업을 이룩할 청년 중국의 앞날에 깊은 경의를 표하는 바며, 권력과 기회를 손에 쥐고도 이를 사욕으로 채우지 않고 헌정의 틀 안에서 분점하는 용단을 내린 총통령이 앞으로도 건강한 당쟁과 국정을 이끌어 지금과 같은 기세를 이어가기를 진심으로 축원하는 바이다...'\n\n리윈징은 눈을 비비며 오늘 새벽일자 신보를 책상에 내려놓았다. 내전이 나기 이전엔 물 좀 먹었다고 남방에서 소학교 교장까지 해본 몸이라 그런지 아내의 질타에도 밤늦게까지 세상살이 국정 돌아가는 것을 탐구하는 것이 얼마나 체질인지 도저히 멈출 수가 없지 않던가? 국민당이 광동에 들어왔을 적 갈팡질팡하며 온 가족이 어떻게 해야 할지를 고심하던 것이 마치 먼 옛적처럼 느껴졌다. 후일 남진한 호법군이 리윈징의 농토와 집을 국민당에게서 되돌려 주었을 적 느낀 감정은 실로 만전이었다.\n지금 자고 있을 아들 리카싱의 방을 바라보며 리윈징은 적어도 자신이 준치인 나라에서 나지 않고 제 아들과 가족 하나쯤은 챙겨줄 수 있는 그런 나라에서 살고 있음을 다시 한번 감사해했다."
 china_wr.279.a:0 "창문 밖으로 새벽빛이 밝아왔다."
 china_wr.280.t:0 "전승절"
 china_wr.280.d:0 "침략자 일본 제국주의를 축출하고 내전의 혼란을 종식한 위대한 승리를 기념하기 위해, 베이징 정부는 오늘을 공식적인 전승절로 선포했습니다. 수도의 거리는 민국의 깃발을 흔들며 환호하는 수많은 인민들로 가득 찼으며, 전선을 누비며 주권을 수호한 군 장병들의 당당한 열병식이 거행되었습니다. 외세의 압제와 고통으로 얼룩졌던 백 년의 굴욕이 마침내 완전히 청산되는 순간입니다. 인민들은 마침내 찾아온 평화와 통일된 조국의 번영을 기대하고 있으며, 이번 승리는 민국이 세계 열강과 어깨를 나란히 하는 당당한 자주독립 국가이자 확고한 법치국가임을 전 세계에 증명하는 계기가 되었습니다."
 china_wr.280.a:0 "중화민국 만세!"
 china_wr.281.t:0 "운남-버마구간 일대일로 참여 제안"
 china_wr.281.d:0 "중화민국 정부가 유라시아의 번영을 목표로 추진 중인 거대 국책 사업, '일대일로' 계획에 우리 국가를 정식 초청했습니다. 중화민국과 우리정부의 공동 투자를 통해 우리 영토를 관통하는 주요 교통망과 항만 인프라에 막대한 자본을 투자하고, 통상 절차를 간소화하여 양국의 공동 번영을 이룩하자고 제안해 왔습니다. 이 제안은 장기적으로 막대한 이익을 우리에게 가져 줄 것이며 대부분의 경우에 있어서 우리에게 이득이 될 것입니다. 민국의 거대한 신실크로드 구상에 동참할 것인지, 아니면 독자적인 노선을 고수할 것인지 선택해야 합니다."
 china_wr.281.a:0 "대륙의 공동 번영을 위하여!"
 china_wr.281.b:0 "참여하지 않을 것이다."
 china_wr.282.t:0 "[FROM.GetName]의 일대일로 구상 승인"
 china_wr.282.d:0 "우리가 발송한 일대일로 협력 제안을 [FROM.GetName] 정부가 공식적으로 수락했다는 승인 통보가 도착했습니다. 그들은 공동 투자와 인프라 확충이 가져올 경제적 시너지에 큰 기대감을 표명하며, 민국 중심의 새로운 물류망에 전격 동참하기로 결의했습니다. 이번 동맹으로 대륙과 해양을 하나로 묶는 신실크로드 건설은 한층 더 확고한 탄력을 받게 되었습니다. 이제 공동 자본을 투입하고 해당 국가의 영토를 관통하는 철도와 도로, 항만을 부설하기 위한 실무 절차를 즉각 개시해야 합니다."
 china_wr.282.a:0 "새로운 협력의 장이 열렸다."
 china_wr.283.t:0 "[FROM.GetName]의 일대일로 구상 거절"
 china_wr.283.d:0 "안타깝게도 [FROM.GetName] 정부는 우리의 일대일로 협력 구상을 최종적으로 거절했습니다. 그들은 자본 투입에 따른 재정적 부담과 주권 침해 우려를 이유로 들었으나, 실질적으로는 민국의 거대한 경제적 영향력이 자국 내로 깊숙이 침투하는 것을 경계한 선택으로 보입니다. 이번 거절로 인해 해당 경로를 통해 유라시아를 하나로 연결하려던 우리의 거대 인프라 계획은 일부 차질이 불가피해졌습니다. 신실크로드의 완전한 연결을 위해서 우리는 이 외교적 교착 상태를 해결할 우회 경로를 찾거나 새로운 대안을 모색해야 합니다."
 china_wr.283.a:0 "다른 방도를 찾아야 할 것이다."
 china_wr.284.t:0 "인도 횡단 일대일로 참여 제안"
