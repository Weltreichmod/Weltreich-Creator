 china_wr.330.t:0 "사이공 항만 확장 완료"
 china_wr.330.d:0 "거대한 자본과 최신 공학 기술이 투입된 사이공 항만 확장 공사가 마침내 마무리에 접어들었습니다. 기존의 낙후되었던 접안 시설과 화물 적치 공간을 대대적으로 개수하고 부두를 증설함에 따라, 이제 사이공 항은 초대형 화물선이 자유롭게 드나들 수 있는 현대적인 심수항으로 탈바꿈했습니다. 이번 확장은 일대일로 구상 중 해상 실크로드의 핵심 거점을 완전히 확보했음을 의미합니다. 동남아시아의 풍부한 자원과 물산이 이곳에 집결되어 민국의 중심부와 전 세계로 뻗어 나갈 준비를 마쳤으며, 양국의 경제적 결속력은 이전과는 비교할 수 없을 정도로 공고해질 것입니다."
 china_wr.330.a:0 "바닷길이 넓어졌다."
