 china_wr.334.a:0 "바닷길이 넓어졌다."
 china_wr.335.t:0 "불석신명 구제국난"
 china_wr.335.d:0 "침략자들의 무자비한 철마가 민국의 국경을 짓밟고 들어오며, 사직의 안위는 바람 앞의 등불과 같은 처지에 놓였습니다. 전선에서 들려오는 비보에 조정과 군부는 깊은 수치와 분노에 휩싸였습니다. 이제 더 이상 물러설 곳은 없습니다. 총통은 전 국토에 고하는 격문을 통해, 내 몸과 목숨을 아끼지 않고 오직 도탄에 빠진 국가와 민족을 구제하겠다는 결연한 의지를 천명했습니다.\n\n\"나라가 망해 가는데 어찌 내 한 목숨의 안위를 논하겠는가! 민국의 장병들이여, 그리고 민초들이여! 아군의 피와 살로 철벽을 쌓아서라도 이 땅을 사수하라!\"\n\n이 엄숙한 선언은 전 국토로 퍼져나갔고, 수많은 젊은이들이 창과 소총을 들고 전선으로 향하기 시작했습니다. 우리는 이 대재앙 속에서 살아남아 침략자들에게 지옥을 선사할 것입니다."
 china_wr.335.a:0 "불참웅사보국방! 적의 수장을 베지 못한다면 결코 돌아오지 않으리라!"
 china_wr.336.t:0 "20세기 실크로드의 완공"
 china_wr.336.d:0 "마침내 동아시아를 출발한 철로와 도로, 그리고 각지의 주요 항만들이 대륙을 가로질러 주요 거점국가들과 긴밀하게 연결되었습니다. 오랜 세월 동안 물류의 흐름과 문화적 교류를 가로막던 험준한 고원과 사막의 천연 장벽들은 민국의 끈질긴 인프라 건설 노력 끝에 마침내 상호 공존을 위한 통로로 거듭났습니다.\n\n대륙 전역에 부설된 수만 킬로미터의 철도망과 고속도로, 그리고 해상 거점들이 유기적으로 맞물려 돌아가기 시작하면서 대륙 전체의 경제적 유대와 통상 효율성이 비약적으로 도모되었습니다. 수많은 인구와 자원이 집중된 이 광활한 경제권역은 이제 민국과의 긴밀한 협력 아래 공동의 번영을 추구하는 새로운 장을 맞이하게 되었습니다.\n\n이 방대한 인프라 네트워크의 완성은 단순한 무역로 개척을 넘어, 전역에 안정적인 경제적 교두보를 마련하고 상호 발전을 이룩하는 굳건한 기반이 될 것입니다. 오늘날 우리는 대륙의 안정된 상생을 이끄는 일원이자 국제 사회의 핵심적 주체로서의 역할을 성실히 수행해 나갈 것임을 선포합니다."
 china_wr.336.a:0 "대륙의 번영과 안정을 위하여."
 china_wr.337.t:0 "혁명무죄, 조반유리!"
 china_wr.337.d:0 "사천의 피비린내 나는 동란을 보라! 남부 땅을 뜨겁게 달구고 있는 국민혁명의 불길을 보라! 지금 우리 중화민족은 거대한 격동과 혼란의 한복판에 서 있다!\n저 기득권자들과 썩어빠진 자들은 이를 두고 반란이라며 손가락질하고, 중국을 좀먹는 짓이라며 매도한다. 하! 가소롭다! 세상에 이유 없는 반란이 어디 있단 말인가! 작금의 부패한 정부가 저지른 매국적 행보와 이번 선거에서 백일하에 드러난 더러운 불법의 향연들이야말로, 우리 국민당의 거룩한 혁명 활동에 가장 확실하고도 엄숙한 정당성을 부여하고 있다!\n\n백 년의 치욕을 언제까지 두고 볼 것인가!\n\n기해년(1839년) 그 잔인했던 날을 기억하라! 한족의 피를 짜내던 만주 오랑캐들이 무력하게 주저앉아 있을 때, 영국의 군화발이 신성한 중화 강토를 짓밟고 우리의 고혈을 빼앗아 갔다. 그날 이후로 지금까지 백여 년이 흐르는 동안, 이 위대한 대륙은 서양 열강들의 더러운 반식민지 놀이터로 전락했다! 뜨거운 피가 흐르는 중화의 인민이라면, 이 빼앗긴 권리와 짓밟힌 존엄을 되찾기 위해 목숨을 걸고 투쟁하는 것이 당연한 의무가 아닌가!\n그러나 이 한심하고 무능한 정부를 보라! 저들은 옛날부터 지금까지 서양 열강의 매국노 앞잡이가 되어 제 주머니를 채울 궁리만 할 뿐, 중화 인민의 당연한 권리를 되찾는 데는 눈길조차 주지 않았다! 이 치욕스러운 백년국치를 끝내기 위한 그 어떤 비장한 결단도, 적극적인 움직임도 없었다! 저들이 정녕 중화의 정부란 말인가? 저들은 그저 외세의 충견일 뿐이다!\n\n선거라는 이름의 추악한 사기극\n이번 선거는 그야말로 민주주의를 모독한 추악한 사기극이다!\n\n산동(웨이하이)에서는 투표 당일 투표함을 통째로 바꿔치기하는 천인공노할 범죄가 저질러져 언론에 대서특필되었다!\n심지어 백주대낮에 베이징 한복판에서 국민당 의원들을 향한 야만적인 집단 린치와 암살 미수가 하루가 멀다 하고 터져 나왔다!\n이것이 정당한 선거인가? 이것이 민심이란 말인가? 아니다! 이것은 저 추악한 역도들이 민심을 왜곡하고 조작하기 위해 부린 최악의 난동이다!\n사천 당 지도부가 옳았다! 북경의 매국노 위선자들은 정당할 선거를 치룰 생각이 처음부터 없었던 것이다! 이런 피비린내 나는 아수라장에서 정상적인 선거가 이루어졌다고 믿는 자는 머리가 어떻게 된 자들뿐이다! 이번 선거 결과에 민심이 왜곡되어 반영되었음은 삼척동자도 다 아는 사실이다!\n\n청년들이여, 무기를 들고 일어서라!\n이 모든 더러운 음모와 핏빛 탄압이 오히려 증명하고 있다. 우리 국민당의 혁명이야말로 시대의 명령이며, 역사적인 대의라는 것을!\n혁명에는 죄가 없다! 정의를 위한 반역에는 명분이 가득하다! 피가 끓는 중화의 인민이라면, 이 무너진 대의를 다시 세우기 위해 당장 혁명의 깃발 아래로 모여야 한다! 부정선거로 자리를 도둑질하고 우리의 신성한 국익을 타국에 통째로 넘겨주려는 저 추악한 역도들에 맞서, 끝까지 피를 흘리며 싸우자!\n\n동포들이여, 행동하라!"
 china_wr.337.a:0 "반란분자의 대자보일 뿐이다."
 china_wr.337.b:0 "참으로 올바른 식견을 가진 학생이로다."
 china_wr.338.t:0 "장레이 사건"
 china_wr.338.d:0 "[GetDateText] 신보 평론\n\n누군가가 도둑질을 당하면 국가가 나서서 도둑을 잡고, 누군가가 죽는다면 국가가 나서서 수사를 한다. 하나 국가가 누군가를 죽였다면, 이는 누가 나서서 수사하고 누가 징벌할 것인가?\n\n어제 저녁, 주강 하루에서 한 학생이 처참한 몰골의 시신으로 발견되었다. 이 학생의 이름은 장레이. 광저우 대학의 대학생이다. 장밋빛 미래를 그리던 이 젊은 청년은 누군가에 의해 싸늘한 주검이 되어 돌아왔다.\n\n누가 그를 죽였는가. 어떤 미치광이 살인범인가, 원한을 가진 자인가... 이미 언론을 통해 대서특필 된 바, 그 청년을 죽인 자들은 그 누구도 아닌 국가 기관. 경찰들이었다.\n\n그들은 그를 왜 죽였는가? 그가 천인공노할 일을 벌였는가? 국가를 전복시키려는 세력의 일원이었는가? 진보당과 중청당의 부당한 행보를 고발하는 시위를 했을 뿐이다.\n\n한데 경찰들은 이 시위를 폭동이라 주장하며 참여자들을 대고 체포해갔다. 이 과정에서 경찰의 일방적인 폭력이 이미 확인된 바 있으며, 구치소에 구류 중 지속적인 고문과 학대가 있었음이 많은 이들의 조사 끝에 명명백백히 밝혀졌다.\n\n광저우 경찰총국은 초반에 이를 은폐하려 했으며 시신을 주강에 던졌으나 그 한을 잊지 못한 몸이 강 위로 올라가 이 일을 세계에 알렸다.\n\n하늘이여, 땅이여, 사람들이여! 광저우 경찰의 만행과 이 청년의 억울한 죽음을 기억하라. 정부에 의해 벌어진 이 추악한 행포를 기억하야 후세에 전하자. 다시는 이러한 일이 반복되지 않게!"
 china_wr.338.a:0 "천인공노할 일이다."
 china_wr.339.t:0 "주강에 떠오른 대학생의 시신!"
 china_wr.339.d:0 "어제 저녁, 광저우를 가로지르는 주강 하구에서 한 젊은이의 시신이 참혹한 몰골로 발견되어 전 성에 거대한 충격을 안겨주고 있습니다. 신원 확인 결과, 이 싸늘한 주검은 최근 진보당과 중청당의 부당한 행보를 고발하는 시위에 참여했다가 체포되었던 광저우 대학의 학생 장레이로 밝혀졌습니다.\n\n당초 광저우 경찰총국은 시위를 폭동으로 규정하고 시위자들을 구금하는 과정에서 발생한 단순 사고사라고 주장하며 사건을 은폐하려 했습니다. 그러나 양심 있는 언론인들과 시민들의 끈질긴 추적 끝에, 구치소 구류 중 자행된 무자비한 고문과 학대의 흔적이 시신 전신에서 명명백백히 드러났습니다. 경찰이 만행을 감추기 위해 그를 살해한 후 시신을 주강에 유기했다는 사실이 폭로되자, 민중의 분노는 걷잡을 수 없이 타오르고 있습니다.\n\n정부의 손에 죽어간 청년의 비극적인 운명 앞에 천인공노한 대학생들과 시민들은 거리로 쏟아져 나와 공권력의 잔혹한 폭거를 규탄하고 있습니다. 이 추악한 만행의 진상을 규명하고 책임자를 처벌하지 못한다면, 민국의 법치와 도덕성은 완전히 무너져 내릴 것입니다."
 china_wr.339.a:0 "감시자는 누가 감시하는가?"
 china_wr.340.t:0 "천하의 재정립"
 china_wr.340.d:0 "중화문명의 천하는 북으로는 몽고, 남으로는 대월, 동으로는 조선, 서로는 티벳에 이릅니다. 중앙에는 찬란한 중화문명의 주인인 중국이 있으며 그 주변을 둘러싼 주변국과 문명들이 존재해 왔습니다. 그러나 근세 이래 몰려든 외세의 탐욕스러운 침탈로 인해 우리는 우리의 전통적인 영역을 강탈당해야만 했고, 중화문명의 강토는 치욕스럽게 쪼그라들고 말았습니다.\n\n하지만 과거의 암운은 걷혔습니다. 만주를 완벽히 수복하고 동해 너머 일본을 격멸한 현재, 민국은 잃어버린 봉역을 되찾고 천하의 질서를 바로잡을 압도적인 힘을 갖추었습니다. 이제 우리는 우리의 전통적인 지배권과 영향력을 영토 전역에 다시 확고히 투사하기 위해 움직일 것입니다. 사방의 이민족과 주변국들은 중화의 위엄 앞에 다시금 고개를 숙이게 될 것입니다."
 china_wr.340.a:0 "대륙의 정당한 질서를 복구하라!"
 china_wr.341.t:0 "해동의 봉역"
 china_wr.341.d:0 "중화문명의 천하에서 동방의 끝을 상징하는 해동은 조선반도와 일본열도를 지칭하는 말입니다. 조선은 오랜기간 중화 문명의 일원으로서 중국에 복종해왔으나 우리의 힘이 서양 열강에 의해 약해진 틈을 타 강성해진 일본이 그곳을 빼앗아갔습니다. 그러나 일본은 패망했으며 조선을 다시 세상에 모습을 드러냈습니다. 이에 따라 우리는 해동의 국가들에 다시금 영향력을 행사하기 위한 준비를 해야할 것입니다."
 china_wr.341.a:0 "동방의 봉역에 중화의 법도를 세워라."
 china_wr.342.t:0 "서천의 봉역"
 china_wr.342.d:0 "하늘과 맞닿은 험준한 산맥과 끝없이 펼쳐진 높은 고원 지대 너머의 서천은 전통적으로 티벳을 비롯한 중화의 서방 봉역을 이루는 핵심적인 영역이었습니다. 그러나 내전의 여파로 우리의 영향력이 약화된 틈을 타 이 땅은 독립을 선포하며 우리의 손에서 벗어났습니다. 사방의 이민족과 주변국들이 중화의 위엄 앞에 다시금 고개를 숙이게 만들기 위해서는, 이 험난한 서방의 요충지를 반드시 민국의 확고한 통제하에 두어야 합니다. 우리는 서천을 수복하여 서부 국경의 안정을 영구히 확보하고, 이를 민국의 무너질 수 없는 거대한 천연 방벽이자 정당한 영토로 완전히 삼을 것입니다."
 china_wr.342.a:0 "서방의 요충지를 확고히 장악하라."
 china_wr.343.t:0 "해남의 봉역"
 china_wr.343.d:0 "울창한 밀림과 따뜻한 남방의 바다가 펼쳐진 해남의 봉역은 대월을 포함하여 과거부터 중화의 천하 질서 속에서 남방의 안정을 담보하던 중요한 영역이었습니다. 하지만 프랑스 의해 대월을 빼앗긴 후, 남방의 강토는 치욕스럽게 쪼그라들었으며 민국의 남부 국경은 언제나 잠재적인 위협과 도전에 직면해왔습니다. 만주를 수복하고 일본을 격멸하여 대륙의 주도권을 장악한 지금, 우리는 고개를 돌려 남방의 잃어버린 봉역에 다시금 중화의 위엄을 강력하게 투사해야 합니다. 남방의 자원과 인프라를 민국의 통제하에 완벽히 귀속시키고, 이 땅에 축적된 외세의 더러운 잔재를 청산하여 천하의 남쪽 경계를 우리 식대로 확고하게 재편할 것입니다."
 china_wr.343.a:0 "남방의 강토에 천하의 질서를 주입하라."
 china_wr.344.t:0 "삭방의 봉역"
 china_wr.344.d:0 "북방의 광활한 초원과 황량한 사막이 요동치는 삭방의 땅은 역대로 몽고를 비롯하여 중화의 중심지를 위협하던 거대한 음모와 분리주의자들의 온상이었습니다. 만주와 몽골의 더러운 분리주의 세력들은 중국의 강토를 더럽히며 우리의 정당한 영토를 강탈하여 그들의 것이라 주장하는 뻔뻔한 행태를 이어왔습니다. 그러나 이제 북방의 경계가 확정된 지금 우리는 북방의 영토를 더욱 굳건히 하고 그곳을 개발하여 민국의 풍요로운 강토 중 하나로 만들것입니다."
 china_wr.344.a:0 "북방의 분리주의자들을 완벽히 척결하라."
 china_wr.345.t:0 "중화민국의 전쟁 보상 요구"
 china_wr.345.d:0 "제2차 세계 대전이 종결되고 열도가 우리의 통제하에 들어가자, 대륙의 중화민국 정부가 공식 외교 경로를 통해 강력한 요구를 전달해왔습니다. 그들은 자신들이 일제의 침략으로 인해 가장 오랜 기간 동안 막대한 인적, 물적 피해를 입었음을 강조하며, 현재 우리가 해체 및 징발 중인 일본의 주요 공장과 고성능 기계 설비 중 일부를 전쟁 보상(War Reparations) 명목으로 자신들에게 양도해줄 것을 요구하고 있습니다. 중화민국의 주장은 국제 사회에서도 어느 정도 명분을 얻고 있으며, 만약 이 요구를 전면 거부할 경우 전후 대륙과의 외교 관계는 급격히 냉각될 것입니다. 열도의 산업 자산을 일부 떼어주어 그들의 원한을 달래줄 것인지, 아니면 우리의 전리품을 단 하나도 넘겨주지 않을 것인지 결정해야 합니다."
 china_wr.345.a:0 "그들의 정당한 몫이다."
 china_wr.346.t:0 "양도된 열도의 유산"
 china_wr.346.d:0 "[ROOT.GetName] 정부가 우리의 정당한 권리를 인정하고 일본 본토에서 해체된 주요 공장 설비와 기계류를 보상으로 인도하겠다고 발표했습니다. 비록 일제가 대륙에 남긴 상흔을 모두 치유하기에는 턱없이 부족할지라도, 이번에 들어올 고성능 설비들은 전후 우리 산업 기반을 재건하고 현대화하는 데 상당한 추진력이 될 것입니다. 정부는 즉시 특별 수송단을 편성하여 열도의 자산들을 대륙의 주요 공업 지대로 이송하기 시작했습니다. 이번 결단으로 인해 양국 간의 전후 외교 관계에는 따뜻한 온기가 감돌기 시작했습니다."
 china_wr.346.a:0 "위대한 중화의 재건에 보탬이 될 것이다."
 china_wr.347.t:0 "중화민국의 경제 협력 제안"
 china_wr.347.d:0 "전후 동방의 새로운 질서가 재편되는 가운데, 대륙의 중화민국 정부가 우리에게 긴밀한 경제 협력을 제안해왔습니다. 중국측의 구상은 자신들의 풍부한 지하자원과 광물, 그리고 거대한 배후 시장을 제공하는 대가로 우리가 보유한 정밀 가공 기술과 선진 산업 인프라를 공유받는 것입니다. 이러한 상호 호혜적인 협력은 우리의 전후 재건과 공업화를 가속하고 대륙 시장을 선점할 좋은 기회가 될 수 있지만, 동시에 대륙의 거대한 경제적 영향력 아래 귀속될지도 모른다는 외교적 리스크를 안고 있습니다. 대륙과 반도를 잇는 거대한 경제권 구상에 동참할지, 아니면 독자적인 노선을 고수할지 결정을 내려야 합니다."
 china_wr.347.a:0 "상호 번영을 위해 대륙의 제안을 수용하자."
 china_wr.347.b:0 "거대한 영향력에 종속될 순 없다. 거절하라."
 china_wr.348.t:0 "한-중 경제 협력 체결"
 china_wr.348.d:0 "한국 정부가 우리의 경제 협력 제안을 전격적으로 수용했습니다! 양국은 즉시 공식 무역 협정을 체결하고 국경을 넘는 대규모 물류 및 기술 교류에 착수했습니다. 대륙의 풍부한 원자재가 반도의 공장들로 흘러 들어가는 동안, 한국의 정밀 기계와 산업 기술들이 민국의 주요 공업 지대에 성공적으로 이식되기 시작했습니다. 이번 협정 체결을 통해 양국의 경제적 상호 의존성은 크게 심화되었으며, 동방의 경제 질서는 민국을 중심으로 더욱 공고하고 견고하게 결속되었습니다."
 china_wr.348.a:0 "동방의 공동 번영이 시작되었다."
 china_wr.349.t:0 "경제 협력 무산"
 china_wr.349.d:0 "한국 정부가 우리의 경제 협력 제안을 최종적으로 거부했습니다. 그들은 대륙의 거대한 영향력 아래 귀속되는 것을 경계하며, 자국의 전후 재건을 독자적으로 추진하거나 다른 해외 시장으로 눈을 돌리겠다는 냉담한 반응을 보내왔습니다. 이로 인해 반도와 대륙을 연결하려던 거대한 경제권 구상은 완전히 무산되었으며, 전후 동방 지역에서 확고한 아군을 확보하려던 우리의 외교적 시도 역시 뼈아픈 실패로 끝나고 말았습니다."
 china_wr.349.a:0 "감히 우리의 호의를 거절하다니."
 china_wr.350.t:0 "티베트의 운명"
 china_wr.350.d:0 "중원의 급수탑이자 서방의 거대한 장벽인 티베트 고원이 마침내 민국의 통제 사정권에 들어왔습니다. 내전의 혼란을 틈타 독립을 선포했던 라사의 조정은 지금 민국의 압도적인 군사적 위세 앞에 두려움에 떨고 있습니다. 우리는 이 독립한 티베트를 상대로 최종적인 처분을 내려야 합니다. 과거 청조나 민국 초기의 선례를 따라 이들을 민국의 주권 아래 두되 종교적, 내부적 자치권을 인정하는 자치성정부로 개편하여 유화적으로 복속시킬 것인지, 아니면 라사의 독자적인 세력을 완전히 해체하고 대륙의 정당한 행정구역으로 직접 합병할 것인지 결정해야 합니다. 어느 길을 택하든 고원의 지배권은 다시 중화의 손으로 돌아올 것이나, 라사의 반응은 확연히 달라질 것입니다."
 china_wr.350.a:0 "지난날처럼 자치성정부로 편입시킨다."
 china_wr.350.b:0 "전역을 민국의 영토로 직접 합병한다."
 china_wr.351.t:0 "중화민국의 자치성정부 개편 요구"
 china_wr.351.d:0 "대륙의 주도권을 장악하고 서방으로 진격해 온 중화민국 정부가 라사의 조정에 엄중한 최후통첩을 보내왔습니다. 중국측은 티베트가 과거 중화 천하 질서의 정당한 일부였음을 강조하며, 독자적인 독립 선언을 철회하고 민국 산하의 자치성정부로 복속할 것을 요구하고 있습니다. 이 제안을 수용할 경우, 달라이 라마의 종교적 권위와 내부적인 자치권은 어느 정도 보장받을 수 있으나 외교권과 군사권은 완전히 박탈당해 중국의 번국으로 전락하게 될 것입니다. 거절한다면 민국의 대군이 고원의 험준한 산맥을 넘어 라사로 진격할 것이며, 그 결과는 파멸적인 전면전입니다. 우리는 이 굴욕적인 타협안을 받아들여 왕국의 명맥을 보존할 것인지, 아니면 신성한 강토를 지키기 위해 끝까지 맞서 싸울 것인지 선택해야 합니다."
 china_wr.351.a:0 "자치권을 보장받는 대가로 민국의 권위를 인정한다."
 china_wr.351.b:0 "고원의 주권은 타협의 대상이 아니다!"
 china_wr.352.t:0 "중화민국의 무조건적인 합병 요구"
 china_wr.352.d:0 "대륙을 통일한 중화민국의 거대한 군세가 고원의 국경지대에 집결한 가운데, 라사의 조정에 파멸적인 최후통첩이 당도했습니다. 중국측은 티베트의 독립 정부를 완전히 부정하며, 라사의 조정을 해체하고 전 영토를 민국의 직할 행정구역으로 무조건 합병하겠다는 야욕을 노골적으로 드러냈습니다. 이 요구를 수용하는 것은 티베트라는 국가와 종교적 지배 체제의 완전한 소멸을 의미하며, 고원의 주민들은 중국의 직접적인 통제를 받게 될 것입니다. 이를 거부하는 것은 곧 압도적인 무력을 앞세운 중국군과의 전면전을 뜻하지만, 주권과 신앙을 통째로 말살당하는 치욕을 앉아서 받아들일 수는 없습니다. 막다른 길에 몰린 우리는 최후의 결단을 내려야 합니다."
 china_wr.352.a:0 "유혈 사태를 피하기 위해 무조건 항복한다."
 china_wr.352.b:0 "신앙과 강토를 위해 끝까지 항전하라!"
 china_wr.353.t:0 "티베트의 자치성정부 편입 수락"
 china_wr.353.d:0 "라사의 조정이 우리의 최후통첩에 굴복하여 민국 산하의 자치성정부로 복속되겠다는 뜻을 공식적으로 전해왔습니다. 달라이 라마와 티베트의 지도부는 독자적인 독립 선언을 취소하고 민국의 주권을 인정했으며, 대륙의 법도를 따르기로 서약했습니다. 이로써 우리는 유혈 충돌 없이 중원의 급수탑이자 서방의 거대한 방벽인 티베트 고원을 민국의 영향력 아래 확고하게 귀속시키는 데 성공했습니다. 비록 이들에게 일정한 내부 자치권과 종교적 권위를 허용해주었으나, 외교와 군사적 주도권은 완전히 민국의 손에 들어왔으므로 서부 국경의 안보적 안정이 완벽히 확보되었습니다."
 china_wr.353.a:0 "서방 봉역에 새로운 질서가 세워졌다."
 china_wr.354.t:0 "티베트의 자치 요구 거부"
 china_wr.354.d:0 "라사의 고집스러운 세력들이 우리의 자비로운 자치성정부 개편 제안을 최종적으로 거부했습니다. 그들은 고원의 험준한 지형을 믿고 중화민국의 정당한 권위를 부정하며, 무모한 독립 노선을 끝까지 고수하겠다는 오만한 답변을 보내왔습니다. 평화적인 방법으로 서방 국경을 안정시키려던 우리의 노력은 이들의 불통으로 인해 완전히 무산되었습니다. 이제 남은 수단은 오직 압도적인 무력뿐입니다. 국경지대에 대기 중이던 민국의 정예 군대에 라사 진격 명령을 하달하여, 반역적인 분리주의 세력들을 무력으로 척결하고 고원의 정당한 지배권을 힘으로 쟁취해야 할 시간입니다."
 china_wr.354.a:0 "군대를 전진시켜 라사를 점령하라!"
 china_wr.355.t:0 "티베트의 무조건 항복과 합병 수락"
 china_wr.355.d:0 "민국의 압도적인 군사적 위세와 단호한 기세에 완전히 압도당한 라사의 조정이 결국 무조건 항복을 선언했습니다. 티베트의 지도부는 자신들의 독자적인 통치 기구를 완전히 해체하고, 전 영토를 민국의 직할 행정구역으로 귀속시키는 무조건적인 합병 요구를 전격 수용했습니다. 이로써 고원의 옛 지배 체제는 역사 속으로 사라졌으며, 티베트는 민국의 완벽한 영토로 편입되었습니다. 우리는 단 한 발의 총성도 울리지 않고 서방의 거대한 요충지를 직접 통제하게 되었으며, 즉시 관료와 치안 병력을 파견하여 대륙의 직접적인 행정 규범을 고원 전역에 주입하기 시작했습니다."
 china_wr.355.a:0 "대륙의 강토가 완벽하게 하나가 되었다."
 china_wr.356.t:0 "티베트의 합병 거부와 저항"
 china_wr.356.d:0 "예상했던 대로 라사의 조정이 우리의 무조건적인 합병 요구를 격렬하게 거부했습니다. 그들은 자신들의 국가 체제와 종교적 권위가 통째로 소멸하는 치욕을 받아들이느니, 차라리 히말라야의 험준한 산맥을 천연의 요새로 삼아 끝까지 항전하겠다는 결사적인 의지를 표명해왔습니다. 분리주의자들의 완강한 저항은 평화적인 접수를 불가능하게 만들었으며, 이제 서부 전선에는 거대한 전쟁의 포화가 불가피해졌습니다. 우리는 즉시 국경을 넘어 고원의 전역을 초토화할 대대적인 진격 명령을 승인해야 합니다. 저들의 무모한 저항을 철저히 짓밟고 민국의 깃발을 라사 고공에 휘날릴 때입니다."
 china_wr.356.a:0 "분리주의자들의 영토를 철저히 짓밟아라."
 china_wr.357.t:0 "[FROM.GetName]에 대한 복속 요구"
 china_wr.357.d:0 "민국 정부는 전후 서방 방면의 완전한 안정을 확보하기 위해, [FROM.GetName] 정부를 상대로 우리의 정당한 권위를 인정하고 중화의 천하 질서 아래 복속하라는 엄중한 요구를 전달했습니다. [FROM.GetName](은)는 오랜 세월 동안 대륙의 거대한 영향력과 역사적 궤적을 함께해 온 영역입니다. 이제 그들이 민국의 보호 아래 들어와 유순한 속국으로서 의무를 다할 것인지, 아니면 우리의 강력한 제안을 거부하고 독자적인 노선을 고수하여 파멸적인 대가를 치를 것인지 선택해야 할 시간입니다. 우리는 대륙의 위엄을 앞세워 저들이 현명한 판단을 내리기를 기다리고 있습니다."
 china_wr.357.a:0 "우리의 권위 앞에 무릎 꿇기를 바라자."
 china_wr.358.t:0 "[FROM.GetName]의 복속 요구 수락"
 china_wr.358.d:0 "[FROM.GetName] 정부가 [ROOT.GetName]의 압도적인 위세와 정당한 요구를 전격적으로 수용했습니다! 그들은 민국의 종주권을 공식적으로 인정하고, [ROOT.GetName]의 충성스러운 속국이 되어 대륙의 법도와 외교적 지침을 전적으로 따르겠다고 약속해왔습니다. 이로써 우리는 무력 충돌을 거치지 않고도 서방 국경지대의 핵심 요충지를 우리의 완전한 통제하에 두는 외교적 대승리를 거두었으며, 민국의 천하 질서는 한층 더 공고하게 완성되었습니다."
 china_wr.358.a:0 "현명한 선택을 내렸구나."
 china_wr.359.t:0 "[FROM.GetName]의 복속 요구 거부"
 china_wr.359.d:0 "[FROM.GetName] 정부가 [ROOT.GetName]의 정당한 복속 요구를 최종적으로 거부했습니다. 그들은 대륙의 거대한 영향력 아래 귀속되는 치욕을 받아들이느니, 자신들의 독자적인 주권을 끝까지 수호하겠다는 오만하고 완강한 태도를 고수하고 있습니다. 평화적인 방법으로 그들을 포섭하려던 우리의 외교적 시도는 이들의 불통으로 인해 완전히 무산되었습니다. 이제 남은 수단은 오직 압도적인 무력뿐이며, 대륙의 무서움을 뼈저리게 깨닫게 해줄 때가 왔습니다."
 china_wr.359.a:0 "감히 우리의 호의를 짓밟다니, 대가를 치를 것이다."
 china_wr.360.t:0 "중화민국의 공동 반제국주의 성명 제안"
 china_wr.360.d:0 "대륙의 정세를 안정시킨 중화민국 정부가 모스크바의 크레믈린궁에 공식 외교 사절단을 파견하여 대담한 제안을 건네왔습니다. 중국측은 전후 세계 질서에서 여전히 기득권을 유지하려는 서구 열강의 제국주의적 야욕을 경계해야 한다고 주장하며, 소비에트 러시아와 중화민국의 이름으로 전 세계 피압박 민족들의 해방과 주권 수호를 지지하는 공동 반제국주의 성명(Anti-Imperialist Joint Statement)을 발표하자고 요청했습니다. 이 성명에 동참할 경우 동방 전선에서의 안보적 협조와 아시아 내 영향력 확대에 긍정적인 서막이 될 수 있으나, 동시에 영미를 비롯한 서구 연합국과의 외교적 마찰을 피할 수 없게 될 것입니다. 서방과의 전면적인 냉전을 감수하고 중국의 손을 잡을 것인지, 아니면 이 무모한 도발 행위에 선을 그을 것인지 선택해야 합니다."
 china_wr.360.a:0 "제국주의 타도를 위해 중국과 손을 잡는다."
 china_wr.360.b:0 "서구 열강과의 불필요한 마찰은 피해야 한다. 거절하라."
 china_wr.361.t:0 "소비에트 러시아의 공동 성명 수락"
 china_wr.361.d:0 "소비에트 러시아 정부가 우리의 공동 반제국주의 성명 제안을 전격적으로 수용했습니다! 모스크바와 베이징에서 동시에 발표된 이 역사적인 공동 성명은 전 세계 제국주의 세력의 전횡을 규탄하고 피압박 민족들의 민족 자결주의를 전폭적으로 지지한다는 내용을 담고 있습니다. 이 위대한 외교적 성과를 통해 양국은 유라시아 대륙을 관통하는 강력한 반제 협력 전선을 구축하는 데 성공했으며, 대외적으로 확고한 전략적 동맹 관계를 과시하게 되었습니다. 서구 열강들은 이 거대한 동맹의 출현에 깊은 경계심을 드러내기 시작했습니다."
 china_wr.361.a:0 "제국주의의 종말이 다가오고 있다."
 china_wr.362.t:0 "소비에트 러시아의 공동 성명 거부"
 china_wr.362.d:0 "소비에트 러시아 정부가 우리의 공동 반제국주의 성명 제안을 최종적으로 거부했습니다. 크레믈린궁은 현재의 국제 정세 속에서 서구 열강을 자극하는 무모한 외교적 도발은 러시아의 국익에 도움이 되지 않는다는 냉담한 기조를 유지했습니다. 그들은 대외적으로 평화적 공존을 유지하려 하며, 우리와의 성급한 밀착으로 인해 발생할 안보적 리스크를 피하고 싶어 하는 것이 분명합니다. 이로 인해 유라시아의 두 거인이 결속하여 서구 세력에 맞서려던 우리의 원대한 구상은 무산되었으며, 전후 대 소비에트 러시아 외교 관계는 차갑게 얼어붙게 되었습니다."
 china_wr.362.a:0 "저들은 수정주의자들과 타협하는 길을 택했다."
 china_wr.363.t:0 "대총통 선거 투표용지 부족 사태"
 china_wr.363.d:0 "민국 전역에서 새로운 의회와 정부를 구성하여 정국을 안정시키기 위한 총선거의 투표가 일제히 시작되었으나, 최근 발생한 갑작스러운 정국 변동과 정치적 격변으로 인해 지나치게 급박하고 서둘러 선거를 준비한 부작용이 전국 곳곳의 투표 현장에서 터져 나오기 시작했습니다. 선거관리청의 공식 발표에 따르면, 전국적으로 무려 187개소에 달하는 주요 투표소에서 선거 개시 불과 몇 시간 만에 사전에 현장에 배치되었던 인쇄된 투표용지가 완전히 고갈되어 투표가 전면 중단되는 초유의 파행 사태가 발생했습니다. 이른 아침부터 민국의 주권자로서 소중한 한 표를 행사하기 위해 투표소 앞에 길게 줄을 서 있던 수많은 인민들은 투표용지가 부족해 더 이상 투표를 진행할 수 없다는 관리원들의 황당한 통보를 접하고 깊은 허탈감 속에 발걸음을 돌려야만 했습니다.\n\n선거관리청 당국은 최근의 급변하는 정치 상황과 각 정파 간의 합의에 따라 선거 일정을 무리하게 단축하여 추진하느라 행정적 준비 기간이 절대적으로 부족했으며, 이로 인한 물류 보급 과정의 치명적인 차오와 예상치를 훨씬 뛰어넘은 폭발적인 투표율이 겹쳐 발생한 단순한 행정적 과실이자 우발적 사고일 뿐이라며 고개를 숙였습니다.\n\n그러나 선거 현장을 지켜본 민국의 주권자인 인민들의 시선은 싸늘하기만 합니다. 민주주의의 가장 기본적이고 성스러운 권리인 투표권 행사가 당국의 졸속 행정과 무능함으로 인해 전면 통제되었다는 사실 자체를 이성적으로 용납하기 어려웠기 때문입니다. 야당 성향의 구역뿐만 아니라 전국 각지에서 인민들 사이에는 과연 선거관리청이 단순한 행정적 실수로 이러한 대규모 사태를 빚은 것인지, 아니면 관리 부실을 가장한 의도적인 태만이 존재하는지에 대한 깊은 의구심과 의심이 걷잡을 수 없이 증폭되며 선거 전반의 공정성에 거대한 먹구름을 드리우고 있습니다."
 china_wr.363.a:0 "선거는 신성한 것이다."
 china_wr.364.t:0 "선거용지 부족 사태에 대한 대규모 시위"
 china_wr.364.d:0 "전국적인 개표가 막바지에 이르고 마침내 선거관리청을 통해 민국의 최고 권력자를 선출하는 대총통 선거의 공식 결과가 발표되자, 민국의 정국은 거대한 충격과 걷잡을 수 없는 혼란 속으로 급격히 빠져들었습니다. 당초 압도적인 지지를 바탕으로 무난히 승리할 것으로 예상되었던 국민당 후보의 패배가 최종 확정되는 상상하기 힘든 결과가 나타났기 때문입니다. 선거 당일 발생했던 187개소 투표용지 부족 사태라는 행정적 파행에 이어, 끝내 국민당의 대총통 선거 패배라는 성적표를 공식적으로 받아 들자, 그동안 숨을 죽이고 결과를 기다리던 국민당계 세력과 열성 지지자들의 억눌린 분노가 일제히 폭발했습니다.\n\n국민당계 진영은 선거 준비 과정에서 보여준 정부와 선거관리청의 극심한 졸속함과 투표소 파행이 결국 단순한 실수가 아니라, 국민당 지지층의 표를 인위적으로 억제하고 패배를 유도하기 위해 치밀하게 방치된 거대한 정치적 음모의 결과물이라며 선거 결과에 강력히 반발하고 나섰습니다. 국민당의 전통적인 지지 성향이 강한 주요 대도시의 광장과 핵심 지방 자치 구역을 중심으로 분노한 국민당계 장병들과 인민들이 대거 거리로 쏟아져 나와 산발적인 저항 시위를 가동하기 시작했습니다.\n\n군중은 선거관리청의 즉각적인 해체와 대총통 선거의 원천 무효, 그리고 전면적인 재검표를 요구하며 거리의 치안을 마비시키는 격렬한 규탄 시위를 벌이고 있습니다. 일부 과격화된 지역에서는 흥분한 국민당계 시위대가 지방 정부 청사와 개표소 내부로 강제 진입을 시도하며 이를 저지하려는 행정 당국 및 무장 경찰과 정면으로 충돌하여 부상자가 속출하는 등, 선거 패배 확정 이후의 조직적인 반발은 단순한 소요를 넘어 민국의 정당성을 뒤흔드는 심각한 정국 위기로 치닫고 있습니다."
 china_wr.364.a:0 "선거 결과에 복종할 수 없다!"
 china_wr.365.t:0 "국민당의 선거관리청 공식 고발"
 china_wr.365.d:0 "선거관리청의 공식 발표로 대총통 선거에서의 패배가 최종 확정되자, 국민당 지도부는 이번 선거 과정을 민국의 민주적 가치와 헌정 질서를 송두리째 무너뜨린 조직적인 행정 유린 행위로 규정하고 정면 돌파를 통한 전면 투쟁을 선택했습니다. 급박한 선거 준비를 핑계로 수많은 인민들의 신성한 투표권을 침해하고, 상식적으로 납득하기 어려운 개표 결과를 산출해 낸 선거 당국의 행태에 눈을 감을 수 없었던 국민당 법률지원단과 주요 당직자들은 대검찰청을 직접 방문하여 선거관리청 고위 관료들을 직무유기, 행정남용 및 부정선거 획책 혐의로 정식 고발 조치했습니다.\n\n국민당 대변인은 특별 긴급 기자회견을 통해 선거관리청이 '시국의 급박함과 준비 기간 부족'이라는 비겁한 행정적 변명 뒤에 숨어 민국의 가장 신성한 대총통 선거를 졸속과 부실로 일관하여 관리함으로써 결과적으로 국민당 지지자들의 정당한 권리를 사실상 박탈하고 선거 결과를 심각하게 왜곡시켰다고 강력히 비판했습니다. 이들은 쑨원 선장의 고귀한 삼민주의 정신과 민주적 가치 아래 세워진 민국의 정치적 정당성이 이번 패배 확정 과정에서 철저히 유린당했다며, 법과 인민의 엄중한 이름으로 선거 관리 당국의 모든 예산 집행과 행정 과정을 투명하게 전수 조사해야 한다고 주장했습니다.\n\n국민당의 이 같은 공식 고발 조치로 인해 선거 결과의 복종 여부를 둘러싸고 여야의 갈등은 사법적 공방을 넘어 민국의 행정망과 정치 체제 전체를 마비시키는 전면적인 대치 국면으로 발전하며 정국을 예측 불허의 안개 속으로 밀어 넣었습니다."
 china_wr.365.a:0 "법과 인민의 심판대 위에 저들을 세워라."
 china_wr.366.t:0 "투표함 잉크 투하 사건과 무효표 천만 개"
 china_wr.366.d:0 "전국적인 투표가 공식 마감되고 각급 개표소에서 삼엄한 경비 속에 본격적인 개표 작업이 진행되던 중, 민국의 헌정 역사를 통틀어 가장 추악하고 충격적인 전대미문의 조직적 부정선거 실체가 마침내 백일하에 드러나고 말았습니다. 당초 국민당 후보의 압도적인 표 몰이와 승리가 확실시되던 핵심 지지 지역의 개표소들에서, 수많은 투표함 내부에 봉인되어 있던 투표용지들이 기괴할 정도로 새까만 검은 잉크에 심각하게 오염되어 있는 현장이 연이어 적발된 것입니다.\n\n현장에 상주하던 정당 참관인들과 일부 양심적인 개표원들의 충격적인 폭로에 따르면, 선거관리청 소속의 일부 타락한 요원들과 현 정권에 매수된 선거 사무원들이 개표 직전의 혼란한 틈을 타거나 투표함이 이송되는 보안 취약 과정에서 의도적으로 투표함 내부에 검은 잉크를 주입하는 만행을 저지른 것으로 밝혀졌습니다. 이로 인해 정상적으로 기표되었던 국민당 지지 표들이 순식간에 오염 표로 오인되어 판독 불가능한 무효표로 대거 처리되었으며, 최종적으로 전국적으로 집계된 무효표의 총합이 무려 천만 개에 달한다는 황당하고 부자연스러운 결과가 대중에게 산출되었습니다.\n\n정권과 타락한 관료들이 자신들의 기득권과 권력을 유지하기 위해 조직적으로 감행한 이 노골적이고 잔인한 선거 조작 행위는 공정성을 믿었던 인민들에게 말로 다 할 수 없는 거대한 배신감과 분노를 안겨주었습니다. 분노한 인민들과 국민당계 세력은 이 사태를 민국의 민주주의와 국가 주권에 대한 명백한 반역 행위로 규정했으며, 민국의 정국은 이제 단순한 선거 분쟁이나 법적 공방의 차원을 완전히 넘어 정권의 생포를 건 거대한 혁명적 파국과 내전의 기로로 치닫기 시작했습니다."
 china_wr.366.a:0 "천만 표의 주권이 잉크 속에 짓밟혔다!"
 china_wr.367.t:0 "근심"
 china_wr.367.d:0 "옌후이칭은 밀려오는 피로에 뻐근한 목을 돌리며 겨우 몸을 일으킨 뒤 초점이 흐려진 눈을 비빈 뒤 흘러내린 안경을 고쳐 썼다. 언제 들어왔는지 남편의 굽은 등을 안타깝게 바라보던 아내 선바오쯔가 조용히 다가와 찻잔을 내려놓았다.\n\n"이 사람이, 이리 깊은 밤인데 왜 아직 자지 않고." 옌후이칭이 애써 수척한 얼굴에 미소를 띠며 물었다.\n\n"요 며칠도 그렇고, 오늘은 너무 심란해 보이셔서요."\n\n선바오쯔의 말에 옌후이칭은 씁쓸하게 웃으며 책상 위의 서류를 정리했다. "국정을 돌보다 보면 늘 있는 법이오. 특히나 지금 같은 시국에 온 나라가 고통받고 있질 않소? 이런 때에 가장 높은 자리에 앉은 내가 심란하지 않다면, 오히려 당장 나가 죽어야 마땅하지."\n\n"무슨 말씀을 또 그렇게 모질게 하십니까?"\n"농이요, 농. 부인께선 염려 말고 이만 들어가 주무시구려. 나는 이번 회기 자료들만 조금 더 살펴보고 가리다."\n\n선바오쯔는 돌아서지 않고 책상 앞으로 한 걸음 더 다가와 팔을 기댄 채 옌후이칭의 지친 눈을 똑바로 마주보았다.\n\n"대체 이 나라가 당신에게 무엇이기에 이토록 스스로를 깎아내며 매달리십니까?" 그러자 옌후이칭은 시선을 떨어뜨려 자신 뒤에 세워진 깃대의 오색기를 잠시 바라보더니 입을 열었다.\n\n"결코 퇴폐하여 무너져서는 안 되는 나라니까. 설사 색이 바래고 얼룩질지언정 끝까지 후대에 이어줘야만 하는 그런 나라이니까."\n\n"그렇다면 왜 자신을 돌보는 일에는 그 애착의 반의반도 쓰지 않으십니까? 당신의 몸도 이미 성한 곳이 없는데 말이어요."\n"그야 지금의 나는 오직 한 사람의 몸이고, 이 한 몸이 지탱해야 하는 것은 5억 중화 인민의 안위와 간신히 찾아낸 민주의 길이니까."\n\n"당쟁만 좋아하는 저 자들이 그저 당신을 다루기 쉽다고 이 자리에 앉히셨음을 모르십니까? 왜 그들을 향한 원망 한마디 없으신가요?"\n"뒤집어 생각하면 오직 나만이 지금의 시국에서 중도를 걸을 수 있다는 뜻이겠지."\n\n"참으로 답답합니다." 선바오쯔의 목소리가 젖어 들었다. "당신이 이리 뼈를 깎아 헌신하여도 결국 아무것도 바뀌지 않을 것이 두렵지도 않으십니까?"\n\n잠깐의 정적 이후 옌후이칭은 천천히 자리에서 일어나 아내에게 다가갔다. 오랜 세월 동안 자신의 모진 운명을 묵묵히 함께 이어온 아내를 조용히 끌어안았다.\n\n"...나 역시 무섭소, 하지만 내가 힘쓴다면 더 나아질 거란 기대 정도는 품고 있으니, 그래서 이렇게까지 하는 거외다.""
 china_wr.367.a:0 ""걱정 마시오. 다 괜찮아질 거요.""
 china_wr.368.t:0 "[FROM.GetName]의 굴복 요구"
 china_wr.368.d:0 "[FROM.GetName]에서 보낸 사절이 엄중한 최후통첩을 가지고 도착했습니다. 그들은 자신들의 확장되는 지배력과 우리의 위태로운 입지를 명분으로 삼아, [ROOT.GetName] 정부가 공식적으로 항복하고 자신들의 종주권을 인정할 것을 요구하고 있습니다. 이 메시지에는 오해의 여지가 없습니다. 굴복하기를 거부한다면 이는 곧 적대 행위의 선언으로 간주될 것이며, 즉각적인 군사적 개입으로 이어질 것입니다. 우리는 이제 전면전의 위험을 감수하고 주권을 지켜낼 것인지, 아니면 생존을 위해 그들의 요구에 순응할 것인지에 대한 중대한 갈림길에 직면했습니다."
 china_wr.368.a:0 "그들의 조건을 수용하는 것 외에는 선택지가 없다."
 china_wr.368.b:0 "결코 무릎 꿇지 않을 것이다!"
 china_wr.369.t:0 "[FROM.GetName]의 요구 수락"
 china_wr.369.d:0 "외교 사절로부터 희소식이 전해졌습니다. 우리의 압도적인 국력과 단호한 최후통첩 앞에 [FROM.GetName] 정부는 파멸 대신 신중한 선택을 내렸습니다. 그들은 우리의 조건을 공식적으로 수용하여 우리의 권위에 굴복하고 종주권을 인정했습니다. 이 원활한 굴복 덕분에 유혈 사태 없이 지역 내 우리의 입지를 강화하고, 그들을 우리의 세력권으로 평화롭게 편입할 수 있게 되었습니다."
 china_wr.369.a:0 "현명한 선택이다."
 china_wr.370.t:0 "[FROM.GetName]의 요구 거절"
 china_wr.370.d:0 "[FROM.GetName] 정부가 최종 답변을 보내왔으며, 이는 도전적인 거절이었습니다. 우리의 명확한 경고를 무시하고 그들은 주권을 포기하느니 전면전의 위험을 감수하겠다며 우리의 종주권 요구를 거부했습니다. 그들의 완고한 저항으로 인해 우리에게 남은 선택지는 하나뿐입니다. 외교의 시간은 끝났으며, 이제 군사적 힘을 동원해 그들을 굴복시켜야 합니다."
 china_wr.370.a:0 "그렇다면 전쟁이다."
 china_wr.371.t:0 "[FROM.GetName]의 베트남 요구"
 china_wr.371.d:0 "[FROM.GetName]이 동아시아 전역으로 영향력을 확대함에 따라, 그들의 지정학적 야욕이 마침내 인도차이나에 있는 우리의 이권과 충돌했습니다. 그들의 정부로부터 베트남에 대한 우리의 종주권을 포기하고 해당 지역의 통제권을 자신들에게 양도하라는 공식 요구가 도착했습니다. 그들은 이를 거부할 경우 즉각적인 군사적 충돌이 일어날 것임을 명백히 했습니다. 우리는 취약한 평화를 유지하기 위해 소중한 영토를 포기할 것인지, 아니면 단호히 맞서 전쟁의 불길을 감당할 것인지 결정해야 합니다."
 china_wr.371.a:0 "충돌을 피해야 한다. 베트남을 양도하라."
 china_wr.371.b:0 "베트남은 우리의 것이다. 싸워서 지켜내겠다!"
 china_wr.372.t:0 "[FROM.GetName]의 베트남 양도 수락"
 china_wr.372.d:0 "우리의 압도적인 국력과 외교적 압박 앞에 [FROM.GetName] 정부는 막대한 대가를 치러야 하는 충돌을 피하는 선택을 내렸습니다. 그들은 베트남에 대한 종주권을 우리에게 이양하는 것에 공식적으로 동의했습니다. 이 평화적인 확보 덕분에 단 한 방울의 피도 흘리지 않고 인도차이나 동부 해안의 교두보를 마련할 수 있게 되었습니다."
 china_wr.372.a:0 "훌륭하군."
 china_wr.373.t:0 "[FROM.GetName]의 베트남 거절"
 china_wr.373.d:0 "[FROM.GetName] 정부가 베트남에 대한 우리의 최후통첩을 단호히 거부했습니다. 그들은 필요한 모든 수단을 동원해 인도차이나에서의 이권을 방어하겠다며 우리의 권위에 정면으로 도전했습니다. 외교적 노력이 완전히 수포로 돌아간 지금, 앞으로의 길은 오직 철과 화염으로만 개척할 수 있습니다."
 china_wr.373.a:0 "그들은 파멸을 선택했다."
 china_wr.374.t:0 "[FROM.GetName]의 라오스 요구"
 china_wr.374.d:0 "[FROM.GetName]의 급격한 확장은 그들의 시선을 인도차이나에 있는 우리 국경으로 향하게 만들었습니다. 라오스에 대한 통제권과 종주권을 자신들의 행정부로 즉시 이양하라는 엄중한 외교 문서가 접수되었습니다. 거절은 곧 전면전으로의 즉각적인 에스컬레이션을 의미합니다. 우리는 전면전이 불러올 파멸적인 대가와 라오스의 가치를 저울질해야 합니다."
 china_wr.374.a:0 "평화를 유지하기 위해 라오스를 양도하라."
 china_wr.374.b:0 "라오스의 단 한 치의 땅도 넘겨줄 수 없다!"
 china_wr.375.t:0 "[FROM.GetName]의 라오스 양도 수락"
 china_wr.375.d:0 "우리의 우월한 군대에 저항하는 것이 무의미함을 깨달은 [FROM.GetName]은 라오스에 대한 우리의 요구에 응했습니다. 그들의 식민지 행정부는 물러났으며, 이로써 우리는 해당 영토에 대한 완전한 통제권을 장악하고 메콩강 유역을 따라 전략적인 서부 측면을 안전하게 확보했습니다."
 china_wr.375.a:0 "평화로운 승리로군."
 china_wr.376.t:0 "[FROM.GetName]의 라오스 거절"
 china_wr.376.d:0 "라오스에 대한 우리의 요구가 거센 반발에 부딪혔습니다. [FROM.GetName]은 우리의 지정학적 압박에 굴복하지 않을 것이며, 군사력을 동원해서라도 해당 지역에 대한 지배력을 방어할 준비가 되어 있다고 선언했습니다. 이제 우리는 그들의 완고한 저항을 분쇄하기 위해 군대를 준비시켜야 합니다."
 china_wr.376.a:0 "그들은 파멸을 선택했다."
 china_wr.377.t:0 "[FROM.GetName]의 캄푸치아 요구"
 china_wr.377.d:0 "[FROM.GetName]의 지정학적 영향력이 이제 인도차이나 남부에 남은 우리의 마지막 거점까지 위협하고 있습니다. 그들의 지도부는 캄푸치아에 대한 우리의 종주권을 즉시 인도하라는 최후통첩을 보냈습니다. 그들은 거절할 경우 즉각적인 군사적 침공으로 대응할 것임을 명백히 했습니다. 우리는 굴복과 잔혹한 충돌 중 하나를 선택해야 합니다."
 china_wr.377.a:0 "재앙을 피하기 위해 캄푸치아를 양도하라."
 china_wr.377.b:0 "어디 힘으로 캄푸치아를 빼앗아 보아라!"
 china_wr.378.t:0 "[FROM.GetName]의 캄푸치아 양도 수락"
 china_wr.378.d:0 "우리의 외교적 압박이 다시 한번 성공을 거두었습니다. 파멸적인 정면충돌을 피하고자 했던 [FROM.GetName]은 우리의 최후통첩에 동의하고 캄푸치아에 대한 종주권을 우리 정부에 공식적으로 이양했습니다. 이제 인도차이나 남부는 완전히 우리의 손아귀에 들어왔습니다."
 china_wr.378.a:0 "이 지역은 이제 우리의 것이다."
 china_wr.379.t:0 "[FROM.GetName]의 캄푸치아 거절"
 china_wr.379.d:0 "[FROM.GetName] 당국이 캄푸치아에 대한 우리의 요구를 전면 거부하며 단호한 태도를 취했습니다. 그들은 전장에서 인도차이나 남부의 지배권을 다툴 준비를 마치고 군대를 소집하고 있습니다. 최후통첩의 시간은 끝났으며, 이제 침공을 시작해야 합니다."
 china_wr.379.a:0 "그들은 파멸을 선택했다."
 kuomintag_wr.1.t:0 "권능구분"
 kuomintag_wr.1.d:0 "국민대회 소집과 함께 난징 정부는 훈정 체제의 사상적 토대를 명확히 하고 있습니다. 권능구분은 삼권분립과 다른 이론으로, 국민이 보유하는 정권과 정부가 행사하는 치권을 구조적으로 구별하는 데에 그 의의가 있습니다. 정권은 선거·파면·발안·복결을 통해 국가 방향에 개입할 수 있는 국민의 정치적 권한을 의미하며, 치권은 입법·행정·사법과 더불어 시험권과 감찰권을 포함하는 정부의 통치 기능을 가리킵니다. 이 이론은 국민이 권리를 통해 정부의 능력을 통제하도록 설계된 체계를 지향하고 있으며, 정부가 무능에 빠지지 않으면서도 민의의 통제를 받도록 하는 데 목적을 두고 있습니다. 난징 정부는 권능구분 원리를 제도화함으로써 훈정 단계의 통치 구조를 정비하고 향후 헌정 이행의 기반을 마련하고자 하고 있습니다."
 kuomintag_wr.1.a:0 "이렇게 혁명이 기틀을 잡는다."
 kuomintag_wr.2.t:0 "직능대표"
 kuomintag_wr.2.d:0 "국민대회 구성원 가운데 일부는 직능대표로 선출되고 있습니다. 직능대표는 지리적 구획이 아니라 사회의 기능적 구성 단위를 기준으로 선출되는 대표를 의미합니다. 노동자, 농민, 상공인, 교육계, 전문직 단체 등 각 직능 집단은 자신들의 이해와 요구를 대변할 인물을 선출하여 국민대회에 참여시키게 됩니다. 이러한 방식은 정치가 단순한 지역 이해의 경쟁으로 환원되는 것을 방지하고, 사회 각 부문의 조직적 의사를 제도권 안으로 편입시키려는 취지에서 마련된 것입니다. 직능대표는 국민의 다양한 경제·사회적 기능이 국가 정책 형성 과정에 직접 반영되도록 하는 통로로 작동하고 있습니다."
 kuomintag_wr.2.a:0 "계층과 계급을 대표하는 자들."
 kuomintag_wr.3.t:0 "구역대표"
 kuomintag_wr.3.d:0 "국민대회에는 각 성과 지방을 기반으로 선출되는 구역대표가 포함되고 있습니다. 구역대표는 특정 직능이 아니라 일정한 지리적 범위를 대표하는 인물로서, 해당 지역 주민의 의사를 중앙 정치 구조에 전달하는 임무를 수행합니다. 이는 근대적 대표제의 기본 원리에 따른 것으로, 영토와 인구를 기준으로 한 대표 단위를 통해 전국적 민의를 집약하려는 장치입니다. 구역대표는 지역 경제, 치안, 행정 운영 등 지방 현안과 관련된 문제를 국민대회에서 제기하며, 중앙 정책이 지역 현실과 괴리되지 않도록 조정하는 기능을 담당하고 있습니다."
 kuomintag_wr.3.a:0 "지역의 대표자들."
 kuomintag_wr.4.t:0 "소수자대표"
 kuomintag_wr.4.d:0 "국민대회 구성에는 소수자대표 또한 포함될 수 있습니다. 이는 인구 규모나 정치적 영향력의 한계로 인해 과소대표될 가능성이 있는 집단에게 일정한 의석을 보장함으로써, 민국의 정치 구조가 보다 포괄적인 대표성을 갖도록 하기 위한 장치입니다. 소수자대표는 특정 민족 집단이나 특수한 사회적 이해집단의 관점을 국민대회에 반영하며, 다수 중심의 결정 구조 속에서 소외가 발생하지 않도록 하는 역할을 수행합니다. 이를 통해 국민대회는 단순한 다수결 기관이 아니라, 다양한 구성원의 의사가 공존하는 장으로 기능하고 있습니다."
 kuomintag_wr.4.a:0 "소수자들의 대표."
 kuomintag_wr.5.t:0 "노농대표 선출"
 kuomintag_wr.5.d:0 "국민대회 구성을 위하여 노동자와 농민을 대표하는 직능대표가 새롭게 선출되고 있습니다. 산업 현장과 농촌 사회에서 조직된 집단은 각자의 이해와 요구를 대변할 인물을 추천하고 있으며, 이를 통해 생산과 생계의 문제를 제도권 정치 안으로 편입시키고자 하고 있습니다. 노농대표는 노동 조건과 토지 문제, 생계 안정과 관련된 의제를 국민대회에 제출하는 역할을 맡게 됩니다. 이러한 선출 절차는 국민대회가 사회의 기초적 생산 계층을 제도적으로 포함하고 있음을 보여주는 조치로 진행되고 있습니다."
 kuomintag_wr.5.a:0 "농민과 노동자를 위하여."
 kuomintag_wr.6.t:0 "엘리트와 지식인 대표 선출"
 kuomintag_wr.6.d:0 "국민대회 구성 과정에서 행정 경험과 학문적 전문성을 갖춘 엘리트 및 지식인 계층의 대표가 선출되고 있습니다. 이들은 법제 정비, 재정 운영, 외교 전략, 교육 정책 등 국가 운영 전반에 대한 전문 지식을 바탕으로 국민대회 논의에 참여하게 됩니다. 대표 선출은 복잡한 국가 운영을 제도적으로 뒷받침할 전문 인력을 확보하기 위한 절차로 이해되고 있습니다. 이를 통해 국민대회는 대중 대표성과 함께 정책적 숙고와 행정 역량을 동시에 확보하고자 하고 있습니다."
 kuomintag_wr.6.a:0 "지식인 계층이야 말로 국가의 핵심이다."
 kuomintag_wr.7.t:0 "상무대표 선출"
 kuomintag_wr.7.d:0 "상업과 무역을 담당하는 집단의 이해를 반영하기 위하여 상무대표가 선출되고 있습니다. 상공업, 유통, 금융 및 교역에 종사하는 인물들은 시장 운영과 재정 구조에 대한 경험을 토대로 국민대회에 참여하게 됩니다. 상무대표는 세제, 금융 정책, 산업 진흥과 관련된 논의에 실무적 관점을 제공하는 역할을 맡고 있습니다. 이러한 선출은 경제 활동의 실제 작동 원리가 국민대회 의사 결정 과정에 제도적으로 반영되도록 하기 위한 조치로 이루어지고 있습니다."
 kuomintag_wr.7.a:0 "상업없이는 경제도 없다."
 kuomintag_wr.8.t:0 "다수를 대변하는 직능대표"
 kuomintag_wr.8.d:0 "국민대회에 선출된 직능대표들은 각기 다른 사회 영역을 대표하고 있으나, 그 구성은 결과적으로 민국 사회의 다수를 포괄하고 있습니다. 생산과 유통, 교육과 전문 활동 등 일상적 국가 운영을 구성하는 부문에서 선출된 인물들은 광범위한 사회적 기반을 반영하고 있습니다. 난징 정부는 직능대표 체계가 특정 계층의 특권적 참여가 아니라, 사회 전반을 아우르는 대표 구조임을 강조하고 있습니다. 이를 통해 국민대회는 보다 폭넓은 정권의 토대를 갖추고자 하고 있습니다."
 kuomintag_wr.8.a:0 "다수의 의사를 반영한다."
 kuomintag_wr.9.t:0 "구역대표 공백과 정족수 문제"
 kuomintag_wr.9.d:0 "국민혁명에 참여하지 않은 다수 지역이 호법정부의 통제 아래에 남게 되면서, 해당 구역의 대표 의석은 공백 상태에 놓여 있습니다. 그 결과 국민대회는 법안 발의를 위한 최소 정족수를 충족하지 못하는 상황에 직면하고 있습니다. 이를 방치할 경우 입법 기능 자체가 정지될 우려가 제기되고 있습니다. 한편에서는 기존 지역 조직을 유지하고 있는 당대표를 임시로 구역대표로 선출하여 제도적 연속성을 확보하자는 주장이 제기되고 있으며, 다른 한편에서는 실질적 통제력을 보유한 지역 군사령관을 대표로 선임하여 현실적 권위를 반영해야 한다는 견해가 맞서고 있습니다. 난징 정부는 국민대회의 기능을 유지하기 위한 선택을 내려야 하는 상황입니다."
 kuomintag_wr.9.a:0 "지역 당대표를 선출한다."
 kuomintag_wr.9.b:0 "군사령관을 선출한다."
 kuomintag_wr.10.t:0 "변강 제민족 대표 선출"
 kuomintag_wr.10.d:0 "한족 중심 지역의 주변부에 위치한 변강 지역의 여러 민족을 대표할 인물이 국민대회에 선출되고 있습니다. 몽골, 티베트, 서북과 서남 변경 지역에 거주하는 다양한 집단은 각자의 관습과 이해를 반영할 대표를 추천하고 있습니다. 이 선출은 중앙 정치 구조가 변경 지역의 현실을 제도적으로 수용하려는 조치로 이루어지고 있습니다. 변강 제민족 대표는 자치 문제와 문화적 사안을 국민대회에 제기하며, 민국의 정치 구조가 다민족적 기반 위에 서 있음을 분명히 하고 있습니다."
 kuomintag_wr.10.a:0 "변강의 목소리를 반영한다."
 kuomintag_wr.11.t:0 "보장명액 제도 시행"
 kuomintag_wr.11.d:0 "국민대회 구성의 균형을 위하여 보장명액 제도가 시행되고 있습니다. 이 제도는 여성 의원의 참여를 일정 비율로 확보하여 대표 구조의 포괄성을 높이기 위한 절차입니다. 여성의 정치 참여는 사회 전반의 다양한 경험과 관점을 제도권 안에 편입시키는 계기로 작용하고 있습니다. 보장명액의 시행은 국민대회가 보다 폭넓은 사회 구성을 반영하도록 하는 방향에서 진행되고 있습니다."
 kuomintag_wr.11.a:0 "여성의 참여를 보장한다."
 kuomintag_wr.12.t:0 "몽장위원회 설치"
 kuomintag_wr.12.d:0 "몽골과 티베트 지역의 사무를 전담하기 위하여 몽장위원회가 설치되고 있습니다. 이 기구는 해당 지역의 행정, 문화, 종교 및 자치 문제를 조정하는 역할을 수행하며, 변경 지역 대표와 중앙 정부 사이의 협의 창구로 기능합니다. 몽장위원회의 설치는 지역적 특수성을 제도적으로 인정하는 동시에, 민국의 통치 체계 안에서 통합을 도모하기 위한 조치로 이루어지고 있습니다."
 kuomintag_wr.12.a:0 "변경 사무를 정비한다."
 kuomintag_wr.13.t:0 "소수 대표 체계 정비"
 kuomintag_wr.13.d:0 "변강 제민족 대표, 보장명액 제도, 그리고 관련 위원회 조직을 통합하여 소수 대표 체계가 정비되고 있습니다. 이는 특정 집단에 한정된 조치가 아니라, 다민족 사회의 현실을 정치 구조에 반영하려는 종합적 개편으로 진행되고 있습니다. 국민대회는 다양한 민족과 사회 집단의 참여를 제도적으로 확보함으로써 정권 기관으로서의 대표성을 강화하고 있습니다."
 kuomintag_wr.13.a:0 "소수의 참여를 제도화하라."
 kuomintag_wr.14.t:0 "해외의 동포들"
 kuomintag_wr.14.d:0 "해외 각지에 거주하는 동포 사회는 민국의 정치적 격변과 내전 상황을 주의 깊게 지켜보고 있습니다. 동남아와 미주, 유럽 등지에 형성된 교민 사회는 상업과 교육, 언론 활동을 통해 독자적인 기반을 유지하면서도 본국과의 연계를 이어가고 있습니다. 난징 정부는 재외동포 사회와의 관계를 강화하여 재정적 지원과 국제 여론의 형성을 도모하고자 하고 있습니다. 해외 동포의 참여는 단순한 물질적 후원을 넘어, 민국이 국경을 넘어선 민족 공동체 위에 서 있음을 확인하는 계기로 작용하고 있습니다."
 kuomintag_wr.14.a:0 "동포들의 지원을 환영한다."
 kuomintag_wr.15.t:0 "상하이 공세"
 kuomintag_wr.15.d:0 "남경 정부는 전략적 요충지인 상하이에 대한 공세를 준비하고 있습니다. 상하이는 상업과 금융, 교통이 집중된 핵심 도시로서 정치적 상징성과 군사적 가치가 모두 큰 지역입니다. 난징을 중심으로 정비된 지휘 체계는 병력과 보급을 집중하여 초기 주도권을 확보하려 하고 있습니다. 상하이에 대한 공세는 단순한 점령 작전이 아니라, 혁명의 출발 단계에서 기세를 장악하기 위한 중대한 조치로 간주되고 있습니다. 그 성패는 전선 전반의 사기와 혁명의 향방에 직접적인 영향을 미칠 것으로 판단되고 있습니다."
 kuomintag_wr.15.a:0 "돌격!"
 kuomintag_wr.16.t:0 "상하이 해방"
 kuomintag_wr.16.d:0 "정해진 기한 내에 상하이를 장악함으로써 전선의 주도권이 남경 정부 측으로 넘어가고 있습니다. 상하이는 상업과 금융, 교통의 중심지로서 전략적 가치가 컸으며, 그 확보는 군사적 성과를 넘어 혁명의 정당성을 강화하는 계기로 작용하고 있습니다. 난징을 중심으로 통합된 지휘 체계는 도시와 항만의 통제권을 확립하였으며, 병참과 재정 기반 또한 안정적으로 확보되고 있습니다. 상하이의 해방은 국민혁명의 초기 국면에서 결정적인 전환점으로 평가되고 있습니다."
 kuomintag_wr.16.a:0 "이제 더 많은 지원과 공작이 가능하겠군."
 kuomintag_wr.17.t:0 "남경 국민정부의 합동군사훈련 제안"
 kuomintag_wr.17.d:0 "남경 정부는 소비에트 러시아 정부에 합동군사훈련 실시를 공식 제안하였습니다. 해당 제안은 장교 교류와 교리 연구, 참모 절차의 상호 비교를 포함하고 있으며, 국민혁명의 초기 국면에서 군사적 기반을 강화하려는 목적을 지니고 있습니다. 이는 단순한 외교적 교류가 아니라 실질적인 군사 협력의 틀을 구축하려는 시도입니다. 소비에트 러시아 정부는 이 제안을 승인할지 여부를 결정해야 합니다."
 kuomintag_wr.17.a:0 "합동군사훈련을 승인하라."
 kuomintag_wr.17.b:0 "합동군사훈련을 거절하라."
 kuomintag_wr.18.t:0 "소비에트 러시아와의 합동군사훈련 진행"
 kuomintag_wr.18.d:0 "소비에트 러시아 정부는 남경 정부가 제안한 합동군사훈련을 수락하였습니다. 이에 따라 양측 간 장교 교류와 교리 협력이 개시될 예정이며, 참모 운용 방식과 작전 계획 수립 과정에서도 일정한 변화가 이루어질 것입니다. 남경 정부는 이를 계기로 군제 정비와 전력 강화에 필요한 경험과 기술을 축적할 수 있게 되었습니다. 해당 협력은 국민혁명의 전개 과정에서 군사적 기반을 보강하는 중요한 계기로 작용할 것입니다."
 kuomintag_wr.18.a:0 "협력을 본격화하라."
 kuomintag_wr.19.t:0 "소비에트 러시아가 합동군사훈련을 거절하다"
 kuomintag_wr.19.d:0 "소비에트 러시아 정부는 합동군사훈련 제안을 수용하지 않기로 결정하였습니다. 이는 현 시점에서 군사적 연계를 확대하는 것이 자국의 전략적 계산에 부합하지 않는다는 판단에 따른 것입니다. 남경 정부는 외부 협력에 대한 기대를 조정하고, 독자적인 군제 개편과 전력 보강 방안을 모색해야 하는 상황에 직면하게 되었습니다."
 kuomintag_wr.19.a:0 "다른 선택지를 검토하라"
 kuomintag_wr.20.t:0 "남경 국민정부의 군사고문단 초청"
 kuomintag_wr.20.d:0 "남경 정부는 프랑스 정부에 군사고문단 파견을 요청하였습니다. 해당 요청은 참모 조직의 정비와 전술 교육, 병과 운용 체계 개선을 포함하고 있으며, 국민혁명의 초기 단계에서 지휘 능력을 체계적으로 강화하려는 목적을 지니고 있습니다. 프랑스 정부는 이 요청을 승인할지 여부를 결정해야 합니다."
 kuomintag_wr.20.a:0 "고문단을 파견하라."
 kuomintag_wr.20.b:0 "요청을 거절하라."
 kuomintag_wr.21.t:0 "프랑스 군사고문단 파견"
 kuomintag_wr.21.d:0 "프랑스 정부는 군사고문단 파견을 승인하였습니다. 이에 따라 참모 조직의 정비와 교리 교육이 본격적으로 이루어질 예정입니다. 남경 정부는 이를 통하여 작전 계획 수립 능력과 지휘 통제 체계를 단계적으로 개선할 수 있게 되었습니다. 해당 협력은 군제 현대화의 중요한 전환점으로 평가되고 있습니다."
 kuomintag_wr.21.a:0 "군제 개편을 추진하라."
 kuomintag_wr.22.t:0 "프랑스가 고문단 파견을 거절하다"
 kuomintag_wr.22.d:0 "프랑스 정부는 군사고문단 파견 요청을 거절하기로 결정하였습니다. 이는 외교적 이해관계와 국제 정세를 고려한 결과로 전해지고 있습니다. 남경 정부는 외부 고문에 의존하지 않고 자체 역량을 활용하여 지휘 체계를 정비해야 하는 상황에 놓이게 되었습니다."
 kuomintag_wr.22.a:0 "자체 개혁을 강화하라."
 kuomintag_wr.23.t:0 "남경 국민정부의 장비 라이센스 도입 요청"
 kuomintag_wr.23.d:0 "남경 정부는 이탈리아 정부에 군수 장비의 라이센스 생산을 공식 요청하였습니다. 해당 요청은 단순한 무기 구매가 아니라 기술 이전과 생산 공정 도입을 포함하는 산업 협력 구상입니다. 이는 전선에서의 장비 표준화를 촉진하고, 국내 군수 기반을 장기적으로 강화하려는 목적을 담고 있습니다. 이탈리아 정부는 해당 요청을 승인할지 여부를 결정해야 합니다."
 kuomintag_wr.23.a:0 "라이센스를 승인하라."
 kuomintag_wr.23.b:0 "요청을 거절하라."
 kuomintag_wr.24.t:0 "이탈리아와의 장비 라이센스 체결"
 kuomintag_wr.24.d:0 "이탈리아 정부는 장비 라이센스 도입 요청을 승인하였습니다. 이에 따라 기술 이전과 생산 설비 정비가 이루어질 예정이며, 군수 산업의 구조적 개선이 기대되고 있습니다. 남경 정부는 이를 통하여 장비 공급의 안정성과 표준화를 동시에 달성할 수 있게 되었습니다. 해당 협력은 전력 강화뿐 아니라 산업적 자립 기반 형성에도 영향을 미칠 것입니다."
 kuomintag_wr.24.a:0 "산업 역량을 확충하라."
 kuomintag_wr.25.t:0 "이탈리아가 라이센스를 거절하다"
 kuomintag_wr.25.d:0 "이탈리아 정부는 장비 라이센스 도입 요청을 수용하지 않기로 결정하였습니다. 이는 기술 이전과 군수 협력 확대에 대한 신중한 판단에 따른 것입니다. 남경 정부는 자체 생산 능력을 강화하거나 다른 공급원을 모색해야 하는 상황에 놓이게 되었습니다. 전선의 장비 체계는 당분간 불균형을 감수해야 할 가능성이 있습니다."
 kuomintag_wr.25.a:0 "대안을 모색하라."
 kuomintag_wr.26.t:0 "남경 국민정부의 장비 구매 요청"
 kuomintag_wr.26.d:0 "남경 정부는 미국 정부에 군수 장비 구매를 공식 요청하였습니다. 이는 상업적 계약을 기반으로 소총, 포, 통신 장비 등 주요 물자를 확보하려는 계획입니다. 해당 제안은 동맹 관계의 형성을 전제로 하지 않으며, 재정 자원을 활용한 전력 보강 구상입니다. 미국 정부는 판매를 승인할지 여부를 결정해야 합니다."
 kuomintag_wr.26.a:0 "판매를 승인하라."
 kuomintag_wr.26.b:0 "판매를 거부하라."
 kuomintag_wr.27.t:0 "미국으로부터 장비 구매 성사"
 kuomintag_wr.27.d:0 "미국 정부는 장비 구매 요청을 승인하였습니다. 이에 따라 일정 규모의 군수 물자가 확보될 예정이며, 전선의 장비 부족이 부분적으로 완화될 것입니다. 남경 정부는 재정적 부담을 감수하는 대신 단기간 내 전력 보강을 달성할 수 있게 되었습니다. 이는 군사적 안정성과 병력 운용 효율성에 긍정적 영향을 미칠 것입니다."
 kuomintag_wr.27.a:0 "전력을 증강하라."
 kuomintag_wr.28.t:0 "미국이 장비 판매를 거부하다"
 kuomintag_wr.28.d:0 "미국 정부는 장비 구매 요청을 승인하지 않기로 결정하였습니다. 이는 외교적 고려와 국제 정세를 감안한 판단으로 전해지고 있습니다. 남경 정부는 외부 조달에 대한 기대를 낮추고, 재정과 산업 구조를 재정비하여 자립적 전력 확충 방안을 모색해야 하는 상황에 놓이게 되었습니다."
 kuomintag_wr.28.a:0 "자체 조달을 강화하라."
 kuomintag_wr.29.t:0 "남경 국민정부의 장비 지원 요청"
 kuomintag_wr.29.d:0 "남경 정부는 일본 정부에 제한적 군수 장비 지원을 요청하였습니다. 해당 요청은 공식 동맹을 의미하지 않으며, 단기적 전력 균형 조정을 위한 실리적 제안입니다. 이는 전선의 긴박한 상황을 고려한 선택으로, 외교적 파장을 동반할 수 있는 사안입니다. 일본 정부는 해당 요청을 수락할지 여부를 결정해야 합니다."
 kuomintag_wr.29.a:0 "장비 지원을 승인하라."
 kuomintag_wr.29.b:0 "요청을 거절하라."
 kuomintag_wr.30.t:0 "일본의 장비 지원 수락"
 kuomintag_wr.30.d:0 "일본 정부는 장비 지원 요청을 수락하였습니다. 이에 따라 일정 규모의 군수 물자가 제공될 예정이며, 단기적으로 전선의 압박을 완화할 수 있게 되었습니다. 다만 해당 협력은 국제 인식과 대외 관계에 복합적인 영향을 미칠 수 있는 사안입니다. 남경 정부는 군사적 이익과 외교적 부담을 동시에 고려해야 하는 상황에 놓이게 되었습니다."
 kuomintag_wr.30.a:0 "전선에 집중하라."
 kuomintag_wr.31.t:0 "일본이 장비 지원을 거절하다"
 kuomintag_wr.31.d:0 "일본 정부는 장비 지원 요청을 승인하지 않기로 결정하였습니다. 이는 자국의 전략적 이해를 우선시한 판단으로 평가되고 있습니다. 남경 정부는 외교적 지원 없이 국민혁명을 추진해야 하는 상황에 직면하였으며, 전력 확보를 위한 다른 방안을 강구해야 합니다."
 kuomintag_wr.31.a:0 "독자적으로 대응하라."
 kuomintag_wr.32.t:0 "국민정부가 직면한 복합 위기"
 kuomintag_wr.32.d:0 "국민혁명이 전개되면서 전선과 후방의 여러 문제가 동시에 표면화되고 있습니다. 병력 동원과 조직 확대가 빠르게 이루어졌으나, 이에 상응하는 제도적 정비는 충분히 이루어지지 못하고 있습니다. 일부 부대에서는 지휘 체계의 혼선과 보급 지연이 발생하고 있으며, 후방에서는 재정 압박과 행정적 비효율이 누적되고 있습니다. 외교적 환경 또한 안정적이지 않아 외부 지원에 대한 기대는 제한적입니다. 남경 정부는 이러한 복합적 위기를 체계적으로 정리하지 못할 경우 혁명의 지속 자체가 어려워질 수 있는 상황에 직면해 있습니다."
 kuomintag_wr.32.a:0 "기반을 정비해야 한다."
 kuomintag_wr.33.t:0 "전시 사법 관할 시행"
 kuomintag_wr.33.d:0 "국민혁명이 전개되는 가운데 군 기강과 후방 질서를 동시에 유지하기 위한 특별 사법 관할이 시행되고 있습니다. 남경 정부는 군 기강 위반과 방첩 사안, 전시 치안과 직결된 범죄를 신속히 처리하기 위하여 일부 사건을 군사 관할 하에 두기로 결정하였습니다. 이는 지휘 체계의 권위를 강화하고 명령 집행의 일관성을 확보하려는 조치입니다. 평시와 구별되는 예외적 제도로 운영되며, 전시 효율성과 통제 강화를 우선하는 방향으로 시행되고 있습니다."
 kuomintag_wr.33.a:0 "군사 관할을 실시하라."
 kuomintag_wr.34.t:0 "지도자의 부재"
 kuomintag_wr.34.d:0 "국민혁명이 시작되었으나 이를 대표할 정치적 지도자는 아직 명확히 정해지지 않은 상태입니다. 국민혁명군사위원회는 군사 행동을 지휘하며 상황을 관리하고 있으나, 혁명 자체의 정치적 방향과 정통성을 규정할 중심 인물이 부재한 상황입니다. 이번 혁명은 사전에 치밀하게 준비된 정치 운동이라기보다 우발적인 정세의 격변 속에서 촉발된 사건에 가까웠으며, 그 결과 지도부 역시 장기적인 정치 구상이나 체계적인 권위 기반을 충분히 갖추지 못한 채 행동에 나서게 되었습니다. 이러한 상황은 군사 행동의 속도와 정치적 정당성의 확보 사이에서 긴장을 만들어내고 있습니다. 국민혁명군사위원회 내부에서는 혁명이 단순한 군사 행동에 머무르지 않기 위해서는 이를 상징적으로 대표할 정치 지도자가 필요하다는 의견이 점차 힘을 얻고 있습니다. 혁명의 명분과 방향을 분명히 하기 위해 지도 체계를 정비해야 한다는 인식이 확산되고 있습니다."
 kuomintag_wr.34.a:0 "지도자가 필요하다."
 kuomintag_wr.35.t:0 "난징 당 지도부와의 협의"
 kuomintag_wr.35.d:0 "국민혁명군사위원회는 혁명의 정치적 정당성을 정립하기 위하여 난징의 국민당 지도부와 협의를 시작하고 있습니다. 군사 행동만으로는 혁명의 명분과 정치적 권위를 충분히 확보할 수 없다는 판단이 내려졌기 때문입니다. 당 조직은 여전히 국민당 내부에서 가장 중요한 정치적 권위를 보유하고 있으며, 혁명의 성격과 목표를 규정할 수 있는 위치에 있습니다. 회의에서는 혁명의 명분을 어떤 방식으로 정리할 것인지, 그리고 이를 대표할 지도자를 어떠한 방식으로 추대할 것인지가 주요 의제로 논의되고 있습니다. 일부 인사들은 최근 확산된 부정선거 논란을 혁명의 정치적 구호로 채택해야 한다고 주장하고 있습니다. 이를 통해 기존 정권의 정통성을 부정하고 국민혁명의 정당성을 주장할 수 있다는 의견이 제기되고 있습니다. 국민혁명군사위원회와 난징 당 지도부 사이의 협의는 혁명의 정치적 기반을 확립하기 위한 중요한 단계로 진행되고 있습니다."
 kuomintag_wr.35.a:0 "논의를 진행하라."
 kuomintag_wr.36.t:0 "왕징웨이의 추대"
 kuomintag_wr.36.d:0 "난징 당 지도부와 국민혁명군사위원회의 협의 끝에 국민혁명의 정치적 구호와 지도 체계가 정리되었습니다. 혁명의 명분으로는 최근 제기된 부정선거 논란이 공식적으로 채택되었으며, 이를 통해 기존 정권의 정통성을 부정하는 정치적 논리가 마련되었습니다. 이러한 구도 속에서 혁명을 대표할 지도자로 왕징웨이가 추대되었습니다. 그는 국민당 내부에서 오랫동안 활동해 온 정치 인물로서 일정한 상징성과 정치적 기반을 갖추고 있으며, 혁명을 정치적으로 대표할 수 있는 인물로 평가되었습니다. 국민혁명군사위원회는 왕징웨이를 혁명의 지도자로 인정하고 그를 총통으로 추대하기로 결정하였습니다. 이를 통해 국민혁명은 군사 행동에 머무르지 않고 정치적 지도 체계를 갖춘 형태로 정비되기 시작하고 있습니다."
 kuomintag_wr.36.a:0 "왕징웨이를 총통으로."
 kuomintag_wr.37.t:0 "국민당 유격활동의 확산"
 kuomintag_wr.37.d:0 "국민당 세력은 정규전 외에도 후방 지역에서 유격 활동을 확대하고 있습니다. 소규모 부대가 교통망과 보급선, 행정 거점을 기습적으로 공격하며 통제 지역의 안정성을 흔들고 있습니다. 이러한 활동은 전선 자체의 군사적 압박보다 후방 질서를 교란하는 데 초점을 두고 있으며, 각지의 군정과 행정 조직에 부담을 주고 있습니다. 일부 지역에서는 철도와 통신선이 반복적으로 파괴되고 있으며, 보급 수송 역시 차질을 겪고 있습니다. 호법정부는 이러한 유격 활동이 장기적으로 통제력 자체를 약화시킬 수 있다고 판단하고 있습니다. 이에 따라 군과 치안 조직은 유격대를 색출하고 근거지를 제거하기 위한 대규모 소탕 작전을 준비하고 있습니다. 후방 지역의 안정성을 회복하기 위해 보다 강력한 대응이 요구되고 있습니다."
 kuomintag_wr.37.a:0 "초국 작전을 실시하라."
 kuomintag_wr.38.t:0 "'무자비'"
 kuomintag_wr.38.d:0 "청야작전이 본격적으로 시행되면서 전선 인근 지역의 상황은 빠르게 변화하고 있습니다. 군 지휘부는 적이 활용할 수 있는 식량과 보급 물자를 철저히 제거하라는 명령을 내렸으며, 이에 따라 마을과 창고, 농지까지 광범위한 파괴가 이루어지고 있습니다. 이러한 조치는 적의 보급 능력을 약화시키는 데 효과적일 수 있으나, 동시에 민간 사회에도 상당한 부담을 초래하고 있습니다. 일부 지역에서는 주민들의 이주가 발생하고 있으며, 경제 활동 또한 급격히 위축되고 있습니다. 그럼에도 불구하고 남경 정부는 전선의 유지가 최우선 과제라는 판단 아래 작전을 지속하기로 결정하고 있습니다. 전쟁의 논리는 점점 더 가혹해지고 있으며, 군 지휘부는 이러한 조치가 불가피하다고 보고 있습니다."
 kuomintag_wr.38.a:0 "전쟁은 자비를 허락하지 않는다."
 kuomintag_wr.39.t:0 "중산함 수병반란"
 kuomintag_wr.39.d:0 "북양 해군 소속 '중산함'에서 수병들이 집단적으로 반란을 일으켰다는 소식이 전해졌습니다. 함선은 통제권을 상실한 채 상해항으로 향하고 있으며, 그 과정에서 지휘 체계는 완전히 붕괴된 상태로 알려지고 있습니다. 단순한 군기 문란이나 우발적 사건으로 보기에는 그 상징성이 지나치게 크다는 점이 문제로 지적되고 있습니다. '중산함'이라는 명칭은 혁명의 상징과도 결부되어 있으며, 이번 사건은 자연스럽게 정치적 해석을 불러일으키고 있습니다. 일부에서는 이를 국민혁명의 흐름과 연결지어 해석하려 하고 있으며, 다른 한편에서는 군 내부의 불안정성이 드러난 징후로 보고 있습니다. 난징 정부는 이 사건이 확산될 경우 정치적 파장이 매우 클 수 있다고 판단하고 있으며, 이를 어떻게 규정하고 대응할 것인지에 대한 논의가 진행되고 있습니다."
 kuomintag_wr.39.a:0 "사태를 주시하라."
 kuomintag_wr.40.t:0 "폭발하는 분노"
 kuomintag_wr.40.d:0 "리쭝런은 허탈함과 분노에 차 지휘본부 탁상을 주먹으로 거칠게 내리쳤다. "이런 씹... 개 같은 놈들!" 입에서 절로 쌍욕이 터져 나왔다.\n\n전방에서 쏟아지는 호법군의 공세는 거침없었다. 놈들은 꼴에 중앙정부라고 군기잡힌 병력과 안정적인 물자를 바탕으로 잘 뻐겨대고 있었다. 지금 이 지옥 같은 장강 최전선에서 그들의 총알을 맨몸으로 받아내고 있는 것이 리쭝런의 광서군을 비롯해 딱하기도 짝이 없는 지방군 장병들이 아니였다면 호법군을 칭찬했으리라.\n\n멍청한 왕씨와 장씨 일파가 아끼고 아끼는 중앙군은 이 참혹한 사지에 단 한 명도 보이지 않았다. 조금만 머리를 굴려보면 알 수 있는 것이, 왕씨와 장씨가 애지중지 키운 중앙군을 어디 전선에 보내고 싶겠는가? 깊숙하고 안전한 곳에 웅크린 채 쥐새끼처럼 병력을 온존하는 것이 그들 입장에선 합리적인 선택이었을 테다. 물론 리쭝런도 저 자리에 있었다면 그들에게 동감했겠지만, 저들도 전선에 나와 멍청한 똘마니들이 총 들고 돌격하는 걸 지휘해야 하는 자신의 입장이 되어보면 마음이 달리질 것이다.\n\n차라리 보급이라도 제대로 주면 불멘소리 하지 않을 터였다, 헌데 그리하였으면 한 달 치 포탄이랍시고 받은 것이 세 시간도 안 되어서 동을 드러내지 않았겠지.\n\n"좆같아서 정말 못 해 먹겠군! 그나마 장가놈은 머리가 돌아가는 편이라 듣는 시늉이라도 하지, 왕가놈은 그 천성이 펜데만 굴리는 범생이 아닌가?"\n\n뭐, 우리가 공세를 취하며 북진하면 호법을 자칭하는 한간 세력의 폭정에 신음하던 애국 동포들이 후방에서 일제히 무장 봉기하여 호응할 것이고, 그렇게 호법정부가 내우외환에 빠져 붕괴하면 애국심으로 똘똘 뭉친 국민혁명군이 청천백일기를 북경에 꽃는다는 아이들 동화같은 망상을 진지하게 전략으로 박아넣은 놈들이 정상이겠는가? 애국심으로 무장한 국민혁명군 장병들에 중국 만민이 호응...지랄. 내 새끼들은 배를 곯아가며 진흙탕 속에서 사지가 찢겨나가는데 남경에 틀어앉은채 저딴 신박한 개소리나 지껄이다니. 이들은 누군가의 아버지이자 누군가의 아들들이란 말이었다!"
 kuomintag_wr.40.a:0 "도대체 포탄은 어디 있는 거냐, 이 개새끼들아!"
 kuomintag_wr.41.t:0 "편지"
 kuomintag_wr.41.d:0 "장강 전구 사령관 리쭝런이 요청합니다.\n\n광서군과 각 지방군 장병들은 현재 호법군 측의 압도적인 화력 앞에서도 중화민국의 존망과 신해정신을 지키기 위해 결사보국의 자세로 임하고 있습니다. 우리 장병들은 국민혁명과 쑨원 각하의 유훈을 위해 기꺼이 목숨을 던질 준비가 되어 있으나 작금의 전황은 단순히 정신력만으로 버티기엔 한계에 다다랐음을 직언드리고자 합니다.\n\n위원장께서 하달하신 공세 명령은 물론 그 효용성이 적지 않으나 현장의 실상은 처참하기 이를 데 없습니다. 지난번 보급해주신 한 달 치 포탄은 적의 파상공세를 막아내는 과정에서 불과 몇 시간 만에 전량 소진되었습니다. 후방 봉기 유도 또한 호법군 측의 철저한 봉쇄와 선전 탓에 기약 없게 되었습니다. 감히 조언컨데 민중이 일어서기를 기다리기 전 당장 국민혁명을 위해 싸우는 장병들의 굶주린 배와 총알을 먼저 살펴주십시오.\n\n민국의 안위가 백척간두에 서 있는 지금 어찌 중앙과 지방의 구분이 있을 수 있겠습니까? 후방에서 온존하여 때를 기다리고 있는 중앙군과 물자를 일부 이곳 장강으로 나누어 주십시오.\n\n- 장강 사령관 리쭝런 배상."
 kuomintag_wr.41.a:0 "개봉되지도 않은 채 불태워졌다."
 kuomintag_wr.42.t:0 "왕씨와 장씨에게"
 kuomintag_wr.42.d:0 "남경 하늘은 어떻습니까? 푸르른지요? 이곳 장강의 하늘은 제 새끼들의 살점이 타들어 가는 검은 연기로 가려져 해가 뜬 지 진작에 며칠은 지난 것 같습니다. 두 분께서 보내주신 답장은 읽은 뒤 제 마음을 차분히 정리하는 것에 아주 유용하게 썼습니다. 저희가 장강을 건너 공세를 취하면 애국 동포들이 들고일어나 봉기가 일어날 것이니 정신력으로 버티시라는 좆 빠지는 조언이 인상깊었습니다.(제가 이 전선에 있으면서 보낸 편지가 수십인데 그 절반에서 같은 대답이 나온 것 다 기억하고 있습니다.)\n\n각설하자면 저 리쭝런은 왕씨와 장씨께서 작금의 전쟁이 나관중의 삼국지연의로 만든 탁상놀이와도 같이 느껴지시는지 묻고 싶습니다, 탁상머리에 머리 좋은 분들이 둘러앉으셔서 지도 위에 빨간색 선을 죽죽 그어대시면 호법 놈들의 진지가 종이 쪼가리처럼 쿵 하니 찢어지고 사실 이때까지 숨어있던 애국 동포들이 와아하고 죽창이라도 들고일어날 줄 아셨습니까? 참으로 지나가던 개자식이 웃다 쓰러질 지랄 맞은 상상이로군요, 지금 당장 두 분의 대가리를 깨부수고 싶은 게 저와 제 새끼들의 솔직한 심정입니다.\n\n한 달 치 보급품이랍시고 남경의 똑똑하신 분들께서 생색내며 보내준 쥐좆만한 포탄과 화약 덩어리들은 세 시간 만에 바닥이 났습니다. 예, 세 시간입니다. 똑똑히 들어주십시오, 야 이 개새끼들아. 지금 진흙탕 속에서 창자가 쏟아지고 사지가 찢겨나가는 것이 느그들이 그토록 아끼고 핥아대는 잘난 중앙군이 아니라 좋더냐? 광서랑 사천에서 농사나 짓다 끌려온 열여섯, 열일곱 살배기 핏덩이들이다! 어미 젖내도 안 가신 새끼들이 니들이 후방에 꽁꽁 숨겨둔 중앙군을 대신해서 싼값에 잡병 노릇을 하니 우리 어머니께서 그것 때문에 웃겨 돌아가신 모양이다!\n\n대체 호법에 맞서 열심히 분투한다던 중앙군은 어느 좋은 기생집에 숨어 있는 거냐!? 나에게도 넌지히 알려줘라, 당장 내 병사들을 이끌고 가서 기생년들을 포함해 싸그리 불태워 땔감으로 만들어버릴 테니까. 진보당과 중청당 놈들이 설치게 둔다면 중화민국이 끝장난다고 개거품을 물더니 왜 죽어 나가는 건 언제나 우리들이냐?! 이참에 거추장스러운 나 이종인이와 멍청한 똘망들 전선에서 다 갈아 없애버리고 전쟁이 끝나면 그 온존해 둔 중앙군으로 권력을 독식하겠다는 그 얄팍하고 더러운 사고야 뻔하지, 그런데 똑똑히 봐라, 씨발 개새끼들아! 이들은 누군가의 아버지이고, 씨발, 누군가의 아들들이란 말이다! 애미 젖이나 쳐먹고 와야 할 핏덩이들 시체를 눈 똑똑히 보라고, 이 창녀만도 못한 개새끼들아!\n\n정말 마지막으로 좆같은 중화민국 만세다, 이 십장생들아."
 kuomintag_wr.42.a:0 "탄약도 안 주는 쓸모없는 개새끼들은 내세에서 업보나 쳐받아라."
 kuomintag_wr.43.t:0 "리쭝런의 제안"
 kuomintag_wr.43.d:0 "중산함에서의 수병혁명은 호법정부의 불법적이고 억압적인 행태와 국민혁명의 정당성을 보여주는 위대한 일례라고 볼 수 있을 것이라는 리쭝런의 제안이 장왕정부에 도착했습니다. 사건의 정치적 중대성과 함명인 '중산함'이 혁명의 아버지 쑨원으로 부터 온 것임을 감한 할 때 이는 단순한 사건 하나로 넘어갈 일이 아니라고 리쭝런은 주장하였습니다.\n\n리쭝런은 장왕정권에 중산함 방문과, 수병독려를 요구하였으며 이 또한 국민혁명 전투의 하나라고 주장하며 정부가 공적을 세운 군인에게 치하하는 것은 지극히 당연한 일이라 말하였습니다. 장왕정권은 현재로서는 이에 대한 공식적입 답변을 하지 않고있지만 이 제안에 대해 정치권에서도 많은 말이 오가는 만큼 빠른 시일 내에 어떠한 대응이 있으리라 보고있습니다."
 kuomintag_wr.43.a:0 "장제스가 공로를 치하하는데 능숙하다."
 kuomintag_wr.43.b:0 "왕징웨이가 중산함으로 갈것이다."
 kuomintag_wr.43.c:0 "불평쟁이의 헛소리다. 무시해라."
 kuomintag_wr.44.t:0 "중산함 사건"
 kuomintag_wr.44.d:0 "장제스는 중산함 사건을 국민혁명의 정당성을 강조할 기회로 삼고 직접 상해로 향했습니다. 수행원들과 함께 중산함에 승선한 그는 수병들을 격려하며 사기를 끌어올리려 했습니다.\n\n그러나 방문이 진행되던 도중, 상황은 돌연 급변했습니다. 리쭝런을 따르는 CC단 세력이 무장한 채 선내로 들이닥쳤고, 곧바로 총격이 시작되었습니다. 좁은 함내에서 벌어진 교전은 짧았으나 치명적이었습니다.\n\n장제스와 그의 수행원들은 대응할 틈도 없이 쓰러졌으며, 생존자는 거의 남지 않았습니다. 사건 직후 시신들은 바다로 던져졌고, 중산함은 침묵 속에 잠겼습니다.\n\n이 사건은 단순한 충돌이 아니라 국민당 내부 권력 투쟁의 분수령이 될 것으로 보입니다."
 kuomintag_wr.44.a:0 "총성이 모든 것을 바꾸었다."
 kuomintag_wr.45.t:0 "중산함 사건"
 kuomintag_wr.45.d:0 "왕징웨이는 중산함 사건을 정치적으로 활용하기 위해 직접 상해로 향했습니다. 그는 중산함을 방문하여 수병들을 격려하고, 이를 국민혁명의 정당성을 강화하는 계기로 삼으려 했습니다.\n\n그러나 방문 도중, 예상치 못한 사태가 발생했습니다. 리쭝런을 따르는 CC단 세력이 무장한 채 선내에 돌입하였고, 즉각적인 총격전이 벌어졌습니다. 준비되지 않은 상태에서 왕징웨이 측은 제대로 대응하지 못했습니다.\n\n짧은 시간 안에 모든 것이 끝났습니다. 왕징웨이와 수행원들은 현장에서 사망하였고, 시신들은 바다로 유기되었습니다. 사건 이후 선내는 정적에 휩싸였습니다.\n\n이 사건은 국민당 내부의 균열이 더 이상 숨길 수 없는 수준에 이르렀음을 보여주고 있습니다."
 kuomintag_wr.45.a:0 "총성이 모든 것을 바꾸었다."
 kuomintag_wr.46.t:0 "[KMT.capital.GetCapitalVictoryPointName] 정변!"
 kuomintag_wr.46a.desc:0 "중산함에서 장제스가 CC단에 의해 암살당한데 이어 리쭝런의 국민당 우파 장교단이 [KMT.capital.GetCapitalVictoryPointName] 정부청사를 습격하였습니다. 경비대가 장교단의 습격을 방어하는데에는 성공하였으나 이로써 국민당이 분열의 국면에 맞닥뜨리게 되었다는 것은 자명해 졌으며 리쭝런이 장왕정권에 대항하여 맞설것이 확실시 되었습니다.\n\n여전히 중국의 혼란이 극에 달한 가운데 발생한 이 일련의 사건은 국민당을 기존보다 더욱 약체화 할 것이며 전황을 불리하게 이끌 것입니다. 비록 정변이 실패했다고는 하나 리쭝런과 그의 군대는 여전히 굳건하기 때문에, 그들은 숙청 당하지 않기 위해 빠르게 행동을 진행할 것으로 보입니다."
 kuomintag_wr.46b.desc:0 "중산함에서 왕징웨이가 CC단에 의해 암살당한데 이어 리쭝런의 국민당 우파 장교단이 [KMT.capital.GetCapitalVictoryPointName] 정부청사를 습격하였습니다. 경비대가 장교단의 습격을 방어하는데에는 성공하였으나 이로써 국민당이 분열의 국면에 맞닥뜨리게 되었다는 것은 자명해 졌으며 리쭝런이 장왕정권에 대항하여 맞설것이 확실시 되었습니다.\n\n여전히 중국의 혼란이 극에 달한 가운데 발생한 이 일련의 사건은 국민당을 기존보다 더욱 약체화 할 것이며 전황을 불리하게 이끌 것입니다. 비록 정변이 실패했다고는 하나 리쭝런과 그의 군대는 여전히 굳건하기 때문에, 그들은 숙청 당하지 않기 위해 빠르게 행동을 진행할 것으로 보입니다."
 kuomintag_wr.46c.desc:0 "리쭝런의 국민당 우파 장교단이 [KMT.capital.GetCapitalVictoryPointName] 정부청사를 습격하였습니다. 경비대가 장교단의 습격을 방어하는데에는 성공하였으나 이로써 국민당이 분열의 국면에 맞닥뜨리게 되었다는 것은 자명해 졌으며 리쭝런이 장왕정권에 대항하여 맞설것이 확실시 되었습니다.\n\n여전히 중국의 혼란이 극에 달한 가운데 발생한 이 일련의 사건은 국민당을 기존보다 더욱 약체화 할 것이며 전황을 불리하게 이끌 것입니다. 비록 정변이 실패했다고는 하나 리쭝런과 그의 군대는 여전히 굳건하기 때문에, 그들은 숙청 당하지 않기 위해 빠르게 행동을 진행할 것으로 보입니다."
 kuomintag_wr.46.a:0 "리쭝런은 반역자다!"
 kuomintag_wr.46.b:0 "장왕의 위선을 타도하자!"
 kuomintag_wr.47.t:0 "[KMT.capital.GetCapitalVictoryPointName] 정변!"
 kuomintag_wr.47a.desc:0 "중원은 이제 너무 혼란하여 더 이상 그 어떤 일이 일어나도 놀라게 할 수 없을 것이라 믿었습니다. 하지만 오늘 예상을 깨고 믿을 수 없는 일이 일어났습니다. 국민정부의 수도인 [KMT.capital.GetCapitalVictoryPointName]에서 리쭝런의 장교단이 쿠데타를 시도한 것입니다. 이 쿠데타 시도는 중산함에서 장제스가 암살당함과 동시에 일어났으며 사전부터 치밀하게 계획되었던 것으로 보입니다.\n\n리쭝런의 쿠데타는 비록 실패했지만 그의 세력은 여전히 국민당 내에서 막강한 세를 떨치고 있습니다. 대부분의 정치학 전문가들은 리쭝런이 곧이어 또다른 행동을 취할것으로 분석하고 있습니다. 중국의 혼란이 또 다시 더해집니다."
 kuomintag_wr.47b.desc:0 "중원은 이제 너무 혼란하여 더 이상 그 어떤 일이 일어나도 놀라게 할 수 없을 것이라 믿었습니다. 하지만 오늘 예상을 깨고 믿을 수 없는 일이 일어났습니다. 국민정부의 수도인 [KMT.capital.GetCapitalVictoryPointName]에서 리쭝런의 장교단이 쿠데타를 시도한 것입니다. 이 쿠데타 시도는 중산함에서 왕징웨이가 암살당함과 동시에 일어났으며 사전부터 치밀하게 계획되었던 것으로 보입니다.\n\n리쭝런의 쿠데타는 비록 실패했지만 그의 세력은 여전히 국민당 내에서 막강한 세를 떨치고 있습니다. 대부분의 정치학 전문가들은 리쭝런이 곧이어 또다른 행동을 취할것으로 분석하고 있습니다. 중국의 혼란이 또 다시 더해집니다."
 kuomintag_wr.47c.desc:0 "중원은 이제 너무 혼란하여 더 이상 그 어떤 일이 일어나도 놀라게 할 수 없을 것이라 믿었습니다. 하지만 오늘 예상을 깨고 믿을 수 없는 일이 일어났습니다. 국민정부의 수도인 [KMT.capital.GetCapitalVictoryPointName]에서 리쭝런의 장교단이 쿠데타를 시도한 것입니다. 이 쿠데타 시도는 사전부터 치밀하게 계획되었던 것으로 보입니다.\n\n리쭝런의 쿠데타는 비록 실패했지만 그의 세력은 여전히 국민당 내에서 막강한 세를 떨치고 있습니다. 대부분의 정치학 전문가들은 리쭝런이 곧이어 또다른 행동을 취할것으로 분석하고 있습니다. 중국의 혼란이 또 다시 더해집니다."
 kuomintag_wr.47.a:0 "내전 중에 또 내란이라고?"
 kuomintag_wr.48.t:0 "[KMT.capital.GetCapitalVictoryPointName]의 가장 긴 밤"
 kuomintag_wr.48.d:0 "정변 시도가 실패로 끝난 직후, 난징은 깊은 정적에 잠겼습니다. 총성과 혼란이 가라앉은 뒤에도 도시는 쉽게 안정을 되찾지 못했습니다. 정부청사 일대에는 여전히 긴장이 감돌고 있었고, 병력과 헌병대가 주요 거점을 장악한 채 밤을 지키고 있었습니다.\n\n지도부 내부에서는 충격과 의심이 교차하고 있었습니다. 누구를 신뢰할 수 있는지, 어디까지가 안전한지 누구도 확신하지 못하고 있었습니다. 일부 인사들은 즉각적인 숙청을 주장했으며, 다른 이들은 추가적인 균열을 우려하며 신중한 대응을 요구하고 있었습니다.\n\n한편 도시의 시민들은 이 모든 상황을 불안 속에서 지켜보고 있었습니다. 권력의 중심에서 벌어진 이 사건은 단순한 소동이 아니라, 국가의 방향 자체가 흔들리고 있음을 보여주고 있었습니다.\n\n이 밤은 길어질 것입니다. 그리고 이 밤이 끝날 때, 남경정부의 권력 구조는 이전과 같지 않을 것입니다."
 kuomintag_wr.48.a:0 "밤은 아직 끝나지 않았다."
 kuomintag_wr.49.t:0 "먼지가 가라앉은 뒤"
 kuomintag_wr.49.d:0 "정변 시도와 연이은 사건들이 끝난 뒤, [KMT.capital.GetCapitalVictoryPointName]은 겉으로는 다시 질서를 되찾은 듯 보였습니다. 거리에는 군과 경찰이 배치되어 있었고, 정부청사는 다시 정상적인 기능을 회복하고 있었습니다. 그러나 이는 어디까지나 표면적인 안정에 불과했습니다.\n\n지도부 내부에서는 여전히 불신과 긴장이 남아 있었으며, 각 파벌은 서로를 경계하며 움직이고 있었습니다. 이번 사태로 인해 누가 충성스럽고, 누가 기회를 노렸는지는 분명히 드러났습니다. 일부 인사들은 조용히 자리에서 물러났고, 다른 이들은 더 강한 입지를 확보하려 하고 있었습니다.\n\n전선 또한 영향을 피하지 못했습니다. 내부 혼란으로 인해 지휘 체계는 일시적으로 흔들렸으며, 그 여파는 아직 완전히 해소되지 않았습니다.\n\n먼지는 가라앉았습니다. 그러나 그 아래 드러난 균열은 결코 사라지지 않았습니다."
 kuomintag_wr.49.a:0 "이제부터가 시작이다."
 kuomintag_wr.50.t:0 "옥석을 가리다"
 kuomintag_wr.50.d:0 "정변 시도 이후 국민당 내부의 균열은 더 이상 감출 수 없는 수준에 이르렀습니다. 남경 정부는 이번 사태를 단순한 반란으로 치부하지 않고, 당의 존립을 위협하는 중대한 도전으로 규정하였습니다.\n\n리쭝런을 중심으로 한 우파 장교단은 이미 충성의 한계를 넘어선 것으로 간주되었으며, 그를 따르거나 동조한 인물들 또한 철저한 조사 대상이 되었습니다. 당 내부에서는 더 이상 관용이나 타협을 주장하는 목소리가 힘을 얻지 못하고 있으며, 오히려 강경한 조치를 요구하는 의견이 주류를 이루고 있습니다.\n\n이에 따라 남경 정부는 '옥석을 가린다'는 명분 아래 대대적인 숙청을 개시하기로 결정하였습니다. 충성스러운 자와 그렇지 않은 자를 명확히 구분하고, 불순 요소를 제거함으로써 당의 통일된 지휘 체계를 회복하려는 것입니다.\n\n이 과정은 결코 조용히 끝나지 않을 것입니다. 그러나 지금의 혼란을 수습하기 위해서는 피할 수 없는 선택으로 여겨지고 있습니다."
 kuomintag_wr.50.a:0 "쓸어버려!"
 kuomintag_wr.51.t:0 "육참골단"
 kuomintag_wr.51.d:0 "정변 실패 이후, 리쭝런의 일부 병력은 이미 고립된 상태에 놓였습니다. 남경 정부군은 빠르게 반격에 나섰고, 통신선이 끊긴 부대들은 각개격파의 위기에 처해 있습니다.\n\n참모들은 구조 작전을 주장했으나, 이는 남은 전력을 모두 위험에 빠뜨릴 가능성이 높았습니다. 이미 계획은 무너졌고, 시간 또한 충분하지 않았습니다. 이들을 구출하려 한다면, 리쭝런 자신과 핵심 병력마저 포위될 위험이 있었습니다.\n\n결국 결단이 내려졌습니다. 고립된 부대는 포기됩니다.\n\n남겨진 병력은 끝까지 저항할 것이며, 그 사이 핵심 세력은 철수하여 재기를 도모할 것입니다. 전장을 떠나는 것은 치욕이지만, 지금 필요한 것은 생존이었습니다.\n\n리쭝런은 아무 말 없이 지도를 접었습니다."
 kuomintag_wr.51.a:0 "...버린다."
 kuomintag_wr.52.t:0 "광시군에 연락"
 kuomintag_wr.52.d:0 "남경에서의 정변 시도가 실패로 끝난 이후, 리쭝런에게 남은 선택지는 제한적이었습니다. 더 이상 중앙과의 타협은 기대할 수 없었으며, 생존을 위해서는 자신의 기반으로 돌아가야 했습니다.\n\n리쭝런은 즉시 광시로 비밀 연락망을 가동하였습니다. 광시군은 여전히 그의 영향 아래에 있었고, 현지 지휘관들 또한 상황을 이해하고 빠르게 대응할 준비가 되어 있었습니다. 남경에서 이탈한 병력과 잔존 세력은 남쪽으로 이동하며 재집결을 시도하고 있습니다.\n\n이는 단순한 재정비가 아닙니다. 이미 상황은 돌이킬 수 없는 단계에 접어들었으며, 광시를 중심으로 한 새로운 군사적 결집이 이루어지고 있습니다. 각 부대는 전열을 가다듬고 있으며, 다가올 충돌에 대비하고 있습니다.\n\n전쟁은 끝나지 않았습니다. 단지, 새로운 국면으로 들어섰을 뿐입니다."
 kuomintag_wr.52.a:0 "전열을 가다듬어라."
 kuomintag_wr.53.t:0 "광저우행 열차"
 kuomintag_wr.53.d:0 "남경을 떠난 열차는 밤을 가르며 남쪽으로 향하고 있었습니다. 창밖으로 스쳐 지나가는 어둠 속에서, 리쭝런은 말없이 앉아 있었습니다. 객실 안에는 긴장된 공기가 흐르고 있었고, 동행한 장교들 또한 쉽게 입을 열지 못하고 있었습니다.\n\n모든 것은 너무 빠르게 무너졌습니다. 계획은 실패로 끝났고, 남겨진 병력은 이미 각자의 운명을 맞이하고 있을 것입니다. 그러나 멈출 수는 없었습니다. 남경에 남는 것은 곧 체포를 의미했기 때문입니다.\n\n열차는 멈추지 않았습니다. 중간 정차 없이 남쪽으로 달리고 있었습니다. 광저우에 도착한다면, 다시 시작할 수 있을 것입니다. 아직 끝난 것이 아니었습니다.\n\n리쭝런은 천천히 눈을 감았습니다. 이제 돌아갈 길은 없었습니다."
 kuomintag_wr.53.a:0 "계속 전진한다."
 kuomintag_wr.54.t:0 "국민당 내전 발발"
 kuomintag_wr.54.d:0 "리쭝런이 광저우에 도착한 이후, 상황은 더 이상 되돌릴 수 없는 단계에 접어들었습니다. 남경 정부와의 결별은 사실상 확정되었으며, 양측은 서로를 정통 정부로 인정하지 않고 있습니다.\n\n광저우에서는 리쭝런을 중심으로 한 새로운 권력 구조가 빠르게 형성되고 있으며, 광시군과 남부 지역의 병력들이 이에 합류하고 있습니다. 동시에 남경 정부 또한 반란 진압을 명분으로 병력을 재편성하며 대응에 나서고 있습니다.\n\n정치적 갈등은 이제 무력 충돌로 전환되었습니다. 양측은 모두 국민혁명의 정통성을 주장하고 있으며, 그 정당성을 전장에서 입증하려 하고 있습니다.\n\n하나의 당, 하나의 정부였던 국민당은 이제 둘로 갈라졌습니다.\n\n전쟁은 시작되었습니다."
 kuomintag_wr.54.a:0 "형제끼리의 전쟁이다."
 kuomintag_wr.55.t:0 "국민당 내전 발발"
 kuomintag_wr.55.d:0 "남경 정부와 리쭝런 세력 간의 갈등이 결국 무력 충돌로 이어졌습니다. 광저우에서 대립 정부가 수립되며 국민당은 두 개의 권력으로 분열되었고, 양측은 모두 자신들이 국민혁명의 정통성을 계승했다고 주장하고 있습니다. 남부와 중부 전선에서 이미 교전이 시작되었으며, 전황은 빠르게 악화되고 있습니다. 이번 사태는 중국 전역의 정치 질서에 중대한 영향을 미칠 것으로 보입니다."
 kuomintag_wr.55.a:0 "내전 중에 내전?"
 kuomintag_wr.56.t:0 "다짐"
 kuomintag_wr.56.d:0 "쑨원 선생께서 살아계실 적, 선생은 혁명의 배반자들을 언제나 경계하고, 국민혁명의 수반들 외에 다른 이가 국민혁명의 조타를 잡는 것을 결코 용납하지 마라 한 적이 계셨습니다, 우린 이에 따라 감히 그 누구도 국민혁명의 위업을 강탈하지 못하도록 경계해 왔지만, 이빨을 숨기던 이리떼들은 우리의 자세가 조금 흐트러진 이 순간에 마침내 이빨을 드러내고 고작 자신들의 피를 흘리기 싫다는 이유를 명분으로 삼은 채 청천백일을 뜯어먹기 시작했습니다. 만고의 역적이자 한간, 국민혁명의 배반자인 이종인 패거리의 저 자칭 임시정부는 멍청하기 짝이 없는 거짓말일 뿐입니다.\n\n놈들은 총탄을 몇 번 뿌리면 우리가 무너지고 정권을 넘겨주리라 예상한 듯 보입니다만, 우리의 혁명 원로들 중 그 누구도 민권, 민족, 민생 원칙을 지키기 위해 저 군국주의 망령들에게 굴복하지 않았습니다.(물론 굴복한 자들도 있었지만, 그들은 애초에 진심어린 혁명 원로가 아니였던 거겠지요!) 이미 우리가 저항을 선택하고 정부를 존속시킨 순간부터 저들의 계획은 무너진 것이나 다름 없습니다. 북쪽에선 호법정부가, 서쪽에선 서남군이, 전방에는 반역자들이 우릴 포위하고 있을지라도 국민혁명의 지속은 결코 불가침합니다! 우리는 쑨원 선생의 교시에 충성하며 혁명 외에는 죽음뿐이란 사실을 이미 각오했습니다. 설사 지금 우리가 저 반역자들에게 패배하더라도 사소한 차질일 뿐, 고작 백 년쯤 더 기다리는 것이 대수겠습니까?\n\n[KMT.GetLeader] 정부는 임시 청사에서 결사항전을 선포했으며 호법군과 반란군 모두에 맞서 궁극적인 승리를 가져올 것을 약속했습니다. 이종인이 지금이라도 투항한다면 국민혁명의 일원으로서 다시 받아들여줄 것이라는 관용적인 발언도 함께 말이죠, 하지만 그들은 우리의 관용을 들은 척도 하고 있지 않습니다. 혁명의 생존을 위해 더 치열하게 싸워야 할 때가 왔습니다!"
 kuomintag_wr.56.a:0 "국민혁명은 이어져야만 한다!"
 kuomintag_wr.57.t:0 "애국채 발행"
 kuomintag_wr.57.d:0 "재정이 한계에 다다른 상황에서 정부는 새로운 자금 조달 방안으로 애국채 발행을 결정했습니다. 국민들에게 국가의 존망이 걸린 전쟁에 직접 참여할 것을 호소하며, 채권 구매를 애국적 의무로 강조하고 있습니다. 도시와 농촌을 막론하고 선전이 이어지고 있으며, 일부 지역에서는 사실상 강제에 가까운 방식으로 할당이 이루어지고 있습니다. 단기적으로는 상당한 자금을 확보할 수 있으나, 국민의 부담이 누적되면서 불만 또한 서서히 증가하고 있습니다."
 kuomintag_wr.57.a:0 "나라를 위해서라면 감내해야 한다."
 kuomintag_wr.58.t:0 "홍콩-상하이 은행 협력"
 kuomintag_wr.58.d:0 "국제 금융망과의 연결을 회복하기 위해 정부는 홍콩-상하이 은행과의 협력을 추진하고 있습니다. 이를 통해 외환 확보와 신용 회복, 그리고 국제 결제 기능의 일부 복원이 가능해질 것으로 기대되고 있습니다. 특히 전쟁으로 인해 고립된 금융 환경 속에서 안정적인 자금 조달 경로를 확보하는 것은 중요한 의미를 지니고 있습니다. 다만 외국 금융 자본에 대한 의존이 심화될 수 있다는 점에서 내부적인 우려 또한 존재하고 있습니다."
 kuomintag_wr.58.a:0 "필요한 거래다."
 kuomintag_wr.59.t:0 "중앙은행 자산 압류"
 kuomintag_wr.59.d:0 "심각한 재정 위기 속에서 정부는 중앙은행이 보유한 자산을 직접 통제하기로 결정했습니다. 예치금과 금 보유고, 외환 자산까지 모두 국가 운영과 전쟁 수행을 위해 활용될 예정입니다. 이는 즉각적인 재정 보강 효과를 가져올 수 있으나, 금융 체계에 대한 신뢰를 크게 훼손할 가능성이 있습니다. 은행 시스템 전체가 흔들릴 수 있다는 우려 속에서도, 정부는 더 이상 선택의 여지가 없다고 판단하고 있습니다."
 kuomintag_wr.59.a:0 "지금은 살아남는 것이 우선이다."
 kuomintag_wr.60.t:0 "신뢰받는 은행"
 kuomintag_wr.60.d:0 "잇따른 금융 혼란과 강제적인 조치들로 인해 국민들의 금융 시스템에 대한 신뢰는 크게 흔들려 있었습니다. 그러나 최근 정부가 추진한 개혁과 통제 강화가 일정한 성과를 보이며, 일부 은행들이 다시금 안정성을 회복하고 있다는 평가가 나오고 있습니다.\n\n특히 국가의 보증 아래 운영되는 금융 기관들은 비교적 안정적인 자금 운용과 지급 능력을 유지하고 있으며, 시민들 사이에서도 점차 신뢰를 되찾고 있습니다. 이는 단순한 금융 안정 이상의 의미를 가지며, 무너졌던 경제 질서가 서서히 복구되고 있음을 보여주는 신호로 받아들여지고 있습니다.\n\n아직 완전한 회복과는 거리가 있지만, 적어도 지금 이 순간만큼은 금융 시스템이 다시 작동하기 시작했다는 사실이 분명해 보입니다."
 kuomintag_wr.60.a:0 "이제야 숨통이 트이는군."
 kuomintag_wr.61.t:0 "곡물법"
 kuomintag_wr.61.d:0 "전쟁이 장기화되면서 식량 문제는 단순한 보급의 차원을 넘어 국가 전체의 기반을 뒤흔드는 요소로 떠오르고 있습니다. 특히 값싼 외국산 곡물이 지속적으로 유입되면서 국내 농민들의 수익은 급격히 악화되었고, 일부 지역에서는 경작 자체를 포기하려는 움직임까지 나타나고 있었습니다.\n\n결국 정부는 방향을 전환했습니다. 외국산 곡물에 높은 관세를 부과하여 국내 시장을 보호하는 이른바 ‘곡물법’이 시행된 것입니다. 이 조치로 인해 수입 곡물의 가격은 크게 상승하였고, 자연스럽게 국내 생산물의 가격 또한 보장되기 시작했습니다. 농민들은 다시 생산을 이어갈 유인을 얻게 되었으며, 일부 지역에서는 경작지가 확대되는 모습까지 나타나고 있습니다.\n\n그러나 도시의 상황은 다소 달랐습니다. 식량 가격 상승은 곧바로 생활비 증가로 이어졌고, 이미 불안정한 민심에 또 다른 부담으로 작용하고 있습니다. 농촌은 숨을 돌렸지만, 도시의 불만은 점차 쌓이고 있습니다.\n\n전선을 유지하기 위해 선택한 정책이 또 다른 균열을 만들어내고 있습니다."
 kuomintag_wr.61.a:0 "농민이 살아야 나라가 산다."
 kuomintag_wr.62.t:0 "자력갱생의 결실"
 kuomintag_wr.62.d:0 "장강의 흙바람 속에 섞여 오던 비릿한 피비린내가 드디어 갓 지은 밥의 구수한 향기에 묻히기 시작했습니다. 지주들의 비명과 불타는 토지 문서의 매캐한 연기가 자욱하던 그 처절한 대지에서, 기어이 혁명의 결실이 돋아난 것입니다. 중앙정부의 배신자들이 보급품을 끊고 우리를 산 채로 굶겨 죽이려 획책했을 때, 우리는 총 대신 괭이를 들었고 적의 시신이 거름으로 썩어가는 논밭을 일구었습니다. "남경의 개새끼들이 쌀 한 톨 안 보내줘도 우리는 결코 죽지 않는다"는 병사들의 서슬 퍼런 외침이 마침내 현실이 된 순간입니다. 이제 전선의 진흙탕 참호 속으로 따뜻한 밥사발이 전달되고, 굶주림에 눈이 뒤집혔던 병사들의 눈빛에는 다시금 냉혹한 살의와 투지가 감돕니다. 대지는 지주들의 탐욕스러운 손아귀에서 벗어나 오직 혁명을 위해 그 수확을 내놓았으며, 이 쌀알들은 곧 적들의 심장을 꿰뚫을 총탄과 화약으로 치환될 것입니다. 자력갱생, 그 비릿하고도 위대한 승리가 우리 손안에 쥐어졌습니다. 이제 그 누구도 우리를 굶주림으로 굴복시킬 수 없음을, 이 풍성한 곡식의 향기가 증명하고 있습니다."
 kuomintag_wr.62.a:0 "우리는 우리 스스로를 구원했다."
 kuomintag_wr.63.t:0 "군민행정부 설치"
 kuomintag_wr.63.d:0 "비효율적인 행정제가 시행되던 지역들에 대하여 새로운 군민행정부를 설치할 것입니다. 과거의 구태의연한 행정 체계는 국가의 자원을 낭비하고 민생을 도탄에 빠뜨렸으나 이제는 군과 민이 합동하여 효율적인 통치를 실현해야 할 시점입니다. 이 새로운 행정 기구는 전후 복구와 치안 유지를 동시에 수행하며 중화의 질서를 바로잡는 초석이 될 것입니다. 우리는 이를 통해 행정적 공백을 메우고 전 국토의 균형 있는 발전을 도모할 것입니다."
 kuomintag_wr.63.a:0 "이 문제를 해결해야한다."
 kuomintag_wr.64.t:0 "소비재 생산 확대 요구"
 kuomintag_wr.64.d:0 "난징의 공업 지대와 광저우의 상업 허브를 대변하는 국민대회 의원들이 정부에 공식적인 요구안을 제출했습니다. 이들은 현재의 군사 동원 중심 정책이 필수 소비재의 심각한 부족과 물가 폭등을 초래했다고 주장하며, 민생 안정을 위해 국가 산업 역량의 일부를 즉각 민간 생산으로 전환할 것을 강력히 요구하고 있습니다."
 kuomintag_wr.64.a:0 "인민의 민생이 최우선이다."
 kuomintag_wr.64.b:0 "국방의 의무는 타협할 수 없다."
 kuomintag_wr.65.t:0 "사천 기근 복구 지원 요구"
 kuomintag_wr.65.d:0 "사천 출신 국민대회 의원들이 난징 정부에 공식적인 청원서를 제출했습니다. 이들은 비록 기근의 절정기는 지났으나 사천 전역이 여전히 그 여파로 인해 마비 상태에 놓여 있다고 주장합니다. 수백만 명의 이재민이 여전히 거리를 떠돌고 지역 경제가 파탄 난 상황에서, 서부 국경의 질서를 회복하기 위해 중앙 정부 차원의 즉각적인 재정 지원과 대규모 복구 사업을 실시할 것을 강력히 요구하고 있습니다."
 kuomintag_wr.65.a:0 "사천의 인민들을 저버릴 수는 없다."
 kuomintag_wr.65.b:0 "지금은 국고가 이 부담을 감당할 수 없다."
 kuomintag_wr.66.t:0 "토지개혁 실시 요구"
 kuomintag_wr.66.d:0 "난징의 국민대회 의원들이 민생주의의 핵심 원칙이자 국부 쑨원 선생의 유훈인 평균지권을 근거로 공식적인 토지개혁안을 제출했습니다. 의원들은 현재의 반봉건적인 토지 소유 체제가 농민들을 도탄에 빠뜨리고 국가 현대화를 가로막고 있다고 주장하며, 정부가 즉각적으로 토지를 재분배하고 경자유전의 원칙을 확립할 것을 요구하고 있습니다. 혁명의 핵심 강령을 외면하는 것은 농촌의 광범위한 불안정을 초래하고 민국 지도부에 대한 신뢰를 무너뜨리는 결과를 낳을 것입니다."
 kuomintag_wr.66.a:0 "토지는 밭을 가는 농민의 것이어야 한다."
 kuomintag_wr.66.b:0 "지금은 사회 질서를 흔들 시기가 아니다."
 kuomintag_wr.67.t:0 "민간 공장 건설 요구"
 kuomintag_wr.67.d:0 "난징 국민대회의 의원들이 중앙 정부에 군비 확장보다 민수 공장 건설을 우선시할 것을 요구하고 있습니다. 이들은 민국의 지속 가능한 성장은 군사력 강화가 아닌 인민의 필요를 충족시킬 수 있는 견고한 산업 기반에 달려 있다고 주장합니다. 북경에서 광저우에 이르는 모든 도시의 번영을 보장하기 위해, 이들은 구체적인 민간 인프라 구축 계획의 수립을 강력히 촉구하고 있습니다. 그들은 우리에게 지속적인 요구를 해올것이며 이를 거부하거나 수락하는 것에 따라 국민대회 정통성이 영향을 받을 것입니다."
 kuomintag_wr.67.a:0 "경제의 토대를 구축하라."
 kuomintag_wr.67.b:0 "중요한 일이 있다."
 kuomintag_wr.68.t:0 "소수민족 거주지 인프라 건설 요구"
 kuomintag_wr.68.d:0 "변방 각지에서 올라온 국민대회 의원들이 난징 정부에 공동 청원서를 제출했습니다. 이들은 북경이나 광저우 같은 대도시에서 현대화가 급격히 진행되는 동안, 서부와 북부의 소수민족 거주 지역은 현대적 교통수단의 부재로 인해 여전히 고립되어 있다고 주장합니다. 오족협화의 이상을 실현하고 진정한 국가 통합을 이루기 위해, 이들은 낙후된 변방 지역에 즉각적인 철도와 도로 건설을 시작할 것을 요구하고 있습니다. 그들은 우리에게 지속적인 요구를 해올것이며 이를 거부하거나 수락하는 것에 따라 국민대회 정통성이 영향을 받을 것입니다."
 kuomintag_wr.68.a:0 "강철과 석재로 국가를 하나로 묶을 것이다."
 kuomintag_wr.68.b:0 "변방의 개발은 지금으로선 무리다."
 kuomintag_wr.69.t:0 "여성 복지 확충 요구"
 kuomintag_wr.69.d:0 "난징 국민대회의 여성 의원들과 진보적 인사들이 여성 복지 및 노동권 확충을 위한 공식 제안서를 제출했습니다. 이들은 광저우와 난징의 공업 지대에서 여성이 노동력의 핵심적인 부분을 차지하고 있음에도 불구하고, 열악한 노동 환경과 모성 보호의 부재로 고통받고 있다고 지적합니다. 혁명의 평등 정신을 근거로, 이들은 정부가 여성 교육 기관을 설립하고 여성 노동자를 위한 법적 보호 장치를 마련할 것을 요구하고 있습니다. 그들은 우리에게 지속적인 요구를 해올것이며 이를 거부하거나 수락하는 것에 따라 국민대회 정통성이 영향을 받을 것입니다."
 kuomintag_wr.69.a:0 "여성은 하늘의 절반을 떠받치고 있다."
 kuomintag_wr.69.b:0 "지금은 전통적인 가치를 지키는 것이 우선이다."
 kuomintag_wr.70.t:0 "군수 공장 확충 요구"
 kuomintag_wr.70.d:0 "난징 국민대회에서 군부 측 의원들과 북방 국경 지역 대표들이 국가 방위 산업의 즉각적인 확충을 요구하는 공동성명을 발표했습니다. 이들은 북경이나 광저우 같은 도시의 산업화도 중요하지만, 자급자족 가능한 군사 산업 체계 없이는 민국이 외부의 위협에 취약한 상태로 남을 것이라고 주장합니다. 국가의 주권을 수호하기 위해, 이들은 정부가 병기창과 군수 공장 건설을 최우선 과제로 삼을 것을 강력히 촉구하고 있습니다. 그들은 우리에게 지속적인 요구를 해올것이며 이를 거부하거나 수락하는 것에 따라 국민대회 정통성이 영향을 받을 것입니다."
 kuomintag_wr.70.a:0 "강한 국가에는 강한 군대가 필요하다."
 kuomintag_wr.70.b:0 "민수 경제를 도외시할 수는 없다."
 kuomintag_wr.71.t:0 "대규모 농민폭동"
 kuomintag_wr.71.d:0 "우리는 급진화 수준을 충분히 낮추는데 실패하였고 그 부작용이 결국 사회 전반에 걸쳐 표출되었습니다. 특히 사흘에 걸친 농민의 대규모 봉기는 이러한 급진화 억제 실패를 대표적으로 보여주고 있습니다. 그들은 현재 정부의 조치를 매우 반동적이며 부르주아지적이라고 비난하며 토지재분배와 정권 이양을 요구하며 폭동을 일으켰습니다. 이들은 군경에 의해 진압되었으나 이들이 사회에 남긴 불씨는 쉽게 사그라 들지 않을것입니다."
 kuomintag_wr.71.a:0 "미쳤군!"
 kuomintag_wr.72.t:0 "지식인들의 시위"
 kuomintag_wr.72.d:0 "최근 지식인들은 현 정부의 불만을 표출하며 가도에서 대규모 시위를 진행하였습니다. 그들은 중국을 소비에트화 해야한다고 주장하거나 프랑스처럼 민족을 중심으로 급진적으로 단결해야 한다는 주장을 펼치며 소동을 일으켰습니다. 때로는 서로 사상이 맞지 않는 지식인 끼리 패싸움을 벌이기 까지하며 소동은 확산되었고 결국 경찰에 의해 해산되었습니다. 이 과정에서 많은 사람들이 감옥에 투옥되었고 사회불안은 더욱 커져만 가고있습니다."
 kuomintag_wr.72.a:0 "배웠다는 놈들이 왜 이래?"
 kuomintag_wr.73.t:0 "노동자들의 폭동"
 kuomintag_wr.73.d:0 "어제 노동자들은 최저임금 인상과 생활권 보장, 노동시간 축소를 요구하여 공장에서 대규모 폭동을 일으켰습니다. 그들은 공장 간수들을 집단폭행하고 기계를 파괴, 방화하는 등 범죄를 동반한 대규모 시위를 이어나갔습니다. 이에 몇명의 사상자가 발생하자 경찰은 강압적인 진압에 나섰고 이 과정에서 다시 몇명의 사상자가 발생하였습니다. 이는 급진화 억제 실패의 처절한 한 예시이며 이를 해결하지 못한다면 이와 같은 사례가 앞으로도 계속 될 것입니다."
 kuomintag_wr.73.a:0 "시위가 아니라 폭동이야!"
 kuomintag_wr.74.t:0 "불요불굴"
 kuomintag_wr.74.d:0 ""이런 중요한 시기에 반란이라니!"\n왕징웨이는 크게 동요하며 그의 집무실에서 가만히 앉아 있지를 못하고 의자에서 일어났다가 앉기를 여러 번 반복했다.\n\n리쭝런이 총통부 점거를 시도했다가 실패하여 광저우로 도망하고 결국 양광에서 반란을 일으킨 것이었다.\n불법 정부에 대항한 국민혁명이 한창 진행 중인 와중에 이는 국민당에게 뼈아픈 손실이었다. 당장 힘을 합쳐 호법군을 몰아내기도 벅찬 상황에서 군대가 둘로 나뉘다니. 국민혁명을 모조리 망칠 심산이 아니고서야 이러한 일을 벌일 이유가 없었다.\n\n"휴우..."\n\n한숨을 한 번 푹 쉬고 왕징웨이는 자리에 털썩 앉았다.\n이미 벌어진 일을 돌이킬 수는 없는 법. 쑨원 선생이 혁명을 이룩하기까지 얼마나 많은 실패를 겪었던가. 모든 대계는 그 과정에서 실패와 수정을 필요로 하는 법이다.\n\n혁명은 끝나지 않았다. 혁명은 계속될 것이다."
 kuomintag_wr.74.a:0 "국민혁명은 계속된다."
 kuomintag_wr.75.t:0 "당권위상 선포"
 kuomintag_wr.75.d:0 "국민당 중앙집행위원회는 쑨원 선생의 이당치국 정신을 계승하여 당권위상 원칙을 공식적으로 선포했습니다. 이 법령에 따라 정부의 모든 행정, 입법, 사법 기구는 이제 당의 직접적인 지도와 감시를 받게 됩니다. 전국의 주요 기관 보직은 엄격한 당성 검토를 거친 인사들로 교체될 예정입니다. 이러한 조치는 군부와 민간 관료 사회 모두에 대한 당의 절대적인 영도권을 공고히 하며, 국가의 향방이 국민혁명의 목표와 일치하도록 보장하는 계기가 될 것입니다."
 kuomintag_wr.75.a:0 "모든 권력을 당으로."
 kuomintag_wr.76.t:0 "중앙선전부 장악"
 kuomintag_wr.76.d:0 "민국의 모든 언론과 출판 시설이 드디어 당의 엄격한 지도 아래 하나로 통합되었습니다. 이제 모든 신문과 라디오 방송은 물론 거리의 벽보 하나까지도 오직 삼민주의의 정수와 국민혁명의 당위성을 전파하는 도구로 활용될 것입니다. 정보의 통일은 곧 사상의 통일이며 이는 우리가 꿈꾸는 전민혁명을 완수하기 위한 강력한 정신적 토대가 될 것입니다. 민국 전역의 인민들은 이제 당의 목소리에 귀를 기울이며 하나의 목표를 향해 나아갈 것입니다."
 kuomintag_wr.76.a:0 "혁명의 목소리가 승리를 이끈다."
 kuomintag_wr.77.t:0 "대중 집회 확대"
 kuomintag_wr.77.d:0 "당의 주도로 전역에서 대규모 대중 집회가 대대적으로 개최되고 있습니다. 이 집회들은 단순한 군중 모임이 아니라 인민들에게 삼민주의의 핵심 가치와 국민혁명의 주요 사상을 체계적으로 전파하고 깨우치기 위한 거대한 교육의 장입니다. 강단에 선 당의 연사들은 쑨원 선생의 유훈을 해설하며 인민들이 스스로 혁명의 주체임을 자각하도록 이끌고 있습니다. 오랜 기간 중세 봉건 시대와도 같은 전근대 사회에 얽매여 있던 중화민국 인민들에게 더욱 진보된 사상을 주입함으로써 우리는 쑨원 선생이 바라마지않던 세계로 한 걸음 더 나아갈 수 있을 것입니다."
 kuomintag_wr.77.a:0 "그렇게 또 한 걸음."
 kuomintag_wr.78.t:0 "전민혁명의 완성"
 kuomintag_wr.78.d:0 "노동자와 농민, 소자산계급, 그리고 진보적인 지식인에 이르기까지 모든 사회 계층이 마침내 당의 깃발 아래 하나로 뭉쳤습니다. 이것은 우리가 오랫동안 추구해온 전민혁명의 위대한 완성입니다. 과거의 분열과 갈등을 극복하고 전 인민이 하나의 운명 공동체로 결속됨으로써, 민국은 그 어떤 안팎의 위협도 물리칠 수 있는 무소불위의 힘을 얻게 되었습니다. 단결된 대중의 강력한 지지를 바탕으로 민국은 새로운 질서를 수립하고 영원한 번영의 길로 나아갈 것입니다."
 kuomintag_wr.78.a:0 "전 인민이 당과 함께 나아간다."
 kuomintag_wr.79.t:0 "삼대정책"
 kuomintag_wr.79.d:0 "쑨원은 연소, 용공, 부조농공이라는 삼대정책을 일찍이 채택했었습니다. 쑨원의 유지를 잇는 자들로써 이 정책을 다시금 시행하는 것이 올바릅니다. 이 정책들을 보다 구체화하고 실제로 실행시킴으로서 중화 인민들의 삶은 풍요롭게 만들고 동시에 중원을 침탈한 여러 제국주의 세력들에 대항하여 중국을 온전히 중국의 것으로 만들어야 합니다.\n\n이는 우리에게 있어서 단순한 선택사항 같은 것이 아닌 필수적이고도 당면한 해결 과제이며 제국주의에 납작 업드려 빌붙어왔던 호법정부와 우리의 명확한 차이를 인민들에게 보여주게 될 것입니다. 이로써 중화민국은 한 걸음 더 나아갈 것입니다."
 kuomintag_wr.79.a:0 "치엔진!(전진!)"
 kuomintag_wr.80.t:0 "러시아 접촉 준비"
 kuomintag_wr.80.d:0 "소비에트 러시아는 국민당의 반제국주의 논조를 함께할 수 있는 유일한 강대국입니다. 그들은 서구 제국주의 국가들의 마수를 뿌리치고 스스로를 지켜내는데 성공하였습니다. 이에따라 우리는 소비에트와 연대하여 중국 내 제국주의자들의 횡포를 단호하게 끊어내어야 합니다. 우리는 그들에게 다방면의 협력을 요청하여 그들과의 관계를 더욱 굳건하게 유지 할 것입니다."
 kuomintag_wr.80.a:0 "모스크바로!"
 kuomintag_wr.81.t:0 "국민당의 협력 요청"
 kuomintag_wr.81.d:0 "국민당은 오늘 산업과 군사분야에 대한 협력을 요청해왔습니다. 국민당은 우리 소비에트와 공산주의에 관대한 몇 안되는 정치세력인 동시에 세계혁명을 위한 우리의 중국에서의 발판이기도 합니다. 소비에트 러시아가 다른 열강들에 의해 고립되어 있는 만큼 이들과의 협력은 분명 우리에게도 이득이 될 것입니다."
 kuomintag_wr.81.a:0 "산업과 군사 모두 지원하지!"
 kuomintag_wr.81.b:0 "산업을 지원하자."
 kuomintag_wr.81.c:0 "군사 고문단을 파견하자."
 kuomintag_wr.81.e:0 "집에나 가라고 전해라."
 kuomintag_wr.82.t:0 "소비에트 러시아의 산업-군사 협력 승인"
 kuomintag_wr.82.d:0 "최근 모스크바로 향했던 우리의 사절단이 희소식을 안고 중국으로 귀환하였습니다. 소비에트 정부는 산업과 군사부문 모두에 있어 우리를 지원할 것을 약속하였고 그들은 우리와 함께 반제국주의 투쟁을 벌일 수 있게 되어 기쁘다고 답하였습니다. 이는 우리가 연소를 더욱 강화하여 반제국주의 투쟁을 지속하는데 큰 도움을 줄 것입니다."
 kuomintag_wr.82.a:0 "실로 기쁘도다."
 kuomintag_wr.83.t:0 "소비에트 러시아의 산업 협력 승인"
 kuomintag_wr.83.d:0 "최근 모스크바로 향했던 우리의 사절단이 희소식을 안고 중국으로 귀환하였습니다. 소비에트 정부는 산업부문에 있어 우리를 지원할 것을 약속하였고 그들은 우리와 함께 반제국주의 투쟁을 벌일 수 있게 되어 기쁘다고 답하였습니다. 이는 우리가 연소를 더욱 강화하여 반제국주의 투쟁을 지속하는데 큰 도움을 줄 것입니다."
 kuomintag_wr.83.a:0 "좋은 결과다."
 kuomintag_wr.84.t:0 "소비에트 러시아의 군사 협력 승인"
 kuomintag_wr.84.d:0 "최근 모스크바로 향했던 우리의 사절단이 희소식을 안고 중국으로 귀환하였습니다. 소비에트 정부는 군사부문에 있어 우리를 지원할 것을 약속하였고 그들은 우리와 함께 반제국주의 투쟁을 벌일 수 있게 되어 기쁘다고 답하였습니다. 이는 우리가 연소를 더욱 강화하여 반제국주의 투쟁을 지속하는데 큰 도움을 줄 것입니다."
 kuomintag_wr.84.a:0 "좋은 결과다."
 kuomintag_wr.85.t:0 "소비에트 러시아의 협력 거부"
 kuomintag_wr.85.d:0 "소비에트 정부는 우리 정부와의 협력은 전면으로 거부하고 나섰습니다. 그들은 우리가 그들의 소중한 파트너라는 점을 강조했으나 동시에 그들 스스로를 복구하기도 벅찬 상황에 있다고 설명하였습니다. 이에 따라 우리의 요청은 전면으로 무산되었으며 이는 연소 정책에 있어서 부정적인 영향을 줄 것으로 보입니다."
 kuomintag_wr.85.a:0 "미련하군."
 kuomintag_wr.86.t:0 "국민당의 코민테른 연계 요청"
 kuomintag_wr.86.d:0 "오늘 아침 국민당 정부가 코민테른과의 긴밀한 협조 및 공조를 요청해왔습니다. 이는 그들이 주장하는 반제국주의 투쟁의 일환으로 보이며 그들과의 연계는 중국을 향한 세계형멱에도 도움을 줄 것으로 보입니다. 이 공조에 응하는 것은 장기적으로 우리에게 긍정적인 영향을 줄 것입니다."
 kuomintag_wr.86.a:0 "응해주지!"
 kuomintag_wr.86.b:0 "유감이지만 어렵다."
 kuomintag_wr.87.t:0 "코민테른의 연계 요청 수락"
 kuomintag_wr.87.d:0 "코민테른이 우리의 협조 및 공조 요청을 공식적으로 수락했다는 소식이 전해졌습니다. 이로써 우리는 국제 혁명 세력의 강력한 지지와 선진적인 기술 지원을 보장받게 되었습니다. 외부에서 유입되는 자금과 자원은 민국의 내부 안정을 다지고 산업 생산성을 높이는 데 기여할 것이며 당의 사상적 기틀을 공고히 하는 원동력이 될 것입니다. 우리의 반제국주의 투쟁은 이제 세계 혁명의 흐름과 맞물려 강력한 추진력을 얻게 되었습니다."
 kuomintag_wr.87.a:0 "세계 혁명의 물결이 우리와 함께한다."
 kuomintag_wr.88.t:0 "코민테른의 연계 요청 거부"
 kuomintag_wr.88.d:0 "코민테른은 우리의 공조 요청을 최종적으로 거부하였습니다. 그들은 내부적인 사정과 역량의 한계를 이유로 들었으나 이는 사실상 우리의 반제국주의 투쟁에 동참하지 않겠다는 선언과 다름없습니다. 외부의 전폭적인 지원을 기대했던 우리의 계획은 전면적으로 무산되었으며 당 내부의 사상적 결속에도 적지 않은 타격이 갈 것으로 보입니다. 우리는 타인의 원조 없이 오직 우리 자신의 힘만으로 제국주의 세력에 맞서야 하는 험난한 과제를 안게 되었습니다."
 kuomintag_wr.88.a:0 "독자적인 길을 걸어가야 한다."
 kuomintag_wr.89.t:0 "서북평정"
 kuomintag_wr.89.d:0 "호법정부의 급격한 붕괴에 따라 중원은 국민당의 품에 들어가게 되었습니다. 그러나 서북의 많은 지역들은 독자적인 군벌을 형성하여 사실상 독립된 세력들을 이루고 있습니다. 그러나 이 지역 또한 전통적인 중국의 강역이며 이에 따라 중앙정부인 우리는 이를 좌시 할 수 없습니다. 서북의 반란 세력들을 평정하고 서북을 중화인민의 품으로 다시 모아야 합니다."
 kuomintag_wr.89.a:0 "운명이 부른다!"
 kuomintag_wr.90.t:0 "국민당의 굴복 요구"
 kuomintag_wr.90.d:0 "내전이 국민당의 승리로 돌아가고. 그들은 우리에게 굴복하여 중앙정부의 통치 아래 다시 들어오라고 최후통첩을 보내었습니다. 우리는 이 요구를 거부할 수도 있겠으나 내전까지 평정한 그들을 현실적으로 막아내는 것은 어려울 것입니다..."
 kuomintag_wr.90.a:0 "어쩔수 없구나"
 kuomintag_wr.90.b:0 "항전하라!"
 kuomintag_wr.91.t:0 "[FROM.GetName]의 복종"
 kuomintag_wr.91.d:0 "우리의 최후통첩에 직면한 [FROM.GetName] 세력이 현실을 직시하고 마침내 무릎을 꿇었습니다. 이들은 무의미한 저항 대신 중앙정부의 영도 아래로 복귀하는 길을 선택하였습니다. 이로써 우리는 피 한 방울 흘리지 않고 정당한 강역을 수복하였으며, 분열되었던 중화를 하나로 모으는 대업에 한 걸음 더 다가서게 되었습니다. 인민들은 마침내 찾아온 평화와 통합의 소식을 열렬히 환호하고 있습니다."
 kuomintag_wr.91.a:0 "중화가 다시 하나로 모이고 있다."
 kuomintag_wr.92.t:0 "[FROM.GetName]의 최후통첩 거부"
 kuomintag_wr.92.d:0 "서북의 오만한 [FROM.GetName] 세력이 우리의 정당한 요구를 끝내 거부하였습니다. 이들은 분열된 권력을 유지하기 위해 중앙정부의 권위에 정면으로 도전하는 어리석은 선택을 내렸습니다. 평화적인 해결을 기대했던 인민들은 이들의 독선에 분노하고 있으며, 이제 남은 방법은 오직 무력으로 이 반란 세력을 징벌하는 것뿐입니다. 군대를 진격시켜 서북 전역에 민국의 질서를 바로잡아야 합니다."
 kuomintag_wr.92.a:0 "반역자들에게 엄중한 심판을 내릴 시간이다."
 kuomintag_wr.93.t:0 "평균지권의 본격적인 시행"
 kuomintag_wr.93.d:0 "선언에 머물렀던 평균지권 정책이 마침내 전국적인 토지 가치 신고를 시작으로 본격적인 수행 단계에 접어들었습니다. 지주들은 정부의 수매권을 의식하여 토지 가격을 낮춰 부르지 못하고 있으며, 동시에 세금 부담 때문에 터무니없이 높게 부르는 것도 불가능한 딜레마에 빠졌습니다. 토지 가치 상승에 따른 불로소득을 환수하여 공공의 재정으로 귀속시키겠다는 이 정교한 제도는 구체적인 행정망 정비를 통해 실현될 것이며, 이는 지주 계층의 경제적 독점력을 약화시키고 국가 주도 개발의 거대한 재정적 토대가 될 것입니다."
 kuomintag_wr.93.a:0 "민생주의의 핵심 기틀이 마련될 것이다."
 kuomintag_wr.94.t:0 "공회법 제정"
 kuomintag_wr.94.d:0 "정부는 노동자들의 권익을 제도적으로 보장하는 동시에, 노동운동이 급진적인 계급투쟁으로 변질되는 것을 방지하기 위한 공회법을 제정하였습니다. 이 법안은 노동조합의 설립과 합법적인 활동을 허용하여 노동계의 지지를 확보하되, 모든 분쟁은 중앙정부와 당의 중재를 거치도록 규정하고 있습니다. 이는 생산 현장의 무분별한 파업을 억제하고 산업 평화를 유지하여 국가 경제의 안정을 도모하는 동시에, 노동자들을 민국의 영도 아래 결속시키는 중요한 정치적 성과가 될 것입니다."
 kuomintag_wr.94.a:0 "노동과 자본의 상생을 이룩할 것이다."
 kuomintag_wr.95.t:0 "외국 조계 자산 국유화 단행"
 kuomintag_wr.95.d:0 "정부는 제국주의 열강이 불평등 조약을 통해 부당하게 탈취해 간 조계 지대의 모든 자산을 민국의 소유로 전격 국유화하는 조치를 단행하였습니다. 열강의 부당한 경제적 거점이었던 조계 내의 공장, 철도, 인프라 시설들이 이제 온전히 우리 인민의 자산으로 귀속될 것입니다. 외세의 오랜 경제적 수탈에 종지부를 찍은 이 과감한 결단은 국가 재정과 자립 산업망 구축에 거대한 자양분이 될 것이나, 이권의 상실에 분노한 서구 열강과의 외교적 마찰은 피할 수 없을 것으로 보입니다."
 kuomintag_wr.95.a:0 "주권은 타협의 대상이 아니다."
 kuomintag_wr.96.t:0 "외국계 자본 매각 강권 법령 발표"
 kuomintag_wr.96.d:0 "국내 주요 기간산업과 시장을 잠식하고 있는 외국계 자본을 국가나 민족 기업가에게 강제로 매각하도록 압박하는 강력한 법령이 발효되었습니다. 정부는 자산 가치를 공정하게 평가하여 매각 절차를 밟을 것이라 선언했으나, 실질적으로는 외세의 경제적 영향력을 국내 시장에서 강제로 축출하기 위한 초강수입니다. 민족 기업가들은 정부의 이러한 보호주의 조치를 적극 환영하고 있으며, 이로써 민국은 대외 의존도에서 벗어나 완전한 경제적 주권을 회복하는 역사적인 전환점을 맞이하게 되었습니다."
 kuomintag_wr.96.a:0 "경제적 주권을 우리 손으로 되찾을 것이다."
 kuomintag_wr.97.t:0 "[FROM.GetName]의 무기 지원 요청"
 kuomintag_wr.97.d:0 "[FROM.GetName] 으로부터 군사적 지원 요청이 도달했습니다. 그들은 현재 진행 중인 정세에서 우위를 점하기 위해 우리 측에 무기와 장비 보급을 요청했습니다. 우리는 이 요청을 수락하여 대륙에서의 영향력을 확보할 것인지, 혹은 물자 소모를 피하기 위해 거절할 것인지 선택해야 합니다."
 kuomintag_wr.97.a:0 "소총을 지원한다"
 kuomintag_wr.97.b:0 "야포를 지원한다"
 kuomintag_wr.97.c:0 "지원장비를 지원한다"
 kuomintag_wr.97.e:0 "요청을 거절한다"
 kuomintag_wr.98.t:0 "[FROM.GetName]의 소총 지원 수락"
 kuomintag_wr.98.d:0 "[FROM.GetName] 정부는 우리의 무기 지원 요청을 수락하고 소총 물자를 보내왔습니다! 그들이 보낸 군사 물자가 전선에 도착하기 시작했으며, 이는 우리 군세에 큰 보탬이 될 것입니다."
 kuomintag_wr.98.a:0 "훌륭하군."
 kuomintag_wr.99.t:0 "[FROM.GetName]의 야포 지원 수락"
 kuomintag_wr.99.d:0 "[FROM.GetName] 정부는 우리의 무기 지원 요청을 수락하고 야포 물자를 보내왔습니다! 그들이 보낸 군사 물자가 전선에 도착하기 시작했으며, 이는 우리 군세에 큰 보탬이 될 것입니다."
 kuomintag_wr.99.a:0 "훌륭하군."
 kuomintag_wr.100.t:0 "[FROM.GetName]의 지원장비 지원 수락"
 kuomintag_wr.100.d:0 "[FROM.GetName] 정부는 우리의 무기 지원 요청을 수락하고 지원장비 물자를 보내왔습니다! 그들이 보낸 군사 물자가 전선에 도착하기 시작했으며, 이는 우리 군세에 큰 보탬이 될 것입니다."
 kuomintag_wr.100.a:0 "훌륭하군."
 kuomintag_wr.101.t:0 "[FROM.GetName]의 무기 지원 요청 거절"
 kuomintag_wr.101.d:0 "[FROM.GetName] 정부는 우리의 무기 지원 요청을 단호하게 거절했습니다. 그들은 자신들의 국익이나 중립 유지를 이유로 들며 장비 할당을 허가하지 않았습니다. 우리는 다른 방도를 찾아야 합니다."
 kuomintag_wr.101.a:0 "어쩔 수 없군..."
 kuomintag_wr.102.t:0 "훈정 체제의 기한 설정"
 kuomintag_wr.102.d:0 "쑨원의 건국대강에 의거하여 선포된 훈정 체제는 인민을 계몽하고 민주주의를 훈련하기 위한 과도기적 단계입니다. 그러나 남경 정부 내부에서는 현재 민국의 민중들이 즉각적인 주권 행사를 감당할 수 있을 것인가에 대한 논쟁이 흐르고 있습니다. 훈정의 명확한 종결 기한을 선언하여 정당성을 증명할 것인지, 아니면 사회적 성숙도를 고려해 기한 연장의 여지를 남겨둘 것인지 결정해야 합니다."
 kuomintag_wr.102.a:0 "민중의 계몽이 불충분할 경우 부득이하게 훈정 기간을 연장할 수 있도록 한다."
 kuomintag_wr.102.b:0 "훈정의 기한을 예외 없이 명확히 명시한다."
 kuomintag_wr.103.t:0 "균권주의의 실현 방향"
 kuomintag_wr.103.d:0 "민국의 권력과 자원을 배분하는 균권주의는 중앙집권과 지방분권의 극단적 폐단을 막기 위한 핵심 강령입니다. 남경 중앙정부는 국가 현대화와 기간산업 확충을 가속하기 위해 주요 자원을 국유화하고 중앙의 통제력을 강화하려 합니다. 반면 각 성 정부의 대표들은 지역의 균형 발전과 안정을 위해 지방 정부의 자율성을 보장하는 것이야말로 균권의 본질이라며 맞서고 있습니다."
 kuomintag_wr.103.a:0 "중앙정부의 권능을 강화하는 국유화 중심의 균권주의를 관철한다."
 kuomintag_wr.103.b:0 "각 성 정부의 자율성을 한층 보장하는 균권주의를 실현한다.
 KMT_five_power_separation_political_power_factor_change_tt:0 "§Y오권분립§!의 일일 정치력 획득 수정치가 §G10% 증가§!합니다."
