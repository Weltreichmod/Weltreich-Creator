 KMT_five_power_separation_trade_laws_cost_factor_change_tt:0 "§Y오권분립§!의 무역 법안 통과 비용 수정치가 §G15% 감소§!합니다."
 kuomintag_wr.108.t:0 "관료 임용 시험의 개방성"
 kuomintag_wr.108.d:0 "민국의 행정을 책임질 관료를 선발하는 고시 제도의 본격적인 시행을 앞두고, 응시 자격의 제한 범위를 두고 고시원 내부에서 격렬한 논쟁이 벌어졌습니다. 일각에서는 국가와 당에 대한 충성심이 의심스럽거나 반혁명적인 이념적 배경을 가진 자들의 응시를 철저히 제한하여 내치와 국가 안보의 보루를 다져야 한다고 주장합니다. 반면 기술 관료적 효율성을 중시하는 이들은 오직 사상과 배경을 배제한 순수한 공개 경쟁 시험만을 통해 최고 수준의 역량을 갖춘 인재들을 선발해야 민국의 근대화를 완수할 수 있다고 맞서고 있습니다."
 kuomintag_wr.108.a:0 "국가에 대한 충성심이 의심스러운 이의 응시를 제한한다."
 kuomintag_wr.108.b:0 "이념적 배경을 배제하고 순수 공개 경쟁 시험을 통해 최고 수준의 기술 관료를 선발한다."
 kuomintag_wr.109.t:0 "지역별 교육 격차와 할당제 논쟁"
 kuomintag_wr.109.d:0 "전국 단위의 관료 선발 시험이 추진되면서, 북경이나 남경 등 교육 인프라가 집중된 일부 핵심 지역 출신들이 합격 자리를 독점할 것이라는 우려가 현실로 다가왔습니다. 능력주의 원칙에 따라 철저히 성적순으로만 선발하여 최고 수준의 엘리트 관료제를 유지해야 국가의 행정 효율을 극대화할 수 있다는 원칙론이 지배적인 반면, 국가적 통합과 낙후 지역의 안정을 위해 교육 환경이 열악한 변방이나 오지 성에 일정 비율의 합격 자리를 의도적으로 할당해야 한다는 포용적 주장도 제기되고 있습니다."
 kuomintag_wr.109.a:0 "능력주의 원칙에 따라 성적순으로만 선발하여 최고 수준의 엘리트 관료제를 유지한다."
 kuomintag_wr.109.b:0 "국가 통합을 위해 교육 환경이 낙후된 지역에 일정 비율의 합격 자리를 할당한다."
